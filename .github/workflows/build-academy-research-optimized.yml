name: Build Academy Research Optimized TXT

on:
  push:
    branches:
      - agent/academy-research-scope-speed-build
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/academy-research-scope-speed-build

      - name: Patch Academy Research workspace only
        shell: python
        run: |
          from pathlib import Path

          src = Path('game/Academy.html')
          text = src.read_text(encoding='utf-8')

          css = r'''
/* Research Focus Lab: isolated speed, accuracy, and graph controls */
.researchFocusLabBtn{background:#0f172a!important;color:#fff!important;border-color:#0f172a!important}
.researchPerfBtn{background:#fff!important;color:#7f1d1d!important;border:1px solid #991b1b!important}
.researchFocusOverlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.62);z-index:12000;align-items:center;justify-content:center;padding:18px}
.researchFocusOverlay.open{display:flex}
.researchFocusBox{width:min(1180px,97vw);max-height:94vh;overflow:auto;background:#fff;border:3px solid #111827;border-radius:14px;box-shadow:0 24px 70px rgba(0,0,0,.35)}
.researchFocusHead{position:sticky;top:0;z-index:2;display:flex;justify-content:space-between;gap:12px;align-items:center;background:#111827;color:#fff;padding:11px 13px}
.researchFocusHead strong{font-size:18px}.researchFocusBody{padding:12px;display:grid;gap:12px;background:#f8fafc}
.researchFocusControls{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:8px;background:#fff;border:1px solid #cbd5e1;border-radius:12px;padding:10px}
.researchFocusControls .field label{text-transform:none;font-size:11px}
.researchFocusVariableGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:6px;max-height:170px;overflow:auto;border:1px solid #cbd5e1;border-radius:10px;padding:8px;background:#fff}
.researchFocusVariable{display:flex;gap:7px;align-items:center;border:1px solid #e5e7eb;border-radius:8px;padding:6px;background:#fff;font-size:12px;font-weight:800}
.researchFocusCanvasWrap{background:#fff;border:1px solid #cbd5e1;border-radius:12px;padding:10px;overflow:auto}
#researchFocusCanvas{display:block;width:100%;height:520px;min-width:760px;border:1px solid #e5e7eb;background:#fff}
.researchFocusMeta{display:flex;gap:7px;flex-wrap:wrap}.researchFocusMeta .badge{background:#fff}
.researchPerfPanel{display:none;position:absolute;right:12px;top:54px;z-index:12001;width:min(580px,92vw);max-height:70vh;overflow:auto;background:#fff;border:2px solid #111827;border-radius:12px;box-shadow:0 16px 40px rgba(0,0,0,.25);padding:10px}
.researchPerfPanel.open{display:block}.researchPerfRow{display:grid;grid-template-columns:1.4fr .7fr .7fr .7fr;gap:8px;padding:7px;border-bottom:1px solid #e5e7eb;font-size:12px}.researchPerfRow.head{font-weight:900;background:#f3f4f6;position:sticky;top:0}
@media(max-width:900px){.researchFocusControls{grid-template-columns:1fr}.researchFocusBox{width:99vw}.researchPerfPanel{position:fixed;left:2vw;right:2vw;top:10vh;width:96vw}}
'''
          if '/* Research Focus Lab: isolated speed, accuracy, and graph controls */' not in text:
              text = text.replace('</style>', css + '\n</style>', 1)

          js = r'''
/* Research Focus Lab: contained augmentation of the existing Research workspace. */
const researchFocusLab = (()=>{
  const resultCache = new Map();
  const latestByItem = new Map();
  const diagnostics = [];
  const MAX_CACHE = 24;
  let installed = false;

  function stable(value){
    if(value===null || typeof value!=='object') return JSON.stringify(value);
    if(Array.isArray(value)) return '['+value.map(stable).join(',')+']';
    return '{'+Object.keys(value).sort().map(k=>JSON.stringify(k)+':'+stable(value[k])).join(',')+'}';
  }
  function sourceStamp(){
    const pairs=[];
    try{
      (typeof allSourceKeys==='function'?allSourceKeys():[]).forEach(source=>{
        let rows=[];
        try{ rows=sourceRows(source)||[]; }catch(_){ rows=[]; }
        pairs.push(source+':'+rows.length);
      });
    }catch(_){ }
    const teamCount=Array.isArray(state?.teams)?state.teams.length:0;
    const repCount=state?.teamMap instanceof Map?state.teamMap.size:0;
    return pairs.sort().join('|')+'|teams:'+teamCount+'|reps:'+repCount;
  }
  function itemKey(item){
    const copy={...item};
    delete copy.collapsed; delete copy.cardSize; delete copy.renderedAt;
    return sourceStamp()+'::'+stable(copy);
  }
  function remember(key,value){
    if(resultCache.has(key)) resultCache.delete(key);
    resultCache.set(key,value);
    while(resultCache.size>MAX_CACHE) resultCache.delete(resultCache.keys().next().value);
  }
  function itemId(item){ return String(item?.id||item?.title||'research-item'); }
  function record(item,ms,hit,res,mode){
    latestByItem.set(itemId(item),res);
    diagnostics.unshift({title:item?.title||'Untitled',ms:Math.round(ms),hit:!!hit,groups:extractRows(res).length,mode:mode||'sync',at:new Date()});
    if(diagnostics.length>60) diagnostics.length=60;
    renderPerfPanel();
  }
  function clear(){ resultCache.clear(); latestByItem.clear(); diagnostics.length=0; renderPerfPanel(); }

  function wrapEvaluators(){
    if(typeof evaluateResearchItem==='function' && !evaluateResearchItem.__focusWrapped){
      const original=evaluateResearchItem;
      const wrapped=function(item){
        const key=itemKey(item), start=performance.now();
        if(resultCache.has(key)){ const value=resultCache.get(key); record(item,performance.now()-start,true,value,'sync'); return value; }
        const value=original.apply(this,arguments); remember(key,value); record(item,performance.now()-start,false,value,'sync'); return value;
      };
      wrapped.__focusWrapped=true; evaluateResearchItem=wrapped;
    }
    if(typeof evaluateResearchItemAsync==='function' && !evaluateResearchItemAsync.__focusWrapped){
      const originalAsync=evaluateResearchItemAsync;
      const wrappedAsync=async function(item){
        const key=itemKey(item), start=performance.now();
        if(resultCache.has(key)){ const value=resultCache.get(key); record(item,performance.now()-start,true,value,'async'); return value; }
        const value=await originalAsync.apply(this,arguments); remember(key,value); record(item,performance.now()-start,false,value,'async'); return value;
      };
      wrappedAsync.__focusWrapped=true; evaluateResearchItemAsync=wrappedAsync;
    }
  }

  function extractRows(res){
    if(!res) return [];
    for(const key of ['groups','rows','data','results','groupList']) if(Array.isArray(res[key])) return res[key];
    return [];
  }
  function groupLabel(row,index){
    for(const key of ['group','label','name','key','groupLabel','category','xLabel']) if(row?.[key]!==undefined && row[key]!==null) return String(row[key]);
    const first=Object.entries(row||{}).find(([,v])=>typeof v==='string' && v.trim());
    return first?String(first[1]):`Group ${index+1}`;
  }
  function numericKeys(rows){
    const scores=new Map();
    rows.slice(0,500).forEach(row=>Object.entries(row||{}).forEach(([k,v])=>{
      const n=typeof v==='number'?v:Number(String(v??'').replace(/[,$%]/g,''));
      if(Number.isFinite(n)) scores.set(k,(scores.get(k)||0)+1);
    }));
    return [...scores.entries()].filter(([,n])=>n>=Math.max(1,Math.min(4,rows.length))).sort((a,b)=>b[1]-a[1]).map(([k])=>k);
  }
  function numberValue(row,key){
    const raw=row?.[key];
    const n=typeof raw==='number'?raw:Number(String(raw??'').replace(/[,$%]/g,''));
    return Number.isFinite(n)?n:null;
  }
  function currentItems(){
    try{return typeof currentResearchItemsNormalized==='function'?currentResearchItemsNormalized():(state.researchItems||[]);}catch(_){return state.researchItems||[];}
  }
  function ensureResult(item){
    const id=itemId(item);
    if(latestByItem.has(id)) return latestByItem.get(id);
    const res=evaluateResearchItem(item);
    latestByItem.set(id,res);
    return res;
  }

  function ensureUI(){
    wrapEvaluators();
    const toolbar=document.querySelector('#researchModal .researchToolbar');
    if(!toolbar) return;
    if(!document.getElementById('researchFocusLabBtn')){
      const focus=document.createElement('button'); focus.id='researchFocusLabBtn'; focus.className='smallBtn researchFocusLabBtn'; focus.textContent='Focused Graph'; focus.onclick=openFocus;
      const perf=document.createElement('button'); perf.id='researchPerfBtn'; perf.className='smallBtn researchPerfBtn'; perf.textContent='Performance'; perf.onclick=togglePerf;
      const clearBtn=document.createElement('button'); clearBtn.id='researchCacheClearBtn'; clearBtn.className='smallBtn gray'; clearBtn.textContent='Clear Research Cache'; clearBtn.onclick=()=>{clear(); alert('Research calculation and graph caches cleared.');};
      toolbar.append(focus,perf,clearBtn);
    }
    if(!document.getElementById('researchFocusOverlay')) document.body.insertAdjacentHTML('beforeend',focusMarkup());
    if(!document.getElementById('researchPerfPanel')) toolbar.insertAdjacentHTML('beforeend','<div id="researchPerfPanel" class="researchPerfPanel"></div>');
    bindFocusUI(); renderPerfPanel();
  }

  function focusMarkup(){return `
  <div id="researchFocusOverlay" class="researchFocusOverlay">
    <div class="researchFocusBox">
      <div class="researchFocusHead"><strong>Focused Graph Builder</strong><button id="researchFocusClose" class="smallBtn gray">Close</button></div>
      <div class="researchFocusBody">
        <div class="researchFocusControls">
          <div class="field"><label>Saved research result</label><select id="researchFocusItem"></select></div>
          <div class="field"><label>Chart type</label><select id="researchFocusType"><option value="bar">Bar</option><option value="line">Line</option><option value="scatter">Scatter</option></select></div>
          <div class="field"><label>Group contains</label><input id="researchFocusFilter" placeholder="Blank = all groups"></div>
          <div class="field"><label>Maximum groups</label><input id="researchFocusTop" type="number" min="1" max="250" value="30"></div>
        </div>
        <div class="researchFocusControls">
          <div class="field"><label>Sort groups</label><select id="researchFocusSort"><option value="original">Original result order</option><option value="desc">Highest first</option><option value="asc">Lowest first</option><option value="label">Group name</option></select></div>
          <div class="field"><label>Scatter X variable</label><select id="researchFocusX"></select></div>
          <div class="field"><label>Missing numeric values</label><select id="researchFocusMissing"><option value="skip">Skip missing points</option><option value="zero">Treat as zero</option></select></div>
          <div class="field"><label>Graph actions</label><div class="row"><button id="researchFocusRender" class="smallBtn green">Render</button><button id="researchFocusPng" class="smallBtn dark">Export PNG</button></div></div>
        </div>
        <div><strong>Y variables</strong><div id="researchFocusVariables" class="researchFocusVariableGrid"></div></div>
        <div id="researchFocusMeta" class="researchFocusMeta"></div>
        <div class="researchFocusCanvasWrap"><canvas id="researchFocusCanvas" width="1400" height="720"></canvas></div>
      </div>
    </div>
  </div>`;}

  function bindFocusUI(){
    const close=document.getElementById('researchFocusClose'); if(close) close.onclick=()=>document.getElementById('researchFocusOverlay')?.classList.remove('open');
    const item=document.getElementById('researchFocusItem'); if(item && !item.dataset.bound){ item.dataset.bound='1'; item.onchange=populateVariables; }
    const render=document.getElementById('researchFocusRender'); if(render) render.onclick=drawFocus;
    const png=document.getElementById('researchFocusPng'); if(png) png.onclick=()=>{ const c=document.getElementById('researchFocusCanvas'); if(!c)return; const a=document.createElement('a'); a.download='focused-research-graph.png'; a.href=c.toDataURL('image/png'); a.click(); };
  }
  function openFocus(){
    ensureUI();
    const items=currentItems(), sel=document.getElementById('researchFocusItem');
    sel.innerHTML=items.map(i=>`<option value="${String(i.id).replace(/"/g,'&quot;')}">${String(i.title||'Untitled').replace(/</g,'&lt;')}</option>`).join('');
    document.getElementById('researchFocusOverlay').classList.add('open');
    populateVariables();
  }
  function selectedItem(){ const id=document.getElementById('researchFocusItem')?.value; return currentItems().find(i=>String(i.id)===String(id))||currentItems()[0]; }
  function populateVariables(){
    const item=selectedItem(); if(!item)return;
    const res=ensureResult(item), rows=extractRows(res), keys=numericKeys(rows), wrap=document.getElementById('researchFocusVariables'), x=document.getElementById('researchFocusX');
    wrap.innerHTML=keys.map((k,i)=>`<label class="researchFocusVariable"><input type="checkbox" value="${k.replace(/"/g,'&quot;')}" ${i<Math.min(3,keys.length)?'checked':''}> ${k.replace(/</g,'&lt;')}</label>`).join('')||'<div class="researchWarn">No numeric result columns were found.</div>';
    x.innerHTML=keys.map(k=>`<option value="${k.replace(/"/g,'&quot;')}">${k.replace(/</g,'&lt;')}</option>`).join('');
    drawFocus();
  }
  function selectedY(){ return [...document.querySelectorAll('#researchFocusVariables input:checked')].map(x=>x.value); }
  function palette(i){ return ['#991b1b','#1d4ed8','#15803d','#b45309','#7e22ce','#0f766e','#be123c','#334155'][i%8]; }
  function drawFocus(){
    const item=selectedItem(); if(!item)return;
    const started=performance.now(), res=ensureResult(item), allRows=extractRows(res), query=(document.getElementById('researchFocusFilter')?.value||'').trim().toLowerCase();
    let rows=allRows.map((row,index)=>({row,label:groupLabel(row,index)})).filter(x=>!query||x.label.toLowerCase().includes(query));
    const ys=selectedY(), xKey=document.getElementById('researchFocusX')?.value, type=document.getElementById('researchFocusType')?.value||'bar', missing=document.getElementById('researchFocusMissing')?.value||'skip';
    const sort=document.getElementById('researchFocusSort')?.value||'original', primary=ys[0];
    if(sort==='label') rows.sort((a,b)=>a.label.localeCompare(b.label));
    if((sort==='asc'||sort==='desc')&&primary) rows.sort((a,b)=>((numberValue(a.row,primary)??-Infinity)-(numberValue(b.row,primary)??-Infinity))*(sort==='asc'?1:-1));
    rows=rows.slice(0,Math.max(1,Math.min(250,Number(document.getElementById('researchFocusTop')?.value)||30)));
    const canvas=document.getElementById('researchFocusCanvas'), ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#111827';ctx.font='bold 24px Arial';ctx.fillText(item.title||'Focused research graph',70,40);
    if(!rows.length||!ys.length){ctx.font='18px Arial';ctx.fillText('Choose at least one numeric variable and a matching group.',70,90);return;}
    const L=90,R=35,T=75,B=150,W=canvas.width-L-R,H=canvas.height-T-B;
    const values=[]; rows.forEach(x=>ys.forEach(k=>{const n=numberValue(x.row,k);if(n!==null)values.push(n);else if(missing==='zero')values.push(0);}));
    if(type==='scatter'){ rows.forEach(x=>{const n=numberValue(x.row,xKey);if(n!==null)values.push(n);}); }
    let min=Math.min(0,...values), max=Math.max(0,...values); if(!Number.isFinite(min)||!Number.isFinite(max)||min===max){min=0;max=1;} const pad=(max-min)*.08||1; min-=pad;max+=pad;
    ctx.strokeStyle='#94a3b8';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(L,T);ctx.lineTo(L,T+H);ctx.lineTo(L+W,T+H);ctx.stroke();
    ctx.font='12px Arial';ctx.fillStyle='#475569'; for(let i=0;i<=5;i++){const v=min+(max-min)*i/5,y=T+H-H*i/5;ctx.fillText(v.toFixed(1),10,y+4);ctx.strokeStyle='#e5e7eb';ctx.beginPath();ctx.moveTo(L,y);ctx.lineTo(L+W,y);ctx.stroke();}
    const yPix=v=>T+H-(v-min)/(max-min)*H;
    if(type==='scatter'){
      const xVals=rows.map(x=>numberValue(x.row,xKey)).filter(Number.isFinite), xmin=Math.min(...xVals), xmax=Math.max(...xVals), xr=(xmax-xmin)||1;
      ys.forEach((k,si)=>{ctx.fillStyle=palette(si);rows.forEach(x=>{let xv=numberValue(x.row,xKey),yv=numberValue(x.row,k);if(missing==='zero'){xv=xv??0;yv=yv??0;}if(xv===null||yv===null)return;const px=L+(xv-xmin)/xr*W,py=yPix(yv);ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();});});
    }else{
      const groupW=W/Math.max(1,rows.length), seriesW=Math.max(2,groupW/Math.max(1,ys.length));
      ys.forEach((k,si)=>{ctx.strokeStyle=palette(si);ctx.fillStyle=palette(si);ctx.lineWidth=3;ctx.beginPath();let began=False;
      });
      if(type==='bar'){
        rows.forEach((x,gi)=>ys.forEach((k,si)=>{let v=numberValue(x.row,k);if(v===null&&missing==='zero')v=0;if(v===null)return;const x0=L+gi*groupW+si*seriesW+2,y0=yPix(Math.max(0,v)),base=yPix(Math.min(0,v));ctx.fillStyle=palette(si);ctx.fillRect(x0,Math.min(y0,base),Math.max(1,seriesW-4),Math.max(1,Math.abs(base-y0)));}));
      }else{
        ys.forEach((k,si)=>{ctx.strokeStyle=palette(si);ctx.fillStyle=palette(si);ctx.lineWidth=3;ctx.beginPath();let began=false;rows.forEach((x,gi)=>{let v=numberValue(x.row,k);if(v===null&&missing==='zero')v=0;if(v===null)return;const px=L+(gi+.5)*groupW,py=yPix(v);if(!began){ctx.moveTo(px,py);began=true;}else ctx.lineTo(px,py);});ctx.stroke();rows.forEach((x,gi)=>{let v=numberValue(x.row,k);if(v===null&&missing==='zero')v=0;if(v===null)return;ctx.beginPath();ctx.arc(L+(gi+.5)*groupW,yPix(v),4,0,Math.PI*2);ctx.fill();});});
      }
      ctx.save();ctx.translate(L,T+H+10);ctx.rotate(-Math.PI/3);ctx.fillStyle='#334155';ctx.font='11px Arial';rows.forEach((x,gi)=>ctx.fillText(x.label.slice(0,34),-gi*groupW,gi*groupW));ctx.restore();
    }
    ctx.font='bold 13px Arial';ys.forEach((k,i)=>{ctx.fillStyle=palette(i);ctx.fillRect(L+i*180,T+H+112,13,13);ctx.fillStyle='#111827';ctx.fillText(k,L+18+i*180,T+H+123);});
    const meta=document.getElementById('researchFocusMeta'); const omitted=Math.max(0,allRows.length-rows.length); meta.innerHTML=`<span class="badge">${rows.length} shown</span><span class="badge">${allRows.length} result groups</span><span class="badge">${omitted} filtered/limited</span><span class="badge">${Math.round(performance.now()-started)} ms graph render</span><span class="badge">Population: ${item.population||item.analysisGrain||'configured result grain'}</span><span class="badge">Source: ${item.source||'configured source'}</span>`;
  }
  function togglePerf(){ const p=document.getElementById('researchPerfPanel'); if(p){p.classList.toggle('open');renderPerfPanel();} }
  function renderPerfPanel(){
    const p=document.getElementById('researchPerfPanel'); if(!p)return;
    p.innerHTML='<div class="row" style="justify-content:space-between"><strong>Research execution diagnostics</strong><button class="smallBtn gray" id="researchPerfClose">Close</button></div><div class="researchPerfRow head"><span>Item</span><span>Compute</span><span>Cache</span><span>Groups</span></div>'+diagnostics.map(d=>`<div class="researchPerfRow"><span>${String(d.title).replace(/</g,'&lt;')}</span><span>${d.ms} ms</span><span>${d.hit?'Hit':'New'}</span><span>${d.groups}</span></div>`).join('')+(diagnostics.length?'':'<div class="researchWarn">Run a research item to populate diagnostics.</div>');
    const close=document.getElementById('researchPerfClose');if(close)close.onclick=()=>p.classList.remove('open');
  }
  function install(){ if(installed)return; installed=true; wrapEvaluators(); const observer=new MutationObserver(ensureUI); observer.observe(document.body,{childList:true,subtree:true}); setTimeout(ensureUI,0); }
  return {install,clear,ensureUI};
})();
researchFocusLab.install();
'''
          # Repair one Python-style token embedded in the JS safety scaffold before insertion.
          js = js.replace('let began=False;', 'let began=false;')

          marker = 'loadModels(); loadResearchItems(); loadMetrics(); loadOrgs(); wire();'
          if '/* Research Focus Lab: contained augmentation' not in text:
              if marker not in text:
                  raise SystemExit('Expected Academy initialization marker was not found; no file was changed.')
              text = text.replace(marker, js + '\n' + marker, 1)

          out = Path('Academy_Research_Focused_Optimized.txt')
          out.write_text(text, encoding='utf-8')
          print(f'Wrote {out} ({out.stat().st_size:,} bytes)')

      - name: Basic structural checks
        shell: bash
        run: |
          grep -q "Research Focus Lab" Academy_Research_Focused_Optimized.txt
          grep -q "Focused Graph Builder" Academy_Research_Focused_Optimized.txt
          grep -q "loadModels(); loadResearchItems(); loadMetrics(); loadOrgs(); wire();" Academy_Research_Focused_Optimized.txt
          test "$(grep -c '<!doctype html>' Academy_Research_Focused_Optimized.txt)" -eq 1
          test "$(grep -c '</html>' Academy_Research_Focused_Optimized.txt)" -eq 1
          wc -l -c Academy_Research_Focused_Optimized.txt

      - name: Upload complete TXT file
        uses: actions/upload-artifact@v4
        with:
          name: Academy_Research_Focused_Optimized
          path: Academy_Research_Focused_Optimized.txt
          if-no-files-found: error
          retention-days: 7
