name: Apply Turncraft upgrade

on:
  push:
    branches:
      - agent/turncraft-objectives-fog-creep-orders
    paths:
      - tools/turncraft_patch/**
      - .github/workflows/apply-turncraft-upgrade.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out upgrade branch
        uses: actions/checkout@v4
        with:
          ref: agent/turncraft-objectives-fog-creep-orders

      - name: Rebuild and verify patch program
        shell: bash
        run: |
          cat tools/turncraft_patch/part_*.b64 > /tmp/turncraft_patch.b64
          base64 --decode /tmp/turncraft_patch.b64 | gzip --decompress > /tmp/turncraft_patch.py
          python -m py_compile /tmp/turncraft_patch.py

      - name: Apply checked replacements to complete game
        run: python /tmp/turncraft_patch.py

      - name: Validate complete HTML and JavaScript
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('game/turncraft.html')
          source = path.read_text(encoding='utf-8')
          assert source.count('<!DOCTYPE html>') == 1
          assert source.rstrip().endswith('</html>')
          assert source.count('\n') + 1 > 850
          for marker in (
              'objectiveSelect',
              "name:'Bunker'",
              'function rebuildVisionMaps',
              'function rebuildCreep',
              'function updatePersistentOrders',
              'function updatePendingHits',
              'function updateObjectives',
              'function drawFog',
          ):
              assert marker in source, marker
          match = re.search(r'<script type="module">(.*?)</script>', source, re.S)
          assert match
          javascript = re.sub(r'^import .*?;$', '', match.group(1), flags=re.M)
          Path('/tmp/turncraft.mjs').write_text(javascript, encoding='utf-8')
          print(f'Validated {len(source):,} characters and {source.count(chr(10)) + 1:,} lines')
          PY
          node --check /tmp/turncraft.mjs

      - name: Commit upgraded Turncraft game
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add game/turncraft.html
          if git diff --cached --quiet; then
            echo 'No changes were produced.'
          else
            git commit -m 'Add Turncraft objectives, fog, creep, and persistent orders'
            git push origin HEAD:agent/turncraft-objectives-fog-creep-orders
          fi
