name: Apply Chess Isometric Update

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-chess-isometric.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply prepared patch
        run: |
          git apply --check .github/chess_isometric.patch
          git apply .