name: Apply Chess Isometric Update

on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == 'apply-chess-isometric-update'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply prepared patch
        run: |
          git apply --check .github/chess_isometric.patch
          git apply .github/chess_isometric.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add game/chess_warlord.html
          git commit -m "Add isometric chess graphics and resilient pregame loading"
          git push origin main

      - name: Close trigger issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });