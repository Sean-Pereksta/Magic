name: Apply Crown Council troop graphics

on:
  push:
    branches: [agent/crown-council-troop-graphics]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crown-council-graphics-patch
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/crown-council-troop-graphics
          fetch-depth: 0
      - name: Apply focused patch
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/patch_crowncouncil_assets.py 2>&1 | tee crowncouncil-patch.log
      - name: Commit result or diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- game/crowncouncil.html; then
            git add game/crowncouncil.html
            git commit -m "Use Faction Forge troop graphics in Crown Council"
          elif [ "${{ steps.apply.outcome }}" != "success" ]; then
            git add -f crowncouncil-patch.log
            git commit -m "Capture Crown Council patch diagnostics"
          else
            echo "No patch changes needed."
            exit 0
          fi
          git fetch origin agent/crown-council-troop-graphics
          git push --force-with-lease=refs/heads/agent/crown-council-troop-graphics:refs/remotes/origin/agent/crown-council-troop-graphics origin HEAD:agent/crown-council-troop-graphics
