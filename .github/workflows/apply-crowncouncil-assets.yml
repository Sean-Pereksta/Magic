name: Apply Crown Council troop graphics

on:
  push:
    branches:
      - agent/crown-council-troop-graphics
    paths:
      - scripts/patch_crowncouncil_assets.py
      - .github/workflows/apply-crowncouncil-assets.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/crown-council-troop-graphics
      - name: Apply focused patch
        run: python scripts/patch_crowncouncil_assets.py
      - name: Commit updated game file
        run: |
          if git diff --quiet -- game/crowncouncil.html; then
            echo "No patch changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add game/crowncouncil.html
          git commit -m "Use Faction Forge troop graphics in Crown Council"
          git push origin HEAD:agent/crown-council-troop-graphics
