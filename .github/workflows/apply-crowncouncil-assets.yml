name: Apply Crown Council troop graphics

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/crown-council-troop-graphics
          fetch-depth: 1
      - name: Apply focused patch
        run: python scripts/patch_crowncouncil_assets.py
      - name: Write updated HTML to branch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          CURRENT_SHA=$(gh api repos/${{ github.repository }}/contents/game/crowncouncil.html?ref=agent/crown-council-troop-graphics --jq .sha)
          CONTENT=$(base64 -w0 game/crowncouncil.html)
          gh api --method PUT repos/${{ github.repository }}/contents/game/crowncouncil.html \
            -f message='Use Faction Forge troop graphics in Crown Council' \
            -f branch='agent/crown-council-troop-graphics' \
            -f sha="$CURRENT_SHA" \
            -f content="$CONTENT"
