name: Apply Crown Council troop graphics

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/crown-council-troop-graphics
          fetch-depth: 1
      - name: Normalize patch anchors and validation
        shell: bash
        run: |
          sed -i 's/[[:space:]]\+$//' scripts/patch_crowncouncil_assets.py
          python - <<'PY'
          from pathlib import Path
          p=Path('scripts/patch_crowncouncil_assets.py')
          s=p.read_text()
          s=s.replace("if len(keys)!=26: raise RuntimeError('expected 26 image mappings, got '+str(len(keys)))", "if s.count('../graphics/factionforge/')!=26: raise RuntimeError('expected 26 image mappings')")
          p.write_text(s)
          PY
      - name: Apply focused patch
        run: python scripts/patch_crowncouncil_assets.py
      - name: Write updated HTML through API
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          CURRENT_SHA=$(gh api repos/${{ github.repository }}/contents/game/crowncouncil.html?ref=agent/crown-council-troop-graphics --jq .sha)
          python - "$CURRENT_SHA" <<'PY'
          import base64,json,sys
          from pathlib import Path
          payload={
            "message":"Use Faction Forge troop graphics in Crown Council",
            "branch":"agent/crown-council-troop-graphics",
            "sha":sys.argv[1],
            "content":base64.b64encode(Path("game/crowncouncil.html").read_bytes()).decode()
          }
          Path("update-payload.json").write_text(json.dumps(payload))
          PY
          gh api --method PUT repos/${{ github.repository }}/contents/game/crowncouncil.html --input update-payload.json
