name: Run Academy Research Artifact on PR

on:
  pull_request:
    branches:
      - agent/academy-research-workflow-base

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Execute contained Academy patch script
        shell: python
        continue-on-error: true
        run: |
          from pathlib import Path
          import textwrap, traceback
          try:
              workflow = Path('.github/workflows/build-academy-research-optimized.yml').read_text(encoding='utf-8')
              anchor = workflow.index('      - name: Patch Academy Research workspace only')
              start = workflow.index('        run: |\n', anchor) + len('        run: |\n')
              end = workflow.index('\n      - name: Basic structural checks', start)
              block = workflow[start:end]
              code = textwrap.dedent(block)
              Path('extracted_academy_patch.py').write_text(code, encoding='utf-8')
              exec(compile(code, 'extracted_academy_patch.py', 'exec'), {})
          except Exception:
              details = traceback.format_exc()
              print(details)
              Path('academy_patch_failure.txt').write_text(details, encoding='utf-8')
      - name: Basic structural checks
        id: checks
        continue-on-error: true
        shell: bash
        run: |
          test -f Academy_Research_Focused_Optimized.txt
          grep -q "Research Focus Lab" Academy_Research_Focused_Optimized.txt
          grep -q "Focused Graph Builder" Academy_Research_Focused_Optimized.txt
          grep -q "loadModels(); loadResearchItems(); loadMetrics(); loadOrgs(); wire();" Academy_Research_Focused_Optimized.txt
          test "$(grep -c '<!doctype html>' Academy_Research_Focused_Optimized.txt)" -eq 1
          test "$(grep -c '</html>' Academy_Research_Focused_Optimized.txt)" -eq 1
          wc -l -c Academy_Research_Focused_Optimized.txt
      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Academy_Research_Focused_Optimized
          path: |
            Academy_Research_Focused_Optimized.txt
            academy_patch_failure.txt
            extracted_academy_patch.py
          if-no-files-found: error
          retention-days: 7
      - name: Fail when TXT was not produced
        if: always()
        shell: bash
        run: test -f Academy_Research_Focused_Optimized.txt
