name: Export Current Academy Source

on:
  pull_request:
    branches:
      - agent/academy-research-workflow-base

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package current Academy source
        shell: bash
        run: |
          cp game/Academy.html Academy_Current_Source.txt
          wc -l -c Academy_Current_Source.txt
      - name: Upload exact source
        uses: actions/upload-artifact@v4
        with:
          name: Academy_Current_Source
          path: Academy_Current_Source.txt
          if-no-files-found: error
          retention-days: 7
