<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Loading Magic Realms…</title>
  <style>html,body{margin:0;min-height:100%;display:grid;place-items:center;background:#0d120d;color:#f7efd6;font-family:Segoe UI,Arial,sans-serif}.box{text-align:center;padding:24px}.spin{font-size:38px;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style>
</head>
<body>
  <div class="box"><div class="spin">✦</div><h2>Loading Magic Realms…</h2><p>Preparing card graphics.</p></div>
  <script>
  (async()=>{
    const target='./grassrealms_core.html'+location.search+location.hash;
    if(!('serviceWorker' in navigator)){ location.replace(target); return; }
    try{
      await navigator.serviceWorker.register('./magic-assets-sw.js',{scope:'./'});
      await navigator.serviceWorker.ready;
    }catch(error){ console.warn('Asset router unavailable:',error); }
    location.replace(target);
  })();
  </script>
</body>
</html>
