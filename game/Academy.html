<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cat vs Mouse Survival 3D</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0d1117;
    font-family: Arial, Helvetica, sans-serif;
  }
  canvas { display: block; }

  #ui {
    position: absolute;
    left: 8px;
    top: 8px;
    z-index: 20;
    background: rgba(0,0,0,0.58);
    color: #fff;
    padding: 8px 9px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 11px;
    line-height: 1.2;
    width: 340px;
    backdrop-filter: blur(4px);
  }
  #ui .topline {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 5px;
  }
  .pill {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    padding: 3px 7px;
    font-weight: bold;
  }
  #ui .title {
    color: #ffe978;
    font-weight: bold;
    font-size: 13px;
    margin-bottom: 5px;
  }
  #controls {
    opacity: 0.92;
    margin-bottom: 5px;
  }
  #catRow {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-bottom: 5px;
  }
  .catBtn {
    padding: 4px 5px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: #d6d6d6;
    font-size: 10px;
    font-weight: bold;
    text-align: center;
  }
  .catBtn.active {
    color: #101319;
    background: #88ff9d;
    border-color: #88ff9d;
  }
  #buildGrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 6px;
  }
  .buildItem {
    padding: 4px 5px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    min-height: 29px;
  }
  .buildItem.active {
    color: #0e1218;
    background: #8effa1;
    border-color: #8effa1;
    font-weight: bold;
  }
  .buildKey {
    color: #ffe978;
    font-weight: bold;
    margin-right: 4px;
  }
  .buildIcon {
    margin-right: 5px;
    font-size: 13px;
    display: inline-block;
    width: 14px;
    text-align: center;
    filter: drop-shadow(0 0 4px rgba(0,0,0,0.45));
  }

  #centerMsg {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,-50%);
    z-index: 25;
    color: white;
    font-size: 34px;
    font-weight: bold;
    text-align: center;
    pointer-events: none;
    text-shadow: 0 0 10px #000, 0 0 22px #000;
  }

  #bossBarWrap {
    position: absolute;
    left: 50%;
    top: 12px;
    transform: translateX(-50%);
    width: 420px;
    height: 20px;
    border-radius: 999px;
    overflow: hidden;
    background: rgba(0,0,0,0.58);
    border: 1px solid rgba(255,255,255,0.15);
    z-index: 21;
    display: none;
  }
  #bossBar {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg,#ff5858,#ff9b52);
  }
  #bossLabel {
    position: absolute;
    left: 50%;
    top: 13px;
    transform: translateX(-50%);
    z-index: 22;
    color: white;
    font-size: 12px;
    font-weight: bold;
    display: none;
    text-shadow: 0 0 8px #000;
  }
</style>
</head>
<body>
<div id="ui">
  <div class="title">Cat vs Mouse Survival 3D</div>
  <div class="topline">
    <div class="pill">Cheese: <span id="cheeseCount">0</span></div>
    <div class="pill">Servants: <span id="servantCount">0</span></div>
    <div class="pill">Time: <span id="timeCount">0.0</span>s</div>
  </div>
  <div id="controls">W forward · S backpedal · A/D turn · Space place</div>
  <div id="catRow">
    <div id="catExplore" class="catBtn active">1 Explore</div>
    <div id="catEco" class="catBtn">2 Economic</div>
    <div id="catDef" class="catBtn">3 Defensive</div>
    <div id="catAtk" class="catBtn">4 Attack</div>
  </div>
  <div id="buildGrid"></div>
</div>

<div id="bossBarWrap"><div id="bossBar"></div></div>
<div id="bossLabel">CAT BOSS</div>
<div id="centerMsg"></div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js";

// -------------------------------------------------
// CORE
// -------------------------------------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x95c7eb);
scene.fog = new THREE.Fog(0x95c7eb, 110, 300);

const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.1, 1200);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const clock = new THREE.Clock();
const keys = {};

let time = 0;
let gameOver = false;
let gameWon = false;
let cheese = 24;

const MAP_SIZE = 190;
const HALF_MAP = MAP_SIZE / 2;

const ui = {
  cheese: document.getElementById("cheeseCount"),
  servants: document.getElementById("servantCount"),
  time: document.getElementById("timeCount"),
  msg: document.getElementById("centerMsg"),
  bossWrap: document.getElementById("bossBarWrap"),
  bossBar: document.getElementById("bossBar"),
  bossLabel: document.getElementById("bossLabel"),
  buildGrid: document.getElementById("buildGrid"),
  catExplore: document.getElementById("catExplore"),
  catEco: document.getElementById("catEco"),
  catDef: document.getElementById("catDef"),
  catAtk: document.getElementById("catAtk"),
};

const obstacles = [];
const structures = [];
const cheeses = [];
const particles = [];
const projectiles = [];
const enemies = [];
const wildMice = [];
const servantMice = [];
const robots = [];
const repairBeams = [];

let cat = null;
let catSpawnTriggered = false;

// -------------------------------------------------
// BUILD CATEGORIES
// -------------------------------------------------
let currentCategory = 1;
let currentSelectionSlot = null;

const CATEGORY_BUILDS = {
  2: [
    { slot:5, name:"Cheese Factory", cost:5, type:"factory", hp:95, radius:2.5 },
    { slot:6, name:"Repair Fountain", cost:9, type:"fountain", hp:90, radius:2.0 },
    { slot:7, name:"Supply Nest", cost:6, type:"supplyNest", hp:78, radius:2.0 },
    { slot:8, name:"Beacon", cost:20, type:"beacon", hp:100, radius:2.1 },
    { slot:9, name:"Robo Facility", cost:12, type:"robo", hp:145, radius:2.6 },
    { slot:0, name:"Scout Post", cost:7, type:"scoutPost", hp:82, radius:2.0 }
  ],
  3: [
    { slot:5, name:"Cheese Wall", cost:3, type:"wall", hp:105, radius:2.1 },
    { slot:6, name:"Diamond Wall", cost:8, type:"diamondWall", hp:245, radius:2.5 },
    { slot:7, name:"Barrier Totem", cost:10, type:"barrierTotem", hp:88, radius:2.0 },
    { slot:8, name:"Brace Tower", cost:11, type:"braceTower", hp:125, radius:2.0 },
    { slot:9, name:"Repair Anchor", cost:9, type:"repairAnchor", hp:92, radius:2.0 },
    { slot:0, name:"Fort Plate", cost:8, type:"fortPlate", hp:115, radius:2.2 }
  ],
  4: [
    { slot:5, name:"Cheese Turret", cost:5, type:"turret", hp:90, radius:2.0 },
    { slot:6, name:"Cheese Cannon", cost:10, type:"cannon", hp:110, radius:2.2 },
    { slot:7, name:"Shard Launcher", cost:8, type:"shardLauncher", hp:84, radius:2.0 },
    { slot:8, name:"Zap Coil", cost:9, type:"zapCoil", hp:76, radius:1.9 },
    { slot:9, name:"Mortar Bloom", cost:12, type:"mortarBloom", hp:94, radius:2.1 },
    { slot:0, name:"Saw Blaster", cost:11, type:"sawBlaster", hp:96, radius:2.0 }
  ]
};
const BUILD_ICONS = {
  factory:"🧀", fountain:"💧", supplyNest:"📦", beacon:"📡", robo:"⚙️", scoutPost:"👁️",
  wall:"🧱", diamondWall:"💎", barrierTotem:"🛡️", braceTower:"🏛️", repairAnchor:"🔧", fortPlate:"🪙",
  turret:"🎯", cannon:"💥", shardLauncher:"🔱", zapCoil:"⚡", mortarBloom:"🌸", sawBlaster:"🪚"
};

function getSelectedBuildData() {
  if (currentCategory === 1 || currentSelectionSlot == null) return null;
  return CATEGORY_BUILDS[currentCategory].find(b => b.slot === currentSelectionSlot) || null;
}

function updateBuildUI() {
  ui.catExplore.classList.toggle("active", currentCategory === 1);
  ui.catEco.classList.toggle("active", currentCategory === 2);
  ui.catDef.classList.toggle("active", currentCategory === 3);
  ui.catAtk.classList.toggle("active", currentCategory === 4);

  ui.buildGrid.innerHTML = "";
  if (currentCategory === 1) {
    const items = [
      "Explore mode",
      "2 Economic",
      "3 Defensive",
      "4 Attack",
      "Then use 5 6 7 8 9 0",
      "Space places selected build"
    ];
    items.forEach((txt, i) => {
      const div = document.createElement("div");
      div.className = "buildItem" + (i === 0 ? " active" : "");
      div.textContent = txt;
      ui.buildGrid.appendChild(div);
    });
    return;
  }

  for (const b of CATEGORY_BUILDS[currentCategory]) {
    const div = document.createElement("div");
    div.className = "buildItem" + (currentSelectionSlot === b.slot ? " active" : "");
    const icon = BUILD_ICONS[b.type] || "•";
    div.innerHTML = `<span class="buildKey">${b.slot}</span><span class="buildIcon">${icon}</span>${b.name} (${b.cost})`;
    ui.buildGrid.appendChild(div);
  }
}
updateBuildUI();

// -------------------------------------------------
// HELPERS
// -------------------------------------------------
function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }
function rand(a,b){ return a + Math.random()*(b-a); }
function dist2(a,b){ return Math.hypot(a.x-b.x, a.z-b.z); }
function angleDiff(a,b){
  let d = b-a;
  while(d > Math.PI) d -= Math.PI*2;
  while(d < -Math.PI) d += Math.PI*2;
  return d;
}
function showCenter(text, dur=1.5){
  ui.msg.textContent = text;
  ui.msg.style.opacity = "1";
  setTimeout(() => {
    if (ui.msg.textContent === text) ui.msg.style.opacity = "0";
  }, dur * 1000);
}
function groundHeight(x,z){
  const a = Math.sin(x*0.041)*1.7;
  const b = Math.cos(z*0.036)*1.25;
  const c = Math.sin((x+z)*0.023)*1.8;
  const d = Math.cos((x-z)*0.016)*1.1;
  return a+b+c+d;
}

// -------------------------------------------------
// LIGHTING
// -------------------------------------------------
const hemi = new THREE.HemisphereLight(0xeaf8ff, 0x526942, 1.08);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xffffff, 1.35);
sun.position.set(65,95,35);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left = -180;
sun.shadow.camera.right = 180;
sun.shadow.camera.top = 180;
sun.shadow.camera.bottom = -180;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 400;
scene.add(sun);

// -------------------------------------------------
// WORLD
// -------------------------------------------------
function createGround(){
  const geo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, 180, 180);
  geo.rotateX(-Math.PI/2);
  const pos = geo.attributes.position;
  const colors = [];
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i), z = pos.getZ(i);
    const y = groundHeight(x,z);
    pos.setY(i, y);
    const shade = 0.25 + ((y + 6) / 14);
    colors.push(0.23 + shade*0.14, 0.40 + shade*0.24, 0.17 + shade*0.10);
  }
  geo.setAttribute("color", new THREE.Float32BufferAttribute(colors,3));
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:1 });
  const ground = new THREE.Mesh(geo, mat);
  ground.receiveShadow = true;
  scene.add(ground);
}
createGround();

function createRock(x,z,sx,sy,sz,color=0x6d7379){
  const geo = new THREE.DodecahedronGeometry(1,0);
  const mat = new THREE.MeshStandardMaterial({ color, roughness:1 });
  const m = new THREE.Mesh(geo, mat);
  m.scale.set(sx,sy,sz);
  m.position.set(x, groundHeight(x,z) + sy*0.7, z);
  m.castShadow = m.receiveShadow = true;
  scene.add(m);
  obstacles.push({ x,z,r:Math.max(sx,sz)*0.95, mesh:m });
}
function createCliff(x,z,sx,sy,sz){
  const geo = new THREE.BoxGeometry(sx,sy,sz);
  const mat = new THREE.MeshStandardMaterial({ color:0x726a56, roughness:1 });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, groundHeight(x,z) + sy/2, z);
  m.castShadow = m.receiveShadow = true;
  scene.add(m);
  obstacles.push({ x,z,r:Math.max(sx,sz)*0.56, mesh:m });
}
function createBush(x,z){
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color:0x4d8f39, roughness:1 });
  for(let i=0;i<4;i++){
    const b = new THREE.Mesh(new THREE.SphereGeometry(rand(0.5,0.9),10,8), mat);
    b.position.set(rand(-0.5,0.5), rand(0.35,0.8), rand(-0.5,0.5));
    g.add(b);
  }
  g.position.set(x, groundHeight(x,z), z);
  g.traverse(c=>{ if(c.isMesh){ c.castShadow = true; c.receiveShadow = true; } });
  scene.add(g);
}
function createFlower(x,z){
  const g = new THREE.Group();
  const stem = new THREE.Mesh(
    new THREE.CylinderGeometry(0.02,0.03,0.5,6),
    new THREE.MeshStandardMaterial({ color:0x3d8d35 })
  );
  stem.position.y = 0.25;
  g.add(stem);

  const petalMat = new THREE.MeshStandardMaterial({ color:Math.random()<0.5?0xffb0d0:0xffef8e });
  for(let i=0;i<5;i++){
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6), petalMat);
    const a = i/5 * Math.PI*2;
    p.position.set(Math.sin(a)*0.08, 0.52, Math.cos(a)*0.08);
    g.add(p);
  }
  const center = new THREE.Mesh(new THREE.SphereGeometry(0.05,6,6), new THREE.MeshStandardMaterial({ color:0xffa92d }));
  center.position.y = 0.52;
  g.add(center);

  g.position.set(x, groundHeight(x,z), z);
  scene.add(g);
}
function createTree(x,z){
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35,0.48,3.2,8),
    new THREE.MeshStandardMaterial({ color:0x6c4426 })
  );
  const leaf = new THREE.Mesh(
    new THREE.ConeGeometry(2.2,5.0,10),
    new THREE.MeshStandardMaterial({ color:0x3d7d35 })
  );
  const y = groundHeight(x,z);
  trunk.position.set(x,y+1.6,z);
  leaf.position.set(x,y+5.4,z);
  trunk.castShadow = leaf.castShadow = true;
  trunk.receiveShadow = leaf.receiveShadow = true;
  scene.add(trunk,leaf);
}
for(let i=0;i<30;i++){
  const x = rand(-HALF_MAP+12, HALF_MAP-12);
  const z = rand(-HALF_MAP+12, HALF_MAP-12);
  if(Math.hypot(x,z)<20) continue;
  if(Math.random()<0.55) createRock(x,z, rand(2.4,5.7), rand(2.4,5.8), rand(2.4,5.7));
  else createCliff(x,z, rand(6,12), rand(4.5,10), rand(5,12));
}
for(let i=0;i<90;i++){
  const x = rand(-HALF_MAP+8, HALF_MAP-8);
  const z = rand(-HALF_MAP+8, HALF_MAP-8);
  if(Math.hypot(x,z)<12) continue;
  if(Math.random()<0.55) createBush(x,z);
}
for(let i=0;i<160;i++){
  const x = rand(-HALF_MAP+6, HALF_MAP-6);
  const z = rand(-HALF_MAP+6, HALF_MAP-6);
  if(Math.hypot(x,z)<10) continue;
  if(Math.random()<0.35) createFlower(x,z);
}
for(let i=0;i<120;i++){
  const side = i % 4;
  let x=0,z=0;
  if(side===0){ x = -HALF_MAP+4+Math.random()*3; z = rand(-HALF_MAP, HALF_MAP); }
  if(side===1){ x = HALF_MAP-4-Math.random()*3; z = rand(-HALF_MAP, HALF_MAP); }
  if(side===2){ z = -HALF_MAP+4+Math.random()*3; x = rand(-HALF_MAP, HALF_MAP); }
  if(side===3){ z = HALF_MAP-4-Math.random()*3; x = rand(-HALF_MAP, HALF_MAP); }
  createTree(x,z);
}

function circleBlocked(x,z,r, ignoreStructure=null){
  if(x < -HALF_MAP+2 || x > HALF_MAP-2 || z < -HALF_MAP+2 || z > HALF_MAP-2) return true;
  for(const o of obstacles){
    if(Math.hypot(x-o.x, z-o.z) < r + o.r) return true;
  }
  for(const s of structures){
    if(s.dead || s===ignoreStructure) continue;
    if(Math.hypot(x-s.pos.x, z-s.pos.z) < r + s.radius) return true;
  }
  return false;
}
function lineBlocked(a,b){
  const dx = b.x-a.x, dz = b.z-a.z;
  const len = Math.hypot(dx,dz);
  const steps = Math.ceil(len/1.5);
  for(let i=1;i<steps;i++){
    const t = i/steps;
    const x = a.x + dx*t;
    const z = a.z + dz*t;
    for(const o of obstacles){
      if(Math.hypot(x-o.x, z-o.z) < o.r + 0.65) return true;
    }
    for(const s of structures){
      if(s.dead) continue;
      if(Math.hypot(x-s.pos.x, z-s.pos.z) < s.radius + 0.55) return true;
    }
  }
  return false;
}
function randomFreePosition(radius=1){
  for(let i=0;i<80;i++){
    const x = rand(-HALF_MAP+10, HALF_MAP-10);
    const z = rand(-HALF_MAP+10, HALF_MAP-10);
    if(!circleBlocked(x,z,radius)) return new THREE.Vector3(x, groundHeight(x,z), z);
  }
  return new THREE.Vector3(0, groundHeight(0,0), 0);
}

// -------------------------------------------------
// PARTICLES / FX
// -------------------------------------------------
function addBurst(x,y,z,color=0xffdd66,count=10,speed=4,life=0.6,size=0.1){
  const geo = new THREE.SphereGeometry(size,6,6);
  for(let i=0;i<count;i++){
    const m = new THREE.Mesh(
      geo,
      new THREE.MeshStandardMaterial({ color, emissive:color, emissiveIntensity:0.55 })
    );
    m.position.set(x,y,z);
    scene.add(m);
    particles.push({
      mesh:m,
      vel:new THREE.Vector3(rand(-1,1), rand(0.2,1.5), rand(-1,1)).normalize().multiplyScalar(speed*(0.55+Math.random()*0.7)),
      life, maxLife:life,
      kind:"burst"
    });
  }
}
function addCogParticle(x,y,z){
  const g = new THREE.Group();
  const mat = new THREE.MeshBasicMaterial({ color:0xcfefff, transparent:true, opacity:0.95 });
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.12,0.03,6,10), mat);
  g.add(ring);
  for(let i=0;i<6;i++){
    const tooth = new THREE.Mesh(new THREE.BoxGeometry(0.03,0.07,0.03), mat);
    const a = i/6 * Math.PI*2;
    tooth.position.set(Math.sin(a)*0.17, Math.cos(a)*0.17, 0);
    tooth.rotation.z = a;
    g.add(tooth);
  }
  g.position.set(x,y,z);
  scene.add(g);
  particles.push({
    mesh:g,
    vel:new THREE.Vector3(rand(-0.1,0.1), rand(0.5,1.0), rand(-0.1,0.1)),
    life:0.9,
    maxLife:0.9,
    spin:rand(-4,4),
    kind:"cog"
  });
}
function addBloodHit(x,y,z,intensity=1){
  const count = Math.floor(7 + intensity * 6);
  const geo = new THREE.SphereGeometry(0.08,6,6);
  for(let i=0;i<count;i++){
    const color = Math.random() < 0.55 ? 0x8a1d1d : 0xb83826;
    const m = new THREE.Mesh(
      geo,
      new THREE.MeshStandardMaterial({ color, emissive:color, emissiveIntensity:0.35, transparent:true, opacity:0.95 })
    );
    m.position.set(x,y,z);
    scene.add(m);
    particles.push({
      mesh:m,
      vel:new THREE.Vector3(rand(-1,1), rand(0.25,1.2), rand(-1,1)).normalize().multiplyScalar(rand(2.4,4.8) * (0.65 + intensity * 0.35)),
      life:rand(0.24,0.42),
      maxLife:0.42,
      kind:"blood"
    });
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.life -= dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    if (p.kind === "burst") {
      p.vel.y -= 7.5*dt;
      const s = Math.max(0.04, p.life / p.maxLife);
      p.mesh.scale.setScalar(s);
    } else if (p.kind === "blood") {
      p.vel.y -= 10.5 * dt;
      const s = Math.max(0.02, p.life / p.maxLife);
      p.mesh.scale.setScalar(s);
      if (p.mesh.material) p.mesh.material.opacity = clamp(p.life / p.maxLife, 0, 1);
    } else if (p.kind === "cog") {
      p.mesh.rotation.z += (p.spin || 2) * dt;
      p.mesh.scale.setScalar(0.6 + 0.5 * (p.life / p.maxLife));
      p.mesh.traverse(c => { if(c.material) c.material.opacity = p.life / p.maxLife; });
    }
    if(p.life <= 0){
      p.mesh.parent?.remove(p.mesh);
      particles.splice(i,1);
    }
  }
}

// -------------------------------------------------
// HEALTH BAR
// -------------------------------------------------
function createHealthBar(width=1.6, color=0xff5454){
  const g = new THREE.Group();
  const bg = new THREE.Mesh(
    new THREE.PlaneGeometry(width,0.16),
    new THREE.MeshBasicMaterial({ color:0x111111, transparent:true, opacity:0.88 })

function getSeparationVector(entity, list, desiredMinDist=1.8){
  const out = new THREE.Vector3();
  for (const other of list) {
    if (other === entity || other.dead) continue;
    const dx = entity.pos.x - other.pos.x;
    const dz = entity.pos.z - other.pos.z;
    const d = Math.hypot(dx, dz);
    if (d > 0.001 && d < desiredMinDist) {
      const push = (desiredMinDist - d) / desiredMinDist;
      out.x += (dx / d) * push;
      out.z += (dz / d) * push;
    }
  }
  return out;
}
function steerMove(entity, desired, dt, collideWithStructures=true, ignoreStructure=null, neighborList=null){
  const start = entity.pos;
  let best = null;
  let bestScore = Infinity;
  const baseHeading = Math.atan2(desired.x, desired.z);
  const speed = entity.speed;
  const radius = entity.radius;
  const offsets = [0, 0.22, -0.22, 0.45, -0.45, 0.75, -0.75, 1.05, -1.05, 1.35, -1.35, Math.PI*0.5, -Math.PI*0.5, Math.PI];

  for(const off of offsets){
    const heading = baseHeading + off;
    const dx = Math.sin(heading);
    const dz = Math.cos(heading);
    const nx = start.x + dx * speed * dt;
    const nz = start.z + dz * speed * dt;
    let blocked = false;

    if(nx < -HALF_MAP+2 || nx > HALF_MAP-2 || nz < -HALF_MAP+2 || nz > HALF_MAP-2) blocked = true;

    if(!blocked){
      for(const o of obstacles){
        if(Math.hypot(nx-o.x, nz-o.z) < radius + o.r){ blocked = true; break; }
      }
    }
    if(!blocked && collideWithStructures){
      for(const s of structures){
        if(s.dead || s===ignoreStructure) continue;
        if(Math.hypot(nx-s.pos.x, nz-s.pos.z) < radius + s.radius){
          blocked = true; break;
        }
      }
    }
    if(!blocked && neighborList){
      for (const other of neighborList) {
        if (other === entity || other.dead) continue;
        if (Math.hypot(nx-other.pos.x, nz-other.pos.z) < radius + other.radius * 0.72) {
          blocked = true; break;
        }
      }
    }
    if(blocked) continue;

    let score = Math.abs(off)*0.18;
    if (neighborList) {
      for (const other of neighborList) {
        if (other === entity || other.dead) continue;
        const d = Math.hypot(nx-other.pos.x, nz-other.pos.z);
        if (d < 2.0) score += (2.0 - d) * 0.85;
      }
    }
    if(score < bestScore){
      bestScore = score;
      best = { x:nx, z:nz, heading };
    }
  }
  return best;
}
function directSteerToward(entity, targetPos, dt, collideWithStructures=true, ignoreStructure=null, neighborList=null){
  const dx = targetPos.x - entity.pos.x;
  const dz = targetPos.z - entity.pos.z;
  const len = Math.hypot(dx,dz) || 1;
  const desired = { x:dx/len, z:dz/len };
  if (neighborList) {
    const sep = getSeparationVector(entity, neighborList, 1.75);
    desired.x += sep.x * 0.95;
    desired.z += sep.z * 0.95;
    const l2 = Math.hypot(desired.x, desired.z) || 1;
    desired.x /= l2;
    desired.z /= l2;
  }
  return steerMove(entity, desired, dt, collideWithStructures, ignoreStructure, neighborList);
}
function smoothAimYaw(pivot, holder, key, desiredYaw, dt, speed=8.5){
  if(!pivot) return;
  if(holder[key] == null) holder[key] = pivot.rotation.y;
  holder[key] += clamp(angleDiff(holder[key], desiredYaw), -speed * dt, speed * dt);
  pivot.rotation.y = holder[key];
}
function updateAgentStuck(entity, dt, hasTarget, onStuck){
  // AI tuning helper: general stuck detector with brief cooldown.
  if(!entity._stuck){
    entity._stuck = { x:entity.pos.x, z:entity.pos.z, still:0, cooldown:0 };
  }
  const s = entity._stuck;
  const moved = Math.hypot(entity.pos.x - s.x, entity.pos.z - s.z);
  s.cooldown = Math.max(0, s.cooldown - dt);
  if(hasTarget && moved < 0.05) s.still += dt;
  else s.still = Math.max(0, s.still - dt * 0.85);
  s.x = entity.pos.x; s.z = entity.pos.z;
  if(hasTarget && s.still > 0.62 && s.cooldown <= 0){
    s.still = 0;
    s.cooldown = 1.0;
    onStuck?.();
    return true;
  }
  return false;
}

  const a = Math.random() * Math.PI * 2;
  const r = rand(radius*0.35, radius);
  entity.repathTarget = new THREE.Vector3(centerPos.x + Math.sin(a)*r, 0, centerPos.z + Math.cos(a)*r);
  entity.repathTarget.y = groundHeight(entity.repathTarget.x, entity.repathTarget.z);
  entity.repathTimer = rand(0.4, 1.0);
}
function isLivingTarget(target){
  return !!target && !!target.isLiving && !target.dead && !target.dying;
}
function nearestAttackableStructure(origin, maxRange=999, filterFn=null){
  let best = null, bestD = maxRange;
  for(const s of structures){
    if(s.dead) continue;
    if(filterFn && !filterFn(s)) continue;
    const d = dist2(origin.pos || origin, s.pos);
    if(d < bestD){ bestD = d; best = s; }
  }
  return best;
}
function applyDamageToLiving(target, damage, hitPos=null){
  if(!isLivingTarget(target)) return;
  const src = hitPos || target.pos;
  addBloodHit(src.x, src.y + 0.8, src.z, clamp(damage/28, 0.5, 1.45));
  if(target === player){
    diePlayer();
    return;
  }
  target.hp -= damage;
  if(target.healthBar) setHealthBar(target.healthBar, target.hp / target.maxHp);
  if(target === cat){
    if(target.hp <= 0) killCat();
  } else if(target.kind){
    if(target.hp <= 0) killEnemy(target);
  } else if(target.state === "wild" || target.state === "servant"){
    if(target.hp <= 0) beginDeath(target, "mouse");
  }
}

function createStructure(type,x,z,rotationY=0, dataOverride=null){
  const data = dataOverride || Object.values(CATEGORY_BUILDS).flat().find(v=>v.type===type);
  const mesh = createStructureMesh(type);
  mesh.position.set(x, groundHeight(x,z), z);
  mesh.rotation.y = rotationY;
  scene.add(mesh);

  const s = {
    type,
    mesh,
    pos:mesh.position,
    radius:data.radius,
    hp:data.hp,
    maxHp:data.hp,
    dead:false,
    fireCd:0,
    produceCd:0,
    robotCd:0,
    healCd:0,
    trapCd:0,
    assignedServant:null,
    rotationY,
    isBeaconBuffed:false,
    target:null
  };
  structures.push(s);

  const color = structureColor(type);
  addBurst(x, mesh.position.y+1.0, z, color, 26, 5.8, 0.8, 0.09);
  for(let i=0;i<12;i++){
    addBurst(x + rand(-1.2,1.2), mesh.position.y+rand(0.3,2.1), z + rand(-0.6,0.6), 0xfff4a4, 1, 1.2, 0.4, 0.06);
  }
  return s;
}
function damageStructure(s,dmg){
  if(!s || s.dead) return;
  s.hp -= dmg;
  setHealthBar(s.mesh.userData.healthBar, s.hp/s.maxHp);
  addBurst(s.pos.x, s.pos.y+1.1, s.pos.z, 0xffca77, 5, 3, 0.28, 0.07);
  if(s.hp <= 0){
    s.dead = true;
    addBurst(s.pos.x, s.pos.y+1.3, s.pos.z, 0xff6655, 22, 6.3, 1.0, 0.12);
  }
}
function getBuildPlace(){
  const forward = new THREE.Vector3(Math.sin(player.heading),0,Math.cos(player.heading));
  const p = player.pos.clone().addScaledVector(forward, 4.2);
  p.y = groundHeight(p.x,p.z);
  return p;
}
function beaconBuffAt(x,z){
  let buff = { damage:1, speed:1, active:false };
  for(const s of structures){
    if(s.dead || s.type!=="beacon") continue;
    const d = Math.hypot(x-s.pos.x, z-s.pos.z);
    if(d < 13){
      buff.damage += 0.25;
      buff.speed += 0.2;
      buff.active = true;
    }
  }
  return buff;
}
function updateBeaconGlow(){
  for(const s of structures){
    if(s.dead || s.type === "beacon") continue;
    const buff = beaconBuffAt(s.pos.x, s.pos.z);
    s.isBeaconBuffed = buff.active;
    const glow = s.mesh.userData.beaconGlow;
    if(!glow) continue;
    if(buff.active){
      glow.visible = true;
      glow.material.opacity = 0.18 + Math.sin(time*4)*0.08;
      glow.scale.set(1.4 + Math.sin(time*3)*0.05, 1, 1.4 + Math.sin(time*3)*0.05);
      glow.material.color.set(0x86ffb2);
    } else {
      glow.visible = false;
    }
  }
}

function spawnProjectile(opts){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(opts.size ?? 0.18, 10, 10),
    new THREE.MeshStandardMaterial({ color:opts.color ?? 0xffdd66, emissive:opts.color ?? 0xffdd66, emissiveIntensity:0.45 })
  );
  mesh.position.copy(opts.pos);
  mesh.castShadow = true;
  scene.add(mesh);

  projectiles.push({
    mesh,
    pos:mesh.position,
    vel:opts.vel.clone(),
    life:opts.life ?? 4,
    damage:opts.damage ?? 8,
    splash:opts.splash ?? 0,
    from:opts.from ?? "ally",
    kind:opts.kind ?? "pellet",
    returnHits:opts.returnHits || false
  });
}
function explodeProjectile(p){
  addBurst(p.pos.x,p.pos.y,p.pos.z, p.from==="enemy"?0xff5555:0xffdd66, p.kind==="cannon"||p.kind==="mortar"?18:8, 4.5, 0.6, 0.09);

  if(p.from === "ally"){
    for(const e of enemies){
      if(e.dead || e.dying) continue;
      const d = dist2({x:p.pos.x,z:p.pos.z}, e.pos);
      if(d < 1 + p.splash){
        applyDamageToLiving(e, p.damage * (d < 0.5 ? 1 : Math.max(0.35, 1 - d/(p.splash+1))), p.pos);
      }
    }
    if(cat && !cat.dead && !cat.dying){
      const d = dist2({x:p.pos.x,z:p.pos.z}, cat.pos);
      if(d < 1.7 + p.splash){
        applyDamageToLiving(cat, p.damage * (d < 0.8 ? 1 : Math.max(0.35, 1 - d/(p.splash+1.7))), p.pos);
      }
    }
  }else{
    if(!player.dead && dist2({x:p.pos.x,z:p.pos.z}, player.pos) < 1.2 + p.splash) applyDamageToLiving(player, 999, p.pos);
    for(const m of servantMice){
      if(m.dead || m.dying) continue;
      if(dist2({x:p.pos.x,z:p.pos.z}, m.pos) < 1.0 + p.splash){
        applyDamageToLiving(m, p.damage, p.pos);
      }
    }
    for(const s of structures){
      if(s.dead) continue;
      const d = dist2({x:p.pos.x,z:p.pos.z}, s.pos);
      if(d < s.radius + p.splash) damageStructure(s, p.damage * Math.max(0.4, 1 - d/(s.radius+p.splash+0.01)));
    }
  }
}
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p = projectiles[i];
    p.life -= dt;
    p.vel.y -= 18*dt;
    p.pos.addScaledVector(p.vel, dt);

    const gy = groundHeight(p.pos.x,p.pos.z);
    if(p.pos.y <= gy+0.12){
      p.pos.y = gy+0.12;
      explodeProjectile(p);
      p.mesh.parent?.remove(p.mesh);
      projectiles.splice(i,1);
      continue;
    }

    if(p.from==="ally"){
      let hit = false;
      for(const e of enemies){
        if(e.dead || e.dying) continue;
        if(dist2(p.pos, e.pos) < e.radius + 0.35 && Math.abs(p.pos.y - (e.pos.y+0.8)) < 1.5){
          hit = true; break;
        }
      }
      if(cat && !cat.dead && !cat.dying && dist2(p.pos, cat.pos) < cat.radius + 0.5 && Math.abs(p.pos.y - (cat.pos.y+2)) < 2.6) hit = true;
      if(hit){
        explodeProjectile(p);
        p.mesh.parent?.remove(p.mesh);
        projectiles.splice(i,1);
        continue;
      }
    }else{
      if(!player.dead && dist2(p.pos, player.pos) < 0.9 && Math.abs(p.pos.y - (player.pos.y+0.7)) < 1.4){
        explodeProjectile(p);
        p.mesh.parent?.remove(p.mesh);
        projectiles.splice(i,1);
        continue;
      }
    }

    if(p.life <= 0){
      explodeProjectile(p);
      p.mesh.parent?.remove(p.mesh);
      projectiles.splice(i,1);
    }
  }
}

function ensureRepairBeam(structure) {
  if (structure.beam) return structure.beam;
  const mat = new THREE.MeshBasicMaterial({ color:0x8fe9ff, transparent:true, opacity:0.9 });
  const cyl = new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,1,8), mat);
  cyl.visible = false;
  scene.add(cyl);
  structure.beam = cyl;
  return cyl;
}
function hideRepairBeam(structure) {
  if (structure.beam) structure.beam.visible = false;
}

function beginDeath(entity, type="mouse"){
  if (entity.dying || entity.dead) return;
  if(entity.assignedFactory && entity.assignedFactory.assignedServant === entity){
    entity.assignedFactory.assignedServant = null;
  }
  entity.dying = true;
  entity.deathT = 0;
  entity.deathType = type;
  addBurst(entity.pos.x, entity.pos.y+0.8, entity.pos.z, type==="cat"?0xff7d44:0xff7777, 16, 4.5, 0.6, 0.08);
}
function finalizeDeath(entity) {
  entity.dead = true;
  entity.group.parent?.remove(entity.group);
}
function killEnemy(e){
  if(e.dead || e.dying) return;
  beginDeath(e, e.kind === "weasel" ? "weasel" : "mouse");
  if(Math.random() < 0.7) spawnCheeseAt(e.pos.x+rand(-0.8,0.8), e.pos.z+rand(-0.8,0.8), 3);
}
function killCat(){
  if(!cat || cat.dead || cat.dying) return;
  beginDeath(cat, "cat");
  ui.bossWrap.style.display = "none";
  ui.bossLabel.style.display = "none";
  setTimeout(() => {
    gameWon = true;
    ui.msg.textContent = "YOU WIN";
    ui.msg.style.opacity = "1";
  }, 500);
}

function spawnWildMouse(x,z){
  const g = makeMouseModel(0xbeb6ab,0xffbcc8,0xc78594);
  g.position.set(x, groundHeight(x,z), z);
  scene.add(g);
  wildMice.push({
    state:"wild",
    group:g,
    pos:g.position,
    radius:0.8,
    hp:26,
    maxHp:26,
    isLiving:true,
    heading:Math.random()*Math.PI*2,
    speed:4.0,
    target:null,
    dead:false,
    dying:false,
    anim:Math.random()*20,
    attackAnim:0,
    repairCd:0,
    assignedFactory:null,
    orbitAngle:Math.random()*Math.PI*2,
    deathT:0
  });
}
for(let i=0;i<4;i++){
  const p = randomFreePosition(1);
  spawnWildMouse(p.x,p.z);
}
let wildSpawnTimer = 0;

function recruitMouse(m){
  const i = wildMice.indexOf(m);
  if(i >= 0) wildMice.splice(i,1);
  servantMice.push(m);
  m.state = "servant";
  addBurst(m.pos.x, m.pos.y+0.9, m.pos.z, 0x8effa0, 16, 5, 0.75, 0.09);
  showCenter("A Mouse Joined You!", 1.1);
}
function updateMouseEntity(m,dt){
  if (m.dead) return;
  if (m.dying) {
    m.deathT += dt;
    m.group.rotation.z = clamp(m.deathT * 4, 0, Math.PI/2.2);
    m.group.position.y = groundHeight(m.pos.x,m.pos.z) - Math.min(0.4, m.deathT * 0.6);
    animateMouseRig(m.group, 0, m.anim, 0, clamp(m.deathT * 2, 0, 1));
    if (m.deathT > 0.45) finalizeDeath(m);
    return;
  }

  m.anim += dt;
  m.attackAnim = Math.max(0, m.attackAnim - dt*4);
  m.repathTimer = Math.max(0, (m.repathTimer || 0) - dt);

  if(m.state === "wild"){
    if(dist2(m.pos, player.pos) < 1.35){ recruitMouse(m); return; }
    if(!m.target || dist2(m.pos,m.target) < 1.3 || Math.random() < 0.018){
      const a = Math.random() * Math.PI * 2;
      const r = rand(3, 10);
      m.target = new THREE.Vector3(
        clamp(m.pos.x + Math.sin(a)*r, -HALF_MAP+6, HALF_MAP-6),
        0,
        clamp(m.pos.z + Math.cos(a)*r, -HALF_MAP+6, HALF_MAP-6)
      );
      m.target.y = groundHeight(m.target.x, m.target.z);
    }
  } else {
    let repairTarget = null;
    let bestRepair = 9999;
    for(const s of structures){
      if(s.dead || s.hp >= s.maxHp) continue;
      const d = dist2(m.pos,s.pos);
      if(d < bestRepair && d < 24){ bestRepair = d; repairTarget = s; }
    }

    if(repairTarget){
      m.target = repairTarget.pos;
      if(bestRepair < repairTarget.radius + 1.2){
        m.repairCd -= dt;
        m.attackAnim = 0.9;
        if(m.repairCd <= 0){
          m.repairCd = 0.5;
          repairTarget.hp = Math.min(repairTarget.maxHp, repairTarget.hp + 3.2);
          setHealthBar(repairTarget.mesh.userData.healthBar, repairTarget.hp/repairTarget.maxHp);
          addBurst(repairTarget.pos.x, repairTarget.pos.y+1.0, repairTarget.pos.z, 0x95ffb6, 4, 2.3, 0.3, 0.05);
        }
      }
    } else {
      let assignedFactory = null;
      for(const f of structures){
        if(f.dead || f.type!=="factory") continue;
        if(!f.assignedServant || f.assignedServant===m){ assignedFactory = f; break; }
      }

      if(assignedFactory){
        if(m.assignedFactory && m.assignedFactory !== assignedFactory && m.assignedFactory.assignedServant===m) m.assignedFactory.assignedServant = null;
        m.assignedFactory = assignedFactory;
        assignedFactory.assignedServant = m;
        m.target = assignedFactory.pos;
        if(dist2(m.pos,assignedFactory.pos) < 2.2) assignedFactory.produceCd -= dt*0.75;
      } else {
        if(m.assignedFactory && m.assignedFactory.assignedServant===m) m.assignedFactory.assignedServant = null;
        m.assignedFactory = null;

        let nearestCheese = null, best = 9999;
        for(const c of cheeses){
          const d = dist2(m.pos,c.pos);
          if(d < best){ best = d; nearestCheese = c; }
        }

        if(nearestCheese && best < 28){
          m.target = nearestCheese.pos;
        } else {
          m.orbitAngle += dt * 1.2;
          const orbitR = 3.4 + (Math.sin(m.anim*0.7 + m.orbitAngle) * 1.2);
          m.target = new THREE.Vector3(
            player.pos.x + Math.sin(m.orbitAngle + m.heading*0.25) * orbitR,
            0,
            player.pos.z + Math.cos(m.orbitAngle + m.heading*0.25) * orbitR
          );
          m.target.y = groundHeight(m.target.x, m.target.z);
        }
      }
    }

    for(let i=cheeses.length-1;i>=0;i--){
      const c = cheeses[i];
      if(dist2(m.pos,c.pos) < 1.15){
        cheese += c.amount;
        addBurst(c.pos.x,c.pos.y+0.3,c.pos.z,0xffec71,8,4,0.4,0.08);
        c.group.parent?.remove(c.group);
        cheeses.splice(i,1);
        break;
      }
    }
  }

  const moveTarget = (m.repathTimer > 0 && m.repathTarget) ? m.repathTarget : m.target;
  if(moveTarget){
    const mouseNeighbors = m.state === "servant" ? servantMice : wildMice;
    const step = directSteerToward({ pos:m.pos, speed:m.speed, radius:m.radius }, moveTarget, dt, false, null, mouseNeighbors);
    if(step){
      m.heading += clamp(angleDiff(m.heading, step.heading), -4.4*dt, 4.4*dt);
      m.pos.x = step.x;
      m.pos.z = step.z;
    }
  }
  updateAgentStuck(m, dt, !!moveTarget, ()=>{
    setRepathPoint(m, m.state === "servant" ? player.pos : m.pos, m.state === "servant" ? 5.2 : 6.5);
    if(m.state === "wild") m.target = m.repathTarget.clone();
  });

  m.pos.y = groundHeight(m.pos.x,m.pos.z);
  m.group.rotation.y = m.heading;
  m.group.position.y += Math.sin(m.anim*6)*0.01;
  animateMouseRig(m.group, 0.75, m.anim, m.attackAnim, 0);
}

function makeEnemy(kind,x,z){
  let model,hp,speed,damage,radius,attackRange=1.3,turnRate=4.8;
  if(kind==="rat"){ model = makeRatModel(); hp = 22; speed = 7.0; damage = 10; radius = 0.8; }
  if(kind==="mole"){ model = makeMoleModel(); hp = 40; speed = 5.5; damage = 55; radius = 0.9; }
  if(kind==="weasel"){ model = makeWeaselModel(); hp = 115; speed = 10.1; damage = 24; radius = 1.1; turnRate = 1.6; }

  model.position.set(x, groundHeight(x,z), z);
  scene.add(model);
  const bar = createHealthBar(kind==="weasel"?1.9:1.4, 0xff6666);
  bar.position.y = kind==="weasel" ? 2.35 : 1.8;
  model.add(bar);

  const e = {
    kind, group:model, pos:model.position, hp, maxHp:hp, speed, damage, radius,
    attackRange, target:null, dead:false, dying:false, anim:Math.random()*10, attackAnim:0,
    attackCd:0, heading:Math.random()*Math.PI*2, turnRate, healthBar:bar, deathT:0, isLiving:true
  };
  enemies.push(e);
  return e;
}
function chooseEnemyTarget(e){
  // AI tuning helper: structure pressure map keeps enemies from dog-piling one wall.
  const structurePressure = new Map();
  for (const other of enemies) {
    if (other === e || other.dead || other.dying || !other.target || other.target === player) continue;
    structurePressure.set(other.target, (structurePressure.get(other.target) || 0) + 1);
  }

  const nearPlayer = !player.dead && dist2(e.pos, player.pos) < 16;
  if(!player.dead && nearPlayer && !lineBlocked(e.pos, player.pos)) return player;

  let nearestServant = null, nearestServantD = 9999;
  for(const m of servantMice){
    if(m.dead || m.dying) continue;
    const d = dist2(e.pos, m.pos);
    if(d < nearestServantD){ nearestServantD = d; nearestServant = m; }
  }

  if(e.kind==="mole"){
    const bestWall = nearestAttackableStructure(e, 999, s => (s.type==="wall" || s.type==="diamondWall")) || null;
    if(bestWall) return bestWall;
  }

  if(!player.dead && !lineBlocked(e.pos, player.pos) && dist2(e.pos, player.pos) < 26){
    return player;
  }
  if(nearestServant && nearestServantD < 22) return nearestServant;

  let bestStructure = null, bestScore = 9999;
  for(const s of structures){
    if(s.dead) continue;
    const d = dist2(e.pos,s.pos);
    const pressure = structurePressure.get(s) || 0;
    const score = d + pressure * 3.0;
    if(score < bestScore){
      bestScore = score;
      bestStructure = s;
    }
  }
  if(bestStructure) return bestStructure;
  if(nearestServant) return nearestServant;
  if(!player.dead) return player;
  return null;
}
function updateEnemies(dt){
  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    if(e.dead){ enemies.splice(i,1); continue; }

    if(e.dying){
      e.deathT += dt;
      e.group.rotation.z = clamp(e.deathT * 4.6, 0, Math.PI/2.15);
      e.group.position.y = groundHeight(e.pos.x,e.pos.z) - Math.min(0.5, e.deathT * 0.75);
      if(e.kind==="weasel") animateWeaselRig(e.group, 0, e.anim, 0, clamp(e.deathT * 2, 0, 1));
      else animateMouseRig(e.group, 0, e.anim, 0, clamp(e.deathT * 2, 0, 1));
      if(e.deathT > 0.45) finalizeDeath(e);
      continue;
    }

    e.anim += dt;
    e.attackAnim = Math.max(0, e.attackAnim - dt*4);
    e.attackCd -= dt;

    // retarget more often if crowded around current target
    if (!e.target || e.target.dead || Math.random() < 0.02) {
      e.target = chooseEnemyTarget(e);
    } else if (e.target !== player) {
      let crowd = 0;
      for (const other of enemies) {
        if (other === e || other.dead || other.dying) continue;
        if (other.target === e.target && dist2(other.pos, e.pos) < 2.0) crowd++;
      }
      if (crowd >= 3) e.target = chooseEnemyTarget(e);
    }

    e.repathTimer = Math.max(0, (e.repathTimer || 0) - dt);
    const moveTarget = (e.repathTimer > 0 && e.repathTarget) ? e.repathTarget : e.target;
    if(!moveTarget) continue;
    const d = dist2(e.pos, moveTarget.pos || moveTarget);

    if(d > e.attackRange + (moveTarget.radius || 0.5)){
      const step = directSteerToward({ pos:e.pos, speed:e.speed, radius:e.radius }, moveTarget.pos || moveTarget, dt, true, e.target, enemies);
      if(step){
        e.heading += clamp(angleDiff(e.heading, step.heading), -e.turnRate*dt, e.turnRate*dt);
        e.pos.x = step.x;
        e.pos.z = step.z;
      }
    } else if(e.attackCd <= 0 && e.target && !e.repathTimer){
      e.attackCd = e.kind==="weasel" ? 0.82 : e.kind==="mole" ? 1.35 : 1.04;
      e.attackAnim = 1;
      addBurst(e.pos.x,e.pos.y+0.9,e.pos.z, e.kind==="mole"?0x884333:0xff6666, 10, 4, 0.45, 0.08);

      if(e.target === player){
        applyDamageToLiving(player, 999, e.pos);
      } else if(isLivingTarget(e.target)){
        applyDamageToLiving(e.target, e.damage, e.target.pos);
      } else {
        damageStructure(e.target, e.damage);
        if(e.kind==="mole"){
          killEnemy(e);
        }
      }
    }
    updateAgentStuck(e, dt, !!e.target, ()=>{
      e.target = chooseEnemyTarget(e);
      setRepathPoint(e, e.target?.pos || e.pos, 4.8);
    });

    e.pos.y = groundHeight(e.pos.x,e.pos.z);
    e.group.rotation.y = e.heading;
    if(e.kind==="weasel") animateWeaselRig(e.group, 1, e.anim, e.attackAnim, 0);
    else animateMouseRig(e.group, 0.95, e.anim, e.attackAnim, 0);
  }
}

function spawnCat(){
  if(cat || catSpawnTriggered) return;
  catSpawnTriggered = true;

  const tele = new THREE.Mesh(
    new THREE.CylinderGeometry(3.5,3.5,0.08,24),
    new THREE.MeshBasicMaterial({ color:0xff3333, transparent:true, opacity:0.65 })
  );
  tele.position.set(0, groundHeight(0,0)+0.05, 0);
  scene.add(tele);

  let pulse = 0;
  const pulseId = setInterval(()=>{
    if(gameOver || gameWon){ clearInterval(pulseId); tele.parent?.remove(tele); return; }
    pulse += 0.08;
    tele.scale.setScalar(1 + Math.sin(pulse*10)*0.12);
    tele.material.opacity = 0.38 + Math.sin(pulse*12)*0.2 + 0.22;
  }, 50);

  setTimeout(()=>{
    clearInterval(pulseId);
    tele.parent?.remove(tele);

    const model = makeCatModel();
    model.position.set(0, groundHeight(0,0), 0);
    scene.add(model);

    const bar = createHealthBar(6.8,0xff4444);
    bar.position.y = 6.8;
    model.add(bar);

    cat = {
      group:model,
      pos:model.position,
      hp:10000,
      maxHp:10000,
      speed:4.9,
      sprint:7.0,
      radius:2.2,
      attackRange:2.35,
      attackCd:0,
      heading:0,
      turnRate:1.45,
      dead:false,
      dying:false,
      isLiving:true,
      visibleAggro:false,
      prowlTarget:new THREE.Vector3(rand(-40,40),0,rand(-40,40)),
      aggroMemory:0,
      lastSeenPlayerPos:player.pos.clone(),
      anim:0,
      attackAnim:0,
      deathT:0,
      healthBar:bar
    };

    ui.bossWrap.style.display = "block";
    ui.bossLabel.style.display = "block";
    showCenter("The Cat Has Spawned!", 2.2);
  }, 3000);
}
function catChooseTarget(){
  if(!cat || cat.dead || cat.dying) return null;
  const playerDist = dist2(cat.pos, player.pos);
  const playerVisible = !player.dead && !lineBlocked(cat.pos, player.pos) && playerDist < 40;
  if(playerVisible){
    // Aggro memory keeps pressure up when LOS briefly breaks.
    cat.aggroMemory = 6.2;
    cat.lastSeenPlayerPos.copy(player.pos);
    return player;
  }

  if(cat.aggroMemory > 0){
    let nearestServant = null, nearestServantD = 9999;
    for(const m of servantMice){
      if(m.dead || m.dying) continue;
      const d = dist2(cat.pos, m.pos);
      if(d < nearestServantD){ nearestServant = m; nearestServantD = d; }
    }
    if(nearestServant && nearestServantD < 18) return nearestServant;
    const antiBase = nearestAttackableStructure(cat, 999, s => ["wall","diamondWall","turret","cannon","shardLauncher","sawBlaster","zapCoil","mortarBloom","barrierTotem","fortPlate"].includes(s.type));
    if(antiBase && dist2(cat.pos, antiBase.pos) < 56) return antiBase;
    return { pos:cat.lastSeenPlayerPos, radius:1.0, isMemoryTarget:true };
  }

  const bestStructure = nearestAttackableStructure(cat, 45);
  if(bestStructure) return bestStructure;
  return null;
}
function updateCat(dt){
  if(!cat || cat.dead) return;

  if (cat.dying) {
    cat.deathT += dt;
    cat.group.rotation.z = clamp(cat.deathT * 3.6, 0, Math.PI/2.4);
    cat.group.position.y = groundHeight(cat.pos.x,cat.pos.z) - Math.min(0.9, cat.deathT * 1.0);
    animateCatRig(cat.group, 0, cat.anim, 0, clamp(cat.deathT * 2, 0, 1));
    if (cat.deathT > 0.6) finalizeDeath(cat);
    return;
  }

  cat.anim += dt;
  cat.attackAnim = Math.max(0, cat.attackAnim - dt*3);
  cat.attackCd -= dt;
  cat.aggroMemory = Math.max(0, cat.aggroMemory - dt);
  cat.repathTimer = Math.max(0, (cat.repathTimer || 0) - dt);

  const target = catChooseTarget();
  let moveTarget = null;
  let moveSpeed = cat.speed;

  if(target){
    moveTarget = target.pos || target;
    cat.visibleAggro = true;
    if(target === player) moveSpeed = cat.sprint;
    else if(target.isMemoryTarget) moveSpeed = cat.sprint * 0.9;
  } else {
    cat.visibleAggro = false;
    if(dist2(cat.pos, cat.prowlTarget) < 4){
      cat.prowlTarget.set(rand(-HALF_MAP+18, HALF_MAP-18), 0, rand(-HALF_MAP+18, HALF_MAP-18));
    }
    moveTarget = cat.prowlTarget;
  }
  if(cat.repathTimer > 0 && cat.repathTarget) moveTarget = cat.repathTarget;

  const d = dist2(cat.pos, moveTarget);
  if(d > cat.attackRange + (target?.radius || 0.4)){
    const step = directSteerToward({ pos:cat.pos, speed:moveSpeed, radius:cat.radius }, moveTarget, dt, true, target);
    if(step){
      cat.heading += clamp(angleDiff(cat.heading, step.heading), -cat.turnRate*dt, cat.turnRate*dt);
      cat.pos.x = step.x;
      cat.pos.z = step.z;
    }
  } else if(target && !target.isMemoryTarget && cat.attackCd <= 0 && cat.repathTimer <= 0){
    cat.attackCd = 1.0;
    cat.attackAnim = 1;
    const dx = Math.sin(cat.heading), dz = Math.cos(cat.heading);
    addBurst(cat.pos.x + dx*1.5, cat.pos.y+2.0, cat.pos.z + dz*1.5, 0xff7f50, 20, 6, 0.7, 0.09);
    if(target === player) applyDamageToLiving(player, 999, cat.pos);
    else if(isLivingTarget(target)) applyDamageToLiving(target, 38, target.pos);
    else damageStructure(target, 35);
  }
  updateAgentStuck(cat, dt, !!target, ()=>{
    setRepathPoint(cat, target?.pos || player.pos, 7.5);
    if(target && target === player) cat.aggroMemory = Math.max(cat.aggroMemory, 4.5);
  });

  cat.pos.y = groundHeight(cat.pos.x,cat.pos.z);
  cat.group.rotation.y = cat.heading;
  animateCatRig(cat.group, cat.visibleAggro ? 1 : 0.5, cat.anim, cat.attackAnim, 0);
  ui.bossBar.style.width = (100 * Math.max(0, cat.hp/cat.maxHp)) + "%";
}

// -------------------------------------------------
// TARGET FINDERS
// -------------------------------------------------
function nearestEnemyInRange(origin, range){
  let best = null, bestD = range;
  for (const e of enemies) {
    if (e.dead || e.dying) continue;
    const d = dist2(origin.pos || origin, e.pos);
    if (d < bestD) { bestD = d; best = e; }
  }
  if (cat && !cat.dead && !cat.dying) {
    const d = dist2(origin.pos || origin, cat.pos);
    if (d < bestD) { bestD = d; best = cat; }
  }
  return best;
}

// -------------------------------------------------
// STRUCTURE UPDATE / COMBAT
// -------------------------------------------------
function robotTarget(r){
  let best = null;
  let bestD = 9999;

  for (const e of enemies) {
    if (e.dead || e.dying) continue;
    const d = dist2(r.pos, e.pos);
    if (d < bestD) {
      bestD = d;
      best = e;
    }
  }

  if (cat && !cat.dead && !cat.dying) {
    const d = dist2(r.pos, cat.pos);
    if (d < bestD) {
      bestD = d;
      best = cat;
    }
  }

  return best;
}

function updateRobots(dt){
  for (let i = robots.length - 1; i >= 0; i--) {
    const r = robots[i];

    if (r.dead) {
      robots.splice(i, 1);
      continue;
    }

    if (r.hp <= 0 && !r.dying) {
      r.dying = true;
      r.deathT = 0;
      addBurst(r.pos.x, r.pos.y + 0.8, r.pos.z, 0x9fd5ff, 12, 4.5, 0.6, 0.09);
    }

    if (r.dying) {
      r.deathT += dt;
      r.group.rotation.z = clamp(r.deathT * 4.2, 0, Math.PI / 2.2);
      r.group.position.y = groundHeight(r.pos.x, r.pos.z) - Math.min(0.35, r.deathT * 0.5);
      if (r.deathT > 0.4) {
        r.group.parent?.remove(r.group);
        r.dead = true;
        robots.splice(i, 1);
      }
      continue;
    }

    r.anim += dt * 9;
    r.fireCd -= dt;
    r.repathTimer = Math.max(0, (r.repathTimer || 0) - dt);

    const t = robotTarget(r);

    if (t) {
      const d = dist2(r.pos, t.pos);

      const robotMoveTarget = (r.repathTimer > 0 && r.repathTarget) ? r.repathTarget : t.pos;
      if (d > 2.2) {
        const step = directSteerToward(
          { pos: r.pos, speed: r.speed, radius: r.radius },
          robotMoveTarget,
          dt,
          false,
          null,
          robots
        );

        if (step) {
          r.group.rotation.y = step.heading;
          r.pos.x = step.x;
          r.pos.z = step.z;
        }
      } else if (r.fireCd <= 0) {
        r.fireCd = 0.55;
        addBurst(r.pos.x, r.pos.y + 1.1, r.pos.z, 0x9fecff, 5, 2.5, 0.24, 0.05);
        applyDamageToLiving(t, r.damage, t.pos);
      }
      updateAgentStuck(r, dt, true, ()=> setRepathPoint(r, t.pos, 3.6));
    } else {
      if (dist2(r.pos, player.pos) > 6) {
        const step = directSteerToward(
          { pos: r.pos, speed: r.speed * 0.7, radius: r.radius },
          player.pos,
          dt,
          false,
          null,
          robots
        );

        if (step) {
          r.group.rotation.y = step.heading;
          r.pos.x = step.x;
          r.pos.z = step.z;
        }
      }
    }

    r.pos.y = groundHeight(r.pos.x, r.pos.z);
    r.group.position.y += Math.sin(r.anim * 3) * 0.02;
  }
}
function updateRepairBeams(dt) {
  for (const s of structures) {
    if (s.dead || s.type !== "fountain") {
      if (s && s.beam) s.beam.visible = false;
      continue;
    }

    const orb = s.mesh.userData.orb;
    if (orb) {
      orb.position.y = 1.95 + Math.sin(time*5)*0.08;
      orb.rotation.y += dt*2;
    }

    let best = null, bestScore = 9999;
    for (const t of structures) {
      if (t === s || t.dead) continue;
      if (t.hp >= t.maxHp) continue;
      const d = dist2(s.pos, t.pos);
      if (d > 12) continue;
      const score = d + (1 - t.hp / t.maxHp) * -6;
      if (score < bestScore) {
        bestScore = score;
        best = t;
      }
    }

    const beam = ensureRepairBeam(s);
    if (!best) {
      beam.visible = false;
      continue;
    }

    const from = new THREE.Vector3(s.pos.x, s.pos.y + 1.95, s.pos.z);
    const to = new THREE.Vector3(best.pos.x, best.pos.y + 1.2, best.pos.z);
    const mid = from.clone().add(to).multiplyScalar(0.5);
    const dir = to.clone().sub(from);
    const len = dir.length();

    beam.visible = true;
    beam.position.copy(mid);
    beam.scale.set(1, len, 1);
    beam.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());

    best.hp = Math.min(best.maxHp, best.hp + 6.5 * dt);
    setHealthBar(best.mesh.userData.healthBar, best.hp / best.maxHp);

    if (Math.random() < 0.18) {
      addCogParticle(best.pos.x + rand(-0.45,0.45), best.pos.y + rand(0.9,2.0), best.pos.z + rand(-0.45,0.45));
    }
  }
}
function updateStructures(dt){
  updateBeaconGlow();
  updateRepairBeams(dt);

  for(const s of structures){
    if(s.dead) continue;

    if(s.type==="beacon"){
      const top = s.mesh.userData.top;
      if(top){
        top.rotation.y += dt*2.7;
        top.position.y = 4.2 + Math.sin(time*4)*0.12;
      }
      if(Math.random() < 0.03) addBurst(s.pos.x,s.pos.y+4.2,s.pos.z,0x76ff9c,2,1.1,0.32,0.04);
    }

    if(s.type==="supplyNest"){
      if (Math.random() < 0.002) {
        spawnCheeseAt(s.pos.x + rand(-1.2,1.2), s.pos.z + rand(-1.2,1.2), 3);
      }
    }

    if(s.type==="scoutPost"){
      const eye = s.mesh.userData.eye;
      if (eye) {
        eye.scale.setScalar(1 + Math.sin(time*6) * 0.08);
        eye.rotation.y += dt * 2.2;
      }
    }

    if(s.type==="factory"){
      const near = dist2(player.pos,s.pos) < 11;
      s.produceCd -= dt;
      const rateMul = s.assignedServant ? 1.6 : 1;
      if(near && s.produceCd <= 0){
        s.produceCd = 4.0 / rateMul;
        spawnCheeseAt(s.pos.x+rand(-1.4,1.4), s.pos.z+rand(-1.4,1.4), 3);
        addBurst(s.pos.x,s.pos.y+1.4,s.pos.z,0xffe066,8,3,0.45,0.07);
      }
    }

    if(s.type==="robo"){
      s.robotCd -= dt;
      if(s.robotCd <= 0){
        s.robotCd = 8;
        spawnRobot(s.pos.x+rand(-1.7,1.7), s.pos.z+rand(-1.7,1.7));
        addBurst(s.pos.x,s.pos.y+1.8,s.pos.z,0x8fe8ff,10,3,0.5,0.07);
      }
    }

    if(s.type==="barrierTotem"){
      const ring = s.mesh.userData.ring;
      if (ring) ring.rotation.z += dt * 1.7;
    }

    if(s.type==="repairAnchor"){
      const anchor = s.mesh.userData.anchor;
      if (anchor) anchor.rotation.y += dt * 1.6;
      for (const t of structures) {
        if (t.dead || t === s) continue;
        if (dist2(s.pos, t.pos) < 8 && t.hp < t.maxHp) {
          t.hp = Math.min(t.maxHp, t.hp + 2 * dt);
          setHealthBar(t.mesh.userData.healthBar, t.hp / t.maxHp);
        }
      }
    }

    // Defensive passive buffs
    if (s.type === "fortPlate") {
      // just a tanky block
    }
    if (s.type === "braceTower") {
      for (const t of structures) {
        if (t.dead || t === s) continue;
        if (dist2(s.pos, t.pos) < 7) {
          t.hp = Math.min(t.maxHp, t.hp + 0.45 * dt);
          setHealthBar(t.mesh.userData.healthBar, t.hp / t.maxHp);
        }
      }
    }

    // ATTACK STRUCTURES
    const buff = beaconBuffAt(s.pos.x,s.pos.z);

    if(s.type==="turret"){
      s.fireCd -= dt;
      const headPivot = s.mesh.userData.headPivot;
      const t = nearestEnemyInRange(s, 22);
      if (t && headPivot) {
        smoothAimYaw(headPivot, s, "aimYaw", Math.atan2(t.pos.x - s.pos.x, t.pos.z - s.pos.z), dt, 8.8);
      }
      if (t && s.fireCd <= 0) {
        s.fireCd = 0.42 / buff.speed;
        const dir = new THREE.Vector3(t.pos.x-s.pos.x,0,t.pos.z-s.pos.z).normalize();
        spawnProjectile({
          pos:new THREE.Vector3(s.pos.x,s.pos.y+1.7,s.pos.z).add(dir.clone().multiplyScalar(1.2)),
          vel:new THREE.Vector3(dir.x*20,1.8,dir.z*20),
          damage:7*buff.damage,
          splash:0,
          color:0xffe16c,
          size:0.12,
          from:"ally",
          kind:"pellet"
        });
        addBurst(s.pos.x+dir.x*1.2,s.pos.y+1.6,s.pos.z+dir.z*1.2,0xffe16c,4,2,0.18,0.04);
      }
    }

    if(s.type==="cannon"){
      s.fireCd -= dt;
      const barrelPivot = s.mesh.userData.barrelPivot;
      const t = nearestEnemyInRange(s, 28);
      if (t && barrelPivot) {
        smoothAimYaw(barrelPivot, s, "aimYaw", Math.atan2(t.pos.x - s.pos.x, t.pos.z - s.pos.z), dt, 6.8);
        const horiz = Math.hypot(t.pos.x-s.pos.x, t.pos.z-s.pos.z);
        const pitch = -clamp(horiz/40, 0.25, 0.55);
        s.aimPitch = THREE.MathUtils.lerp(s.aimPitch ?? barrelPivot.rotation.x, pitch, clamp(dt*6.5, 0, 1));
        barrelPivot.rotation.x = s.aimPitch;
      }
      if (t && s.fireCd <= 0) {
        s.fireCd = 1.8 / buff.speed;
        const dx = t.pos.x - s.pos.x;
        const dz = t.pos.z - s.pos.z;
        const d = Math.hypot(dx,dz);
        const dir = new THREE.Vector3(dx/d,0,dz/d);
        spawnProjectile({
          pos:new THREE.Vector3(s.pos.x,s.pos.y+2.1,s.pos.z),
          vel:new THREE.Vector3(dir.x*10.5,8.5,dir.z*10.5),
          damage:28*buff.damage,
          splash:2.5,
          color:0xffb34d,
          size:0.28,
          from:"ally",
          kind:"cannon"
        });
        addBurst(s.pos.x,s.pos.y+2.1,s.pos.z,0xffc766,8,3,0.35,0.05);
      }
    }

    if(s.type==="shardLauncher"){
      s.fireCd -= dt;
      const prongs = s.mesh.userData.prongs;
      const t = nearestEnemyInRange(s, 19);
      if (t && prongs) {
        smoothAimYaw(prongs, s, "aimYaw", Math.atan2(t.pos.x - s.pos.x, t.pos.z - s.pos.z), dt, 9.1);
      }
      if (t && s.fireCd <= 0) {
        s.fireCd = 0.82 / buff.speed;
        const baseDir = new THREE.Vector3(t.pos.x-s.pos.x,0,t.pos.z-s.pos.z).normalize();
        for (const spread of [-0.16, 0, 0.16]) {
          const a = Math.atan2(baseDir.x, baseDir.z) + spread;
          const dir = new THREE.Vector3(Math.sin(a),0,Math.cos(a));
          spawnProjectile({
            pos:new THREE.Vector3(s.pos.x,s.pos.y+1.5,s.pos.z).add(dir.clone().multiplyScalar(0.7)),
            vel:new THREE.Vector3(dir.x*17,2.0,dir.z*17),
            damage:5.5*buff.damage,
            splash:0,
            color:0xffd9b3,
            size:0.10,
            from:"ally",
            kind:"shard"
          });
        }
        addBurst(s.pos.x,s.pos.y+1.4,s.pos.z,0xffe2c1,5,2.1,0.22,0.04);
      }
    }

    if(s.type==="zapCoil"){
      s.fireCd -= dt;
      const coil = s.mesh.userData.coil;
      if (coil) coil.rotation.z += dt * 3.5;
      const t = nearestEnemyInRange(s, 8);
      if (t && s.fireCd <= 0) {
        s.fireCd = 0.55 / buff.speed;
        applyDamageToLiving(t, 10 * buff.damage, t.pos);
        // lightning beam look
        const from = new THREE.Vector3(s.pos.x, s.pos.y + 1.1, s.pos.z);
        const to = new THREE.Vector3(t.pos.x, t.pos.y + 0.9, t.pos.z);
        const dir = to.clone().sub(from);
        const len = dir.length();
        const mesh = new THREE.Mesh(
          new THREE.CylinderGeometry(0.04,0.04,1,6),
          new THREE.MeshBasicMaterial({ color:0xb8b1ff, transparent:true, opacity:0.95 })
        );
        mesh.position.copy(from.clone().add(to).multiplyScalar(0.5));
        mesh.scale.set(1,len,1);
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
        scene.add(mesh);
        particles.push({ mesh, vel:new THREE.Vector3(), life:0.10, maxLife:0.10, kind:"cog" });
      }
    }

    if(s.type==="mortarBloom"){
      s.fireCd -= dt;
      const flower = s.mesh.userData.flower;
      if (flower) flower.rotation.y += dt * 1.2;
      const t = nearestEnemyInRange(s, 26);
      if (t && s.fireCd <= 0) {
        s.fireCd = 2.15 / buff.speed;
        const dx = t.pos.x - s.pos.x;
        const dz = t.pos.z - s.pos.z;
        const d = Math.hypot(dx,dz);
        const dir = new THREE.Vector3(dx/d,0,dz/d);
        spawnProjectile({
          pos:new THREE.Vector3(s.pos.x,s.pos.y+1.9,s.pos.z),
          vel:new THREE.Vector3(dir.x*9.2,9.4,dir.z*9.2),
          damage:22*buff.damage,
          splash:3.0,
          color:0xff9dbc,
          size:0.24,
          from:"ally",
          kind:"mortar"
        });
        addBurst(s.pos.x,s.pos.y+1.7,s.pos.z,0xffbfd0,8,2.6,0.28,0.05);
      }
    }

    if(s.type==="sawBlaster"){
      s.fireCd -= dt;
      const headPivot = s.mesh.userData.headPivot;
      const t = nearestEnemyInRange(s, 15);
      if (headPivot) headPivot.rotation.z += dt * 10;
      if (t && headPivot) {
        smoothAimYaw(headPivot, s, "aimYaw", Math.atan2(t.pos.x - s.pos.x, t.pos.z - s.pos.z), dt, 11.5);
      }
      if (t && s.fireCd <= 0) {
        s.fireCd = 0.95 / buff.speed;
        applyDamageToLiving(t, 14 * buff.damage, t.pos);
        addBurst(t.pos.x, t.pos.y+0.9, t.pos.z, 0xffc1a8, 8, 3, 0.35, 0.05);
      }
    }
  }
}

document.addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;

  if (e.key === "1") { currentCategory = 1; currentSelectionSlot = null; updateBuildUI(); }
  if (e.key === "2") { currentCategory = 2; if (currentSelectionSlot == null) currentSelectionSlot = 5; updateBuildUI(); }
  if (e.key === "3") { currentCategory = 3; if (currentSelectionSlot == null) currentSelectionSlot = 5; updateBuildUI(); }
  if (e.key === "4") { currentCategory = 4; if (currentSelectionSlot == null) currentSelectionSlot = 5; updateBuildUI(); }

  if (["5","6","7","8","9","0"].includes(e.key) && currentCategory !== 1) {
    currentSelectionSlot = e.key === "0" ? 0 : parseInt(e.key);
    updateBuildUI();
  }

  if(e.code === "Space"){
    e.preventDefault();
    tryPlaceStructure();
  }
});
document.addEventListener("keyup", e=> keys[e.key.toLowerCase()] = false);

function updatePlayer(dt){
  if(player.dead) {
    player.deathT += dt;
    player.group.rotation.z = clamp(player.deathT * 4.2, 0, Math.PI/2.2);
    player.group.position.y = groundHeight(player.pos.x, player.pos.z) - Math.min(0.45, player.deathT * 0.65);
    animateMouseRig(player.group, 0, player.animTime, 0, clamp(player.deathT * 2, 0, 1));
    return;
  }
  if(gameWon) return;

  const turnDir = (keys["a"] ? 1 : 0) + (keys["d"] ? -1 : 0);
  player.heading += turnDir * player.turnSpeed * dt;

  let moveInput = 0;
  if(keys["w"]) moveInput += 1;
  if(keys["s"]) moveInput -= 0.55;

  const sprinting = keys["shift"] && moveInput > 0;
  const speed = sprinting ? player.sprintSpeed : player.moveSpeed;
  const vel = moveInput * speed;
  const forward = { x:Math.sin(player.heading), z:Math.cos(player.heading) };

  if(Math.abs(vel) > 0.01){
    const desired = { x:forward.x * Math.sign(vel), z:forward.z * Math.sign(vel) };
    const step = steerMove({ pos:player.pos, speed:Math.abs(vel), radius:player.radius }, desired, dt, false);
    if(step){
      player.pos.x = step.x;
      player.pos.z = step.z;
    }
    player.animTime += dt * (sprinting ? 1.5 : 1.0) * Math.abs(moveInput);
  }

  player.pos.y = groundHeight(player.pos.x,player.pos.z);
  player.group.position.copy(player.pos);
  player.group.rotation.y = player.heading;
  animateMouseRig(player.group, Math.abs(moveInput), player.animTime, player.attackAnim, 0);

  for(let i=cheeses.length-1;i>=0;i--){
    const c = cheeses[i];
    if(dist2(player.pos,c.pos) < 1.25){
      cheese += c.amount;
      addBurst(c.pos.x,c.pos.y+0.3,c.pos.z,0xffec71,8,4,0.4,0.08);
      c.group.parent?.remove(c.group);
      cheeses.splice(i,1);
    }
  }

  const selected = getSelectedBuildData();
  if(!selected){
    buildTelegraph.visible = false;
  } else {
    const p = getBuildPlace();
    buildTelegraph.visible = true;
    buildTelegraph.position.set(p.x, p.y+0.06, p.z);
    buildTelegraph.scale.setScalar(selected.radius * 0.75);
    buildTelegraph.material.color.set(circleBlocked(p.x,p.z,selected.radius) ? 0xff4444 : 0x7aff9a);
    buildTelegraph.rotation.set(-Math.PI/2, 0, 0); // always flat circle
  }
}
function tryPlaceStructure(){
  const selected = getSelectedBuildData();
  if(gameOver || gameWon || !selected) return;
  if(cheese < selected.cost){ showCenter("Not enough cheese", 1); return; }

  const p = getBuildPlace();
  if(circleBlocked(p.x,p.z,selected.radius)){ showCenter("Cannot build there", 1); return; }

  cheese -= selected.cost;
  createStructure(selected.type, p.x, p.z, player.heading, selected);
}
function updateCamera(dt){
  const focus = player.pos.clone().add(new THREE.Vector3(0,1.7,0));
  const backward = new THREE.Vector3(-Math.sin(player.heading), 0, -Math.cos(player.heading)).normalize();
  const desired = focus.clone()
    .add(backward.multiplyScalar(7.2))
    .add(new THREE.Vector3(0,4.6,0));

  let safe = desired.clone();
  for(const o of obstacles){
    const dx = safe.x-o.x, dz = safe.z-o.z;
    const d = Math.hypot(dx,dz);
    if(d < o.r + 1.2){
      const push = (o.r + 1.2 - d);
      safe.x += (dx / (d||1)) * push;
      safe.z += (dz / (d||1)) * push;
    }
  }

  camera.position.lerp(safe, 1 - Math.pow(0.00008, dt));
  camera.lookAt(focus);
}

// -------------------------------------------------
// SPAWNERS
// -------------------------------------------------
let cheeseSpawnTimer = 0;
let lastRatSpawn = 60;
let lastMoleSpawn = 240;
let lastWeaselSpawn = 420;

function updateCheeses(dt){
  for(const c of cheeses){
    c.spin += dt * 2.4;
    c.group.rotation.y = c.spin;
    c.group.position.y = groundHeight(c.pos.x,c.pos.z) + 0.22 + Math.sin(time*3 + c.spin) * 0.12;
  }
}
function updateSpawners(dt){
  cheeseSpawnTimer += dt;
  if(cheeseSpawnTimer >= 5.6){
    cheeseSpawnTimer = 0;
    const p = randomFreePosition(1);
    spawnCheeseAt(p.x,p.z,3);
  }

  wildSpawnTimer += dt;
  if(wildSpawnTimer >= 24 && wildMice.length + servantMice.length < 8){
    wildSpawnTimer = 0;
    const p = randomFreePosition(1);
    spawnWildMouse(p.x,p.z);
  }

  if(time >= 60 && !cat && !catSpawnTriggered) spawnCat();

  if(time >= 60 && cat && !cat.dead && !cat.dying){
    if(time - lastRatSpawn >= 30){
      lastRatSpawn = time;
      const count = clamp(2 + Math.floor((time-60)/75), 2, 10);
      spawnEnemyWave("rat", count);
      showCenter("Rat Wave x" + count, 0.8);
    }
    if(time >= 240 && time - lastMoleSpawn >= 45){
      lastMoleSpawn = time;
      const count = clamp(1 + Math.floor((time-240)/120), 1, 10);
      spawnEnemyWave("mole", count);
      showCenter("Moles x" + count, 0.8);
    }
    if(time >= 420 && time - lastWeaselSpawn >= 55){
      lastWeaselSpawn = time;
      const count = clamp(1 + Math.floor((time-420)/120), 1, 10);
      spawnEnemyWave("weasel", count);
      showCenter("Weasels x" + count, 0.8);
    }
  }
}
function spawnEnemyWave(kind,count){
  const useCatCenter = cat && !cat.dead && !cat.dying;
  const center = useCatCenter ? cat.pos : null;
  for(let i=0;i<count;i++){
    let x=0,z=0;
    if(useCatCenter){
      const a = Math.random() * Math.PI * 2;
      const r = rand(2.0, 5.5);
      x = clamp(center.x + Math.sin(a)*r, -HALF_MAP+6, HALF_MAP-6);
      z = clamp(center.z + Math.cos(a)*r, -HALF_MAP+6, HALF_MAP-6);
    } else {
      const edge = Math.floor(Math.random()*4);
      if(edge===0){ x = -HALF_MAP+5; z = rand(-HALF_MAP+8, HALF_MAP-8); }
      if(edge===1){ x = HALF_MAP-5; z = rand(-HALF_MAP+8, HALF_MAP-8); }
      if(edge===2){ z = -HALF_MAP+5; x = rand(-HALF_MAP+8, HALF_MAP-8); }
      if(edge===3){ z = HALF_MAP-5; x = rand(-HALF_MAP+8, HALF_MAP-8); }
      x += rand(-2,2); z += rand(-2,2);
    }
    const e = makeEnemy(kind, x, z);
    if(useCatCenter) setRepathPoint(e, center, 5.5);
  }
}

function diePlayer(){

  player.dead = true;
  gameOver = true;
  addBloodHit(player.pos.x, player.pos.y+0.9, player.pos.z, 1.35);
  addBurst(player.pos.x,player.pos.y+1.0,player.pos.z,0xff5555,24,6,0.95,0.11);
  ui.msg.textContent = "GAME OVER";
  ui.msg.style.opacity = "1";
}

// MAIN LOOP
// -------------------------------------------------
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(0.033, clock.getDelta());

  if(!gameOver && !gameWon) time += dt;

  updateSpawners(dt);
  updateCheeses(dt);
  updatePlayer(dt);
  updateStructures(dt);

  for(const m of [...wildMice, ...servantMice]) updateMouseEntity(m,dt);
  updateEnemies(dt);
  updateRobots(dt);
  updateCat(dt);
  updateProjectiles(dt);
  updateParticles(dt);
  updateCamera(dt);
  updateUI();

  renderer.render(scene,camera);
}
animate();

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
