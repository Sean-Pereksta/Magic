        }
        if(hitStructure){
          damageStructure(hitStructure, e.damage * 4.2);
          e.ramState = "idle";
          e.ramDaze = 3.0;
          addBurst(e.pos.x, e.pos.y+1.0, e.pos.z, 0xff8c4a, 18, 5.6, 0.8, 0.11);

    } else if(e.kind==="titanRam" && !isStunned){

          e.titanWindup = 0.75;

      } else if(e.titanState === "windup"){
        e.titanWindup -= dt;
        setEnemyTelegraph(e, clamp(1 - (e.titanWindup / 0.75), 0, 1));
        e.attackAnim = 1;
        if(Math.random() < 0.2) addBurst(e.pos.x + rand(-0.4,0.4), e.pos.y + 0.2, e.pos.z + rand(-0.4,0.4), 0xc9b394, 1, 0.9, 0.3, 0.04);

        const nz = e.pos.z + e.titanChargeDir.z * chargeSpeed * dt;

        }

    } else if(!isStunned && d > meleeStopDistance(e, e.target || moveTarget, 0.1)){

        e.dashWindup -= dt;
        e.attackAnim = 0.75;
        if(Math.random() < 0.45) addBurst(e.pos.x, e.pos.y + 0.12, e.pos.z, 0xc8a46f, 1, 1.2, 0.22, 0.04);
        if(e.dashWindup <= 0){

          const side = new THREE.Vector3(-toTarget.z, 0, toTarget.x).multiplyScalar((e.dashDir || 1) * rand(2.2, 3.4));
          const nx = clamp(e.pos.x + side.x, -dynamicHalfMap+2.3, dynamicHalfMap-2.3);
          const nz = clamp(e.pos.z + side.z, -dynamicHalfMap+2.3, dynamicHalfMap-2.3);
          const pushed = collisionPushOut(nx, nz, e.radius, true, e.target);
          e.pos.x = pushed.x; e.pos.z = pushed.z;
          addBurst(e.pos.x, e.pos.y+0.22, e.pos.z, 0xd2b074, 8, 3.6, 0.32, 0.05);

      }
      const step = directSteerToward(
        { pos:e.pos, speed:e.speed*speedScale*(1+e.avoidCrowdBias*0.2), radius:e.radius },
        targetPos, dt, true, e.target, enemies,
        burrowTravel || e.kind==="screecherBat" ? { ignoreWallsForBurrow:true } : null
      );
      if(step){
        e.heading += clamp(angleDiff(e.heading, step.heading), -e.turnRate*dt, e.turnRate*dt);
        e.pos.x = step.x;
        e.pos.z = step.z;
      }
      if(burrowTravel && d < meleeStopDistance(e, e.target || moveTarget, 0.55)){
        e.burrowState = "burrow_emerge";
        e.burrowTimer = 0.4;
      }
    } else if(!isStunned && e.attackCd <= 0 && e.target && !e.repathTimer && (e.kind!=="ram" || e.ramDaze > 0 || e.ramState==="idle")){
      if(e.kind==="burrowMole" && (e.burrowState==="surface_seek" || e.burrowState==="surface_attack")){

      }
      if(e.kind==="siegeRat" && e.siegeWindup <= 0){

      if(e.kind==="siegeRat" && e.siegeWindup > 0){
        setEnemyTelegraph(e, clamp(1 - (e.siegeWindup / 0.26), 0, 1));
        e.attackAnim = 0.88;
        if(e.siegeWindup > 0.001) continue;
        e.target = e.siegePendingTarget || e.target;
        e.siegePendingTarget = null;
      }
      e.attackCd = e.kind==="weasel" ? 0.56 : e.kind==="mole" ? 0.98 : 0.72;
      if(e.kind==="assassin") e.attackCd = 0.5;
      if(e.kind==="siegeRat") e.attackCd = 1.16;
      if(e.kind==="titanRam") e.attackCd = 1.45;
      if(e.kind==="dustRunner") e.attackCd = 0.55;
      if(e.kind==="bombBeetle") e.attackCd = 1.8;
      e.attackAnim = 1;
      addBurst(e.pos.x,e.pos.y+0.9,e.pos.z, e.kind==="mole"?0x884333:0xff6666, 10, 4, 0.45, 0.08);

      if(e.target === player){
        applyDamageToLiving(player, 999, e.pos);
      } else if(isLivingTarget(e.target)){
        const bonus = (e.kind==="assassin" && (e.target.state==="servant" || e.target.kind==="robot")) ? 1.45 : 1;
        applyDamageToLiving(e.target, e.damage * bonus, e.target.pos);
      } else {
        if(e.kind==="bombBeetle"){
          e.detonateWindup = 0.45;

        }
        damageStructure(e.target, e.kind==="ram" ? e.damage*1.6 : e.kind==="siegeRat" ? e.damage*2.35 : e.kind==="titanRam" ? e.damage*2.7 : e.damage);
        if(e.kind==="mole"){
          killEnemy(e);
        }
        if(e.kind==="siegeRat"){
          e.heavySwing = 0.35;
          addBurst(e.target.pos.x, e.target.pos.y + 0.8, e.target.pos.z, 0xb6d2e4, 6, 2.0, 0.3, 0.05);
        }
      }
      if(e.kind==="assassin"){
        e.dashCd = rand(1.3,2.1);
      }
    }
    if(e.kind==="spitterBug" && !isStunned && e.spitCd <= 0 && e.spitWindup <= 0 && e.target){
      const td = dist2(e.pos, e.target.pos || e.target);
      if(td > 5.8 && td < 18.5){
        e.spitCd = rand(2.8,4.6);
        e.spitWindup = 0.5;
        e.spitAim = (e.target.pos || e.target).clone ? (e.target.pos || e.target).clone() : new THREE.Vector3(e.target.pos.x,e.target.pos.y,e.target.pos.z);
        e.spitAim.y = groundHeight(e.spitAim.x, e.spitAim.z);
        e.spitImpactRadius = 1.75;
        setSpitLandingTelegraph(e, e.spitAim, 0.01, e.spitImpactRadius);
      }
    }
    e.dashCd = Math.max(0, (e.dashCd || 0) - dt);
    if(e.kind==="dustRunner" && e.dashCd <= 0 && e.target && d > 2.8 && d < 18){
      e.dashCd = rand(3.2, 5.2);
      e.dashWindup = 0.16;
      e.dashDir = Math.random() < 0.5 ? -1 : 1;
      addBurst(e.pos.x, e.pos.y+0.15, e.pos.z, 0xc69c61, 4, 2.0, 0.2, 0.04);
    }
    if(e.kind==="assassin" && e.dashCd <= 0 && e.target && d > 2.2 && d < 10 && !lineBlocked(e.pos, targetPos)){
      e.dashCd = rand(2.5,4.1);
      const dir = new THREE.Vector3(targetPos.x - e.pos.x, 0, targetPos.z - e.pos.z).normalize();
      const nx = e.pos.x + dir.x * 3.6;
      const nz = e.pos.z + dir.z * 3.6;
      const pushed = collisionPushOut(nx, nz, e.radius, true, e.target);
      e.pos.x = pushed.x; e.pos.z = pushed.z;
      addBurst(e.pos.x, e.pos.y+0.8, e.pos.z, 0xb75fff, 7, 3.6, 0.34, 0.06);
    }
    if(e.kind==="bombBeetle"){
      if(e.detonateWindup > 0){
        e.detonateWindup -= dt;
        e.attackAnim = 1;
        if(Math.random() < 0.5) addBurst(e.pos.x, e.pos.y + 0.95, e.pos.z, 0xff8644, 1, 0.7, 0.18, 0.04);
        if(e.group?.children?.length){
          e.group.traverse(c=>{ if(c.isMesh && c.material?.emissive) c.material.emissiveIntensity = 0.45 + Math.sin(time*26) * 0.35; });
        }
        if(e.detonateWindup <= 0 && !e.exploded){
          e.exploded = true;
          const r = 3.6;
          addBurst(e.pos.x, e.pos.y + 0.5, e.pos.z, 0xff6e3d, 22, 5.0, 0.65, 0.09);
          for(const s of structures){ if(!s.dead && dist2(s.pos, e.pos) < r + s.radius) damageStructure(s, e.damage * (1 - clamp((dist2(s.pos,e.pos)-1.1)/4.3, 0, 0.72))); }
          for(const m of servantMice){ if(!m.dead && !m.dying && dist2(m.pos, e.pos) < r) applyDamageToLiving(m, e.damage * 0.52, e.pos); }
          if(!player.dead && dist2(player.pos, e.pos) < r*0.8) applyDamageToLiving(player, 999, e.pos);
          killEnemy(e);
          continue;
        }
      }
    }
    if(e.kind==="screecherBat" && !isStunned){
      e.pos.y = groundHeight(e.pos.x, e.pos.z) + 1.3 + Math.sin(time*7 + e.anim) * 0.25;
      if(e.screamWindup > 0){
        e.screamWindup -= dt;
        e.attackAnim = 0.9;
        if(Math.random() < 0.25) addBurst(e.pos.x, e.pos.y + 0.1, e.pos.z, 0xa6b4ff, 1, 0.7, 0.2, 0.04);
        if(e.screamWindup <= 0){
          const radius = 7.2;
          addRingTelegraph(e.pos.x, e.pos.z, radius, 0xa8b0ff, 0.55);
          addBurst(e.pos.x, e.pos.y + 0.2, e.pos.z, 0x97a7ff, 16, 2.6, 0.45, 0.05);
          for(const m of servantMice){
            if(m.dead || m.dying) continue;
            if(dist2(m.pos, e.pos) < radius){
              m.slowUntil = Math.max(m.slowUntil || 0, time + 1.8);
            }
          }
          for(const s of structures){
            if(s.dead || !isAttackStructureType(s.type)) continue;
            if(dist2(s.pos, e.pos) < radius) s.screechDebuffUntil = Math.max(s.screechDebuffUntil || 0, time + 1.75);
          }
          e.screamCd = rand(6.2, 8.8);
        }
      } else if(e.screamCd <= 0 && d < 13){
        e.screamWindup = 0.42;
      }
    }
    updateAgentStuck(e, dt, !!e.target, (phase)=>{
      e.target = chooseEnemyTarget(e);
      e.avoidCrowdBias = phase >= 3 ? 1.0 : 0.25;
      if(phase === 0) setRepathPoint(e, e.target?.pos || e.pos, 3.8);
      else if(phase === 1) setRepathPoint(e, e.target?.pos || e.pos, 5.2);
      else if(phase === 2) e._stuck.side = (e._stuck.side || 1) * -1;
      else setRepathPoint(e, e.target?.pos || player.pos, 7.5);
    });

    if(e.kind!=="screecherBat"){
      e.pos.y = groundHeight(e.pos.x,e.pos.z);
    }
    e.group.rotation.y = e.heading;
    if(e.kind==="weasel") animateWeaselRig(e.group, 1, e.anim, e.attackAnim, 0);
    else if(e.kind==="spitterBug" || e.kind==="venomLobber") animateSpitterBugRig(e.group, 0.8, e.anim, e.attackAnim);
    else if(e.kind==="titanRam") animateTitanRamRig(e.group, e.titanState==="charge" ? 1.3 : 0.7, e.anim, e.attackAnim);
    else animateMouseRig(e.group, e.kind==="siegeRat" ? 0.55 : 0.95, e.anim, e.attackAnim + (e.heavySwing>0 ? 0.5 : 0), 0);
  }
}

function spawnCat(){
  if(cat || catSpawnTriggered) return;
  catSpawnTriggered = true;
  const catLevelStats = getCatLevelStats();

  const tele = new THREE.Mesh(
    new THREE.CylinderGeometry(3.5,3.5,0.08,24),
    new THREE.MeshBasicMaterial({ color:0xff3333, transparent:true, opacity:0.65 })
  );
  tele.position.set(0, groundHeight(0,0)+0.05, 0);
  scene.add(tele);

  let pulse = 0;
  const pulseId = setInterval(()=>{
    if(gameOver){ clearInterval(pulseId); tele.parent?.remove(tele); return; }
    pulse += 0.08;
    tele.scale.setScalar(1 + Math.sin(pulse*10)*0.12);
    tele.material.opacity = 0.38 + Math.sin(pulse*12)*0.2 + 0.22;
  }, 50);

  setTimeout(()=>{
    clearInterval(pulseId);
    tele.parent?.remove(tele);

    const model = makeCatModel();
    model.position.set(0, groundHeight(0,0), 0);

    const bar = createHealthBar(6.8,0xff4444);
    bar.position.y = 6.8;
    model.add(bar);
    const catTelegraphRing = new THREE.Mesh(
      new THREE.RingGeometry(1.8,2.1,32),
      new THREE.MeshBasicMaterial({ color:0xff8a5e, transparent:true, opacity:0, side:THREE.DoubleSide, depthWrite:false })
    );
    catTelegraphRing.rotation.x = -Math.PI/2;
    catTelegraphRing.position.y = 0.09;
    model.add(catTelegraphRing);
    const catTelegraphArc = new THREE.Mesh(
      new THREE.RingGeometry(0.8,3.0,40,1,-Math.PI*0.24,Math.PI*0.48),
      new THREE.MeshBasicMaterial({ color:0xff533c, transparent:true, opacity:0, side:THREE.DoubleSide, depthWrite:false })
    );
    catTelegraphArc.rotation.x = -Math.PI/2;
    catTelegraphArc.position.y = 0.1;
    model.add(catTelegraphArc);

    cat = {
      group:model,
      pos:model.position,
      hp:catLevelStats.hp,
      maxHp:catLevelStats.hp,
      damage:catLevelStats.damage,
      speed:5.9,
      sprint:8.6,
      radius:2.2,
      attackRange:2.35,
      attackCd:0,
      heading:0,
      turnRate:1.45,
      dead:false,
      dying:false,
      isLiving:true,
      visibleAggro:false,
      prowlTarget:new THREE.Vector3(rand(-40,40),0,rand(-40,40)),
      aggroMemory:0,
      lastSeenPlayerPos:player.pos.clone(),
      anim:0,
      attackAnim:0,
      deathT:0,
      healthBar:bar
      ,abilityCd:0
      ,lungeCd:0
      ,burstT:0
      ,roarCd:8
      ,mode:"hunt"
      ,failedRoute:0
      ,routePersist:0
      ,smartChain:[]
      ,heatTrack:0
      ,attackWindup:0
      ,pendingAttackTarget:null
      ,pendingAttackIsHeavy:false
      ,telegraphRing:catTelegraphRing
      ,telegraphArc:catTelegraphArc
    };

    ui.bossWrap.style.display = "block";
    ui.bossLabel.style.display = "block";
    showCenter(`Level ${currentLevel} Cat Spawned!`, 2.2);
  }, 3000);
}
function catChooseTarget(){
  if(!cat || cat.dead || cat.dying) return null;
  const playerDist = dist2(cat.pos, player.pos);
  const playerVisible = !player.dead && !lineBlockedForCat(cat.pos, player.pos);
  const pursuitMemory = (6.2 + difficulty.catIQ * 2.2 + combatDirector.heat * 2.1);
  if(playerVisible){
    cat.aggroMemory = pursuitMemory;
    cat.lastSeenPlayerPos.copy(player.pos);
    cat.failedRoute = Math.max(0, cat.failedRoute - 1);
    return player;
  }

  if(!player.dead && (cat.aggroMemory > 0 || playerDist < dynamicMapSize)){
    if(cat.aggroMemory <= 0) cat.aggroMemory = pursuitMemory * 0.45;
    if(playerDist < 52) return { pos:cat.lastSeenPlayerPos.clone().lerp(player.pos, 0.35), radius:1.0, isMemoryTarget:true, isPlayerMemory:true };
  }

  if(cat.aggroMemory > 0){
    let nearestServant = null, nearestServantD = 9999;
    for(const m of servantMice){
      if(m.dead || m.dying) continue;
      const d = dist2(cat.pos, m.pos);
      if(d < nearestServantD){ nearestServant = m; nearestServantD = d; }
    }
    let nearestRobot = null, nearestRobotD = 9999;
    for(const r of robots){
      if(r.dead || r.dying) continue;
      const d = dist2(cat.pos, r.pos);
      if(d < nearestRobotD){ nearestRobot = r; nearestRobotD = d; }
    }
    if(cat.failedRoute >= 3 && cat.aggroMemory < 2.7){
      const antiBase = nearestAttackableStructure(cat, 999, s => ["wall","diamondWall","ultraWall","turret","cannon","shardLauncher","sawBlaster","zapCoil","mortarBloom","sniperTower","railGun","barrierTotem","fortPlate"].includes(s.type));
      if(antiBase && dist2(cat.pos, antiBase.pos) < 56) return antiBase;
    }
    if(nearestServant && nearestServantD < 14 && Math.random() < 0.3) return nearestServant;
    if(nearestRobot && nearestRobotD < 14 && Math.random() < 0.22) return nearestRobot;
    return { pos:cat.lastSeenPlayerPos, radius:1.0, isMemoryTarget:true };
  }

  let nearestRobot = null, nearestRobotD = 9999;
  for(const r of robots){
    if(r.dead || r.dying) continue;
    const d = dist2(cat.pos, r.pos);
    if(d < nearestRobotD){ nearestRobot = r; nearestRobotD = d; }
  }
  if(nearestRobot && nearestRobotD < 26) return nearestRobot;

  const bestStructure = nearestAttackableStructure(cat, dynamicMapSize);
  if(bestStructure) return bestStructure;
  return null;
}
function lineBlockedForCat(a,b){
  const dx = b.x-a.x, dz = b.z-a.z;
  const len = Math.hypot(dx,dz);
  const steps = Math.ceil(len/1.5);
  for(let i=1;i<steps;i++){
    const t = i/steps;
    const x = a.x + dx*t;
    const z = a.z + dz*t;
    for(const o of obstacles){
      if(Math.hypot(x-o.x, z-o.z) < o.r + 0.65) return true;
    }
    for(const st of structures){
      if(st.dead || !isWallStructure(st)) continue;
      if(Math.hypot(x-st.pos.x, z-st.pos.z) < st.radius + 0.55) return true;
    }
  }
  return false;
}
function pickDetourWaypoint(entity, targetPos, ignoreStructure=null){
  const toTarget = new THREE.Vector3(targetPos.x - entity.pos.x, 0, targetPos.z - entity.pos.z);
  const dist = toTarget.length();
  if(dist < 4.5) return null;
  toTarget.normalize();
  const normal = new THREE.Vector3(-toTarget.z, 0, toTarget.x);

  const candidates = [];
  const segment = Math.min(13, Math.max(5, dist * 0.45));
  const sideOrder = entity.detourSide ? [entity.detourSide, -entity.detourSide] : (Math.random()<0.5 ? [-1,1] : [1,-1]);
  for(const side of sideOrder){
    for(const offset of [2.8, 4.6, 6.2, 8.0]){
      const wp = new THREE.Vector3(
        entity.pos.x + toTarget.x * segment + normal.x * offset * side,
        0,
        entity.pos.z + toTarget.z * segment + normal.z * offset * side
      );
      wp.x = clamp(wp.x, -dynamicHalfMap+3.2, dynamicHalfMap-3.2);
      wp.z = clamp(wp.z, -dynamicHalfMap+3.2, dynamicHalfMap-3.2);
      wp.y = groundHeight(wp.x, wp.z);
      const radius = entity.radius || 1.1;
      if(circleBlocked(wp.x, wp.z, radius, ignoreStructure)) continue;
      if(lineBlockedForCat(entity.pos, wp)) continue;
      const routeCost = dist2(entity.pos, wp) + dist2(wp, targetPos) + (entity.detourSide === side ? -0.6 : 0.3);
      candidates.push({ wp, routeCost, side });
      for(const cornerOffset of [2.2, -2.2]){
        const wp2 = wp.clone().add(new THREE.Vector3(normal.x*cornerOffset,0,normal.z*cornerOffset));
        wp2.x = clamp(wp2.x, -dynamicHalfMap+3.2, dynamicHalfMap-3.2);
        wp2.z = clamp(wp2.z, -dynamicHalfMap+3.2, dynamicHalfMap-3.2);
        if(circleBlocked(wp2.x, wp2.z, radius, ignoreStructure)) continue;
        if(lineBlockedForCat(wp, wp2) || lineBlockedForCat(wp2, targetPos)) continue;
        candidates.push({ wp, wp2, routeCost:routeCost + dist2(wp,wp2)*0.6, side });
      }
    }
  }
  candidates.sort((a,b)=>a.routeCost - b.routeCost);
  if(candidates[0]){
    entity.detourSide = candidates[0].side;
    entity.smartChain = candidates[0].wp2 ? [candidates[0].wp, candidates[0].wp2] : [candidates[0].wp];
  }
  return candidates[0]?.wp || null;
}
function updateCat(dt){
  if(gamePaused) return;
  if(!cat || cat.dead) return;

  if (cat.dying) {
    cat.deathT += dt;
    cat.group.rotation.z = clamp(cat.deathT * 3.6, 0, Math.PI/2.4);
    cat.group.position.y = groundHeight(cat.pos.x,cat.pos.z) - Math.min(0.9, cat.deathT * 1.0);
    animateCatRig(cat.group, 0, cat.anim, 0, clamp(cat.deathT * 2, 0, 1));
    if (cat.deathT > 0.6) finalizeDeath(cat);
    return;
  }

  cat.anim += dt;
  cat.attackAnim = Math.max(0, cat.attackAnim - dt*3);
  cat.attackCd -= dt;
  cat.attackWindup = Math.max(0, (cat.attackWindup || 0) - dt);
  cat.abilityCd = Math.max(0, (cat.abilityCd || 0) - dt);
  cat.lungeCd = Math.max(0, (cat.lungeCd || 0) - dt);
  cat.roarCd = Math.max(0, (cat.roarCd || 0) - dt);
  cat.burstT = Math.max(0, (cat.burstT || 0) - dt);
  cat.aggroMemory = Math.max(0, cat.aggroMemory - dt);
  cat.repathTimer = Math.max(0, (cat.repathTimer || 0) - dt);
  cat.routePersist = Math.max(0, (cat.routePersist || 0) - dt);

  const target = catChooseTarget();
  const catPhase = Math.max(0, time - 60);
  const catRamp = clamp(catPhase / 420, 0, 1);
  let moveTarget = null;
  let moveSpeed = (cat.speed + catRamp * 0.85) * (cat.burstT > 0 ? (1.42 + catRamp*0.32) : 1);

  if(target){
    moveTarget = target.pos || target;
    cat.visibleAggro = true;
    if(target === player) moveSpeed = cat.sprint * (1 + combatDirector.heat * 0.08);
    else if(target.isMemoryTarget) moveSpeed = cat.sprint * 0.9;
  } else {
    cat.visibleAggro = false;
    if(dist2(cat.pos, cat.prowlTarget) < 4){
      cat.prowlTarget.set(rand(-dynamicHalfMap+18, dynamicHalfMap-18), 0, rand(-dynamicHalfMap+18, dynamicHalfMap-18));
    }
    moveTarget = cat.prowlTarget;
  }
  if(target === player || target?.isPlayerMemory){
    const pv = new THREE.Vector3(Math.sin(player.heading), 0, Math.cos(player.heading)).multiplyScalar(clamp(dist2(cat.pos, player.pos)/9, 0.5, 2.4));
    const intercept = player.pos.clone().addScaledVector(pv, difficulty.catIQ * 0.58);
    if(Math.random() < difficulty.flank + combatDirector.heat * 0.2){
      const side = cat.detourSide || (Math.random() < 0.5 ? -1 : 1);
      const normal = new THREE.Vector3(-pv.z,0,pv.x).normalize().multiplyScalar(2.4 + combatDirector.heat*3.2);
      intercept.addScaledVector(normal, side);
    }
    moveTarget = intercept;
  }
  const canPathDirect = !lineBlockedForCat(cat.pos, moveTarget);
  if(canPathDirect){
    cat.smartWaypoint = null;
    cat.smartChain = [];
    cat.failedRoute = Math.max(0, cat.failedRoute - dt*0.8);
  } else if(!cat.smartWaypoint || dist2(cat.pos, cat.smartWaypoint) < 1.7 || Math.random() < 0.03){
    cat.smartWaypoint = pickDetourWaypoint(cat, moveTarget, target && target.type ? target : null);
    if(!cat.smartWaypoint) cat.failedRoute += dt * 0.8;
    cat.routePersist = 1.2 + difficulty.catIQ * 0.8;
  }
  if(cat.smartChain?.length){
    if(dist2(cat.pos, cat.smartChain[0]) < 1.8) cat.smartChain.shift();
    if(cat.smartChain[0]) cat.smartWaypoint = cat.smartChain[0];
  }
  if(cat.smartWaypoint) moveTarget = cat.smartWaypoint;
  if(cat.repathTimer > 0 && cat.repathTarget) moveTarget = cat.repathTarget;

  const d = dist2(cat.pos, moveTarget);
  if(!target?.isMemoryTarget && target && d < 9.5 && target===player && cat.burstT<=0 && cat.abilityCd<=0 && Math.random()<0.013*difficulty.specials){
    cat.burstT = 0.85;
    cat.abilityCd = 5.7 / difficulty.specials;
    addBurst(cat.pos.x,cat.pos.y+2.3,cat.pos.z,0xff8b52,16,5.6,0.62,0.1);
  }
  if(!target?.isMemoryTarget && target===player && cat.lungeCd<=0 && d < meleeStopDistance(cat, player, 1.45) && d > meleeStopDistance(cat, player, 0.2) && Math.random() < 0.014 * difficulty.specials){
    const dir = new THREE.Vector3(moveTarget.x-cat.pos.x,0,moveTarget.z-cat.pos.z).normalize();
    const lunge = collisionPushOut(cat.pos.x + dir.x*3.2, cat.pos.z + dir.z*3.2, cat.radius, true, null);
    cat.pos.x = lunge.x; cat.pos.z = lunge.z;
    cat.lungeCd = 8.8 / difficulty.specials;
    addBurst(cat.pos.x,cat.pos.y+2.0,cat.pos.z,0xffb067,14,4.2,0.52,0.09);
  }

  if(d > meleeStopDistance(cat, target || {radius:0.5}, 0.22)){
    const step = directSteerToward({ pos:cat.pos, speed:moveSpeed, radius:cat.radius }, moveTarget, dt, true, (target && !isWallStructure(target)) ? null : target);
    if(step){
      cat.heading += clamp(angleDiff(cat.heading, step.heading), -cat.turnRate*dt, cat.turnRate*dt);
      cat.pos.x = step.x;
      cat.pos.z = step.z;
    }
  } else if(target && !target.isMemoryTarget && cat.attackCd <= 0 && cat.repathTimer <= 0){
    cat.attackCd = 1.22 - catRamp * 0.18;
    cat.attackWindup = 0.2;
    cat.pendingAttackTarget = target;
    cat.pendingAttackIsHeavy = dist2(cat.pos, target.pos || target) < 3.4;
    cat.attackAnim = 0.65;
  }
  if(cat.attackWindup > 0 && cat.pendingAttackTarget){
    const pulse = 0.5 + Math.sin(time*24) * 0.5;
    if(cat.telegraphRing) cat.telegraphRing.material.opacity = (0.2 + pulse * 0.28) * (cat.pendingAttackIsHeavy ? 1 : 0.65);
    if(cat.telegraphArc){
      cat.telegraphArc.material.opacity = (0.3 + pulse * 0.44) * (cat.pendingAttackIsHeavy ? 1 : 0.7);
      cat.telegraphArc.rotation.z = -cat.heading + Math.PI/2;
    }
    if(cat.attackWindup <= 0.001){
      const hitTarget = cat.pendingAttackTarget;
      cat.pendingAttackTarget = null;
      cat.attackAnim = 1;
      const dx = Math.sin(cat.heading), dz = Math.cos(cat.heading);
      addBurst(cat.pos.x + dx*1.5, cat.pos.y+2.0, cat.pos.z + dz*1.5, 0xff7f50, 20, 6, 0.7, 0.09);
      const catDamage = cat.damage + catRamp * 10;
      const catStructureDamage = cat.damage * 1.08 + catRamp * 12;
      if(hitTarget === player) applyDamageToLiving(player, catDamage, cat.pos);
      else if(isLivingTarget(hitTarget)) applyDamageToLiving(hitTarget, catDamage * 1.12, hitTarget.pos);
      else if(hitTarget && !hitTarget.dead) damageStructure(hitTarget, catStructureDamage * (cat.failedRoute > 2 ? 1.45 : 1));
    }
  }
  if(cat.telegraphRing && cat.attackWindup <= 0){ cat.telegraphRing.material.opacity = 0; }
  if(cat.telegraphArc && cat.attackWindup <= 0){ cat.telegraphArc.material.opacity = 0; }
  if(cat.roarCd <= 0 && difficulty.specials > 1 && target===player && dist2(cat.pos, player.pos) < 14 && servantMice.length > 1){
    cat.roarCd = 14 / difficulty.specials;
    addBurst(cat.pos.x, cat.pos.y+2.3, cat.pos.z, 0xff6d43, 20, 6.5, 0.8, 0.1);
    for(const m of servantMice){
      if(m.dead || m.dying) continue;
      if(dist2(m.pos, cat.pos) < 15){
        m.repathTimer = Math.max(m.repathTimer || 0, 0.9);
        setRepathPoint(m, player.pos, 8.5);
      }
    }
  }
  updateAgentStuck(cat, dt, !!target, (phase)=>{
    cat.failedRoute += 0.8;
    cat.detourSide = phase % 2 ? -1 : 1;
    setRepathPoint(cat, target?.pos || player.pos, phase >= 2 ? 12.5 : 7.5);
    if(target && (target === player || target?.isPlayerMemory)) cat.aggroMemory = Math.max(cat.aggroMemory, 4.5 + difficulty.catIQ * 1.8);
  });

  cat.pos.y = groundHeight(cat.pos.x,cat.pos.z);
  cat.group.rotation.y = cat.heading;
  animateCatRig(cat.group, cat.visibleAggro ? 1 : 0.5, cat.anim, cat.attackAnim, 0);
  ui.bossBar.style.width = (100 * Math.max(0, cat.hp/cat.maxHp)) + "%";
  ui.bossLabel.textContent = "CAT BOSS • HP " + Math.ceil(Math.max(0, cat.hp)) + " / " + Math.ceil(cat.maxHp);
}

function nearestEnemyInRange(origin, range){
  let best = null, bestD = range;
  for (const e of enemies) {
    if (!isEnemyTargetable(e)) continue;
    const d = dist2(origin.pos || origin, e.pos);
    if (d < bestD) { bestD = d; best = e; }
  }
  if (cat && !cat.dead && !cat.dying) {
    const d = dist2(origin.pos || origin, cat.pos);
    if (d < bestD) { bestD = d; best = cat; }
  }
  return best;
}
function updateStructureShieldFx(s, dt){
  if(s.dead) return;
  if(s.shield > 0.01){
    if(!s.shieldFx){
      const aura = new THREE.Mesh(
        new THREE.TorusGeometry(Math.max(0.7, s.radius * 0.72), 0.07, 10, 22),
        new THREE.MeshBasicMaterial({ color:0x8fd0ff, transparent:true, opacity:0.0, depthWrite:false })
      );
      aura.rotation.x = Math.PI/2;
      aura.position.y = 0.15;
      s.mesh.add(aura);
      s.shieldFx = aura;
    }
    const frac = clamp(s.shield / Math.max(1, s.maxShield || BARRIER_SHIELD_MAX), 0, 1);
    s.shieldFx.visible = true;
    s.shieldFx.scale.setScalar(1 + Math.sin(time*5 + s.pos.x*0.1)*0.03 + frac*0.08);
    s.shieldFx.material.opacity = 0.16 + frac * 0.25;
  } else if(s.shieldFx){
    s.shieldFx.visible = false;
  }
}

function robotTarget(r){
  let best = null;
  let bestD = 9999;

  for (const e of enemies) {
    if (!isEnemyTargetable(e)) continue;
    const d = dist2(r.pos, e.pos);
    if (d < bestD) {
      bestD = d;
      best = e;
    }
  }

  if (cat && !cat.dead && !cat.dying) {
    const d = dist2(r.pos, cat.pos);
    if (d < bestD) {
      bestD = d;
      best = cat;
    }
  }

  return best;
}

function updateRobots(dt){
  if(gamePaused) return;
  for (let i = robots.length - 1; i >= 0; i--) {
    const r = robots[i];

    if (r.dead) {
      robots.splice(i, 1);
      continue;
    }

    if (r.hp <= 0 && !r.dying) {
      r.dying = true;
      r.deathT = 0;
      addBurst(r.pos.x, r.pos.y + 0.8, r.pos.z, 0x9fd5ff, 12, 4.5, 0.6, 0.09);
    }

    if (r.dying) {
      r.deathT += dt;
      r.group.rotation.z = clamp(r.deathT * 4.2, 0, Math.PI / 2.2);
      r.group.position.y = groundHeight(r.pos.x, r.pos.z) - Math.min(0.35, r.deathT * 0.5);
      if (r.deathT > 0.4) {
        r.group.parent?.remove(r.group);
        r.dead = true;
        robots.splice(i, 1);
      }
      continue;
    }

    r.anim += dt * 9;
    r.fireCd -= dt;
    r.repathTimer = Math.max(0, (r.repathTimer || 0) - dt);

    const t = robotTarget(r);

    if (r.mech && dist2(r.pos, player.pos) > 14) {
      const step = directSteerToward({ pos:r.pos, speed:r.speed, radius:r.radius }, player.pos, dt, false, null, robots);
      if(step){ r.group.rotation.y = step.heading; r.pos.x = step.x; r.pos.z = step.z; }
    } else if (t) {
      const d = dist2(r.pos, t.pos);

      const robotMoveTarget = (r.repathTimer > 0 && r.repathTarget) ? r.repathTarget : t.pos;
      if (d > 2.2) {
        const step = directSteerToward(
          { pos: r.pos, speed: r.speed, radius: r.radius },
          robotMoveTarget,
          dt,
          false,
          null,
          robots
        );

        if (step) {
          r.group.rotation.y = step.heading;
          r.pos.x = step.x;
          r.pos.z = step.z;
        }
      } else if (r.fireCd <= 0) {
        if(r.advanced || r.mech){
          r.fireCd = r.mech ? 1.55 : 1.1;
          addBurst(t.pos.x, t.pos.y + 1.2, t.pos.z, 0xff6666, 4, 1.3, 0.2, 0.04);
          const from = new THREE.Vector3(r.pos.x, r.pos.y + (r.mech?2.3:1.8), r.pos.z);
          const to = new THREE.Vector3(t.pos.x, t.pos.y + 1, t.pos.z);
          addLightningArc(from, to, 0.09, r.mech ? 0xffaa55 : 0x7ee8ff);
          applyDamageToLiving(t, r.damage, t.pos);
          if(r.mech){
            for(const e of enemies){
              if(!isEnemyTargetable(e)) continue;
              const dd = dist2(e.pos, t.pos);
              if(dd < 2.8){
                applyDamageToLiving(e, r.damage * Math.max(0.35, 1 - dd/2.8), t.pos);
                const kb = new THREE.Vector3(e.pos.x - t.pos.x, 0, e.pos.z - t.pos.z).normalize().multiplyScalar(0.65);
                e.pos.x += kb.x; e.pos.z += kb.z;
              }
            }
          }
        } else {
          r.fireCd = 0.55;
          addBurst(r.pos.x, r.pos.y + 1.1, r.pos.z, 0x9fecff, 5, 2.5, 0.24, 0.05);
          applyDamageToLiving(t, r.damage, t.pos);
        }
      }
      updateAgentStuck(r, dt, true, ()=> setRepathPoint(r, t.pos, 3.6));
    } else {
      if (dist2(r.pos, player.pos) > 6) {
        const step = directSteerToward(
          { pos: r.pos, speed: r.speed * 0.7, radius: r.radius },
          player.pos,
          dt,
          false,
          null,
          robots
        );

        if (step) {
          r.group.rotation.y = step.heading;
          r.pos.x = step.x;
          r.pos.z = step.z;
        }
      }
    }

    r.pos.y = groundHeight(r.pos.x, r.pos.z);
    r.group.position.y += Math.sin(r.anim * (r.advanced||r.mech?5:3)) * (r.mech?0.05:0.02);
  }
}
function updateRepairBeams(dt) {
  for (const s of structures) {
    if (s.dead || s.type !== "fountain") {
      if (s && s.beam) s.beam.visible = false;
      continue;
    }

    const orb = s.mesh.userData.orb;
    if (orb) {
      orb.position.y = 1.95 + Math.sin(time*5)*0.08;
      orb.rotation.y += dt*2;
    }

    let best = null, bestScore = 9999;
    for (const t of structures) {
      if (t === s || t.dead) continue;
      if (t.hp >= t.maxHp) continue;
      const d = dist2(s.pos, t.pos);
      if (d > 12) continue;
      const score = d + (1 - t.hp / t.maxHp) * -6;
      if (score < bestScore) {
        bestScore = score;
        best = t;
      }
    }

    const beam = ensureRepairBeam(s);
    if (!best) {
      beam.visible = false;
      continue;
    }

    const from = new THREE.Vector3(s.pos.x, s.pos.y + 1.95, s.pos.z);
    const to = new THREE.Vector3(best.pos.x, best.pos.y + 1.2, best.pos.z);
    const mid = from.clone().add(to).multiplyScalar(0.5);
    const dir = to.clone().sub(from);
    const len = dir.length();

    beam.visible = true;
    beam.position.copy(mid);
    beam.scale.set(1, len, 1);
    beam.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
    beam.material.opacity = 0.78 + Math.sin(time*16)*0.18;

    best.hp = Math.min(best.maxHp, best.hp + 6.5 * dt);
    setHealthBar(best.mesh.userData.healthBar, best.hp / best.maxHp);
    updateWallDamageVisual(best);

    if (Math.random() < 0.18) {
      addCogParticle(best.pos.x + rand(-0.45,0.45), best.pos.y + rand(0.9,2.0), best.pos.z + rand(-0.45,0.45));
    }
  }
}

      }

    if(s.type==="launcher" && canRun){

      });
      if(Math.random() < 0.02){

        const b = new THREE.Vector3(s.pos.x + rand(-1.25,1.25), s.pos.y + rand(1.2,3.6), s.pos.z + rand(-1.25,1.25));

      const t = nearestEnemyInRange(s, 22 * atk.rangeMult);
      if (t && headPivot) {
        smoothAimYaw(headPivot, s, "aimYaw", Math.atan2(t.pos.x - s.pos.x, t.pos.z - s.pos.z), dt, 8.8);
      }
      if (t && s.fireCd <= 0) {
        s.fireCd = 0.42 / (buff.speed * atk.speedMult * screechDebuffMult);
        const dir = new THREE.Vector3(t.pos.x-s.pos.x,0,t.pos.z-s.pos.z).normalize();
        spawnProjectile({
          pos:new THREE.Vector3(s.pos.x,s.pos.y+1.7,s.pos.z).add(dir.clone().multiplyScalar(1.2)),
          vel:new THREE.Vector3(dir.x*20,1.8,dir.z*20),
          damage:7*buff.damage*late*atk.damageMult*engDamage,
          splash:0,
          color:0xffe16c,
          size:0.12,
          from:"ally",
          kind:"pellet"
        });
        addBurst(s.pos.x+dir.x*1.2,s.pos.y+1.6,s.pos.z+dir.z*1.2,0xffe16c,4,2,0.18,0.04);
      }
    }

    if(s.type==="cannon"){
      s.fireCd -= dt;
      const late = getTowerLateScale("cannon");
      const barrelPivot = s.mesh.userData.barrelPivot;
      const t = nearestEnemyInRange(s, 28 * atk.rangeMult);
      if (t && barrelPivot) {
        smoothAimYaw(barrelPivot, s, "aimYaw", Math.atan2(t.pos.x - s.pos.x, t.pos.z - s.pos.z), dt, 6.8);
        const horiz = Math.hypot(t.pos.x-s.pos.x, t.pos.z-s.pos.z);
        const pitch = -clamp(horiz/40, 0.25, 0.55);
        s.aimPitch = THREE.MathUtils.lerp(s.aimPitch ?? barrelPivot.rotation.x, pitch, clamp(dt*6.5, 0, 1));
        barrelPivot.rotation.x = s.aimPitch;
      }
      if (t && s.fireCd <= 0) {
        s.fireCd = 1.8 / (buff.speed * atk.speedMult * screechDebuffMult);
        const dx = t.pos.x - s.pos.x;
        const dz = t.pos.z - s.pos.z;
        const d = Math.hypot(dx,dz);
        const dir = new THREE.Vector3(dx/d,0,dz/d);
        spawnProjectile({
          pos:new THREE.Vector3(s.pos.x,s.pos.y+2.1,s.pos.z),
          vel:new THREE.Vector3(dir.x*10.5,8.5,dir.z*10.5),
          damage:28*buff.damage*late*atk.damageMult*engDamage,
          splash:2.8,
          color:0xffb34d,
          size:0.28,
          from:"ally",
          kind:"cannon"
        });
        addBurst(s.pos.x,s.pos.y+2.1,s.pos.z,0xffc766,8,3,0.35,0.05);
      }
    }

    if(s.type==="shardLauncher"){
      s.fireCd -= dt;
      const late = getTowerLateScale("shardLauncher");
      const prongs = s.mesh.userData.prongs;
      const t = nearestPriorityEnemyInRange(s, 20 * atk.rangeMult, ["siegeRat","spitterBug","burrowMole"]);
      if (t && prongs) {
        smoothAimYaw(prongs, s, "aimYaw", Math.atan2(t.pos.x - s.pos.x, t.pos.z - s.pos.z), dt, 9.1);
      }
      if (t && s.fireCd <= 0) {
        s.fireCd = 0.82 / (buff.speed * atk.speedMult * screechDebuffMult);
        const baseDir = new THREE.Vector3(t.pos.x-s.pos.x,0,t.pos.z-s.pos.z).normalize();
        for (const spread of [-0.16, 0, 0.16]) {
          const a = Math.atan2(baseDir.x, baseDir.z) + spread;
          const dir = new THREE.Vector3(Math.sin(a),0,Math.cos(a));
          spawnProjectile({
            pos:new THREE.Vector3(s.pos.x,s.pos.y+1.5,s.pos.z).add(dir.clone().multiplyScalar(0.7)),
            vel:new THREE.Vector3(dir.x*17,2.0,dir.z*17),
            damage:5.5*buff.damage*late*atk.damageMult*engDamage,
            splash:0,
            color:0xffd9b3,
            size:0.10,
            from:"ally",
            kind:"shard"
          });
        }
        addBurst(s.pos.x,s.pos.y+1.4,s.pos.z,0xffe2c1,5,2.1,0.22,0.04);
      }
    }

    if(s.type==="zapCoil" && canRun){
      s.fireCd -= dt;
      const late = getTowerLateScale("zapCoil");
      const coil = s.mesh.userData.coil;
      const cap = s.mesh.userData.coilCap;
      if (coil) coil.rotation.z += dt * 3.9;
      if (cap) {
        cap.rotation.y += dt * 4.4;
        cap.position.y = 1.55 + Math.sin(time*6)*0.05;
      }
      const t = nearestPriorityEnemyInRange(s, 9.5 * atk.rangeMult, ["titanRam","siegeRat","spitterBug","burrowMole","cat"]);
      if (t && s.fireCd <= 0) {
        s.fireCd = 2.05 / (buff.speed * atk.speedMult * screechDebuffMult);
        const stunned = new Set();
        let previousPoint = new THREE.Vector3(s.pos.x, s.pos.y + 1.45, s.pos.z);
        let current = t;
        let remainingBounces = 5;
        while(current && remainingBounces >= 0){
          applyDamageToLiving(current, 16.5 * buff.damage * late * atk.damageMult * engDamage, current.pos);
          setEnemyStunned(current, 0.5);
          stunned.add(current);
          const hitPoint = new THREE.Vector3(current.pos.x, current.pos.y + 1.0, current.pos.z);
          addLightningArc(previousPoint, hitPoint, 0.12, remainingBounces === 3 ? 0xd7dcff : 0xbec4ff);
          addBurst(hitPoint.x, hitPoint.y, hitPoint.z, 0xbec4ff, 4, 1.8, 0.16, 0.035);
          let next = null;
          let bestD = 999;
          for(const e of enemies){
            if(!isEnemyTargetable(e) || stunned.has(e)) continue;
            const ed = dist2(current.pos, e.pos);
            if(ed < 6.2 && ed < bestD){
              bestD = ed;
              next = e;
            }
          }
          previousPoint = hitPoint;
          current = next;
          remainingBounces--;
        }
      }
    }

    if(s.type==="mortarBloom" && canRun){
      s.fireCd -= dt;
      const late = getTowerLateScale("mortarBloom");
      const flower = s.mesh.userData.flower;
      if (flower) flower.rotation.y += dt * 1.2;
      const t = nearestPriorityEnemyInRange(s, 28 * atk.rangeMult, ["titanRam","siegeRat","spitterBug","burrowMole","cat"]);
      if (t && s.fireCd <= 0) {
        s.fireCd = 2.15 / (buff.speed * atk.speedMult * screechDebuffMult);
        const dx = t.pos.x - s.pos.x;
        const dz = t.pos.z - s.pos.z;
        const d = Math.hypot(dx,dz);
        const dir = new THREE.Vector3(dx/d,0,dz/d);
        spawnProjectile({
          pos:new THREE.Vector3(s.pos.x,s.pos.y+1.9,s.pos.z),
          vel:new THREE.Vector3(dir.x*9.2,9.4,dir.z*9.2),
          damage:58*buff.damage*late*atk.damageMult*engDamage,
          splash:4.7,
          color:0xff9dbc,
          size:0.24,
          from:"ally",
          kind:"mortar"
        });
        addBurst(s.pos.x,s.pos.y+1.7,s.pos.z,0xffbfd0,8,2.6,0.28,0.05);
      }
    }

    if(s.type==="sawBlaster" && canRun){
      s.fireCd -= dt;
      const late = getTowerLateScale("sawBlaster");
      const headPivot = s.mesh.userData.headPivot;
      const t = nearestPriorityEnemyInRange(s, 16 * atk.rangeMult, ["titanRam","siegeRat","spitterBug","burrowMole","cat"]);
      if (headPivot) headPivot.rotation.z += dt * 10;
      if (t && headPivot) {
        smoothAimYaw(headPivot, s, "aimYaw", Math.atan2(t.pos.x - s.pos.x, t.pos.z - s.pos.z), dt, 11.5);
      }
      if (t && s.fireCd <= 0) {
        s.fireCd = 0.95 / (buff.speed * atk.speedMult * screechDebuffMult);
        applyDamageToLiving(t, 34 * buff.damage * late * atk.damageMult * engDamage, t.pos);
        addBurst(t.pos.x, t.pos.y+0.9, t.pos.z, 0xffc1a8, 8, 3, 0.35, 0.05);
      }
    }
    if(s.type==="sniperTower" && canRun){
      const late = getTowerLateScale("sniperTower");
      s.fireCd -= dt;
      const headPivot = s.mesh.userData.headPivot;
      const barrel = s.mesh.userData.sniperBarrel;
      const lens = s.mesh.userData.sniperLens;
      if((!s.lockedTarget || s.lockedTarget.dead || s.lockedTarget.dying || dist2(s.pos, s.lockedTarget.pos) > 54 * atk.rangeMult) && s.chargeT <= 0){
        s.lockedTarget = nearestPriorityEnemyInRange(s, 54 * atk.rangeMult, ["titanRam","siegeRat","cat","spitterBug","burrowMole"]);
      }
      const t = s.lockedTarget || nearestPriorityEnemyInRange(s, 54 * atk.rangeMult, ["titanRam","siegeRat","cat","spitterBug","burrowMole"]);
      if(t && headPivot){
        smoothAimYaw(headPivot, s, "aimYaw", Math.atan2(t.pos.x - s.pos.x, t.pos.z - s.pos.z), dt, 6.2);
      }
      if(t && s.fireCd <= 0){
        s.chargeT = Math.min(1.25, (s.chargeT || 0) + dt);
        const frac = clamp((s.chargeT || 0) / 1.25, 0, 1);
        if(barrel?.material) barrel.material.emissiveIntensity = 0.3 + frac * 1.25;
        if(lens?.material) lens.material.emissiveIntensity = 0.7 + frac * 1.5;
        if(Math.random() < 0.15 + frac * 0.2){
          addBurst(t.pos.x, t.pos.y + 0.25, t.pos.z, 0x9cd2ff, 1, 0.6, 0.18, 0.035);
        }
        if(frac >= 1){
          s.fireCd = 3.5 / (buff.speed * atk.speedMult * screechDebuffMult);
          s.chargeT = 0;
          const from = new THREE.Vector3(s.pos.x, s.pos.y + 2.0, s.pos.z);
          const to = new THREE.Vector3(t.pos.x, t.pos.y + 1.0, t.pos.z);
          addLightningArc(from, to, 0.2, 0xaed6ff);
          applyDamageToLiving(t, 245 * buff.damage * late * atk.damageMult * engDamage, t.pos);
          addBurst(t.pos.x, t.pos.y + 1.0, t.pos.z, 0xd2e7ff, 14, 4.8, 0.46, 0.08);
          s.lockedTarget = null;
        }
      } else {
        s.chargeT = 0;
        if(barrel?.material) barrel.material.emissiveIntensity = 0.35;
        if(lens?.material) lens.material.emissiveIntensity = 0.8 + Math.sin(time*7)*0.22;
      }
    }
    if(s.type==="railGun" && canRun){
      const late = getTowerLateScale("railGun");
      s.fireCd -= dt;
      const headPivot = s.mesh.userData.headPivot;
      const core = s.mesh.userData.railCore;
      const t = nearestPriorityEnemyInRange(s, 46 * atk.rangeMult, ["siegeRat","titanRam","spitterBug","burrowMole","cat"]);
      if(t && headPivot){
        smoothAimYaw(headPivot, s, "aimYaw", Math.atan2(t.pos.x - s.pos.x, t.pos.z - s.pos.z), dt, 4.2);
      }
      if(t && s.fireCd <= 0){
        s.chargeT = Math.min(1.45, (s.chargeT || 0) + dt);
        const frac = clamp((s.chargeT || 0) / 1.45, 0, 1);
        if(core?.material) core.material.emissiveIntensity = 0.45 + frac * 1.45;
        if(frac >= 1){
          s.fireCd = 4.5 / (buff.speed * atk.speedMult * screechDebuffMult);
          s.chargeT = 0;
          const from = new THREE.Vector3(s.pos.x, s.pos.y + 1.7, s.pos.z);
          const forward = new THREE.Vector3(Math.sin(s.aimYaw || 0), 0, Math.cos(s.aimYaw || 0)).normalize();
          const maxDist = 44;
          const hits = [];
          for(const e of enemies){
            if(!isEnemyTargetable(e)) continue;
            const toE = new THREE.Vector3(e.pos.x - from.x, 0, e.pos.z - from.z);
            const along = toE.dot(forward);
            if(along < 0 || along > maxDist) continue;
            const perp = new THREE.Vector3().copy(toE).addScaledVector(forward, -along).length();
            if(perp <= e.radius + 0.62) hits.push({ e, along });
          }
          if(cat && !cat.dead && !cat.dying){
            const toCat = new THREE.Vector3(cat.pos.x - from.x, 0, cat.pos.z - from.z);
            const along = toCat.dot(forward);
            if(along >= 0 && along <= maxDist){
              const perp = new THREE.Vector3().copy(toCat).addScaledVector(forward, -along).length();
              if(perp <= cat.radius + 0.82) hits.push({ e:cat, along });
            }
          }
          hits.sort((a,b)=>a.along-b.along);
          let remaining = 10;
          for(let hi=0; hi<hits.length && remaining>0; hi++, remaining--){
            const falloff = 1 - hi * 0.08;
            applyDamageToLiving(hits[hi].e, 230 * buff.damage * late * atk.damageMult * engDamage * Math.max(0.64, falloff), hits[hi].e.pos);
            addBurst(hits[hi].e.pos.x, hits[hi].e.pos.y+1.0, hits[hi].e.pos.z, 0xbdd9ff, 7, 3.0, 0.28, 0.06);
          }
          const end = from.clone().addScaledVector(forward, maxDist);
          addLightningArc(from, end, 0.22, 0x9fc4ff);
        }
      } else {
        s.chargeT = 0;
        if(core?.material) core.material.emissiveIntensity = 0.55 + Math.sin(time*8)*0.2;
      }
    }
  }
}

document.addEventListener("keydown", e=>{
  const k = e.key.toLowerCase();
  keys[k] = true;
  if(k === "escape" && activeTowerMenu){ setTowerMenuOpen(false); return; }
  if(k === "e" && nearestTowerOfCheese){ setTowerMenuOpen(!activeTowerMenu); return; }
  if(activeTowerMenu) return;

  const map = getBuildShortcutMap(currentCategory);
  if(currentCategory !== 1 && map.has(k)){
    currentSelectionSlot = map.get(k);
    updateBuildUI();
  } else if (e.key === "1") { currentCategory = 1; currentSelectionSlot = null; updateBuildUI(); }
  else if (e.key === "2") { currentCategory = 2; if (currentSelectionSlot == null) currentSelectionSlot = CATEGORY_BUILDS[2][0].slot; updateBuildUI(); }
  else if (e.key === "3") { currentCategory = 3; if (currentSelectionSlot == null) currentSelectionSlot = CATEGORY_BUILDS[3][0].slot; updateBuildUI(); }
  else if (e.key === "4") { currentCategory = 4; if (currentSelectionSlot == null) currentSelectionSlot = CATEGORY_BUILDS[4][0].slot; updateBuildUI(); }
  else if (k === "q") { currentCategory = 5; if (currentSelectionSlot == null) currentSelectionSlot = CATEGORY_BUILDS[5][0].slot; updateBuildUI(); }
  else if (k === "x") { currentCategory = 1; currentSelectionSlot = null; updateBuildUI(); }

  if(e.code === "Space"){
    e.preventDefault();
    tryPlaceStructure();
  }
});
document.addEventListener("keyup", e=> keys[e.key.toLowerCase()] = false);

function updatePlayer(dt){
  if(gamePaused) return;
  if(player.dead) {
    player.deathT += dt;
    player.group.rotation.z = clamp(player.deathT * 4.2, 0, Math.PI/2.2);
    player.group.position.y = groundHeight(player.pos.x, player.pos.z) - Math.min(0.45, player.deathT * 0.65);
    animateMouseRig(player.group, 0, player.animTime, 0, clamp(player.deathT * 2, 0, 1));
    return;
  }
  if(levelTransitionActive) return;

  player.travel.stateTime += dt;
  player.travel.inputLock = Math.max(0, player.travel.inputLock - dt);
  player.travel.launcherCooldown = Math.max(0, player.travel.launcherCooldown - dt);
  player.travel.teleporterCooldown = Math.max(0, player.travel.teleporterCooldown - dt);

  const controlLocked = player.travel.inputLock > 0 || player.travel.state !== PLAYER_TRAVEL_STATES.normal;
  const turnDir = controlLocked ? 0 : (keys["a"] ? 1 : 0) + (keys["d"] ? -1 : 0);
  player.heading += turnDir * player.turnSpeed * dt;

  let moveInput = 0;
  if(!controlLocked){
    if(keys["w"]) moveInput += 1;
    if(keys["s"]) moveInput -= 0.55;
  }

  if(player.travel.state === PLAYER_TRAVEL_STATES.launching && player.travel.stateTime > 0.28){
    setPlayerTravelState(PLAYER_TRAVEL_STATES.airborne);
  }
  if(player.travel.state === PLAYER_TRAVEL_STATES.teleporting && player.travel.stateTime > 0.08){
    setPlayerTravelState(PLAYER_TRAVEL_STATES.landingRecovery);
    player.travel.landingRecovery = 0.2;
  }
  if(player.travel.state === PLAYER_TRAVEL_STATES.landingRecovery){
    player.travel.landingRecovery -= dt;
    if(player.travel.landingRecovery <= 0){
      setPlayerTravelState(PLAYER_TRAVEL_STATES.normal);
    }
  }

  if(player.travel.state === PLAYER_TRAVEL_STATES.airborne && player.travel.launchData){
    const launch = player.travel.launchData;
    if(!launch.dropMode){
      launch.t = clamp(launch.t + dt / launch.duration, 0, 1);
      const nx = THREE.MathUtils.lerp(launch.start.x, launch.end.x, launch.t);
      const nz = THREE.MathUtils.lerp(launch.start.z, launch.end.z, launch.t);
      if(!isWithinMapBounds(nx, nz, 2.4)){
        launch.dropMode = true;
        launch.dropVel = 0;
        launch.dropStartY = Math.max(player.pos.y, groundHeight(player.pos.x, player.pos.z) + launch.arcHeight * (1 - launch.t*0.45));
      } else {
        const arc = Math.sin(launch.t * Math.PI) * launch.arcHeight;
        player.pos.x = nx;
        player.pos.z = nz;
        player.pos.y = groundHeight(nx, nz) + arc;
      }
    }
    if(launch.dropMode){
      launch.dropVel += 34 * dt;
      player.pos.y = Math.max(groundHeight(player.pos.x, player.pos.z), (player.pos.y || launch.dropStartY) - launch.dropVel * dt);
      if(player.pos.y <= groundHeight(player.pos.x, player.pos.z) + 0.01){
        player.pos.y = groundHeight(player.pos.x, player.pos.z);
        player.travel.launchData = null;
        setPlayerTravelState(PLAYER_TRAVEL_STATES.landingRecovery);
        player.travel.landingRecovery = 0.22;
        addBurst(player.pos.x, player.pos.y+0.2, player.pos.z, 0xd6faff, 18, 3.8, 0.48, 0.08);
      }
    } else if(launch.t >= 1){
      player.pos.x = launch.end.x;
      player.pos.z = launch.end.z;
      if(launch.clippedToEdge){
        launch.dropMode = true;
        launch.dropVel = 0;
        player.pos.y = groundHeight(player.pos.x, player.pos.z) + launch.arcHeight * 0.42;
      } else {
        player.pos.y = groundHeight(player.pos.x, player.pos.z);
        player.travel.launchData = null;
        setPlayerTravelState(PLAYER_TRAVEL_STATES.landingRecovery);
        player.travel.landingRecovery = 0.22;
        addBurst(player.pos.x, player.pos.y+0.2, player.pos.z, 0xd6faff, 18, 3.8, 0.48, 0.08);
      }
    }
  }

  const sprinting = keys["shift"] && moveInput > 0;
  const speed = sprinting ? player.sprintSpeed : player.moveSpeed;
  const vel = moveInput * speed;
  const forward = { x:Math.sin(player.heading), z:Math.cos(player.heading) };

  if(Math.abs(vel) > 0.01 && player.travel.state === PLAYER_TRAVEL_STATES.normal){
    const desired = { x:forward.x * Math.sign(vel), z:forward.z * Math.sign(vel) };
    const step = steerMove({ pos:player.pos, speed:Math.abs(vel), radius:player.radius }, desired, dt, false);
    if(step){
      player.pos.x = step.x;
      player.pos.z = step.z;
    }
    player.animTime += dt * (sprinting ? 1.5 : 1.0) * Math.abs(moveInput);
  }

  if(player.travel.state !== PLAYER_TRAVEL_STATES.airborne){
    player.pos.y = groundHeight(player.pos.x,player.pos.z);
  }
  player.group.position.copy(player.pos);
  player.group.rotation.y = player.heading;
  const airborneAnim = player.travel.state === PLAYER_TRAVEL_STATES.airborne ? 0.55 : 0;
  animateMouseRig(player.group, Math.abs(moveInput), player.animTime, player.attackAnim, airborneAnim);

  for(let i=cheeses.length-1;i>=0;i--){
    const c = cheeses[i];
    if(dist2(player.pos,c.pos) < 1.25){
      cheese += c.amount;
      addBurst(c.pos.x,c.pos.y+0.3,c.pos.z,0xffec71,8,4,0.4,0.08);
      c.group.parent?.remove(c.group);
      cheeses.splice(i,1);
    }
  }

  const selected = getSelectedBuildData();
  if(!selected){
    buildGridOverlay.visible = false;
    buildTelegraph.visible = false;
    setBuildPreview(null,0,0,false);
  } else {
    buildGridOverlay.visible = true;
    const p = getBuildPlace();
    updateBuildGridOverlay(p.x, p.z);
    const valid = getBuildValidation(selected, p.x, p.z).ok && cheese >= selected.cost && gas >= (selected.gasCost||0);
    buildTelegraph.visible = true;
    buildTelegraph.position.set(p.x, p.y+0.06, p.z);
    buildTelegraph.material.color.set(valid ? 0x66ff99 : 0xff5555);
    setBuildPreview(selected.type, p.x, p.z, valid);
  }
}
function tryPlaceStructure(){
  const selected = getSelectedBuildData();
  if(gameOver || levelTransitionActive || !selected) return;
  if(cheese < selected.cost){ showCenter("Not enough cheese", 1); return; }
  if(gas < (selected.gasCost||0)){ showCenter("Not enough gas", 1); return; }

  const p = getBuildPlace();
  const valid = getBuildValidation(selected, p.x, p.z);
  if(!valid.ok){ showCenter(valid.reason, 1); return; }

  cheese -= selected.cost;
  gas -= (selected.gasCost||0);
  const built = createStructure(selected.type, p.x, p.z, 0, selected);
  if(!built){ cheese += selected.cost; gas += (selected.gasCost||0); } else reapplyGlobalUpgrades();
}
function updateCamera(dt){
  const focus = player.pos.clone().add(new THREE.Vector3(0,1.7,0));
  const backward = new THREE.Vector3(-Math.sin(player.heading), 0, -Math.cos(player.heading)).normalize();
  const desired = focus.clone()
    .add(backward.multiplyScalar(7.2))
    .add(new THREE.Vector3(0,4.6,0));

  let safe = desired.clone();
  for(const o of obstacles){
    const dx = safe.x-o.x, dz = safe.z-o.z;
    const d = Math.hypot(dx,dz);
    if(d < o.r + 1.2){
      const push = (o.r + 1.2 - d);
      safe.x += (dx / (d||1)) * push;
      safe.z += (dz / (d||1)) * push;
    }
  }

  camera.position.lerp(safe, 1 - Math.pow(0.00008, dt));
  camera.lookAt(focus);
}
function updateCombatDirector(dt){
  if(!combatDirector.lastPlayerPos.lengthSq?.()) combatDirector.lastPlayerPos.copy(player.pos);
  const moved = dist2(player.pos, combatDirector.lastPlayerPos);
  const hasDenseWalls = structures.filter(s => !s.dead && isWallStructure(s) && dist2(s.pos, player.pos) < 12).length;
  if(moved < 1.25){
    combatDirector.heat += dt * (0.22 + hasDenseWalls * 0.03) * difficulty.antiCamp;
    combatDirector.hideScore += dt * 0.5;
  } else {
    combatDirector.heat -= dt * 0.18;
    combatDirector.hideScore = Math.max(0, combatDirector.hideScore - dt * 0.35);
  }
  combatDirector.lastPlayerPos.lerp(player.pos, clamp(dt*1.8,0,1));
  combatDirector.heat = clamp(combatDirector.heat, 0, 3.2);
  combatDirector.flankBias = 1 + combatDirector.heat * 0.7;
  combatDirector.surgeCd -= dt;
}

// -------------------------------------------------
// SPAWNERS
// -------------------------------------------------
let cheeseSpawnTimer = 0;
let lastRatSpawn = 60;
let lastMoleSpawn = 240;
let lastWeaselSpawn = 420;
let lastAssassinSpawn = 300;
let lastRamSpawn = 340;
let lastSpitterSpawn = 250;
let lastBurrowSpawn = 340;
let lastSiegeSpawn = 440;
let lastTitanSpawn = 560;
let lastPlagueSpawn = 620;
let lastVenomSpawn = 590;
let lastWarClawSpawn = 700;
let lastDustRunnerSpawn = 395;
let lastBombBeetleSpawn = 510;
let lastScreecherSpawn = 760;

function updateCheeses(dt){
  for(const c of cheeses){
    c.spin += dt * 2.4;
    c.group.rotation.y = c.spin;
    c.group.position.y = groundHeight(c.pos.x,c.pos.z) + 0.22 + Math.sin(time*3 + c.spin) * 0.12;
  }
  for(const v of gasVents){
    v.steamT += dt;
    if(Math.random() < 0.08){
      addBurst(v.x + rand(-0.2,0.2), 0.55 + Math.sin(v.steamT*3)*0.1, v.z + rand(-0.2,0.2), 0xb0fff0, 1, 0.7, 0.5, 0.08);
    }
    if(v.group){
      const glow = v.group.children[1];
      if(glow) glow.material.emissiveIntensity = 0.5 + Math.sin(v.steamT*4)*0.3;
    }
  }
}
function updateSpawners(dt){
  if(levelTransitionActive || gamePaused) return;
  updateCombatDirector(dt);
  syncEnemyUnlockStages();
  cheeseSpawnTimer += dt;
  if(cheeseSpawnTimer >= 5.6){
    cheeseSpawnTimer = 0;
    const p = randomFreePosition(1);
    spawnCheeseAt(p.x,p.z,3);
  }

  wildSpawnTimer += dt;
  if(wildSpawnTimer >= 24 && wildMice.length + servantMice.length < 8){
    wildSpawnTimer = 0;
    const p = randomFreePosition(1);
    spawnWildMouse(p.x,p.z);
  }

  if(time >= 60 && !cat && !catSpawnTriggered) spawnCat();

  if(time >= 60 && cat && !cat.dead && !cat.dying){
    const phase = Math.max(0, time - 60);
    const earlyRatT = clamp(time / 300, 0, 1);
    const earlyRatSlowFactor = 1.25 - (0.25 * earlyRatT);
    const earlyRatCountPenalty = time < 120 ? 2 : (time < 300 ? 1 : 0);
    const activeCap = Math.floor(clamp((12 + phase/28) * difficulty.cap, 10, 66));
    if(enemies.length > activeCap) return;
    const baseRatCadence = clamp(30 / difficulty.wave - phase * 0.01, 11, 34);
    const ratCadence = baseRatCadence * earlyRatSlowFactor;
    const moleCadence = clamp(45 / difficulty.wave - phase * 0.008, 18, 58);
    const weaselCadence = clamp(55 / difficulty.wave - phase * 0.007, 24, 66);
    if(time - lastRatSpawn >= ratCadence){
      lastRatSpawn = time;
      const baseRatCount = Math.floor((2 + phase/64 + combatDirector.heat*1.2) * difficulty.wave);
      const count = clamp(baseRatCount - earlyRatCountPenalty, 2, 16);
      spawnEnemyWave("rat", count);
      showCenter("Rat Wave x" + count, 0.8);
    }
    if(time >= 210 && time - lastMoleSpawn >= moleCadence){
      lastMoleSpawn = time;
      const count = clamp(Math.floor((1 + (time-240)/110 + combatDirector.heat*0.8) * difficulty.wave), 1, 12);
      spawnEnemyWave("mole", count);
      showCenter("Moles x" + count, 0.8);
    }
    if(time >= 360 && time - lastWeaselSpawn >= weaselCadence){
      lastWeaselSpawn = time;
      const count = clamp(Math.floor((1 + (time-360)/145 + combatDirector.heat*0.6) * difficulty.wave), 1, 11);
      spawnEnemyWave("weasel", count);
      showCenter("Weasels x" + count, 0.8);
    }
    if(unlockedEnemyKinds.has("spitterBug") && time - lastSpitterSpawn >= clamp(72 / difficulty.wave - phase * 0.004, 23, 74)){
      lastSpitterSpawn = time;
      const frontline = clamp(Math.floor((1 + phase/280) * difficulty.wave), 1, 4);
      const spitters = clamp(Math.floor((0.9 + phase/340 + combatDirector.heat*0.5) * difficulty.wave), 1, 6);
      spawnEnemyWave("rat", frontline);
      spawnEnemyWave("spitterBug", spitters);
      showCenter("Spitter Bugs x" + spitters, 0.8);
    }
    if(unlockedEnemyKinds.has("burrowMole") && time - lastBurrowSpawn >= clamp(84 / difficulty.wave - phase * 0.0045, 26, 90)){
      lastBurrowSpawn = time;
      const count = clamp(Math.floor((0.85 + phase/330 + combatDirector.heat*0.42) * difficulty.wave), 1, 5);
      spawnEnemyWave("burrowMole", count);
      showCenter("Burrow Moles x" + count, 0.85);
    }
    if(unlockedEnemyKinds.has("dustRunner") && time - lastDustRunnerSpawn >= clamp(70 / difficulty.wave - phase * 0.005, 19, 76)){
      lastDustRunnerSpawn = time;
      const count = clamp(Math.floor((1.2 + phase/320 + combatDirector.heat*0.4) * difficulty.wave), 1, 6);
      spawnEnemyWave("dustRunner", count);
      showCenter("Dust Runners x" + count, 0.8);
    }
    if(unlockedEnemyKinds.has("siegeRat") && time - lastSiegeSpawn >= clamp(96 / difficulty.wave - phase * 0.0048, 30, 102)){
      lastSiegeSpawn = time;
      const wallLocalSiege = structures.filter(s=>!s.dead && isWallStructure(s) && dist2(s.pos, player.pos) < 30).length;
      const count = clamp(Math.floor((0.7 + wallLocalSiege/5 + phase/360) * difficulty.wave), 1, 4);
      spawnEnemyWave("siegeRat", count);
      showCenter("Siege Rats x" + count, 0.9);
    }
    if(unlockedEnemyKinds.has("bombBeetle") && time - lastBombBeetleSpawn >= clamp(112 / difficulty.wave - phase * 0.0042, 34, 122)){
      lastBombBeetleSpawn = time;
      const count = clamp(Math.floor((0.75 + phase/380 + combatDirector.heat*0.34) * difficulty.wave), 1, 4);
      spawnEnemyWave("bombBeetle", count);
      showCenter("Bomb Beetles x" + count, 0.9);
    }
    if(unlockedEnemyKinds.has("titanRam") && time - lastTitanSpawn >= clamp(140 / difficulty.wave - phase * 0.003, 52, 160)){
      lastTitanSpawn = time;
      const count = Math.random() < 0.75 ? 1 : 2;
      spawnEnemyWave("titanRam", count);
      showCenter("TITAN RAM APPROACHING", 1.0);
    }
    if(unlockedEnemyKinds.has("venomLobber") && time - lastVenomSpawn >= clamp(108 / difficulty.wave - phase * 0.0035, 35, 115)){
      lastVenomSpawn = time;
      const count = clamp(Math.floor((0.8 + phase/360 + combatDirector.heat*0.4) * difficulty.wave), 1, difficultyKey==="brutal" ? 5 : 3);
      spawnEnemyWave("venomLobber", count);
      showCenter("VENOM LOBBERS x" + count, 0.9);
    }
    if(unlockedEnemyKinds.has("screecherBat") && time - lastScreecherSpawn >= clamp(102 / difficulty.wave - phase * 0.0039, 32, 116)){
      lastScreecherSpawn = time;
      const count = clamp(Math.floor((0.8 + phase/340 + combatDirector.heat*0.35) * difficulty.wave), 1, difficultyKey==="brutal" ? 5 : 3);
      spawnEnemyWave("screecherBat", count);
      showCenter("SCREECHER BATS x" + count, 0.9);
    }
    if(unlockedEnemyKinds.has("plagueBrute") && time - lastPlagueSpawn >= clamp(132 / difficulty.wave - phase * 0.0026, 42, 148)){
      lastPlagueSpawn = time;
      const count = clamp(Math.floor((0.6 + phase/420) * difficulty.wave), 1, difficultyKey==="brutal" ? 3 : 2);
      spawnEnemyWave("plagueBrute", count);
      showCenter("PLAGUE BRUTE ADVANCE", 1.0);
    }
    if(unlockedEnemyKinds.has("warClaw") && time - lastWarClawSpawn >= clamp(86 / difficulty.wave - phase * 0.004, 24, 90)){
      lastWarClawSpawn = time;
      const count = clamp(Math.floor((1 + phase/300 + combatDirector.heat*0.5) * difficulty.wave), 1, difficultyKey==="brutal" ? 5 : 3);
      spawnEnemyWave("warClaw", count);
      showCenter("WAR CLAWS x" + count, 0.9);
    }
    const supportCount = servantMice.filter(m=>!m.dead && !m.dying).length + robots.filter(r=>!r.dead && !r.dying).length;
    if(time >= 300 && time - lastAssassinSpawn >= clamp(62 / difficulty.wave - phase*0.005, 20, 60)){
      lastAssassinSpawn = time;
      const pairBonus = difficulty.catIQ > 1.2 && supportCount >= 4 ? 1 : 0;
      const count = clamp(Math.floor((1 + phase/250) * (0.65 + difficulty.wave*0.5)) + pairBonus, 1, 5);
      spawnEnemyWave("assassin", count);
      showCenter("Assassins x" + count, 0.7);
    }
    const wallLocal = structures.filter(s=>!s.dead && isWallStructure(s) && dist2(s.pos,player.pos)<18).length;
    if(time >= 340 && time - lastRamSpawn >= clamp(95 / difficulty.wave - phase*0.006 - wallLocal*0.7, 24, 88)){
      lastRamSpawn = time;
      const count = clamp(Math.floor((wallLocal/5 + phase/320) * difficulty.wave), 1, 4);
      spawnEnemyWave("ram", count);
      showCenter("RAM BREACH x" + count, 0.85);
    }
    if(combatDirector.surgeCd <= 0 && phase > 260 && Math.random() < 0.18 * difficulty.wave){
      combatDirector.surgeCd = rand(24, 46);
      const surge = clamp(Math.floor((2 + phase/220 + combatDirector.heat) * difficulty.wave), 2, 12);
      const surgePool = ["rat", "assassin"];
      if(unlockedEnemyKinds.has("spitterBug")) surgePool.push("spitterBug");
      if(unlockedEnemyKinds.has("burrowMole")) surgePool.push("burrowMole");
      if(unlockedEnemyKinds.has("dustRunner")) surgePool.push("dustRunner");
      if(unlockedEnemyKinds.has("siegeRat")) surgePool.push("siegeRat");
      if(unlockedEnemyKinds.has("bombBeetle")) surgePool.push("bombBeetle");
      if(unlockedEnemyKinds.has("titanRam") && Math.random() < 0.22) surgePool.push("titanRam");
      if(unlockedEnemyKinds.has("venomLobber")) surgePool.push("venomLobber");
      if(unlockedEnemyKinds.has("screecherBat")) surgePool.push("screecherBat");
      if(unlockedEnemyKinds.has("plagueBrute")) surgePool.push("plagueBrute");
      if(unlockedEnemyKinds.has("warClaw")) surgePool.push("warClaw");
      spawnEnemyWave(surgePool[Math.floor(Math.random()*surgePool.length)], surge);
      showCenter("Surge Wave x" + surge, 0.85);
    }
  }
}
function spawnEnemyWave(kind,count){
  const useCatCenter = cat && !cat.dead && !cat.dying;
  const center = useCatCenter ? cat.pos : null;
  for(let i=0;i<count;i++){
    let x=0,z=0;
    const flankSpawn = difficulty.flank > 0.2 && Math.random() < (0.22 + combatDirector.heat*0.1);
    if(useCatCenter && !flankSpawn){
      const a = Math.random() * Math.PI * 2;
      const r = rand(2.0, (kind==="ram" || kind==="titanRam" || kind==="plagueBrute") ? 7.5 : 5.5);
      x = clamp(center.x + Math.sin(a)*r, -dynamicHalfMap+6, dynamicHalfMap-6);
      z = clamp(center.z + Math.cos(a)*r, -dynamicHalfMap+6, dynamicHalfMap-6);
    } else {
      const toPlayer = Math.atan2(player.pos.x, player.pos.z);
      const sideA = toPlayer + (Math.random()<0.5 ? 1 : -1) * (Math.PI * rand(0.35, 0.7));
      if(flankSpawn){
        x = clamp(Math.sin(sideA) * (dynamicHalfMap - rand(7,12)), -dynamicHalfMap+6, dynamicHalfMap-6);
        z = clamp(Math.cos(sideA) * (dynamicHalfMap - rand(7,12)), -dynamicHalfMap+6, dynamicHalfMap-6);
      } else {
        const edge = Math.floor(Math.random()*4);
        if(edge===0){ x = -dynamicHalfMap+5; z = rand(-dynamicHalfMap+8, dynamicHalfMap-8); }
        if(edge===1){ x = dynamicHalfMap-5; z = rand(-dynamicHalfMap+8, dynamicHalfMap-8); }
        if(edge===2){ z = -dynamicHalfMap+5; x = rand(-dynamicHalfMap+8, dynamicHalfMap-8); }
        if(edge===3){ z = dynamicHalfMap-5; x = rand(-dynamicHalfMap+8, dynamicHalfMap-8); }
      }
      x += rand(-2,2); z += rand(-2,2);
    }
    if(dist2({x,z}, player.pos) < 11){
      const away = new THREE.Vector3(x-player.pos.x,0,z-player.pos.z).normalize();
      x = clamp(player.pos.x + away.x * rand(11,16), -dynamicHalfMap+6, dynamicHalfMap-6);
      z = clamp(player.pos.z + away.z * rand(11,16), -dynamicHalfMap+6, dynamicHalfMap-6);
    }
    const e = makeEnemy(kind, x, z);
    if(kind==="spitterBug") addBurst(x, groundHeight(x,z)+0.8, z, 0x8dff78, 8, 2.8, 0.35, 0.05);
    if(kind==="burrowMole") addBurst(x, groundHeight(x,z)+0.25, z, 0x8f6a40, 10, 3.0, 0.4, 0.06);
    if(kind==="dustRunner") addBurst(x, groundHeight(x,z)+0.18, z, 0xcda96f, 8, 3.4, 0.32, 0.05);
    if(kind==="siegeRat") addBurst(x, groundHeight(x,z)+0.95, z, 0xb8d4e2, 10, 3.1, 0.42, 0.06);
    if(kind==="bombBeetle") addBurst(x, groundHeight(x,z)+0.82, z, 0xff8a51, 10, 2.9, 0.38, 0.06);
    if(kind==="titanRam") addBurst(x, groundHeight(x,z)+1.1, z, 0xffaa57, 14, 4.8, 0.6, 0.08);
    if(kind==="venomLobber") addBurst(x, groundHeight(x,z)+0.9, z, 0x8dff5a, 12, 3.8, 0.5, 0.07);
    if(kind==="screecherBat") addBurst(x, groundHeight(x,z)+1.0, z, 0xa3b4ff, 10, 3.0, 0.36, 0.06);
    if(kind==="plagueBrute") addBurst(x, groundHeight(x,z)+1.2, z, 0x86ff9e, 16, 4.6, 0.62, 0.08);
    if(kind==="warClaw") addBurst(x, groundHeight(x,z)+0.95, z, 0xff7d64, 12, 4.4, 0.42, 0.07);
    if(useCatCenter) setRepathPoint(e, center, 5.5);
  }
}

// -------------------------------------------------
// DEATH / GAME OVER
// -------------------------------------------------
function diePlayer(){
  if(player.dead || levelTransitionActive) return;
  player.dead = true;
  gameOver = true;
  addBloodHit(player.pos.x, player.pos.y+0.9, player.pos.z, 1.35);
  addBurst(player.pos.x,player.pos.y+1.0,player.pos.z,0xff5555,24,6,0.95,0.11);
  ui.msg.textContent = "GAME OVER";
  ui.msg.style.opacity = "1";
}

// -------------------------------------------------
// UI
// -------------------------------------------------
function updateUI(){
  nearestTowerOfCheese = null;
  for(const t of structures){ if(!t.dead && t.type==="towerOfCheese" && dist2(player.pos,t.pos) < 5.2){ nearestTowerOfCheese = t; break; } }
  ui.towerPrompt.style.display = nearestTowerOfCheese && !activeTowerMenu ? "block" : "none";
  ui.cheese.textContent = Math.floor(cheese);
  ui.gas.textContent = Math.floor(gas);
  ui.servants.textContent = servantMice.filter(m => !m.dead).length;
  ui.time.textContent = time.toFixed(1);
  ui.level.textContent = currentLevel;
  updateEnemyUnlockWarning();
}

// -------------------------------------------------
// MAIN LOOP
// -------------------------------------------------
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(0.033, clock.getDelta());

  if(!gameOver && !gamePaused) time += dt;

  updateSpawners(dt);
  updateCheeses(dt);
  updatePlayer(dt);
  updateStructures(dt);

  for(const m of [...wildMice, ...servantMice]) updateMouseEntity(m,dt);
  for(const e of engineerMice){
    if(e.dead||e.dying) continue;
    e.anim += dt;
    if(gamePaused) continue;
    let repaired=false;
    let best=null,bestD=999;
    for(const st of structures){ if(st.dead||st.hp>=st.maxHp) continue; const d=dist2(e.pos,st.pos); if(d<9 && d<bestD){best=st;bestD=d;} }
    if(best){
      e.heading += clamp(angleDiff(e.heading, Math.atan2(best.pos.x-e.pos.x,best.pos.z-e.pos.z)), -5*dt, 5*dt);
      if(bestD>3.6){ const step=directSteerToward({pos:e.pos,speed:e.speed,radius:e.radius}, best.pos, dt,false,null,engineerMice); if(step){e.pos.x=step.x;e.pos.z=step.z;} }
      e.repairCd=(e.repairCd||0)-dt;
      if(e.repairCd<=0){ e.repairCd=0.42; best.hp=Math.min(best.maxHp,best.hp+6.5); setHealthBar(best.mesh.userData.healthBar,best.hp/best.maxHp); updateWallDamageVisual(best); repaired=true; addLightningArc(new THREE.Vector3(e.pos.x,e.pos.y+1,e.pos.z), new THREE.Vector3(best.pos.x,best.pos.y+1.1,best.pos.z),0.09,0x8fe8ff);}
    }
    if(!repaired && time > (e.buffState.cooldownUntil||0)){
      const target = structures.find(st=>!st.dead && (isWallStructure(st)||isAttackStructureType(st.type)) && dist2(e.pos,st.pos)<11);
      if(target){
        const type = isAttackStructureType(target.type) ? "damage" : "armor";
        target.tempBuffs = target.tempBuffs || {armorMult:1,damageMult:1,expiresAt:0};
        target.tempBuffs.expiresAt = time + 10;
        target.tempBuffs.armorMult = type==="armor" ? 1.5 : 1;
        target.tempBuffs.damageMult = type==="damage" ? 1.5 : 1;
        e.buffState={target,type,activeUntil:time+10,cooldownUntil:time+25};
      }
    }
    e.pos.y = groundHeight(e.pos.x,e.pos.z); e.group.position.copy(e.pos); e.group.rotation.y=e.heading; animateMouseRig(e.group, 0.7, e.anim, 0.7, 0);
  }
  updateEnemies(dt);
  updateRobots(dt);
  updateCat(dt);
  updateProjectiles(dt);
  updateParticles(dt);
  updateFloatingTexts(dt);
  updateWorldHealthBars();
  updateCamera(dt);
  updateUI();

  renderer.render(scene,camera);
}
animate();

window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
