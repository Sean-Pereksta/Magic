<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Gold Rise - Noble Politics Strategy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
:root{
  --bg:#08090d;
  --panel:#141722;
  --panel2:#1d2233;
  --gold:#d8b65a;
  --red:#d85252;
  --blue:#58a6ff;
  --green:#65d982;
  --purple:#b78cff;
  --gray:#a9b0c3;
  --bad:#ff6868;
  --warn:#f7c948;
  --good:#6ee7a8;
  --text:#eef2ff;
  --muted:#9aa3bb;
  --border:#2b3248;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Georgia,"Times New Roman",serif;
  background:
    radial-gradient(circle at top left, rgba(216,182,90,.17), transparent 35%),
    radial-gradient(circle at bottom right, rgba(88,166,255,.11), transparent 34%),
    var(--bg);
  color:var(--text);
}
header{
  padding:16px 20px 10px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,#10131d,#191d2b);
}
.header-top{
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:center;
  flex-wrap:wrap;
}
h1{
  margin:0;
  color:var(--gold);
  font-size:30px;
  letter-spacing:1px;
}
.subtitle{
  color:var(--muted);
  font-size:13px;
  margin-top:3px;
}
.top-controls{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.month-bar-wrap{
  margin-top:12px;
  display:grid;
  grid-template-columns:120px 1fr 100px;
  gap:10px;
  align-items:center;
}
.month-bar{
  height:16px;
  background:#090b12;
  border:1px solid #303750;
  border-radius:99px;
  overflow:hidden;
}
.month-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#56421c,#d8b65a,#fff0aa);
  transition:width .15s linear;
}
.wrap{
  display:grid;
  grid-template-columns:340px 1fr 370px;
  gap:16px;
  padding:16px;
}
@media(max-width:1150px){
  .wrap{grid-template-columns:1fr;}
}
.panel{
  background:rgba(20,23,34,.95);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.panel h2{
  margin:0;
  padding:12px 14px;
  background:#1c2131;
  color:var(--gold);
  font-size:18px;
  border-bottom:1px solid var(--border);
}
.panel-body{padding:14px;}
button,select,input{
  background:#252b40;
  color:var(--text);
  border:1px solid #3b4461;
  padding:8px 10px;
  border-radius:9px;
  cursor:pointer;
  font-family:inherit;
}
input{cursor:text;width:100%;}
button:hover{background:#30384f;}
button.primary{
  background:linear-gradient(135deg,#66501f,#b99135);
  color:#111;
  font-weight:bold;
  border-color:#e3c46a;
}
button.danger{background:#4a1f29;border-color:#8f3546;}
button.good{background:#1f4932;border-color:#3d9b67;}
button:disabled{opacity:.45;cursor:not-allowed;}
.stat-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.stat{
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:9px;
}
.stat .label{
  color:var(--muted);
  font-size:12px;
}
.stat .value{
  font-size:19px;
  font-weight:bold;
  margin-top:3px;
}
.bar-row{margin:8px 0 12px;}
.bar-top{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:var(--muted);
  margin-bottom:4px;
}
.bar{
  height:10px;
  background:#0b0d14;
  border-radius:99px;
  overflow:hidden;
  border:1px solid #303750;
}
.fill{
  height:100%;
  width:50%;
  background:linear-gradient(90deg,var(--bad),var(--warn),var(--good));
}
.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}
.tabs button.active{
  background:#d8b65a;
  color:#111;
  font-weight:bold;
}
.card,.inbox-card,.log-line,.vendor-card{
  background:#1b2030;
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}
.inbox-card.urgent{
  border-color:#bb3d4b;
  box-shadow:0 0 0 1px rgba(255,80,80,.15);
}
.inbox-card.major{
  border-color:#d8b65a;
}
.title{
  color:var(--gold);
  font-weight:bold;
  font-size:17px;
}
.tiny{
  color:var(--muted);
  font-size:12px;
}
.tag{
  display:inline-block;
  padding:2px 7px;
  border-radius:99px;
  font-size:12px;
  margin:3px 4px 3px 0;
  background:#293048;
  color:#cbd3ee;
  border:1px solid #3a435f;
}
.tag.red{background:#3c1e25;color:#ff9ca9;}
.tag.gold{background:#40331a;color:#f2d27b;}
.tag.blue{background:#1b3149;color:#9fd0ff;}
.tag.green{background:#173b28;color:#8df0b2;}
.tag.purple{background:#302246;color:#d8c0ff;}
.choice{
  margin-top:8px;
  display:block;
  width:100%;
  text-align:left;
}
.choice small{
  color:var(--muted);
  display:block;
  margin-top:3px;
}
.story{
  line-height:1.5;
  color:#dce3f7;
}
.log{
  max-height:560px;
  overflow:auto;
  padding-right:4px;
}
.row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.section-title{
  color:var(--gold);
  margin:15px 0 8px;
  font-weight:bold;
  border-bottom:1px solid var(--border);
  padding-bottom:5px;
}
.good-text{color:var(--good);}
.bad{color:var(--bad);}
.warn{color:var(--warn);}
.gold{color:var(--gold);}
.muted{color:var(--muted);}
.two-col{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
@media(max-width:750px){
  .two-col{grid-template-columns:1fr;}
}
.modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.68);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10;
  padding:20px;
}
.modal{
  background:#121722;
  border:1px solid #3a435f;
  border-radius:16px;
  max-width:900px;
  width:100%;
  max-height:90vh;
  overflow:auto;
  box-shadow:0 20px 70px rgba(0,0,0,.6);
}
.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  background:#1c2131;
}
.modal-header h3{
  margin:0;
  color:var(--gold);
}
.modal-body{padding:16px;}
.action-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:10px;
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <h1>GOLD RISE</h1>
      <div class="subtitle">A real-time text strategy game of noble politics, military pressure, debt, Color loyalty, and inbox crises.</div>
    </div>
    <div class="top-controls">
      <button id="startBtn" class="primary" onclick="toggleRun()">Start</button>
      <button onclick="manualAdvance()">Advance Month</button>
      <button onclick="saveGame()">Save</button>
      <button onclick="loadGame()">Load</button>
      <button class="danger" onclick="newGame()">New Game</button>
    </div>
  </div>

  <div class="month-bar-wrap">
    <div id="monthLabel" class="tiny">Month 1</div>
    <div class="month-bar"><div class="month-fill" id="monthFill"></div></div>
    <div id="speedLabel" class="tiny">Paused</div>
  </div>
</header>

<div class="wrap">
  <section class="panel">
    <h2>House Status</h2>
    <div class="panel-body" id="leftPanel"></div>
  </section>

  <section class="panel">
    <h2 id="mainTitle">Inbox</h2>
    <div class="panel-body">
      <div class="tabs">
        <button id="tabInbox" class="active" onclick="setTab('inbox')">Inbox</button>
        <button id="tabActions" onclick="setTab('actions')">Actions</button>
        <button id="tabMilitary" onclick="setTab('military')">Military</button>
        <button id="tabHouses" onclick="setTab('houses')">Houses</button>
        <button id="tabVendors" onclick="setTab('vendors')">Vendors</button>
        <button id="tabCharacters" onclick="setTab('characters')">Characters</button>
        <button id="tabBlocs" onclick="setTab('blocs')">Blocs</button>
        <button id="tabWarTrade" onclick="setTab('wartrade')">War/Trade</button>
        <button id="tabLog" onclick="setTab('log')">Chronicle</button>
      </div>
      <div id="mainContent"></div>
    </div>
  </section>

  <section class="panel">
    <h2>Court Controls</h2>
    <div class="panel-body" id="rightPanel"></div>
  </section>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button onclick="closeModal()">Close</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
/* ============================================================
   GOLD RISE - REBUILT REAL-TIME FRAMEWORK
   ============================================================ */

let game;
let tab = "inbox";
let running = false;
let timer = null;
let lastTick = 0;

/*
  One full month passes when monthProgress reaches 100.
  Lower this number if you want faster months.
*/
const REAL_SECONDS_PER_MONTH = 32;

const COLORS = ["Red","Brown","Gray","Silver","Pink","Blue","Obsidian","Orange"];

const HOUSE_TEMPLATES = {
  Veyra:{
    tier:4,
    style:"Traditional military tyrants",
    military:{fleet:62,grays:72,obsidians:58,forts:51,spies:30},
    traits:["cruel","traditional","military"],
    openIntel:false
  },
  Cindral:{
    tier:3,
    style:"Elegant court manipulators",
    military:{fleet:42,grays:38,obsidians:22,forts:35,spies:67},
    traits:["social","wealthy","courtly"],
    openIntel:false
  },
  Marros:{
    tier:3,
    style:"Reformist legal power",
    military:{fleet:35,grays:40,obsidians:18,forts:45,spies:54},
    traits:["reformist","legal","patient"],
    openIntel:false
  },
  Bellor:{
    tier:3,
    style:"Aggressive border hawks",
    military:{fleet:54,grays:55,obsidians:44,forts:42,spies:25},
    traits:["aggressive","proud","duelist"],
    openIntel:false
  },
  Aurelian:{
    tier:2,
    style:"Old mercantile dynasty",
    military:{fleet:32,grays:35,obsidians:14,forts:40,spies:48},
    traits:["merchant","careful","silver-linked"],
    openIntel:false
  },
  Thorne:{
    tier:1,
    style:"Lesser house hungry for relevance",
    military:{fleet:16,grays:28,obsidians:8,forts:22,spies:20},
    traits:["minor","desperate","opportunist"],
    openIntel:false
  },
  Karras:{
    tier:2,
    style:"Mining house with hard internal rule",
    military:{fleet:24,grays:46,obsidians:20,forts:37,spies:18},
    traits:["mining","strict","resource-rich"],
    openIntel:false
  }
};

function clone(x){ return JSON.parse(JSON.stringify(x)); }
function clamp(n,min=0,max=100){ return Math.max(min,Math.min(max,n)); }
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function chance(p){ return Math.random() < p; }

function relationName(v){
  if(v <= 10) return "Hatred";
  if(v <= 25) return "Hostile";
  if(v <= 40) return "Suspicious";
  if(v <= 60) return "Neutral";
  if(v <= 75) return "Favorable";
  if(v <= 90) return "Loyal";
  return "Devoted";
}

function pretty(k){
  return {
    treasury:"Treasury",
    debt:"Debt",
    baseIncome:"Income",
    prestige:"Prestige",
    influence:"Influence",
    stability:"Stability",
    fear:"Fear",
    trust:"Trust",
    honor:"Honor",
    rebelStrength:"Rebels",
    scandalHeat:"Scandal Heat",
    silverInfluence:"Silver Influence",
    reformSuspicion:"Reform Suspicion",
    graySecurity:"Gray Security",
    fleetPower:"Fleet Power",
    obsidianForce:"Obsidian Force",
    houseGuard:"House Guard",
    fortifications:"Fortifications",
    intelligence:"Intelligence",
    warMachines:"War Machines",
    officerQuality:"Officer Quality",
    supply:"Supply"
  }[k] || k;
}

function militaryName(k){ return pretty(k); }

function money(n){
  const sign = n >= 0 ? "+" : "-";
  return sign + Math.abs(Math.round(n));
}

function newGame(){
  if(game && !confirm("Start a new game?")) return;

  running = false;
  clearInterval(timer);
  timer = null;

  game = {
    houseName:"au Varon",
    month:1,
    monthProgress:0,
    rank:1,
    rankName:"Minor Gold",
    started:false,

    treasury:1300,
    debt:500,
    baseIncome:420,
    tax:"standard",

    prestige:24,
    influence:14,
    stability:62,
    fear:24,
    trust:38,
    honor:48,
    rebelStrength:10,
    scandalHeat:8,
    silverInfluence:15,
    reformSuspicion:0,

    colors:{
      Red:38,
      Brown:44,
      Gray:55,
      Silver:47,
      Pink:43,
      Blue:38,
      Obsidian:42,
      Orange:40
    },

    military:{
      graySecurity:34,
      fleetPower:8,
      obsidianForce:15,
      houseGuard:24,
      fortifications:18,
      intelligence:18,
      warMachines:4,
      officerQuality:28,
      supply:42
    },

    houses:{},
    alliances:[],
    wars:[],
    tradeDeals:[],
    knownIntel:{},

    inbox:[],
    vendors:[],
    assets:[
      {name:"Local Gray Barracks",type:"Gray",upkeep:45,effects:{graySecurity:8}},
      {name:"Small House Guard",type:"House Guard",upkeep:35,effects:{houseGuard:10}},
      {name:"Old Estate Walls",type:"Fortification",upkeep:20,effects:{fortifications:6}}
    ],

    hidden:{
      mineSafetyNeglected:0,
      redHope:0,
      unpaidGrays:0,
      ignoredLowColors:0,
      ignoredHighGolds:0,
      allianceTension:0,
      vendorRumors:0
    },

    log:[]
  };

  Object.keys(HOUSE_TEMPLATES).forEach(h=>{
    const temp = HOUSE_TEMPLATES[h];
    game.houses[h] = {
      tier:temp.tier,
      style:temp.style,
      opinion: h==="Thorne" ? 54 : rand(34,52),
      fear:rand(2,12),
      respect:rand(12,30),
      rivalry: h==="Bellor" ? 35 : rand(4,22),
      military:clone(temp.military),
      traits:clone(temp.traits),
      openIntel:false,
      allied:false,
      atWar:false,
      trade:false,
      lastIgnored:0
    };
    game.knownIntel[h] = false;
  });

  log("Your father is dead. Your House remains Gold, but weak. Your estate is solvent only by the kindness of creditors and the silence of enemies.");
  log("Press Start when ready. Time will begin moving, inbox requests will arrive, and silence will become a decision.");

  seedOpeningInbox();
  normalizeGameState();
  render();
}


function defaultCharacters(){
  const c=(id,name,group,role,traits=[])=>({id,name,group,role,opinion:50,trust:50,fear:20,respect:40,ambition:50,loyalty:50,resentment:0,traits,memories:[]});
  return {
    caelia_veyra:c('caelia_veyra','Lady Caelia au Veyra','Veyra','leader',['cruel','traditional']),
    cassian_veyra:c('cassian_veyra','Cassian au Veyra','Veyra','heir',['ambitious','duelist']),
    malrec_veyra:c('malrec_veyra','Praetor Malrec au Veyra','Veyra','commander',['military','hardline']),
    seraphina_cindral:c('seraphina_cindral','Lady Seraphina au Cindral','Cindral','leader',['social','courtly']),
    vexa_cindral:c('vexa_cindral','Vexa au Cindral','Cindral','spymaster',['elegant','dangerous']),
    evander_marros:c('evander_marros','Lord Evander au Marros','Marros','leader',['reformist','legal']),
    drusus_bellor:c('drusus_bellor','Lord Drusus au Bellor','Bellor','leader',['aggressive','proud']),
    nestor_aurelian:c('nestor_aurelian','Lord Nestor au Aurelian','Aurelian','leader',['mercantile','careful']),
    pallas_thorne:c('pallas_thorne','Lord Pallas au Thorne','Thorne','leader',['desperate','minor']),
    juno_karras:c('juno_karras','Lady Juno au Karras','Karras','leader',['mining','strict']),
    eo_red:c('eo_red','Eo Marran','Red','labor speaker',['labor']),
    talla_brown:c('talla_brown','Talla','Brown','estate steward',['steward']),
    orlan_gray:c('orlan_gray','Commander Orlan','Gray','security commander',['security']),
    avarus_silver:c('avarus_silver','Avarus ag Sylan','Silver','creditor',['creditor']),
    cyra_pink:c('cyra_pink','Cyra xi Dama','Pink','informant',['informant']),
    pelion_blue:c('pelion_blue','Navarch Pelion','Blue','fleet navigator',['navigator']),
    svala_obsidian:c('svala_obsidian','Svala of the Ice Blood','Obsidian','war envoy',['war']),
    helios_orange:c('helios_orange','Helios oran Tek','Orange','engineer',['engineer'])
  };
}
function normalizeGameState(){
  game.characters ||= {}; game.memories ||= []; game.ignoredHistory ||= {}; game.cooldowns ||= {}; game.blocs ||= {}; game.playerBlocStanding ||= {Traditionalist:50,Reform:50,Mercantile:50,Warhawk:50,Courtly:50,Independent:50};
  game.intel ||= {}; game.tradeRoutes ||= []; game.detailedWars ||= []; game.vendorRelations ||= {}; game.family ||= {}; game.projects ||= []; game.security ||= {assassinationRisk:10,personalSecurity:25,coupRisk:8,poisonRisk:10,estateInfiltration:12}; game.escalations ||= {}; game.warningFlags ||= {};
  const d=defaultCharacters(); for(const k in d) if(!game.characters[k]) game.characters[k]=d[k];
  if(Array.isArray(game.wars)) for(const h of game.wars){ if(!game.detailedWars.find(w=>w.enemyHouse===h)) game.detailedWars.push({id:'war_'+h,enemyHouse:h,warScore:0,playerWarExhaustion:0,enemyWarExhaustion:0,supplyDrain:4,fleetFront:0,groundFront:0,intrigueFront:0,publicSupport:55,alliesCommitted:[],monthsActive:0,status:'active'}); }
  if(Array.isArray(game.tradeDeals)) for(const h of game.tradeDeals){ if(!game.tradeRoutes.find(r=>r.partnerHouse===h)) game.tradeRoutes.push({id:'route_'+h,partnerHouse:h,routeValue:rand(80,160),routeRisk:rand(12,30),protectedByFleet:false,monthsActive:0,dependence:10,disputeRisk:10,status:'active'}); }
  if(game.knownIntel) for(const h in game.knownIntel){ game.intel[h] ||= {level:0,lastSpiedMonth:null,suspicion:0,falseIntel:false,knownWeaknesses:[]}; if(game.knownIntel[h]) game.intel[h].level=Math.max(game.intel[h].level,2); }
}
function getCharacter(id){ return game.characters[id]; }
function addMemory(id,type,text,intensity=3,duration=null){ const c=getCharacter(id); if(!c) return; const m={month:game.month,type,text,intensity,expires:duration?game.month+duration:null}; c.memories.unshift(m); c.memories=c.memories.slice(0,20); game.memories.push({characterId:id,...m}); }
function adjustCharacter(id,changes){ const c=getCharacter(id); if(!c) return; Object.keys(changes).forEach(k=>{ if(typeof c[k]==='number') c[k]=clamp(c[k]+changes[k],-100,100); }); }
function characterOpinionModifier(id){ const c=getCharacter(id); if(!c) return 0; return Math.round((c.opinion-50)/10 - c.resentment/15 + c.respect/25); }
function recentMemoryCount(id,type){ const c=getCharacter(id); if(!c) return 0; return c.memories.filter(m=>m.type===type && game.month-m.month<=6).length; }
function getSenderKey(ev){ if(ev.house) return 'House '+ev.house; if(ev.characterId&&game.characters[ev.characterId]) return game.characters[ev.characterId].name; if(ev.from) return ev.from; return `${ev.senderType||'Unknown'}:${ev.title||'event'}`; }
function recordIgnoredEvent(ev){ const k=getSenderKey(ev); const o=game.ignoredHistory[k]||{count:0,lastMonth:0,severity:0,sourceType:ev.senderType||'Unknown'}; o.count++; o.lastMonth=game.month; o.severity+=Math.max(1,(ev.priority||0)/10); game.ignoredHistory[k]=o; return o; }
function tickCooldowns(){ Object.keys(game.cooldowns).forEach(k=>{ game.cooldowns[k]=Math.max(0,game.cooldowns[k]-1); if(game.cooldowns[k]===0) delete game.cooldowns[k]; }); }
function canUseAction(k){ return !game.cooldowns[k]; }
function setCooldown(k,m){ game.cooldowns[k]=m; }

function seedOpeningInbox(){
  addInbox(makeEvent("welcomeCouncil"));
  addInbox(makeEvent("taxPetition"));
}

function log(text){
  if(!game) return;
  game.log.unshift({month:game.month,text});
  if(game.log.length > 200) game.log.pop();
}

function toggleRun(){
  running = !running;
  game.started = true;
  document.getElementById("startBtn").textContent = running ? "Pause" : "Start";

  if(running){
    lastTick = performance.now();
    if(!timer) timer = setInterval(tick, 200);
    log("The court clock begins. Each passing month will bring income, pressure, opportunities, and consequences.");
  } else {
    log("You pause the court clock. The inbox waits, but only because time itself obeys the player.");
  }

  render();
}

function tick(){
  if(!running || !game) return;

  const now = performance.now();
  const delta = (now - lastTick) / 1000;
  lastTick = now;

  const progressGain = (delta / REAL_SECONDS_PER_MONTH) * 100;
  game.monthProgress += progressGain;

  /*
    Inbox can slowly receive new messages during a month.
    This is intentionally gradual.
  */
  maybeMidMonthArrival(progressGain);

  if(game.monthProgress >= 100){
    game.monthProgress = 0;
    advanceMonth();
  }

  renderTopBar();
}

function manualAdvance(){
  game.started = true;
  game.monthProgress = 0;
  advanceMonth();
}

function renderTopBar(){
  if(!game) return;
  document.getElementById("monthLabel").textContent = `Month ${game.month}`;
  document.getElementById("monthFill").style.width = `${clamp(game.monthProgress)}%`;
  document.getElementById("speedLabel").textContent = running ? "Running" : "Paused";
}

function inboxPressure(){
  /*
    More prestige/influence/rank means more people expect answers.
    Starts relaxed, then grows.
  */
  let pressure = 0.015;
  pressure += game.rank * 0.006;
  pressure += game.prestige / 900;
  pressure += game.influence / 900;
  pressure += game.alliances.length * 0.006;
  pressure += game.wars.length * 0.012;

  if(game.inbox.length > 8) pressure *= 0.35;
  if(game.inbox.length > 12) pressure *= 0.15;

  return pressure;
}

function maybeMidMonthArrival(progressGain){
  if(!game.started) return;
  if(chance(inboxPressure() * progressGain)){
    const ev = generateContextEvent();
    addInbox(ev);
    log(`New inbox request received: ${ev.title}.`);
    render();
  }

  if(chance(0.004 * progressGain) && game.vendors.length < 3){
    generateVendor();
    render();
  }
}

function generateContextEvent(){
  const pool = [];

  pool.push("taxPetition");
  pool.push("mineStrike");

  if(game.colors.Red < 38 || game.rebelStrength > 22) pool.push("riot");
  if(game.scandalHeat > 15 || chance(.35)) pool.push("scandal");
  if(game.colors.Gray < 50 || game.hidden.unpaidGrays > 0) pool.push("grayPay");
  if(game.debt > 300 && chance(.45)) pool.push("silverDebt");

  if(game.prestige > 28 || game.influence > 25){
    pool.push("dinnerInvite");
    pool.push("tradeOffer");
  }

  if(game.prestige > 38 || game.rank >= 2){
    pool.push("borderDispute");
    pool.push("allianceRequest");
  }

  if(game.alliances.length >= 1 && chance(.5)){
    pool.push("allyDemand");
  }

  if(game.alliances.length >= 2 && chance(.4)){
    pool.push("allianceConflict");
  }

  if(game.wars.length > 0){
    pool.push("warDemand");
    pool.push("warRaid");
  }

  if(game.rank >= 3 || game.prestige > 55){
    pool.push("minorHousePetition");
    pool.push("senateRequest");
  }

  return makeEvent(pick(pool));
}

function senderPriority(ev){ let base={"Higher Gold":110,"Equal Gold":85,"Ally":105,"Creditor":92,"Military":82,"Vendor":58,"Lower House":52,"Color":42}[ev.senderType]||40; let score=base+(ev.priority||0)+(ev.politicalWeight||0)+(ev.internalRisk||0)+(ev.militaryRisk||0)+(ev.economicRisk||0)+(ev.scandalRisk||0); score += Math.max(0,8-(ev.deadline||4))*9; const ih=game.ignoredHistory[getSenderKey(ev)]; if(ih) score += ih.count*8; if(ev.house&&game.houses[ev.house]?.allied) score += 24; if(ev.house&&game.houses[ev.house]?.atWar) score += 20; if(ev.tags?.includes('debt')&&game.treasury<500) score+=20; if(ev.tags?.includes('scandal')&&game.scandalHeat>35) score+=16; if(ev.senderType==='Color'&&game.rebelStrength>45) score+=26; if(ev.senderType==='Military'&&game.military.supply<30) score+=18; if(ev.characterId) score += (getCharacter(ev.characterId)?.resentment||0)/2; return Math.round(score); }

function addInbox(ev){
  ev.id = Date.now() + "_" + Math.random().toString(36).slice(2);
  game.inbox.push(ev);
}

function makeEvent(type){
  const ev = eventFactory(type);
  return ev;
}

function higherHouse(){
  const candidates = Object.keys(game.houses).filter(h=>game.houses[h].tier > game.rank);
  return candidates.length ? pick(candidates) : pick(Object.keys(game.houses));
}

function equalOrRivalHouse(){
  const candidates = Object.keys(game.houses).filter(h=>game.houses[h].tier >= Math.max(1,game.rank-1) && !game.alliances.includes(h));
  return candidates.length ? pick(candidates) : pick(Object.keys(game.houses));
}

function lowerHouse(){
  const candidates = Object.keys(game.houses).filter(h=>game.houses[h].tier <= game.rank && !game.alliances.includes(h));
  return candidates.length ? pick(candidates) : pick(Object.keys(game.houses));
}

function applyEffects(e){
  if(!e) return;

  for(const [k,v] of Object.entries(e)){
    if(k==="colors"){
      for(const [c,x] of Object.entries(v)){
        game.colors[c] = clamp((game.colors[c] ?? 50) + x);
      }
    } else if(k==="military"){
      for(const [m,x] of Object.entries(v)){
        game.military[m] = clamp((game.military[m] ?? 0) + x);
      }
    } else if(k==="houses"){
      for(const [h,obj] of Object.entries(v)){
        if(!game.houses[h]) continue;
        for(const [stat,x] of Object.entries(obj)){
          game.houses[h][stat] = clamp((game.houses[h][stat] ?? 0) + x,0,100);
        }
      }
    } else if(k==="hidden"){
      for(const [h,x] of Object.entries(v)){
        game.hidden[h] = (game.hidden[h] ?? 0) + x;
      }
    } else if(k==="treasury"){
      game.treasury += v;
    } else if(k==="debt"){
      game.debt = Math.max(0, game.debt + v);
    } else if(k==="baseIncome"){
      game.baseIncome += v;
    } else if(k in game){
      if(typeof game[k] === "number"){
        if(["prestige","influence","stability","fear","trust","honor","rebelStrength","scandalHeat","silverInfluence","reformSuspicion"].includes(k)){
          game[k] = clamp(game[k] + v);
        } else {
          game[k] += v;
        }
      }
    }
  }
}

function effectText(e){
  if(!e) return "";
  let out = [];
  for(const [k,v] of Object.entries(e)){
    if(k==="colors"){
      Object.entries(v).forEach(([c,x])=>out.push(`${c} ${x>=0?"+":""}${x}`));
    } else if(k==="military"){
      Object.entries(v).forEach(([m,x])=>out.push(`${militaryName(m)} ${x>=0?"+":""}${x}`));
    } else if(k==="houses"){
      Object.entries(v).forEach(([h,obj])=>{
        Object.entries(obj).forEach(([s,x])=>out.push(`${h} ${s} ${x>=0?"+":""}${x}`));
      });
    } else if(k==="hidden"){
      // hidden effects intentionally not shown
    } else {
      out.push(`${pretty(k)} ${v>=0?"+":""}${v}`);
    }
  }
  return out.join(", ");
}

function chooseEvent(id,index){
  const ev = game.inbox.find(x=>x.id===id);
  if(!ev) return;
  const ch = ev.choices[index];

  if(ch.condition && !ch.condition()){
    alert("Requirement not met.");
    return;
  }
  if(ch.cost && game.treasury < ch.cost){
    alert("Not enough treasury.");
    return;
  }

  applyEffects(ch.effects);

  if(ch.revealHouse){
    game.knownIntel[ch.revealHouse] = true;
    game.houses[ch.revealHouse].openIntel = true;
    log(`Spies reveal partial military intelligence on House ${ch.revealHouse}.`);
  }

  if(ch.allyHouse){
    addAlliance(ch.allyHouse);
  }

  if(ch.tradeHouse){
    addTrade(ch.tradeHouse);
  }

  if(ch.special==="endOneWar"){
    if(game.wars.length){
      const ended = game.wars.shift();
      game.houses[ended].atWar = false;
      applyEffects({prestige:2,stability:4});
      log(`The war with House ${ended} ends by settlement.`);
    }
  }

  if(ch.special==="sideStrong" || ch.special==="sideWeak"){
    resolveAllianceSide(ch.special);
  }

  log(ch.log);
  game.inbox = game.inbox.filter(x=>x.id!==id);
  render();
}

function resolveAllianceSide(mode){
  if(game.alliances.length < 2) return;
  const allies = game.alliances.slice().sort((a,b)=>game.houses[b].tier-game.houses[a].tier);
  const strong = allies[0];
  const weak = allies[allies.length-1];

  if(mode==="sideStrong"){
    game.houses[strong].opinion = clamp(game.houses[strong].opinion + 8);
    game.houses[weak].opinion = clamp(game.houses[weak].opinion - 12);
    game.houses[weak].rivalry = clamp(game.houses[weak].rivalry + 8);
    log(`House ${strong} approves your loyalty. House ${weak} feels abandoned.`);
  } else {
    game.houses[weak].opinion = clamp(game.houses[weak].opinion + 10);
    game.houses[strong].opinion = clamp(game.houses[strong].opinion - 10);
    game.houses[strong].rivalry = clamp(game.houses[strong].rivalry + 5);
    log(`House ${weak} is grateful. House ${strong} questions your judgment.`);
  }
}

function addAlliance(house){
  if(!game.alliances.includes(house)){
    game.alliances.push(house);
    game.houses[house].allied = true;
    game.houses[house].openIntel = true;
    game.knownIntel[house] = true;
    log(`Alliance formed with House ${house}. Their basic military strength is now visible.`);
  }
}

function addTrade(house){
  if(!game.tradeDeals.includes(house)){
    game.tradeDeals.push(house);
    game.houses[house].trade = true;
    log(`Trade deal established with House ${house}.`);
  }
}

function expireInbox(){
  for(const ev of [...game.inbox]){
    ev.deadline--;

    if(ev.deadline <= 0){
      applyEffects(ev.expire.effects);
      const ig=recordIgnoredEvent(ev);

      if(ev.house && game.houses[ev.house]){
        game.houses[ev.house].lastIgnored++;
      }

      /*
        Disrespect scaling:
        Higher houses punish ignored messages more.
        Lower Colors/socially weaker groups hurt internal stability more.
      */
      if(ev.characterId) addMemory(ev.characterId,'ignored',`Ignored request: ${ev.title}`,Math.min(8,2+(ig?.count||1)));
      if(ev.senderType==="Higher Gold"){
        applyEffects({prestige:-2,influence:-2,houses:{[ev.house]:{opinion:-4,rivalry:2}}});
      }
      if(ev.senderType==="Ally"){
        applyEffects({influence:-3,houses:{[ev.house]:{opinion:-5,respect:-2}}});
      }
      if(ev.senderType==="Lower House"){
        applyEffects({influence:-1});
      }
      if(ev.senderType==="Color"){
        applyEffects({trust:-2,rebelStrength:2});
      }
      if(ev.senderType==="Military"){
        applyEffects({stability:-2});
      }

      log(ev.expire.log);
      game.inbox = game.inbox.filter(x=>x.id!==ev.id);
    }
  }
}

function advanceMonth(){
  game.month++;

  const mult = {merciful:.65,standard:1,heavy:1.35,punitive:1.75}[game.tax];
  const income = Math.round(game.baseIncome * mult);
  const upkeep = game.assets.reduce((s,a)=>s+(a.upkeep||0),0);
  const debtPay = game.debt > 0 ? Math.min(game.debt, Math.max(80,Math.round(game.debt*.08))) : 0;

  game.treasury += income;
  game.treasury -= upkeep;
  game.treasury -= debtPay;
  game.debt = Math.max(0, game.debt - Math.round(debtPay*.55));

  tickCooldowns();
  applyTaxEffects();
  processTradeRoutes();
  processWars();
  expireInbox();
  tickVendors();
  passiveWorldEffects();
  checkRank();

  const guaranteedRequests = monthlyRequestCount();
  for(let i=0;i<guaranteedRequests;i++){
    if(game.inbox.length < 12) addInbox(generateContextEvent());
  }

  if(chance(.38 + game.rank*.05)) generateVendor();

  log(`Month ${game.month} begins. Income ${income}, upkeep ${upkeep}, debt payment ${debtPay}.`);
  render();
}

function monthlyRequestCount(){
  let n = 0;

  if(game.rank <= 1) n = chance(.55) ? 1 : 0;
  if(game.rank === 2) n = rand(1,2);
  if(game.rank === 3) n = rand(2,3);
  if(game.rank >= 4) n = rand(3,4);

  if(game.prestige > 55) n++;
  if(game.influence > 55) n++;
  if(game.wars.length) n++;
  if(game.alliances.length >= 2 && chance(.4)) n++;

  return n;
}

function applyTaxEffects(){
  if(game.tax==="merciful"){
    applyEffects({trust:3,colors:{Red:3,Brown:3,Silver:-2},rebelStrength:-2});
  }
  if(game.tax==="standard"){
    applyEffects({stability:1});
  }
  if(game.tax==="heavy"){
    applyEffects({trust:-4,fear:2,colors:{Red:-4,Brown:-3,Silver:2},rebelStrength:3});
  }
  if(game.tax==="punitive"){
    applyEffects({trust:-9,fear:6,stability:-3,colors:{Red:-9,Brown:-7,Silver:4,Gray:2},rebelStrength:8});
  }

  if(game.treasury < 0){
    const shortage = Math.abs(game.treasury);
    game.debt += shortage + 300;
    game.treasury = 0;
    applyEffects({prestige:-4,silverInfluence:7,colors:{Silver:3,Gray:-3}});
    log("Your treasury runs dry. Emergency debt is taken quietly, but not secretly.");
  }
}

function tickVendors(){
  for(const v of game.vendors) v.duration--;
  const leaving = game.vendors.filter(v=>v.duration<=0);
  leaving.forEach(v=>log(`${v.type} ${v.name} leaves your court. Their unpurchased goods may find rival buyers.`));
  game.vendors = game.vendors.filter(v=>v.duration>0);
}

function processTradeRoutes(){ for(const r of game.tradeRoutes){ if(r.status==='collapsed') continue; game.treasury += r.routeValue; r.monthsActive++; r.dependence=clamp(r.dependence+1,0,100); if(game.military.fleetPower < r.routeRisk && chance(0.15)){ r.status='raided'; game.treasury-=Math.round(r.routeValue*0.5); addInbox(makeEvent('tradeTariffDispute')); } if(game.houses[r.partnerHouse] && game.houses[r.partnerHouse].opinion<35 && chance(0.2)){ r.status='disputed'; addInbox(makeEvent('tradePartnerBetrayal')); } } }
function processWars(){ for(const w of game.detailedWars.filter(x=>x.status==='active')){ const e=game.houses[w.enemyHouse]; if(!e) continue; const fleet=(game.military.fleetPower-e.military.fleet)/4; const ground=(game.military.graySecurity+game.military.obsidianForce+game.military.warMachines-(e.military.grays+e.military.obsidians))/6; const spy=(game.military.intelligence-e.military.spies)/5; w.warScore=clamp(w.warScore+fleet+ground+spy,-100,100); w.playerWarExhaustion=clamp(w.playerWarExhaustion+4,0,100); w.enemyWarExhaustion=clamp(w.enemyWarExhaustion+3,0,100); w.monthsActive++; game.treasury-=120; game.military.supply=clamp(game.military.supply-3,0,100); if(chance(0.25)) addInbox(makeEvent('fleetBattleOpportunity')); if(w.warScore>70) { addInbox(makeEvent('victoryDemand')); w.status='won'; } if(w.warScore<-70){ addInbox(makeEvent('defeatConcession')); w.status='lost'; } } }
function passiveWorldEffects(){
  let rebelDelta = 0;

  if(game.colors.Red < 30) rebelDelta += 3;
  if(game.colors.Brown < 30) rebelDelta += 2;
  if(game.trust < 30) rebelDelta += 2;
  if(game.stability < 35) rebelDelta += 3;
  if(game.fear > 65) rebelDelta -= 1;
  if(game.fear > 75 && game.trust < 30) rebelDelta += 2;

  game.rebelStrength = clamp(game.rebelStrength + rebelDelta);

  if(game.hidden.mineSafetyNeglected >= 2 && chance(.28)){
    applyEffects({treasury:-450,trust:-10,colors:{Red:-12,Orange:-4},stability:-8,rebelStrength:8});
    game.hidden.mineSafetyNeglected = 0;
    log("A neglected mine shaft collapses. The dead are Red, but the consequences climb higher.");
  }

  if(game.rebelStrength >= 75){
    rebellionCrisis();
  }

  if(game.wars.length){
    const warCost = 180 * game.wars.length;
    game.treasury -= warCost;
    game.military.supply = clamp(game.military.supply - 2 * game.wars.length);
    log(`Active war costs drain ${warCost} treasury this month.`);
  }

  if(game.tradeDeals.length){
    const tradeGain = 70 * game.tradeDeals.length;
    game.treasury += tradeGain;
  }

  for(const h of game.wars){
    if(chance(.25)){
      addInbox(makeEvent("warRaid"));
    }
  }
}

function rebellionCrisis(){
  const suppression = game.military.graySecurity + game.military.intelligence + game.military.obsidianForce + game.stability;

  if(suppression >= 210){
    applyEffects({stability:-10,trust:-8,fear:8,colors:{Red:-8,Brown:-4,Gray:4},rebelStrength:-30});
    log("A coordinated rebel rising begins, but your security machine catches it early. Hatred survives.");
  } else {
    applyEffects({treasury:-1000,prestige:-12,stability:-22,trust:-10,colors:{Red:-15,Brown:-10,Gray:-6},rebelStrength:-18});
    log("Rebellion erupts through mines and servant corridors. You survive, but your House bleeds.");
  }
}

function checkRank(){
  const power =
    game.prestige +
    game.influence +
    game.military.fleetPower +
    game.military.graySecurity/2 +
    game.military.intelligence/2 +
    game.treasury/250;

  if(game.rank===1 && power>105){
    game.rank=2;
    game.rankName="Recognized House";
    applyEffects({prestige:5,influence:5});
    log("Your House is no longer dismissed as provincial. Invitations multiply.");
  }
  if(game.rank===2 && power>155){
    game.rank=3;
    game.rankName="Regional Power";
    applyEffects({prestige:8,influence:8});
    log("Your banners matter beyond your holdings. Lesser houses begin petitioning you.");
  }
  if(game.rank===3 && power>220){
    game.rank=4;
    game.rankName="High Noble";
    applyEffects({prestige:10,influence:10});
    log("You enter the high game. Every silence, alliance, and insult now echoes.");
  }
}

    id:Date.now()+"_"+Math.random().toString(36).slice(2),

function buyOffer(vendorId,offerId){
  const vendor = game.vendors.find(v=>v.id===vendorId);
  if(!vendor) return;
  const offer = vendor.offers.find(o=>o.id===offerId);
  if(!offer) return;

  if(!offer.isLoan && offer.cost > game.treasury){
    alert("Not enough treasury.");
    return;
  }

  if(offer.isLoan){
    applyEffects(offer.effects);
  } else {
    applyEffects({treasury:-offer.cost});
    applyEffects(offer.effects);
  }

  game.assets.push({
    name:offer.name,
    type:offer.type,
    upkeep:offer.upkeep,
    effects:offer.effects?.military || {}
  });

  log(`Purchased: ${offer.name}. ${offer.desc}`);

  vendor.offers = vendor.offers.filter(o=>o.id!==offerId);
  if(vendor.offers.length===0){
    game.vendors = game.vendors.filter(v=>v.id!==vendorId);
  }

  render();
}

function initiateTrade(house){
  if(game.tradeDeals.includes(house)){
    alert("You already have a trade deal with this house.");
    return;
  }

  const h = game.houses[house];
  const chanceScore = game.prestige + game.influence + h.opinion + game.colors.Silver - h.rivalry;

  if(chanceScore > 120 || chance(.35)){
    addTrade(house);
    h.opinion = clamp(h.opinion + 5);
    applyEffects({baseIncome:80,influence:3});
    log(`House ${house} accepts your trade proposal.`);
  } else {
    h.opinion = clamp(h.opinion - 5);
    applyEffects({prestige:-1});
    log(`House ${house} rejects your trade proposal. Your approach is noted as premature.`);
  }

  render();
}

function initiateAlliance(house){
  if(game.alliances.includes(house)){
    alert("Already allied.");
    return;
  }

  const h = game.houses[house];
  const chanceScore = game.prestige + game.influence + h.opinion + h.respect - h.rivalry - (h.tier-game.rank)*12;

  if(chanceScore > 125 || chance(.28)){
    addAlliance(house);
    h.opinion = clamp(h.opinion + 8);
    applyEffects({prestige:3,influence:6});
    log(`House ${house} accepts alliance terms.`);
  } else {
    h.opinion = clamp(h.opinion - 6);
    h.rivalry = clamp(h.rivalry + 3);
    applyEffects({prestige:-2});
    log(`House ${house} refuses alliance. The refusal travels through court quickly.`);
  }

  render();
}

function sendGift(house){
  if(game.treasury < 300){
    alert("Not enough treasury.");
    return;
  }

  game.treasury -= 300;
  const h = game.houses[house];
  h.opinion = clamp(h.opinion + 7);
  h.respect = clamp(h.respect + 1);
  applyEffects({prestige:1});
  log(`You send a tasteful gift to House ${house}.`);
  render();
}

function spyOnHouse(house){
  const h = game.houses[house];
  const spyPower = game.military.intelligence + game.colors.Pink/2 + game.colors.Brown/3;
  const defense = h.military.spies + h.tier*10;

  if(spyPower + rand(0,35) > defense){
    game.knownIntel[house] = true;
    h.openIntel = true;
    applyEffects({military:{intelligence:2}});
    log(`Your spies return with military intelligence on House ${house}.`);
  } else {
    h.opinion = clamp(h.opinion - 8);
    h.rivalry = clamp(h.rivalry + 6);
    applyEffects({scandalHeat:7,honor:-3});
    log(`Your spies are nearly caught probing House ${house}. They deny everything poorly.`);
  }

  render();
}

function hostFeast(){ const cost=450+game.rank*150; if(game.treasury<cost||!canUseAction('hostFeast')) return; game.treasury-=cost; game.prestige+=rand(5,10); game.colors.Pink=clamp(game.colors.Pink+4); game.houses.Cindral.opinion=clamp(game.houses.Cindral.opinion+3); setCooldown('hostFeast',6); log('You host a lavish feast. Courtly eyes turn toward your table.');}
function reliefProgram(){ if(game.treasury<600||!canUseAction('reliefProgram')) return; game.treasury-=600; applyEffects({trust:10,rebelStrength:-10,colors:{Red:8,Brown:8,Silver:-4},houses:{Veyra:{opinion:-3},Marros:{opinion:4}},reformSuspicion:5}); setCooldown('reliefProgram',8); addMemory('eo_red','mercy','Relief reached lower districts.',5,8);}
function declareWar(house){
  if(game.wars.includes(house)){
    alert("You are already at war.");
    return;
  }

  if(!confirm(`Declare war on House ${house}? This will create recurring military crises and costs.`)) return;

  game.wars.push(house);
  const h = game.houses[house];
  h.atWar = true;
  h.opinion = clamp(h.opinion - 30);
  h.rivalry = clamp(h.rivalry + 25);

  applyEffects({prestige:5,fear:6,stability:-4,influence:3});
  log(`You declare war on House ${house}. The court exhales in horror and admiration.`);
  addInbox(makeEvent("warDemand"));
  render();
}

/* ===========================
   RENDERING
   =========================== */

function render(){
  if(!game) return;
  normalizeGameState();
  renderTopBar();
  renderLeft();
  renderRight();
  renderMain();
}

function renderLeft(){
  const lp = document.getElementById("leftPanel");

  lp.innerHTML = `
    <div class="card">
      <b class="gold">House ${game.houseName}</b><br>
      <span class="tiny">Month ${game.month} • Rank ${game.rank}: ${game.rankName}</span><br>
      <span class="tiny">${running ? "Court clock running" : "Court clock paused"}</span>
    </div>

    <div class="stat-grid">
      ${stat("Treasury",Math.round(game.treasury))}
      ${stat("Debt",Math.round(game.debt))}
      ${stat("Income","+"+Math.round(game.baseIncome)+"/mo")}
      ${stat("Tax",game.tax)}
      ${stat("Prestige",game.prestige)}
      ${stat("Influence",game.influence)}
      ${stat("Stability",game.stability)}
      ${stat("Rebels",game.rebelStrength)}
      ${stat("Fear",game.fear)}
      ${stat("Trust",game.trust)}
    </div>

    <div class="section-title">Color Relations</div>
    ${Object.entries(game.colors).map(([c,v])=>bar(c,v,relationName(v))).join("")}

    <div class="section-title">Military</div>
    ${Object.entries(game.military).map(([k,v])=>bar(pretty(k),v,v)).join("")}
  `;
}

function renderRight(){
  const rp = document.getElementById("rightPanel");

  rp.innerHTML = `
    <div class="section-title">Tax Policy</div>
    <div class="row">
      <button ${game.tax==="merciful"?"disabled":""} onclick="setTax('merciful')">Merciful</button>
      <button ${game.tax==="standard"?"disabled":""} onclick="setTax('standard')">Standard</button>
      <button ${game.tax==="heavy"?"disabled":""} onclick="setTax('heavy')">Heavy</button>
      <button ${game.tax==="punitive"?"disabled":""} onclick="setTax('punitive')">Punitive</button>
    </div>
    <p class="tiny">Taxes affect income, trust, rebellion, Color loyalty, and Silver confidence each month.</p>

    <div class="section-title">Current Entanglements</div>
    <div class="card">
      <span class="tag gold">${game.inbox.length} Inbox</span>
      <span class="tag blue">${game.vendors.length} Vendors</span>
      <span class="tag green">${game.tradeDeals.length} Trade</span>
      <span class="tag purple">${game.alliances.length} Alliances</span>
      <span class="tag red">${game.wars.length} Wars</span>
      <br><br>
      <span class="tiny">Scandal Heat: ${game.scandalHeat}</span><br>
      <span class="tiny">Silver Influence: ${game.silverInfluence}</span><br>
      <span class="tiny">Reform Suspicion: ${game.reformSuspicion}</span>
    </div>

    <div class="section-title">Design Logic</div>
    <p class="tiny">
      Inbox is sorted by sender priority. Higher Golds, allies, creditors, and war messages rise to the top.
      Low Color requests may rank lower socially, but ignoring them increases unrest and rebellion.
    </p>
  `;
}

function setTax(t){
  game.tax = t;
  log(`Tax policy changed to ${t.toUpperCase()}.`);
  render();
}

function setTab(t){
  tab = t;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab"+t[0].toUpperCase()+t.slice(1)).classList.add("active");
  renderMain();
}

function renderMain(){
  const mc = document.getElementById("mainContent");
  const title = document.getElementById("mainTitle");

  if(tab==="inbox"){title.textContent="Inbox";renderInbox(mc);}
  if(tab==="actions"){title.textContent="Active Actions";renderActions(mc);}
  if(tab==="military"){title.textContent="Military";renderMilitary(mc);}
  if(tab==="houses"){title.textContent="Houses";renderHouses(mc);}
  if(tab==="vendors"){title.textContent="Vendors";renderVendors(mc);}
  if(tab==="characters"){title.textContent="Characters";renderCharacters(mc);}
  if(tab==="blocs"){title.textContent="Blocs";renderBlocs(mc);}
  if(tab==="wartrade"){title.textContent="War / Trade";renderWarTrade(mc);}
  if(tab==="log"){title.textContent="Chronicle";renderLog(mc);}
}

function renderInbox(mc){
  if(game.inbox.length===0){
    mc.innerHTML = `
      <div class="card">
        <b class="gold">Inbox empty.</b>
        <p class="story">For now, no one demands your attention. As your influence rises, silence will become rarer.</p>
      </div>
    `;
    return;
  }

  const sorted = [...game.inbox].sort((a,b)=>senderPriority(b)-senderPriority(a));

  mc.innerHTML = `
    <div class="card">
      <b class="gold">Priority Sorting</b>
      <p class="tiny">Messages are sorted by sender power, alliance duty, military urgency, deadline, and political danger. Low Color issues may appear lower but become dangerous if neglected.</p>
    </div>
    ${sorted.map(ev=>`
      <div class="inbox-card ${ev.deadline<=1?"urgent":""} ${senderPriority(ev)>100?"major":""}">
        <div class="title">${ev.title}</div>
        <div class="tiny">From: ${ev.from} • Sender: ${ev.senderType} • Deadline: ${ev.deadline} month(s) • Priority ${senderPriority(ev)}</div>
        <div>${ev.tags.map(t=>`<span class="tag ${tagClass(t)}">${t}</span>`).join("")}</div>
        <p class="story">${ev.body}</p>
        ${ev.choices.map((c,i)=>{
          const blocked = c.condition && !c.condition();
          const poor = c.cost && game.treasury < c.cost;
          return `
            <button class="choice" ${blocked||poor?"disabled":""} onclick="chooseEvent('${ev.id}',${i})">
              ${i+1}. ${c.text}
              <small>${c.hint||""} ${c.cost?` Cost: ${c.cost}.`:""} ${blocked?" Requirement not met.":""} ${poor?" Insufficient treasury.":""}</small>
            </button>
          `;
        }).join("")}
      </div>
    `).join("")}
  `;
}

function tagClass(t){
  if(["Red","Riot","War"].includes(t)) return "red";
  if(["Gold","Diplomacy","Senate","Alliance"].includes(t)) return "gold";
  if(["Fleet","Blue","Military","Border"].includes(t)) return "blue";
  if(["Trust","Brown","Trade","Income"].includes(t)) return "green";
  if(["Pink","Scandal","Blackmail","Obligation"].includes(t)) return "purple";
  return "";
}

function renderActions(mc){
  mc.innerHTML = `
    <div class="card">
      <b class="gold">Initiate Events</b>
      <p class="story">
        You do not only react. You can start trade deals, alliances, espionage, gifts, and wars.
        These actions change what kinds of inbox requests appear later.
      </p>
    </div>

    <div class="action-grid">
      ${Object.entries(game.houses).map(([h,o])=>`
        <div class="card">
          <div class="title">House ${h}</div>
          <div class="tiny">Tier ${o.tier} • ${o.style}</div>
          <span class="tag gold">Opinion ${o.opinion}</span>
          <span class="tag blue">Respect ${o.respect}</span>
          <span class="tag red">Rivalry ${o.rivalry}</span>
          <br><br>
          <div class="row">
            <button onclick="initiateTrade('${h}')">Trade</button>
            <button onclick="initiateAlliance('${h}')">Alliance</button>
            <button onclick="sendGift('${h}')">Gift 300</button>
            <button onclick="spyOnHouse('${h}')">Spy</button>
            <button class="danger" onclick="declareWar('${h}')">War</button>
          </div>
        </div>
      `).join("")}
    </div>
  `;

function renderMilitary(mc){
  mc.innerHTML = `
    <div class="card">
      <b class="gold">Military is not one number.</b>
      <p class="story">Grays control streets, fleets project noble power, Obsidians terrify, spies reveal secrets, and supply determines how long force can last.</p>
    </div>

    <div class="two-col">
      ${Object.entries(game.military).map(([k,v])=>`
        <div class="card">
          <b>${pretty(k)}</b>
          <div class="tiny">Strength: ${v}</div>
          <div class="bar"><div class="fill" style="width:${v}%"></div></div>
          <p class="tiny">${militaryDescription(k)}</p>
        </div>
      `).join("")}
    </div>

    <div class="section-title">Assets</div>

      <div class="card">
        <b>${a.name}</b>
        <div class="tiny">Type: ${a.type} • Upkeep ${a.upkeep}/month</div>

function militaryDescription(k){
  return {
    graySecurity:"Riot control, arrests, tax enforcement, prisons, and internal order.",
    fleetPower:"Ships, fighters, orbit control, trade protection, and power projection.",
    obsidianForce:"Elite shock troops, intimidation, bodyguard power, and brutal ground victory.",
    houseGuard:"Personal forces loyal to your bloodline, useful against coups and assassins.",
    fortifications:"Estate walls, shield grids, bunkers, and defense against raids.",
    intelligence:"Spies, informants, Pinks, Browns, intercepted messages, and blackmail.",
    warMachines:"Grav tanks, drones, siege weapons, and battlefield terror.",
    officerQuality:"Command competence, discipline, and reduced military failure.",
    supply:"Fuel, ammunition, food, medicine, repairs, and war endurance."
  }[k] || "";
}

function renderHouses(mc){
  mc.innerHTML = `
    <div class="card">
      <b class="gold">House Intelligence</b>
      <p class="story">
        Allied houses reveal basic military strength. Other houses require espionage.
        Spy attempts can reveal military data, but failure can create scandal and rivalry.
      </p>
    </div>

    ${Object.entries(game.houses).map(([h,o])=>`
      <div class="card">
        <div class="title">House ${h}</div>
        <div class="tiny">Tier ${o.tier} • ${o.style}</div>
        <span class="tag gold">Opinion ${o.opinion} — ${relationName(o.opinion)}</span>
        <span class="tag blue">Respect ${o.respect}</span>
        <span class="tag red">Rivalry ${o.rivalry}</span>
        <span class="tag purple">Fear ${o.fear}</span>
        ${game.alliances.includes(h)?`<span class="tag green">Ally</span>`:""}
        ${game.tradeDeals.includes(h)?`<span class="tag green">Trade</span>`:""}
        ${game.wars.includes(h)?`<span class="tag red">War</span>`:""}

        <p class="tiny">Traits: ${o.traits.join(", ")}</p>

        ${game.knownIntel[h] || game.alliances.includes(h) ? `
          <div class="section-title">Military Intelligence</div>
          <span class="tag blue">Fleet ${o.military.fleet}</span>
          <span class="tag blue">Grays ${o.military.grays}</span>
          <span class="tag blue">Obsidians ${o.military.obsidians}</span>
          <span class="tag blue">Forts ${o.military.forts}</span>

function renderVendors(mc){
  if(game.vendors.length===0){
    mc.innerHTML = `
      <div class="card">
        <b class="gold">No vendors currently at court.</b>
        <p class="story">Vendors arrive over time. Their limited offers can reshape your military, economy, or spy network.</p>
      </div>
    `;
    return;
  }

  mc.innerHTML = game.vendors.map(v=>`
    <div class="vendor-card">
      <div class="title">${v.name}</div>
      <div class="tiny">${v.type} • Reputation: ${v.reputation} • Leaves in ${v.duration} month(s)</div>
      <br>
      ${v.offers.map(o=>`
        <div class="card">
          <b>${o.name}</b>
          <div class="tiny">Type: ${o.type} • Cost: ${o.isLoan?"loan terms":o.cost} • Upkeep: ${o.upkeep}/month</div>
          <p>${o.desc}</p>
          <div class="tiny">${effectText(o.effects)}</div>
          <button class="primary" onclick="buyOffer('${v.id}','${o.id}')">${o.isLoan?"Accept Deal":"Buy"}</button>
        </div>
      `).join("")}

  `).join("");
}

function renderLog(mc){
  mc.innerHTML = `
    <div class="card">
      <b class="gold">Chronicle</b>
      <p class="tiny">The court remembers what the powerful pretend to forget.</p>
    </div>
    <div class="log">
      ${game.log.map(l=>`
        <div class="log-line">
          <span class="tag gold">Month ${l.month}</span>
          ${l.text}
        </div>
      `).join("")}
    </div>
  `;
}

function stat(label,value){
  return `<div class="stat"><div class="label">${label}</div><div class="value">${value}</div></div>`;
}

function bar(label,val,caption){
  return `
    <div class="bar-row">
      <div class="bar-top"><span>${label}</span><span>${caption}</span></div>
      <div class="bar"><div class="fill" style="width:${clamp(val)}%"></div></div>
    </div>
  `;
}

/* ===========================
   SAVE / LOAD / MODAL
   =========================== */

function saveGame(){
  localStorage.setItem("goldRiseRebuiltSave",JSON.stringify(game));
  log("Game saved.");
  render();
}


function renderCharacters(mc){ const groups={}; Object.values(game.characters).forEach(c=>{(groups[c.group] ||= []).push(c);}); mc.innerHTML=Object.keys(groups).map(g=>`<div class="card"><div class="title">${g}</div>${groups[g].map(c=>`<div><b>${c.name}</b> <span class="tiny">(${c.role})</span><div class="tiny">Op ${c.opinion} • Tr ${c.trust} • Fear ${c.fear} • Res ${c.respect} • Rsm ${c.resentment}</div><div class="tiny">Traits: ${c.traits.join(', ')}</div><div class="tiny">Memories: ${(c.memories.slice(0,3).map(m=>m.type+': '+m.text).join(' | ')||'None')}</div></div>`).join('<hr style="border-color:#2b3248">')}</div>`).join(''); }
function renderBlocs(mc){ const map={Traditionalist:['Veyra','Karras'],Reform:['Marros'],Mercantile:['Aurelian','Karras'],Warhawk:['Veyra','Bellor'],Courtly:['Cindral'],Independent:['Thorne']}; mc.innerHTML=Object.keys(game.playerBlocStanding).map(b=>`<div class="card"><div class="title">${b} (${game.playerBlocStanding[b]})</div><div class="bar"><div class="fill" style="width:${clamp(game.playerBlocStanding[b])}%"></div></div><div class="tiny">Houses: ${(map[b]||[]).join(', ')||'None'}</div></div>`).join(''); }
function renderWarTrade(mc){ const wars=game.detailedWars.map(w=>`<div class="card"><div class="title">War: ${w.enemyHouse}</div><div class="tiny">Score ${Math.round(w.warScore)} • Exhaustion ${w.playerWarExhaustion} • Supply drain ${w.supplyDrain} • ${w.status}</div></div>`).join('')||'<div class="tiny">No active detailed wars.</div>'; const routes=game.tradeRoutes.map(r=>`<div class="card"><div class="title">Route: ${r.partnerHouse}</div><div class="tiny">Value ${r.routeValue} • Risk ${r.routeRisk} • Dependence ${r.dependence} • ${r.status}</div></div>`).join('')||'<div class="tiny">No active routes.</div>'; mc.innerHTML='<div class="section-title">Wars</div>'+wars+'<div class="section-title">Trade Routes</div>'+routes; }

function loadGame(){
  const s = localStorage.getItem("goldRiseRebuiltSave");
  if(!s){
    alert("No save found.");
    return;
  }
  running = false;
  clearInterval(timer);
  timer = null;
  game = JSON.parse(s);
  normalizeGameState();
  log("Game loaded.");
  render();
}

function openModal(title,body){
  document.getElementById("modalTitle").innerHTML = title;
  document.getElementById("modalBody").innerHTML = body;
  document.getElementById("modalBackdrop").style.display = "flex";
}

function closeModal(){
  document.getElementById("modalBackdrop").style.display = "none";
}

window.onload = ()=>{
  const s = localStorage.getItem("goldRiseRebuiltSave");
  if(s){
    game = JSON.parse(s);
  } else {
    newGame();
  }
  render();
};
</script>
