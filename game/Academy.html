<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cat vs Mouse Survival 3D</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0d1117;
    font-family: Arial, Helvetica, sans-serif;
  }
  canvas { display: block; }

  #ui {
    position: absolute;
    left: 8px;
    top: 8px;
    z-index: 20;
    background: rgba(0,0,0,0.58);
    color: #fff;
    padding: 8px 9px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 11px;
    line-height: 1.2;
    width: 340px;
    backdrop-filter: blur(4px);
  }
  #ui .topline {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 5px;
  }
  .pill {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    padding: 3px 7px;
    font-weight: bold;
  }
  #ui .title {
    color: #ffe978;
    font-weight: bold;
    font-size: 13px;
    margin-bottom: 5px;
  }
  #controls {
    opacity: 0.92;
    margin-bottom: 5px;
  }
  #catRow {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    margin-bottom: 5px;
  }
  .catBtn {
    padding: 4px 5px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: #d6d6d6;
    font-size: 10px;
    font-weight: bold;
    text-align: center;
  }
  .catBtn.active {
    color: #101319;
    background: #88ff9d;
    border-color: #88ff9d;
  }
  #buildGrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 6px;
  }
  .buildItem {
    padding: 4px 5px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    min-height: 29px;
  }
  .buildItem.active {
    color: #0e1218;
    background: #8effa1;
    border-color: #8effa1;
    font-weight: bold;
  }
  .buildKey {
    color: #ffe978;
    font-weight: bold;
    margin-right: 4px;
  }
  .buildIcon {
    margin-right: 5px;
    font-size: 13px;
    display: inline-block;
    width: 14px;
    text-align: center;
    filter: drop-shadow(0 0 4px rgba(0,0,0,0.45));
  }

  #centerMsg {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,-50%);
    z-index: 25;
    color: white;
    font-size: 34px;
    font-weight: bold;
    text-align: center;
    pointer-events: none;
    text-shadow: 0 0 10px #000, 0 0 22px #000;
  }

  #bossBarWrap {
    position: absolute;
    left: 50%;
    top: 12px;
    transform: translateX(-50%);
    width: 420px;
    height: 20px;
    border-radius: 999px;
    overflow: hidden;
    background: rgba(0,0,0,0.58);
    border: 1px solid rgba(255,255,255,0.15);
    z-index: 21;
    display: none;
  }
  #bossBar {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg,#ff5858,#ff9b52);
  }
  #bossLabel {
    position: absolute;
    left: 50%;
    top: 13px;
    transform: translateX(-50%);
    z-index: 22;
    color: white;
    font-size: 12px;
    font-weight: bold;
    display: none;
    text-shadow: 0 0 8px #000;
  }
  #enemyUnlockWarning {
    position: absolute;
    left: 50%;
    top: 38px;
    transform: translateX(-50%);
    z-index: 22;
    color: #fff7cf;
    font-size: 13px;
    font-weight: bold;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(0,0,0,0.52);
    border: 1px solid rgba(255,235,162,0.38);
    text-shadow: 0 0 8px #000;
    letter-spacing: 0.2px;
    pointer-events: none;
  }
  #enemyUnlockWarning.flash {
    animation: unlockPulse 0.55s ease-in-out 2;
  }
  @keyframes unlockPulse {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.08); box-shadow: 0 0 20px rgba(255,198,110,0.5); }
    100% { transform: translateX(-50%) scale(1); }
  }
</style>
</head>
<body>
<div id="ui">
  <div class="title">Cat vs Mouse Survival 3D</div>
  <div class="topline">

    <div class="pill">Gas: <span id="gasCount">0</span></div>
    <div class="pill">Servants: <span id="servantCount">0</span></div>
    <div class="pill">Time: <span id="timeCount">0.0</span>s</div>
  </div>
  <div id="controls">W forward · S backpedal · A/D turn · Space place</div>
  <div id="catRow">
    <div id="catExplore" class="catBtn active">1 Explore</div>
    <div id="catEco" class="catBtn">2 Economic</div>
    <div id="catDef" class="catBtn">3 Defensive</div>

</div>

<div id="bossBarWrap"><div id="bossBar"></div></div>
<div id="bossLabel">CAT BOSS • HP 0 / 0</div>
<div id="enemyUnlockWarning"></div>
<div id="centerMsg"></div>

<script type="module">

  { kind:"siegeRat", name:"Siege Rat", icon:"🐀", unlockTime:440 },

// -------------------------------------------------

    { slot:9, name:"Gas Mine", cost:6, gasCost:0, type:"gasMine", hp:120, radius:2.0, requiresVent:true },

    { slot:6, name:"Diamond Wall", cost:8, gasCost:3, type:"diamondWall", hp:165, radius:2.5 },

    { slot:8, name:"Brace Tower", cost:11, gasCost:3, type:"braceTower", hp:125, radius:2.0 },

  ],
  4: [
    { slot:5, name:"Cheese Turret", cost:5, gasCost:0, type:"turret", hp:90, radius:2.0 },
    { slot:6, name:"Cheese Cannon", cost:10, gasCost:0, type:"cannon", hp:110, radius:2.2 },
    { slot:7, name:"Shard Launcher", cost:8, gasCost:0, type:"shardLauncher", hp:84, radius:2.0 },
    { slot:8, name:"Zap Coil", cost:9, gasCost:2, type:"zapCoil", hp:76, radius:1.9 },
    { slot:9, name:"Mortar Bloom", cost:12, gasCost:3, type:"mortarBloom", hp:94, radius:2.1, prereq:"workshop" },
    { slot:0, name:"Saw Blaster", cost:11, gasCost:2, type:"sawBlaster", hp:96, radius:2.0, prereq:"workshop" }
  ],
  5: [
    { slot:5, name:"Workshop", cost:12, gasCost:20, type:"workshop", hp:180, radius:2.5, prereq:"gasMine" },
    { slot:6, name:"Advanced Robo Foundry", cost:14, gasCost:24, type:"advancedRobo", hp:190, radius:2.8, prereq:"workshop" },
    { slot:7, name:"Mecha Hangar", cost:16, gasCost:26, type:"mechaHangar", hp:210, radius:2.9, prereq:"workshop" },
    { slot:8, name:"Beacon", cost:20, gasCost:8, type:"beacon", hp:100, radius:2.1, prereq:"workshop" },
    { slot:9, name:"Robo Facility", cost:12, gasCost:6, type:"robo", hp:145, radius:2.6, prereq:"workshop" },
    { slot:0, name:"Scout Post", cost:7, gasCost:0, type:"scoutPost", hp:82, radius:2.0 }
  ]
};
const BUILD_ICONS = {
  factory:"🧀", fountain:"💧", supplyNest:"📦", beacon:"📡", robo:"⚙️", scoutPost:"👁️", breedingNest:"🐣", gasDepot:"🛢️", gasMine:"♨️",
  wall:"🧱", diamondWall:"💎", barrierTotem:"🛡️", braceTower:"🏛️", repairAnchor:"🔧", fortPlate:"🪙",
  turret:"🎯", cannon:"💥", shardLauncher:"🔱", zapCoil:"⚡", mortarBloom:"🌸", sawBlaster:"🪚",
  workshop:"🏭", advancedRobo:"🤖", mechaHangar:"🚀"
};

function getSelectedBuildData() {
  if (currentCategory === 1 || currentSelectionSlot == null) return null;
  return CATEGORY_BUILDS[currentCategory].find(b => b.slot === currentSelectionSlot) || null;
}

function updateBuildUI() {
  ui.catExplore.classList.toggle("active", currentCategory === 1);
  ui.catEco.classList.toggle("active", currentCategory === 2);
  ui.catDef.classList.toggle("active", currentCategory === 3);
  ui.catAtk.classList.toggle("active", currentCategory === 4);
  ui.catTech.classList.toggle("active", currentCategory === 5);

  ui.buildGrid.innerHTML = "";
  if (currentCategory === 1) {
    const items = [
      "Explore mode",
      "2 Economic",
      "3 Defensive",
      "4 Attack",
      "Q Tech",
      "Then use 5 6 7 8 9 0",
      "Space places selected build"
    ];
    items.forEach((txt, i) => {
      const div = document.createElement("div");
      div.className = "buildItem" + (i === 0 ? " active" : "");
      div.textContent = txt;
      ui.buildGrid.appendChild(div);
    });
    return;
  }

  for (const b of CATEGORY_BUILDS[currentCategory]) {
    const div = document.createElement("div");
    div.className = "buildItem" + (currentSelectionSlot === b.slot ? " active" : "");
    const icon = BUILD_ICONS[b.type] || "•";
    const prereqTxt = b.prereq && !hasStructureType(b.prereq) ? ` · Needs ${prettyTypeName(b.prereq)}` : "";
    const tip = b.requiresVent ? " · On vent only" : "";
    div.innerHTML = `<span class="buildKey">${b.slot}</span><span class="buildIcon">${icon}</span>${b.name} (${b.cost}🧀/${b.gasCost||0}⛽)${prereqTxt}${tip}`;
    ui.buildGrid.appendChild(div);
  }
}
updateBuildUI();

// -------------------------------------------------
// HELPERS
// -------------------------------------------------
function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }
function rand(a,b){ return a + Math.random()*(b-a); }
function dist2(a,b){ return Math.hypot(a.x-b.x, a.z-b.z); }
function formatClock(seconds){
  const s = Math.max(0, Math.ceil(seconds));
  const mm = String(Math.floor(s / 60)).padStart(2, "0");
  const ss = String(s % 60).padStart(2, "0");
  return `${mm}:${ss}`;
}
function cellKey(cx, cz){ return `${cx},${cz}`; }
function worldToCell(x,z){
  return {
    cx: clamp(Math.round(x / GRID_SIZE), -GRID_HALF_CELLS, GRID_HALF_CELLS),
    cz: clamp(Math.round(z / GRID_SIZE), -GRID_HALF_CELLS, GRID_HALF_CELLS)
  };
}
function cellToWorld(cx,cz){ return { x:cx*GRID_SIZE, z:cz*GRID_SIZE }; }
function hasStructureType(type){ return structures.some(s => !s.dead && s.type===type); }
function prettyTypeName(type){
  const d = Object.values(CATEGORY_BUILDS).flat().find(v=>v.type===type);
  return d ? d.name : type;
}
function isWallStructure(s){ return !!s && (s.type === "wall" || s.type === "diamondWall"); }
function structureBlocksMovement(s){ return isWallStructure(s); }
function angleDiff(a,b){
  let d = b-a;
  while(d > Math.PI) d -= Math.PI*2;
  while(d < -Math.PI) d += Math.PI*2;
  return d;
}
function showCenter(text, dur=1.5){
  ui.msg.textContent = text;
  ui.msg.style.opacity = "1";
  setTimeout(() => {
    if (ui.msg.textContent === text) ui.msg.style.opacity = "0";
  }, dur * 1000);
}
function isEnemyTargetable(enemy){
  return !!enemy && !enemy.dead && !enemy.dying && !enemy.untargetable;
}
function updateEnemyUnlockWarning(){
  if(!ui.enemyUnlockWarning) return;
  const nextStage = ENEMY_UNLOCK_STAGES.find(stage => !unlockedEnemyKinds.has(stage.kind));
  if(!nextStage){
    ui.enemyUnlockWarning.textContent = "⚔️ All enemy types unlocked";
    ui.enemyUnlockWarning.style.display = "block";
    return;
  }
  const remain = Math.max(0, nextStage.unlockTime - time);
  ui.enemyUnlockWarning.textContent = `Up Next: ${nextStage.icon} ${nextStage.name} in ${formatClock(remain)}`;
  ui.enemyUnlockWarning.style.display = "block";
}
function syncEnemyUnlockStages(){
  for(const stage of ENEMY_UNLOCK_STAGES){
    if(time >= stage.unlockTime && !unlockedEnemyKinds.has(stage.kind)){
      unlockedEnemyKinds.add(stage.kind);
      ui.enemyUnlockWarning.classList.add("flash");
      setTimeout(()=>ui.enemyUnlockWarning.classList.remove("flash"), 700);
      if(!announcedUnlockKinds.has(stage.kind)){
        showCenter(`New Enemy Spawning: ${stage.name}`, 1.3);
        announcedUnlockKinds.add(stage.kind);
      }
    }
  }
}
function groundHeight(x,z){
  return 0;
}

// -------------------------------------------------
// LIGHTING
// -------------------------------------------------
const hemi = new THREE.HemisphereLight(0xeaf8ff, 0x526942, 1.08);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xffffff, 1.35);
sun.position.set(65,95,35);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left = -180;
sun.shadow.camera.right = 180;
sun.shadow.camera.top = 180;
sun.shadow.camera.bottom = -180;
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 400;
scene.add(sun);

// -------------------------------------------------
// WORLD
// -------------------------------------------------
function createGround(){
  const geo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, 180, 180);
  geo.rotateX(-Math.PI/2);
  const pos = geo.attributes.position;
  const colors = [];
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i), z = pos.getZ(i);
    pos.setY(i, 0);
    const n = Math.sin(x*0.07)*0.5 + Math.cos(z*0.05)*0.35 + Math.sin((x-z)*0.04)*0.25;
    const shade = 0.5 + n*0.25;
    colors.push(0.18 + shade*0.16, 0.32 + shade*0.22, 0.13 + shade*0.10);
  }
  geo.setAttribute("color", new THREE.Float32BufferAttribute(colors,3));
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:1 });
  const ground = new THREE.Mesh(geo, mat);
  ground.receiveShadow = true;
  scene.add(ground);
}
createGround();

function createRock(x,z,sx,sy,sz,color=0x6d7379){
  const geo = new THREE.DodecahedronGeometry(1,0);
  const mat = new THREE.MeshStandardMaterial({ color, roughness:1 });
  const m = new THREE.Mesh(geo, mat);
  m.scale.set(sx,sy,sz);
  m.position.set(x, groundHeight(x,z) + sy*0.7, z);
  m.castShadow = m.receiveShadow = true;
  scene.add(m);
  obstacles.push({ x,z,r:Math.max(sx,sz)*0.95, mesh:m });
}
function createCliff(x,z,sx,sy,sz){
  const geo = new THREE.BoxGeometry(sx,sy,sz);
  const mat = new THREE.MeshStandardMaterial({ color:0x726a56, roughness:1 });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, groundHeight(x,z) + sy/2, z);
  m.castShadow = m.receiveShadow = true;
  scene.add(m);
  obstacles.push({ x,z,r:Math.max(sx,sz)*0.56, mesh:m });
}
function createBush(x,z){
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color:0x4d8f39, roughness:1 });
  for(let i=0;i<4;i++){
    const b = new THREE.Mesh(new THREE.SphereGeometry(rand(0.5,0.9),10,8), mat);
    b.position.set(rand(-0.5,0.5), rand(0.35,0.8), rand(-0.5,0.5));
    g.add(b);
  }
  g.position.set(x, groundHeight(x,z), z);
  g.traverse(c=>{ if(c.isMesh){ c.castShadow = true; c.receiveShadow = true; } });
  scene.add(g);
}
function createFlower(x,z){
  const g = new THREE.Group();
  const stem = new THREE.Mesh(
    new THREE.CylinderGeometry(0.02,0.03,0.5,6),
    new THREE.MeshStandardMaterial({ color:0x3d8d35 })
  );
  stem.position.y = 0.25;
  g.add(stem);

  const petalMat = new THREE.MeshStandardMaterial({ color:Math.random()<0.5?0xffb0d0:0xffef8e });
  for(let i=0;i<5;i++){
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.06,6,6), petalMat);
    const a = i/5 * Math.PI*2;
    p.position.set(Math.sin(a)*0.08, 0.52, Math.cos(a)*0.08);
    g.add(p);
  }
  const center = new THREE.Mesh(new THREE.SphereGeometry(0.05,6,6), new THREE.MeshStandardMaterial({ color:0xffa92d }));
  center.position.y = 0.52;
  g.add(center);

  g.position.set(x, groundHeight(x,z), z);
  scene.add(g);
}
function createTree(x,z){
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35,0.48,3.2,8),
    new THREE.MeshStandardMaterial({ color:0x6c4426 })
  );
  const leaf = new THREE.Mesh(
    new THREE.ConeGeometry(2.2,5.0,10),
    new THREE.MeshStandardMaterial({ color:0x3d7d35 })
  );
  const y = groundHeight(x,z);
  trunk.position.set(x,y+1.6,z);
  leaf.position.set(x,y+5.4,z);
  trunk.castShadow = leaf.castShadow = true;
  trunk.receiveShadow = leaf.receiveShadow = true;
  scene.add(trunk,leaf);
}
for(let i=0;i<30;i++){
  const x = rand(-HALF_MAP+12, HALF_MAP-12);
  const z = rand(-HALF_MAP+12, HALF_MAP-12);
  if(Math.hypot(x,z)<20) continue;
  if(Math.random()<0.55) createRock(x,z, rand(2.4,5.7), rand(2.4,5.8), rand(2.4,5.7));
  else createCliff(x,z, rand(6,12), rand(4.5,10), rand(5,12));
}
for(let i=0;i<90;i++){
  const x = rand(-HALF_MAP+8, HALF_MAP-8);
  const z = rand(-HALF_MAP+8, HALF_MAP-8);
  if(Math.hypot(x,z)<12) continue;
  if(Math.random()<0.55) createBush(x,z);

function circleBlocked(x,z,r, ignoreStructure=null, structureSpacingScale=1){
  if(x < -HALF_MAP+2 || x > HALF_MAP-2 || z < -HALF_MAP+2 || z > HALF_MAP-2) return true;
  for(const o of obstacles){
    if(Math.hypot(x-o.x, z-o.z) < r + o.r) return true;
  }
  for(const s of structures){
    if(s.dead || s===ignoreStructure) continue;
    if(!structureBlocksMovement(s)) continue;
    if(Math.hypot(x-s.pos.x, z-s.pos.z) < (r + s.radius) * structureSpacingScale) return true;
  }
  return false;
}
function lineBlocked(a,b){
  const dx = b.x-a.x, dz = b.z-a.z;
  const len = Math.hypot(dx,dz);
  const steps = Math.ceil(len/1.5);
  for(let i=1;i<steps;i++){
    const t = i/steps;
    const x = a.x + dx*t;
    const z = a.z + dz*t;
    for(const o of obstacles){
      if(Math.hypot(x-o.x, z-o.z) < o.r + 0.65) return true;
    }
    for(const s of structures){
      if(s.dead) continue;
      if(!structureBlocksMovement(s)) continue;
      if(Math.hypot(x-s.pos.x, z-s.pos.z) < s.radius + 0.55) return true;
    }
  }
  return false;
}
function randomFreePosition(radius=1){
  for(let i=0;i<80;i++){
    const x = rand(-HALF_MAP+10, HALF_MAP-10);
    const z = rand(-HALF_MAP+10, HALF_MAP-10);
    if(!circleBlocked(x,z,radius)) return new THREE.Vector3(x, groundHeight(x,z), z);
  }
  return new THREE.Vector3(0, groundHeight(0,0), 0);
}

function addLightningArc(from, to, life=0.12, color=0xbec4ff){
  const segs = 6;
  const pts = [from.clone()];
  const dir = to.clone().sub(from);
  const side = new THREE.Vector3(-dir.z, 0, dir.x).normalize();
  for(let i=1;i<segs;i++){
    const t = i/segs;
    const p = from.clone().lerp(to, t);
    const wobble = (Math.random()*2 - 1) * 0.32 * (1 - Math.abs(t - 0.5));
    p.addScaledVector(side, wobble);
    p.y += (Math.random()*2 - 1) * 0.18;
    pts.push(p);
  }
  pts.push(to.clone());
  const curve = new THREE.CatmullRomCurve3(pts);
  const geo = new THREE.TubeGeometry(curve, 16, 0.04, 6, false);
  const mat = new THREE.MeshBasicMaterial({ color, transparent:true, opacity:0.96, depthWrite:false });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  particles.push({ mesh, vel:new THREE.Vector3(), life, maxLife:life, kind:"lightning" });
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.life -= dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    if (p.kind === "burst") {
      p.vel.y -= 7.5*dt;
      const s = Math.max(0.04, p.life / p.maxLife);
      p.mesh.scale.setScalar(s);
    } else if (p.kind === "blood") {
      p.vel.y -= 10.5 * dt;
      const s = Math.max(0.02, p.life / p.maxLife);
      p.mesh.scale.setScalar(s);
      if (p.mesh.material) p.mesh.material.opacity = clamp(p.life / p.maxLife, 0, 1);
    } else if (p.kind === "cog") {
      p.mesh.rotation.z += (p.spin || 2) * dt;
      p.mesh.scale.setScalar(0.6 + 0.5 * (p.life / p.maxLife));
      p.mesh.traverse(c => { if(c.material) c.material.opacity = p.life / p.maxLife; });
    } else if (p.kind === "lightning") {
      if (p.mesh.material) p.mesh.material.opacity = clamp((p.life / p.maxLife) * 1.2, 0, 1);
    }
    if(p.life <= 0){
      p.mesh.parent?.remove(p.mesh);
      particles.splice(i,1);
    }
  }
}

  );

function setHealthBar(bar, frac){
  if(!bar?.userData?.fg) return;
  const safeFrac = clamp(frac,0,1);
  const minVisible = safeFrac > 0 ? 0.03 : 0;
  const displayFrac = Math.max(minVisible, safeFrac);
  const fillWidth = bar.userData.width * 0.98;
  bar.userData.fg.scale.x = displayFrac;
  bar.userData.fg.position.x = -(fillWidth) * (1-displayFrac)/2;
  if(bar.userData.fg?.material){
    const low = new THREE.Color(0xff4f4f);
    const high = new THREE.Color(0x34eb72);
    bar.userData.fg.material.color.copy(low).lerp(high, safeFrac);
  }
}

  for(let i=floatingTexts.length-1;i>=0;i--){

    ft.life -= dt;
    ft.sprite.position.y += ft.rise * dt;
    ft.sprite.material.opacity = clamp(ft.life / 0.9, 0, 1);
    ft.sprite.quaternion.copy(camera.quaternion);

function shouldShowBar(bar, dist, near, far){
  const prev = !!bar.userData._vis;
  const show = prev ? dist < far : dist < near;
  bar.userData._vis = show;
  return show;
}
function updateWorldHealthBars(){
  const structureNear = 36, structureFar = 39;
  const enemyNear = 46, enemyFar = 49;
  const catNear = 58, catFar = 61;

  for(const s of structures){
    if(s.dead || !s.mesh?.userData?.healthBar) continue;
    const bar = s.mesh.userData.healthBar;
    const d = dist2(player.pos, s.pos);
    bar.visible = shouldShowBar(bar, d, structureNear, structureFar);
    if(bar.visible) bar.quaternion.copy(camera.quaternion);
  }

  for(const e of enemies){
    if(!isEnemyTargetable(e) || !e.healthBar) continue;
    const d = dist2(player.pos, e.pos);
    e.healthBar.visible = shouldShowBar(e.healthBar, d, enemyNear, enemyFar);
    if(e.healthBar.visible) e.healthBar.quaternion.copy(camera.quaternion);
  }

  if(cat?.healthBar && !cat.dead && !cat.dying){
    const d = dist2(player.pos, cat.pos);
    cat.healthBar.visible = shouldShowBar(cat.healthBar, d, catNear, catFar);
    if(cat.healthBar.visible) cat.healthBar.quaternion.copy(camera.quaternion);
  } else if(cat?.healthBar){
    cat.healthBar.visible = false;
    cat.healthBar.userData._vis = false;
  }
}

function animateMouseRig(group, speedFactor, t, attackAmount=0, dying=0){
  const rig = group.userData;
  if(!rig) return;
  const walk = t * (5 + speedFactor*8);
  if(rig.pelvis?.position) rig.pelvis.position.y = Math.sin(walk*2)*0.02;
  if(rig.spine?.rotation) rig.spine.rotation.x = Math.sin(walk*2)*0.05 + attackAmount*0.18 - dying*1.2;
  if(rig.neck?.rotation) rig.neck.rotation.x = Math.sin(walk*2+0.5)*0.04 - attackAmount*0.3 + dying*0.35;

  if(rig.tailBase?.rotation){
    rig.tailBase.rotation.x = 0.18 + Math.sin(walk*2.5)*0.16;
    rig.tailBase.rotation.y = Math.sin(walk*1.8)*0.22;
  }
  if(rig.tailMid?.rotation){
    rig.tailMid.rotation.x = 0.12 + Math.sin(walk*2.6+0.6)*0.14;
    rig.tailMid.rotation.y = Math.sin(walk*1.9+0.5)*0.18;
  }
  if(rig.tailTip?.rotation){
    rig.tailTip.rotation.x = 0.1 + Math.sin(walk*2.8+1.1)*0.15;
    rig.tailTip.rotation.y = Math.sin(walk*2.0+1.0)*0.22;
  }

  const phases = [0,Math.PI,Math.PI,0];
  (rig.legs || []).forEach((leg,i)=>{
    leg.rotation.x = Math.sin(walk + phases[i]) * (0.65*speedFactor + 0.1) - attackAmount*0.4 + dying*0.7;
  });
}

function getSeparationVector(entity, list, desiredMinDist=1.8){
  const out = new THREE.Vector3();
  for (const other of list) {
    if (other === entity || other.dead) continue;
    const dx = entity.pos.x - other.pos.x;
    const dz = entity.pos.z - other.pos.z;
    const d = Math.hypot(dx, dz);
    if (d > 0.001 && d < desiredMinDist) {
      const push = (desiredMinDist - d) / desiredMinDist;
      out.x += (dx / d) * push;
      out.z += (dz / d) * push;
    }
  }
  return out;
}
function collisionPushOut(x,z,radius, collideWithStructures=true, ignoreStructure=null){
  let px = x, pz = z;
  let hitCount = 0;
  for(let iter=0; iter<4; iter++){
    let adjusted = false;
    for(const o of obstacles){
      const dx = px - o.x;
      const dz = pz - o.z;
      const d = Math.hypot(dx, dz) || 0.0001;
      const minD = radius + o.r + 0.03;
      if(d < minD){
        const push = (minD - d);
        px += (dx / d) * push;
        pz += (dz / d) * push;
        hitCount++;
        adjusted = true;
      }
    }
    if(collideWithStructures){
      for(const s of structures){
        if(s.dead || s===ignoreStructure || !structureBlocksMovement(s)) continue;
        const dx = px - s.pos.x;
        const dz = pz - s.pos.z;
        const d = Math.hypot(dx, dz) || 0.0001;
        const minD = radius + s.radius + 0.04;
        if(d < minD){
          const push = (minD - d);
          px += (dx / d) * push;
          pz += (dz / d) * push;
          hitCount++;
          adjusted = true;
        }
      }
    }
    px = clamp(px, -HALF_MAP+2.25, HALF_MAP-2.25);
    pz = clamp(pz, -HALF_MAP+2.25, HALF_MAP-2.25);
    if(!adjusted) break;
  }
  return { x:px, z:pz, hitCount };
}
function steerMove(entity, desired, dt, collideWithStructures=true, ignoreStructure=null, neighborList=null){
  const start = entity.pos;
  let best = null;
  let bestScore = Infinity;
  const baseHeading = Math.atan2(desired.x, desired.z);
  const speed = entity.speed;
  const radius = entity.radius;
  const offsets = [0, 0.22, -0.22, 0.45, -0.45, 0.75, -0.75, 1.05, -1.05, 1.35, -1.35, Math.PI*0.5, -Math.PI*0.5, Math.PI];
  const fullStep = speed * dt;

  function blockedAt(x, z){
    if(x < -HALF_MAP+2 || x > HALF_MAP-2 || z < -HALF_MAP+2 || z > HALF_MAP-2) return true;
    for(const o of obstacles){
      if(Math.hypot(x-o.x, z-o.z) < radius + o.r) return true;
    }
    if(collideWithStructures){
      for(const s of structures){
        if(s.dead || s===ignoreStructure) continue;
        if(Math.hypot(x-s.pos.x, z-s.pos.z) < radius + s.radius) return true;
      }
    }
    return false;
  }
  function penetrationPenalty(x, z){
    let p = 0;
    for(const o of obstacles){
      const d = Math.hypot(x-o.x, z-o.z);
      const minD = radius + o.r;
      if(d < minD) p += (minD - d) * 8;
      if(d < minD + 0.6) p += (minD + 0.6 - d) * 2.2;
    }
    if(collideWithStructures){
      for(const s of structures){
        if(s.dead || s===ignoreStructure || !structureBlocksMovement(s)) continue;
        const d = Math.hypot(x-s.pos.x, z-s.pos.z);
        const minD = radius + s.radius;
        if(d < minD) p += (minD - d) * 10;
        if(d < minD + 0.7) p += (minD + 0.7 - d) * 2.7;
      }
    }
    return p;
  }

  function neighborPenaltyAt(x, z){
    if(!neighborList) return 0;
    let p = 0;
    for (const other of neighborList) {
      if (other === entity || other.dead) continue;
      const d = Math.hypot(x-other.pos.x, z-other.pos.z);
      const softR = radius + other.radius * 0.9;
      if (d < softR) p += (softR - d) * 2.2;
      if (d < 2.4) p += (2.4 - d) * 1.3;
    }
    return p;
  }

  for(const off of offsets){
    const heading = baseHeading + off;
    const dx = Math.sin(heading);
    const dz = Math.cos(heading);
    const nx = start.x + dx * fullStep;
    const nz = start.z + dz * fullStep;
    if(nx < -HALF_MAP+2 || nx > HALF_MAP-2 || nz < -HALF_MAP+2 || nz > HALF_MAP-2) continue;
    let score = Math.abs(off)*0.18;
    score += neighborPenaltyAt(nx, nz);
    score += penetrationPenalty(nx, nz);
    if(blockedAt(nx, nz)) score += 2.1;
    if(score < bestScore){
      bestScore = score;
      best = { x:nx, z:nz, heading };
    }
  }
  if(best) return best;

  // Fallback A: reduced-distance push toward desired heading.
  const fx = Math.sin(baseHeading), fz = Math.cos(baseHeading);
  const fallbackScales = [0.66, 0.42, 0.26];
  for(const scale of fallbackScales){
    const nx = start.x + fx * fullStep * scale;
    const nz = start.z + fz * fullStep * scale;
    if(nx >= -HALF_MAP+2 && nx <= HALF_MAP-2 && nz >= -HALF_MAP+2 && nz <= HALF_MAP-2){
      return { x:nx, z:nz, heading:baseHeading };
    }
  }

  // Fallback B: tiny side shuffles to break body jams.
  const sideOffsets = [Math.PI * 0.5, -Math.PI * 0.5, 0.35, -0.35];
  for(const off of sideOffsets){
    const h = baseHeading + off;
    const nx = start.x + Math.sin(h) * fullStep * 0.24;
    const nz = start.z + Math.cos(h) * fullStep * 0.24;
    if(nx >= -HALF_MAP+2 && nx <= HALF_MAP-2 && nz >= -HALF_MAP+2 && nz <= HALF_MAP-2){
      return { x:nx, z:nz, heading:h };
    }
  }

  return best;
}
function directSteerToward(entity, targetPos, dt, collideWithStructures=true, ignoreStructure=null, neighborList=null){
  const dx = targetPos.x - entity.pos.x;
  const dz = targetPos.z - entity.pos.z;
  const len = Math.hypot(dx,dz) || 1;
  const desired = { x:dx/len, z:dz/len };
  if (neighborList) {
    const sep = getSeparationVector(entity, neighborList, 1.75);
    desired.x += sep.x * 0.7;
    desired.z += sep.z * 0.7;
    const l2 = Math.hypot(desired.x, desired.z) || 1;
    desired.x /= l2;
    desired.z /= l2;
  }
  const raw = steerMove(entity, desired, dt, collideWithStructures, ignoreStructure, neighborList);
  if(!raw) return raw;
  const pushed = collisionPushOut(raw.x, raw.z, entity.radius || 0.8, collideWithStructures, ignoreStructure);
  raw.x = pushed.x;
  raw.z = pushed.z;
  raw.bumped = pushed.hitCount > 0;
  return raw;
}
function smoothAimYaw(pivot, holder, key, desiredYaw, dt, speed=8.5){
  if(!pivot) return;
  if(holder[key] == null) holder[key] = pivot.rotation.y;
  holder[key] += clamp(angleDiff(holder[key], desiredYaw), -speed * dt, speed * dt);
  pivot.rotation.y = holder[key];
}
function updateAgentStuck(entity, dt, hasTarget, onStuck){
  // AI tuning helper: general stuck detector with brief cooldown.
  if(!entity._stuck){
    entity._stuck = { x:entity.pos.x, z:entity.pos.z, still:0, cooldown:0, phase:0, antiOsc:0 };
  }
  const s = entity._stuck;
  const moved = Math.hypot(entity.pos.x - s.x, entity.pos.z - s.z);
  s.cooldown = Math.max(0, s.cooldown - dt);
  if(hasTarget && moved < 0.06) s.still += dt;
  else s.still = Math.max(0, s.still - dt * 0.85);
  s.x = entity.pos.x; s.z = entity.pos.z;
  if(hasTarget && s.still > 0.35 && s.cooldown <= 0){
    s.still = 0;
    s.cooldown = 0.48;
    s.phase = (s.phase + 1) % 5;
    s.antiOsc = 0.9;
    onStuck?.(s.phase);
    return true;
  }
  s.antiOsc = Math.max(0, s.antiOsc - dt);
  return false;
}
function meleeStopDistance(attacker, target, extra=0.16){
  return (attacker.radius || 0.7) + (target?.radius || 0.7) + (attacker.attackRange || 1.2) - 0.48 + extra;
}
function pickAttackSlot(attacker, targetPos, targetRadius=1.0, prefDir=1){
  const desired = meleeStopDistance(attacker, { radius:targetRadius }, 0.22);
  const toA = Math.atan2(attacker.pos.x - targetPos.x, attacker.pos.z - targetPos.z);
  const offsets = [0, 0.44*prefDir, -0.44*prefDir, 0.88*prefDir, -0.88*prefDir, 1.2, -1.2, Math.PI];
  for(const off of offsets){
    const a = toA + off;
    const px = targetPos.x + Math.sin(a) * desired;
    const pz = targetPos.z + Math.cos(a) * desired;
    if(!circleBlocked(px, pz, attacker.radius || 0.8, null, 0.86)){
      return new THREE.Vector3(px, groundHeight(px,pz), pz);
    }
  }
  return new THREE.Vector3(targetPos.x, groundHeight(targetPos.x,targetPos.z), targetPos.z);
}
function setRepathPoint(entity, centerPos, radius=4.5){
  let repath = null;
  for(let i=0;i<20;i++){
    const a = Math.random() * Math.PI * 2;
    const r = rand(radius*0.25, radius);
    const x = clamp(centerPos.x + Math.sin(a)*r, -HALF_MAP+3.2, HALF_MAP-3.2);
    const z = clamp(centerPos.z + Math.cos(a)*r, -HALF_MAP+3.2, HALF_MAP-3.2);
    if(!circleBlocked(x, z, entity.radius || 0.85, entity.target && entity.target.type ? entity.target : null)){
      repath = new THREE.Vector3(x, 0, z);
      break;
    }
  }
  if(!repath){
    const x = clamp(entity.pos.x, -HALF_MAP+3.2, HALF_MAP-3.2);
    const z = clamp(entity.pos.z, -HALF_MAP+3.2, HALF_MAP-3.2);
    if(!circleBlocked(x, z, entity.radius || 0.85)) repath = new THREE.Vector3(x, 0, z);
  }
  entity.repathTarget = repath;
  if(entity.repathTarget){
    entity.repathTarget.y = groundHeight(entity.repathTarget.x, entity.repathTarget.z);
    entity.repathTimer = rand(0.45, 0.95);
  } else {
    entity.repathTimer = 0;
  }
}
function isLivingTarget(target){
  return !!target && !!target.isLiving && !target.dead && !target.dying;
}
function nearestAttackableStructure(origin, maxRange=999, filterFn=null){
  let best = null, bestD = maxRange;
  for(const s of structures){
    if(s.dead) continue;
    if(filterFn && !filterFn(s)) continue;
    const d = dist2(origin.pos || origin, s.pos);
    if(d < bestD){ bestD = d; best = s; }
  }
  return best;
}
function applyDamageToLiving(target, damage, hitPos=null){
  if(!isLivingTarget(target)) return;
  if(target.kind && target.untargetable) return;
  const src = hitPos || target.pos;
  addBloodHit(src.x, src.y + 0.8, src.z, clamp(damage/28, 0.5, 1.45));
  if(target === player){
    diePlayer();
    return;
  }
  target.hp -= damage;
  if(target.healthBar) setHealthBar(target.healthBar, target.hp / target.maxHp);
  if(target === cat){
    if(target.hp <= 0) killCat();
  } else if(target.kind){
    if(target.hp <= 0) killEnemy(target);
  } else if(target.state === "wild" || target.state === "servant"){
    if(target.hp <= 0) beginDeath(target, "mouse");
  }
}

function attachWallCracks(group, tint=0x2a1908){
  const crackMat = new THREE.MeshBasicMaterial({ color:tint, transparent:true, opacity:0, depthWrite:false, side:THREE.DoubleSide });
  const planes = [
    { x:-0.85, y:1.5, z:0.68, w:0.9, h:1.05, r:0.22 },
    { x:0.62, y:1.15, z:0.68, w:1.1, h:1.2, r:-0.14 },
    { x:0.08, y:0.86, z:-0.68, w:1.15, h:0.9, r:0.19 }
  ];
  const cracks = [];
  planes.forEach(p=>{
    const crack = new THREE.Mesh(new THREE.PlaneGeometry(p.w, p.h), crackMat.clone());
    crack.position.set(p.x,p.y,p.z);
    crack.rotation.y = p.z > 0 ? 0 : Math.PI;
    crack.rotation.z = p.r;
    group.add(crack);
    cracks.push(crack);
  });
  group.userData.wallCracks = cracks;
}
function updateWallDamageVisual(structure){
  if(!isWallStructure(structure) || !structure.mesh?.userData?.wallCracks) return;
  const frac = clamp(structure.hp / Math.max(1, structure.maxHp), 0, 1);
  const visibility = frac < 0.65 ? clamp((0.65 - frac) / 0.65, 0, 1) : 0;
  structure.mesh.userData.wallCracks.forEach((crack, i)=>{
    crack.material.opacity = visibility * (0.38 + i*0.18);
  });
}

function createStructure(type,x,z,rotationY=0, dataOverride=null){
  const data = dataOverride || Object.values(CATEGORY_BUILDS).flat().find(v=>v.type===type);
  const mesh = createStructureMesh(type);
  mesh.position.set(x, groundHeight(x,z), z);
  mesh.rotation.y = 0;
  scene.add(mesh);
  const cell = worldToCell(x,z);

  const s = {
    type,
    mesh,
    pos:mesh.position,
    radius:data.radius,
    hp:data.hp,
    maxHp:data.hp,
    dead:false,
    fireCd:0,
    produceCd:0,
    robotCd:0,
    healCd:0,
    trapCd:0,
    assignedServant:null,
    rotationY:0,
    cell,
    gasCarryCd:0,
    breedCd:25,
    mechaPending:type==="mechaHangar",
    isBeaconBuffed:false,
    target:null
  };
  structures.push(s);
  occupiedCells.set(cellKey(cell.cx, cell.cz), s);
  if(type==="gasMine"){
    const vent = gasVents.find(v => v.cx===cell.cx && v.cz===cell.cz);
    if(vent){ vent.mine = s; s.vent = vent; }
  }
  setHealthBar(mesh.userData.healthBar, 1);
  updateWallDamageVisual(s);

  const color = structureColor(type);
  addBurst(x, mesh.position.y+1.0, z, color, 26, 5.8, 0.8, 0.09);
  for(let i=0;i<12;i++){
    addBurst(x + rand(-1.2,1.2), mesh.position.y+rand(0.3,2.1), z + rand(-0.6,0.6), 0xfff4a4, 1, 1.2, 0.4, 0.06);
  }
  return s;
}
function damageStructure(s,dmg){
  if(!s || s.dead) return;
  s.hp -= dmg;
  setHealthBar(s.mesh.userData.healthBar, Math.max(0, s.hp/s.maxHp));
  updateWallDamageVisual(s);
  addBurst(s.pos.x, s.pos.y+1.1, s.pos.z, 0xffca77, 5, 3, 0.28, 0.07);
  if(s.hp <= 0){
    s.hp = 0;
    s.dead = true;
    addBurst(s.pos.x, s.pos.y+1.2, s.pos.z, 0xff6655, 42, 8.2, 1.15, 0.14);
    addBurst(s.pos.x, s.pos.y+1.2, s.pos.z, 0xffcc66, 28, 6.8, 0.95, 0.11);
    if(s.beam){ scene.remove(s.beam); s.beam = null; }
    if(s.cell) occupiedCells.delete(cellKey(s.cell.cx, s.cell.cz));
    if(s.type==="gasMine" && s.vent) s.vent.mine = null;
    scene.remove(s.mesh);
    s.mesh.visible = false;
  }
}
function getBuildPlace(){
  const forward = new THREE.Vector3(Math.sin(player.heading),0,Math.cos(player.heading));
  const p = player.pos.clone().addScaledVector(forward, 4.2);
  const cell = worldToCell(p.x,p.z);
  const w = cellToWorld(cell.cx, cell.cz);
  return new THREE.Vector3(w.x, groundHeight(w.x,w.z), w.z);
}
function getBuildValidation(selected, x, z){
  const c = worldToCell(x,z);
  const key = cellKey(c.cx,c.cz);
  if(occupiedCells.has(key)) return { ok:false, reason:"Cell occupied", cell:c };
  if(selected.prereq && !hasStructureType(selected.prereq)) return { ok:false, reason:`Need ${prettyTypeName(selected.prereq)}`, cell:c };
  if(selected.requiresVent){
    const vent = gasVents.find(v => v.cx===c.cx && v.cz===c.cz);
    if(!vent) return { ok:false, reason:"Gas mine must be on vent", cell:c };
    if(vent.mine && !vent.mine.dead) return { ok:false, reason:"Vent already mined", cell:c };
  }
  if(circleBlocked(x,z,selected.radius, null, 0.75)) return { ok:false, reason:"Cannot build there", cell:c };
  return { ok:true, reason:"", cell:c };
}
function beaconBuffAt(x,z){
  let buff = { damage:1, speed:1, active:false };
  for(const s of structures){
    if(s.dead || s.type!=="beacon") continue;
    const d = Math.hypot(x-s.pos.x, z-s.pos.z);
    if(d < 13){
      buff.damage += 0.25;
      buff.speed += 0.2;
      buff.active = true;
    }
  }
  return buff;
}
function updateBeaconGlow(){
  for(const s of structures){
    if(s.dead || s.type === "beacon") continue;
    const buff = beaconBuffAt(s.pos.x, s.pos.z);
    s.isBeaconBuffed = buff.active;
    const glow = s.mesh.userData.beaconGlow;
    if(!glow) continue;
    if(buff.active){
      glow.visible = true;
      glow.material.opacity = 0.18 + Math.sin(time*4)*0.08;
      glow.scale.set(1.4 + Math.sin(time*3)*0.05, 1, 1.4 + Math.sin(time*3)*0.05);
      glow.material.color.set(0x86ffb2);
    } else {
      glow.visible = false;
    }
  }
}

function spawnProjectile(opts){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(opts.size ?? 0.18, 10, 10),
    new THREE.MeshStandardMaterial({ color:opts.color ?? 0xffdd66, emissive:opts.color ?? 0xffdd66, emissiveIntensity:0.45 })
  );
  mesh.position.copy(opts.pos);
  mesh.castShadow = true;
  scene.add(mesh);

  projectiles.push({
    mesh,
    pos:mesh.position,
    vel:opts.vel.clone(),
    life:opts.life ?? 4,
    damage:opts.damage ?? 8,
    splash:opts.splash ?? 0,
    from:opts.from ?? "ally",
    kind:opts.kind ?? "pellet",
    returnHits:opts.returnHits || false
  });
}
function explodeProjectile(p){
  const burstColor = p.kind==="acid" ? 0x86ff77 : (p.from==="enemy"?0xff5555:0xffdd66);
  addBurst(p.pos.x,p.pos.y,p.pos.z, burstColor, p.kind==="cannon"||p.kind==="mortar"?18:8, 4.5, 0.6, 0.09);

  if(p.from === "ally"){
  for(const e of enemies){
    if(!isEnemyTargetable(e)) continue;
      const d = dist2({x:p.pos.x,z:p.pos.z}, e.pos);
      if(d < 1 + p.splash){
        applyDamageToLiving(e, p.damage * (d < 0.5 ? 1 : Math.max(0.35, 1 - d/(p.splash+1))), p.pos);
      }
    }
    if(cat && !cat.dead && !cat.dying){
      const d = dist2({x:p.pos.x,z:p.pos.z}, cat.pos);
      if(d < 1.7 + p.splash){
        applyDamageToLiving(cat, p.damage * (d < 0.8 ? 1 : Math.max(0.35, 1 - d/(p.splash+1.7))), p.pos);
      }
    }
  }else{
    if(!player.dead && dist2({x:p.pos.x,z:p.pos.z}, player.pos) < 1.2 + p.splash) applyDamageToLiving(player, 999, p.pos);
    for(const m of servantMice){
      if(m.dead || m.dying) continue;
      if(dist2({x:p.pos.x,z:p.pos.z}, m.pos) < 1.0 + p.splash){
        applyDamageToLiving(m, p.damage, p.pos);
      }
    }
    for(const s of structures){
      if(s.dead) continue;
      const d = dist2({x:p.pos.x,z:p.pos.z}, s.pos);
      if(d < s.radius + p.splash) damageStructure(s, p.damage * Math.max(0.4, 1 - d/(s.radius+p.splash+0.01)));
    }
  }
}
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){
    const p = projectiles[i];
    p.life -= dt;
    p.vel.y -= 18*dt;
    p.pos.addScaledVector(p.vel, dt);

    const gy = groundHeight(p.pos.x,p.pos.z);
    if(p.pos.y <= gy+0.12){
      p.pos.y = gy+0.12;
      explodeProjectile(p);
      p.mesh.parent?.remove(p.mesh);
      projectiles.splice(i,1);
      continue;
    }

    if(p.from==="ally"){
      let hit = false;
      for(const e of enemies){
        if(!isEnemyTargetable(e)) continue;
        if(dist2(p.pos, e.pos) < e.radius + 0.35 && Math.abs(p.pos.y - (e.pos.y+0.8)) < 1.5){
          hit = true; break;
        }
      }
      if(cat && !cat.dead && !cat.dying && dist2(p.pos, cat.pos) < cat.radius + 0.5 && Math.abs(p.pos.y - (cat.pos.y+2)) < 2.6) hit = true;
      if(hit){
        explodeProjectile(p);
        p.mesh.parent?.remove(p.mesh);
        projectiles.splice(i,1);
        continue;
      }
    }else{
      if(!player.dead && dist2(p.pos, player.pos) < 0.9 && Math.abs(p.pos.y - (player.pos.y+0.7)) < 1.4){
        explodeProjectile(p);
        p.mesh.parent?.remove(p.mesh);
        projectiles.splice(i,1);
        continue;
      }
    }

    if(p.life <= 0){
      explodeProjectile(p);
      p.mesh.parent?.remove(p.mesh);
      projectiles.splice(i,1);
    }
  }
}

function ensureRepairBeam(structure) {

  const mat = new THREE.MeshBasicMaterial({ color:0x3da3ff, transparent:true, opacity:0.95, depthTest:false, depthWrite:false });
  const cyl = new THREE.Mesh(new THREE.CylinderGeometry(0.11,0.11,1,10), mat);
  cyl.renderOrder = 180;

  scene.add(cyl);
  structure.beam = cyl;
  return cyl;
}

}

function beginDeath(entity, type="mouse"){
  if (entity.dying || entity.dead) return;
  if(entity.assignedFactory && entity.assignedFactory.assignedServant === entity){
    entity.assignedFactory.assignedServant = null;
  }
  if(entity.assignedGasMine && entity.assignedGasMine.assignedServant === entity){
    entity.assignedGasMine.assignedServant = null;
  }
  entity.dying = true;
  entity.deathT = 0;
  entity.deathType = type;
  addBurst(entity.pos.x, entity.pos.y+0.8, entity.pos.z, type==="cat"?0xff7d44:0xff7777, 16, 4.5, 0.6, 0.08);
}
function finalizeDeath(entity) {
  entity.dead = true;
  entity.group.parent?.remove(entity.group);
}
function killEnemy(e){
  if(e.dead || e.dying) return;
  beginDeath(e, e.kind === "weasel" ? "weasel" : "mouse");
  if(Math.random() < 0.7) spawnCheeseAt(e.pos.x+rand(-0.8,0.8), e.pos.z+rand(-0.8,0.8), 3);
}
function killCat(){
  if(!cat || cat.dead || cat.dying) return;
  beginDeath(cat, "cat");
  ui.bossWrap.style.display = "none";
  ui.bossLabel.style.display = "none";
  setTimeout(() => {
    gameWon = true;
    ui.msg.textContent = "YOU WIN";
    ui.msg.style.opacity = "1";
  }, 500);
}

function recruitMouse(m){
  const i = wildMice.indexOf(m);
  if(i >= 0) wildMice.splice(i,1);
  servantMice.push(m);
  m.state = "servant";
  addBurst(m.pos.x, m.pos.y+0.9, m.pos.z, 0x8effa0, 16, 5, 0.75, 0.09);
  showCenter("A Mouse Joined You!", 1.1);
}
function updateMouseEntity(m,dt){
  if (m.dead) return;
  if (m.dying) {
    m.deathT += dt;
    m.group.rotation.z = clamp(m.deathT * 4, 0, Math.PI/2.2);
    m.group.position.y = groundHeight(m.pos.x,m.pos.z) - Math.min(0.4, m.deathT * 0.6);
    animateMouseRig(m.group, 0, m.anim, 0, clamp(m.deathT * 2, 0, 1));
    if (m.deathT > 0.45) finalizeDeath(m);
    return;
  }

  m.anim += dt;
  m.attackAnim = Math.max(0, m.attackAnim - dt*4);
  m.repathTimer = Math.max(0, (m.repathTimer || 0) - dt);

  if(m.state === "wild"){
    if(dist2(m.pos, player.pos) < 1.35){ recruitMouse(m); return; }
    if(!m.target || dist2(m.pos,m.target) < 1.3 || Math.random() < 0.018){
      const a = Math.random() * Math.PI * 2;
      const r = rand(3, 10);
      m.target = new THREE.Vector3(
        clamp(m.pos.x + Math.sin(a)*r, -HALF_MAP+6, HALF_MAP-6),
        0,
        clamp(m.pos.z + Math.cos(a)*r, -HALF_MAP+6, HALF_MAP-6)
      );
      m.target.y = groundHeight(m.target.x, m.target.z);
    }
  } else {
    if(m.assignedMechaHangar && (!m.assignedMechaHangar.dead) && m.assignedMechaHangar.mechaPending){
      m.target = m.assignedMechaHangar.pos;
      if(dist2(m.pos, m.assignedMechaHangar.pos) < 1.5){
        m.assignedMechaHangar.mechaPending = false;
        spawnRobot(m.assignedMechaHangar.pos.x+1.2, m.assignedMechaHangar.pos.z, false, true);
        m.dead = true;
        m.group.visible = false;
        addBurst(m.pos.x,m.pos.y+0.8,m.pos.z,0xffb66f,18,5.5,0.8,0.1);
        return;
      }
    }
    if(m.assignedGasMine && !m.assignedGasMine.dead){
      const mine = m.assignedGasMine;
      if(!m.gasJobState) m.gasJobState = "toMine";
      if(m.gasJobState === "toMine"){
        m.target = mine.pos;
        if(dist2(m.pos, mine.pos) < 1.5){
          m.gasJobState = "toDeposit";
          m.carryingGas = true;
        }
      } else if(m.gasJobState === "toDeposit"){
        let depot = null, depotD = dist2(mine.pos, player.pos);
        for(const s of structures){
          if(s.dead || s.type!=="gasDepot") continue;
          const d = dist2(mine.pos, s.pos);
          if(d < depotD){ depotD = d; depot = s; }
        }
        m.target = depot ? depot.pos : player.pos;
        if(dist2(m.pos, m.target) < 1.5){
          gas += 10;
          popWorldText("+10⛽", m.pos.x, m.pos.y + 1.5, m.pos.z, "#9fffe4");
          m.gasJobState = "toMine";
          m.carryingGas = false;
        }
      }
    } else {
      m.assignedGasMine = null;
      m.gasJobState = null;
      m.carryingGas = false;
    }

    let repairTarget = null;
    let bestRepair = 9999;
    for(const s of structures){
      if(s.dead || s.hp >= s.maxHp) continue;
      const d = dist2(m.pos,s.pos);
      if(d < bestRepair && d < 24){ bestRepair = d; repairTarget = s; }
    }

    if(m.assignedGasMine){
      // dedicated gas worker skips general jobs
    } else if(repairTarget){
      m.target = repairTarget.pos;
      if(bestRepair < repairTarget.radius + 1.2){
        m.repairCd -= dt;
        m.attackAnim = 0.9;
        if(m.repairCd <= 0){
          m.repairCd = 0.5;
          repairTarget.hp = Math.min(repairTarget.maxHp, repairTarget.hp + 3.2);
          setHealthBar(repairTarget.mesh.userData.healthBar, repairTarget.hp/repairTarget.maxHp);
          updateWallDamageVisual(repairTarget);
          addBurst(repairTarget.pos.x, repairTarget.pos.y+1.0, repairTarget.pos.z, 0x95ffb6, 4, 2.3, 0.3, 0.05);
        }
      }
    } else {
      let assignedFactory = null;
      for(const f of structures){
        if(f.dead || f.type!=="factory") continue;
        if(!f.assignedServant || f.assignedServant===m){ assignedFactory = f; break; }
      }

      if(assignedFactory){
        if(m.assignedFactory && m.assignedFactory !== assignedFactory && m.assignedFactory.assignedServant===m) m.assignedFactory.assignedServant = null;
        m.assignedFactory = assignedFactory;
        assignedFactory.assignedServant = m;
        m.target = assignedFactory.pos;
      } else {
        if(m.assignedFactory && m.assignedFactory.assignedServant===m) m.assignedFactory.assignedServant = null;
        m.assignedFactory = null;

        let nearestCheese = null, best = 9999;
        for(const c of cheeses){
          const d = dist2(m.pos,c.pos);
          if(d < best){ best = d; nearestCheese = c; }
        }

        if(nearestCheese && best < 28){
          m.target = nearestCheese.pos;
        } else {
          m.orbitAngle += dt * 1.2;
          const orbitR = 3.4 + (Math.sin(m.anim*0.7 + m.orbitAngle) * 1.2);
          m.target = new THREE.Vector3(
            player.pos.x + Math.sin(m.orbitAngle + m.heading*0.25) * orbitR,
            0,
            player.pos.z + Math.cos(m.orbitAngle + m.heading*0.25) * orbitR
          );
          m.target.y = groundHeight(m.target.x, m.target.z);
        }
      }
    }

    for(let i=cheeses.length-1;i>=0;i--){
      const c = cheeses[i];
      if(dist2(m.pos,c.pos) < 1.15){
        cheese += c.amount;
        popWorldText("+" + c.amount + "🧀", m.pos.x, m.pos.y + 1.45, m.pos.z, "#ffe66f");
        addBurst(c.pos.x,c.pos.y+0.3,c.pos.z,0xffec71,8,4,0.4,0.08);
        c.group.parent?.remove(c.group);
        cheeses.splice(i,1);
        break;
      }
    }
  }

  const moveTarget = (m.repathTimer > 0 && m.repathTarget) ? m.repathTarget : m.target;
  if(moveTarget){
    const mouseNeighbors = m.state === "servant" ? servantMice : wildMice;
    const step = directSteerToward({ pos:m.pos, speed:m.speed, radius:m.radius }, moveTarget, dt, false, null, mouseNeighbors);
    if(step){
      m.heading += clamp(angleDiff(m.heading, step.heading), -4.4*dt, 4.4*dt);
      m.pos.x = step.x;
      m.pos.z = step.z;
    }
  }
  updateAgentStuck(m, dt, !!moveTarget, ()=>{
    setRepathPoint(m, m.state === "servant" ? player.pos : m.pos, m.state === "servant" ? 5.2 : 6.5);
    if(m.state === "wild") m.target = m.repathTarget.clone();
  });

  m.pos.y = groundHeight(m.pos.x,m.pos.z);
  m.group.rotation.y = m.heading;
  m.group.position.y += Math.sin(m.anim*6)*0.01;
  animateMouseRig(m.group, 0.75, m.anim, m.attackAnim, 0);
}

function makeEnemy(kind,x,z){
  let model,hp,speed,damage,radius,attackRange=1.3,turnRate=4.8;
  if(kind==="rat"){ model = makeRatModel(); hp = 22; speed = 8.4; damage = 10; radius = 0.8; }
  if(kind==="mole"){ model = makeMoleModel(); hp = 40; speed = 5.5; damage = 55; radius = 0.9; }
  if(kind==="weasel"){ model = makeWeaselModel(); hp = 115; speed = 10.1; damage = 24; radius = 1.1; turnRate = 1.6; }
  if(kind==="assassin"){ model = makeWeaselModel(); hp = 54; speed = 11.8; damage = 38; radius = 0.78; attackRange = 1.15; turnRate = 6.2; }
  if(kind==="ram"){ model = makeMoleModel(); hp = 380; speed = 4.9; damage = 30; radius = 1.25; attackRange = 1.45; turnRate = 1.0; }
  if(kind==="spitterBug"){ model = makeSpitterBugModel(); hp = 68; speed = 6.1; damage = 17; radius = 0.96; attackRange = 12.8; turnRate = 3.1; }
  if(kind==="burrowMole"){ model = makeMoleModel(); hp = 118; speed = 6.4; damage = 30; radius = 1.02; attackRange = 1.35; turnRate = 4.1; }
  if(kind==="siegeRat"){ model = makeSiegeRatModel(); hp = 275; speed = 4.2; damage = 22; radius = 1.28; attackRange = 1.52; turnRate = 1.45; }
  if(kind==="titanRam"){ model = makeTitanRamModel(); hp = 650; speed = 3.2; damage = 42; radius = 1.75; attackRange = 1.65; turnRate = 0.82; }

  const phaseTime = Math.max(0, time - 60);
  const powerScale = 1 + phaseTime * 0.0016;
  const eliteChance = clamp((time - 260) / 380, 0, 0.35) * difficulty.elites;
  const elite = Math.random() < eliteChance && !["ram","titanRam","siegeRat"].includes(kind);
  hp *= powerScale;
  damage *= powerScale;
  speed *= 1 + phaseTime * 0.00045;
  if(elite){
    hp *= 1.55;
    damage *= 1.28;
    speed *= 1.08;
  }

  model.position.set(x, groundHeight(x,z), z);
  scene.add(model);
  const largeKinds = new Set(["weasel","ram","siegeRat","titanRam"]);
  const wide = largeKinds.has(kind) ? (kind==="titanRam" ? 2.5 : 1.9) : 1.4;
  const bar = createHealthBar(wide, 0x3aeb58);
  bar.position.y = kind==="titanRam" ? 3.0 : (largeKinds.has(kind) ? 2.35 : 1.8);
  model.add(bar);
  setHealthBar(bar, 1);
  const dazeIcon = createDazeSprite();
  if (dazeIcon) {
    dazeIcon.position.set(0, kind==="titanRam" ? 3.7 : (largeKinds.has(kind) ? 3.1 : 2.45), 0);
    model.add(dazeIcon);
  }

  const e = {
    kind, group:model, pos:model.position, hp, maxHp:hp, speed, damage, radius,
    attackRange, target:null, dead:false, dying:false, anim:Math.random()*10, attackAnim:0,
    attackCd:0, heading:Math.random()*Math.PI*2, turnRate, healthBar:bar, deathT:0, isLiving:true,
    stunCd:0, dazeIcon, elite,
    role:["pursuer","flanker","breaker","supportHunter","zone"][Math.floor(Math.random()*5)],
    avoidCrowdBias:0,
    dashCd:rand(2.2,4.4),
    ramState:"idle",
    ramChargeDir:new THREE.Vector3(),
    ramWindup:0,
    ramDaze:0,
    spitCd:rand(1.5,2.7),
    spitWindup:0,
    spitAim:null,
    burrowCd:rand(4.0,6.8),
    burrowState:"idle",
    burrowTimer:0,
    burrowTarget:null,
    untargetable:false,
    heavySwing:0,
    titanChargeCd:rand(7.8,10.5),
    titanState:"idle",
    titanWindup:0,
    titanChargeDir:new THREE.Vector3(),
    titanChargeT:0
  };
  if(kind==="ram"){
    e.role = "breaker";
    e.speed *= 0.85;
  }
  if(kind==="assassin"){
    e.role = "supportHunter";
  }
  if(kind==="spitterBug"){
    e.role = "backline";
  }
  if(kind==="burrowMole"){
    e.role = "ambusher";
  }
  if(kind==="siegeRat"){
    e.role = "breaker";
  }
  if(kind==="titanRam"){
    e.role = "breaker";
    e.speed *= 0.82;
  }
  if(elite){
    e.group.traverse(c=>{ if(c.isMesh && c.material && c.material.color) c.material.color.offsetHSL(0.02, 0.08, 0.1); });
  }
  enemies.push(e);
  return e;
}
function isRatTargetValid(t){
  if(!t) return false;
  if(t === player) return !player.dead;
  if(isLivingTarget(t)) return !t.dead && !t.dying;
  if(t.pos && typeof t.hp === "number") return !t.dead && t.hp > 0;
  return false;
}
function nearestRatTarget(e){
  const candidates = [];
  if(!player.dead) candidates.push(player);
  for(const m of servantMice){ if(!m.dead && !m.dying) candidates.push(m); }
  for(const r of robots){ if(!r.dead && !r.dying) candidates.push(r); }
  for(const s of structures){ if(!s.dead && s.hp > 0) candidates.push(s); }
  if(!candidates.length) return null;

  const current = isRatTargetValid(e.target) ? e.target : null;
  const currentD = current ? dist2(e.pos, current.pos) : Infinity;
  let best = null;
  let bestD = Infinity;
  for(const c of candidates){
    const d = dist2(e.pos, c.pos);
    if(d < bestD - 0.06){
      bestD = d;
      best = c;
    } else if(Math.abs(d - bestD) <= 0.06 && best && (c.id || 0) < (best.id || 0)){
      best = c;
    }
  }

  const stickBias = 0.55;
  if(current && current !== best && currentD <= bestD + stickBias) return current;
  return best;
}
function chooseEnemyTarget(e){
  // AI tuning helper: structure pressure map keeps enemies from dog-piling one wall.
  const structurePressure = new Map();
  for (const other of enemies) {
    if (other === e || other.dead || other.dying || !other.target || other.target === player) continue;
    structurePressure.set(other.target, (structurePressure.get(other.target) || 0) + 1);
  }

  const hotZonePressure = 1 + combatDirector.heat * 0.55 * difficulty.antiCamp;
  if(e.kind==="rat"){
    return nearestRatTarget(e);
  }
  if(e.kind==="ram"){
    const wall = nearestAttackableStructure(e, 999, s => isWallStructure(s) || s.type==="fortPlate" || s.type==="barrierTotem");
    if(wall) return wall;
  }
  if(e.kind==="assassin"){
    let bestSupport = null, bestScore = 9999;
    for(const m of servantMice){
      if(m.dead || m.dying) continue;
      let nearbyGuards = 0;
      for(const ally of servantMice){
        if(ally===m || ally.dead || ally.dying) continue;
        if(dist2(ally.pos, m.pos) < 3.5) nearbyGuards++;
      }
      const d = dist2(e.pos, m.pos);
      const score = d + nearbyGuards * 4.4;
      if(score < bestScore){ bestScore = score; bestSupport = m; }
    }
    if(bestSupport && bestScore < 48) return bestSupport;
    const supportStructure = nearestAttackableStructure(e, 999, s => ["fountain","factory","supplyNest","repairAnchor","robo"].includes(s.type));
    if(supportStructure && dist2(e.pos, supportStructure.pos) < 52) return supportStructure;
    if(!player.dead && dist2(e.pos, player.pos) < 18 && !lineBlocked(e.pos, player.pos)) return player;
  }
  if(e.kind==="spitterBug"){
    let bestBackline = null;
    let bestScore = 9999;
    for(const m of servantMice){
      if(m.dead || m.dying) continue;
      let cluster = 0;
      for(const s of structures){ if(!s.dead && dist2(m.pos, s.pos) < 7.5) cluster++; }
      const d = dist2(e.pos, m.pos);
      const score = d - cluster * 1.8;
      if(score < bestScore){ bestScore = score; bestBackline = m; }
    }
    const struct = nearestAttackableStructure(e, 999, s => ["turret","cannon","mortarBloom","shardLauncher","zapCoil","breedingNest","factory","gasMine","mechaHangar","advancedRobo"].includes(s.type));
    if(bestBackline && bestScore < 65) return bestBackline;
    if(struct) return struct;
  }
  if(e.kind==="burrowMole"){
    const ambushStructure = nearestAttackableStructure(e, 999, s => ["turret","gasMine","breedingNest","supplyNest","advancedRobo","mechaHangar","factory","workshop","robo"].includes(s.type));
    if(ambushStructure) return ambushStructure;
  }
  if(e.kind==="siegeRat"){
    const siegeTarget = nearestAttackableStructure(e, 999, s => ["wall","diamondWall","gasDepot","turret","advancedRobo","mechaHangar","fortPlate","barrierTotem","braceTower"].includes(s.type));
    if(siegeTarget) return siegeTarget;
  }
  if(e.kind==="titanRam"){
    let bestCluster = null;
    let bestScore = 9999;
    for(const s of structures){
      if(s.dead) continue;
      let nearby = 0;
      for(const t of structures){ if(!t.dead && dist2(t.pos, s.pos) < 9) nearby++; }
      const score = dist2(e.pos, s.pos) - nearby * 3.3;
      if(score < bestScore){ bestScore = score; bestCluster = s; }
    }
    if(bestCluster) return bestCluster;
  }

  const nearPlayer = !player.dead && dist2(e.pos, player.pos) < 16;
  if(!player.dead && nearPlayer && !lineBlocked(e.pos, player.pos)) return player;

  let nearestServant = null, nearestServantD = 9999;
  for(const m of servantMice){
    if(m.dead || m.dying) continue;
    const d = dist2(e.pos, m.pos);
    if(d < nearestServantD){ nearestServantD = d; nearestServant = m; }
  }
  let nearestRobot = null, nearestRobotD = 9999;
  for(const r of robots){
    if(r.dead || r.dying) continue;
    const d = dist2(e.pos, r.pos);
    if(d < nearestRobotD){ nearestRobotD = d; nearestRobot = r; }
  }

  if(e.kind==="mole"){
    const bestWall = nearestAttackableStructure(e, 999, s => (s.type==="wall" || s.type==="diamondWall")) || null;
    if(bestWall) return bestWall;
  }
  if(!player.dead && !lineBlocked(e.pos, player.pos) && dist2(e.pos, player.pos) < 26 + combatDirector.heat * 7){
    return player;
  }
  if(nearestServant && nearestServantD < 22) return nearestServant;
  if(nearestRobot && nearestRobotD < 22) return nearestRobot;

  const priorityByKind = {
    mole: { wall: 2.2, diamondWall: 2.0, fortPlate: 1.6, barrierTotem: 1.4, braceTower: 1.2, turret: 0.85, cannon: 0.8 },
    weasel: { turret: 2.1, cannon: 2.0, mortarBloom: 1.85, zapCoil: 1.7, sawBlaster: 1.75, robo: 1.35, beacon: 1.25, wall: 0.7, diamondWall: 0.6 },
    spitterBug: { turret: 2.0, cannon: 1.85, mortarBloom: 1.7, breedingNest: 1.8, factory: 1.55, wall: 0.45, diamondWall: 0.4 },
    siegeRat: { wall: 2.6, diamondWall: 2.55, gasDepot: 2.25, turret: 2.0, advancedRobo: 1.65, fortPlate: 1.75 },
    titanRam: { wall: 2.25, diamondWall: 2.1, fortPlate: 2.2, barrierTotem: 2.0, braceTower: 1.9, gasDepot: 1.5, mechaHangar: 1.65 }
  };

  let bestStructure = null, bestScore = 9999;
  for(const s of structures){
    if(s.dead) continue;
    const d = dist2(e.pos,s.pos);
    const typePriority = priorityByKind[e.kind]?.[s.type] || 1;
    const pressure = structurePressure.get(s) || 0;
    const heatBias = Math.max(0, 1 - dist2(s.pos, player.pos) / 28) * combatDirector.heat * hotZonePressure;
    const score = d / typePriority + pressure * 3.0 - heatBias * 4.1;
    if(score < bestScore){
      bestScore = score;
      bestStructure = s;
    }
  }
  if(bestStructure) return bestStructure;
  if(nearestRobot) return nearestRobot;
  if(nearestServant) return nearestServant;
  if(!player.dead) return player;
  return null;
}
function updateEnemies(dt){
  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    if(e.dead){ enemies.splice(i,1); continue; }

    if(e.dying){
      e.deathT += dt;
      e.group.rotation.z = clamp(e.deathT * 4.6, 0, Math.PI/2.15);
      e.group.position.y = groundHeight(e.pos.x,e.pos.z) - Math.min(0.5, e.deathT * 0.75);
      if(e.kind==="weasel") animateWeaselRig(e.group, 0, e.anim, 0, clamp(e.deathT * 2, 0, 1));
      else animateMouseRig(e.group, 0, e.anim, 0, clamp(e.deathT * 2, 0, 1));
      if(e.deathT > 0.45) finalizeDeath(e);
      continue;
    }

    e.anim += dt;
    e.attackAnim = Math.max(0, e.attackAnim - dt*4);
    e.attackCd -= dt;
    e.stunCd = Math.max(0, (e.stunCd || 0) - dt);
    e.burrowCd = Math.max(0, (e.burrowCd || 0) - dt);
    e.spitCd = Math.max(0, (e.spitCd || 0) - dt);
    e.heavySwing = Math.max(0, (e.heavySwing || 0) - dt);
    e.titanChargeCd = Math.max(0, (e.titanChargeCd || 0) - dt);
    if(e.dazeIcon){
      e.dazeIcon.visible = e.stunCd > 0;
      if(e.dazeIcon.visible){
        e.dazeIcon.material.opacity = 0.75 + Math.sin(time*14) * 0.2;
        e.dazeIcon.position.y = (e.kind==="titanRam" ? 3.7 : (e.kind==="weasel" || e.kind==="ram" || e.kind==="siegeRat" ? 3.1 : 2.45)) + Math.sin(time*10)*0.07;
        e.dazeIcon.quaternion.copy(camera.quaternion);
      }
    }
    if(e.kind==="burrowMole"){
      if(e.burrowState === "burrowing"){
        e.untargetable = true;
        e.group.visible = false;
        e.burrowTimer -= dt;
        if((e.burrowTelegraphCd || 0) <= 0){
          e.burrowTelegraphCd = 0.18;
          const tp = e.burrowTarget || e.pos;
          addBurst(tp.x + rand(-0.35,0.35), groundHeight(tp.x,tp.z)+0.08, tp.z + rand(-0.35,0.35), 0x8a6a44, 2, 0.85, 0.35, 0.05);
        } else {
          e.burrowTelegraphCd -= dt;
        }
        if(e.burrowTimer <= 0){
          const tp = e.burrowTarget || e.pos;
          e.pos.x = clamp(tp.x + rand(-1.1,1.1), -HALF_MAP+5, HALF_MAP-5);
          e.pos.z = clamp(tp.z + rand(-1.1,1.1), -HALF_MAP+5, HALF_MAP-5);
          e.pos.y = groundHeight(e.pos.x,e.pos.z);
          e.burrowState = "surfacing";
          e.burrowTimer = 0.55;
          e.group.visible = true;
          e.untargetable = false;
          e.target = chooseEnemyTarget(e);
          addBurst(e.pos.x, e.pos.y + 0.35, e.pos.z, 0x8d5f2d, 16, 4.2, 0.6, 0.08);
          for(const m of servantMice){
            if(!m.dead && !m.dying && dist2(m.pos, e.pos) < 2.2){
              const push = new THREE.Vector3(m.pos.x-e.pos.x,0,m.pos.z-e.pos.z).normalize().multiplyScalar(1.1);
              m.pos.x += push.x; m.pos.z += push.z;
              applyDamageToLiving(m, e.damage * 0.6, e.pos);
            }
          }
          for(const s of structures){
            if(!s.dead && dist2(s.pos, e.pos) < s.radius + 1.2) damageStructure(s, e.damage * 0.55);
          }
        }
      } else if(e.burrowState === "surfacing"){
        e.burrowTimer -= dt;
        if(e.burrowTimer <= 0) e.burrowState = "idle";
      } else {
        e.untargetable = false;
        e.group.visible = true;
      }
    }
    if(e.kind==="spitterBug" && e.spitWindup > 0){
      e.spitWindup -= dt;
      e.attackAnim = 1;
      if(Math.random() < 0.12) addBurst(e.pos.x, e.pos.y + 1.0, e.pos.z, 0x7bff89, 1, 0.8, 0.18, 0.03);
      if(e.spitWindup <= 0 && e.spitAim){
        const target = e.spitAim;
        const horiz = new THREE.Vector3(target.x - e.pos.x, 0, target.z - e.pos.z);
        const d2 = Math.max(2, horiz.length());
        horiz.normalize();
        spawnProjectile({
          pos:new THREE.Vector3(e.pos.x, e.pos.y + 1.05, e.pos.z).add(horiz.clone().multiplyScalar(0.35)),
          vel:new THREE.Vector3(horiz.x * (8.2 + d2*0.22), 8.8 + d2*0.12, horiz.z * (8.2 + d2*0.22)),
          damage:e.damage,
          splash:1.75,
          color:0x8cff71,
          size:0.18,
          from:"enemy",
          kind:"acid"
        });
        addBurst(e.pos.x, e.pos.y + 1.0, e.pos.z, 0x96ff8d, 6, 2.4, 0.28, 0.05);
      }
    }

    // retarget more often if crowded around current target
    e.retargetCd = Math.max(0, (e.retargetCd || 0) - dt);
    const targetInvalid = !e.target || e.target.dead || (e.target === player && player.dead);
    if (targetInvalid || Math.random() < 0.02 || (e.kind === "rat" && e.retargetCd <= 0)) {
      const nextTarget = chooseEnemyTarget(e);
      if(nextTarget && nextTarget !== e.target) e.retargetCd = e.kind === "rat" ? 0.22 : 0;
      e.target = nextTarget;
    } else if (e.target !== player && e.kind !== "rat") {
      let crowd = 0;
      for (const other of enemies) {
        if (other === e || other.dead || other.dying) continue;
        if (other.target === e.target && dist2(other.pos, e.pos) < 2.0) crowd++;
      }
      if (crowd >= 3) e.target = chooseEnemyTarget(e);
    }

    e.repathTimer = Math.max(0, (e.repathTimer || 0) - dt);
    const moveTarget = (e.repathTimer > 0 && e.repathTarget) ? e.repathTarget : e.target;
    if(!moveTarget) continue;
    let targetPos = moveTarget.pos || moveTarget;
    const d = dist2(e.pos, targetPos);
    const isStunned = e.stunCd > 0;
    if(e.kind==="ram"){
      e.ramDaze = Math.max(0, e.ramDaze - dt);
      if(e.ramDaze > 0){
        e.stunCd = Math.max(e.stunCd, e.ramDaze);
      }
    }

    if(e.target && !e.repathTimer && !isStunned && e.kind !== "ram"){
      if(!e.attackSlot || dist2(e.attackSlot, targetPos) > 4.5 || Math.random() < 0.02){
        e.attackSlot = pickAttackSlot(e, targetPos, e.target.radius || 0.9, e._stuck?.phase % 2 ? -1 : 1);
      }
      targetPos = e.attackSlot || targetPos;
    }

    if(e.kind==="ram" && !isStunned){
      if(e.ramState === "idle"){
        const wallTarget = nearestAttackableStructure(e, 999, s => isWallStructure(s) || s.type==="fortPlate");
        if(wallTarget && dist2(e.pos, wallTarget.pos) < 36){
          e.ramState = "windup";
          e.ramWindup = 0.7;
          e.ramTarget = wallTarget;
          e.ramChargeDir.set(wallTarget.pos.x - e.pos.x, 0, wallTarget.pos.z - e.pos.z).normalize();
          addBurst(e.pos.x, e.pos.y+1.1, e.pos.z, 0xff9d3d, 8, 2.5, 0.35, 0.07);
        }
      } else if(e.ramState === "windup"){
        e.ramWindup -= dt;
        if(e.ramWindup <= 0){
          e.ramState = "charge";
        }
      } else if(e.ramState === "charge"){
        const charge = { x:e.pos.x + e.ramChargeDir.x * (e.speed*2.45) * dt, z:e.pos.z + e.ramChargeDir.z * (e.speed*2.45) * dt };
        const pushed = collisionPushOut(charge.x, charge.z, e.radius, true, null);
        e.pos.x = pushed.x; e.pos.z = pushed.z;
        e.heading = Math.atan2(e.ramChargeDir.x, e.ramChargeDir.z);
        let hitStructure = null;
        for(const s of structures){
          if(s.dead || !structureBlocksMovement(s)) continue;
          if(dist2(e.pos, s.pos) < e.radius + s.radius + 0.12){ hitStructure = s; break; }
        }
        if(hitStructure){
          damageStructure(hitStructure, e.damage * 4.2);
          e.ramState = "idle";
          e.ramDaze = 3.0;
          addBurst(e.pos.x, e.pos.y+1.0, e.pos.z, 0xff8c4a, 18, 5.6, 0.8, 0.11);
        } else if(Math.random() < 0.015){
          e.ramState = "idle";
        }
      }
    } else if(e.kind==="titanRam" && !isStunned){
      if(e.titanState === "idle" && e.titanChargeCd <= 0){
        const clusterTarget = chooseEnemyTarget(e);
        if(clusterTarget){
          const tp = clusterTarget.pos || clusterTarget;
          e.titanState = "windup";
          e.titanWindup = 0.75;
          e.titanChargeDir.set(tp.x - e.pos.x, 0, tp.z - e.pos.z).normalize();
          addBurst(e.pos.x, e.pos.y + 1.2, e.pos.z, 0xffb057, 10, 2.8, 0.35, 0.06);
        }
      } else if(e.titanState === "windup"){
        e.titanWindup -= dt;
        e.attackAnim = 1;
        if(Math.random() < 0.2) addBurst(e.pos.x + rand(-0.4,0.4), e.pos.y + 0.2, e.pos.z + rand(-0.4,0.4), 0xc9b394, 1, 0.9, 0.3, 0.04);
        if(e.titanWindup <= 0){
          e.titanState = "charge";
          e.titanChargeT = 0.95;
        }
      } else if(e.titanState === "charge"){
        e.titanChargeT -= dt;
        const chargeSpeed = e.speed * 4.8;
        const nx = e.pos.x + e.titanChargeDir.x * chargeSpeed * dt;
        const nz = e.pos.z + e.titanChargeDir.z * chargeSpeed * dt;
        const pushed = collisionPushOut(nx, nz, e.radius, true, null);
        e.pos.x = pushed.x; e.pos.z = pushed.z;
        e.heading = Math.atan2(e.titanChargeDir.x, e.titanChargeDir.z);
        for(const s of structures){
          if(s.dead) continue;
          if(dist2(e.pos, s.pos) < s.radius + e.radius + 0.16) damageStructure(s, e.damage * 2.3);
        }
        for(const m of servantMice){
          if(m.dead || m.dying) continue;
          if(dist2(e.pos, m.pos) < e.radius + 1.25){
            const kb = new THREE.Vector3(m.pos.x-e.pos.x,0,m.pos.z-e.pos.z).normalize().multiplyScalar(1.8);
            m.pos.x += kb.x; m.pos.z += kb.z;
            applyDamageToLiving(m, e.damage * 0.95, e.pos);
          }
        }
        if(Math.random() < 0.2) addBurst(e.pos.x, e.pos.y + 0.15, e.pos.z, 0xc8a476, 2, 1.0, 0.32, 0.05);
        if(e.titanChargeT <= 0){
          e.titanState = "idle";
          e.titanChargeCd = rand(8.4, 11.5);
          addBurst(e.pos.x, e.pos.y + 0.45, e.pos.z, 0xff944d, 16, 4.6, 0.6, 0.08);
        }
      }
    } else if(!isStunned && d > meleeStopDistance(e, e.target || moveTarget, 0.1)){
      let speedScale = 1;
      if(e.kind==="spitterBug"){
        const frontline = enemies.some(other => other!==e && !other.dead && !other.dying && ["siegeRat","titanRam","ram","weasel","mole","burrowMole"].includes(other.kind) && dist2(other.pos, e.pos) < 12 && dist2(other.pos, targetPos) < dist2(e.pos, targetPos));
        speedScale = frontline ? 0.82 : 1.05;
      }
      if(e.kind==="titanRam" && e.titanState!=="idle") speedScale = 0.5;
      const step = directSteerToward({ pos:e.pos, speed:e.speed*speedScale*(1+e.avoidCrowdBias*0.2), radius:e.radius }, targetPos, dt, true, e.target, enemies);
      if(step){
        e.heading += clamp(angleDiff(e.heading, step.heading), -e.turnRate*dt, e.turnRate*dt);
        e.pos.x = step.x;
        e.pos.z = step.z;
      }
    } else if(!isStunned && e.attackCd <= 0 && e.target && !e.repathTimer && (e.kind!=="ram" || e.ramDaze > 0 || e.ramState==="idle")){
      e.attackCd = e.kind==="weasel" ? 0.56 : e.kind==="mole" ? 0.98 : 0.72;
      if(e.kind==="assassin") e.attackCd = 0.5;
      if(e.kind==="siegeRat") e.attackCd = 1.16;
      if(e.kind==="titanRam") e.attackCd = 1.45;
      e.attackAnim = 1;
      addBurst(e.pos.x,e.pos.y+0.9,e.pos.z, e.kind==="mole"?0x884333:0xff6666, 10, 4, 0.45, 0.08);

      if(e.target === player){
        applyDamageToLiving(player, 999, e.pos);
      } else if(isLivingTarget(e.target)){
        const bonus = (e.kind==="assassin" && (e.target.state==="servant" || e.target.kind==="robot")) ? 1.45 : 1;
        applyDamageToLiving(e.target, e.damage * bonus, e.target.pos);
      } else {
        damageStructure(e.target, e.kind==="ram" ? e.damage*1.6 : e.kind==="siegeRat" ? e.damage*2.35 : e.kind==="titanRam" ? e.damage*2.7 : e.damage);
        if(e.kind==="mole"){
          killEnemy(e);
        }
        if(e.kind==="siegeRat"){
          e.heavySwing = 0.35;
          addBurst(e.target.pos.x, e.target.pos.y + 0.8, e.target.pos.z, 0xb6d2e4, 6, 2.0, 0.3, 0.05);
        }
      }
      if(e.kind==="assassin"){
        e.dashCd = rand(1.3,2.1);
      }
    }
    if(e.kind==="spitterBug" && !isStunned && e.spitCd <= 0 && e.spitWindup <= 0 && e.target){
      const td = dist2(e.pos, e.target.pos || e.target);
      if(td > 5.8 && td < 18.5){
        e.spitCd = rand(2.8,4.6);
        e.spitWindup = 0.5;
        e.spitAim = (e.target.pos || e.target).clone ? (e.target.pos || e.target).clone() : new THREE.Vector3(e.target.pos.x,e.target.pos.y,e.target.pos.z);
      }
    }
    if(e.kind==="burrowMole" && e.burrowState==="idle" && !isStunned && e.burrowCd <= 0){
      const ambush = nearestAttackableStructure(e, 999, s => ["turret","gasMine","breedingNest","supplyNest","advancedRobo","mechaHangar","factory","workshop"].includes(s.type));
      if(ambush && dist2(e.pos, ambush.pos) > 5){
        e.burrowCd = rand(8.0, 12.5);
        e.burrowState = "burrowing";
        e.burrowTimer = 1.2;
        e.burrowTelegraphCd = 0;
        e.burrowTarget = ambush.pos.clone();
      }
    }
    e.dashCd = Math.max(0, (e.dashCd || 0) - dt);
    if(e.kind==="assassin" && e.dashCd <= 0 && e.target && d > 2.2 && d < 10 && !lineBlocked(e.pos, targetPos)){
      e.dashCd = rand(2.5,4.1);
      const dir = new THREE.Vector3(targetPos.x - e.pos.x, 0, targetPos.z - e.pos.z).normalize();
      const nx = e.pos.x + dir.x * 3.6;
      const nz = e.pos.z + dir.z * 3.6;
      const pushed = collisionPushOut(nx, nz, e.radius, true, e.target);
      e.pos.x = pushed.x; e.pos.z = pushed.z;
      addBurst(e.pos.x, e.pos.y+0.8, e.pos.z, 0xb75fff, 7, 3.6, 0.34, 0.06);
    }
    updateAgentStuck(e, dt, !!e.target, (phase)=>{
      e.target = chooseEnemyTarget(e);
      e.avoidCrowdBias = phase >= 3 ? 1.0 : 0.25;
      if(phase === 0) setRepathPoint(e, e.target?.pos || e.pos, 3.8);
      else if(phase === 1) setRepathPoint(e, e.target?.pos || e.pos, 5.2);
      else if(phase === 2) e._stuck.side = (e._stuck.side || 1) * -1;
      else setRepathPoint(e, e.target?.pos || player.pos, 7.5);
    });

    e.pos.y = groundHeight(e.pos.x,e.pos.z);
    e.group.rotation.y = e.heading;
    if(e.kind==="weasel") animateWeaselRig(e.group, 1, e.anim, e.attackAnim, 0);
    else if(e.kind==="spitterBug") animateSpitterBugRig(e.group, 0.8, e.anim, e.attackAnim);
    else if(e.kind==="titanRam") animateTitanRamRig(e.group, e.titanState==="charge" ? 1.3 : 0.7, e.anim, e.attackAnim);
    else animateMouseRig(e.group, e.kind==="siegeRat" ? 0.55 : 0.95, e.anim, e.attackAnim + (e.heavySwing>0 ? 0.5 : 0), 0);
  }
}
