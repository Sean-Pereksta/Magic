<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Goblin Zombies 3D</title>
<style>
  html, body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
  }

  #hud {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 10;
    font-size: 18px;
    text-shadow: 2px 2px 4px black;
    pointer-events: none;
  }

  #centerText {
    position: fixed;
    bottom: 90px;
    width: 100%;
    text-align: center;
    font-size: 22px;
    z-index: 10;
    text-shadow: 2px 2px 5px black;
    pointer-events: none;
  }

  #crosshair {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 18px;
    height: 18px;
    margin-left: -9px;
    margin-top: -9px;
    z-index: 10;
    pointer-events: none;
  }

  #crosshair:before,
  #crosshair:after {
    content: "";
    position: absolute;
    background: white;
    box-shadow: 0 0 4px black;
  }
  #playerHealthWrap {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 380px;
    height: 28px;
    border: 3px solid white;
    background: rgba(40, 0, 0, 0.75);
    z-index: 12;
    box-shadow: 0 0 8px black;
  }

  #playerHealthFill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #b60000, #ff3333);
    transition: width 0.15s linear;
  }

  #playerHealthText {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    text-shadow: 2px 2px 4px black;
    pointer-events: none;
  }

  #damageTint {
    position: fixed;
    inset: 0;
    background: rgba(180, 0, 0, 0);
    pointer-events: none;
    z-index: 9;
    transition: background 0.2s linear;
  }

  #crosshair:before {
    left: 8px;
    top: 0;
    width: 2px;
    height: 18px;
  }

  #crosshair:after {
    left: 0;
    top: 8px;
    width: 18px;
    height: 2px;
  }

  #startScreen {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #243018, #050705);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    text-align: center;
  }

  #startBox {
    background: rgba(0,0,0,0.75);
    border: 3px solid #78945a;
    padding: 30px;
    border-radius: 12px;
    max-width: 700px;
  }

  button {
    padding: 12px 20px;
    font-size: 18px;
    background: #5f7d37;
    color: white;
    border: 2px solid white;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover {
    background: #7da849;
  }

#splitDivider { position: fixed; left:0; top:50%; width:100%; height:3px; background: rgba(255,255,255,0.65); z-index:15; display:none; }
.coopTint { position: fixed; left:0; width:100%; height:50%; pointer-events:none; z-index:9; background: rgba(180,0,0,0); display:none;}
#p1DamageTint { top:0; }
#p2DamageTint { bottom:0; }
.coopHealthBox { position: fixed; top:12px; width:280px; height:24px; border:2px solid white; background: rgba(40,0,0,0.75); z-index:12; display:none;}
#p1HealthBox { left:12px; }
#p2HealthBox { right:12px; }
#p1HealthFill,#p2HealthFill{height:100%; background:linear-gradient(90deg,#26d14e,#8af07e); width:100%;}

</style>
</head>
<body>

<div id="hud"></div>
<div id="playerHealthWrap">
  <div id="playerHealthFill"></div>
  <div id="playerHealthText">100 / 100</div>
</div>
<div id="centerText"></div>
<div id="crosshair"></div>
<div id="damageTint"></div>
<div id="splitDivider"></div>
<div id="p1DamageTint" class="coopTint"></div>
<div id="p2DamageTint" class="coopTint"></div>
<div id="p1HealthBox" class="coopHealthBox"><div id="p1HealthFill"></div></div>
<div id="p2HealthBox" class="coopHealthBox"><div id="p2HealthFill"></div></div>

<div id="startScreen">
  <div id="startBox">
    <h1>Goblin Zombies 3D</h1>
    <p>
      Survive waves of goblins. Board windows, buy doors, purchase wall guns, and keep your ammo stocked.
    </p>
    <p>
      WASD move · Mouse look · Click shoot · R reload · E interact · Shift sprint
    </p>
    <button id="soloBtn">Start Solo</button>
    <button id="twoPlayerBtn">Start 2 Player Split Screen</button>
    <button id="controlsBtn">Controls / Controller Mapping</button>
    <div id="controlsPanel" style="display:none; margin-top: 12px; text-align:left;">
      <h2>Controller Mapping</h2>
      <div>
        <h3>Player 1</h3>
        <label>Gamepad: <select id="p1GamepadSelect"></select></label>
        <button onclick="beginMapping(1)">Map Player 1 Controls</button>
        <div id="p1MappingStatus"></div>
      </div>
      <div>
        <h3>Player 2</h3>
        <label>Gamepad: <select id="p2GamepadSelect"></select></label>
        <button onclick="beginMapping(2)">Map Player 2 Controls</button>
        <div id="p2MappingStatus"></div>
      </div>
      <button id="backToMenuBtn">Back</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
/* =========================================================
   BASIC THREE SETUP
========================================================= */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x090908);
scene.fog = new THREE.Fog(0x090908, 35, 130);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  500
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const clock = new THREE.Clock();

const hud = document.getElementById("hud");
const centerText = document.getElementById("centerText");
const playerHealthFill = document.getElementById("playerHealthFill");
const playerHealthText = document.getElementById("playerHealthText");
const damageTint = document.getElementById("damageTint");
const startScreen = document.getElementById("startScreen");
const soloBtn = document.getElementById("soloBtn");
const twoPlayerBtn = document.getElementById("twoPlayerBtn");
const controlsBtn = document.getElementById("controlsBtn");
const controlsPanel = document.getElementById("controlsPanel");
const backToMenuBtn = document.getElementById("backToMenuBtn");

/* =========================================================
   LIGHTING
========================================================= */

const ambient = new THREE.AmbientLight(0x888877, 0.72);
scene.add(ambient);

const hemi = new THREE.HemisphereLight(0xdde8ff, 0x2d2418, 0.55);
scene.add(hemi);

const floatingTexts = [];
const moon = new THREE.DirectionalLight(0xbecfff, 0.75);
moon.position.set(30, 60, -25);
moon.castShadow = true;
scene.add(moon);

function addLamp(x, y, z, color = 0xffc46b, intensity = 1.5) {
  const light = new THREE.PointLight(color, intensity, 18);
  light.position.set(x, y, z);
  light.castShadow = true;
  scene.add(light);

  const bulb = new THREE.Mesh(
    new THREE.SphereGeometry(0.18, 12, 12),
    new THREE.MeshBasicMaterial({ color })
  );
  bulb.position.copy(light.position);
  scene.add(bulb);
}

/* =========================================================
   MATERIALS
========================================================= */

const mats = {
  floor: new THREE.MeshStandardMaterial({ color: 0x2b2720, roughness: 0.9 }),
  wall: new THREE.MeshStandardMaterial({ color: 0x3b382f, roughness: 0.95 }),
  trim: new THREE.MeshStandardMaterial({ color: 0x5c4a33, roughness: 0.9 }),
  board: new THREE.MeshStandardMaterial({ color: 0x8a5a2b, roughness: 0.8 }),
  door: new THREE.MeshStandardMaterial({ color: 0x55331c, roughness: 0.8 }),
  metal: new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.5, roughness: 0.35 }),
  darkMetal: new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.6, roughness: 0.3 }),
  muzzle: new THREE.MeshBasicMaterial({ color: 0xffe48a }),
  coin: new THREE.MeshStandardMaterial({ color: 0xffcc33, metalness: 0.7, roughness: 0.2 }),
  ammo: new THREE.MeshStandardMaterial({ color: 0x38e85f, emissive: 0x0a4414 }),
  health: new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x441010 }),
};

/* =========================================================
   PLAYER
========================================================= */

const player = {
  pos: new THREE.Vector3(0, 1.7, 0),
  vel: new THREE.Vector3(),
  yaw: 0,
  pitch: 0,
  speed: 7,
  sprintSpeed: 11,
  health: 100,
  maxHealth: 100,
  coins: 500,
  score: 0,
  wave: 1,
  alive: true,
  interactCooldown: 0,
  hurtCooldown: 0,
  regenDelay: 4.0,
  regenTimer: 0,
  regenRate: 7.5
};

camera.position.copy(player.pos);

let pointerLocked = false;

document.addEventListener("pointerlockchange", () => {
  pointerLocked = document.pointerLockElement === renderer.domElement;
});

function startSoloGame() {
  startScreen.style.display = "none";
  renderer.domElement.requestPointerLock();
}

if (soloBtn) {
  soloBtn.onclick = startSoloGame;
}

if (twoPlayerBtn) {
  twoPlayerBtn.onclick = () => {
    alert("2-player mode is not fully wired yet. Starting solo for now.");
    startSoloGame();
  };
}

if (controlsBtn) {
  controlsBtn.onclick = () => {
    if (controlsPanel) controlsPanel.style.display = "block";
  };
}

if (backToMenuBtn) {
  backToMenuBtn.onclick = () => {
    if (controlsPanel) controlsPanel.style.display = "none";
  };
}

renderer.domElement.addEventListener("click", () => {
  if (!pointerLocked && player.alive) {
    renderer.domElement.requestPointerLock();
  } else {
    shoot();
  }
});

document.addEventListener("mousemove", e => {
  if (!pointerLocked || !player.alive) return;
  player.yaw -= e.movementX * 0.0022;
  player.pitch -= e.movementY * 0.0022;
  player.pitch = Math.max(-1.25, Math.min(1.25, player.pitch));
});

const keys = {};
document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;

  if (e.key.toLowerCase() === "r") reload();
  if (e.key.toLowerCase() === "e") interact();
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

/* =========================================================
   WORLD BUILDING
========================================================= */

const colliders = [];
const interactables = [];
const roomsUnlocked = {
  spawn: true,
  east: false,
  basement: false,
  armory: false,
  library: false,
  kitchen: false,
  courtyard: false,
  workshop: false,
  tower: false
};

function box(w, h, d, x, y, z, mat, cast = true, receive = true) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = cast;
  mesh.receiveShadow = receive;
  scene.add(mesh);
  return mesh;
}

function addTable(x, z) {
  box(2.2, 0.2, 1.2, x, 0.85, z, mats.trim);
  box(0.18, 0.8, 0.18, x - 0.9, 0.4, z - 0.45, mats.trim);
  box(0.18, 0.8, 0.18, x + 0.9, 0.4, z - 0.45, mats.trim);
  box(0.18, 0.8, 0.18, x - 0.9, 0.4, z + 0.45, mats.trim);
  box(0.18, 0.8, 0.18, x + 0.9, 0.4, z + 0.45, mats.trim);
}

function addShelf(x, z, rotY = 0) {
  const group = new THREE.Group();
  group.position.set(x, 1.1, z);
  group.rotation.y = rotY;
  const shelf = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.2, 0.35), mats.trim);
  group.add(shelf);
  for (let i = 0; i < 10; i++) {
    const book = new THREE.Mesh(
      new THREE.BoxGeometry(0.16, 0.5, 0.12),
      new THREE.MeshStandardMaterial({ color: [0x663333, 0x333366, 0x335533, 0x666633][i % 4] })
    );
    book.position.set(-1.1 + i * 0.24, 0.3 + (i % 3) * 0.45, -0.25);
    group.add(book);
  }
  scene.add(group);
}

function addCrateStack(x, z) {
  box(1, 0.8, 1, x, 0.4, z, mats.trim);
  box(0.9, 0.7, 0.9, x + 0.5, 1.15, z + 0.2, mats.trim);
}
function addChair(x, z, rotY = 0) {
  const group = new THREE.Group();
  group.position.set(x, 0, z);
  group.rotation.y = rotY;
  const seat = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.18, 0.7), mats.trim);
  seat.position.y = 0.55;
  const back = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.9, 0.14), mats.trim);
  back.position.set(0, 0.95, 0.35);
  group.add(seat, back);
  [[-0.25, 0.25, -0.25], [0.25, 0.25, -0.25], [-0.25, 0.25, 0.25], [0.25, 0.25, 0.25]].forEach(p => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.5, 0.08), mats.darkMetal);
    leg.position.set(p[0], p[1], p[2]);
    group.add(leg);
  });
  scene.add(group);
}
function addCouch(x, z, rotY = 0) {
  const group = new THREE.Group();
  group.position.set(x, 0, z);
  group.rotation.y = rotY;
  const couchMat = new THREE.MeshStandardMaterial({ color: 0x4a2323, roughness: 0.9 });
  const base = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.45, 0.8), couchMat);
  base.position.y = 0.45;
  const back = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.9, 0.22), couchMat);
  back.position.set(0, 0.85, 0.4);
  const arm1 = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.7, 0.9), couchMat);
  arm1.position.set(-1.2, 0.65, 0);
  const arm2 = arm1.clone();
  arm2.position.x = 1.2;
  group.add(base, back, arm1, arm2);
  scene.add(group);
}
function addRubble(x, z, count = 8) {
  for (let i = 0; i < count; i++) {
    const rock = new THREE.Mesh(
      new THREE.BoxGeometry(0.2 + Math.random() * 0.35, 0.08 + Math.random() * 0.18, 0.2 + Math.random() * 0.35),
      new THREE.MeshStandardMaterial({ color: 0x55504a, roughness: 1 })
    );
    rock.position.set(x + (Math.random() - 0.5) * 2.5, 0.08, z + (Math.random() - 0.5) * 2.5);
    rock.rotation.set(Math.random(), Math.random(), Math.random());
    scene.add(rock);
  }
}
function addWallTorch(x, y, z, rotY = 0) {
  const group = new THREE.Group();
  group.position.set(x, y, z);
  group.rotation.y = rotY;
  const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.75, 8), mats.darkMetal);
  handle.rotation.x = Math.PI / 2;
  const flame = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 12), new THREE.MeshBasicMaterial({ color: 0xffaa33 }));
  flame.position.z = -0.45;
  group.add(handle, flame);
  scene.add(group);
  const light = new THREE.PointLight(0xffaa55, 0.9, 9);
  light.position.set(x, y, z);
  scene.add(light);
}
function addCollider(x, z, w, d) {
  colliders.push({ x, z, w, d });
}

function addRoom(cx, cz, w, d, name) {
  box(w, 0.25, d, cx, -0.1, cz, mats.floor, false, true);

  // ceiling
  box(w, 0.25, d, cx, 4.2, cz, new THREE.MeshStandardMaterial({ color: 0x1c1b18 }), false, true);

  // decorative rug
  box(w * 0.42, 0.03, d * 0.25, cx, 0.02, cz, new THREE.MeshStandardMaterial({ color: 0x442222 }), false, true);

  // corner clutter
  box(1.2, 0.7, 0.8, cx - w/2 + 2, 0.35, cz - d/2 + 2, mats.trim);
  box(1.4, 0.5, 0.7, cx + w/2 - 2.4, 0.25, cz + d/2 - 2.4, mats.trim);

  // outer walls
  box(w, 3.8, 0.35, cx, 1.9, cz - d/2, mats.wall);
  addCollider(cx, cz - d/2, w, 0.35);

  box(w, 3.8, 0.35, cx, 1.9, cz + d/2, mats.wall);
  addCollider(cx, cz + d/2, w, 0.35);

  box(0.35, 3.8, d, cx - w/2, 1.9, cz, mats.wall);
  addCollider(cx - w/2, cz, 0.35, d);

  box(0.35, 3.8, d, cx + w/2, 1.9, cz, mats.wall);
  addCollider(cx + w/2, cz, 0.35, d);
}

addRoom(0, 0, 22, 18, "spawn");
addRoom(24, 0, 20, 16, "east");
addRoom(0, 22, 18, 18, "basement");
addRoom(25, 21, 22, 18, "armory");
addRoom(-24, 0, 20, 18, "library");
addRoom(-24, 22, 18, 16, "kitchen");
addRoom(0, 46, 28, 22, "courtyard");
addRoom(48, 0, 20, 18, "workshop");
addRoom(48, 24, 18, 18, "tower");
addCouch(-5, 3, Math.PI / 2); addChair(4, 4, -0.6); addChair(5, 3, 0.4); addRubble(7, -5, 5); addWallTorch(-10.7, 2.4, 0, Math.PI / 2);
addCouch(21, 4, 0); addChair(28, -3, 1.2); addRubble(29, 5, 8); addWallTorch(24, 2.4, -7.7, 0);
addRubble(-4, 23, 10); addRubble(5, 18, 6); addWallTorch(-8.7, 2.4, 22, Math.PI / 2);
addCrateStack(22, 18); addCrateStack(29, 25); addTable(25, 21); addWallTorch(25, 2.4, 29.7, Math.PI);
addShelf(-30, -5, 0); addShelf(-18, 5, Math.PI); addTable(-24, 0); addChair(-22.5, 1, 0.7);
addTable(-24, 22); addChair(-25.5, 23, 0.3); addChair(-22.5, 23, -0.3); box(4, 0.8, 0.8, -29, 0.4, 17, mats.metal); box(3, 0.8, 0.8, -19, 0.4, 27, mats.metal);
box(3, 0.35, 3, 0, 0.2, 46, new THREE.MeshStandardMaterial({ color: 0x555f66 }));
const fountainWater = new THREE.Mesh(new THREE.CylinderGeometry(1.1, 1.1, 0.08, 32), new THREE.MeshStandardMaterial({ color: 0x225577, transparent: true, opacity: 0.75 }));
fountainWater.position.set(0, 0.43, 46); scene.add(fountainWater);
addCrateStack(44, -4); addCrateStack(51, 5); addTable(48, 0);
const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.5, 0.8, 24), new THREE.MeshStandardMaterial({ color: 0x252a44, emissive: 0x050818 }));
pedestal.position.set(48, 0.4, 24); scene.add(pedestal);
const pedestalGlow = new THREE.PointLight(0x55ccff, 1.4, 14); pedestalGlow.position.set(48, 2.2, 24); scene.add(pedestalGlow);

// remove doorway blockers so buy doors control passage
const doorCutouts = [
  { x: 11, z: 0, w: 0.8, d: 5.2 }, { x: 0, z: 9, w: 5.2, d: 0.8 }, { x: 14, z: 16, w: 5.2, d: 0.8 },
  { x: -11, z: 0, w: 0.8, d: 5.2 }, { x: -24, z: 11, w: 5.2, d: 0.8 }, { x: 0, z: 33, w: 5.2, d: 0.8 },
  { x: 35, z: 0, w: 0.8, d: 5.2 }, { x: 48, z: 12, w: 5.2, d: 0.8 }
];
for (let i = colliders.length - 1; i >= 0; i--) {
  const c = colliders[i];
  if (doorCutouts.some(dc => Math.abs(c.x - dc.x) < 0.4 && Math.abs(c.z - dc.z) < 0.4 && c.w >= dc.w - 0.3 && c.d >= dc.d - 0.3)) {
    colliders.splice(i, 1);
  }
}

box(7, 0.12, 5, 12, -0.03, 0, mats.floor);
box(5, 0.12, 7, 0, -0.03, 11, mats.floor);

// hall wall hints

box(8, 3.8, 0.35, 12, 1.9, 3, mats.wall);
box(0.35, 3.8, 8, -3, 1.9, 11, mats.wall);

addLamp(0, 3.8, 0);

  new THREE.PlaneGeometry(220, 220),
  new THREE.MeshStandardMaterial({ color: 0x1f2a1b, roughness: 1 })
);
outsideGround.rotation.x = -Math.PI / 2;
outsideGround.position.y = -0.13;
scene.add(outsideGround);

function addDeadTree(x, z, scale = 1) {
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12 * scale, 0.2 * scale, 2.4 * scale, 8),
    new THREE.MeshStandardMaterial({ color: 0x332414, roughness: 1 })
  );
  trunk.position.set(x, 1.1 * scale, z);
  trunk.rotation.z = (Math.random() - 0.5) * 0.25;
  scene.add(trunk);

  for (let i = 0; i < 4; i++) {
    const branch = new THREE.Mesh(
      new THREE.CylinderGeometry(0.035 * scale, 0.06 * scale, 1.2 * scale, 6),
      trunk.material
    );
    branch.position.set(x, 1.7 * scale + Math.random() * 0.5, z);
    branch.rotation.z = Math.random() * Math.PI;
    branch.rotation.x = Math.random() * Math.PI;
    scene.add(branch);
  }
}

function addOutsideRock(x, z, scale = 1) {
  const rock = new THREE.Mesh(
    new THREE.DodecahedronGeometry(0.5 * scale),
    new THREE.MeshStandardMaterial({ color: 0x44413a, roughness: 1 })
  );
  rock.position.set(x, 0.25 * scale, z);
  rock.scale.y = 0.55;
  rock.rotation.set(Math.random(), Math.random(), Math.random());
  scene.add(rock);
}

[
  [-17, -8], [-19, 3], [13, -18], [37, -6],
  [-18, 25], [28, 38], [-42, -7], [-44, 20],
  [67, 19], [48, -20]
].forEach(([x, z]) => {
  addDeadTree(x, z, 0.8 + Math.random() * 0.7);

    win.boardMeshes.push(board);

}

function createTextSprite(text) {
  const canvas = document.createElement("canvas");
  canvas.width = 512;
  canvas.height = 256;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "rgba(0,0,0,0.65)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "white";
  ctx.lineWidth = 6;
  ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);
  ctx.fillStyle = "white";
  ctx.font = "bold 42px Arial";
  ctx.textAlign = "center";
  const lines = text.split("\n");
  lines.forEach((line, i) => {
    ctx.fillText(line, canvas.width / 2, 70 + i * 55);
  });

  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(3, 1.5, 1);
  return sprite;
}

function createDamageSprite(text, color = 0xffffff) {
  const canvas = document.createElement("canvas");
  canvas.width = 256;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.font = "bold 54px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.lineWidth = 8;
  ctx.strokeStyle = "black";
  ctx.strokeText(text, 128, 64);
  ctx.fillStyle = "#" + color.toString(16).padStart(6, "0");
  ctx.fillText(text, 128, 64);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.4, 0.7, 1);
  return sprite;
}

const bullets = [];
const rocks = [];
const pickups = [];

function shoot() {
  if (!player.alive) return;
  if (currentGun.reloading) return;
  if (currentGun.cooldown > 0) return;

  if (currentGun.clip <= 0) {
    reload();
    return;
  }

  fireBurst(currentGun.burst || 1);
  currentGun.cooldown = currentGun.fireRate;
}

function fireBurst(count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      if (currentGun.clip <= 0 || currentGun.reloading) return;

      currentGun.clip--;

      const muzzle = gunView.getObjectByName("muzzle");
      const flash = gunView.getObjectByName("muzzleFlash");
      if (muzzle) muzzle.visible = true;
      if (flash) {
        flash.visible = true;
        flash.scale.setScalar(0.8 + Math.random() * 0.7);
        flash.rotation.z = Math.random() * Math.PI;
      }
      gunView.rotation.x -= 0.08;
      gunView.position.z += 0.04;
      setTimeout(() => {
        if (muzzle) muzzle.visible = false;
        if (flash) flash.visible = false;
      }, 45);

      for (let p = 0; p < currentGun.pellets; p++) {
        spawnBullet();
      }
    }, i * 80);
  }
}

function spawnBullet() {
  const dir = new THREE.Vector3(0, 0, -1);
  dir.applyEuler(camera.rotation);

  dir.x += (Math.random() - 0.5) * currentGun.spread;
  dir.y += (Math.random() - 0.5) * currentGun.spread;
  dir.z += (Math.random() - 0.5) * currentGun.spread;
  dir.normalize();

  const bulletMesh = new THREE.Mesh(
    new THREE.SphereGeometry(currentGun.laser ? 0.065 : 0.045, 8, 8),
    new THREE.MeshBasicMaterial({ color: currentGun.laser ? 0x55ddff : 0xffe08a })
  );

  bulletMesh.position.copy(camera.position);
  bulletMesh.position.add(dir.clone().multiplyScalar(0.8));
  scene.add(bulletMesh);

  bullets.push({
    mesh: bulletMesh,
    pos: bulletMesh.position.clone(),
    vel: dir.multiplyScalar(currentGun.bulletSpeed),
    damage: currentGun.damage,
    life: 2.2,
    drop: currentGun.laser ? 0.4 : 1.5
  });
}

function reload() {
  if (currentGun.reloading) return;
  if (currentGun.clip >= currentGun.clipSize) return;
  if (currentGun.reserve <= 0) return;

  currentGun.reloading = true;
  currentGun.reloadTimer = currentGun.reloadTime;
}

  const arm1 = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.08, 0.75, 8), skin);
  arm1.position.set(-0.5, 0.95, 0);
  arm1.rotation.z = 0.55;
  arm1.name = "leftArm";
  group.add(arm1);

  const arm2 = arm1.clone();
  arm2.position.x = 0.5;
  arm2.rotation.z = -0.55;
  arm2.name = "rightArm";
  group.add(arm2);

  group.scale.setScalar(type.scale);

  group.traverse(o => {
    if (o.isMesh) {
      o.castShadow = true;
      o.receiveShadow = true;
    }
  });

  return group;
}

function spawnEnemy(typeKey = "green") {
  const win = windows[Math.floor(Math.random() * windows.length)];
  const mesh = createGoblinMesh(typeKey);
  const outsideSpawn = getOutsideWindowSpawn(win);
  mesh.position.copy(outsideSpawn);
  scene.add(mesh);

  const type = enemyTypes[typeKey];

  enemies.push({
    typeKey,
    mesh,
    pos: mesh.position,
    health: type.health + player.wave * 10,
    maxHealth: type.health + player.wave * 10,
    speed: type.speed + player.wave * 0.05,
    damage: type.damage,
    reward: type.reward,
    state: "walking_to_window",
    targetWindow: win,
    attackCooldown: 0,
    throwCooldown: 2 + Math.random() * 2,
    animTime: Math.random() * 10,
    attackAnim: 0,
    tearAnim: 0,
    climbTimer: 0,
    hitFlashTimer: 0,
    hitboxes: [
      { name: "head", offset: new THREE.Vector3(0, 1.45 * type.scale, -0.05), radius: 0.42 * type.scale, multiplier: 1.8 },
      { name: "body", offset: new THREE.Vector3(0, 0.85 * type.scale, 0), radius: 0.48 * type.scale, multiplier: 1.0 },
      { name: "legs", offset: new THREE.Vector3(0, 0.35 * type.scale, 0), radius: 0.35 * type.scale, multiplier: 0.75 }
    ]
  });
}
function getOutsideWindowSpawn(win) {
  const outward = new THREE.Vector3(-Math.sin(win.rotation), 0, -Math.cos(win.rotation));
  return new THREE.Vector3(win.x + outward.x * 7.5, 0, win.z + outward.z * 7.5);
}

function startWave() {
  waveInProgress = true;
  waveSpawnLeft = 6 + player.wave * 4;
  waveSpawnTimer = 1;
}

function chooseEnemyType() {
  const w = player.wave;
  const r = Math.random();

  if (w >= 4 && r < 0.12) return "blue";
  if (w >= 2 && r < 0.32) return "red";
  if (w >= 3 && r < 0.50) return "yellow";
  return "green";
}

/* =========================================================
   PICKUPS
========================================================= */

function dropPickup(x, z) {
  const r = Math.random();
  if (r > 0.22) return;

  const isAmmo = r < 0.17;
  const mesh = new THREE.Mesh(
    isAmmo ? new THREE.BoxGeometry(0.45, 0.25, 0.45) : new THREE.SphereGeometry(0.22, 12, 12),
    isAmmo ? mats.ammo : mats.coin
  );
  mesh.position.set(x, 0.35, z);
  scene.add(mesh);

  pickups.push({
    mesh,
    type: isAmmo ? "ammo" : "coins",
    life: 12
  });
}

/* =========================================================
   INTERACTION
========================================================= */

function distance2D(a, b) {
  const dx = a.x - b.x;
  const dz = a.z - b.z;
  return Math.sqrt(dx * dx + dz * dz);
}

function getNearestInteractable() {
  let best = null;
  let bestDist = 2.6;

  const p = { x: player.pos.x, z: player.pos.z };

  for (const obj of interactables) {
    if (obj.active === false) continue;

    let ox = obj.x;
    let oz = obj.z;

    const dist = distance2D(p, { x: ox, z: oz });
    if (dist < bestDist) {
      best = obj;
      bestDist = dist;
    }
  }

  return best;
}

function interact() {
  if (player.interactCooldown > 0 || !player.alive) return;
  player.interactCooldown = 0.25;

  const obj = getNearestInteractable();
  if (!obj) return;

  if (obj.type === "window") {
    if (obj.boards < obj.maxBoards) {
      obj.boards++;
      obj.breakTimer = Math.max(0, obj.breakTimer - 0.6);
      rebuildWindowBoards(obj);
      player.coins += 10;
    }
  }

  if (obj.type === "door") {
    if (!obj.active) return;

    if (player.coins >= obj.cost) {
      player.coins -= obj.cost;
      obj.active = false;
      roomsUnlocked[obj.roomName] = true;
      scene.remove(obj.mesh);

      // remove matching collider
      for (let i = colliders.length - 1; i >= 0; i--) {
        const c = colliders[i];
        if (Math.abs(c.x - obj.x) < 0.01 && Math.abs(c.z - obj.z) < 0.01) {
          colliders.splice(i, 1);
        }
      }
    }
  }

  if (obj.type === "wallGun") {
    const g = guns[obj.key];

    if (!ownedGuns[obj.key]) {
      if (player.coins >= g.cost) {
        player.coins -= g.cost;
        ownedGuns[obj.key] = true;
        equipGun(obj.key, true);
      }
    } else {
      equipGun(obj.key, false);
    }
  }

  if (obj.type === "ammo") {
    if (currentGunKey === obj.key) {
      const cost = guns[obj.key].ammoCost;
      if (player.coins >= cost) {
        player.coins -= cost;
        currentGun.reserve = currentGun.reserveMax;
      }
    }
  }
}

function equipGun(key, fresh) {
  const oldClip = currentGun.clip;
  const oldReserve = currentGun.reserve;

  currentGunKey = key;
  currentGun = JSON.parse(JSON.stringify(guns[key]));

  if (fresh) {
    currentGun.clip = currentGun.clipSize;
    currentGun.reserve = Math.floor(currentGun.reserveMax * 0.6);
  } else {
    currentGun.clip = Math.min(currentGun.clipSize, oldClip);
    currentGun.reserve = Math.min(currentGun.reserveMax, oldReserve);
  }

  currentGun.cooldown = 0;
  currentGun.reloading = false;
  currentGun.reloadTimer = 0;

  rebuildGunView();
}

/* =========================================================
   MOVEMENT AND COLLISION
========================================================= */

function wouldCollide(x, z) {
  const radius = 0.42;
  for (const c of colliders) {
    const inside =
      x + radius > c.x - c.w / 2 &&
      x - radius < c.x + c.w / 2 &&
      z + radius > c.z - c.d / 2 &&
      z - radius < c.z + c.d / 2;
    if (!inside) continue;
    let throughOpenWindow = false;
    for (const win of windows) {
      if (win.boards <= 0 && isPointInWindowOpening(x, z, win, 0.35)) {
        throughOpenWindow = true;
        break;
      }
    }
    if (throughOpenWindow) continue;
    return true;
  }
  return false;
}

function worldToWindowLocal(x, z, win) {
  const dx = x - win.x;
  const dz = z - win.z;
  const cos = Math.cos(-win.rotation);
  const sin = Math.sin(-win.rotation);
  return { x: dx * cos - dz * sin, z: dx * sin + dz * cos };
}

function isPointInWindowOpening(x, z, win, padding = 0.55) {
  const local = worldToWindowLocal(x, z, win);
  return Math.abs(local.x) <= (win.openingWidth || 2.8) / 2 + padding && Math.abs(local.z) <= 0.9;
}

function isBulletPassingThroughWindowOpening(pos) {
  for (const win of windows) {
    if (isPointInWindowOpening(pos.x, pos.z, win, 0.15)) return true;
  }
  return false;
}

function getWindowOutwardVector(win) {
  return new THREE.Vector3(-Math.sin(win.rotation), 0, -Math.cos(win.rotation)).normalize();
}
function getWindowInwardVector(win) {
  return getWindowOutwardVector(win).multiplyScalar(-1);
}
function getWindowOutsideStandPosition(win) {
  const outward = getWindowOutwardVector(win);
  return new THREE.Vector3(win.x + outward.x * 1.25, 0, win.z + outward.z * 1.25);
}
function getWindowInsideStandPosition(win) {
  const inward = getWindowInwardVector(win);
  return new THREE.Vector3(win.x + inward.x * 1.65, 0, win.z + inward.z * 1.65);
}
function faceGoblinToward(enemy, targetPosition) {
  const dx = targetPosition.x - enemy.mesh.position.x;
  const dz = targetPosition.z - enemy.mesh.position.z;
  enemy.mesh.rotation.y = Math.atan2(dx, dz);
}

function updatePlayer(dt) {
  const speed = keys["shift"] ? player.sprintSpeed : player.speed;

  const forward = new THREE.Vector3(
    -Math.sin(player.yaw),
    0,
    -Math.cos(player.yaw)
  );

  const right = new THREE.Vector3(
    Math.cos(player.yaw),
    0,
    -Math.sin(player.yaw)
  );

  const move = new THREE.Vector3();

  if (keys["w"]) move.add(forward);
  if (keys["s"]) move.sub(forward);
  if (keys["d"]) move.add(right);
  if (keys["a"]) move.sub(right);

  if (move.lengthSq() > 0) {
    move.normalize().multiplyScalar(speed * dt);
  }

  const nx = player.pos.x + move.x;
  const nz = player.pos.z + move.z;

  if (!wouldCollide(nx, player.pos.z)) player.pos.x = nx;
  if (!wouldCollide(player.pos.x, nz)) player.pos.z = nz;

  camera.position.copy(player.pos);
  camera.rotation.order = "YXZ";
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  if (player.hurtCooldown > 0) player.hurtCooldown -= dt;
  if (player.interactCooldown > 0) player.interactCooldown -= dt;
}

/* =========================================================
   UPDATE BULLETS / ROCKS
========================================================= */

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.life -= dt;
    b.vel.y -= b.drop * dt;
    b.pos.add(b.vel.clone().multiplyScalar(dt));
    b.mesh.position.copy(b.pos);

    let hit = false;

    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      let bestHit = null;
      for (const hb of e.hitboxes) {
        const center = e.mesh.position.clone().add(hb.offset);
        const dist = b.pos.distanceTo(center);
        if (dist < hb.radius) { bestHit = hb; break; }
      }
      if (bestHit) {
        const damageDone = b.damage * bestHit.multiplier;
        e.health -= damageDone;
        showGoblinHit(e, bestHit.name, damageDone);
        hit = true;
        if (e.health <= 0) killEnemy(j);
        break;
      }
    }

    if (hit || b.life <= 0 || b.pos.y < -2) {
      scene.remove(b.mesh);
      bullets.splice(i, 1);
    }
  }
}

function spawnRock(enemy) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.18, 10, 10),
    new THREE.MeshStandardMaterial({ color: 0x777066, roughness: 1 })
  );

  mesh.position.copy(enemy.mesh.position);
  mesh.position.y += 1.5;
  scene.add(mesh);

  const target = camera.position.clone();
  const dir = target.sub(mesh.position);
  const horizontal = new THREE.Vector3(dir.x, 0, dir.z).normalize();

  rocks.push({
    mesh,
    pos: mesh.position.clone(),
    vel: new THREE.Vector3(horizontal.x * 8, 8, horizontal.z * 8),
    life: 4,
    damage: 14
  });
}

function updateRocks(dt) {
  for (let i = rocks.length - 1; i >= 0; i--) {
    const r = rocks[i];
    r.life -= dt;
    r.vel.y -= 12 * dt;
    r.pos.add(r.vel.clone().multiplyScalar(dt));
    r.mesh.position.copy(r.pos);

    const dist = r.pos.distanceTo(camera.position);

    if (dist < 0.75 && player.hurtCooldown <= 0) {
      player.health -= r.damage;
      player.regenTimer = player.regenDelay;
      player.hurtCooldown = 0.5;
      scene.remove(r.mesh);
      rocks.splice(i, 1);
      continue;
    }

    if (r.life <= 0 || r.pos.y < 0) {
      scene.remove(r.mesh);
      rocks.splice(i, 1);
    }
  }
}

/* =========================================================
   UPDATE ENEMIES
========================================================= */

function killEnemy(index) {
  const e = enemies[index];
  player.coins += e.reward;
  player.score += e.reward;
  dropPickup(e.mesh.position.x, e.mesh.position.z);
  if (e.healthBar) {
    scene.remove(e.healthBar);
    e.healthBar.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) { if (o.material.map) o.material.map.dispose(); o.material.dispose(); }
    });
  }
  scene.remove(e.mesh);
  e.mesh.traverse(o => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) {
      if (Array.isArray(o.material)) o.material.forEach(m => { if (m.map) m.map.dispose(); m.dispose(); });
      else { if (o.material.map) o.material.map.dispose(); o.material.dispose(); }
    }
  });
  enemies.splice(index, 1);
}

function showGoblinHit(enemy, hitZone, damage) {
  enemy.hitFlashTimer = 0.12;
  const color = hitZone === "head" ? 0xffff66 : hitZone === "body" ? 0xff5555 : 0xffaa33;
  const sprite = createDamageSprite(Math.floor(damage), color);
  sprite.position.copy(enemy.mesh.position);
  sprite.position.y += hitZone === "head" ? 2.2 : 1.5;
  scene.add(sprite);
  floatingTexts.push({ sprite, life: 0.65, vel: new THREE.Vector3((Math.random()-0.5)*0.5,1.2,(Math.random()-0.5)*0.5) });
}

function updateFloatingTexts(dt) {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const f = floatingTexts[i];
    f.life -= dt;
    f.sprite.position.add(f.vel.clone().multiplyScalar(dt));
    f.sprite.material.opacity = Math.max(0, f.life / 0.65);
    if (f.life <= 0) {
      scene.remove(f.sprite);
      if (f.sprite.material.map) f.sprite.material.map.dispose();
      f.sprite.material.dispose();
      floatingTexts.splice(i, 1);
    }
  }
}

function animateGoblinWalk(enemy, moving) {
  const mesh = enemy.mesh;
  const leftLeg = mesh.getObjectByName("leftLeg");
  const rightLeg = mesh.getObjectByName("rightLeg");
  const leftArm = mesh.getObjectByName("leftArm");
  const rightArm = mesh.getObjectByName("rightArm");
  const head = mesh.getObjectByName("head");
  const body = mesh.getObjectByName("body");
  const swing = moving ? Math.sin(enemy.animTime) : 0;
  const bob = moving ? Math.abs(Math.sin(enemy.animTime)) * 0.07 : 0;
  if (leftLeg) leftLeg.rotation.x = swing * 0.55;
  if (rightLeg) rightLeg.rotation.x = -swing * 0.55;
  if (leftArm) leftArm.rotation.x = -swing * 0.45;
  if (rightArm) rightArm.rotation.x = swing * 0.45;
  if (body) body.position.y = 0.95 + bob;
  if (head) { head.position.y = 1.45 + bob; head.rotation.z = Math.sin(enemy.animTime * 0.5) * 0.08; }
}

function animateGoblinAttack(enemy, dt) {
  if (enemy.attackAnim <= 0) return;
  enemy.attackAnim -= dt;
  const t = enemy.attackAnim / 0.35;
  const punch = Math.sin((1 - t) * Math.PI);
  const leftArm = enemy.mesh.getObjectByName("leftArm");
  const rightArm = enemy.mesh.getObjectByName("rightArm");
  if (leftArm) { leftArm.rotation.x = -1.2 * punch; leftArm.rotation.z = 0.7; }
  if (rightArm) { rightArm.rotation.x = -1.2 * punch; rightArm.rotation.z = -0.7; }
  enemy.mesh.position.y += punch * 0.035;
}
function shakeWindowBoards(win) {
  for (let i = 0; i < win.boardMeshes.length; i++) {
    const b = win.boardMeshes[i];
    b.position.x = Math.sin(performance.now() * 0.03 + i) * 0.04;
    b.rotation.z += Math.sin(performance.now() * 0.02 + i) * 0.002;
  }
}
function animateGoblinTearing(enemy, dt) {
  if (enemy.tearAnim <= 0) return;
  enemy.tearAnim -= dt;
  const claw = Math.sin(performance.now() * 0.035);
  const leftArm = enemy.mesh.getObjectByName("leftArm");
  const rightArm = enemy.mesh.getObjectByName("rightArm");
  if (leftArm) { leftArm.rotation.x = -0.9 + claw * 0.4; leftArm.rotation.z = 0.9; }
  if (rightArm) { rightArm.rotation.x = -0.9 - claw * 0.4; rightArm.rotation.z = -0.9; }
}
function animateGoblinClimb(enemy, dt) {
  const leftArm = enemy.mesh.getObjectByName("leftArm");
  const rightArm = enemy.mesh.getObjectByName("rightArm");
  const leftLeg = enemy.mesh.getObjectByName("leftLeg");
  const rightLeg = enemy.mesh.getObjectByName("rightLeg");
  const head = enemy.mesh.getObjectByName("head");
  const t = performance.now() * 0.018;
  const pull = Math.sin(t);
  if (leftArm) { leftArm.rotation.x = -1.35 + pull * 0.35; leftArm.rotation.z = 0.85; }
  if (rightArm) { rightArm.rotation.x = -1.35 - pull * 0.35; rightArm.rotation.z = -0.85; }
  if (leftLeg) leftLeg.rotation.x = 0.95 - pull * 0.25;
  if (rightLeg) rightLeg.rotation.x = -0.95 + pull * 0.25;
  if (head) { head.rotation.x = -0.25; head.rotation.z = pull * 0.08; }
}

function updateGoblinClimbThroughWindow(enemy, win, dt) {
  if (!enemy.climbData) {
    enemy.climbData = {
      duration: 1.2,
      t: 0,
      start: getWindowOutsideStandPosition(win).clone(),
      end: getWindowInsideStandPosition(win).clone()
    };
  }
  const cd = enemy.climbData;
  cd.t += dt;
  const alpha = Math.min(1, cd.t / cd.duration);
  const smooth = alpha * alpha * (3 - 2 * alpha);
  enemy.mesh.position.lerpVectors(cd.start, cd.end, smooth);
  enemy.mesh.position.y = Math.sin(alpha * Math.PI) * 0.75;
  enemy.mesh.rotation.x = Math.sin(alpha * Math.PI) * 0.55;
  faceGoblinToward(enemy, cd.end);
  animateGoblinClimb(enemy, dt);
  if (alpha >= 1) {
    enemy.mesh.position.copy(cd.end);
    enemy.mesh.position.y = 0;
    enemy.mesh.rotation.x = 0;
    enemy.climbData = null;
    enemy.state = "inside";
  }
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const type = enemyTypes[e.typeKey];
    let moved = false;
    e.animTime += dt * e.speed * 4;

    e.attackCooldown -= dt;

    if (e.state === "walking_to_window") {
      const w = e.targetWindow;
      const target = getWindowOutsideStandPosition(w);
      const dir = target.clone().sub(e.mesh.position);
      dir.y = 0;
      if (dir.length() > 0.35) {
        dir.normalize();
        e.mesh.position.add(dir.multiplyScalar(e.speed * dt)); moved = true;
      } else {
        e.mesh.position.copy(target);
        e.state = "tearing_boards";
        e.tearAnim = 0.4;
      }
      faceGoblinToward(e, new THREE.Vector3(w.x, 0, w.z));
      continue;
    }
    if (e.state === "tearing_boards") {
      const w = e.targetWindow;
      const stand = getWindowOutsideStandPosition(w);
      e.mesh.position.x = stand.x;
      e.mesh.position.z = stand.z;
      e.mesh.position.y = 0;
      faceGoblinToward(e, new THREE.Vector3(w.x, 0, w.z));
      e.tearAnim = 0.4;
      animateGoblinTearing(e, dt);
      shakeWindowBoards(w, dt);
      w.breakTimer += dt;
      if (w.breakTimer >= 1.15) {
        w.breakTimer = 0;
        if (w.boards > 0) { w.boards--; rebuildWindowBoards(w); }
        if (w.boards <= 0) { e.state = "climbing_in"; e.climbData = null; }
      }
      continue;
    }
    if (e.state === "climbing_in") {
      updateGoblinClimbThroughWindow(e, e.targetWindow, dt);
      continue;
    }
    if (e.state === "inside") {
      const dx = player.pos.x - e.mesh.position.x;
      const dz = player.pos.z - e.mesh.position.z;
      e.mesh.rotation.y = Math.atan2(dx, dz);
      const dir = player.pos.clone().sub(e.mesh.position);
      dir.y = 0;

      const dist = dir.length();

      if (type.thrower && dist < 16 && dist > 5) {
        e.throwCooldown -= dt;
        if (e.throwCooldown <= 0) {
          spawnRock(e);
          e.throwCooldown = 3.2 + Math.random() * 2;
        }
      }

      if (dist > 1.1) {
        dir.normalize();
        e.mesh.position.add(dir.multiplyScalar(e.speed * dt)); moved = true;
      } else {
        if (e.attackCooldown <= 0 && player.hurtCooldown <= 0) {
          player.health -= e.damage;
          player.regenTimer = player.regenDelay;
          player.hurtCooldown = 0.45;
          e.attackCooldown = 0.75;
          e.attackAnim = 0.35;
        }
      }
    }
    animateGoblinWalk(e, moved);
    animateGoblinAttack(e, dt);
    animateGoblinTearing(e, dt);
    if (e.hitFlashTimer > 0) {
      e.hitFlashTimer -= dt;
      e.mesh.traverse(o => { if (o.isMesh && o.material && o.material.emissive) o.material.emissive.setHex(0x661111); });
    } else {
      e.mesh.traverse(o => { if (o.isMesh && o.material && o.material.emissive) o.material.emissive.setHex(0x000000); });
    }

    // health bar
    if (!e.healthBar) {
      const bg = new THREE.Mesh(
        new THREE.PlaneGeometry(1.25, 0.12),
        new THREE.MeshBasicMaterial({ color: 0x220000, side: THREE.DoubleSide })
      );
      const fg = new THREE.Mesh(
        new THREE.PlaneGeometry(1.2, 0.08),
        new THREE.MeshBasicMaterial({ color: 0xff3333, side: THREE.DoubleSide })
      );
      fg.name = "healthFill";
      e.healthBar = new THREE.Group();
      fg.position.z = -0.01;
      e.healthBar.add(bg, fg);
      scene.add(e.healthBar);
    }

    e.healthBar.position.copy(e.mesh.position);
    e.healthBar.position.y += 2.25 * type.scale;
    e.healthBar.lookAt(camera.position);
    const pct = Math.max(0, Math.min(1, e.health / e.maxHealth));
    const fill = e.healthBar.getObjectByName("healthFill");
    if (fill) { fill.scale.x = pct; fill.position.x = -0.6 * (1 - pct); }
  }
}
function updateHealthRegen(dt) {
  if (!player.alive) return;
  if (player.regenTimer > 0) { player.regenTimer -= dt; return; }
  if (player.health > 0 && player.health < player.maxHealth) {
    player.health = Math.min(player.maxHealth, player.health + player.regenRate * dt);
  }
}

/* =========================================================
   PICKUP UPDATE
========================================================= */

function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.life -= dt;
    p.mesh.rotation.y += dt * 2.2;
    p.mesh.position.y = 0.35 + Math.sin(performance.now() * 0.004 + i) * 0.08;

    if (p.mesh.position.distanceTo(camera.position) < 1.4) {
      if (p.type === "ammo") {
        currentGun.reserve = Math.min(currentGun.reserveMax, currentGun.reserve + Math.floor(currentGun.clipSize * 1.5));
      } else {
        player.coins += 150;
      }

      scene.remove(p.mesh);
      pickups.splice(i, 1);
      continue;
    }

    if (p.life <= 0) {
      scene.remove(p.mesh);
      pickups.splice(i, 1);
    }
  }
}

/* =========================================================
   WAVE SYSTEM
========================================================= */

function updateWave(dt) {
  if (!waveInProgress && enemies.length === 0) {
    startWave();
  }

  if (waveInProgress) {
    waveSpawnTimer -= dt;

    if (waveSpawnTimer <= 0 && waveSpawnLeft > 0) {
      spawnEnemy(chooseEnemyType());
      waveSpawnLeft--;
      waveSpawnTimer = Math.max(0.35, 1.25 - player.wave * 0.04);
    }

    if (waveSpawnLeft <= 0 && enemies.length === 0) {
      waveInProgress = false;
      player.wave++;
      player.coins += 400 + player.wave * 50;
    }
  }
}

/* =========================================================
   GUN UPDATE
========================================================= */

function updateGun(dt) {
  if (currentGun.cooldown > 0) currentGun.cooldown -= dt;

  if (currentGun.reloading) {
    currentGun.reloadTimer -= dt;

    // reload animation
    gunView.rotation.x = Math.sin(currentGun.reloadTimer * 12) * 0.12;
    gunView.position.y = -0.05;

    if (currentGun.reloadTimer <= 0) {
      const need = currentGun.clipSize - currentGun.clip;
      const taken = Math.min(need, currentGun.reserve);
      currentGun.clip += taken;
      currentGun.reserve -= taken;
      currentGun.reloading = false;
      gunView.rotation.x = 0;
      gunView.position.y = 0;
    }
  } else {
    gunView.rotation.x *= 0.85;
    gunView.position.y *= 0.85;
  }

  if (currentGun.automatic && keys["mouse"]) {
    shoot();
  }
}

document.addEventListener("mousedown", () => {
  keys["mouse"] = true;
});

document.addEventListener("mouseup", () => {
  keys["mouse"] = false;
});

/* =========================================================
   HUD
========================================================= */

function updateHud() {
  const nearest = getNearestInteractable();
  let msg = "";

  if (nearest) {
    if (nearest.type === "window") {
      if (nearest.boards < nearest.maxBoards) {
        msg = "Press E to board window +$10";
      } else {
        msg = "Window fully boarded";
      }
    }

    if (nearest.type === "door") {
      msg = `Press E to ${nearest.label} - $${nearest.cost}`;
      if (player.coins < nearest.cost) msg += " | Not enough coins";
    }

    if (nearest.type === "wallGun") {
      if (ownedGuns[nearest.key]) {
        msg = `Press E to equip ${nearest.name}`;
      } else {
        msg = `Press E to buy ${nearest.name} - $${nearest.cost}`;
        if (player.coins < nearest.cost) msg += " | Not enough coins";
      }
    }

    if (nearest.type === "ammo") {
      if (nearest.key === currentGunKey) {
        msg = `Press E to buy ammo - $${guns[nearest.key].ammoCost}`;
      } else {
        msg = `Ammo station for ${guns[nearest.key].name}`;
      }
    }
  }

  centerText.textContent = msg;

  hud.innerHTML = `
    Health: ${Math.max(0, Math.floor(player.health))}<br>
    Coins: $${player.coins}<br>
    Score: ${player.score}<br>
    Wave: ${player.wave}<br>
    Gun: ${currentGun.name}<br>
    Ammo: ${currentGun.clip}/${currentGun.reserve}${currentGun.reloading ? " — Reloading..." : ""}
  `;
  const hpPct = Math.max(0, Math.min(1, player.health / player.maxHealth));
  playerHealthFill.style.width = `${hpPct * 100}%`;
  playerHealthText.textContent = `${Math.ceil(player.health)} / ${player.maxHealth}`;
  if (player.health < 25) {
    const pulse = 0.18 + Math.sin(performance.now() * 0.008) * 0.07;
    damageTint.style.background = `rgba(180, 0, 0, ${pulse})`;
  } else {
    damageTint.style.background = "rgba(180, 0, 0, 0)";
  }
}

/* =========================================================
   GAME OVER
========================================================= */

function checkGameOver() {
  if (player.health <= 0 && player.alive) {
    player.alive = false;
    centerText.innerHTML = "You were eaten by goblins. Refresh to restart.";
    document.exitPointerLock();
  }
}

/* =========================================================
   MAIN LOOP
========================================================= */

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);

  if (player.alive) {
    updatePlayer(dt);
    updateGun(dt);
    updateWave(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updateRocks(dt);
    updateHealthRegen(dt);
    player.health = Math.max(0, Math.min(player.maxHealth, player.health));
    updatePickups(dt);
    updateFloatingTexts(dt);
    checkGameOver();
  }

  updateHud();
  renderer.render(scene, camera);
}

animate();

/* =========================================================
   RESIZE
========================================================= */

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
