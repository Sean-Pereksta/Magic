const keys = {};
document.addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if ([" ", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(k) || e.key === " ") {
    e.preventDefault();
  }
});
document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

function rand(min, max) { return Math.random() * (max - min) + min; }
function randi(min, max) { return Math.floor(rand(min, max + 1)); }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
function rectsOverlap(a, b) {
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}
function shade(hex, amt) {
  const col = hex.replace("#", "");
  let r = parseInt(col.substring(0, 2), 16);
  let g = parseInt(col.substring(2, 4), 16);
  let b = parseInt(col.substring(4, 6), 16);
  r = clamp(r + amt, 0, 255);
  g = clamp(g + amt, 0, 255);
  b = clamp(b + amt, 0, 255);
  return "#" +
    r.toString(16).padStart(2, "0") +
    g.toString(16).padStart(2, "0") +
    b.toString(16).padStart(2, "0");
}

/* ---------------- AUDIO ---------------- */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioUnlocked = false;
function unlockAudio() {
  if (!audioUnlocked) {
    audioUnlocked = true;
    if (audioCtx.state === "suspended") audioCtx.resume();
  }
}
document.addEventListener("keydown", unlockAudio, { once: true });
document.addEventListener("mousedown", unlockAudio, { once: true });

function beep(freq = 440, duration = 0.07, type = "square", volume = 0.03, slideTo = null) {
  if (!audioUnlocked) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (slideTo != null) {
    osc.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + duration);
  }
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(volume, t + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration + 0.02);
}
function soundFlap() { beep(560, 0.04, "square", 0.018, 430); }
function soundKill() { beep(930, 0.06, "square", 0.04, 490); setTimeout(() => beep(640, 0.07, "square", 0.03, 260), 30); }
function soundBerry() { beep(920, 0.05, "triangle", 0.03, 1220); }
function soundMount() { beep(310, 0.06, "sawtooth", 0.03, 500); }
function soundDismount() { beep(440, 0.05, "square", 0.03, 250); }
function soundGate() { beep(520, 0.05, "triangle", 0.03, 730); setTimeout(() => beep(730, 0.05, "triangle", 0.03, 990), 40); }
function soundUpgrade() { beep(480, 0.06, "triangle", 0.035, 880); setTimeout(() => beep(880, 0.08, "triangle", 0.04, 1200), 55); }
function soundWin() {
  beep(660, 0.09, "triangle", 0.04, 880);

  setTimeout(() => beep(990, 0.14, "triangle", 0.05, 1320), 170);
}

const particles = [];

function addParticles(x, y, color, count = 10, speed = 3) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x,
      y,
      vx: rand(-speed, speed),
      vy: rand(-speed - 1, speed * 0.35),
      life: rand(18, 44),
      maxLife: 44,
      color
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.11;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function getSnailDangerForTeam(team) {
  const totalSpan = world.snailRightGoal - world.snailLeftGoal;
  let progressAgainstTeam = 0;

  if (team === "blue") {
    progressAgainstTeam = (snail.x - world.snailLeftGoal) / totalSpan;
  } else {
    progressAgainstTeam = (world.snailRightGoal - snail.x) / totalSpan;
  }

  progressAgainstTeam = clamp(progressAgainstTeam, 0, 1);

  let severity = "none";
  if (progressAgainstTeam >= 0.82) severity = "critical";
  else if (progressAgainstTeam >= 0.63) severity = "high";
  else if (progressAgainstTeam >= 0.45) severity = "medium";
  else if (progressAgainstTeam >= 0.28) severity = "low";

  return {
    progress: progressAgainstTeam,
    severity
  };
}

/* ---------------- UNITS ---------------- */

class Unit {
  constructor({ team, role, x, y, isPlayer = false }) {
    this.team = team;
    this.role = role; // queen, worker
    this.x = x;
    this.y = y;
    this.w = role === "queen" ? 46 : 34;
    this.h = role === "queen" ? 30 : 24;
    this.vx = 0;
    this.vy = 0;
    this.dir = team === "blue" ? 1 : -1;
    this.onGround = false;
    this.flapCooldown = 0;
    this.flutter = 0;
    this.invuln = 0;
    this.dead = false;
    this.respawnTimer = 0;
    this.isPlayer = isPlayer;

    this.form = role === "queen" ? "queen" : "worker"; // worker, speed, warrior
    this.carryingBerry = null;
    this.onSnail = false;
    this.snailMountCooldown = 0;
    this.aiTick = 0;
    this.target = null;
    this.intent = "";
    this.queenLives = role === "queen" ? 3 : 0;
  }

  diff() {
    return currentDifficulty();
  }

  enemyUrgencyBoost() {
    const blueBerries = gates.blue.berries;
    if (this.team === "gold") {
      if (blueBerries >= 8) return 1.0;
      if (blueBerries >= 6) return 0.72;
      if (blueBerries >= 4) return 0.42;
    }
    return 0;
  }

  color() {
    if (this.role === "queen") return this.team === "blue" ? "#5ed6ff" : "#ffd457";
    if (this.form === "speed") return this.team === "blue" ? "#72ffe3" : "#faff99";
    if (this.form === "warrior") return this.team === "blue" ? "#48b9ff" : "#ffbf56";
    return this.team === "blue" ? "#2f9cff" : "#d6a040";
  }

  flapPower() {
    if (this.role === "queen") return 5.6;
    if (this.form === "speed") return 5.95;
    if (this.form === "warrior") return 5.2;
    return 5.1;
  }

  maxSpeed() {
    if (this.role === "queen") return 4.15;
    if (this.form === "speed") return 4.55;
    if (this.form === "warrior") return 3.3;
    return 3.6;
  }

  flap(power = this.flapPower()) {
    if (this.flapCooldown <= 0) {
      this.vy = Math.min(this.vy, 0) - power;
      this.flapCooldown = 10;
      this.flutter = 7;
      if (this.isPlayer) soundFlap();
      addParticles(this.x + this.w / 2, this.y + this.h - 2, "#ffffff", 3, 2.0);
    }
  }

  getHitbox() {
    return { x: this.x + 4, y: this.y + 4, w: this.w - 8, h: this.h - 7 };
  }

  die() {
    if (this.dead) return;

    if (this.role === "queen") {
      this.queenLives--;
      addParticles(this.x + this.w / 2, this.y + this.h / 2, this.team === "blue" ? "#79dcff" : "#ffe67a", 20, 3.8);
      soundDeath();

      if (this.carryingBerry) this.dropBerry();

      if (snail.rider === this) {
        snail.rider = null;
        this.onSnail = false;
        soundDismount();
      }

      if (this.queenLives <= 0) {
        this.dead = true;
        this.respawnTimer = 999999;
      } else {
        this.invuln = 120;
        this.respawnAtBase();
      }
      return;
    }

    this.dead = true;
    this.respawnTimer = 170;
    addParticles(this.x + this.w / 2, this.y + this.h / 2, this.team === "blue" ? "#79dcff" : "#ffe67a", 16, 3.4);
    soundDeath();

    if (this.carryingBerry) this.dropBerry();
    if (snail.rider === this) {
      snail.rider = null;
      this.onSnail = false;
      soundDismount();
    }
  }

  dropBerry() {
    if (!this.carryingBerry) return;
    this.carryingBerry.carriedBy = null;
    this.carryingBerry.x = this.x + 10;
    this.carryingBerry.y = this.y + 10;
    this.carryingBerry.alive = true;
    this.carryingBerry = null;
  }

  respawnAtBase() {
    if (this.team === "blue") {
      this.x = this.role === "queen" ? 165 : rand(125, 280);
      this.y = this.role === "queen" ? 650 : rand(635, 700);
      this.dir = 1;
    } else {
      this.x = this.role === "queen" ? world.width - 205 : rand(world.width - 280, world.width - 125);
      this.y = this.role === "queen" ? 650 : rand(635, 700);
      this.dir = -1;
    }
    this.vx = 0;
    this.vy = 0;
    this.onSnail = false;
    this.snailMountCooldown = 50;
  }

  respawn() {
    this.dead = false;
    this.invuln = 75;
    this.form = "worker";
    this.carryingBerry = null;
    this.respawnAtBase();
  }

  physics() {
    this.flapCooldown--;
    this.flutter = Math.max(0, this.flutter - 1);
    this.invuln = Math.max(0, this.invuln - 1);
    this.snailMountCooldown = Math.max(0, this.snailMountCooldown - 1);

    this.vy += 0.27;
    this.vy = clamp(this.vy, -8.6, 8);
    this.x += this.vx;
    this.y += this.vy;

    if (this.x + this.w < 0) this.x = world.width;
    if (this.x > world.width) this.x = -this.w;

    this.onGround = false;

    for (const p of world.platforms) {
      const feetPrev = this.y + this.h - this.vy;
      const feetNow = this.y + this.h;
      if (
        this.x + this.w - 5 > p.x &&
        this.x + 5 < p.x + p.w &&
        feetPrev <= p.y &&
        feetNow >= p.y &&
        this.vy >= 0
      ) {
        this.y = p.y - this.h;
        this.vy = 0;
        this.onGround = true;
      }
    }

    if (this.onSnail && snail.rider === this) {
      this.y = snail.y - this.h + 4;
      this.vy = 0;
      this.onGround = true;
      this.x = snail.x - this.w / 2;
    }

    if (this.y <= world.spikeY) {
      this.die();
      return;
    }
    if (this.y + this.h >= world.lavaY) {
      this.die();
      return;
    }

    this.vx *= this.onGround ? 0.88 : 0.985;
    this.vx = clamp(this.vx, -this.maxSpeed(), this.maxSpeed());
  }

  nearestEnemy(range = 99999) {
    let best = null, bestD = range;
    for (const u of units) {
      if (u.dead || u.team === this.team) continue;
      const d = dist(this.x, this.y, u.x, u.y);
      if (d < bestD) { bestD = d; best = u; }
    }
    return best;
  }

  enemyQueen() {
    return units.find(u => !u.dead && u.team !== this.team && u.role === "queen");
  }

  enemyCarrier() {
    return units.find(u => !u.dead && u.team !== this.team && u.carryingBerry);
  }

  alliedCarrier() {
    return units.find(u => !u.dead && u.team === this.team && u.carryingBerry);
  }

  squadRole() {
    if (!this.diff().squad || this.role === "queen") return "solo";
    const allies = units.filter(u => !u.dead && u.team === this.team && u.role !== "queen").sort((a, b) => a.x - b.x);
    const idx = allies.indexOf(this);
    if (idx === -1) return "solo";
    if (idx === 0) return "harvest";
    if (idx === 1) return "escort";
    if (idx === 2) return "contest";
    return "flex";
  }

  bushBerryTarget() {
    let best = null, bestScore = 1e9;
    for (const bush of bushes) {
      const b = bush.berry;
      if (!b.alive || b.carriedBy) continue;
      const d = dist(this.x, this.y, b.x, b.y);
      const ownGate = gates[this.team];
      const score = d + Math.abs(ownGate.x - b.x) * 0.15;
      if (score < bestScore) {
        bestScore = score;
        best = b;
      }
    }
    return best;
  }

  pressureInfo() {
    const ownGate = gates[this.team];
    const ownHive = hive[this.team];
    const enemyGate = gates[this.team === "blue" ? "gold" : "blue"];
    const enemyNearGate = nearestEnemyToPoint(this.team, ownGate.x, ownGate.y + 80, 260 + 70 * this.diff().awareness);
    const enemyNearHive = nearestEnemyToPoint(this.team, ownHive.x, ownHive.y, 240 + 60 * this.diff().awareness);
    const enemyNearSnail = nearestEnemyToPoint(this.team, snail.x, snail.y, 260 + 80 * this.diff().awareness);
    const snailEnemy = snail.rider && snail.rider.team !== this.team ? snail.rider : null;
    const snailFriendly = snail.rider && snail.rider.team === this.team ? snail.rider : null;
    return { ownGate, ownHive, enemyGate, enemyNearGate, enemyNearHive, enemyNearSnail, snailEnemy, snailFriendly };
  }

  chooseTarget(strategy) {
    const diffSet = this.diff();
    const pressure = this.pressureInfo();
    const enemyQueen = this.enemyQueen();
    const enemyCarrier = this.enemyCarrier();
    const alliedCarrier = this.alliedCarrier();
    const berry = this.bushBerryTarget();
    const urgency = this.enemyUrgencyBoost();
    const squad = this.squadRole();
    const snailDanger = getSnailDangerForTeam(this.team);

    if (this.role === "queen") {
      if (this.team === "gold") {
        if (pressure.snailEnemy) return { obj: pressure.snailEnemy, intent: "defend-snail" };
        if (pressure.enemyNearGate) return { obj: pressure.enemyNearGate, intent: "defend-gate" };
        if (enemyCarrier && Math.random() < 0.8 + urgency * 0.2) return { obj: enemyCarrier, intent: "stop-carrier" };
        if (urgency > 0.6 && enemyQueen) return { obj: enemyQueen, intent: "queen-hunt" };
        if (pressure.enemyNearHive) return { obj: pressure.enemyNearHive, intent: "defend-hive" };
        if (strategy === "military" && enemyQueen && dist(this.x, this.y, enemyQueen.x, enemyQueen.y) < 420) {
          return { obj: enemyQueen, intent: "queen-hunt" };
        }
        return { obj: { x: pressure.ownGate.x - 70, y: 410 }, intent: "guard-zone" };
      } else {
        if (strategy === "military" && enemyQueen) return { obj: enemyQueen, intent: "queen-hunt" };
        if (enemyCarrier) return { obj: enemyCarrier, intent: "stop-carrier" };
        if (pressure.snailEnemy) return { obj: pressure.snailEnemy, intent: "contest-snail" };
        if (pressure.enemyNearGate) return { obj: pressure.enemyNearGate, intent: "defend-gate" };
        return { obj: enemyQueen || this.nearestEnemy() || { x: pressure.enemyGate.x, y: 360 }, intent: "pressure" };
      }
    }

    if (this.form === "warrior") {
      if (pressure.snailEnemy) return { obj: pressure.snailEnemy, intent: "contest-snail" };
      if (enemyCarrier) return { obj: enemyCarrier, intent: "stop-carrier" };
      if (pressure.enemyNearGate) return { obj: pressure.enemyNearGate, intent: "defend-gate" };
      if ((strategy === "military" || urgency > 0.55) && enemyQueen) return { obj: enemyQueen, intent: "queen-hunt" };
      if (diffSet.escort && alliedCarrier) return { obj: alliedCarrier, intent: "escort-carrier" };
      return { obj: this.nearestEnemy() || pressure.enemyGate, intent: "roam-attack" };
    }

    if (this.carryingBerry) {
      const ownGate = gates[this.team];
      if (ownGate.upgrades.speed && this.form === "worker" && Math.random() < 0.28) return { obj: ownGate.maidens[0], intent: "take-speed" };
      if (ownGate.upgrades.warrior && this.form === "worker" && Math.random() < 0.18) return { obj: ownGate.maidens[1], intent: "take-warrior" };
      return { obj: ownGate, intent: "score-berry" };
    }

    if (pressure.snailEnemy) {
      if (snailDanger.severity === "critical") {
        return { obj: pressure.snailEnemy, intent: "contest-snail-hard" };
      }
      if (snailDanger.severity === "high") {
        if (this.form === "warrior" || this.form === "speed" || Math.random() < 0.7) {
          return { obj: pressure.snailEnemy, intent: "contest-snail" };
        }
      }
      if (snailDanger.severity === "medium") {
        if (this.form === "warrior" || Math.random() < 0.45) {
          return { obj: pressure.snailEnemy, intent: "contest-snail" };
        }
      }
      if (snailDanger.severity === "low") {
        if (this.form === "warrior" && Math.random() < 0.45) {
          return { obj: pressure.snailEnemy, intent: "contest-snail" };
        }
      }
    }

    if (pressure.enemyNearGate && (diffSet.awareness > 0.55 || urgency > 0.4)) {
      return { obj: pressure.enemyNearGate, intent: "defend-gate" };
    }
    if (enemyCarrier && (diffSet.antiBerry > 0.35 || urgency > 0.3)) {
      return { obj: enemyCarrier, intent: "stop-carrier" };
    }

    if (strategy === "snail") {
      if (!pressure.snailFriendly) return { obj: snail, intent: "ride-snail" };
      if (diffSet.escort && snail.rider && snail.rider.team === this.team) return { obj: snail.rider, intent: "escort-snail" };
      if (berry && squad !== "contest") return { obj: berry, intent: "collect-berry" };
      return { obj: pressure.enemyNearSnail || pressure.ownHive, intent: "patrol-snail" };
    }

    if (strategy === "economy") {
      if (diffSet.escort && alliedCarrier && squad === "escort") return { obj: alliedCarrier, intent: "escort-carrier" };
      if (berry) return { obj: berry, intent: "collect-berry" };
      if (pressure.enemyNearHive) return { obj: pressure.enemyNearHive, intent: "defend-hive" };
      return { obj: pressure.ownGate, intent: "reposition" };
    }

    if (gates[this.team].upgrades.warrior && this.form === "worker" && (Math.random() < 0.24 + diffSet.aggression * 0.15)) {
      return { obj: gates[this.team].maidens[1], intent: "seek-warrior" };
    }

    if (urgency > 0.65 && enemyQueen) return { obj: enemyQueen, intent: "queen-hunt" };
    return { obj: enemyQueen || this.nearestEnemy() || pressure.enemyGate, intent: "pressure" };
  }

  ai(strategy) {
    if (this.dead) return;
    const diffSet = this.diff();
    this.aiTick--;

    if (this.aiTick <= 0 || !this.target || !this.target.obj) {
      this.target = this.chooseTarget(strategy);
      this.aiTick = diffSet.reaction;
    }

    const nearestEnemy = this.nearestEnemy(150);

    const spikeBuffer = 95;
    const hardSpikeLine = world.spikeY + spikeBuffer;
    const risingFast = this.vy < -1.5;
    const nearSpike = this.y < hardSpikeLine;
    const veryNearSpike = this.y < hardSpikeLine + 18;

    if (nearSpike) {
      if (this.vy < 0) this.vy *= 0.55;
      this.vy += 0.22 + diffSet.spikeSense * 0.12;
      if (Math.random() < 0.12 + diffSet.spikeSense * 0.10) {
        this.vx += (this.team === "blue" ? 0.10 : -0.10);
      }
    }
    if (veryNearSpike && risingFast) {
      this.vy += 0.35;
    }

    if (nearestEnemy && nearestEnemy.y < this.y - 8 && Math.random() < 0.12 + diffSet.awareness * 0.12) {
      this.flap();
    }

    if (this.onSnail && snail.rider === this) {
      const nearbyThreat = this.nearestEnemy(165 + diffSet.awareness * 40);
      const closeToGoal = (this.team === "blue" && snail.x > world.snailRightGoal - 70) ||
                          (this.team === "gold" && snail.x < world.snailLeftGoal + 70);
      if (nearbyThreat && Math.random() < 0.04 + diffSet.awareness * 0.05) {
        this.dismountSnail();
      } else if (closeToGoal && Math.random() < 0.015) {
        this.dismountSnail();
      }
      return;
    }

    const obj = this.target.obj;
    const tx = obj.x ?? this.x;
    const ty = obj.y ?? this.y;
    const dx = tx - this.x;
    const dy = ty - this.y;

    let accel = this.role === "queen" ? 0.21 : (this.form === "speed" ? 0.19 : 0.17);
    accel += (diffSet.aggression - 0.5) * 0.05;

    if (Math.abs(dx) > 8) {
      this.vx += Math.sign(dx) * accel;
      this.dir = dx > 0 ? 1 : -1;
    }

    const desiredHeightCeiling = world.spikeY + 95;
    if (this.y < desiredHeightCeiling) {
      this.vy += 0.20;
    }

    if (dy < -16 && this.y > desiredHeightCeiling && this.y > world.spikeY + 105) {
      this.flap();
    } else if (this.y > ty + 18 && Math.random() < 0.03 + diffSet.awareness * 0.03) {
      this.flap();
    }

    if (this.target.intent === "escort-carrier" || this.target.intent === "escort-snail") {
      if (Math.abs(dx) > 30) {
        this.vx += Math.sign(dx) * 0.06;
      }
      if (nearestEnemy && dist(this.x, this.y, nearestEnemy.x, nearestEnemy.y) < 120 && Math.random() < 0.12 + diffSet.aggression * 0.08) {
        this.flap();
      }
    }

    if (this.role === "queen" && this.team === "gold") {
      const urgency = this.enemyUrgencyBoost();
      if (nearestEnemy && dist(this.x, this.y, nearestEnemy.x, nearestEnemy.y) < 135 && nearestEnemy.y < this.y + 8 && Math.random() < 0.14 + urgency * 0.08) {
        this.flap(this.flapPower() + 0.18);
      }
      if (this.y < 180 && Math.random() < 0.13) this.vy += 0.20;
    }

    if (this.form === "speed" && Math.random() < 0.018 + diffSet.aggression * 0.01) this.flap(this.flapPower() + 0.1);
    if (this.form === "warrior" && nearestEnemy && nearestEnemy.y < this.y + 8 && Math.random() < 0.05 + diffSet.aggression * 0.06) this.flap();
  }

  playerControl() {
    if (this.onSnail && keys["s"]) {
      this.dismountSnail();
      return;
    }
    if (keys["a"]) { this.vx -= 0.34; this.dir = -1; }
    if (keys["d"]) { this.vx += 0.34; this.dir = 1; }
    if ((keys["w"] || keys[" "]) && this.y > world.spikeY + 90) this.flap();
    if (keys["s"]) this.vy += 0.16;
    if (this.y < world.spikeY + 80) this.vy += 0.22;
  }

  tryMountSnail() {
    if (this.role === "queen" || this.form === "warrior") return;
    if (this.snailMountCooldown > 0) return;
    if (snail.rider) return;
    if (dist(this.x + this.w / 2, this.y + this.h / 2, snail.x, snail.y) < 28) {
      snail.rider = this;
      this.onSnail = true;
      this.vx = 0;
      this.vy = 0;
      soundMount();
    }
  }

  dismountSnail() {
    if (!this.onSnail || snail.rider !== this) return;
    snail.rider = null;
    this.onSnail = false;
    this.snailMountCooldown = 50;
    this.vy = -3.4;
    this.vx += this.team === "blue" ? 1.5 : -1.5;
    soundDismount();
  }

  update(strategy) {
    if (this.dead) {
      if (this.role !== "queen") {
        this.respawnTimer--;
        if (this.respawnTimer <= 0) this.respawn();
      }
      return;
    }

    if (this.isPlayer) this.playerControl();
    else this.ai(strategy);

    if (!this.onSnail) this.tryMountSnail();
    this.physics();
  }

  drawBeeBody(x, y, color, dir) {
    ctx.fillStyle = color;
    ctx.fillRect(x + 10, y + 11, this.w - 18, 10);

    ctx.fillStyle = "#202020";
    ctx.fillRect(x + 16, y + 11, 3, 10);
    ctx.fillRect(x + 24, y + 11, 3, 10);
    ctx.fillRect(x + 32, y + 11, 3, 10);

    ctx.fillStyle = shade(color, 15);
    ctx.fillRect(x + 8, y + 9, 9, 12);

    ctx.fillStyle = shade(color, 28);
    if (dir === 1) {
      ctx.fillRect(x + this.w - 13, y + 8, 8, 8);
      ctx.fillRect(x + this.w - 5, y + 10, 3, 4);
    } else {
      ctx.fillRect(x + 5, y + 8, 8, 8);
      ctx.fillRect(x + 2, y + 10, 3, 4);
    }

    ctx.fillStyle = "#111";
    if (dir === 1) ctx.fillRect(x + 5, y + 13, 4, 2);
    else ctx.fillRect(x + this.w - 9, y + 13, 4, 2);

    ctx.fillStyle = shade(color, -18);
    ctx.fillRect(x + 15, y + 20, 2, 5);
    ctx.fillRect(x + 22, y + 20, 2, 5);
    ctx.fillRect(x + 30, y + 20, 2, 5);
  }

  drawWings(x, y, flapFrame, dir) {
    const wingRise = flapFrame ? -11 : -3;
    ctx.fillStyle = "rgba(220,255,255,0.55)";
    if (dir === 1) {
      ctx.fillRect(x + 11, y + wingRise + 1, 8, 15);
      ctx.fillRect(x + 19, y + wingRise - 1, 9, 18);
    } else {
      ctx.fillRect(x + this.w - 19, y + wingRise + 1, 8, 15);
      ctx.fillRect(x + this.w - 28, y + wingRise - 1, 9, 18);
    }
  }

  drawAntennae(x, y, dir) {
    ctx.fillStyle = "#111";
    if (dir === 1) {
      ctx.fillRect(x + this.w - 10, y + 4, 1, 4);
      ctx.fillRect(x + this.w - 7, y + 3, 1, 5);
      ctx.fillRect(x + this.w - 11, y + 3, 2, 1);
      ctx.fillRect(x + this.w - 8, y + 2, 2, 1);
    } else {
      ctx.fillRect(x + 8, y + 4, 1, 4);
      ctx.fillRect(x + 11, y + 3, 1, 5);
      ctx.fillRect(x + 8, y + 3, 2, 1);
      ctx.fillRect(x + 11, y + 2, 2, 1);
    }
  }

  drawRider(x, y, dir) {
    let riderColor = "#dcdcdc";
    if (this.role === "queen") riderColor = "#ff69cf";
    else if (this.form === "speed") riderColor = "#9fffe9";
    else if (this.form === "warrior") riderColor = "#ffe48e";

    ctx.fillStyle = riderColor;
    ctx.fillRect(x + 16, y + 1, 8, 8);
    ctx.fillStyle = "#f4c59e";
    ctx.fillRect(x + 17, y - 5, 6, 6);

    ctx.fillStyle = this.role === "queen" ? "#ff7ce5" : (this.form === "warrior" ? "#f0f0f0" : "#d7d7d7");
    if (dir === 1) {
      ctx.fillRect(x + 23, y + 4, this.role === "queen" ? 16 : 12, 2);
      ctx.fillRect(x + 37, y + 3, 4, 4);
    } else {
      ctx.fillRect(x - 4, y + 4, this.role === "queen" ? 16 : 12, 2);
      ctx.fillRect(x - 8, y + 3, 4, 4);
    }

    if (this.role === "queen") {
      ctx.fillStyle = "#fff08d";
      ctx.fillRect(x + 17, y - 8, 2, 2);
      ctx.fillRect(x + 20, y - 10, 2, 4);
      ctx.fillRect(x + 23, y - 8, 2, 2);
    }

    if (this.carryingBerry) {
      ctx.fillStyle = "#46ff5c";
      ctx.fillRect(x + this.w - 9, y - 2, 6, 6);
      ctx.fillStyle = "#a51fc5";
      ctx.fillRect(x + this.w - 8, y - 1, 4, 4);
    }
  }

  drawStatusIcons() {
    if (this.dead) return;
    if (this.form === "speed") {
      ctx.fillStyle = "#84fff2";
      ctx.fillRect(this.x + this.w / 2 - 5, this.y - 12, 10, 3);
    }
    if (this.form === "warrior") {
      ctx.fillStyle = "#ffe57d";
      ctx.fillRect(this.x + this.w / 2 - 5, this.y - 12, 10, 4);
    }
    if (this.onSnail && snail.rider === this) {
      ctx.fillStyle = "#ffb347";
      ctx.fillRect(this.x + this.w / 2 - 5, this.y - 16, 10, 4);
    }
  }

  draw() {
    if (this.dead) return;
    if (this.invuln > 0 && Math.floor(this.invuln / 4) % 2 === 0) return;

    const flapFrame = this.flutter > 0 || !this.onGround;
    this.drawWings(this.x, this.y, flapFrame, this.dir);
    this.drawBeeBody(this.x, this.y, this.color(), this.dir);
    this.drawAntennae(this.x, this.y, this.dir);
    this.drawRider(this.x, this.y, this.dir);
    this.drawStatusIcons();
  }
}

/* ---------------- WORLD LOGIC ---------------- */

function spawnMatch() {
  applyMap(game.currentMapIndex);
  units = [];

  const bq = new Unit({ team: "blue", role: "queen", x: 165, y: 650, isPlayer: true });
  const gq = new Unit({ team: "gold", role: "queen", x: world.width - 205, y: 650 });

  playerQueen = bq;
  units.push(bq, gq);

  for (let i = 0; i < 4; i++) {
    units.push(new Unit({ team: "blue", role: "worker", x: 120 + i * 38, y: 690 }));
    units.push(new Unit({ team: "gold", role: "worker", x: world.width - 270 + i * 38, y: 690 }));
  }

  game.enemyStrategy = ["economy", "snail", "military"][randi(0, 2)];
  game.winner = null;
  game.winType = "";
  game.state = "playing";
  game.time = 0;
  game.cameraX = 0;
  game.cameraY = 0;
}

function nearestEnemyToPoint(team, x, y, range = 99999) {
  let best = null, bestD = range;
  for (const u of units) {
    if (u.dead || u.team === team) continue;
    const d = dist(x, y, u.x, u.y);
    if (d < bestD) {
      bestD = d;
      best = u;
    }
  }
  return best;
}

function updateBushes() {
  for (const bush of bushes) {
    if (!bush.berry.alive && !bush.berry.carriedBy) {
      bush.timer--;
      if (bush.timer <= 0) {
        bush.berry = {
          x: bush.x,
          y: bush.y - 20,
          alive: true,
          carriedBy: null,
          bushId: bush.id
        };
        addParticles(bush.x, bush.y - 18, world.theme.bushBerry1, 10, 1.6);
      }
    }
  }
}

function handleBerries() {
  for (const bush of bushes) {
    const berry = bush.berry;
    if (!berry.alive) continue;

    if (berry.carriedBy) {
      berry.x = berry.carriedBy.x + berry.carriedBy.w - 6;
      berry.y = berry.carriedBy.y - 2;
      continue;
    }

    for (const u of units) {
      if (u.dead || u.role === "queen" || u.form === "warrior" || u.carryingBerry) continue;
      if (dist(u.x + u.w / 2, u.y + u.h / 2, berry.x, berry.y) < 18) {
        berry.carriedBy = u;
        u.carryingBerry = berry;
        soundBerry();
        break;
      }
    }
  }

  for (const u of units) {
    if (u.dead || !u.carryingBerry) continue;
    const ownGate = gates[u.team];
    const gateRect = { x: ownGate.x, y: ownGate.y, w: ownGate.w, h: ownGate.h };

    if (rectsOverlap(u.getHitbox(), gateRect)) {
      ownGate.berries++;
      const bush = bushes.find(b => b.id === u.carryingBerry.bushId);
      if (bush) {
        bush.berry.alive = false;
        bush.berry.carriedBy = null;
        bush.timer = 280 + randi(0, 120);
      }
      u.carryingBerry = null;
      soundGate();
      addParticles(ownGate.x + ownGate.w / 2, ownGate.y + ownGate.h - 25 - (ownGate.berries * 6), world.theme.bushBerry1, 12, 2.2);

      if (ownGate.berries >= 2 && !ownGate.upgrades.speed) {
        ownGate.upgrades.speed = true;
        soundUpgrade();
      }
      if (ownGate.berries >= 5 && !ownGate.upgrades.warrior) {
        ownGate.upgrades.warrior = true;
        soundUpgrade();
      }
      if (ownGate.berries >= 10) {
        game.winner = u.team;
        game.winType = "ECONOMY";
        game.state = "gameOver";
        soundWin();
      }
    }

    if (u.form === "worker") {
      for (const maiden of ownGate.maidens) {
        const unlocked = ownGate.upgrades[maiden.type];
        if (!unlocked) continue;
        const maidenRect = { x: maiden.x - 12, y: maiden.y - 12, w: 24, h: 24 };
        if (rectsOverlap(u.getHitbox(), maidenRect)) {
          u.form = maiden.type;
          addParticles(maiden.x, maiden.y, maiden.type === "speed" ? "#8dfff0" : "#ffe57d", 16, 2.8);
          soundUpgrade();
        }
      }
    }
  }
}

function handleSnail() {
  if (snail.rider && snail.rider.dead) {
    snail.rider.onSnail = false;
    snail.rider = null;
  }

  if (snail.rider) {
    snail.dir = snail.rider.team === "blue" ? 1 : -1;
    const speedBonus = snail.rider.form === "speed" ? 0.28 : 0;
    snail.x += snail.dir * (snail.speed + speedBonus);
    snail.x = clamp(snail.x, world.snailLeftGoal, world.snailRightGoal);

    if (snail.rider.team === "blue" && snail.x >= world.snailRightGoal) {
      game.winner = "blue";
      game.winType = "SNAIL";
      game.state = "gameOver";
      soundWin();
    }
    if (snail.rider.team === "gold" && snail.x <= world.snailLeftGoal) {
      game.winner = "gold";
      game.winType = "SNAIL";
      game.state = "gameOver";
      soundWin();
    }
  }
}

function handleCombat() {
  for (let i = 0; i < units.length; i++) {
    const a = units[i];
    if (a.dead) continue;

    for (let j = i + 1; j < units.length; j++) {
      const b = units[j];
      if (b.dead || a.team === b.team) continue;
      if (!rectsOverlap(a.getHitbox(), b.getHitbox())) continue;

      const aBottom = a.y + a.h;
      const bBottom = b.y + b.h;
      const aPower = (a.role === "queen" ? 2 : (a.form === "warrior" ? 1 : 0));
      const bPower = (b.role === "queen" ? 2 : (b.form === "warrior" ? 1 : 0));

      if (aBottom < bBottom - 5 || (Math.abs(aBottom - bBottom) <= 5 && aPower > bPower)) {
        b.die();
        a.vy = -4.0;
        if (a.isPlayer || b.isPlayer) soundKill();
      } else if (bBottom < aBottom - 5 || (Math.abs(aBottom - bBottom) <= 5 && bPower > aPower)) {
        a.die();
        b.vy = -4.0;
        if (a.isPlayer || b.isPlayer) soundKill();
      } else {
        const push = a.x < b.x ? -2.2 : 2.2;
        a.vx = -push;
        b.vx = push;
        a.vy -= 0.4;
        b.vy -= 0.4;
      }
    }
  }

  const blueQueen = units.find(u => u.team === "blue" && u.role === "queen");
  const goldQueen = units.find(u => u.team === "gold" && u.role === "queen");

  if (blueQueen && blueQueen.dead && blueQueen.queenLives <= 0) {
    game.winner = "gold";
    game.winType = "MILITARY";
    game.state = "gameOver";
    soundWin();
  }
  if (goldQueen && goldQueen.dead && goldQueen.queenLives <= 0) {
    game.winner = "blue";
    game.winType = "MILITARY";
    game.state = "gameOver";
    soundWin();
  }
}

function updateCamera() {
  if (!playerQueen) return;
  const targetX = playerQueen.x + playerQueen.w / 2 - VIEW_W / 2;
  const targetY = playerQueen.y + playerQueen.h / 2 - VIEW_H / 2;
  game.cameraX += (clamp(targetX, 0, world.width - VIEW_W) - game.cameraX) * 0.12;
  game.cameraY += (clamp(targetY, 0, world.height - VIEW_H) - game.cameraY) * 0.10;
}

/* ---------------- UPDATE LOOP ---------------- */

let titleInputLock = false;

function update() {
  if (game.state === "title") {
    if (!titleInputLock) {
      if (keys["1"]) { game.playerStrategy = "economy"; titleInputLock = true; }
      else if (keys["2"]) { game.playerStrategy = "snail"; titleInputLock = true; }
      else if (keys["3"]) { game.playerStrategy = "military"; titleInputLock = true; }
      else if (keys["m"]) { game.currentMapIndex = (game.currentMapIndex + 1) % MAPS.length; titleInputLock = true; }
      else if (keys["q"]) { game.difficultyIndex = (game.difficultyIndex + 9) % 10; titleInputLock = true; }
      else if (keys["e"]) { game.difficultyIndex = (game.difficultyIndex + 1) % 10; titleInputLock = true; }
      else if (keys[" "]) { spawnMatch(); titleInputLock = true; }
    }
    if (!keys["1"] && !keys["2"] && !keys["3"] && !keys["m"] && !keys["q"] && !keys["e"] && !keys[" "]) {
      titleInputLock = false;
    }
    return;
  }

  if (game.state === "gameOver") {
    updateParticles();
    if (keys["r"]) {
      game.state = "title";
      game.winner = null;
    }
    return;
  }

  game.time++;

  for (const u of units) {
    const strat = u.team === "blue" ? game.playerStrategy : game.enemyStrategy;
    u.update(strat);
  }

  updateBushes();
  handleBerries();
  handleSnail();
  handleCombat();
  updateParticles();
  updateCamera();
}

/* ---------------- DRAWING ---------------- */

function drawStars() {
  for (const s of stars) {
    ctx.fillStyle = s.s === 1 ? "#bcc7ff" : s.s === 2 ? "#ffffff" : "#ffe9a8";
    const x = s.x - game.cameraX * 0.25;
    const y = s.y - game.cameraY * 0.15;
    if (x > -5 && x < VIEW_W + 5) ctx.fillRect(x, y, s.s, s.s);
  }
}

function drawBackdrop() {
  const t = world.theme;
  const grad = ctx.createLinearGradient(0, 0, 0, VIEW_H);
  grad.addColorStop(0, t.skyTop);
  grad.addColorStop(0.48, t.skyMid);
  grad.addColorStop(1, t.skyLow);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  const camSlow = game.cameraX * 0.18;
  const camMed = game.cameraX * 0.30;

  if (t.name === "SUNSET HIVE") {
    ctx.save();
    ctx.translate(-camSlow, 0);
    ctx.fillStyle = "rgba(255,180,90,0.35)";
    ctx.beginPath();
    ctx.arc(900, 190, 90, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = t.mountain1;
    ctx.beginPath();
    ctx.moveTo(-100, 590);
    for (let x = 0; x <= world.width + 200; x += 180) {
      const peak = 360 + Math.sin(x * 0.0048) * 75 + (x % 360 === 0 ? -35 : 50);
      ctx.lineTo(x, peak);
    }
    ctx.lineTo(world.width + 200, world.height);
    ctx.lineTo(-100, world.height);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.translate(-camMed, 0);
    ctx.fillStyle = t.mountain2;
    for (let x = 120; x < world.width; x += 380) {
      ctx.fillRect(x, 420, 18, 210);
      ctx.beginPath();
      ctx.arc(x + 9, 410, 34, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  else if (t.name === "MOON CAVERN") {
    ctx.save();
    ctx.translate(-camSlow, 0);
    ctx.fillStyle = "rgba(230,240,255,0.25)";
    ctx.beginPath();
    ctx.arc(2150, 130, 70, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = t.mountain1;
    ctx.beginPath();
    ctx.moveTo(-100, 620);
    for (let x = 0; x <= world.width + 200; x += 140) {
      const peak = 410 + Math.cos(x * 0.006) * 55 + (x % 280 === 0 ? -50 : 20);
      ctx.lineTo(x, peak);
    }
    ctx.lineTo(world.width + 200, world.height);
    ctx.lineTo(-100, world.height);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.translate(-camMed, 0);
    ctx.fillStyle = t.mountain2;
    for (let x = 90; x < world.width; x += 240) {
      ctx.beginPath();
      ctx.moveTo(x, 510);
      ctx.lineTo(x + 45, 420);
      ctx.lineTo(x + 90, 510);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  else if (t.name === "EMERALD TOWER") {
    ctx.save();
    ctx.translate(-camSlow, 0);
    ctx.fillStyle = t.mountain1;
    ctx.beginPath();
    ctx.moveTo(-100, 630);
    for (let x = 0; x <= world.width + 200; x += 170) {
      const peak = 430 + Math.sin(x * 0.0035) * 50 + (x % 340 === 0 ? -65 : 15);
      ctx.lineTo(x, peak);
    }
    ctx.lineTo(world.width + 200, world.height);
    ctx.lineTo(-100, world.height);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.translate(-camMed, 0);
    ctx.fillStyle = t.mountain2;
    for (let x = 170; x < world.width; x += 420) {
      ctx.fillRect(x, 320, 24, 300);
      ctx.fillRect(x - 18, 350, 18, 260);
      ctx.fillRect(x + 24, 350, 18, 260);
      ctx.fillStyle = shade(t.mountain2, 25);
      ctx.fillRect(x - 10, 300, 44, 24);
      ctx.fillStyle = t.mountain2;
    }
    ctx.restore();
  }
}

function drawPlatforms() {
  const t = world.theme;
  for (const p of world.platforms) {
    ctx.fillStyle = t.platformSide;
    ctx.fillRect(p.x, p.y + 10, p.w, 6);
    ctx.fillStyle = t.platformTop;
    ctx.fillRect(p.x, p.y, p.w, 10);
    ctx.fillStyle = shade(t.platformTop, 35);
    ctx.fillRect(p.x, p.y, p.w, 2);
    ctx.fillStyle = shade(t.platformSide, 20);
    for (let i = 0; i < p.w; i += 24) {
      ctx.fillRect(p.x + i + 4, p.y + 4, 8, 3);
    }
  }
}

function drawCeilingSpikes() {
  const c = world.theme.spikeColor;
  for (let x = 0; x < world.width; x += 24) {
    ctx.fillStyle = c;
    ctx.beginPath();
    ctx.moveTo(x, world.spikeY);
    ctx.lineTo(x + 12, world.spikeY + 18);
    ctx.lineTo(x + 24, world.spikeY);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = shade(c, -30);
    ctx.fillRect(x + 10, world.spikeY + 1, 4, 6);
  }
}

function drawLava() {
  const t = world.theme;
  ctx.fillStyle = "#370505";
  ctx.fillRect(0, world.lavaY, world.width, world.height - world.lavaY);
  const tm = Date.now() * 0.01;
  for (let x = 0; x < world.width; x += 24) {
    const h = 8 + Math.sin((x * 0.05) + tm) * 3.5;
    ctx.fillStyle = t.lava1;
    ctx.fillRect(x, world.lavaY + 2, 24, h);
    ctx.fillStyle = t.lava2;
    ctx.fillRect(x + 5, world.lavaY + 4, 12, 3);
  }
}

function drawGate(g) {
  const c = g.team === "blue" ? "#4dc9ff" : "#ffd24a";
  ctx.fillStyle = shade(c, -40);
  ctx.fillRect(g.x, g.y, g.w, g.h);
  ctx.fillStyle = c;
  ctx.fillRect(g.x + 4, g.y + 4, g.w - 8, g.h - 8);

  for (let i = 0; i < g.berries; i++) {
    const row = i % 5;
    const col = Math.floor(i / 5);
    ctx.fillStyle = world.theme.bushBerry1;
    ctx.fillRect(g.x + 8 + col * 10, g.y + g.h - 16 - row * 12, 6, 6);
    ctx.fillStyle = world.theme.bushBerry2;
    ctx.fillRect(g.x + 9 + col * 10, g.y + g.h - 15 - row * 12, 4, 4);
  }

  for (const maiden of g.maidens) {
    const unlocked = g.upgrades[maiden.type];
    ctx.fillStyle = unlocked ? (maiden.type === "speed" ? "#8dfff0" : "#ffe57d") : "#666";
    ctx.fillRect(maiden.x - 8, maiden.y - 8, 16, 16);
    ctx.fillStyle = "#222";
    if (maiden.type === "speed") ctx.fillRect(maiden.x - 4, maiden.y - 2, 8, 3);
    else ctx.fillRect(maiden.x - 3, maiden.y - 4, 6, 8);
  }

  ctx.fillStyle = "#fff";
  ctx.font = "12px Courier New";
  ctx.fillText(g.berries + "/10", g.x - 2, g.y - 8);
}

function drawHives() {
  for (const key of ["blue", "gold"]) {
    const h = hive[key];
    const c = key === "blue" ? "#50cfff" : "#ffd75a";
    ctx.fillStyle = shade(c, -35);
    ctx.fillRect(h.x - 28, h.y, 56, 22);
    ctx.fillStyle = c;
    ctx.fillRect(h.x - 20, h.y + 4, 40, 14);
    ctx.fillStyle = "#2c1d12";
    ctx.fillRect(h.x - 7, h.y + 8, 14, 8);
  }
}

function drawBushes() {
  const t = world.theme;
  for (const bush of bushes) {
    ctx.fillStyle = t.bushLeaf1;
    ctx.fillRect(bush.x - 18, bush.y - 6, 36, 12);
    ctx.fillRect(bush.x - 26, bush.y - 14, 16, 12);
    ctx.fillRect(bush.x - 8, bush.y - 20, 16, 14);
    ctx.fillRect(bush.x + 10, bush.y - 14, 16, 12);

    ctx.fillStyle = t.bushLeaf2;
    ctx.fillRect(bush.x - 22, bush.y - 12, 14, 10);
    ctx.fillRect(bush.x - 2, bush.y - 22, 14, 12);
    ctx.fillRect(bush.x + 12, bush.y - 12, 14, 10);

    ctx.fillStyle = "#6d4322";
    ctx.fillRect(bush.x - 2, bush.y - 2, 4, 8);

    if (bush.berry.alive && !bush.berry.carriedBy) {
      const b = bush.berry;
      ctx.fillStyle = t.bushBerry1;
      ctx.fillRect(b.x - 4, b.y - 4, 8, 8);
      ctx.fillStyle = t.bushBerry2;
      ctx.fillRect(b.x - 3, b.y - 3, 6, 6);
    }
  }
}

function drawSnail() {
  ctx.fillStyle = "#60391f";
  ctx.fillRect(world.snailLeftGoal - 30, world.snailTrackY + 18, world.snailRightGoal - world.snailLeftGoal + 60, 8);
  ctx.fillStyle = "#8a5a35";
  ctx.fillRect(world.snailLeftGoal - 30, world.snailTrackY + 20, world.snailRightGoal - world.snailLeftGoal + 60, 4);

  ctx.fillStyle = "#4dc9ff";
  ctx.fillRect(world.snailLeftGoal - 8, world.snailTrackY - 10, 6, 34);
  ctx.fillStyle = "#ffd24a";
  ctx.fillRect(world.snailRightGoal + 2, world.snailTrackY - 10, 6, 34);

  ctx.fillStyle = "#d7a05a";
  ctx.fillRect(snail.x - 14, snail.y + 10, 30, 10);
  ctx.fillStyle = "#b77038";
  ctx.fillRect(snail.x - 6, snail.y, 20, 18);
  ctx.fillStyle = "#f1d7a0";
  ctx.fillRect(snail.x - 18, snail.y + 16, 12, 5);
  ctx.fillRect(snail.x + 12, snail.y + 16, 8, 5);
  ctx.fillStyle = "#fff";
  ctx.fillRect(snail.x - 16, snail.y + 9, 2, 5);
  ctx.fillRect(snail.x - 12, snail.y + 9, 2, 5);
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 3, 3);
  }
  ctx.globalAlpha = 1;
}

function drawWorld() {
  drawBackdrop();
  ctx.save();
  ctx.translate(-game.cameraX, -game.cameraY);
  drawCeilingSpikes();
  drawPlatforms();
  drawHives();
  drawGate(gates.blue);
  drawGate(gates.gold);
  drawBushes();
  drawSnail();
  for (const u of units) u.draw();
  drawParticles();
  drawLava();
  ctx.restore();
}

function drawQueenLivesBox(x, y, queen, label, color) {
  ctx.fillStyle = "#000";
  ctx.fillRect(x, y, 170, 56);
  ctx.strokeStyle = color;
  ctx.strokeRect(x, y, 170, 56);
  ctx.fillStyle = color;
  ctx.fillRect(x + 8, y + 9, 18, 18);
  ctx.fillStyle = "#fff";
  ctx.font = "15px Courier New";
  ctx.fillText(label, x + 35, y + 20);
  ctx.fillText("LIVES:", x + 35, y + 42);
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < queen.queenLives ? color : "#444";
    ctx.fillRect(x + 90 + i * 18, y + 33, 12, 12);
  }
}

function drawHUD() {
  const blueQueen = units.find(u => u.team === "blue" && u.role === "queen");
  const goldQueen = units.find(u => u.team === "gold" && u.role === "queen");

  ctx.fillStyle = "#000";
  ctx.fillRect(12, 12, 470, 92);
  ctx.strokeStyle = "#d5d5d5";
  ctx.strokeRect(12, 12, 470, 92);

  ctx.fillStyle = "#fff";
  ctx.font = "18px Courier New";
  ctx.fillText("MAP: " + MAPS[game.currentMapIndex].name, 24, 34);
  ctx.fillText("BLUE: " + game.playerStrategy.toUpperCase(), 24, 58);
  ctx.fillText("GOLD: " + game.enemyStrategy.toUpperCase(), 24, 82);

  drawQueenLivesBox(500, 12, blueQueen, "BLUE QUEEN", "#61d5ff");
  drawQueenLivesBox(686, 12, goldQueen, "GOLD QUEEN", "#ffd45a");

  ctx.fillStyle = "#000";
  ctx.fillRect(876, 12, 312, 92);
  ctx.strokeStyle = "#d5d5d5";
  ctx.strokeRect(876, 12, 312, 92);
  ctx.fillStyle = "#fff";
  ctx.font = "15px Courier New";
  ctx.fillText("DIFF: " + currentDifficulty().name, 888, 32);
  ctx.fillText("AI LVL: " + currentDifficulty().level + "/10", 888, 52);
  ctx.fillText("A/D MOVE  W/SPACE FLAP", 888, 72);
  ctx.fillText("S DIVE / DISMOUNT", 888, 92);
}

function drawTitle() {
  applyMap(game.currentMapIndex);
  drawBackdrop();

  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(160, 85, 880, 500);
  ctx.strokeStyle = "#ddd";
  ctx.lineWidth = 3;
  ctx.strokeRect(160, 85, 880, 500);

  ctx.fillStyle = "#fff08d";
  ctx.font = "bold 44px Courier New";
  ctx.fillText("KILLER QUEEN STYLE", 315, 150);

  ctx.fillStyle = "#fff";
  ctx.font = "20px Courier New";
  ctx.fillText("1 / 2 / 3 = STRATEGY", 425, 205);
  ctx.fillText("M = CHANGE MAP", 475, 235);
  ctx.fillText("Q / E = CHANGE DIFFICULTY", 385, 265);
  ctx.fillText("SPACE = START", 485, 295);

  const opts = [
    { n:"1", label:"ECONOMY", x: 245, on: game.playerStrategy === "economy" },
    { n:"2", label:"SNAIL", x: 455, on: game.playerStrategy === "snail" },
    { n:"3", label:"MILITARY", x: 665, on: game.playerStrategy === "military" }
  ];

  for (const o of opts) {
    ctx.fillStyle = "#111";
    ctx.fillRect(o.x, 335, 150, 78);
    ctx.strokeStyle = o.on ? "#61ff7c" : "#bbb";
    ctx.strokeRect(o.x, 335, 150, 78);
    ctx.fillStyle = o.on ? "#61ff7c" : "#fff";
    ctx.font = "bold 28px Courier New";
    ctx.fillText(o.n, o.x + 63, 365);
    ctx.font = "18px Courier New";
    ctx.fillText(o.label, o.x + 18, 397);
  }

  ctx.fillStyle = "#9fdfff";
  ctx.font = "22px Courier New";
  ctx.fillText("MAP: " + MAPS[game.currentMapIndex].name, 415, 470);
  ctx.fillText("DIFFICULTY: " + currentDifficulty().name + " (" + currentDifficulty().level + "/10)", 285, 505);

  ctx.fillStyle = "#fff";
  ctx.font = "17px Courier New";
  ctx.fillText("Enemy strategy is random each match.", 375, 548);
  ctx.fillText("Higher difficulties get escorts, squads, stronger reactions,", 240, 575);
  ctx.fillText("better anti-berry logic, better spike avoidance, and queen pressure.", 188, 600);

  ctx.fillStyle = "#9fdfff";
  ctx.font = "24px Courier New";
  ctx.fillText("PRESS SPACE TO START", 420, 645);
}

function drawGameOver() {
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(360, 210, 480, 180);
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 3;
  ctx.strokeRect(360, 210, 480, 180);

  const blueWin = game.winner === "blue";
  ctx.fillStyle = blueWin ? "#61d5ff" : "#ffd45a";
  ctx.font = "bold 42px Courier New";
  ctx.fillText((blueWin ? "BLUE" : "GOLD") + " WINS", 470, 268);

  ctx.fillStyle = "#fff";
  ctx.font = "24px Courier New";
  ctx.fillText("VICTORY TYPE: " + game.winType, 424, 318);
  ctx.fillStyle = "#9fdfff";
  ctx.font = "22px Courier New";
  ctx.fillText("PRESS R TO RETURN TO TITLE", 400, 358);
}

function draw() {
  ctx.clearRect(0, 0, VIEW_W, VIEW_H);
  drawStars();

  if (game.state === "title") {
    drawTitle();
  } else {
    drawWorld();
    drawHUD();
    if (game.state === "gameOver") drawGameOver();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
