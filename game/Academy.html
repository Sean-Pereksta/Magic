<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Cat vs Mouse Survival 3D</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0d1117;
    font-family: Arial, Helvetica, sans-serif;
  }
  canvas { display: block; }

  #ui {
    position: absolute;
    left: 8px;
    top: 8px;
    z-index: 20;
    background: rgba(0,0,0,0.58);
    color: #fff;
    padding: 8px 9px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 11px;
    line-height: 1.2;
    width: 340px;
    backdrop-filter: blur(4px);
  }
  #ui .topline {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 5px;
  }
  .pill {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    padding: 3px 7px;
    font-weight: bold;
  }

    color: #ffe978;
    font-weight: bold;
    font-size: 13px;
    margin-bottom: 5px;
  }
  #controls {
    opacity: 0.92;
    margin-bottom: 5px;
  }
  #catRow {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    margin-bottom: 5px;
  }
  .catBtn {
    padding: 4px 5px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: #d6d6d6;
    font-size: 10px;
    font-weight: bold;
    text-align: center;
  }
  .catBtn.active {
    color: #101319;
    background: #88ff9d;
    border-color: #88ff9d;
  }
  #buildGrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 6px;
  }
  .buildItem {
    padding: 4px 5px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);

    background: #8effa1;
    border-color: #8effa1;
    font-weight: bold;
  }
  .buildKey {
    color: #ffe978;
    font-weight: bold;
    margin-right: 4px;
  }
  .buildIcon {
    margin-right: 5px;
    font-size: 13px;
    display: inline-block;
    width: 14px;
    text-align: center;
    filter: drop-shadow(0 0 4px rgba(0,0,0,0.45));
  }

  #centerMsg {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,-50%);
    z-index: 25;
    color: white;
    font-size: 34px;
    font-weight: bold;
    text-align: center;
    pointer-events: none;
    text-shadow: 0 0 10px #000, 0 0 22px #000;
  }

  #bossBarWrap {
    position: absolute;
    left: 50%;
    top: 12px;
    transform: translateX(-50%);
    width: 420px;
    height: 20px;
    border-radius: 999px;
    overflow: hidden;
    background: rgba(0,0,0,0.58);
    border: 1px solid rgba(255,255,255,0.15);
    z-index: 21;
    display: none;
  }
  #bossBar {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg,#ff5858,#ff9b52);
  }
  #bossLabel {
    position: absolute;
    left: 50%;
    top: 13px;
    transform: translateX(-50%);
    z-index: 22;
    color: white;
    font-size: 12px;
    font-weight: bold;
    display: none;
    text-shadow: 0 0 8px #000;
  }
  #enemyUnlockWarning {
    position: absolute;
    left: 50%;
    top: 38px;
    transform: translateX(-50%);
    z-index: 22;
    color: #fff7cf;
    font-size: 13px;
    font-weight: bold;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(0,0,0,0.52);
    border: 1px solid rgba(255,235,162,0.38);
    text-shadow: 0 0 8px #000;
    letter-spacing: 0.2px;
    pointer-events: none;
  }
  #enemyUnlockWarning.flash {
    animation: unlockPulse 0.55s ease-in-out 2;
  }
  @keyframes unlockPulse {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.08); box-shadow: 0 0 20px rgba(255,198,110,0.5); }
    100% { transform: translateX(-50%) scale(1); }
  }

  #towerPrompt {
    position: absolute;
    left: 50%;
    bottom: 68px;
    transform: translateX(-50%);
    z-index: 24;
    color: #ffeeb5;
    font-size: 14px;
    font-weight: bold;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,225,154,0.4);
    background: rgba(0,0,0,0.58);
    text-shadow: 0 0 8px #000;
    display: none;
  }
  #towerMenu {
    position: absolute;
    inset: 0;
    z-index: 40;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(3,6,10,0.5);

  #towerPanel {

    overflow: auto;
    background: rgba(14,19,27,0.94);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 14px;
    color: #f2f6ff;

  .towerBtn {

    background: rgba(44,153,69,0.25);
    color: #d8ffe0;
    border-radius: 10px;
    padding: 5px 9px;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;

    opacity: 0.35;
    cursor: not-allowed;
    border-color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.07);
    color: #c6c6c6;
  }
  .towerSub { color:#a4b3c8; font-size:11px; }

</style>

};

function getBuildKeyForEntry(entry, index){
  if(index < 6) return String([5,6,7,8,9,0][index]);
  return BUILD_EXTRA_KEYS[index - 6] || "";
}
function getBuildShortcutMap(category){
  const arr = CATEGORY_BUILDS[category] || [];
  const map = new Map();
  arr.forEach((b, i)=> map.set(getBuildKeyForEntry(b, i), b.slot));
  return map;
}
function getSelectedBuildData() {
  if (currentCategory === 1 || currentSelectionSlot == null) return null;
  return CATEGORY_BUILDS[currentCategory].find(b => b.slot === currentSelectionSlot) || null;
}

function updateBuildUI() {
  ui.catExplore.classList.toggle("active", currentCategory === 1);
  ui.catEco.classList.toggle("active", currentCategory === 2);
  ui.catDef.classList.toggle("active", currentCategory === 3);
  ui.catAtk.classList.toggle("active", currentCategory === 4);
  ui.catTech.classList.toggle("active", currentCategory === 5);

  ui.buildGrid.innerHTML = "";
  if (currentCategory === 1) {
    const items = [
      "Explore mode",
      "2 Economic",
      "3 Defensive",
      "4 Attack",
      "Q Tech",
      "Then use 1 2 5 6 7 8 9 0",
      "Space places selected build"
    ];
    items.forEach((txt, i) => {
      const div = document.createElement("div");
      div.className = "buildItem" + (i === 0 ? " active" : "");
      div.textContent = txt;
      ui.buildGrid.appendChild(div);
    });
    return;
  }

  for (const b of CATEGORY_BUILDS[currentCategory]) {
    const div = document.createElement("div");
    div.className = "buildItem" + (currentSelectionSlot === b.slot ? " active" : "");
    const icon = BUILD_ICONS[b.type] || "•";
    const prereqTxt = b.prereq && !hasStructureType(b.prereq) ? ` · Needs ${prettyTypeName(b.prereq)}` : "";
    const tip = b.requiresVent ? " · On vent only" : "";
    const powerNeed = getStructurePowerRequirement(b.type);
    const powerProvide = getStructurePowerProvided(b.type);
    const powerTxt = powerNeed > 0 ? ` · Needs ${powerNeed}⚡` : (powerProvide > 0 ? ` · Provides ${powerProvide}⚡` : "");
    div.innerHTML = `<span class="buildKey">${getBuildKeyForEntry(b, CATEGORY_BUILDS[currentCategory].indexOf(b)).toUpperCase()}</span><span class="buildIcon">${icon}</span>${b.name} (${b.cost}🧀/${b.gasCost||0}⛽)${prereqTxt}${tip}${powerTxt}`;
    ui.buildGrid.appendChild(div);
  }
}
updateBuildUI();

// -------------------------------------------------
// HELPERS
// -------------------------------------------------
function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }
function rand(a,b){ return a + Math.random()*(b-a); }
function dist2(a,b){ return Math.hypot(a.x-b.x, a.z-b.z); }
function formatClock(seconds){
  const s = Math.max(0, Math.ceil(seconds));
  const mm = String(Math.floor(s / 60)).padStart(2, "0");
  const ss = String(s % 60).padStart(2, "0");
  return `${mm}:${ss}`;
}
function cellKey(cx, cz){ return `${cx},${cz}`; }
function worldToCell(x,z){
  return {
    cx: clamp(Math.round(x / GRID_SIZE), -dynamicGridHalfCells, dynamicGridHalfCells),
    cz: clamp(Math.round(z / GRID_SIZE), -dynamicGridHalfCells, dynamicGridHalfCells)
  };
}
function cellToWorld(cx,cz){ return { x:cx*GRID_SIZE, z:cz*GRID_SIZE }; }
function getEnemyLevel(){ return 1 + Math.floor(Math.max(0, time - 60) / 90); }
function getCatRoundHpMultiplier(){ return Math.pow(2, currentLevel - 1); }
function getEnemyRoundMultiplier(){ return Math.pow(1.5, currentLevel - 1); }
function getCatLevelStats(){
  return {
    hp: BASE_CAT_HP * getCatRoundHpMultiplier(),
    damage: BASE_CAT_DAMAGE * Math.pow(2, currentLevel - 1)
  };
}
function showLevelBanner(level){
  showCenter(`LEVEL ${level}\nNew Ground Discovered\nStronger Enemies Approaching`, 2.4);
}
const BARRIER_SHIELD_RADIUS = GRID_SIZE * 4;
const BARRIER_SHIELD_MAX = 30;
const BARRIER_SHIELD_REGEN_PER_TOTEM = 4.5;
const BARRIER_SHIELD_IMPACT_COLOR = 0x8cc8ff;
const BREEDING_SPAWN_SEARCH_CELLS = 3;
const SERVANT_REPAIR_RANGE = 12;
const SERVANT_REPAIR_MAX_PER_TARGET = 2;
const SERVANT_REPAIR_INTERVAL = 0.65;
const SERVANT_REPAIR_AMOUNT = 3.0;
const LATE_GAME_START = 200;
const LATE_GAME_PEAK = 760;
const POWER_RADIUS = GRID_SIZE * 5;
const POWER_SYMBOL_COLOR = 0xffdc5e;
const LOW_POWER_SYMBOL_COLOR = 0xff6666;
function getLateGameDefenseMultiplier(){
  const levelFactor = clamp((getEnemyLevel() - 2) / 9, 0, 1);
  const timeFactor = clamp((time - LATE_GAME_START) / (LATE_GAME_PEAK - LATE_GAME_START), 0, 1);
  return clamp(timeFactor * 0.75 + levelFactor * 0.6, 0, 1.5);
}
function getTowerLateScale(type){
  const t = getLateGameDefenseMultiplier();
  const gains = {
    turret:0.45, cannon:0.62, shardLauncher:0.74,
    zapCoil:1.35, mortarBloom:1.4, sawBlaster:1.3,
    sniperTower:1.65, railGun:1.75
  };
  return 1 + t * (gains[type] || 0.2);
}
function getStructurePowerRequirement(type){
  const map = {
    workshop:1, launcher:1, teleporter:1, robo:1, sniperTower:1,
    advancedRobo:2, zapCoil:2, mortarBloom:2,
    sawBlaster:3, mechaHangar:3, railGun:4
  };
  return map[type] || 0;
}
function getStructurePowerProvided(type){
  if(type === "battery") return 1;
  if(type === "advancedBattery") return 2;
  return 0;
}
function isPowerSourceStructure(type){
  return getStructurePowerProvided(type) > 0;

function createGround(){
  const geo = new THREE.PlaneGeometry(dynamicMapSize, dynamicMapSize, 180, 180);
  geo.rotateX(-Math.PI/2);
  const pos = geo.attributes.position;
  const colors = [];
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i), z = pos.getZ(i);
    pos.setY(i, 0);
    const n = Math.sin(x*0.07)*0.5 + Math.cos(z*0.05)*0.35 + Math.sin((x-z)*0.04)*0.25;
    const shade = 0.5 + n*0.25;
    colors.push(0.18 + shade*0.16, 0.32 + shade*0.22, 0.13 + shade*0.10);
  }
  geo.setAttribute("color", new THREE.Float32BufferAttribute(colors,3));
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:1 });
  const ground = new THREE.Mesh(geo, mat);
  ground.receiveShadow = true;
  scene.add(ground);
}
const groundBands = [];
function addGroundBand(oldHalf, newHalf, bandLevel=1){
  const size = newHalf * 2;
  const geo = new THREE.PlaneGeometry(size, size, 140, 140);
  geo.rotateX(-Math.PI/2);
  const pos = geo.attributes.position;
  const colors = [];
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i), z = pos.getZ(i);
    const inOuterBand = Math.abs(x) > oldHalf || Math.abs(z) > oldHalf;
    pos.setY(i, 0.02 * Math.sin((x+z)*0.03));
    const n = Math.sin((x+bandLevel*7)*0.06)*0.45 + Math.cos((z-bandLevel*5)*0.045)*0.38;
    const shade = 0.45 + n*0.25;
    const tintShift = Math.min(0.12, bandLevel * 0.02);
    const r = inOuterBand ? 0.19 + shade*(0.12+tintShift) : 0.17 + shade*0.12;
    const g = inOuterBand ? 0.27 + shade*(0.16-tintShift*0.3) : 0.3 + shade*0.16;
    const b = inOuterBand ? 0.12 + shade*(0.07+tintShift*0.2) : 0.12 + shade*0.08;
    colors.push(r,g,b);
  }
  geo.setAttribute("color", new THREE.Float32BufferAttribute(colors,3));
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ vertexColors:true, roughness:1 }));
  mesh.receiveShadow = true;
  mesh.position.y = -0.01 * bandLevel;
  scene.add(mesh);
  groundBands.push(mesh);
}

function populateDecorBand(oldHalf,newHalf,level){

function circleBlocked(x,z,r, ignoreStructure=null, structureSpacingScale=1, opts=null){
  const ignoreWallsForBurrow = !!opts?.ignoreWallsForBurrow;
  if(x < -dynamicHalfMap+2 || x > dynamicHalfMap-2 || z < -dynamicHalfMap+2 || z > dynamicHalfMap-2) return true;
  for(const o of obstacles){
    if(Math.hypot(x-o.x, z-o.z) < r + o.r) return true;
  }
  for(const s of structures){
    if(s.dead || s===ignoreStructure) continue;
    if(ignoreWallsForBurrow && isWallStructure(s)) continue;
    if(!structureBlocksMovement(s)) continue;
    if(Math.hypot(x-s.pos.x, z-s.pos.z) < (r + s.radius) * structureSpacingScale) return true;
  }
  return false;
}
function lineBlocked(a,b, opts=null){
  const ignoreWallsForBurrow = !!opts?.ignoreWallsForBurrow;
  const dx = b.x-a.x, dz = b.z-a.z;
  const len = Math.hypot(dx,dz);
  const steps = Math.ceil(len/1.5);
  for(let i=1;i<steps;i++){
    const t = i/steps;
    const x = a.x + dx*t;
    const z = a.z + dz*t;
    for(const o of obstacles){
      if(Math.hypot(x-o.x, z-o.z) < o.r + 0.65) return true;
    }
    for(const s of structures){
      if(s.dead) continue;
      if(ignoreWallsForBurrow && isWallStructure(s)) continue;
      if(!structureBlocksMovement(s)) continue;
      if(Math.hypot(x-s.pos.x, z-s.pos.z) < s.radius + 0.55) return true;
    }
  }
  return false;
}

    const sides = [];
    for(let i=-r+1;i<=r-1;i++){
      sides.push([r,i],[-r,i],[i,r],[i,-r]);
    }
    const ring = r <= preferredRadiusCells ? [...orth, ...diag, ...sides] : [...orth, ...sides, ...diag];
    for(const [ox,oz] of ring) offsets.push([ox,oz,r]);
  }
  let fallback = null;
  let fallbackDist = 9999;
  for(const [ox,oz,r] of offsets){
    const cx = center.cx + ox;
    const cz = center.cz + oz;
    if(cx < -dynamicGridHalfCells || cx > dynamicGridHalfCells || cz < -dynamicGridHalfCells || cz > dynamicGridHalfCells) continue;
    const wp = cellToWorld(cx, cz);
    if(circleBlocked(wp.x, wp.z, 0.84, null, 0.9)) continue;
    const d = Math.hypot(ox, oz) + r * 0.02;
    if(r <= preferredRadiusCells) return { cx, cz };
    if(d < fallbackDist){ fallbackDist = d; fallback = { cx, cz }; }
  }
  return fallback || center;
}

function addLightningArc(from, to, life=0.12, color=0xbec4ff){
  const segs = 6;
  const pts = [from.clone()];
  const dir = to.clone().sub(from);
  const side = new THREE.Vector3(-dir.z, 0, dir.x).normalize();
  for(let i=1;i<segs;i++){
    const t = i/segs;
    const p = from.clone().lerp(to, t);
    const wobble = (Math.random()*2 - 1) * 0.32 * (1 - Math.abs(t - 0.5));
    p.addScaledVector(side, wobble);
    p.y += (Math.random()*2 - 1) * 0.18;
    pts.push(p);
  }
  pts.push(to.clone());
  const curve = new THREE.CatmullRomCurve3(pts);
  const geo = new THREE.TubeGeometry(curve, 16, 0.04, 6, false);
  const mat = new THREE.MeshBasicMaterial({ color, transparent:true, opacity:0.96, depthWrite:false });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  particles.push({ mesh, vel:new THREE.Vector3(), life, maxLife:life, kind:"lightning" });
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.life -= dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    if (p.kind === "burst") {
      p.vel.y -= 7.5*dt;
      const s = Math.max(0.04, p.life / p.maxLife);
      p.mesh.scale.setScalar(s);
    } else if (p.kind === "blood") {
      p.vel.y -= 10.5 * dt;
      const s = Math.max(0.02, p.life / p.maxLife);
      p.mesh.scale.setScalar(s);
      if (p.mesh.material) p.mesh.material.opacity = clamp(p.life / p.maxLife, 0, 1);
    } else if (p.kind === "cog") {
      p.mesh.rotation.z += (p.spin || 2) * dt;
      p.mesh.scale.setScalar(0.6 + 0.5 * (p.life / p.maxLife));
      p.mesh.traverse(c => { if(c.material) c.material.opacity = p.life / p.maxLife; });
    } else if (p.kind === "lightning") {
      if (p.mesh.material) p.mesh.material.opacity = clamp((p.life / p.maxLife) * 1.2, 0, 1);
    }
    if(p.life <= 0){
      p.mesh.parent?.remove(p.mesh);
      particles.splice(i,1);
    }
  }
}
function ensureEnemyTelegraph(e){

  const g = new THREE.Group();
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.95, 1.15, 28),
    new THREE.MeshBasicMaterial({ color:0xffb347, transparent:true, opacity:0, side:THREE.DoubleSide, depthWrite:false })
  );

  ring.position.y = 0.06;
  const arc = new THREE.Mesh(
    new THREE.RingGeometry(0.45, 2.2, 36, 1, -Math.PI*0.22, Math.PI*0.44),
    new THREE.MeshBasicMaterial({ color:0xff6f4a, transparent:true, opacity:0, side:THREE.DoubleSide, depthWrite:false })
  );
  arc.rotation.x = -Math.PI/2;
  arc.position.y = 0.07;
  g.add(ring, arc);
  e.group.add(g);
  e.telegraphVisual = { group:g, ring, arc };
  return e.telegraphVisual;

function setEnemyTelegraph(e, frac=0){
  if(!e || e.dead || e.dying) return;
  if(frac <= 0 && !e.telegraphVisual) return;
  const v = ensureEnemyTelegraph(e);
  const pulse = 0.55 + Math.sin(time*22) * 0.45;
  const vis = clamp(frac, 0, 1) * pulse;
  v.group.visible = vis > 0.02;
  v.ring.material.opacity = vis * 0.58;
  v.arc.material.opacity = vis * 0.85;
  const dir = e.ramChargeDir?.lengthSq?.() > 0.001 ? e.ramChargeDir : (e.titanChargeDir?.lengthSq?.() > 0.001 ? e.titanChargeDir : null);
  if(dir){
    const yaw = Math.atan2(dir.x, dir.z);
    v.arc.rotation.z = -yaw + Math.PI/2;
  }
}

function setSpitLandingTelegraph(e, position, frac=0, radius=1.75){

function createHealthBar(width = 1.6, color = 0x3aeb58){
  const g = new THREE.Group();
  const innerWidth = width * 0.98;

  const bg = new THREE.Mesh(
    new THREE.PlaneGeometry(width, 0.16),
    new THREE.MeshBasicMaterial({
      color: 0x220909,
      transparent: true,
      opacity: 0.96,
      side: THREE.DoubleSide,
      depthTest: false,
      depthWrite: false
    })
  );

  const missing = new THREE.Mesh(
    new THREE.PlaneGeometry(innerWidth, 0.11),
    new THREE.MeshBasicMaterial({
      color: 0xc43d3d,
      transparent: true,
      opacity: 0.72,
      side: THREE.DoubleSide,
      depthTest: false,
      depthWrite: false
    })
  );

  const fg = new THREE.Mesh(
    new THREE.PlaneGeometry(innerWidth, 0.11),
    new THREE.MeshBasicMaterial({
      color,
      transparent: true,
      opacity: 0.95,
      side: THREE.DoubleSide,
      depthTest: false,
      depthWrite: false
    })
  );

  bg.position.z = 0.001;
  missing.position.z = 0.01;
  fg.position.z = 0.02;

  g.add(bg, missing, fg);

  g.renderOrder = 150;
  bg.renderOrder = 150;
  missing.renderOrder = 151;
  fg.renderOrder = 152;

  g.userData = { bg, missing, fg, width, innerWidth };
  setHealthBar(g, 1);
  return g;
}

function normalizeHealthFrac(value){
  if (!Number.isFinite(value)) return 1;
  return clamp(value, 0, 1);
}

function setHealthBar(bar, frac){
  if (!bar?.userData?.fg || !bar?.userData?.missing) return;

  const safeFrac = normalizeHealthFrac(frac);
  const innerWidth = bar.userData.innerWidth;

  const greenWidth = Math.max(0.0001, innerWidth * safeFrac);
  const redWidth = Math.max(0.0001, innerWidth * (1 - safeFrac));

  bar.userData.fg.scale.x = safeFrac;
  bar.userData.fg.position.x = -(innerWidth * 0.5) + (greenWidth * 0.5);
  bar.userData.fg.visible = safeFrac > 0.001;

  bar.userData.missing.scale.x = (1 - safeFrac);
  bar.userData.missing.position.x = (innerWidth * 0.5) - (redWidth * 0.5);
  bar.userData.missing.visible = safeFrac < 0.999;

  const low = new THREE.Color(0xff4f4f);
  const high = new THREE.Color(0x34eb72);
  bar.userData.fg.material.color.copy(low).lerp(high, safeFrac);
}

  for(let i=floatingTexts.length-1;i>=0;i--){

    ft.life -= dt;
    ft.sprite.position.y += ft.rise * dt;
    ft.sprite.material.opacity = clamp(ft.life / 0.9, 0, 1);
    ft.sprite.quaternion.copy(camera.quaternion);

function shouldShowBar(bar, dist, near, far){
  const prev = !!bar.userData._vis;
  const show = prev ? dist < far : dist < near;
  bar.userData._vis = show;
  return show;
}
function updateWorldHealthBars(){
  const structureNear = 36, structureFar = 39;
  const enemyNear = 46, enemyFar = 49;
  const catNear = 58, catFar = 61;

  for(const s of structures){
    if(s.dead || !s.mesh?.userData?.healthBar) continue;
    const bar = s.mesh.userData.healthBar;
    const d = dist2(player.pos, s.pos);
    bar.visible = shouldShowBar(bar, d, structureNear, structureFar);
    if(bar.visible) bar.quaternion.copy(camera.quaternion);
  }

  for(const e of enemies){
    if(!isEnemyTargetable(e) || !e.healthBar) continue;
    const d = dist2(player.pos, e.pos);
    e.healthBar.visible = shouldShowBar(e.healthBar, d, enemyNear, enemyFar);
    if(e.healthBar.visible) e.healthBar.quaternion.copy(camera.quaternion);
  }

  if(cat?.healthBar && !cat.dead && !cat.dying){
    const d = dist2(player.pos, cat.pos);
    cat.healthBar.visible = shouldShowBar(cat.healthBar, d, catNear, catFar);
    if(cat.healthBar.visible) cat.healthBar.quaternion.copy(camera.quaternion);
  } else if(cat?.healthBar){
    cat.healthBar.visible = false;
    cat.healthBar.userData._vis = false;
  }
}

function animateMouseRig(group, speedFactor, t, attackAmount=0, dying=0){
  const rig = group.userData;
  if(!rig) return;
  const walk = t * (5 + speedFactor*8);
  if(rig.pelvis?.position) rig.pelvis.position.y = Math.sin(walk*2)*0.02;
  if(rig.spine?.rotation) rig.spine.rotation.x = Math.sin(walk*2)*0.05 + attackAmount*0.18 - dying*1.2;
  if(rig.neck?.rotation) rig.neck.rotation.x = Math.sin(walk*2+0.5)*0.04 - attackAmount*0.3 + dying*0.35;

  if(rig.tailBase?.rotation){
    rig.tailBase.rotation.x = 0.18 + Math.sin(walk*2.5)*0.16;
    rig.tailBase.rotation.y = Math.sin(walk*1.8)*0.22;
  }
  if(rig.tailMid?.rotation){
    rig.tailMid.rotation.x = 0.12 + Math.sin(walk*2.6+0.6)*0.14;
    rig.tailMid.rotation.y = Math.sin(walk*1.9+0.5)*0.18;
  }
  if(rig.tailTip?.rotation){
    rig.tailTip.rotation.x = 0.1 + Math.sin(walk*2.8+1.1)*0.15;
    rig.tailTip.rotation.y = Math.sin(walk*2.0+1.0)*0.22;
  }

  const phases = [0,Math.PI,Math.PI,0];
  (rig.legs || []).forEach((leg,i)=>{
    leg.rotation.x = Math.sin(walk + phases[i]) * (0.65*speedFactor + 0.1) - attackAmount*0.4 + dying*0.7;
  });
}

const PLAYER_TRAVEL_STATES = {
  normal:"normal",
  launching:"launching",
  airborne:"airborne",
  teleporting:"teleporting",
  landingRecovery:"landingRecovery"
};

function setPlayerTravelState(state){
  player.travel.state = state;
  player.travelState = state;
  player.travel.stateTime = 0;
}
function isWithinMapBounds(x,z,pad=1.35){
  return x > -dynamicHalfMap + pad && x < dynamicHalfMap - pad && z > -dynamicHalfMap + pad && z < dynamicHalfMap - pad;
}
function isTravelCellOpen(cx,cz,ignoreStructure=null){
  if(cx < -dynamicGridHalfCells || cx > dynamicGridHalfCells || cz < -dynamicGridHalfCells || cz > dynamicGridHalfCells) return false;
  const w = cellToWorld(cx,cz);
  return !circleBlocked(w.x, w.z, player.radius * 0.95, ignoreStructure, 1);
}
function getTeleporterExitPoint(target, preferDir){
  const c = target.cell || worldToCell(target.pos.x, target.pos.z);
  const dirs = [preferDir, (preferDir+1)%4, (preferDir+3)%4, (preferDir+2)%4];
  let best = null;
  for(const dir of dirs){
    const side = [[0,1],[1,0],[0,-1],[-1,0]][dir];
    const cx = c.cx + side[0];
    const cz = c.cz + side[1];
    if(!isTravelCellOpen(cx, cz, target)) continue;
    const w = cellToWorld(cx,cz);
    const score = Math.hypot(w.x - player.pos.x, w.z - player.pos.z);
    if(!best || score < best.score){
      best = { x:w.x, z:w.z, dir, score };
    }
  }
  return best;
}
function tryTriggerLauncher(launcher){
  if(player.dead || levelTransitionActive || player.travel.state !== PLAYER_TRAVEL_STATES.normal || player.travel.launcherCooldown > 0) return;
  if(dist2(player.pos, launcher.pos) > 1.35) return;
  const dir = new THREE.Vector3(Math.sin(launcher.rotationY || 0), 0, Math.cos(launcher.rotationY || 0)).normalize();
  const start = player.pos.clone();
  const maxRange = GRID_SIZE * 11;
  const step = GRID_SIZE * 0.5;
  let end = start.clone();
  let clippedToEdge = false;
  for(let d=step; d<=maxRange; d += step){
    const test = start.clone().addScaledVector(dir, d);
    if(!isWithinMapBounds(test.x, test.z, 2.6)){
      clippedToEdge = true;
      break;
    }
    if(circleBlocked(test.x, test.z, player.radius*0.9, launcher, 1)){
      break;
    }
    end.copy(test);
  }
  if(dist2(start, end) < GRID_SIZE*2) return;
  player.travel.launchData = {
    source:launcher,
    start,
    end,
    dir,
    t:0,
    duration:1.45,
    arcHeight:Math.max(9.5, Math.hypot(end.x-start.x, end.z-start.z) * 0.45),
    clippedToEdge,
    dropMode:false,
    dropStartY:start.y + 6.3,
    dropVel:0
  };
  setPlayerTravelState(PLAYER_TRAVEL_STATES.launching);
  player.travel.inputLock = 0.35;
  player.travel.launcherCooldown = 1.55;
  launcher.travelCooldown = 1.55;
  addBurst(start.x, start.y+0.6, start.z, 0x88dcff, 18, 4.6, 0.55, 0.09);
}
function tryTriggerTeleporter(entry){
  if(player.dead || levelTransitionActive || player.travel.state !== PLAYER_TRAVEL_STATES.normal || player.travel.teleporterCooldown > 0) return;
  if((entry.travelCooldown||0) > 0) return;
  if(dist2(player.pos, entry.pos) > 1.45) return;
  const others = structures.filter(s => !s.dead && s.type==="teleporter" && s!==entry);
  if(!others.length) return;
  let target = others[0], bestD = dist2(entry.pos, others[0].pos);
  for(let i=1;i<others.length;i++){
    const d = dist2(entry.pos, others[i].pos);
    if(d < bestD){ bestD = d; target = others[i]; }
  }
  const facingToEntry = Math.atan2(entry.pos.x - target.pos.x, entry.pos.z - target.pos.z);
  const preferDir = Math.round((facingToEntry / (Math.PI/2))) & 3;
  const exit = getTeleporterExitPoint(target, preferDir);
  if(!exit) return;

  setPlayerTravelState(PLAYER_TRAVEL_STATES.teleporting);
  player.travel.inputLock = 0.26;
  player.travel.teleporterCooldown = 1.05;
  entry.travelCooldown = 1.05;
  target.travelCooldown = 1.05;
  addBurst(entry.pos.x, entry.pos.y+1.25, entry.pos.z, 0x8ca4ff, 16, 3.2, 0.42, 0.08);
  addBurst(entry.pos.x, entry.pos.y+0.4, entry.pos.z, 0x67efff, 12, 2.1, 0.35, 0.07);

  player.pos.x = exit.x;
  player.pos.z = exit.z;
  player.pos.y = groundHeight(exit.x, exit.z);
  const side = [[0,1],[1,0],[0,-1],[-1,0]][exit.dir];
  player.heading = Math.atan2(side[0], side[1]);
  addBurst(exit.x, player.pos.y+1.1, exit.z, 0xc8f3ff, 22, 3.8, 0.5, 0.09);

function getSeparationVector(entity, list, desiredMinDist=1.8){
  const out = new THREE.Vector3();
  for (const other of list) {
    if (other === entity || other.dead) continue;
    const dx = entity.pos.x - other.pos.x;
    const dz = entity.pos.z - other.pos.z;
    const d = Math.hypot(dx, dz);
    if (d > 0.001 && d < desiredMinDist) {
      const push = (desiredMinDist - d) / desiredMinDist;
      out.x += (dx / d) * push;
      out.z += (dz / d) * push;
    }
  }
  return out;
}
function collisionPushOut(x,z,radius, collideWithStructures=true, ignoreStructure=null, opts=null){
  const ignoreWallsForBurrow = !!opts?.ignoreWallsForBurrow;
  let px = x, pz = z;
  let hitCount = 0;
  for(let iter=0; iter<4; iter++){
    let adjusted = false;
    for(const o of obstacles){
      const dx = px - o.x;
      const dz = pz - o.z;
      const d = Math.hypot(dx, dz) || 0.0001;
      const minD = radius + o.r + 0.03;
      if(d < minD){
        const push = (minD - d);
        px += (dx / d) * push;
        pz += (dz / d) * push;
        hitCount++;
        adjusted = true;
      }
    }
    if(collideWithStructures){
      for(const s of structures){
        if(s.dead || s===ignoreStructure || !structureBlocksMovement(s)) continue;
        if(ignoreWallsForBurrow && isWallStructure(s)) continue;
        const dx = px - s.pos.x;
        const dz = pz - s.pos.z;
        const d = Math.hypot(dx, dz) || 0.0001;
        const minD = radius + s.radius + 0.04;
        if(d < minD){
          const push = (minD - d);
          px += (dx / d) * push;
          pz += (dz / d) * push;
          hitCount++;
          adjusted = true;
        }
      }
    }
    px = clamp(px, -dynamicHalfMap+2.25, dynamicHalfMap-2.25);
    pz = clamp(pz, -dynamicHalfMap+2.25, dynamicHalfMap-2.25);
    if(!adjusted) break;
  }
  return { x:px, z:pz, hitCount };
}
function steerMove(entity, desired, dt, collideWithStructures=true, ignoreStructure=null, neighborList=null, opts=null){
  const ignoreWallsForBurrow = !!opts?.ignoreWallsForBurrow;
  const start = entity.pos;
  let best = null;
  let bestScore = Infinity;
  const baseHeading = Math.atan2(desired.x, desired.z);
  const speed = entity.speed;
  const radius = entity.radius;
  const offsets = [0, 0.22, -0.22, 0.45, -0.45, 0.75, -0.75, 1.05, -1.05, 1.35, -1.35, Math.PI*0.5, -Math.PI*0.5, Math.PI];
  const fullStep = speed * dt;

  function blockedAt(x, z){
    if(x < -dynamicHalfMap+2 || x > dynamicHalfMap-2 || z < -dynamicHalfMap+2 || z > dynamicHalfMap-2) return true;
    for(const o of obstacles){
      if(Math.hypot(x-o.x, z-o.z) < radius + o.r) return true;
    }
    if(collideWithStructures){
      for(const s of structures){
        if(s.dead || s===ignoreStructure) continue;
        if(ignoreWallsForBurrow && isWallStructure(s)) continue;
        if(Math.hypot(x-s.pos.x, z-s.pos.z) < radius + s.radius) return true;
      }
    }
    return false;
  }
  function penetrationPenalty(x, z){
    let p = 0;
    for(const o of obstacles){
      const d = Math.hypot(x-o.x, z-o.z);
      const minD = radius + o.r;
      if(d < minD) p += (minD - d) * 8;
      if(d < minD + 0.6) p += (minD + 0.6 - d) * 2.2;
    }
    if(collideWithStructures){
      for(const s of structures){
        if(s.dead || s===ignoreStructure || !structureBlocksMovement(s)) continue;
        if(ignoreWallsForBurrow && isWallStructure(s)) continue;
        const d = Math.hypot(x-s.pos.x, z-s.pos.z);
        const minD = radius + s.radius;
        if(d < minD) p += (minD - d) * 10;
        if(d < minD + 0.7) p += (minD + 0.7 - d) * 2.7;
      }
    }
    return p;
  }

  function neighborPenaltyAt(x, z){
    if(!neighborList) return 0;
    let p = 0;
    for (const other of neighborList) {
      if (other === entity || other.dead) continue;
      const d = Math.hypot(x-other.pos.x, z-other.pos.z);
      const softR = radius + other.radius * 0.9;
      if (d < softR) p += (softR - d) * 2.2;
      if (d < 2.4) p += (2.4 - d) * 1.3;
    }
    return p;
  }

  for(const off of offsets){
    const heading = baseHeading + off;
    const dx = Math.sin(heading);
    const dz = Math.cos(heading);
    const nx = start.x + dx * fullStep;
    const nz = start.z + dz * fullStep;
    if(nx < -dynamicHalfMap+2 || nx > dynamicHalfMap-2 || nz < -dynamicHalfMap+2 || nz > dynamicHalfMap-2) continue;
    let score = Math.abs(off)*0.18;
    score += neighborPenaltyAt(nx, nz);
    score += penetrationPenalty(nx, nz);
    if(blockedAt(nx, nz)) score += 2.1;
    if(score < bestScore){
      bestScore = score;
      best = { x:nx, z:nz, heading };
    }
  }
  if(best) return best;

  // Fallback A: reduced-distance push toward desired heading.
  const fx = Math.sin(baseHeading), fz = Math.cos(baseHeading);
  const fallbackScales = [0.66, 0.42, 0.26];
  for(const scale of fallbackScales){
    const nx = start.x + fx * fullStep * scale;
    const nz = start.z + fz * fullStep * scale;
    if(nx >= -dynamicHalfMap+2 && nx <= dynamicHalfMap-2 && nz >= -dynamicHalfMap+2 && nz <= dynamicHalfMap-2){
      return { x:nx, z:nz, heading:baseHeading };
    }
  }

  // Fallback B: tiny side shuffles to break body jams.
  const sideOffsets = [Math.PI * 0.5, -Math.PI * 0.5, 0.35, -0.35];
  for(const off of sideOffsets){
    const h = baseHeading + off;
    const nx = start.x + Math.sin(h) * fullStep * 0.24;
    const nz = start.z + Math.cos(h) * fullStep * 0.24;
    if(nx >= -dynamicHalfMap+2 && nx <= dynamicHalfMap-2 && nz >= -dynamicHalfMap+2 && nz <= dynamicHalfMap-2){
      return { x:nx, z:nz, heading:h };
    }
  }

  return best;
}
function directSteerToward(entity, targetPos, dt, collideWithStructures=true, ignoreStructure=null, neighborList=null, opts=null){
  const dx = targetPos.x - entity.pos.x;
  const dz = targetPos.z - entity.pos.z;
  const len = Math.hypot(dx,dz) || 1;
  const desired = { x:dx/len, z:dz/len };
  if (neighborList) {
    const sep = getSeparationVector(entity, neighborList, 1.75);
    desired.x += sep.x * 0.7;
    desired.z += sep.z * 0.7;
    const l2 = Math.hypot(desired.x, desired.z) || 1;
    desired.x /= l2;
    desired.z /= l2;
  }
  const raw = steerMove(entity, desired, dt, collideWithStructures, ignoreStructure, neighborList, opts);
  if(!raw) return raw;
  const pushed = collisionPushOut(raw.x, raw.z, entity.radius || 0.8, collideWithStructures, ignoreStructure, opts);
  raw.x = pushed.x;
  raw.z = pushed.z;
  raw.bumped = pushed.hitCount > 0;
  return raw;
}
function smoothAimYaw(pivot, holder, key, desiredYaw, dt, speed=8.5){
  if(!pivot) return;
  if(holder[key] == null) holder[key] = pivot.rotation.y;
  holder[key] += clamp(angleDiff(holder[key], desiredYaw), -speed * dt, speed * dt);
  pivot.rotation.y = holder[key];
}
function updateAgentStuck(entity, dt, hasTarget, onStuck){
  // AI tuning helper: general stuck detector with brief cooldown.
  if(!entity._stuck){
    entity._stuck = { x:entity.pos.x, z:entity.pos.z, still:0, cooldown:0, phase:0, antiOsc:0 };
  }
  const s = entity._stuck;
  const moved = Math.hypot(entity.pos.x - s.x, entity.pos.z - s.z);
  s.cooldown = Math.max(0, s.cooldown - dt);
  if(hasTarget && moved < 0.06) s.still += dt;
  else s.still = Math.max(0, s.still - dt * 0.85);
  s.x = entity.pos.x; s.z = entity.pos.z;
  if(hasTarget && s.still > 0.35 && s.cooldown <= 0){
    s.still = 0;
    s.cooldown = 0.48;
    s.phase = (s.phase + 1) % 5;
    s.antiOsc = 0.9;
    onStuck?.(s.phase);
    return true;
  }
  s.antiOsc = Math.max(0, s.antiOsc - dt);
  return false;
}
function meleeStopDistance(attacker, target, extra=0.16){
  return (attacker.radius || 0.7) + (target?.radius || 0.7) + (attacker.attackRange || 1.2) - 0.48 + extra;
}
function pickAttackSlot(attacker, targetPos, targetRadius=1.0, prefDir=1){
  const desired = meleeStopDistance(attacker, { radius:targetRadius }, 0.22);
  const toA = Math.atan2(attacker.pos.x - targetPos.x, attacker.pos.z - targetPos.z);
  const offsets = [0, 0.44*prefDir, -0.44*prefDir, 0.88*prefDir, -0.88*prefDir, 1.2, -1.2, Math.PI];
  for(const off of offsets){
    const a = toA + off;
    const px = targetPos.x + Math.sin(a) * desired;
    const pz = targetPos.z + Math.cos(a) * desired;
    if(!circleBlocked(px, pz, attacker.radius || 0.8, null, 0.86)){
      return new THREE.Vector3(px, groundHeight(px,pz), pz);
    }
  }
  return new THREE.Vector3(targetPos.x, groundHeight(targetPos.x,targetPos.z), targetPos.z);
}
function setRepathPoint(entity, centerPos, radius=4.5){
  let repath = null;
  for(let i=0;i<20;i++){
    const a = Math.random() * Math.PI * 2;
    const r = rand(radius*0.25, radius);
    const x = clamp(centerPos.x + Math.sin(a)*r, -dynamicHalfMap+3.2, dynamicHalfMap-3.2);
    const z = clamp(centerPos.z + Math.cos(a)*r, -dynamicHalfMap+3.2, dynamicHalfMap-3.2);
    if(!circleBlocked(x, z, entity.radius || 0.85, entity.target && entity.target.type ? entity.target : null)){
      repath = new THREE.Vector3(x, 0, z);
      break;
    }
  }
  if(!repath){
    const x = clamp(entity.pos.x, -dynamicHalfMap+3.2, dynamicHalfMap-3.2);
    const z = clamp(entity.pos.z, -dynamicHalfMap+3.2, dynamicHalfMap-3.2);
    if(!circleBlocked(x, z, entity.radius || 0.85)) repath = new THREE.Vector3(x, 0, z);
  }
  entity.repathTarget = repath;
  if(entity.repathTarget){
    entity.repathTarget.y = groundHeight(entity.repathTarget.x, entity.repathTarget.z);
    entity.repathTimer = rand(0.45, 0.95);
  } else {
    entity.repathTimer = 0;
  }
}
function isLivingTarget(target){
  return !!target && !!target.isLiving && !target.dead && !target.dying;
}
function nearestAttackableStructure(origin, maxRange=999, filterFn=null){
  let best = null, bestD = maxRange;
  for(const s of structures){
    if(s.dead) continue;
    if(filterFn && !filterFn(s)) continue;
    const d = dist2(origin.pos || origin, s.pos);
    if(d < bestD){ bestD = d; best = s; }
  }
  return best;
}
function applyDamageToLiving(target, damage, hitPos=null){
  if(!isLivingTarget(target)) return;
  if(target.kind && target.untargetable) return;
  const src = hitPos || target.pos;
  addBloodHit(src.x, src.y + 0.8, src.z, clamp(damage/28, 0.5, 1.45));
  if(target === player){
    diePlayer();
    return;
  }
  target.hp -= damage;
  if(target.healthBar) setHealthBar(target.healthBar, target.hp / target.maxHp);
  if(target === cat){
    if(target.hp <= 0) killCat();
  } else if(target.kind){
    if(target.hp <= 0) killEnemy(target);
  } else if(target.state === "wild" || target.state === "servant"){
    if(target.hp <= 0) beginDeath(target, "mouse");
  }
}

  if(type==="mechaHangar"){
    const hangar = new THREE.Mesh(new THREE.BoxGeometry(1.9,1.2,1.5), new THREE.MeshStandardMaterial({ color:0xb8c3d1 }));
    hangar.position.y = 1.45;
    g.add(hangar);
  }

  const hpBar = createHealthBar(2.1,0x77ff77);
  hpBar.position.y = 5;
  g.add(hpBar);
  g.userData.healthBar = hpBar;

  const glow = new THREE.Mesh(
    new THREE.CylinderGeometry(1.25,1.25,0.06,20),
    new THREE.MeshBasicMaterial({ color:0x86ffb2, transparent:true, opacity:0.0 })
  );
  glow.position.y = 0.05;
  glow.visible = false;
  g.add(glow);
  g.userData.beaconGlow = glow;

  g.traverse(c=>{ if(c.isMesh){ c.castShadow = true; c.receiveShadow = true; } });
  return g;
}
function createStructure(type,x,z,rotationY=0, dataOverride=null){
  const data = dataOverride || Object.values(CATEGORY_BUILDS).flat().find(v=>v.type===type);
  const mesh = createStructureMesh(type);
  mesh.position.set(x, groundHeight(x,z), z);
  mesh.rotation.y = rotationY;
  scene.add(mesh);
  const cell = worldToCell(x,z);

  if(type==="towerOfCheese" && structures.some(st=>!st.dead && st.type==="towerOfCheese")){ showCenter("Only one Tower of Cheese may stand", 1.2); return null; }
  const s = {
    type,
    mesh,
    pos:mesh.position,
    radius:data.radius,
    hp:data.hp,
    maxHp:data.hp,
    dead:false,
    fireCd:0,
    produceCd:0,
    robotCd:0,
    healCd:0,
    trapCd:0,
    assignedServant:null,
    rotationY,
    cell,
    gasCarryCd:0,
    breedCd:25,
    mechaPending:type==="mechaHangar",
    isBeaconBuffed:false,
    target:null,
    travelCooldown:0,
    shield:0,
    maxShield:BARRIER_SHIELD_MAX,
    shieldRegenRate:0,
    shieldFx:null,
    powerRequired:getStructurePowerRequirement(type),
    powerProvided:getStructurePowerProvided(type),
    currentPowerNearby:0,
    isPowered:true,
    baseMaxHp:data.hp,
    baseRange:0,
    baseFireCd:0,
    tempBuffs:{ armorMult:1, damageMult:1, expiresAt:0 }
  };
  if(s.powerRequired > 0){
    const powerWarningSprite = createPowerWarningSprite();
    powerWarningSprite.position.set(0, 4.05, 0);
    mesh.add(powerWarningSprite);
    s.powerWarningSprite = powerWarningSprite;
  }

  structures.push(s);
  occupiedCells.set(cellKey(cell.cx, cell.cz), s);
  if(type==="gasMine"){
    const vent = gasVents.find(v => v.cx===cell.cx && v.cz===cell.cz);
    if(vent){ vent.mine = s; s.vent = vent; }
  }
  setHealthBar(mesh.userData.healthBar, 1);
  updateWallDamageVisual(s);

  const color = structureColor(type);
  addBurst(x, mesh.position.y+1.0, z, color, 26, 5.8, 0.8, 0.09);
  for(let i=0;i<12;i++){
    addBurst(x + rand(-1.2,1.2), mesh.position.y+rand(0.3,2.1), z + rand(-0.6,0.6), 0xfff4a4, 1, 1.2, 0.4, 0.06);
  }
  return s;
}
function damageStructure(s,dmg){
  if(!s || s.dead) return;
  let damageLeft = Math.max(0, dmg);
  if(s.tempBuffs && time < (s.tempBuffs.expiresAt || 0)){ damageLeft /= (s.tempBuffs.armorMult || 1); }
  if((s.shield || 0) > 0 && damageLeft > 0){
    const shieldHit = Math.min(s.shield, damageLeft);
    s.shield -= shieldHit;
    damageLeft -= shieldHit;
    addBurst(s.pos.x, s.pos.y + 1.15, s.pos.z, BARRIER_SHIELD_IMPACT_COLOR, 6, 3.2, 0.3, 0.07);
  }
  if(damageLeft <= 0){
    setHealthBar(s.mesh.userData.healthBar, Math.max(0, s.hp/s.maxHp));
    updateWallDamageVisual(s);
    return;
  }
  s.hp -= damageLeft;
  setHealthBar(s.mesh.userData.healthBar, Math.max(0, s.hp/s.maxHp));
  updateWallDamageVisual(s);
  addBurst(s.pos.x, s.pos.y+1.1, s.pos.z, 0xffca77, 5, 3, 0.28, 0.07);
  if(s.hp <= 0){
    s.hp = 0;
    s.dead = true;
    addBurst(s.pos.x, s.pos.y+1.2, s.pos.z, 0xff6655, 42, 8.2, 1.15, 0.14);
    addBurst(s.pos.x, s.pos.y+1.2, s.pos.z, 0xffcc66, 28, 6.8, 0.95, 0.11);
    if(s.beam){ scene.remove(s.beam); s.beam = null; }
    if(s.shieldFx){
      s.shieldFx.parent?.remove(s.shieldFx);
      s.shieldFx = null;
    }
    if(s.cell) occupiedCells.delete(cellKey(s.cell.cx, s.cell.cz));
    if(s.type==="gasMine"){
      clearGasMineWorkerAssignment(s);
      if(s.vent) s.vent.mine = null;
    }
    scene.remove(s.mesh);
    s.mesh.visible = false;
  }
}
function getBuildPlace(){
  const forward = new THREE.Vector3(Math.sin(player.heading),0,Math.cos(player.heading));
  const p = player.pos.clone().addScaledVector(forward, 4.2);
  const cell = worldToCell(p.x,p.z);
  const w = cellToWorld(cell.cx, cell.cz);
  return new THREE.Vector3(w.x, groundHeight(w.x,w.z), w.z);
}
function getBuildValidation(selected, x, z){
  const c = worldToCell(x,z);
  const key = cellKey(c.cx,c.cz);
  if(occupiedCells.has(key)) return { ok:false, reason:"Cell occupied", cell:c };
  if(selected.prereq && !hasStructureType(selected.prereq)) return { ok:false, reason:`Need ${prettyTypeName(selected.prereq)}`, cell:c };
  if(selected.requiresVent){
    const vent = gasVents.find(v => v.cx===c.cx && v.cz===c.cz);
    if(!vent) return { ok:false, reason:"Gas mine must be on vent", cell:c };
    if(vent.mine && !vent.mine.dead) return { ok:false, reason:"Vent already mined", cell:c };
  }
  if(circleBlocked(x,z,selected.radius, null, 0.75)) return { ok:false, reason:"Cannot build there", cell:c };
  return { ok:true, reason:"", cell:c };
}
function beaconBuffAt(x,z){
  let buff = { damage:1, speed:1, active:false };
  for(const s of structures){
    if(s.dead || s.type!=="beacon") continue;
    const d = Math.hypot(x-s.pos.x, z-s.pos.z);
    if(d < 13){
      buff.damage += 0.25;
      buff.speed += 0.2;
      buff.active = true;
    }
  }
  return buff;
}
function updateBeaconGlow(){
  for(const s of structures){
    if(s.dead || s.type === "beacon") continue;
    const buff = beaconBuffAt(s.pos.x, s.pos.z);
    s.isBeaconBuffed = buff.active;
    const glow = s.mesh.userData.beaconGlow;
    if(!glow) continue;
    if(buff.active){
      glow.visible = true;
      glow.material.opacity = 0.18 + Math.sin(time*4)*0.08;
      glow.scale.set(1.4 + Math.sin(time*3)*0.05, 1, 1.4 + Math.sin(time*3)*0.05);
      glow.material.color.set(0x86ffb2);
    } else {
      glow.visible = false;
    }
  }
}

function spawnProjectile(opts){
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(opts.size ?? 0.18, 10, 10),
    new THREE.MeshStandardMaterial({ color:opts.color ?? 0xffdd66, emissive:opts.color ?? 0xffdd66, emissiveIntensity:0.45 })
  );
  mesh.position.copy(opts.pos);
  mesh.castShadow = true;
  scene.add(mesh);

  projectiles.push({
    mesh,
    pos:mesh.position,
    vel:opts.vel.clone(),
    life:opts.life ?? 4,
    damage:opts.damage ?? 8,
    splash:opts.splash ?? 0,
    from:opts.from ?? "ally",
    kind:opts.kind ?? "pellet",
    returnHits:opts.returnHits || false
  });
}
function explodeProjectile(p){
  const burstColor = p.kind==="acid" ? 0x86ff77 : (p.from==="enemy"?0xff5555:0xffdd66);
  if(p.impactPos){
    p.pos.set(p.impactPos.x, p.impactPos.y, p.impactPos.z);
  }
  addBurst(p.pos.x,p.pos.y,p.pos.z, burstColor, p.kind==="cannon"||p.kind==="mortar"?18:8, 4.5, 0.6, 0.09);

  if(p.from === "ally"){
  for(const e of enemies){
    if(!isEnemyTargetable(e)) continue;
      const d = dist2({x:p.pos.x,z:p.pos.z}, e.pos);
      if(d < 1 + p.splash){
        applyDamageToLiving(e, p.damage * (d < 0.5 ? 1 : Math.max(0.35, 1 - d/(p.splash+1))), p.pos);
      }
    }
    if(cat && !cat.dead && !cat.dying){
      const d = dist2({x:p.pos.x,z:p.pos.z}, cat.pos);
      if(d < 1.7 + p.splash){
        applyDamageToLiving(cat, p.damage * (d < 0.8 ? 1 : Math.max(0.35, 1 - d/(p.splash+1.7))), p.pos);
      }
    }
  }else{
    if(!player.dead && dist2({x:p.pos.x,z:p.pos.z}, player.pos) < 1.2 + p.splash) applyDamageToLiving(player, 999, p.pos);
    for(const m of servantMice){
      if(m.dead || m.dying) continue;
      if(dist2({x:p.pos.x,z:p.pos.z}, m.pos) < 1.0 + p.splash){
        applyDamageToLiving(m, p.damage, p.pos);
      }
    }
    for(const s of structures){
      if(s.dead) continue;
      const d = dist2({x:p.pos.x,z:p.pos.z}, s.pos);
      if(d < s.radius + p.splash) damageStructure(s, p.damage * Math.max(0.4, 1 - d/(s.radius+p.splash+0.01)));
    }
  }
}
function updateProjectiles(dt){
  if(gamePaused) return;
  for(let i=projectiles.length-1;i>=0;i--){
    const p = projectiles[i];
    p.life -= dt;
    p.vel.y -= 18*dt;
    p.pos.addScaledVector(p.vel, dt);

    const gy = groundHeight(p.pos.x,p.pos.z);
    if(p.pos.y <= gy+0.12){
      p.pos.y = gy+0.12;
      explodeProjectile(p);
      p.mesh.parent?.remove(p.mesh);
      projectiles.splice(i,1);
      continue;
    }

    if(p.from==="ally"){
      let hit = false;
      for(const e of enemies){
        if(!isEnemyTargetable(e)) continue;
        if(dist2(p.pos, e.pos) < e.radius + 0.35 && Math.abs(p.pos.y - (e.pos.y+0.8)) < 1.5){
          hit = true; break;
        }
      }
      if(cat && !cat.dead && !cat.dying && dist2(p.pos, cat.pos) < cat.radius + 0.5 && Math.abs(p.pos.y - (cat.pos.y+2)) < 2.6) hit = true;
      if(hit){
        explodeProjectile(p);
        p.mesh.parent?.remove(p.mesh);
        projectiles.splice(i,1);
        continue;
      }
    }else{
      if(!player.dead && dist2(p.pos, player.pos) < 0.9 && Math.abs(p.pos.y - (player.pos.y+0.7)) < 1.4){
        explodeProjectile(p);
        p.mesh.parent?.remove(p.mesh);
        projectiles.splice(i,1);
        continue;
      }
    }

    if(p.life <= 0){
      explodeProjectile(p);
      p.mesh.parent?.remove(p.mesh);
      projectiles.splice(i,1);
    }
  }
}

function beginDeath(entity, type="mouse"){
  if (entity.dying || entity.dead) return;
  if(entity.assignedFactory && entity.assignedFactory.assignedServant === entity){
    entity.assignedFactory.assignedServant = null;
  }
  if(entity.assignedGasMine) clearServantGasMineAssignment(entity);
  entity.dying = true;
  entity.deathT = 0;
  entity.deathType = type;
  addBurst(entity.pos.x, entity.pos.y+0.8, entity.pos.z, type==="cat"?0xff7d44:0xff7777, 16, 4.5, 0.6, 0.08);
}
function finalizeDeath(entity) {
  if(entity.spitTelegraph) clearSpitLandingTelegraph(entity);
  entity.dead = true;
  entity.group.parent?.remove(entity.group);
}
function killEnemy(e){
  if(e.dead || e.dying) return;
  if(e.kind==="bombBeetle" && !e.exploded){
    e.exploded = true;
    const r = 3.3;
    addBurst(e.pos.x, e.pos.y + 0.45, e.pos.z, 0xff6e3d, 18, 4.2, 0.58, 0.08);
    for(const s of structures){ if(!s.dead && dist2(s.pos, e.pos) < r + s.radius) damageStructure(s, e.damage * 0.65); }
    for(const m of servantMice){ if(!m.dead && !m.dying && dist2(m.pos, e.pos) < r) applyDamageToLiving(m, e.damage * 0.42, e.pos); }
  }
  beginDeath(e, e.kind === "weasel" ? "weasel" : "mouse");
  if(Math.random() < 0.7) spawnCheeseAt(e.pos.x+rand(-0.8,0.8), e.pos.z+rand(-0.8,0.8), 3);
}
function killCat(){
  if(!cat || cat.dead || cat.dying) return;
  beginDeath(cat, "cat");
  ui.bossWrap.style.display = "none";
  ui.bossLabel.style.display = "none";
  setTimeout(() => {
    showCenter(`LEVEL ${currentLevel} CLEARED`, 1.6);
  }, 350);
  setTimeout(() => {
    advanceToNextLevel();
  }, 1100);
}
function clearEnemiesForLevelTransition(){
  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    if(e.spitTelegraph) clearSpitLandingTelegraph(e);
    e.group.parent?.remove(e.group);
    enemies.splice(i,1);
  }
  for(let i=projectiles.length-1;i>=0;i--){
    const p = projectiles[i];
    if(p.from === "enemy"){
      p.mesh?.parent?.remove(p.mesh);
      projectiles.splice(i,1);
    }
  }
}
function advanceToNextLevel(){
  if(levelTransitionActive) return;
  levelTransitionActive = true;
  currentLevel += 1;
  clearEnemiesForLevelTransition();
  expandMapForLevel(currentLevel);
  scene.fog.near = 105 - Math.min(24, (currentLevel-1)*2.2);
  scene.fog.far = 300 - Math.min(54, (currentLevel-1)*4.5);
  syncLevelEnemyUnlocks(true);
  showLevelBanner(currentLevel);
  setTimeout(()=>{
    cat = null;
    catSpawnTriggered = false;
    spawnCat();
    levelTransitionActive = false;
  }, 2100);
}

const SHOW_GAS_MINE_DEBUG_TEXT = true;
function clearServantGasMineAssignment(worker){
  if(!worker) return;
  if(worker.assignedGasMine && worker.assignedGasMine.assignedServant === worker){
    worker.assignedGasMine.assignedServant = null;
  }
  worker.assignedGasMine = null;
  worker.gasJobState = null;
  worker.carryingGas = false;
}
function clearGasMineWorkerAssignment(mine){
  if(!mine) return;
  const worker = mine.assignedServant;
  if(worker && worker.assignedGasMine === mine){
    worker.assignedGasMine = null;
    worker.gasJobState = null;
    worker.carryingGas = false;
  }
  mine.assignedServant = null;
}
function isValidGasWorkerForMine(worker, mine){
  if(!worker || !mine) return false;
  if(worker.dead || worker.dying || worker.state !== "servant") return false;
  if(worker.assignedGasMine && worker.assignedGasMine !== mine) return false;
  return true;
}
function validateGasMineAssignments(){
  for(const mine of structures){
    if(mine.dead || mine.type!=="gasMine") continue;
    if(mine.assignedServant && !isValidGasWorkerForMine(mine.assignedServant, mine)){
      clearGasMineWorkerAssignment(mine);
    }
  }
  for(const m of servantMice){
    if(m.dead || m.dying || m.state !== "servant"){
      if(m.assignedGasMine) clearServantGasMineAssignment(m);
      continue;
    }
    if(!m.assignedGasMine) continue;
    const mine = m.assignedGasMine;
    if(mine.dead || mine.type!=="gasMine"){
      clearServantGasMineAssignment(m);
      continue;
    }
    if(mine.assignedServant !== m){
      if(!mine.assignedServant) mine.assignedServant = m;
      else clearServantGasMineAssignment(m);
    }
  }
}
function findBestServantForGasMine(mine){
  const idleCandidates = [];
  const econCandidates = [];
  for(const m of servantMice){
    if(!isValidGasWorkerForMine(m, mine)) continue;
    if(m.assignedGasMine && m.assignedGasMine !== mine) continue;
    if(m.assignedMechaHangar && m.assignedMechaHangar.mechaPending && !m.assignedMechaHangar.dead) continue;
    if(!m.assignedFactory && !m.repairTarget) idleCandidates.push(m);
    else econCandidates.push(m);
  }
  const byNearest = (a,b)=>dist2(a.pos, mine.pos) - dist2(b.pos, mine.pos);
  idleCandidates.sort(byNearest);
  econCandidates.sort(byNearest);
  return idleCandidates[0] || econCandidates[0] || null;
}
function assignGasMineWorkers(){
  const minesNeedingWorkers = structures.filter(s => !s.dead && s.type==="gasMine");
  for(const mine of minesNeedingWorkers){
    if(mine.assignedServant && isValidGasWorkerForMine(mine.assignedServant, mine)) continue;
    if(mine.assignedServant) clearGasMineWorkerAssignment(mine);
    const worker = findBestServantForGasMine(mine);
    if(!worker) continue;
    if(worker.assignedFactory && worker.assignedFactory.assignedServant===worker){
      worker.assignedFactory.assignedServant = null;
    }
    worker.assignedFactory = null;
    worker.assignedMechaHangar = null;
    worker.assignedGasMine = mine;
    worker.gasJobState = worker.gasJobState || "toMine";
    mine.assignedServant = worker;
  }
}
function ensureGasMineDebugLabel(mine){
  if(!SHOW_GAS_MINE_DEBUG_TEXT || !mine?.mesh) return null;
  if(mine.mesh.userData.gasDebugLabel) return mine.mesh.userData.gasDebugLabel;
  const canvas = document.createElement("canvas");
  canvas.width = 256;
  canvas.height = 96;
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false, depthWrite:false, opacity:0.95 }));
  sprite.position.set(0, 3.55, 0);
  sprite.scale.set(2.4, 0.8, 1);
  sprite.renderOrder = 226;
  mine.mesh.add(sprite);
  mine.mesh.userData.gasDebugLabel = sprite;
  return sprite;
}
function updateGasMineDebugLabel(mine){
  if(!SHOW_GAS_MINE_DEBUG_TEXT || mine.dead || mine.type!=="gasMine") return;
  const label = ensureGasMineDebugLabel(mine);
  if(!label) return;
  const worker = mine.assignedServant;
  const workerName = worker ? `Mouse ${String(worker.id || worker.uid || worker._id || servantMice.indexOf(worker)+1)}` : "";
  const status = worker ? "Gas: staffed" : "Gas: waiting";
  const detail = worker ? `Gas: ${workerName}` : "";
  const canvas = label.material.map?.image;
  const ctx = canvas?.getContext?.("2d");
  if(!ctx || !canvas) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.font = "bold 30px Arial";
  ctx.textAlign = "center";
  ctx.lineWidth = 9;
  ctx.strokeStyle = "rgba(0,0,0,0.78)";
  ctx.strokeText(status, canvas.width/2, 38);
  ctx.fillStyle = worker ? "#a6ffe8" : "#ffe39c";
  ctx.fillText(status, canvas.width/2, 38);
  if(detail){
    ctx.font = "bold 22px Arial";
    ctx.lineWidth = 7;
    ctx.strokeText(detail, canvas.width/2, 72);
    ctx.fillStyle = "#d5fff2";
    ctx.fillText(detail, canvas.width/2, 72);
  }
  label.material.map.needsUpdate = true;
  label.quaternion.copy(camera.quaternion);
}
function updateMouseEntity(m,dt){
  if(gamePaused) return;
  if (m.dead) return;
  if (m.dying) {
    m.deathT += dt;
    m.group.rotation.z = clamp(m.deathT * 4, 0, Math.PI/2.2);
    m.group.position.y = groundHeight(m.pos.x,m.pos.z) - Math.min(0.4, m.deathT * 0.6);
    animateMouseRig(m.group, 0, m.anim, 0, clamp(m.deathT * 2, 0, 1));
    if (m.deathT > 0.45) finalizeDeath(m);
    return;
  }

  m.anim += dt;
  m.attackAnim = Math.max(0, m.attackAnim - dt*4);
  m.repathTimer = Math.max(0, (m.repathTimer || 0) - dt);

  if(m.state === "wild"){
    if(dist2(m.pos, player.pos) < 1.35){ recruitMouse(m); return; }
    if(!m.target || dist2(m.pos,m.target) < 1.3 || Math.random() < 0.018){
      const a = Math.random() * Math.PI * 2;
      const r = rand(3, 10);
      m.target = new THREE.Vector3(
        clamp(m.pos.x + Math.sin(a)*r, -dynamicHalfMap+6, dynamicHalfMap-6),
        0,
        clamp(m.pos.z + Math.cos(a)*r, -dynamicHalfMap+6, dynamicHalfMap-6)
      );
      m.target.y = groundHeight(m.target.x, m.target.z);
    }
  } else {
    if(m.assignedGasMine && !isValidGasWorkerForMine(m, m.assignedGasMine)){
      clearServantGasMineAssignment(m);
    }
    if(!m.assignedGasMine && m.assignedMechaHangar && (!m.assignedMechaHangar.dead) && m.assignedMechaHangar.mechaPending){
      m.target = m.assignedMechaHangar.pos;
      if(dist2(m.pos, m.assignedMechaHangar.pos) < 1.5){
        m.assignedMechaHangar.mechaPending = false;
        spawnRobot(m.assignedMechaHangar.pos.x+1.2, m.assignedMechaHangar.pos.z, false, true);
        m.dead = true;
        m.group.visible = false;
        addBurst(m.pos.x,m.pos.y+0.8,m.pos.z,0xffb66f,18,5.5,0.8,0.1);
        return;
      }
    }
    if(m.assignedGasMine && !m.assignedGasMine.dead){
      m.repairTarget = null;
      const mine = m.assignedGasMine;
      if(!m.gasJobState) m.gasJobState = "toMine";
      if(m.gasJobState === "toMine"){
        m.target = mine.pos;
        if(dist2(m.pos, mine.pos) < 1.5){
          m.gasJobState = "mining";
          m.gasMineTimer = getGasMiningDuration();
        }
      } else if(m.gasJobState === "mining"){
        m.target = mine.pos;
        if(dist2(m.pos, mine.pos) < 1.7){
          m.gasMineTimer = Math.max(0, (m.gasMineTimer || getGasMiningDuration()) - dt);
          m.attackAnim = 1;
          m.group.position.y += Math.sin(time*14) * 0.01;
          if(Math.random() < 0.06) addCogParticle(m.pos.x+rand(-0.2,0.2), m.pos.y+0.8, m.pos.z+rand(-0.2,0.2));
          if(m.gasMineTimer <= 0){ m.gasJobState = "toDeposit"; m.carryingGas = true; }
        }
      } else if(m.gasJobState === "toDeposit"){
        let depot = null, depotD = Infinity;
        for(const s of structures){
          if(s.dead || s.type!=="gasDepot") continue;
          const d = dist2(mine.pos, s.pos);
          if(d < depotD){ depotD = d; depot = s; }
        }
        m.target = depot ? depot.pos : mine.pos;
        if(dist2(m.pos, m.target) < 1.5){
          const payout = getEconomyGasPerTrip();
          gas += payout;
          popWorldText(`+${payout}⛽`, m.pos.x, m.pos.y + 1.5, m.pos.z, "#9fffe4");
          m.gasJobState = "toMine";
          m.carryingGas = false;
        }
      }
    } else {
      clearServantGasMineAssignment(m);
    }

    let assignedFactory = null;
    if(!m.assignedGasMine){
      for(const f of structures){
        if(f.dead || f.type!=="factory") continue;
        if(!f.assignedServant || f.assignedServant===m){ assignedFactory = f; break; }
      }
    }
    if(assignedFactory){
      m.repairTarget = null;
      if(m.assignedFactory && m.assignedFactory !== assignedFactory && m.assignedFactory.assignedServant===m) m.assignedFactory.assignedServant = null;
      m.assignedFactory = assignedFactory;
      assignedFactory.assignedServant = m;
      m.target = assignedFactory.pos;
    } else {
      if(m.assignedFactory && m.assignedFactory.assignedServant===m) m.assignedFactory.assignedServant = null;
      m.assignedFactory = null;

      let nearestCheese = null, best = 9999;
      for(const c of cheeses){
        const d = dist2(m.pos,c.pos);
        if(d < best){ best = d; nearestCheese = c; }
      }

      if(nearestCheese && best < 28){
        m.target = nearestCheese.pos;
      } else if(!m.assignedGasMine && !m.assignedFactory){
        let repairTarget = null;
        let bestRepair = 9999;
        for(const s of structures){
          if(s.dead || s.hp >= s.maxHp) continue;
          const d = dist2(m.pos,s.pos);
          if(d > SERVANT_REPAIR_RANGE) continue;
          const workersOnTarget = servantMice.filter(sm => sm!==m && !sm.dead && !sm.dying && sm.repairTarget === s).length;
          if(workersOnTarget >= SERVANT_REPAIR_MAX_PER_TARGET) continue;
          const structureWeight = ["turret","cannon","zapCoil","mortarBloom","sawBlaster","sniperTower","railGun","factory","gasMine","workshop"].includes(s.type) ? 0.75 : 1;
          const score = d * structureWeight + (s.hp/s.maxHp)*4.8;
          if(score < bestRepair){ bestRepair = score; repairTarget = s; }
        }
        m.repairTarget = repairTarget;
        if(repairTarget){
          m.target = repairTarget.pos;
          const reach = dist2(m.pos, repairTarget.pos);
          if(reach < repairTarget.radius + 1.2){
            m.repairCd -= dt;
            m.attackAnim = 0.9;
            if(m.repairCd <= 0){
              m.repairCd = SERVANT_REPAIR_INTERVAL;
              repairTarget.hp = Math.min(repairTarget.maxHp, repairTarget.hp + SERVANT_REPAIR_AMOUNT);
              setHealthBar(repairTarget.mesh.userData.healthBar, repairTarget.hp/repairTarget.maxHp);
              updateWallDamageVisual(repairTarget);
              addBurst(repairTarget.pos.x, repairTarget.pos.y+1.0, repairTarget.pos.z, 0x95ffb6, 4, 2.3, 0.3, 0.05);
            }
          }
        } else {
          m.orbitAngle += dt * 1.2;
          const orbitR = 3.4 + (Math.sin(m.anim*0.7 + m.orbitAngle) * 1.2);
          m.target = new THREE.Vector3(
            player.pos.x + Math.sin(m.orbitAngle + m.heading*0.25) * orbitR,
            0,
            player.pos.z + Math.cos(m.orbitAngle + m.heading*0.25) * orbitR
          );
          m.target.y = groundHeight(m.target.x, m.target.z);
        }
      } else {
        m.repairTarget = null;
      }
    }

    if(!m.assignedGasMine){
      for(let i=cheeses.length-1;i>=0;i--){
        const c = cheeses[i];
        if(dist2(m.pos,c.pos) < 1.15){
          cheese += c.amount;
          popWorldText("+" + c.amount + "🧀", m.pos.x, m.pos.y + 1.45, m.pos.z, "#ffe66f");
          addBurst(c.pos.x,c.pos.y+0.3,c.pos.z,0xffec71,8,4,0.4,0.08);
          c.group.parent?.remove(c.group);
          cheeses.splice(i,1);
          break;
        }
      }
    }
  }

  const moveTarget = (m.repathTimer > 0 && m.repathTarget) ? m.repathTarget : m.target;
  if(moveTarget){
    const mouseNeighbors = m.state === "servant" ? servantMice : wildMice;
    const slowed = (m.slowUntil || 0) > time;
    const slowMult = slowed ? 0.72 : 1;
    const step = directSteerToward({ pos:m.pos, speed:m.speed * (m.state==="servant"?getServantSpeedMultiplier():1) * slowMult, radius:m.radius }, moveTarget, dt, false, null, mouseNeighbors);
    if(step){
      m.heading += clamp(angleDiff(m.heading, step.heading), -4.4*dt, 4.4*dt);
      m.pos.x = step.x;
      m.pos.z = step.z;
    }
  }
  updateAgentStuck(m, dt, !!moveTarget, ()=>{
    setRepathPoint(m, m.state === "servant" ? player.pos : m.pos, m.state === "servant" ? 5.2 : 6.5);
    if(m.state === "wild") m.target = m.repathTarget.clone();
  });

  m.pos.y = groundHeight(m.pos.x,m.pos.z);
  m.group.rotation.y = m.heading;
  m.group.position.y += Math.sin(m.anim*6)*0.01;
  animateMouseRig(m.group, 0.75, m.anim, m.attackAnim, 0);
}

function isRatTargetValid(t){
  if(!t) return false;
  if(t === player) return !player.dead;
  if(isLivingTarget(t)) return !t.dead && !t.dying;
  if(t.pos && typeof t.hp === "number") return !t.dead && t.hp > 0;
  return false;
}
function nearestRatTarget(e){
  const candidates = [];
  if(!player.dead) candidates.push(player);
  for(const m of servantMice){ if(!m.dead && !m.dying) candidates.push(m); }
  for(const r of robots){ if(!r.dead && !r.dying) candidates.push(r); }
  for(const s of structures){ if(!s.dead && s.hp > 0) candidates.push(s); }
  if(!candidates.length) return null;

  const current = isRatTargetValid(e.target) ? e.target : null;
  const currentD = current ? dist2(e.pos, current.pos) : Infinity;
  let best = null;
  let bestD = Infinity;
  for(const c of candidates){
    const d = dist2(e.pos, c.pos);
    if(d < bestD - 0.06){
      bestD = d;
      best = c;
    } else if(Math.abs(d - bestD) <= 0.06 && best && (c.id || 0) < (best.id || 0)){
      best = c;
    }
  }

  const stickBias = 0.55;
  if(current && current !== best && currentD <= bestD + stickBias) return current;
  return best;
}
function chooseEnemyTarget(e){
  // AI tuning helper: structure pressure map keeps enemies from dog-piling one wall.
  const structurePressure = new Map();
  for (const other of enemies) {
    if (other === e || other.dead || other.dying || !other.target || other.target === player) continue;
    structurePressure.set(other.target, (structurePressure.get(other.target) || 0) + 1);
  }

  const hotZonePressure = 1 + combatDirector.heat * 0.55 * difficulty.antiCamp;
  if(e.kind==="rat"){
    return nearestRatTarget(e);
  }
  if(e.kind==="ram"){
    const wall = nearestAttackableStructure(e, 999, s => isWallStructure(s) || s.type==="fortPlate" || s.type==="barrierTotem");
    if(wall) return wall;
  }
  if(e.kind==="assassin"){
    let bestSupport = null, bestScore = 9999;
    for(const m of servantMice){
      if(m.dead || m.dying) continue;
      let nearbyGuards = 0;
      for(const ally of servantMice){
        if(ally===m || ally.dead || ally.dying) continue;
        if(dist2(ally.pos, m.pos) < 3.5) nearbyGuards++;
      }
      const d = dist2(e.pos, m.pos);
      const score = d + nearbyGuards * 4.4;
      if(score < bestScore){ bestScore = score; bestSupport = m; }
    }
    if(bestSupport && bestScore < 48) return bestSupport;
    const supportStructure = nearestAttackableStructure(e, 999, s => ["fountain","factory","supplyNest","repairAnchor","robo"].includes(s.type));
    if(supportStructure && dist2(e.pos, supportStructure.pos) < 52) return supportStructure;
    if(!player.dead && dist2(e.pos, player.pos) < 18 && !lineBlocked(e.pos, player.pos)) return player;
  }
  if(e.kind==="spitterBug" || e.kind==="venomLobber"){
    let bestBackline = null;
    let bestScore = 9999;
    for(const m of servantMice){
      if(m.dead || m.dying) continue;
      let cluster = 0;
      for(const s of structures){ if(!s.dead && dist2(m.pos, s.pos) < 7.5) cluster++; }
      const d = dist2(e.pos, m.pos);
      const score = d - cluster * 1.8;
      if(score < bestScore){ bestScore = score; bestBackline = m; }
    }
    const struct = nearestAttackableStructure(e, 999, s => ["turret","cannon","mortarBloom","shardLauncher","zapCoil","sawBlaster","sniperTower","railGun","breedingNest","factory","gasMine","mechaHangar","advancedRobo"].includes(s.type));
    if(bestBackline && bestScore < 65) return bestBackline;
    if(struct) return struct;
  }
  if(e.kind==="burrowMole"){
    const ambushStructure = nearestAttackableStructure(e, 999, s => ["turret","gasMine","breedingNest","supplyNest","advancedRobo","mechaHangar","factory","workshop","robo"].includes(s.type));
    if(ambushStructure) return ambushStructure;
  }
  if(e.kind==="dustRunner"){
    const eco = nearestAttackableStructure(e, 999, s => ["repairAnchor","fountain","supplyNest","factory","gasMine","gasDepot","breedingNest"].includes(s.type));
    if(eco) return eco;
    if(!player.dead && dist2(e.pos, player.pos) < 26) return player;
  }
  if(e.kind==="bombBeetle"){
    let bestCluster = null, bestScore = 9999;
    for(const s of structures){
      if(s.dead) continue;
      let nearby = 0;
      for(const t of structures){ if(!t.dead && dist2(t.pos, s.pos) < 8.2) nearby++; }
      const wallBias = isWallStructure(s) ? 3.1 : (isAttackStructureType(s.type) ? 2.2 : 1);
      const score = dist2(e.pos, s.pos) - nearby * wallBias;
      if(score < bestScore){ bestScore = score; bestCluster = s; }
    }
    if(bestCluster) return bestCluster;
  }
  if(e.kind==="screecherBat"){
    let defended = null, defendedScore = 9999;
    for(const s of structures){
      if(s.dead) continue;
      let defenses = 0;
      for(const t of structures){ if(!t.dead && isAttackStructureType(t.type) && dist2(t.pos, s.pos) < 11) defenses++; }
      const score = dist2(e.pos, s.pos) - defenses * 3.8;
      if(score < defendedScore){ defendedScore = score; defended = s; }
    }
    if(defended) return defended;
    if(!player.dead) return player;
  }
  if(e.kind==="siegeRat"){
    const siegeTarget = nearestAttackableStructure(e, 999, s => ["wall","diamondWall","ultraWall","gasDepot","turret","sniperTower","railGun","advancedRobo","mechaHangar","fortPlate","barrierTotem","braceTower"].includes(s.type));
    if(siegeTarget) return siegeTarget;
  }
  if(e.kind==="titanRam"){
    let bestCluster = null;
    let bestScore = 9999;
    for(const s of structures){
      if(s.dead) continue;
      let nearby = 0;
      for(const t of structures){ if(!t.dead && dist2(t.pos, s.pos) < 9) nearby++; }
      const score = dist2(e.pos, s.pos) - nearby * 3.3;
      if(score < bestScore){ bestScore = score; bestCluster = s; }
    }
    if(bestCluster) return bestCluster;
  }
  if(e.kind==="plagueBrute"){
    const siegeTarget = nearestAttackableStructure(e, 999, s => ["wall","diamondWall","ultraWall","fortPlate","barrierTotem","turret","factory","mechaHangar"].includes(s.type));
    if(siegeTarget) return siegeTarget;
  }
  if(e.kind==="venomLobber"){
    const artillery = nearestAttackableStructure(e, 999, s => ["turret","breedingNest","factory","gasMine","advancedRobo","mechaHangar","railGun"].includes(s.type));
    if(artillery) return artillery;
  }
  if(e.kind==="warClaw"){
    for(const m of servantMice){ if(!m.dead && !m.dying && dist2(e.pos,m.pos)<45) return m; }
    for(const r of robots){ if(!r.dead && !r.dying && dist2(e.pos,r.pos)<45) return r; }
    const support = nearestAttackableStructure(e, 999, s => ["supplyNest","breedingNest","factory","gasMine","advancedRobo","workshop"].includes(s.type));
    if(support) return support;
  }

  const nearPlayer = !player.dead && dist2(e.pos, player.pos) < 16;
  if(!player.dead && nearPlayer && !lineBlocked(e.pos, player.pos)) return player;

  let nearestServant = null, nearestServantD = 9999;
  for(const m of servantMice){
    if(m.dead || m.dying) continue;
    const d = dist2(e.pos, m.pos);
    if(d < nearestServantD){ nearestServantD = d; nearestServant = m; }
  }
  let nearestRobot = null, nearestRobotD = 9999;
  for(const r of robots){
    if(r.dead || r.dying) continue;
    const d = dist2(e.pos, r.pos);
    if(d < nearestRobotD){ nearestRobotD = d; nearestRobot = r; }
  }

  if(e.kind==="mole"){
    const bestWall = nearestAttackableStructure(e, 999, s => (s.type==="wall" || s.type==="diamondWall" || s.type==="ultraWall")) || null;
    if(bestWall) return bestWall;
  }
  if(!player.dead && !lineBlocked(e.pos, player.pos) && dist2(e.pos, player.pos) < 26 + combatDirector.heat * 7){
    return player;
  }
  if(nearestServant && nearestServantD < 22) return nearestServant;
  if(nearestRobot && nearestRobotD < 22) return nearestRobot;

  const priorityByKind = {
    mole: { wall: 2.2, diamondWall: 2.0, ultraWall: 2.1, fortPlate: 1.6, barrierTotem: 1.4, braceTower: 1.2, turret: 0.85, cannon: 0.8 },
    weasel: { turret: 2.1, cannon: 2.0, mortarBloom: 1.85, zapCoil: 1.7, sawBlaster: 1.75, robo: 1.35, beacon: 1.25, wall: 0.7, diamondWall: 0.6, ultraWall: 0.68 },
    spitterBug: { turret: 2.0, cannon: 1.85, mortarBloom: 1.7, breedingNest: 1.8, factory: 1.55, wall: 0.45, diamondWall: 0.4, ultraWall: 0.46 },
    venomLobber: { turret: 2.35, cannon: 2.1, mortarBloom: 2.0, breedingNest: 2.1, factory: 1.8, wall: 0.35, diamondWall: 0.3, ultraWall: 0.32 },
    plagueBrute: { wall: 2.8, diamondWall: 2.75, ultraWall: 2.9, fortPlate: 2.45, barrierTotem: 2.3, braceTower: 2.1, gasDepot: 1.85 },
    warClaw: { supplyNest: 2.25, breedingNest: 2.4, factory: 2.0, gasMine: 2.1, advancedRobo: 2.1, mechaHangar: 2.05, wall: 0.45 },
    siegeRat: { wall: 2.6, diamondWall: 2.55, ultraWall: 2.75, gasDepot: 2.25, turret: 2.0, advancedRobo: 1.65, fortPlate: 1.75 },
    titanRam: { wall: 2.25, diamondWall: 2.1, ultraWall: 2.3, fortPlate: 2.2, barrierTotem: 2.0, braceTower: 1.9, gasDepot: 1.5, mechaHangar: 1.65 }
    ,dustRunner: { repairAnchor: 2.2, fountain: 2.0, supplyNest: 2.1, factory: 2.0, gasMine: 1.95, gasDepot: 1.9, wall: 0.35, diamondWall: 0.3, ultraWall: 0.3 }
    ,bombBeetle: { wall: 2.7, diamondWall: 2.55, ultraWall: 2.8, turret: 2.2, cannon: 2.0, zapCoil: 1.9, mortarBloom: 1.95, braceTower: 1.75 }
    ,screecherBat: { turret: 2.2, cannon: 2.05, zapCoil: 2.1, mortarBloom: 2.0, sawBlaster: 1.9, sniperTower: 1.9, railGun: 1.95, wall: 0.25 }
  };

  let bestStructure = null, bestScore = 9999;
  for(const s of structures){
    if(s.dead) continue;
    const d = dist2(e.pos,s.pos);
    const typePriority = priorityByKind[e.kind]?.[s.type] || 1;
    const pressure = structurePressure.get(s) || 0;
    const heatBias = Math.max(0, 1 - dist2(s.pos, player.pos) / 28) * combatDirector.heat * hotZonePressure;
    const score = d / typePriority + pressure * 3.0 - heatBias * 4.1;
    if(score < bestScore){
      bestScore = score;
      bestStructure = s;
    }
  }
  if(bestStructure) return bestStructure;
  if(nearestRobot) return nearestRobot;
  if(nearestServant) return nearestServant;
  if(!player.dead) return player;
  return null;
}
function updateEnemies(dt){
  if(gamePaused) return;
  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    if(e.dead){ enemies.splice(i,1); continue; }

    if(e.dying){
      e.deathT += dt;
      e.group.rotation.z = clamp(e.deathT * 4.6, 0, Math.PI/2.15);
      e.group.position.y = groundHeight(e.pos.x,e.pos.z) - Math.min(0.5, e.deathT * 0.75);
      if(e.kind==="weasel") animateWeaselRig(e.group, 0, e.anim, 0, clamp(e.deathT * 2, 0, 1));
      else animateMouseRig(e.group, 0, e.anim, 0, clamp(e.deathT * 2, 0, 1));
      if(e.deathT > 0.45) finalizeDeath(e);
      continue;
    }

    e.anim += dt;
    e.attackAnim = Math.max(0, e.attackAnim - dt*4);
    e.attackCd -= dt;
    e.stunCd = Math.max(0, (e.stunCd || 0) - dt);
    e.burrowCd = Math.max(0, (e.burrowCd || 0) - dt);
    e.burrowRecover = Math.max(0, (e.burrowRecover || 0) - dt);
    e.spitCd = Math.max(0, (e.spitCd || 0) - dt);
    e.screamCd = Math.max(0, (e.screamCd || 0) - dt);
    e.debuffCd = Math.max(0, (e.debuffCd || 0) - dt);
    e.heavySwing = Math.max(0, (e.heavySwing || 0) - dt);
    e.titanChargeCd = Math.max(0, (e.titanChargeCd || 0) - dt);
    e.siegeWindup = Math.max(0, (e.siegeWindup || 0) - dt);
    setEnemyTelegraph(e, 0);
    if(e.dazeIcon){
      e.dazeIcon.visible = e.stunCd > 0;
      if(e.dazeIcon.visible){
        e.dazeIcon.material.opacity = 0.75 + Math.sin(time*14) * 0.2;
        e.dazeIcon.position.y = (e.kind==="titanRam" ? 3.7 : (e.kind==="weasel" || e.kind==="ram" || e.kind==="siegeRat" ? 3.1 : 2.45)) + Math.sin(time*10)*0.07;
        e.dazeIcon.quaternion.copy(camera.quaternion);
      }
    }
    if(e.kind==="burrowMole"){
      if(e.burrowState === "burrow_enter"){
        e.burrowTimer -= dt;
        e.attackAnim = 0.6;
        e.group.position.y = groundHeight(e.pos.x, e.pos.z) - clamp(1 - (e.burrowTimer / 0.38), 0, 1) * 0.9;
        if(Math.random() < 0.35) addBurst(e.pos.x + rand(-0.25,0.25), groundHeight(e.pos.x,e.pos.z)+0.06, e.pos.z + rand(-0.25,0.25), 0x88623f, 1, 0.8, 0.25, 0.04);
        if(e.burrowTimer <= 0){
          e.burrowState = "burrow_travel";
          e.isBurrowed = true;
        }
      } else if(e.burrowState === "burrow_travel"){
        e.untargetable = true;
        e.group.visible = false;
        e.isBurrowed = true;
        if((e.burrowTelegraphCd || 0) <= 0){
          e.burrowTelegraphCd = 0.12;
          addBurst(e.pos.x + rand(-0.18,0.18), groundHeight(e.pos.x,e.pos.z)+0.05, e.pos.z + rand(-0.18,0.18), 0x8a6a44, 2, 0.9, 0.26, 0.05);
        } else e.burrowTelegraphCd -= dt;
      } else if(e.burrowState === "burrow_emerge"){
        e.burrowTimer -= dt;
        e.group.visible = true;
        e.untargetable = false;
        e.isBurrowed = false;
        e.group.position.y = groundHeight(e.pos.x, e.pos.z) - clamp(e.burrowTimer / 0.4, 0, 1) * 0.65;
        if(Math.random() < 0.4) addBurst(e.pos.x + rand(-0.25,0.25), groundHeight(e.pos.x,e.pos.z)+0.08, e.pos.z + rand(-0.25,0.25), 0x9c7549, 1, 0.9, 0.3, 0.04);
        if(e.burrowTimer <= 0){
          e.burrowState = "surface_attack";
          e.burrowRecover = 0.55;
          addBurst(e.pos.x, e.pos.y + 0.3, e.pos.z, 0x8d5f2d, 14, 3.8, 0.52, 0.08);
        }
      } else {
        e.untargetable = false;
        e.group.visible = true;
        e.isBurrowed = false;
      }
    }
    if(e.kind==="spitterBug" && e.spitWindup > 0){
      e.spitWindup -= dt;
      e.attackAnim = 1;
      if(e.spitAim){
        const frac = clamp(1 - (e.spitWindup / 0.5), 0, 1);
        setSpitLandingTelegraph(e, e.spitAim, frac, e.spitImpactRadius || 1.75);
      }
      if(Math.random() < 0.12) addBurst(e.pos.x, e.pos.y + 1.0, e.pos.z, 0x7bff89, 1, 0.8, 0.18, 0.03);
      if(e.spitWindup <= 0 && e.spitAim){
        const target = e.spitAim;

        const d2 = Math.max(2, horiz.length());
        horiz.normalize();
        spawnProjectile({
          pos:new THREE.Vector3(e.pos.x, e.pos.y + 1.05, e.pos.z).add(horiz.clone().multiplyScalar(0.35)),
          vel:new THREE.Vector3(horiz.x * (8.2 + d2*0.22), 8.8 + d2*0.12, horiz.z * (8.2 + d2*0.22)),
          damage:e.damage,
          splash:e.spitImpactRadius || 1.75,

          from:"enemy",
          kind:"acid",
          impactPos:new THREE.Vector3(target.x, groundHeight(target.x, target.z) + 0.12, target.z)
        });
        clearSpitLandingTelegraph(e);
        e.spitAim = null;
        addBurst(e.pos.x, e.pos.y + 1.0, e.pos.z, 0x96ff8d, 6, 2.4, 0.28, 0.05);

      if(e.spitWindup <= 0 && !e.spitAim) clearSpitLandingTelegraph(e);
    }
    if(e.kind==="spitterBug" && e.spitWindup <= 0 && !e.spitAim && e.spitTelegraph){
      clearSpitLandingTelegraph(e);
    }

    // retarget more often if crowded around current target
    e.retargetCd = Math.max(0, (e.retargetCd || 0) - dt);
    const targetInvalid = !e.target || e.target.dead || (e.target === player && player.dead);
    if (targetInvalid || Math.random() < 0.02 || (e.kind === "rat" && e.retargetCd <= 0)) {
      const nextTarget = chooseEnemyTarget(e);
      if(nextTarget && nextTarget !== e.target) e.retargetCd = e.kind === "rat" ? 0.22 : 0;
      e.target = nextTarget;
    } else if (e.target !== player && e.kind !== "rat") {
      let crowd = 0;
      for (const other of enemies) {
        if (other === e || other.dead || other.dying) continue;
        if (other.target === e.target && dist2(other.pos, e.pos) < 2.0) crowd++;
      }
      if (crowd >= 3) e.target = chooseEnemyTarget(e);
    }

    e.repathTimer = Math.max(0, (e.repathTimer || 0) - dt);
    const moveTarget = (e.repathTimer > 0 && e.repathTarget) ? e.repathTarget : e.target;
    if(!moveTarget) continue;
    let targetPos = moveTarget.pos || moveTarget;
    const d = dist2(e.pos, targetPos);
    const isStunned = e.stunCd > 0;
    if(e.kind==="burrowMole" && e.burrowState==="surface_attack" && d > meleeStopDistance(e, e.target || moveTarget, 0.9)){
      e.burrowState = "surface_seek";
    }
    if(e.kind==="burrowMole" && (e.burrowState==="surface_seek" || e.burrowState==="surface_attack") && d > meleeStopDistance(e, e.target || moveTarget, 0.38) && e.burrowCd <= 0 && e.burrowRecover <= 0){
      e.burrowState = "burrow_enter";
      e.burrowTimer = 0.38;
      e.burrowCd = rand(6.8, 9.8);
      e.burrowTarget = targetPos.clone ? targetPos.clone() : new THREE.Vector3(targetPos.x, 0, targetPos.z);
      e.burrowTelegraphCd = 0;
    }
    if(e.kind==="ram"){
      e.ramDaze = Math.max(0, e.ramDaze - dt);
      if(e.ramDaze > 0){
        e.stunCd = Math.max(e.stunCd, e.ramDaze);
      }
    }

    if(e.target && !e.repathTimer && !isStunned && e.kind !== "ram" && !(e.kind==="burrowMole" && e.burrowState==="burrow_travel")){
      if(!e.attackSlot || dist2(e.attackSlot, targetPos) > 4.5 || Math.random() < 0.02){
        e.attackSlot = pickAttackSlot(e, targetPos, e.target.radius || 0.9, e._stuck?.phase % 2 ? -1 : 1);
      }
      targetPos = e.attackSlot || targetPos;
    }

    if(e.kind==="ram" && !isStunned){
      if(e.ramState === "idle"){
        const wallTarget = nearestAttackableStructure(e, 999, s => isWallStructure(s) || s.type==="fortPlate");
        if(wallTarget && dist2(e.pos, wallTarget.pos) < 36){
          e.ramState = "windup";
          e.ramWindup = 0.7;
          e.ramTarget = wallTarget;
          e.ramChargeDir.set(wallTarget.pos.x - e.pos.x, 0, wallTarget.pos.z - e.pos.z).normalize();
          addBurst(e.pos.x, e.pos.y+1.1, e.pos.z, 0xff9d3d, 8, 2.5, 0.35, 0.07);
        }
      } else if(e.ramState === "windup"){
        e.ramWindup -= dt;
        setEnemyTelegraph(e, clamp(1 - (e.ramWindup / 0.7), 0, 1));
        if(e.ramWindup <= 0){
          e.ramState = "charge";
        }
      } else if(e.ramState === "charge"){
        const charge = { x:e.pos.x + e.ramChargeDir.x * (e.speed*2.45) * dt, z:e.pos.z + e.ramChargeDir.z * (e.speed*2.45) * dt };
        const pushed = collisionPushOut(charge.x, charge.z, e.radius, true, null);
        e.pos.x = pushed.x; e.pos.z = pushed.z;
        e.heading = Math.atan2(e.ramChargeDir.x, e.ramChargeDir.z);
        let hitStructure = null;
        for(const s of structures){
