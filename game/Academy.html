<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Goblin Zombies 3D</title>
<style>
  html, body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
  }

  #hud {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 10;
    font-size: 18px;
    text-shadow: 2px 2px 4px black;
    pointer-events: none;
  }

  #centerText {
    position: fixed;
    bottom: 90px;
    width: 100%;
    text-align: center;
    font-size: 22px;
    z-index: 10;
    text-shadow: 2px 2px 5px black;
    pointer-events: none;
  }

  #crosshair {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 18px;
    height: 18px;
    margin-left: -9px;
    margin-top: -9px;
    z-index: 10;
    pointer-events: none;
  }

  #crosshair:before,
  #crosshair:after {
    content: "";
    position: absolute;
    background: white;
    box-shadow: 0 0 4px black;
  }
  #playerHealthWrap {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 380px;
    height: 28px;
    border: 3px solid white;
    background: rgba(40, 0, 0, 0.75);
    z-index: 12;
    box-shadow: 0 0 8px black;
  }

  #playerHealthFill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #b60000, #ff3333);
    transition: width 0.15s linear;
  }

  #playerHealthText {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    text-shadow: 2px 2px 4px black;
    pointer-events: none;
  }

  #damageTint {
    position: fixed;
    inset: 0;
    background: rgba(180, 0, 0, 0);
    pointer-events: none;
    z-index: 9;
    transition: background 0.2s linear;
  }

  #crosshair:before {
    left: 8px;
    top: 0;
    width: 2px;
    height: 18px;
  }

  #crosshair:after {
    left: 0;
    top: 8px;
    width: 18px;
    height: 2px;
  }

  #startScreen {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #243018, #050705);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    text-align: center;
  }

  #startBox {
    background: rgba(0,0,0,0.75);
    border: 3px solid #78945a;
    padding: 30px;
    border-radius: 12px;
    max-width: 700px;
  }

  button {
    padding: 12px 20px;
    font-size: 18px;
    background: #5f7d37;
    color: white;
    border: 2px solid white;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover {
    background: #7da849;
  }

#splitDivider { position: fixed; left:0; top:50%; width:100%; height:3px; background: rgba(255,255,255,0.65); z-index:15; display:none; }
.coopTint { position: fixed; left:0; width:100%; height:50%; pointer-events:none; z-index:9; background: rgba(180,0,0,0); display:none;}
#p1DamageTint { top:0; }
#p2DamageTint { bottom:0; }
.coopHealthBox { position: fixed; top:12px; width:280px; height:24px; border:2px solid white; background: rgba(40,0,0,0.75); z-index:12; display:none;}
#p1HealthBox { left:12px; }
#p2HealthBox { right:12px; }
#p1HealthFill,#p2HealthFill{height:100%; background:linear-gradient(90deg,#26d14e,#8af07e); width:100%;}

</style>
</head>
<body>

<div id="hud"></div>
<div id="playerHealthWrap">
  <div id="playerHealthFill"></div>
  <div id="playerHealthText">100 / 100</div>
</div>
<div id="centerText"></div>
<div id="crosshair"></div>
<div id="damageTint"></div>
<div id="splitDivider"></div>
<div id="p1DamageTint" class="coopTint"></div>
<div id="p2DamageTint" class="coopTint"></div>
<div id="p1HealthBox" class="coopHealthBox"><div id="p1HealthFill"></div></div>
<div id="p2HealthBox" class="coopHealthBox"><div id="p2HealthFill"></div></div>

<div id="startScreen">
  <div id="startBox">
    <h1>Goblin Zombies 3D</h1>
    <p>
      Survive waves of goblins. Board windows, buy doors, purchase wall guns, and keep your ammo stocked.
    </p>
    <p>
      WASD move · Mouse look · Click shoot · R reload · E interact · Shift sprint
    </p>
    <button id="soloBtn">Start Solo</button>
    <button id="twoPlayerBtn">Start 2 Player Split Screen</button>
    <button id="controlsBtn">Controls / Controller Mapping</button>
    <div id="controlsPanel" style="display:none; margin-top: 12px; text-align:left;">
      <h2>Controller Mapping</h2>
      <div>
        <h3>Player 1</h3>
        <label>Gamepad: <select id="p1GamepadSelect"></select></label>
        <button onclick="beginMapping(1)">Map Player 1 Controls</button>
        <div id="p1MappingStatus"></div>
      </div>
      <div>
        <h3>Player 2</h3>
        <label>Gamepad: <select id="p2GamepadSelect"></select></label>
        <button onclick="beginMapping(2)">Map Player 2 Controls</button>
        <div id="p2MappingStatus"></div>
      </div>
      <button id="backToMenuBtn">Back</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
/* =========================================================
   BASIC THREE SETUP
========================================================= */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fc7df);
scene.fog = new THREE.Fog(0xbfd6e6, 65, 210);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  500
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const clock = new THREE.Clock();

const hud = document.getElementById("hud");
const centerText = document.getElementById("centerText");
const playerHealthFill = document.getElementById("playerHealthFill");
const playerHealthText = document.getElementById("playerHealthText");
const damageTint = document.getElementById("damageTint");
const startScreen = document.getElementById("startScreen");
const soloBtn = document.getElementById("soloBtn");
const twoPlayerBtn = document.getElementById("twoPlayerBtn");
const controlsBtn = document.getElementById("controlsBtn");
const controlsPanel = document.getElementById("controlsPanel");
const backToMenuBtn = document.getElementById("backToMenuBtn");

/* =========================================================
   LIGHTING
========================================================= */

const ambient = new THREE.AmbientLight(0x888877, 0.72);
scene.add(ambient);

const hemi = new THREE.HemisphereLight(0xdde8ff, 0x2d2418, 0.55);
scene.add(hemi);

const floatingTexts = [];
const moon = new THREE.DirectionalLight(0xbecfff, 0.75);
moon.position.set(30, 60, -25);
moon.castShadow = true;
scene.add(moon);

function addLamp(x, y, z, color = 0xffc46b, intensity = 1.5) {
  const light = new THREE.PointLight(color, intensity, 18);
  light.position.set(x, y, z);
  light.castShadow = true;
  scene.add(light);

  const bulb = new THREE.Mesh(
    new THREE.SphereGeometry(0.18, 12, 12),
    new THREE.MeshBasicMaterial({ color })
  );
  bulb.position.copy(light.position);
  scene.add(bulb);
}

/* =========================================================
   MATERIALS
========================================================= */

const mats = {
  floor: new THREE.MeshStandardMaterial({ color: 0x2b2720, roughness: 0.9 }),
  wall: new THREE.MeshStandardMaterial({ color: 0x3b382f, roughness: 0.95 }),
  trim: new THREE.MeshStandardMaterial({ color: 0x5c4a33, roughness: 0.9 }),
  board: new THREE.MeshStandardMaterial({ color: 0x8a5a2b, roughness: 0.8 }),
  door: new THREE.MeshStandardMaterial({ color: 0x55331c, roughness: 0.8 }),
  metal: new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.5, roughness: 0.35 }),
  darkMetal: new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.6, roughness: 0.3 }),
  muzzle: new THREE.MeshBasicMaterial({ color: 0xffe48a }),
  coin: new THREE.MeshStandardMaterial({ color: 0xffcc33, metalness: 0.7, roughness: 0.2 }),
  ammo: new THREE.MeshStandardMaterial({ color: 0x38e85f, emissive: 0x0a4414 }),
  health: new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x441010 }),
};

/* =========================================================
   PLAYER
========================================================= */

const player = {
  pos: new THREE.Vector3(0, 1.7, 0),
  vel: new THREE.Vector3(),
  yaw: 0,
  pitch: 0,
  speed: 7,
  sprintSpeed: 11,
  health: 100,
  maxHealth: 100,
  coins: 500,
  score: 0,
  wave: 1,
  alive: true,
  interactCooldown: 0,
  hurtCooldown: 0,
  regenDelay: 4.0,
  regenTimer: 0,
  regenRate: 7.5
};

camera.position.copy(player.pos);


const DEFAULT_CONTROL_MAPPINGS = {
  p1: {
    gamepadIndex: 0,
    keyboard: { moveForward: "w", moveBackward: "s", moveLeft: "a", moveRight: "d", sprint: "shift", reload: "r", interact: "e", shoot: "mouse0", pause: "escape", jump: " ", crouch: "control", swapWeapon: "q", useEquipment: "g" },
    gamepad: {
      moveX: { type: "axis", index: 0, invert: false, deadzone: 0.18 },
      moveY: { type: "axis", index: 1, invert: false, deadzone: 0.18 },
      lookX: { type: "axis", index: 2, invert: false, deadzone: 0.15 },
      lookY: { type: "axis", index: 3, invert: false, deadzone: 0.15 },
      shoot: { type: "button", index: 7 }, reload: { type: "button", index: 2 }, interact: { type: "button", index: 0 }, sprint: { type: "button", index: 10 }, pause: { type: "button", index: 9 }, jump: { type: "button", index: 1 }, crouch: { type: "button", index: 11 }, swapWeapon: { type: "button", index: 5 }, useEquipment: { type: "button", index: 3 }
    },
    lookSensitivity: 2.4,
    invertLookY: false
  },
  p2: {
    gamepadIndex: 1,
    keyboard: { moveForward: "arrowup", moveBackward: "arrowdown", moveLeft: "arrowleft", moveRight: "arrowright", sprint: "/", reload: ".", interact: ",", shoot: "mouse0", pause: "escape", jump: "0", crouch: "1", swapWeapon: "2", useEquipment: "3" },
    gamepad: {
      moveX: { type: "axis", index: 0, invert: false, deadzone: 0.18 },
      moveY: { type: "axis", index: 1, invert: false, deadzone: 0.18 },
      lookX: { type: "axis", index: 2, invert: false, deadzone: 0.15 },
      lookY: { type: "axis", index: 3, invert: false, deadzone: 0.15 },
      shoot: { type: "button", index: 7 }, reload: { type: "button", index: 2 }, interact: { type: "button", index: 0 }, sprint: { type: "button", index: 10 }, pause: { type: "button", index: 9 }, jump: { type: "button", index: 1 }, crouch: { type: "button", index: 11 }, swapWeapon: { type: "button", index: 5 }, useEquipment: { type: "button", index: 3 }
    },
    lookSensitivity: 2.4,
    invertLookY: false
  }
};
function cloneDefaultMappings() { return JSON.parse(JSON.stringify(DEFAULT_CONTROL_MAPPINGS)); }
function loadControlMappings() {
  try {
    const raw = localStorage.getItem("goblinZombiesControlMappings");
    if (!raw) return cloneDefaultMappings();
    const parsed = JSON.parse(raw);
    const defaults = cloneDefaultMappings();
    return {
      ...defaults, ...parsed,
      p1: { ...defaults.p1, ...(parsed.p1||{}), keyboard: { ...defaults.p1.keyboard, ...((parsed.p1&&parsed.p1.keyboard)||{}) }, gamepad: { ...defaults.p1.gamepad, ...((parsed.p1&&parsed.p1.gamepad)||{}) } },
      p2: { ...defaults.p2, ...(parsed.p2||{}), keyboard: { ...defaults.p2.keyboard, ...((parsed.p2&&parsed.p2.keyboard)||{}) }, gamepad: { ...defaults.p2.gamepad, ...((parsed.p2&&parsed.p2.gamepad)||{}) } }
    };
  } catch (err) { console.warn("Failed to load control mappings. Using defaults.", err); return cloneDefaultMappings(); }
}
let controlMappings = loadControlMappings();
function saveControlMappings() { localStorage.setItem("goblinZombiesControlMappings", JSON.stringify(controlMappings)); }
let pendingMapping = null;
const previousGamepadButtons = { p1: {}, p2: {} };
function updateMappingStatus(playerKey, message){ const el=document.getElementById(`${playerKey}MappingStatus`); if(el) el.textContent=message; }
function resetControlMappings(){ controlMappings = cloneDefaultMappings(); saveControlMappings(); refreshGamepadSelects(); renderControlsMappingUI(); }
function getMappedGamepad(playerKey){ const m=controlMappings[playerKey]; if(!navigator.getGamepads) return null; return navigator.getGamepads()[m.gamepadIndex]||null; }
function readAxisBinding(pad,b){ if(!pad||!b||b.type!=="axis") return 0; let v=pad.axes[b.index]||0; if(Math.abs(v)<(b.deadzone||0.15)) return 0; if(b.invert) v*=-1; return v; }
function isGamepadActionPressed(playerKey,action){ const pad=getMappedGamepad(playerKey); const b=controlMappings[playerKey].gamepad[action]; if(!pad||!b) return false; if(b.type==="button") return !!pad.buttons[b.index]?.pressed; if(b.type==="axis") return Math.abs(readAxisBinding(pad,b))>(b.deadzone||0.2); return false; }
function wasGamepadActionJustPressed(playerKey, actionName){ const now=isGamepadActionPressed(playerKey,actionName); const was=previousGamepadButtons[playerKey][actionName]||false; previousGamepadButtons[playerKey][actionName]=now; return now&&!was; }
function getGamepadMoveVector(playerKey){ const pad=getMappedGamepad(playerKey), map=controlMappings[playerKey].gamepad; return {x: readAxisBinding(pad,map.moveX), y: readAxisBinding(pad,map.moveY)}; }
function getGamepadLookVector(playerKey){ const pad=getMappedGamepad(playerKey), map=controlMappings[playerKey].gamepad; return {x: readAxisBinding(pad,map.lookX), y: readAxisBinding(pad,map.lookY)}; }
function beginKeyboardMapping(playerKey, actionName){ pendingMapping={mode:"keyboard",playerKey,actionName}; updateMappingStatus(playerKey,`Press a keyboard key for ${actionName}...`); }
function beginGamepadButtonMapping(playerKey, actionName){ pendingMapping={mode:"gamepadButton",playerKey,actionName,startedAt:performance.now()}; updateMappingStatus(playerKey,`Press a controller button for ${actionName}...`); }
function beginGamepadAxisMapping(playerKey, actionName){ pendingMapping={mode:"gamepadAxis",playerKey,actionName,startedAt:performance.now()}; updateMappingStatus(playerKey,`Move the analog stick/axis for ${actionName}...`); }
function beginMapping(playerNum){ updateMappingStatus(`p${playerNum}`,"Use the mapping buttons below each action."); }
function refreshGamepadSelects(){ const pads=navigator.getGamepads?navigator.getGamepads():[]; [["p1GamepadSelect","p1"],["p2GamepadSelect","p2"]].forEach(([id,pk])=>{ const sel=document.getElementById(id); if(!sel) return; sel.innerHTML=""; for(let i=0;i<pads.length;i++){ const pad=pads[i]; if(!pad) continue; const o=document.createElement('option'); o.value=i; o.textContent=`Gamepad ${i}: ${pad.id}`; sel.appendChild(o);} if(!sel.children.length){ const o=document.createElement('option'); o.value=controlMappings[pk].gamepadIndex; o.textContent=`Gamepad ${controlMappings[pk].gamepadIndex} (not connected)`; sel.appendChild(o);} sel.value=String(controlMappings[pk].gamepadIndex); sel.onchange=()=>{ controlMappings[pk].gamepadIndex=Number(sel.value); saveControlMappings(); }; }); }
function renderControlsMappingUI(){ if(!controlsPanel) return; let root=document.getElementById('mappingRowsRoot'); if(!root){ root=document.createElement('div'); root.id='mappingRowsRoot'; controlsPanel.appendChild(root);} const actions=[['moveForward','Move Forward'],['moveBackward','Move Backward'],['moveLeft','Move Left'],['moveRight','Move Right'],['sprint','Sprint'],['lookX','Look X Axis'],['lookY','Look Y Axis'],['shoot','Shoot'],['reload','Reload'],['interact','Interact'],['pause','Pause/Menu'],['jump','Jump'],['crouch','Crouch'],['swapWeapon','Swap Weapon'],['useEquipment','Use Equipment']];
  root.innerHTML=''; ['p1','p2'].forEach(pk=>{ const sec=document.createElement('div'); sec.style.margin='8px 0'; sec.innerHTML=`<h4>${pk.toUpperCase()}</h4>`; actions.forEach(([action,label])=>{ const row=document.createElement('div'); row.style.margin='4px 0'; const kb=controlMappings[pk].keyboard[action]||'-'; const gp=controlMappings[pk].gamepad[action]; const gpTxt=gp?`${gp.type} ${gp.index}${gp.invert?' (inv)':''}`:'-'; row.innerHTML=`<strong>${label}</strong> | K: ${kb} | G: ${gpTxt} `; const b1=document.createElement('button'); b1.textContent='Map Keyboard'; b1.onclick=()=>beginKeyboardMapping(pk,action); const b2=document.createElement('button'); b2.textContent='Map Gamepad Button'; b2.onclick=()=>beginGamepadButtonMapping(pk,action); const b3=document.createElement('button'); b3.textContent='Map Gamepad Axis'; b3.onclick=()=>beginGamepadAxisMapping(pk,action); row.append(b1,b2,b3); if(gp&&gp.type==='axis'){ const inv=document.createElement('button'); inv.textContent='Invert Axis'; inv.onclick=()=>{ gp.invert=!gp.invert; saveControlMappings(); renderControlsMappingUI(); }; row.appendChild(inv);} sec.appendChild(row); }); const sens=document.createElement('div'); sens.innerHTML=`Look sensitivity: <input type='range' min='0.5' max='6' step='0.1' value='${controlMappings[pk].lookSensitivity}'><span> ${controlMappings[pk].lookSensitivity.toFixed(1)}</span> <label><input type='checkbox' ${controlMappings[pk].invertLookY?'checked':''}> Invert Y</label>`; const slider=sens.querySelector('input[type="range"]'); const span=sens.querySelector('span'); const chk=sens.querySelector('input[type="checkbox"]'); slider.oninput=()=>{ controlMappings[pk].lookSensitivity=Number(slider.value); span.textContent=` ${slider.value}`;}; chk.onchange=()=>{controlMappings[pk].invertLookY=chk.checked;}; sec.appendChild(sens); root.appendChild(sec); });
  let resetBtn=document.getElementById('resetControlsBtn'); if(!resetBtn){ resetBtn=document.createElement('button'); resetBtn.id='resetControlsBtn'; resetBtn.textContent='Reset Controls to Defaults'; controlsPanel.appendChild(resetBtn);} resetBtn.onclick=resetControlMappings;
  let saveBtn=document.getElementById('saveControlsBtn'); if(!saveBtn){ saveBtn=document.createElement('button'); saveBtn.id='saveControlsBtn'; saveBtn.textContent='Save Controls'; controlsPanel.appendChild(saveBtn);} saveBtn.onclick=()=>{ saveControlMappings(); alert('Controls saved.'); };
}
function updatePendingGamepadMapping(){ if(!pendingMapping) return; if(!['gamepadButton','gamepadAxis'].includes(pendingMapping.mode)) return; const pk=pendingMapping.playerKey; const pad=getMappedGamepad(pk); if(!pad) return; if(performance.now()-pendingMapping.startedAt<300) return; if(pendingMapping.mode==='gamepadButton'){ for(let i=0;i<pad.buttons.length;i++){ if(pad.buttons[i]?.pressed){ controlMappings[pk].gamepad[pendingMapping.actionName]={type:'button',index:i}; updateMappingStatus(pk,`Mapped ${pendingMapping.actionName} to button ${i}`); pendingMapping=null; saveControlMappings(); renderControlsMappingUI(); return; } } } else { for(let i=0;i<pad.axes.length;i++){ const v=pad.axes[i]||0; if(Math.abs(v)>0.5){ controlMappings[pk].gamepad[pendingMapping.actionName]={type:'axis',index:i,invert:v<0,deadzone:0.15}; updateMappingStatus(pk,`Mapped ${pendingMapping.actionName} to axis ${i}`); pendingMapping=null; saveControlMappings(); renderControlsMappingUI(); return; } } } }
window.addEventListener("gamepadconnected", refreshGamepadSelects);
window.addEventListener("gamepaddisconnected", refreshGamepadSelects);
let pointerLocked = false;

document.addEventListener("pointerlockchange", () => {
  pointerLocked = document.pointerLockElement === renderer.domElement;
});

function startSoloGame() {
  startScreen.style.display = "none";
  renderer.domElement.requestPointerLock();
}

if (soloBtn) {
  soloBtn.onclick = startSoloGame;
}

if (twoPlayerBtn) {
  twoPlayerBtn.onclick = () => {
    alert("2-player mode is not fully wired yet. Starting solo for now.");
    startSoloGame();
  };
}

if (controlsBtn) {
  controlsBtn.onclick = () => {
    if (controlsPanel) controlsPanel.style.display = "block";
  };
}

if (backToMenuBtn) {
  backToMenuBtn.onclick = () => {
    if (controlsPanel) controlsPanel.style.display = "none";
  };
}

refreshGamepadSelects();
renderControlsMappingUI();

renderer.domElement.addEventListener("click", () => {
  if (!pointerLocked && player.alive) {
    renderer.domElement.requestPointerLock();
  } else {
    shoot();
  }
});

document.addEventListener("mousemove", e => {
  if (!pointerLocked || !player.alive) return;
  player.yaw -= e.movementX * 0.0022;
  player.pitch -= e.movementY * 0.0022;
  player.pitch = Math.max(-1.25, Math.min(1.25, player.pitch));
});

const keys = {};
document.addEventListener("keydown", e => {
  const key = e.key.toLowerCase();
  if (pendingMapping && pendingMapping.mode === "keyboard") {
    const { playerKey, actionName } = pendingMapping;
    controlMappings[playerKey].keyboard[actionName] = key;
    pendingMapping = null;
    saveControlMappings();
    renderControlsMappingUI();
    updateMappingStatus(playerKey, `Mapped ${actionName} to ${key}`);
    e.preventDefault();
    return;
  }
  keys[key] = true;
  if (key === controlMappings.p1.keyboard.reload) reload();
  if (key === controlMappings.p1.keyboard.interact) interact();
});

document.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

/* =========================================================
   WORLD BUILDING
========================================================= */

const colliders = [];
const interactables = [];
const roomsUnlocked = {
  spawn: true,
  east: false,
  basement: false,
  armory: false,
  library: false,
  kitchen: false,
  courtyard: false,
  workshop: false,
  tower: false,
  chapel: false,
  crypt: false,
  forge: false
};

function box(w, h, d, x, y, z, mat, cast = true, receive = true) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = cast;
  mesh.receiveShadow = receive;
  scene.add(mesh);
  return mesh;
}

function addTable(x, z) {
  box(2.2, 0.2, 1.2, x, 0.85, z, mats.trim);
  box(0.18, 0.8, 0.18, x - 0.9, 0.4, z - 0.45, mats.trim);
  box(0.18, 0.8, 0.18, x + 0.9, 0.4, z - 0.45, mats.trim);
  box(0.18, 0.8, 0.18, x - 0.9, 0.4, z + 0.45, mats.trim);
  box(0.18, 0.8, 0.18, x + 0.9, 0.4, z + 0.45, mats.trim);
}

function addShelf(x, z, rotY = 0) {
  const group = new THREE.Group();
  group.position.set(x, 1.1, z);
  group.rotation.y = rotY;
  const shelf = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.2, 0.35), mats.trim);
  group.add(shelf);
  for (let i = 0; i < 10; i++) {
    const book = new THREE.Mesh(
      new THREE.BoxGeometry(0.16, 0.5, 0.12),
      new THREE.MeshStandardMaterial({ color: [0x663333, 0x333366, 0x335533, 0x666633][i % 4] })
    );
    book.position.set(-1.1 + i * 0.24, 0.3 + (i % 3) * 0.45, -0.25);
    group.add(book);
  }
  scene.add(group);
}

function addCrateStack(x, z) {
  box(1, 0.8, 1, x, 0.4, z, mats.trim);
  box(0.9, 0.7, 0.9, x + 0.5, 1.15, z + 0.2, mats.trim);
}
function addChair(x, z, rotY = 0) {
  const group = new THREE.Group();
  group.position.set(x, 0, z);
  group.rotation.y = rotY;
  const seat = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.18, 0.7), mats.trim);

function addHorizontalWallWithWindows(cx, z, totalW, wallD, windowsOnSide) {
  const wallLeftEdge = cx - totalW / 2;
  const wallRightEdge = cx + totalW / 2;

  const sorted = windowsOnSide
    .map(ws => ({
      x: ws.x,
      width: ws.width || 3.0,
      left: ws.x - (ws.width || 3.0) / 2,
      right: ws.x + (ws.width || 3.0) / 2
    }))
    .sort((a, b) => a.left - b.left);

  let cursor = wallLeftEdge;

  for (const gap of sorted) {
    const segmentW = gap.left - cursor;

    if (segmentW > 0.05) {
      addWallSegment(cursor + segmentW / 2, z, segmentW, wallD);
    }

    box(gap.width, 0.85, wallD, gap.x, 0.425, z, mats.wall);
    box(gap.width, 1.05, wallD, gap.x, 3.275, z, mats.wall);

    cursor = gap.right;
  }

  const finalW = wallRightEdge - cursor;
  if (finalW > 0.05) {
    addWallSegment(cursor + finalW / 2, z, finalW, wallD);
  }
}

function addVerticalWallWithWindows(x, cz, totalD, wallW, windowsOnSide) {
  const wallTopEdge = cz - totalD / 2;
  const wallBottomEdge = cz + totalD / 2;

  const sorted = windowsOnSide
    .map(ws => ({
      z: ws.z,
      width: ws.width || 3.0,
      top: ws.z - (ws.width || 3.0) / 2,
      bottom: ws.z + (ws.width || 3.0) / 2
    }))
    .sort((a, b) => a.top - b.top);

  let cursor = wallTopEdge;

  for (const gap of sorted) {
    const segmentD = gap.top - cursor;

    if (segmentD > 0.05) {
      addWallSegment(x, cursor + segmentD / 2, wallW, segmentD);
    }

    box(wallW, 0.85, gap.width, x, 0.425, gap.z, mats.wall);
    box(wallW, 1.05, gap.width, x, 3.275, gap.z, mats.wall);

    cursor = gap.bottom;
  }

  const finalD = wallBottomEdge - cursor;
  if (finalD > 0.05) {
    addWallSegment(x, cursor + finalD / 2, wallW, finalD);
  }
}

function addRoom(cx, cz, w, d, name, windowSlots = []) {
  box(w, 0.25, d, cx, -0.1, cz, mats.floor, false, true);

  // ceiling
  box(w, 0.25, d, cx, 4.2, cz, new THREE.MeshStandardMaterial({ color: 0x1c1b18 }), false, true);

  // decorative rug
  box(w * 0.42, 0.03, d * 0.25, cx, 0.02, cz, new THREE.MeshStandardMaterial({ color: 0x442222 }), false, true);

  // corner clutter
  box(1.2, 0.7, 0.8, cx - w/2 + 2, 0.35, cz - d/2 + 2, mats.trim);
  box(1.4, 0.5, 0.7, cx + w/2 - 2.4, 0.25, cz + d/2 - 2.4, mats.trim);

  // outer walls with real window slots
  const northWallZ = cz - d / 2;
  const southWallZ = cz + d / 2;
  const westWallX = cx - w / 2;
  const eastWallX = cx + w / 2;

  const northWindows = windowSlots.filter(ws => ws.side === "north");
  const southWindows = windowSlots.filter(ws => ws.side === "south");
  const westWindows = windowSlots.filter(ws => ws.side === "west");
  const eastWindows = windowSlots.filter(ws => ws.side === "east");

  if (northWindows.length === 0) {
    addWallSegment(cx, northWallZ, w, 0.35);
  } else {
    addHorizontalWallWithWindows(cx, northWallZ, w, 0.35, northWindows);
  }

  if (southWindows.length === 0) {
    addWallSegment(cx, southWallZ, w, 0.35);
  } else {
    addHorizontalWallWithWindows(cx, southWallZ, w, 0.35, southWindows);
  }

  if (westWindows.length === 0) {
    addWallSegment(westWallX, cz, 0.35, d);
  } else {
    addVerticalWallWithWindows(westWallX, cz, d, 0.35, westWindows);
  }

  if (eastWindows.length === 0) {
    addWallSegment(eastWallX, cz, 0.35, d);
  } else {
    addVerticalWallWithWindows(eastWallX, cz, d, 0.35, eastWindows);
  }
}

function rebuildWindowBoards(win) {
  for (const b of win.boardMeshes) {
    win.group.remove(b);
    if (b.geometry) b.geometry.dispose();
  }

  win.boardMeshes = [];

  const boardCount = Math.max(0, Math.min(win.boards, win.maxBoards));
  const boardLayouts = [
    { x: 0.0, y: -0.88, w: 2.52, rot: 0.1 },
    { x: 0.08, y: -0.58, w: 2.2, rot: -0.08 },
    { x: -0.06, y: -0.28, w: 2.45, rot: 0.06 },
    { x: 0.04, y: 0.02, w: 2.35, rot: -0.1 },
    { x: -0.1, y: 0.32, w: 2.5, rot: 0.08 },
    { x: 0.1, y: 0.62, w: 2.18, rot: -0.06 },
    { x: -0.02, y: 0.88, w: 2.42, rot: 0.11 },
    { x: 0.0, y: 0.18, w: 1.85, rot: 0.28 }
  ];

  const nailMat = new THREE.MeshBasicMaterial({ color: 0x111111 });

  for (let i = 0; i < boardCount; i++) {
    const layout = boardLayouts[i];

    const board = new THREE.Mesh(
      new THREE.BoxGeometry(layout.w, 0.14, 0.16),
      mats.board
    );

    board.position.set(layout.x, layout.y, 0.12);
    board.rotation.z = layout.rot;
    board.userData.baseY = board.position.y;
    board.userData.baseZ = board.position.z;
    board.userData.baseRotZ = board.rotation.z;
    board.castShadow = true;
    board.receiveShadow = true;

    [-layout.w * 0.38, layout.w * 0.38].forEach(nx => {
      const nail = new THREE.Mesh(
        new THREE.SphereGeometry(0.025, 6, 6),
        nailMat
      );
      nail.position.set(nx, 0.035, 0.09);
      board.add(nail);
    });

    win.group.add(board);
    win.boardMeshes.push(board);
  }
}

function createTextSprite(text) {
  const canvas = document.createElement("canvas");
  canvas.width = 512;
  canvas.height = 256;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "rgba(0,0,0,0.65)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "white";
  ctx.lineWidth = 6;
  ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);
  ctx.fillStyle = "white";
  ctx.font = "bold 42px Arial";
  ctx.textAlign = "center";
  const lines = text.split("\n");
  lines.forEach((line, i) => {
    ctx.fillText(line, canvas.width / 2, 70 + i * 55);
  });

  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(3, 1.5, 1);
  return sprite;
}

function createDamageSprite(text, color = 0xffffff) {
  const canvas = document.createElement("canvas");
  canvas.width = 256;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.font = "bold 54px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.lineWidth = 8;
  ctx.strokeStyle = "black";
  ctx.strokeText(text, 128, 64);
  ctx.fillStyle = "#" + color.toString(16).padStart(6, "0");
  ctx.fillText(text, 128, 64);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.4, 0.7, 1);
  return sprite;
}

function shoot() {
  if (!player.alive) return;
  if (currentGun.reloading) return;
  if (currentGun.cooldown > 0) return;

  if (currentGun.clip <= 0) {
    reload();
    return;
  }

  fireBurst(currentGun.burst || 1);
  currentGun.cooldown = currentGun.fireRate;
}

function fireBurst(count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      if (currentGun.clip <= 0 || currentGun.reloading) return;

      currentGun.clip--;

      const muzzle = gunView.getObjectByName("muzzle");
      const flash = gunView.getObjectByName("muzzleFlash");
      if (muzzle) muzzle.visible = true;
      if (flash) {
        flash.visible = true;
        flash.scale.setScalar(0.8 + Math.random() * 0.7);
        flash.rotation.z = Math.random() * Math.PI;
      }
      gunView.rotation.x -= 0.08;
      gunView.position.z += 0.04;
      setTimeout(() => {
        if (muzzle) muzzle.visible = false;
        if (flash) flash.visible = false;
      }, 45);

      for (let p = 0; p < currentGun.pellets; p++) {
        spawnBullet();
      }
    }, i * 80);
  }
}

function spawnBullet() {
  const dir = new THREE.Vector3(0, 0, -1);
  dir.applyEuler(camera.rotation);

  dir.x += (Math.random() - 0.5) * currentGun.spread;
  dir.y += (Math.random() - 0.5) * currentGun.spread;
  dir.z += (Math.random() - 0.5) * currentGun.spread;
  dir.normalize();

  const bulletMesh = new THREE.Mesh(
    new THREE.SphereGeometry(currentGun.laser ? 0.065 : 0.045, 8, 8),
    new THREE.MeshBasicMaterial({ color: currentGun.laser ? 0x55ddff : 0xffe08a })
  );

  bulletMesh.position.copy(camera.position);
  bulletMesh.position.add(dir.clone().multiplyScalar(0.8));
  scene.add(bulletMesh);

  bullets.push({
    mesh: bulletMesh,
    pos: bulletMesh.position.clone(),
    vel: dir.multiplyScalar(currentGun.bulletSpeed),
    damage: currentGun.damage,
    life: 2.2,
    drop: currentGun.laser ? 0.4 : 1.5
  });
}

function reload() {
  if (currentGun.reloading) return;
  if (currentGun.clip >= currentGun.clipSize) return;
  if (currentGun.reserve <= 0) return;

  currentGun.reloading = true;
  currentGun.reloadTimer = currentGun.reloadTime;
}

    helmet.rotation.x = Math.PI;
    group.add(helmet);
  }

  if (typeKey === "leaper") {
    const clawMat = new THREE.MeshBasicMaterial({ color: 0xf3e6ff });

    for (const x of [-0.58, 0.58]) {
      const claw = new THREE.Mesh(
        new THREE.ConeGeometry(0.06, 0.32, 8),
        clawMat
      );
      claw.position.set(x, 0.68, -0.35);
      claw.rotation.x = Math.PI / 2;
      group.add(claw);
    }

    const backSpike = new THREE.Mesh(
      new THREE.ConeGeometry(0.12, 0.45, 8),
      skin
    );
    backSpike.position.set(0, 1.15, 0.42);
    backSpike.rotation.x = -Math.PI / 2;
    group.add(backSpike);
  }

  if (typeKey === "spitter") {
    const acidMat = new THREE.MeshStandardMaterial({
      color: 0x99ff33,
      emissive: 0x44aa11,
      emissiveIntensity: 0.6
    });

    const throat = new THREE.Mesh(
      new THREE.SphereGeometry(0.16, 12, 12),
      acidMat
    );
    throat.position.set(0, 1.22, -0.34);
    group.add(throat);

    const acidSac = new THREE.Mesh(
      new THREE.SphereGeometry(0.24, 12, 12),
      acidMat
    );
    acidSac.position.set(0, 1.0, 0.36);
    group.add(acidSac);
  }

  group.scale.setScalar(type.scale);

  group.traverse(o => {
    if (o.isMesh) {
      o.castShadow = true;
      o.receiveShadow = true;
    }
  });

  return group;
}

function addGoblinGroundMarker(enemy) {

    reward: type.reward,
    state: "walking_to_window",
    targetWindow: win,
    outsideStand,
    insideStand,
    path: [],
    pathIndex: 0,
    pathRefreshTimer: 0,

    throwCooldown: 2 + Math.random() * 2,

    attackAnim: 0,
    tearAnim: 0,
    climbTimer: 0,
    hitFlashTimer: 0,
    leapCooldown: 1.5 + Math.random() * 1.5,
    leapAnim: 0,
    hitboxes: [
      {
        name: "head",
        offset: new THREE.Vector3(0, 1.52 * type.scale, -0.08),
        radius: 0.48 * type.scale,
        multiplier: 2.35
      },
      {
        name: "body",
        offset: new THREE.Vector3(0, 0.92 * type.scale, 0),
        radius: 0.58 * type.scale,
        multiplier: 1.0
      },
      {

        multiplier: 0.7
      }
    ]
  };
  addGoblinGroundMarker(enemyObj);
  enemies.push(enemyObj);
}
function getOutsideWindowSpawn(win) {
  const outward = getWindowOutwardVector(win);
  const side = new THREE.Vector3(Math.cos(win.rotation), 0, -Math.sin(win.rotation)).normalize();
  const spawnDistance = 10 + Math.random() * 5;
  const sideOffset = (Math.random() - 0.5) * 5;
  return new THREE.Vector3(
    win.x + outward.x * spawnDistance + side.x * sideOffset,
    0,
    win.z + outward.z * spawnDistance + side.z * sideOffset
  );
}

function startWave() {
  waveInProgress = true;
  waveSpawnLeft = 6 + player.wave * 4;
  waveSpawnTimer = 1;
}

function chooseEnemyType() {
  const w = player.wave;
  const r = Math.random();

  // Very late dangerous enemies
  if (w >= 10 && r < 0.10) return "armored";
  if (w >= 9 && r < 0.20) return "spitter";
  if (w >= 8 && r < 0.32) return "leaper";

  // Mid-late waves
  if (w >= 7 && r < 0.12) return "armored";
  if (w >= 6 && r < 0.22) return "spitter";
  if (w >= 5 && r < 0.34) return "leaper";

  // Existing types
  if (w >= 4 && r < 0.16) return "blue";
  if (w >= 3 && r < 0.36) return "yellow";
  if (w >= 2 && r < 0.58) return "red";

  return "green";
}

/* =========================================================
   INTERACTION
========================================================= */

function distance2D(a, b) {
  const dx = a.x - b.x;
  const dz = a.z - b.z;
  return Math.sqrt(dx * dx + dz * dz);
}

function getNearestInteractable() {
  let best = null;
  let bestDist = 2.6;

  const p = { x: player.pos.x, z: player.pos.z };

  for (const obj of interactables) {
    if (obj.active === false) continue;

    let ox = obj.x;
    let oz = obj.z;

    const dist = distance2D(p, { x: ox, z: oz });
    if (dist < bestDist) {
      best = obj;
      bestDist = dist;
    }
  }

  return best;
}

function interact() {
  if (player.interactCooldown > 0 || !player.alive) return;
  player.interactCooldown = 0.25;

  const obj = getNearestInteractable();
  if (!obj) return;

  if (obj.type === "window") {
    if (obj.boards < obj.maxBoards) {
      obj.boards++;
      obj.breakTimer = Math.max(0, obj.breakTimer - 0.6);
      rebuildWindowBoards(obj);
      player.coins += 10;
    }
  }

  if (obj.type === "door") {
    if (!obj.active) return;

    if (player.coins >= obj.cost) {
      player.coins -= obj.cost;
      obj.active = false;
      roomsUnlocked[obj.roomName] = true;
      scene.remove(obj.mesh);

      // remove matching collider
      for (let i = colliders.length - 1; i >= 0; i--) {
        const c = colliders[i];
        if (Math.abs(c.x - obj.x) < 0.01 && Math.abs(c.z - obj.z) < 0.01) {
          colliders.splice(i, 1);
        }
      }
    }
  }

  if (obj.type === "wallGun") {
    const g = guns[obj.key];

    if (!ownedGuns[obj.key]) {
      if (player.coins >= g.cost) {
        player.coins -= g.cost;
        ownedGuns[obj.key] = true;
        equipGun(obj.key, true);
      }
    } else {
      equipGun(obj.key, false);
    }
  }

  if (obj.type === "ammo") {
    if (currentGunKey === obj.key) {
      const cost = guns[obj.key].ammoCost;
      if (player.coins >= cost) {
        player.coins -= cost;
        currentGun.reserve = currentGun.reserveMax;
      }
    }
  }
}

function equipGun(key, fresh) {
  const oldClip = currentGun.clip;
  const oldReserve = currentGun.reserve;

  currentGunKey = key;
  currentGun = JSON.parse(JSON.stringify(guns[key]));

  if (fresh) {
    currentGun.clip = currentGun.clipSize;
    currentGun.reserve = Math.floor(currentGun.reserveMax * 0.6);
  } else {
    currentGun.clip = Math.min(currentGun.clipSize, oldClip);
    currentGun.reserve = Math.min(currentGun.reserveMax, oldReserve);
  }

  currentGun.cooldown = 0;
  currentGun.reloading = false;
  currentGun.reloadTimer = 0;

  rebuildGunView();
}

/* =========================================================
   MOVEMENT AND COLLISION
========================================================= */

function wouldCollide(x, z) {
  const radius = 0.42;
  for (const c of colliders) {
    const inside =
      x + radius > c.x - c.w / 2 &&
      x - radius < c.x + c.w / 2 &&
      z + radius > c.z - c.d / 2 &&
      z - radius < c.z + c.d / 2;
    if (!inside) continue;
    // Player should never walk through window openings.
    // Windows are enemy entry points only.
    return true;
  }
  return false;
}

function worldToWindowLocal(x, z, win) {
  const dx = x - win.x;
  const dz = z - win.z;
  const cos = Math.cos(-win.rotation);
  const sin = Math.sin(-win.rotation);
  return { x: dx * cos - dz * sin, z: dx * sin + dz * cos };
}

function isPointInWindowOpening(x, z, win, padding = 0.55) {
  const local = worldToWindowLocal(x, z, win);
  return Math.abs(local.x) <= (win.openingWidth || 2.8) / 2 + padding && Math.abs(local.z) <= 0.9;
}

function isBulletPassingThroughWindowOpening(pos) {
  for (const win of windows) {
    if (isPointInWindowOpening(pos.x, pos.z, win, 0.15)) return true;
  }
  return false;
}

function getWindowOutwardVector(win) {
  return new THREE.Vector3(-Math.sin(win.rotation), 0, -Math.cos(win.rotation)).normalize();
}
function getWindowInwardVector(win) {
  return getWindowOutwardVector(win).multiplyScalar(-1);
}
function getWindowOutsideStandPosition(win) {
  const outward = getWindowOutwardVector(win);
  return new THREE.Vector3(win.x + outward.x * 0.95, 0, win.z + outward.z * 0.95);
}
function getWindowInsideStandPosition(win) {
  const inward = getWindowInwardVector(win);
  return new THREE.Vector3(win.x + inward.x * 1.85, 0, win.z + inward.z * 1.85);
}
function faceGoblinToward(enemy, targetPosition) {
  const dx = targetPosition.x - enemy.mesh.position.x;
  const dz = targetPosition.z - enemy.mesh.position.z;
  enemy.mesh.rotation.y = Math.atan2(dx, dz);
}

function updatePlayer(dt) {
  const pMap = controlMappings.p1;
  const sprintHeld = keys[pMap.keyboard.sprint] || isGamepadActionPressed("p1", "sprint");
  const speed = sprintHeld ? player.sprintSpeed : player.speed;

  const forward = new THREE.Vector3(
    -Math.sin(player.yaw),
    0,
    -Math.cos(player.yaw)
  );

  const right = new THREE.Vector3(
    Math.cos(player.yaw),
    0,
    -Math.sin(player.yaw)
  );

  const move = new THREE.Vector3();

  let moveX = 0;
  let moveY = 0;
  if (keys[pMap.keyboard.moveForward]) moveY -= 1;
  if (keys[pMap.keyboard.moveBackward]) moveY += 1;
  if (keys[pMap.keyboard.moveLeft]) moveX -= 1;
  if (keys[pMap.keyboard.moveRight]) moveX += 1;
  const gpMove = getGamepadMoveVector("p1");
  moveX += gpMove.x;
  moveY += gpMove.y;
  if (moveY < 0) move.add(forward.clone().multiplyScalar(-moveY));
  if (moveY > 0) move.sub(forward.clone().multiplyScalar(moveY));
  if (moveX > 0) move.add(right.clone().multiplyScalar(moveX));
  if (moveX < 0) move.sub(right.clone().multiplyScalar(-moveX));

  if (move.lengthSq() > 0) {
    move.normalize().multiplyScalar(speed * dt);
  }

  const nx = player.pos.x + move.x;
  const nz = player.pos.z + move.z;

  if (!wouldCollide(nx, player.pos.z)) player.pos.x = nx;
  if (!wouldCollide(player.pos.x, nz)) player.pos.z = nz;

  const look = getGamepadLookVector("p1");
  if (Math.abs(look.x) > 0 || Math.abs(look.y) > 0) {
    const sensitivity = pMap.lookSensitivity || 2.4;
    const invertY = pMap.invertLookY ? -1 : 1;
    player.yaw -= look.x * sensitivity * dt;
    player.pitch -= look.y * sensitivity * invertY * dt;
    player.pitch = Math.max(-1.25, Math.min(1.25, player.pitch));
  }
  if (wasGamepadActionJustPressed("p1", "shoot")) shoot();
  if (wasGamepadActionJustPressed("p1", "reload")) reload();
  if (wasGamepadActionJustPressed("p1", "interact")) interact();
  if (currentGun.automatic && isGamepadActionPressed("p1", "shoot")) shoot();
  camera.position.copy(player.pos);
  camera.rotation.order = "YXZ";
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  if (player.hurtCooldown > 0) player.hurtCooldown -= dt;
  if (player.interactCooldown > 0) player.interactCooldown -= dt;
}

/* =========================================================
   UPDATE BULLETS / ROCKS
========================================================= */

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.life -= dt;
    b.vel.y -= b.drop * dt;
    b.pos.add(b.vel.clone().multiplyScalar(dt));
    b.mesh.position.copy(b.pos);

    let hit = false;

    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      let bestHit = null;
      let bestScore = Infinity;

      for (const hb of e.hitboxes) {
        const center = e.mesh.position.clone().add(hb.offset);
        const dist = b.pos.distanceTo(center);

        let radius = hb.radius;

        if (e.state === "tearing_boards" || e.state === "climbing_in") {
          radius *= 1.28;
        }

        if (dist < radius) {
          const zonePriority =
            hb.name === "head" ? -0.35 :
            hb.name === "body" ? 0 :
            0.25;

          const score = dist / radius + zonePriority;

          if (score < bestScore) {
            bestScore = score;
            bestHit = hb;
          }
        }
      }
      if (bestHit) {
        let damageDone = b.damage * bestHit.multiplier;
        const enemyTypeData = enemyTypes[e.typeKey];

        if (enemyTypeData && enemyTypeData.armor) {
          if (bestHit.name === "body") {
            damageDone *= 0.55;
          }

          if (bestHit.name === "legs") {
            damageDone *= 0.75;
          }

          if (bestHit.name === "head") {
            damageDone *= 1.15;
          }
        }
        e.health -= damageDone;
        showGoblinHit(e, bestHit.name, damageDone);
        hit = true;
        if (e.health <= 0) killEnemy(j);
        break;
      }
    }

    if (hit || b.life <= 0 || b.pos.y < -2) {
      scene.remove(b.mesh);
      bullets.splice(i, 1);
    }
  }
}

function spawnRock(enemy) {

function updateRocks(dt) {
  for (let i = rocks.length - 1; i >= 0; i--) {
    const r = rocks[i];
    r.life -= dt;
    if (r.acid) {
      r.mesh.scale.setScalar(1 + Math.sin(performance.now() * 0.012) * 0.15);
    }
    r.vel.y -= 12 * dt;
    r.pos.add(r.vel.clone().multiplyScalar(dt));
    r.mesh.position.copy(r.pos);

    const dist = r.pos.distanceTo(camera.position);

    if (dist < 0.75 && player.hurtCooldown <= 0) {
      player.health -= r.damage;
      if (r.acid) {
        player.health -= 4;
      }
      player.regenTimer = player.regenDelay;
      player.hurtCooldown = 0.5;
      scene.remove(r.mesh);
      rocks.splice(i, 1);
      continue;
    }

    if (r.life <= 0 || r.pos.y < 0) {
      scene.remove(r.mesh);
      rocks.splice(i, 1);
    }
  }
}

/* =========================================================
   UPDATE ENEMIES
========================================================= */

function killEnemy(index) {
  const e = enemies[index];
  player.coins += e.reward;
  player.score += e.reward;
  dropPickup(e.mesh.position.x, e.mesh.position.z);
  if (e.groundMarker) {
    scene.remove(e.groundMarker);
    if (e.groundMarker.geometry) e.groundMarker.geometry.dispose();
    if (e.groundMarker.material) e.groundMarker.material.dispose();
  }
  if (e.healthBar) {
    scene.remove(e.healthBar);
    e.healthBar.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) { if (o.material.map) o.material.map.dispose(); o.material.dispose(); }
    });
  }
  scene.remove(e.mesh);
  e.mesh.traverse(o => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) {
      if (Array.isArray(o.material)) o.material.forEach(m => { if (m.map) m.map.dispose(); m.dispose(); });
      else { if (o.material.map) o.material.map.dispose(); o.material.dispose(); }
    }
  });
  enemies.splice(index, 1);
}

function showGoblinHit(enemy, hitZone, damage) {
  enemy.hitFlashTimer = 0.12;
  const color = hitZone === "head" ? 0xffff66 : hitZone === "body" ? 0xff5555 : 0xffaa33;
  const label = hitZone === "head"
    ? `HEADSHOT ${Math.floor(damage)}`
    : `${Math.floor(damage)}`;
  const sprite = createDamageSprite(label, color);
  sprite.position.copy(enemy.mesh.position);
  sprite.position.y += hitZone === "head" ? 2.2 : 1.5;
  if (hitZone === "head") {
    sprite.scale.set(2.2, 0.9, 1);
    const head = enemy.mesh.getObjectByName("head");
    if (head) {
      head.rotation.x = -0.35;
    }
  }
  scene.add(sprite);
  floatingTexts.push({ sprite, life: 0.65, vel: new THREE.Vector3((Math.random()-0.5)*0.5,1.2,(Math.random()-0.5)*0.5) });
}

function updateFloatingTexts(dt) {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const f = floatingTexts[i];
    f.life -= dt;
    f.sprite.position.add(f.vel.clone().multiplyScalar(dt));
    f.sprite.material.opacity = Math.max(0, f.life / 0.65);
    if (f.life <= 0) {
      scene.remove(f.sprite);
      if (f.sprite.material.map) f.sprite.material.map.dispose();
      f.sprite.material.dispose();
      floatingTexts.splice(i, 1);
    }
  }
}

function enemyDistance2D(a, b) {
  const dx = a.x - b.x;
  const dz = a.z - b.z;
  return Math.sqrt(dx * dx + dz * dz);
}


function gridKey(gx, gz) {
  return `${gx},${gz}`;
}

function worldToGrid(v) {
  return {
    gx: Math.round(v.x / ENEMY_PATH_GRID_SIZE),
    gz: Math.round(v.z / ENEMY_PATH_GRID_SIZE)
  };
}

function gridToWorld(gx, gz) {
  return new THREE.Vector3(gx * ENEMY_PATH_GRID_SIZE, 0, gz * ENEMY_PATH_GRID_SIZE);
}

function isEnemyPathBlockedAt(x, z, enemy) {
  if (enemy && enemy.state === "climbing_in") return false;
  const type = enemyTypes[enemy.typeKey] || enemyTypes.green;
  const radius = 0.42 * (type.scale || 1);
  const nearAssignedWindow = enemy && enemy.targetWindow && enemy.outsideStand && enemyDistance2D({ x, z }, enemy.outsideStand) < 1.4;

  for (const c of colliders) {
    const inside = x + radius > c.x - c.w / 2 && x - radius < c.x + c.w / 2 && z + radius > c.z - c.d / 2 && z - radius < c.z + c.d / 2;
    if (!inside) continue;
    if (nearAssignedWindow && isPointInWindowOpening(x, z, enemy.targetWindow, 0.35)) continue;
    return true;
  }

  if (typeof obstacleColliders !== "undefined") {
    for (const c of obstacleColliders) {
      const inside = x + radius > c.x - c.w / 2 && x - radius < c.x + c.w / 2 && z + radius > c.z - c.d / 2 && z - radius < c.z + c.d / 2;
      if (inside) return true;
    }
  }

  return false;
}

function hasClearEnemyLine(enemy, a, b) {
  const steps = Math.ceil(a.distanceTo(b) / 0.6);
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    const x = a.x + (b.x - a.x) * t;
    const z = a.z + (b.z - a.z) * t;
    if (isEnemyPathBlockedAt(x, z, enemy)) return false;
  }
  return true;
}

function smoothEnemyPath(path, enemy) {
  if (!path || path.length <= 2) return path || [];
  const result = [];
  let i = 0;
  while (i < path.length) {
    result.push(path[i]);
    let next = i + 1;
    for (let j = path.length - 1; j > i + 1; j--) {
      if (hasClearEnemyLine(enemy, path[i], path[j])) { next = j; break; }
    }
    i = next;
  }
  return result;
}

function findEnemyPath(enemy, startWorld, targetWorld) {
  const start = worldToGrid(startWorld);
  const goal = worldToGrid(targetWorld);
  const open = [start];
  const cameFrom = new Map();
  const gScore = new Map();
  const fScore = new Map();
  const closed = new Set();
  const startKey = gridKey(start.gx, start.gz);
  const goalKey = gridKey(goal.gx, goal.gz);
  const heuristic = (a, b) => Math.abs(a.gx - b.gx) + Math.abs(a.gz - b.gz);
  gScore.set(startKey, 0);
  fScore.set(startKey, heuristic(start, goal));
  const dirs = [{ gx: 1, gz: 0 }, { gx: -1, gz: 0 }, { gx: 0, gz: 1 }, { gx: 0, gz: -1 }, { gx: 1, gz: 1 }, { gx: 1, gz: -1 }, { gx: -1, gz: 1 }, { gx: -1, gz: -1 }];
  let searched = 0;
  while (open.length && searched < ENEMY_PATH_MAX_SEARCH) {
    searched++;
    open.sort((a, b) => (fScore.get(gridKey(a.gx, a.gz)) ?? Infinity) - (fScore.get(gridKey(b.gx, b.gz)) ?? Infinity));
    const current = open.shift();
    const currentKey = gridKey(current.gx, current.gz);
    if (currentKey === goalKey) {
      const path = [];
      let traceKey = currentKey;
      let trace = current;
      while (traceKey !== startKey) {
        path.push(gridToWorld(trace.gx, trace.gz));
        const prev = cameFrom.get(traceKey);
        if (!prev) break;
        trace = prev;
        traceKey = gridKey(trace.gx, trace.gz);
      }
      path.reverse();
      path.push(targetWorld.clone());
      return smoothEnemyPath(path, enemy);
    }
    closed.add(currentKey);
    for (const d of dirs) {
      const neighbor = { gx: current.gx + d.gx, gz: current.gz + d.gz };
      const neighborKey = gridKey(neighbor.gx, neighbor.gz);
      if (closed.has(neighborKey)) continue;
      const world = gridToWorld(neighbor.gx, neighbor.gz);
      if (isEnemyPathBlockedAt(world.x, world.z, enemy)) continue;
      const tentativeG = (gScore.get(currentKey) ?? Infinity) + (d.gx !== 0 && d.gz !== 0 ? 1.4 : 1);
      if (tentativeG < (gScore.get(neighborKey) ?? Infinity)) {
        cameFrom.set(neighborKey, current);
        gScore.set(neighborKey, tentativeG);
        fScore.set(neighborKey, tentativeG + heuristic(neighbor, goal));
        if (!open.some(n => n.gx === neighbor.gx && n.gz === neighbor.gz)) open.push(neighbor);
      }
    }
  }
  return [];
}

function moveGoblinAlongPath(enemy, target, dt) {
  enemy.pathRefreshTimer -= dt;
  const needsPath = !enemy.path || enemy.path.length === 0 || enemy.pathIndex >= enemy.path.length || enemy.pathRefreshTimer <= 0;
  if (needsPath) {
    enemy.path = findEnemyPath(enemy, enemy.mesh.position.clone(), target.clone());
    enemy.pathIndex = 0;
    enemy.pathRefreshTimer = 1.0 + Math.random() * 0.4;
  }
  if (!enemy.path || enemy.path.length === 0) return moveGoblinToward(enemy, target, dt);
  const point = enemy.path[enemy.pathIndex];
  if (!point) return false;
  if (enemyDistance2D(enemy.mesh.position, point) < 0.35) {
    enemy.pathIndex++;
    if (enemy.pathIndex >= enemy.path.length) return false;
  }
  const nextPoint = enemy.path[enemy.pathIndex];
  if (!nextPoint) return false;
  const pos = enemy.mesh.position;
  const dir = nextPoint.clone().sub(pos); dir.y = 0;
  if (dir.lengthSq() < 0.001) return false;
  dir.normalize();
  const step = enemy.speed * dt;
  const nx = pos.x + dir.x * step;
  const nz = pos.z + dir.z * step;
  if (!isEnemyPathBlockedAt(nx, nz, enemy)) {
    pos.x = nx; pos.z = nz; faceGoblinToward(enemy, nextPoint); return true;
  }
  enemy.path = []; enemy.pathIndex = 0; enemy.pathRefreshTimer = 0;
  return false;
}

function moveGoblinToward(enemy, target, dt) {
  const pos = enemy.mesh.position;
  const desired = target.clone().sub(pos);
  desired.y = 0;
  if (desired.length() < 0.001) return false;
  desired.normalize();
  const avoid = new THREE.Vector3();
  for (const other of enemies) {
    if (other === enemy) continue;
    const diff = pos.clone().sub(other.mesh.position);
    diff.y = 0;
    const dist = diff.length();
    if (dist > 0.001 && dist < 1.2) {
      diff.normalize();
      avoid.add(diff.multiplyScalar((1.2 - dist) * 0.75));
    }
  }
  const finalDir = desired.add(avoid).normalize();
  pos.add(finalDir.multiplyScalar(enemy.speed * dt));
  return true;
}

function animateGoblinWalk(enemy, moving) {
  const mesh = enemy.mesh;
  const leftLeg = mesh.getObjectByName("leftLeg");
  const rightLeg = mesh.getObjectByName("rightLeg");
  const leftArm = mesh.getObjectByName("leftArm");
  const rightArm = mesh.getObjectByName("rightArm");
  const head = mesh.getObjectByName("head");
  const body = mesh.getObjectByName("body");
  const swing = moving ? Math.sin(enemy.animTime) : 0;
  const bob = moving ? Math.abs(Math.sin(enemy.animTime)) * 0.07 : 0;
  if (leftLeg) leftLeg.rotation.x = swing * 0.55;
  if (rightLeg) rightLeg.rotation.x = -swing * 0.55;
  if (leftArm) leftArm.rotation.x = -swing * 0.45;
  if (rightArm) rightArm.rotation.x = swing * 0.45;
  if (body) body.position.y = 0.95 + bob;
  if (head) { head.position.y = 1.45 + bob; head.rotation.z = Math.sin(enemy.animTime * 0.5) * 0.08; }
}

function animateGoblinAttack(enemy, dt) {
  if (enemy.attackAnim <= 0) return;
  enemy.attackAnim -= dt;
  const t = enemy.attackAnim / 0.35;
  const punch = Math.sin((1 - t) * Math.PI);
  const leftArm = enemy.mesh.getObjectByName("leftArm");
  const rightArm = enemy.mesh.getObjectByName("rightArm");
  if (leftArm) { leftArm.rotation.x = -1.2 * punch; leftArm.rotation.z = 0.7; }
  if (rightArm) { rightArm.rotation.x = -1.2 * punch; rightArm.rotation.z = -0.7; }
  enemy.mesh.position.y += punch * 0.035;
}
function shakeWindowBoards(win, intensity = 1) {
  const t = performance.now() * 0.035;

  for (let i = 0; i < win.boardMeshes.length; i++) {
    const b = win.boardMeshes[i];
    const baseY = b.userData.baseY || b.position.y;
    const baseZ = b.userData.baseZ || b.position.z;
    const baseRotZ = b.userData.baseRotZ || b.rotation.z;
    b.position.y = baseY + Math.sin(t + i * 1.7) * 0.015 * intensity;
    b.position.z = baseZ + Math.cos(t + i * 1.3) * 0.035 * intensity;
    b.rotation.z = baseRotZ + Math.sin(t + i) * 0.035 * intensity;
  }
}
function animateGoblinTearing(enemy, dt) {
  if (enemy.tearAnim <= 0) return;
  enemy.tearAnim -= dt;
  const claw = Math.sin(performance.now() * 0.035);
  const leftArm = enemy.mesh.getObjectByName("leftArm");
  const rightArm = enemy.mesh.getObjectByName("rightArm");
  if (leftArm) { leftArm.rotation.x = -0.9 + claw * 0.4; leftArm.rotation.z = 0.9; }
  if (rightArm) { rightArm.rotation.x = -0.9 - claw * 0.4; rightArm.rotation.z = -0.9; }
}
function animateGoblinClimb(enemy, dt) {
  const leftArm = enemy.mesh.getObjectByName("leftArm");
  const rightArm = enemy.mesh.getObjectByName("rightArm");
  const leftLeg = enemy.mesh.getObjectByName("leftLeg");
  const rightLeg = enemy.mesh.getObjectByName("rightLeg");
  const head = enemy.mesh.getObjectByName("head");
  const t = performance.now() * 0.018;
  const pull = Math.sin(t);
  if (leftArm) { leftArm.rotation.x = -1.35 + pull * 0.35; leftArm.rotation.z = 0.85; }
  if (rightArm) { rightArm.rotation.x = -1.35 - pull * 0.35; rightArm.rotation.z = -0.85; }
  if (leftLeg) leftLeg.rotation.x = 0.95 - pull * 0.25;
  if (rightLeg) rightLeg.rotation.x = -0.95 + pull * 0.25;
  if (head) { head.rotation.x = -0.25; head.rotation.z = pull * 0.08; }
}

function updateGoblinClimbThroughWindow(enemy, win, dt) {
  if (!enemy.climbData) {
    enemy.climbData = {
      duration: 1.15,
      t: 0,
      start: (enemy.outsideStand || getWindowOutsideStandPosition(win)).clone(),
      middle: new THREE.Vector3(win.x, 0.75, win.z),
      end: (enemy.insideStand || getWindowInsideStandPosition(win)).clone()
    };
  }
  const cd = enemy.climbData;
  cd.t += dt;
  const alpha = Math.min(1, cd.t / cd.duration);
  const smooth = alpha * alpha * (3 - 2 * alpha);
  if (smooth < 0.5) {
    const a = smooth / 0.5;
    enemy.mesh.position.lerpVectors(cd.start, cd.middle, a);
  } else {
    const a = (smooth - 0.5) / 0.5;
    enemy.mesh.position.lerpVectors(cd.middle, cd.end, a);
  }
  enemy.mesh.rotation.x = Math.sin(alpha * Math.PI) * 0.5;
  faceGoblinToward(enemy, cd.end);
  animateGoblinClimb(enemy, dt);
  if (alpha >= 1) {
    enemy.mesh.position.copy(cd.end);
    enemy.mesh.position.y = 0;
    enemy.mesh.rotation.x = 0;
    enemy.climbData = null;
    enemy.state = "inside";
  }
}

function isEnemyStillOutside(enemy) {
  return enemy.state === "walking_to_window" || enemy.state === "tearing_boards" || enemy.state === "climbing_in";
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const type = enemyTypes[e.typeKey];
    let moved = false;
    e.animTime += dt * e.speed * 4;

    e.attackCooldown -= dt;

    if (e.targetWindow && !roomsUnlocked[e.targetWindow.roomName]) {
      const validWindows = getUnlockedWindows();
      if (validWindows.length) {
        e.targetWindow = validWindows[Math.floor(Math.random() * validWindows.length)];
        e.outsideStand = getWindowOutsideStandPosition(e.targetWindow);
        e.insideStand = getWindowInsideStandPosition(e.targetWindow);
        e.path = [];
        e.pathIndex = 0;
        e.pathRefreshTimer = 0;
        e.state = "walking_to_window";
      }
    }

    if (!e.targetWindow || !windows.includes(e.targetWindow)) {
      const validWindows = getUnlockedWindows();
      if (!validWindows.length) continue;
      e.targetWindow = validWindows[Math.floor(Math.random() * validWindows.length)];
      e.outsideStand = getWindowOutsideStandPosition(e.targetWindow);
      e.insideStand = getWindowInsideStandPosition(e.targetWindow);
    }

    if ((e.state === "walking_to_window" || e.state === "tearing_boards") && e.targetWindow) {
      const inward = getWindowInwardVector(e.targetWindow);
      const dx = e.mesh.position.x - e.targetWindow.x;
      const dz = e.mesh.position.z - e.targetWindow.z;
      const dot = dx * inward.x + dz * inward.z;

      if (dot > 0.15) {
        const stand = e.outsideStand || getWindowOutsideStandPosition(e.targetWindow);
        e.mesh.position.x = stand.x;
        e.mesh.position.z = stand.z;
        e.mesh.position.y = 0;
      }
    }

    if (e.state === "walking_to_window") {
      const w = e.targetWindow;
      const target = e.outsideStand || getWindowOutsideStandPosition(w);
      const ARRIVED_AT_WINDOW_DIST = 0.65;
      const distToTarget = enemyDistance2D(e.mesh.position, target);
      const hasArrivedAtWindow = distToTarget <= ARRIVED_AT_WINDOW_DIST;

      if (!hasArrivedAtWindow) {
        moved = moveGoblinAlongPath(e, target, dt);
        faceGoblinToward(e, new THREE.Vector3(w.x, 0, w.z));
      } else {
        e.mesh.position.x = target.x;
        e.mesh.position.z = target.z;
        e.mesh.position.y = 0;
        e.path = [];
        e.pathIndex = 0;
        faceGoblinToward(e, new THREE.Vector3(w.x, 0, w.z));

        const windowBoards = Math.max(0, w.boards || 0);
        if (windowBoards > 0) {
          e.state = "tearing_boards";
          e.tearAnim = 0.4;
        } else {
          e.state = "climbing_in";
          e.climbData = null;
        }
      }
      animateGoblinWalk(e, moved);
      continue;
    }
    if (e.state === "tearing_boards") {
      const w = e.targetWindow;
      const stand = e.outsideStand || getWindowOutsideStandPosition(w);
      e.mesh.position.x = stand.x;
      e.mesh.position.z = stand.z;
      e.mesh.position.y = 0;
      faceGoblinToward(e, new THREE.Vector3(w.x, 0, w.z));
      e.tearAnim = 0.4;
      animateGoblinTearing(e, dt);
      shakeWindowBoards(w, 1);
      w.breakTimer += dt;
      if (w.breakTimer >= 1.25) {
        w.breakTimer = 0;
        if (w.boards > 0) { w.boards--; rebuildWindowBoards(w); }
        if (w.boards <= 0) { e.state = "climbing_in"; e.climbData = null; }
      }
      continue;
    }
    if (e.state === "climbing_in") {
      updateGoblinClimbThroughWindow(e, e.targetWindow, dt);
      continue;
    }
    if (e.state === "inside") {
      const dx = player.pos.x - e.mesh.position.x;
      const dz = player.pos.z - e.mesh.position.z;
      e.mesh.rotation.y = Math.atan2(dx, dz);
      const dir = player.pos.clone().sub(e.mesh.position);
      dir.y = 0;

      const dist = dir.length();

      if (type.leaper) {
        e.leapCooldown -= dt;

        if (e.leapCooldown <= 0 && dist > 2.5 && dist < 9) {
          const leapDir = player.pos.clone().sub(e.mesh.position);
          leapDir.y = 0;
          leapDir.normalize();

          const leapX = e.mesh.position.x + leapDir.x * 2.2;
          const leapZ = e.mesh.position.z + leapDir.z * 2.2;

          if (!isEnemyPathBlockedAt(leapX, leapZ, e)) {
            e.mesh.position.x = leapX;
            e.mesh.position.z = leapZ;
          }
          e.mesh.position.y = 0.35;

          e.leapAnim = 0.35;
          e.leapCooldown = 2.3 + Math.random() * 1.5;

          faceGoblinToward(e, player.pos);
        }

        if (e.leapAnim > 0) {
          e.leapAnim -= dt;
          e.mesh.position.y = Math.max(0, Math.sin((e.leapAnim / 0.35) * Math.PI) * 0.55);
        } else {
          e.mesh.position.y = 0;
        }
      }

      if (type.thrower && dist < 16 && dist > 5) {
        e.throwCooldown -= dt;
        if (e.throwCooldown <= 0) {
          if (type.acid) {
            spawnAcid(e);
          } else {
            spawnRock(e);
          }
          e.throwCooldown = 3.2 + Math.random() * 2;
        }
      }

      if (dist > 1.1) {
        dir.normalize();
        const step = e.speed * dt;
        const nx = e.mesh.position.x + dir.x * step;
        const nz = e.mesh.position.z + dir.z * step;
        if (!isEnemyPathBlockedAt(nx, nz, e)) {
          e.mesh.position.x = nx;
          e.mesh.position.z = nz;
          moved = true;
        } else {
          moved = moveGoblinToward(e, player.pos, dt);
        }
      } else {
        if (e.attackCooldown <= 0 && player.hurtCooldown <= 0) {
          player.health -= e.damage;
          player.regenTimer = player.regenDelay;
          player.hurtCooldown = 0.45;
          e.attackCooldown = 0.75;
          e.attackAnim = 0.35;
        }
      }
    }
    animateGoblinWalk(e, moved);
    animateGoblinAttack(e, dt);
    animateGoblinTearing(e, dt);
    if (e.hitFlashTimer > 0) {
      e.hitFlashTimer -= dt;
      e.mesh.traverse(o => { if (o.isMesh && o.material && o.material.emissive) o.material.emissive.setHex(0x661111); });
    } else {
      e.mesh.traverse(o => { if (o.isMesh && o.material && o.material.emissive) o.material.emissive.setHex(0x000000); });
    }

    if (e.groundMarker) {
      e.groundMarker.position.x = e.mesh.position.x;
      e.groundMarker.position.z = e.mesh.position.z;
    }

    // health bar
    if (!e.healthBar) {
      const bg = new THREE.Mesh(
        new THREE.PlaneGeometry(1.25, 0.12),
        new THREE.MeshBasicMaterial({ color: 0x220000, side: THREE.DoubleSide })
      );
      const fg = new THREE.Mesh(
        new THREE.PlaneGeometry(1.2, 0.08),
        new THREE.MeshBasicMaterial({ color: 0xff3333, side: THREE.DoubleSide })
      );
      fg.name = "healthFill";
      e.healthBar = new THREE.Group();
      fg.position.z = -0.01;
      e.healthBar.add(bg, fg);
      scene.add(e.healthBar);
    }

    e.healthBar.position.copy(e.mesh.position);
    e.healthBar.position.y += 2.25 * type.scale;
    e.healthBar.lookAt(camera.position);
    const pct = Math.max(0, Math.min(1, e.health / e.maxHealth));
    const fill = e.healthBar.getObjectByName("healthFill");
    if (fill) { fill.scale.x = pct; fill.position.x = -0.6 * (1 - pct); }
  }
}
function updateHealthRegen(dt) {
  if (!player.alive) return;
  if (player.regenTimer > 0) { player.regenTimer -= dt; return; }
  if (player.health > 0 && player.health < player.maxHealth) {
    player.health = Math.min(player.maxHealth, player.health + player.regenRate * dt);
  }
}

/* =========================================================
   PICKUP UPDATE
========================================================= */

function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.life -= dt;
    p.mesh.rotation.y += dt * 2.2;
    p.mesh.position.y = 0.35 + Math.sin(performance.now() * 0.004 + i) * 0.08;

    if (p.mesh.position.distanceTo(camera.position) < 1.4) {
      if (p.type === "ammo") {
        currentGun.reserve = Math.min(currentGun.reserveMax, currentGun.reserve + Math.floor(currentGun.clipSize * 1.5));
      } else {
        player.coins += 150;
      }

      scene.remove(p.mesh);
      pickups.splice(i, 1);
      continue;
    }

    if (p.life <= 0) {
      scene.remove(p.mesh);
      pickups.splice(i, 1);
    }
  }
}

/* =========================================================
   WAVE SYSTEM
========================================================= */

function updateWave(dt) {
  if (!waveInProgress && enemies.length === 0) {
    startWave();
  }

  if (waveInProgress) {
    waveSpawnTimer -= dt;

    if (waveSpawnTimer <= 0 && waveSpawnLeft > 0) {
      spawnEnemy(chooseEnemyType());
      waveSpawnLeft--;
      waveSpawnTimer = Math.max(0.35, 1.25 - player.wave * 0.04);
    }

    if (waveSpawnLeft <= 0 && enemies.length === 0) {
      waveInProgress = false;
      player.wave++;
      player.coins += 400 + player.wave * 50;
    }
  }
}

/* =========================================================
   GUN UPDATE
========================================================= */

function updateGun(dt) {
  if (currentGun.cooldown > 0) currentGun.cooldown -= dt;

  if (currentGun.reloading) {
    currentGun.reloadTimer -= dt;

    // reload animation
    gunView.rotation.x = Math.sin(currentGun.reloadTimer * 12) * 0.12;
    gunView.position.y = -0.05;

    if (currentGun.reloadTimer <= 0) {
      const need = currentGun.clipSize - currentGun.clip;
      const taken = Math.min(need, currentGun.reserve);
      currentGun.clip += taken;
      currentGun.reserve -= taken;
      currentGun.reloading = false;
      gunView.rotation.x = 0;
      gunView.position.y = 0;
    }
  } else {
    gunView.rotation.x *= 0.85;
    gunView.position.y *= 0.85;
  }

  if (currentGun.automatic && keys["mouse"]) {
    shoot();
  }
}

document.addEventListener("mousedown", () => {
  keys["mouse"] = true;
});

document.addEventListener("mouseup", () => {
  keys["mouse"] = false;
});

/* =========================================================
   HUD
========================================================= */

function updateHud() {
  const nearest = getNearestInteractable();
  let msg = "";

  if (nearest) {
    if (nearest.type === "window") {
      if (nearest.boards < nearest.maxBoards) {
        msg = `Press E to board window +$10 (${nearest.boards}/${nearest.maxBoards})`;
      } else {
        msg = `Window fully boarded (${nearest.boards}/${nearest.maxBoards})`;
      }
    }

    if (nearest.type === "door") {
      msg = `Press E to ${nearest.label} - $${nearest.cost}`;
      if (player.coins < nearest.cost) msg += " | Not enough coins";
    }

    if (nearest.type === "wallGun") {
      if (ownedGuns[nearest.key]) {
        msg = `Press E to equip ${nearest.name}`;
      } else {
        msg = `Press E to buy ${nearest.name} - $${nearest.cost}`;
        if (player.coins < nearest.cost) msg += " | Not enough coins";
      }
    }

    if (nearest.type === "ammo") {
      if (nearest.key === currentGunKey) {
        msg = `Press E to buy ammo - $${guns[nearest.key].ammoCost}`;
      } else {
        msg = `Ammo station for ${guns[nearest.key].name}`;
      }
    }
  }

  centerText.textContent = msg;

  hud.innerHTML = `
    Health: ${Math.max(0, Math.floor(player.health))}<br>
    Coins: $${player.coins}<br>
    Score: ${player.score}<br>
    Wave: ${player.wave}<br>
    Gun: ${currentGun.name}<br>
    Ammo: ${currentGun.clip}/${currentGun.reserve}${currentGun.reloading ? " — Reloading..." : ""}
  `;
  const hpPct = Math.max(0, Math.min(1, player.health / player.maxHealth));
  playerHealthFill.style.width = `${hpPct * 100}%`;
  playerHealthText.textContent = `${Math.ceil(player.health)} / ${player.maxHealth}`;
  if (player.health < 25) {
    const pulse = 0.18 + Math.sin(performance.now() * 0.008) * 0.07;
    damageTint.style.background = `rgba(180, 0, 0, ${pulse})`;
  } else {
    damageTint.style.background = "rgba(180, 0, 0, 0)";
  }
}

/* =========================================================
   GAME OVER
========================================================= */

function checkGameOver() {
  if (player.health <= 0 && player.alive) {
    player.alive = false;
    centerText.innerHTML = "You were eaten by goblins. Refresh to restart.";
    document.exitPointerLock();
  }
}

/* =========================================================
   MAIN LOOP
========================================================= */

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);

  updatePendingGamepadMapping();
  if (player.alive) {
    updatePlayer(dt);
    updateGun(dt);
    updateWave(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updateRocks(dt);
    updateHealthRegen(dt);
    player.health = Math.max(0, Math.min(player.maxHealth, player.health));
    updatePickups(dt);
    updateFloatingTexts(dt);
    checkGameOver();
  }

  updateHud();
  renderer.render(scene, camera);
}

animate();

/* =========================================================
   RESIZE
========================================================= */

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
