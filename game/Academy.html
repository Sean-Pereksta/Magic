<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Goblin Zombies 3D</title>
<style>
  html, body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
    color: white;
  }

  #hud {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 10;
    font-size: 18px;
    text-shadow: 2px 2px 4px black;
    pointer-events: none;
  }

  #centerText {
    position: fixed;
    bottom: 90px;
    width: 100%;
    text-align: center;
    font-size: 22px;
    z-index: 10;
    text-shadow: 2px 2px 5px black;
    pointer-events: none;
  }

  #crosshair {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 18px;
    height: 18px;
    margin-left: -9px;
    margin-top: -9px;
    z-index: 10;
    pointer-events: none;
  }

  #crosshair:before,
  #crosshair:after {
    content: "";
    position: absolute;
    background: white;
    box-shadow: 0 0 4px black;
  }
  #playerHealthWrap {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 380px;
    height: 28px;
    border: 3px solid white;
    background: rgba(40, 0, 0, 0.75);
    z-index: 12;
    box-shadow: 0 0 8px black;
  }

  #playerHealthFill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #b60000, #ff3333);
    transition: width 0.15s linear;
  }

  #playerHealthText {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    text-shadow: 2px 2px 4px black;
    pointer-events: none;
  }

  #damageTint {
    position: fixed;
    inset: 0;
    background: rgba(180, 0, 0, 0);
    pointer-events: none;
    z-index: 9;
    transition: background 0.2s linear;
  }

  #crosshair:before {
    left: 8px;
    top: 0;
    width: 2px;
    height: 18px;
  }

  #crosshair:after {
    left: 0;
    top: 8px;
    width: 18px;
    height: 2px;
  }

  #startScreen {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #243018, #050705);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    text-align: center;
  }

  #startBox {
    background: rgba(0,0,0,0.75);
    border: 3px solid #78945a;
    padding: 30px;
    border-radius: 12px;
    max-width: 700px;
    max-height: 90vh;
    overflow: hidden;
  }

  #controlsPanel {
    display: none;
    margin-top: 12px;
    text-align: left;
    max-height: 62vh;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px;
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 10px;
    background: rgba(0,0,0,0.55);
  }

  #controlsPanel::-webkit-scrollbar { width: 10px; }
  #controlsPanel::-webkit-scrollbar-track { background: rgba(255,255,255,0.12); border-radius: 10px; }
  #controlsPanel::-webkit-scrollbar-thumb { background: #78945a; border-radius: 10px; }
  .controlPlayerCard { border: 1px solid rgba(255,255,255,0.35); border-radius: 10px; padding: 12px; margin: 12px 0; background: rgba(20,25,15,0.82); }
  .controlRow { display: grid; grid-template-columns: 170px 1fr auto; gap: 8px; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.12); }
  .controlRow:last-child { border-bottom: none; }
  .controlLabel { font-weight: bold; color: #d8f0bc; }
  .controlValue { color: #ffffff; opacity: 0.92; }
  .controlSmallBtn { padding: 6px 9px; font-size: 13px; border-radius: 6px; }
  .controlTopActions { position: sticky; top: 0; z-index: 2; background: rgba(0,0,0,0.85); padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.25); }
  .mappingHint { color: #ffd27a; font-size: 14px; margin-top: 6px; }

  button {
    padding: 12px 20px;
    font-size: 18px;
    background: #5f7d37;
    color: white;
    border: 2px solid white;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover {
    background: #7da849;
  }

#splitDivider { position: fixed; left:0; top:50%; width:100%; height:3px; background: rgba(255,255,255,0.65); z-index:15; display:none; }
.coopTint { position: fixed; left:0; width:100%; height:50%; pointer-events:none; z-index:9; background: rgba(180,0,0,0); display:none;}
#p1DamageTint { top:0; }
#p2DamageTint { bottom:0; }
.coopHealthBox { position: fixed; top:12px; width:280px; height:24px; border:2px solid white; background: rgba(40,0,0,0.75); z-index:12; display:none;}
#p1HealthBox { left:12px; }
#p2HealthBox { right:12px; }
#p1HealthFill,#p2HealthFill{height:100%; background:linear-gradient(90deg,#26d14e,#8af07e); width:100%;}

</style>
</head>
<body>

<div id="hud"></div>
<div id="playerHealthWrap">
  <div id="playerHealthFill"></div>
  <div id="playerHealthText">100 / 100</div>
</div>
<div id="centerText"></div>
<div id="crosshair"></div>
<div id="damageTint"></div>
<div id="splitDivider"></div>
<div id="p1DamageTint" class="coopTint"></div>
<div id="p2DamageTint" class="coopTint"></div>
<div id="p1HealthBox" class="coopHealthBox"><div id="p1HealthFill"></div></div>
<div id="p2HealthBox" class="coopHealthBox"><div id="p2HealthFill"></div></div>

<div id="startScreen">
  <div id="startBox">
    <h1>Goblin Zombies 3D</h1>
    <p>
      Survive waves of goblins. Board windows, buy doors, purchase wall guns, and keep your ammo stocked.
    </p>
    <p>
      WASD move · Mouse look · Click shoot · R reload · E interact/buy/board · Shift sprint · Space jump
    </p>
    <button id="soloBtn">Start Solo</button>
    <button id="twoPlayerBtn">Start 2 Player Split Screen</button>
    <button id="controlsBtn">Controls / Controller Mapping</button>
    <div id="gameSettingsPanel" style="margin-top:14px; padding:10px; border:1px solid rgba(255,255,255,0.35); border-radius:8px; background:rgba(0,0,0,0.35); text-align:left;">
      <h3>Game Settings</h3>
      <label>Mouse Sensitivity: <input id="mouseSensitivityInput" type="range" min="0.4" max="3.0" step="0.05"> <span id="mouseSensitivityValue"></span></label>
      <br><br>
      <label>Controller Look Sensitivity: <input id="controllerSensitivityInput" type="range" min="0.8" max="6.0" step="0.1"> <span id="controllerSensitivityValue"></span></label>
      <br><br>
      <button id="fullscreenBtn">Fullscreen</button>
    </div>
    <div id="controlsPanel"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
/* =========================================================
   BASIC THREE SETUP
========================================================= */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fc7df);
scene.fog = new THREE.Fog(0xbfd6e6, 65, 210);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  500
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const clock = new THREE.Clock();

const hud = document.getElementById("hud");
const centerText = document.getElementById("centerText");
const playerHealthFill = document.getElementById("playerHealthFill");
const playerHealthText = document.getElementById("playerHealthText");
const damageTint = document.getElementById("damageTint");
const startScreen = document.getElementById("startScreen");
const soloBtn = document.getElementById("soloBtn");
const twoPlayerBtn = document.getElementById("twoPlayerBtn");
const controlsBtn = document.getElementById("controlsBtn");
const controlsPanel = document.getElementById("controlsPanel");

const PERF = {
  enabled: true,

  maxEnemiesRendered: 28,
  maxParticles: 80,
  maxBullets: 90,
  maxRocks: 35,

  pathfindBudgetPerFrame: 2,
  enemyThinkIntervalNear: 0.08,
  enemyThinkIntervalFar: 0.25,

  disableProjectileLights: true,
  disableSmallObjectShadows: true,
  disableGrass: true,
  reduceOutsideDecor: true,
  reduceDamageNumbers: true,
  healthBarsOnlyWhenAiming: true,

  farEnemyUpdateDistance: 85,
  farEnemyPathRefresh: 1.8,
  nearEnemyPathRefresh: 0.75,

  renderDistanceFurniture: 65,
  renderDistanceOutside: 70,
  renderDistanceSigns: 40
};

/* =========================================================
   LIGHTING
========================================================= */

const ambient = new THREE.AmbientLight(0x888877, 0.72);
scene.add(ambient);

const hemi = new THREE.HemisphereLight(0xdde8ff, 0x2d2418, 0.55);
scene.add(hemi);

const floatingTexts = [];
const renderCullables = [];
const CULL_SETTINGS = { enemyFarDistance: PERF.enabled ? PERF.farEnemyUpdateDistance : 95, enemyHealthBarDistance: 55, furnitureDistance: PERF.enabled ? PERF.renderDistanceFurniture : 80, outsideDetailDistance: PERF.enabled ? PERF.renderDistanceOutside : 95, pickupDistance: 65, particleDistance: 75, wallGunDistance: PERF.enabled ? PERF.renderDistanceSigns : 70, textSpriteDistance: 55, updateInterval: 0.25 };
const GOBLIN_FACE_FLIP = Math.PI;
const MAX_FLOATING_EFFECTS = PERF.enabled ? PERF.maxParticles : 140;
let cullUpdateTimer = 0;
let pathfindsThisFrame = 0;
const MAX_PATHFINDS_PER_FRAME = PERF.enabled ? PERF.pathfindBudgetPerFrame : 4;
const moon = new THREE.DirectionalLight(0xbecfff, 0.75);
moon.position.set(30, 60, -25);
moon.castShadow = true;
scene.add(moon);

function addLamp(x, y, z, color = 0xffc46b, intensity = 1.5) {
  if (PERF.enabled && PERF.reduceOutsideDecor && Math.abs(x) + Math.abs(z) > 55 && Math.random() < 0.35) return;
  const light = new THREE.PointLight(color, intensity, 18);
  light.position.set(x, y, z);
  light.castShadow = false;
  scene.add(light);

  const bulb = new THREE.Mesh(
    new THREE.SphereGeometry(0.18, 12, 12),
    new THREE.MeshBasicMaterial({ color })
  );
  bulb.position.copy(light.position);
  scene.add(bulb);
}

/* =========================================================
   MATERIALS
========================================================= */

const mats = {
  floor: new THREE.MeshStandardMaterial({ color: 0x2b2720, roughness: 0.9 }),
  wall: new THREE.MeshStandardMaterial({ color: 0x3b382f, roughness: 0.95 }),
  trim: new THREE.MeshStandardMaterial({ color: 0x5c4a33, roughness: 0.9 }),
  board: new THREE.MeshStandardMaterial({ color: 0x8a5a2b, roughness: 0.8 }),
  door: new THREE.MeshStandardMaterial({ color: 0x55331c, roughness: 0.8 }),
  metal: new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.5, roughness: 0.35 }),
  darkMetal: new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.6, roughness: 0.3 }),
  muzzle: new THREE.MeshBasicMaterial({ color: 0xffe48a }),
  coin: new THREE.MeshStandardMaterial({ color: 0xffcc33, metalness: 0.7, roughness: 0.2 }),
  ammo: new THREE.MeshStandardMaterial({ color: 0x38e85f, emissive: 0x0a4414 }),
  health: new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x441010 }),
};

/* =========================================================
   PLAYER
========================================================= */

const player = {
  pos: new THREE.Vector3(0, 1.7, 0),
  vel: new THREE.Vector3(),
  yaw: 0,
  pitch: 0,
  speed: 8.6,
  sprintSpeed: 13.8,
  health: 100,
  maxHealth: 100,
  coins: 500,
  score: 0,
  wave: 1,
  alive: true,
  interactCooldown: 0,
  hurtCooldown: 0,
  regenDelay: 4.0,
  regenTimer: 0,
  regenRate: 7.5,
  onGround: true,
  jumpVelocity: 7.8,
  gravity: 20,
  airControl: 0.82,
  playerHeight: 1.7,
  groundY: 1.7
};

camera.position.copy(player.pos);


const DEFAULT_CONTROL_MAPPINGS = {
  p1: { inputSource: "keyboardMouse", gamepadIndex: 0, movement: { type: "keyboard", preset: "wasd", keys: { up: "w", down: "s", left: "a", right: "d" } }, look: { type: "mouse", sensitivity: 1.0, invertY: false }, buttons: { shoot: { type: "mouse", button: 0, label: "Left Mouse" }, reload: { type: "keyboard", key: "r", label: "R" }, interact: { type: "keyboard", key: "e", label: "E" }, sprint: { type: "keyboard", key: "shift", label: "Shift" }, jump: { type: "keyboard", key: " ", label: "Space" }, pause: { type: "keyboard", key: "escape", label: "Esc" }, swapWeapon: { type: "keyboard", key: "q", label: "Q" } }, controller: { moveStick: { xAxis: 0, yAxis: 1, deadzone: 0.18 }, lookStick: { xAxis: 2, yAxis: 3, deadzone: 0.15 }, lookSensitivity: 2.4, invertY: false, buttons: { shoot: { type: "button", index: 7, label: "RT / R2" }, reload: { type: "button", index: 2, label: "X / Square" }, interact: { type: "button", index: 0, label: "A / Cross" }, sprint: { type: "button", index: 10, label: "Left Stick Click" }, jump: { type: "button", index: 1, label: "B / Circle" }, pause: { type: "button", index: 9, label: "Start / Menu" }, swapWeapon: { type: "button", index: 5, label: "RB / R1" } } } },
  p2: { inputSource: "controller", gamepadIndex: 1, movement: { type: "keyboard", preset: "arrows", keys: { up: "arrowup", down: "arrowdown", left: "arrowleft", right: "arrowright" } }, look: { type: "mouse", sensitivity: 1.0, invertY: false }, buttons: { shoot: { type: "keyboard", key: "enter", label: "Enter" }, reload: { type: "keyboard", key: ".", label: "." }, interact: { type: "keyboard", key: ",", label: "," }, sprint: { type: "keyboard", key: "/", label: "/" }, jump: { type: "keyboard", key: "right shift", label: "Right Shift" }, pause: { type: "keyboard", key: "backspace", label: "Backspace" }, swapWeapon: { type: "keyboard", key: "m", label: "M" } }, controller: { moveStick: { xAxis: 0, yAxis: 1, deadzone: 0.18 }, lookStick: { xAxis: 2, yAxis: 3, deadzone: 0.15 }, lookSensitivity: 2.4, invertY: false, buttons: { shoot: { type: "button", index: 7, label: "RT / R2" }, reload: { type: "button", index: 2, label: "X / Square" }, interact: { type: "button", index: 0, label: "A / Cross" }, sprint: { type: "button", index: 10, label: "Left Stick Click" }, jump: { type: "button", index: 1, label: "B / Circle" }, pause: { type: "button", index: 9, label: "Start / Menu" }, swapWeapon: { type: "button", index: 5, label: "RB / R1" } } } }
};
const CONTROL_ACTIONS=[["shoot","Shoot"],["reload","Reload"],["interact","Interact / Buy / Board / Open"],["sprint","Sprint"],["jump","Jump"],["swapWeapon","Swap Weapon"],["pause","Pause / Menu"]];
function cloneDefaultMappings(){return JSON.parse(JSON.stringify(DEFAULT_CONTROL_MAPPINGS));}
function mergeControlMapping(base,saved){return {...base,...saved,movement:{...base.movement,...(saved.movement||{}),keys:{...base.movement.keys,...((saved.movement||{}).keys||{})}},look:{...base.look,...(saved.look||{})},buttons:{...base.buttons,...(saved.buttons||{})},controller:{...base.controller,...(saved.controller||{}),moveStick:{...base.controller.moveStick,...((saved.controller||{}).moveStick||{})},lookStick:{...base.controller.lookStick,...((saved.controller||{}).lookStick||{})},buttons:{...base.controller.buttons,...((saved.controller||{}).buttons||{})}}};}
function loadControlMappings(){try{const raw=localStorage.getItem("goblinZombiesControlMappings");if(!raw) return cloneDefaultMappings();const parsed=JSON.parse(raw),d=cloneDefaultMappings();return {p1:mergeControlMapping(d.p1,parsed.p1||{}),p2:mergeControlMapping(d.p2,parsed.p2||{})};}catch(err){console.warn("Failed to load control mappings. Using defaults.",err);return cloneDefaultMappings();}}
let controlMappings=loadControlMappings();
const DEFAULT_GAME_SETTINGS = {
  mouseSensitivity: 1.25,
  controllerLookSensitivity: 2.9,
  turnSpeedMultiplier: 1.0
};
function loadGameSettings() {
  try {
    const raw = localStorage.getItem("goblinZombiesGameSettings");
    if (!raw) return { ...DEFAULT_GAME_SETTINGS };
    return { ...DEFAULT_GAME_SETTINGS, ...JSON.parse(raw) };
  } catch (err) {
    console.warn("Failed to load game settings.", err);
    return { ...DEFAULT_GAME_SETTINGS };
  }
}
let gameSettings = loadGameSettings();
function saveGameSettings() {
  localStorage.setItem("goblinZombiesGameSettings", JSON.stringify(gameSettings));
}
function saveControlMappings(){localStorage.setItem("goblinZombiesControlMappings",JSON.stringify(controlMappings));}
function resetControlMappings(){controlMappings=cloneDefaultMappings();saveControlMappings();refreshGamepadSelects();renderControlsMappingUI();}
let pendingMapping=null; const mouseButtons={}; const previousActions={p1:{},p2:{}};
function setGlobalMappingStatus(t){const el=document.getElementById("globalMappingStatus"); if(el) el.textContent=t;}
function getMappedGamepad(playerKey){const m=controlMappings[playerKey]; if(!navigator.getGamepads) return null; const pads=navigator.getGamepads(); return pads[m.gamepadIndex]||null;}
function readAxis(v,d){return Math.abs(v)<d?0:v;}
function getPlayerMoveInput(playerKey){const map=controlMappings[playerKey]; if(map.inputSource==="controller"){const pad=getMappedGamepad(playerKey); if(!pad) return {x:0,y:0}; const s=map.controller.moveStick; return {x:readAxis(pad.axes[s.xAxis]||0,s.deadzone),y:readAxis(pad.axes[s.yAxis]||0,s.deadzone)};} const k=map.movement.keys; let x=0,y=0; if(keys[k.up]) y-=1; if(keys[k.down]) y+=1; if(keys[k.left]) x-=1; if(keys[k.right]) x+=1; return {x,y};}
function getPlayerLookInput(playerKey){const map=controlMappings[playerKey]; if(map.inputSource!=="controller") return {x:0,y:0}; const pad=getMappedGamepad(playerKey); if(!pad) return {x:0,y:0}; const s=map.controller.lookStick; return {x:readAxis(pad.axes[s.xAxis]||0,s.deadzone),y:readAxis(pad.axes[s.yAxis]||0,s.deadzone)};}
function isKeyboardMouseActionPressed(playerKey,action){const b=controlMappings[playerKey].buttons[action]; if(!b) return false; if(b.type==="keyboard") return !!keys[b.key]; if(b.type==="mouse") return !!mouseButtons[b.button]; return false;}
function isControllerActionPressed(playerKey,action){const pad=getMappedGamepad(playerKey),b=controlMappings[playerKey].controller.buttons[action]; return !!(pad&&b&&pad.buttons[b.index]?.pressed);}
function isPlayerActionPressed(playerKey,action){return controlMappings[playerKey].inputSource==="controller"?isControllerActionPressed(playerKey,action):isKeyboardMouseActionPressed(playerKey,action);}
function wasPlayerActionJustPressed(playerKey,action){const now=isPlayerActionPressed(playerKey,action),before=previousActions[playerKey][action]||false; previousActions[playerKey][action]=now; return now&&!before;}
function beginMapping(playerNumber){if(controlsPanel){controlsPanel.style.display="block";renderControlsMappingUI();} setGlobalMappingStatus(`Choose controls for Player ${playerNumber}.`);}
function beginSimpleButtonMapping(playerKey,action){const map=controlMappings[playerKey]; pendingMapping={mode:map.inputSource==="controller"?"controllerButton":"keyboardOrMouseButton",playerKey,action,startedAt:performance.now()}; setGlobalMappingStatus(map.inputSource==="controller"?`Press a controller button for ${action}...`:`Press a keyboard key or mouse button for ${action}...`);}
function beginMovementKeyMapping(playerKey){pendingMapping={mode:"movementKeys",playerKey,step:0,keys:{},order:[["up","Move Forward"],["down","Move Backward"],["left","Move Left"],["right","Move Right"]]}; setGlobalMappingStatus("Press key for Move Forward...");}
function prettyKey(key){if(!key) return "Unmapped"; if(key===" ") return "Space"; if(key==="shift") return "Shift"; if(key==="escape") return "Esc"; if(key.startsWith("arrow")) return key.replace("arrow","Arrow "); return key.length===1?key.toUpperCase():key;}
function describeKeyboardMovement(map){const k=map.movement.keys; return `${prettyKey(k.up)} / ${prettyKey(k.down)} / ${prettyKey(k.left)} / ${prettyKey(k.right)}`;}
function describeActionBinding(playerKey,action,isController){const map=controlMappings[playerKey]; if(isController){const b=map.controller.buttons[action]; return b?(b.label||`Button ${b.index}`):"Unmapped";} const b=map.buttons[action]; if(!b) return "Unmapped"; return b.type==="mouse"?(b.label||`Mouse ${b.button}`):(b.label||prettyKey(b.key));}
function renderButtonMappingRow(playerKey,action,text,isController){return `<div class="controlRow"><div class="controlLabel">${text}</div><div class="controlValue">${describeActionBinding(playerKey,action,isController)}</div><button class="controlSmallBtn" data-map-button="${playerKey}:${action}">Assign Button</button></div>`;}
function renderPlayerControlCard(playerKey,label){const map=controlMappings[playerKey],isController=map.inputSource==="controller"; return `<div class="controlPlayerCard"><h3>${label}</h3><div class="controlRow"><div class="controlLabel">Input Source</div><div class="controlValue"><select data-input-source="${playerKey}"><option value="keyboardMouse" ${map.inputSource==="keyboardMouse"?"selected":""}>Keyboard + Mouse</option><option value="controller" ${isController?"selected":""}>Controller</option></select></div><div></div></div><div class="controlRow"><div class="controlLabel">Assigned Controller</div><div class="controlValue"><select id="${playerKey}GamepadSelect" data-gamepad-select="${playerKey}" ${!isController?"disabled":""}></select></div><button class="controlSmallBtn" data-refresh-pads="${playerKey}">Refresh</button></div><div class="controlRow"><div class="controlLabel">Movement</div><div class="controlValue">${isController?"Left Analog Stick":describeKeyboardMovement(map)}</div><button class="controlSmallBtn" data-map-movement="${playerKey}" ${isController?"disabled":""}>Set Keys</button></div><div class="controlRow"><div class="controlLabel">Look / Aim</div><div class="controlValue">${isController?"Right Analog Stick":"Mouse"}<br>Sensitivity: <input data-look-sensitivity="${playerKey}" type="number" min="0.2" max="10" step="0.1" value="${isController?map.controller.lookSensitivity:map.look.sensitivity}" style="width:70px;"><label><input data-invert-look="${playerKey}" type="checkbox" ${(isController?map.controller.invertY:map.look.invertY)?"checked":""}> Invert Y</label></div><div></div></div>${CONTROL_ACTIONS.map(([a,t])=>renderButtonMappingRow(playerKey,a,t,isController)).join("")}</div>`;}
function bindControlsUIEvents(){document.querySelectorAll('[data-input-source]').forEach(select=>select.onchange=()=>{const pk=select.dataset.inputSource; controlMappings[pk].inputSource=select.value; saveControlMappings(); renderControlsMappingUI();}); document.querySelectorAll('[data-gamepad-select]').forEach(select=>select.onchange=()=>{const pk=select.dataset.gamepadSelect; controlMappings[pk].gamepadIndex=Number(select.value); saveControlMappings();}); document.querySelectorAll('[data-refresh-pads]').forEach(btn=>btn.onclick=refreshGamepadSelects); document.querySelectorAll('[data-look-sensitivity]').forEach(input=>input.onchange=()=>{const pk=input.dataset.lookSensitivity,m=controlMappings[pk],v=Number(input.value); if(m.inputSource==="controller") m.controller.lookSensitivity=v; else m.look.sensitivity=v; saveControlMappings();}); document.querySelectorAll('[data-invert-look]').forEach(input=>input.onchange=()=>{const pk=input.dataset.invertLook,m=controlMappings[pk]; if(m.inputSource==="controller") m.controller.invertY=input.checked; else m.look.invertY=input.checked; saveControlMappings();}); document.querySelectorAll('[data-map-button]').forEach(btn=>btn.onclick=()=>{const [pk,a]=btn.dataset.mapButton.split(':'); beginSimpleButtonMapping(pk,a);}); document.querySelectorAll('[data-map-movement]').forEach(btn=>btn.onclick=()=>beginMovementKeyMapping(btn.dataset.mapMovement));}
function renderControlsMappingUI(){if(!controlsPanel) return; controlsPanel.innerHTML=`<div class="controlTopActions"><h2 style="margin:0 0 6px;">Controls</h2><p style="margin:0 0 8px; opacity:0.85;">Choose Keyboard + Mouse or Controller for each player. Movement and looking use mouse/sticks. Everything else is just a button.</p><button id="saveControlsBtn" class="controlSmallBtn">Save</button><button id="resetControlsBtn" class="controlSmallBtn">Reset to Defaults</button><button id="closeControlsBtn" class="controlSmallBtn">Back</button><div id="globalMappingStatus" class="mappingHint"></div></div>${renderPlayerControlCard("p1","Player 1")}${renderPlayerControlCard("p2","Player 2")}`; document.getElementById('saveControlsBtn').onclick=()=>{saveControlMappings();setGlobalMappingStatus('Controls saved.');}; document.getElementById('resetControlsBtn').onclick=()=>{resetControlMappings();setGlobalMappingStatus('Controls reset to defaults.');}; document.getElementById('closeControlsBtn').onclick=()=>controlsPanel.style.display='none'; bindControlsUIEvents(); refreshGamepadSelects();}
function refreshGamepadSelects(){const pads=navigator.getGamepads?navigator.getGamepads():[]; document.querySelectorAll('[data-gamepad-select]').forEach(select=>{const pk=select.dataset.gamepadSelect,current=controlMappings[pk].gamepadIndex; select.innerHTML=''; let found=false; for(let i=0;i<pads.length;i++){const pad=pads[i]; if(!pad) continue; found=true; const o=document.createElement('option'); o.value=i; o.textContent=`Controller ${i+1}: ${pad.id}`; select.appendChild(o);} if(!found){const o=document.createElement('option'); o.value=current; o.textContent='No controller detected'; select.appendChild(o);} select.value=current;});}
function updatePendingControllerMapping(){if(!pendingMapping||pendingMapping.mode!=="controllerButton") return; if(performance.now()-pendingMapping.startedAt<300) return; const {playerKey,action}=pendingMapping,pad=getMappedGamepad(playerKey); if(!pad) return; for(let i=0;i<pad.buttons.length;i++){if(pad.buttons[i].pressed){controlMappings[playerKey].controller.buttons[action]={type:'button',index:i,label:`Button ${i}`}; pendingMapping=null; saveControlMappings(); renderControlsMappingUI(); setGlobalMappingStatus(`Mapped ${action} to controller button ${i}.`); return;}}}

let pointerLocked = false;

document.addEventListener("pointerlockchange", () => {
  pointerLocked = document.pointerLockElement === renderer.domElement;
});

function toggleFullscreen() {
  const root = document.documentElement;
  if (!document.fullscreenElement) {
    if (root.requestFullscreen) root.requestFullscreen();
  } else if (document.exitFullscreen) {
    document.exitFullscreen();
  }
}

function setupGameSettingsUI() {
  const mouseInput = document.getElementById("mouseSensitivityInput");
  const mouseValue = document.getElementById("mouseSensitivityValue");
  const controllerInput = document.getElementById("controllerSensitivityInput");
  const controllerValue = document.getElementById("controllerSensitivityValue");
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  if (mouseInput) {
    mouseInput.value = gameSettings.mouseSensitivity;
    mouseValue.textContent = Number(gameSettings.mouseSensitivity).toFixed(2);
    mouseInput.oninput = () => { gameSettings.mouseSensitivity = Number(mouseInput.value); mouseValue.textContent = gameSettings.mouseSensitivity.toFixed(2); saveGameSettings(); };
  }
  if (controllerInput) {
    controllerInput.value = gameSettings.controllerLookSensitivity;
    controllerValue.textContent = Number(gameSettings.controllerLookSensitivity).toFixed(1);
    controllerInput.oninput = () => { gameSettings.controllerLookSensitivity = Number(controllerInput.value); controllerValue.textContent = gameSettings.controllerLookSensitivity.toFixed(1); saveGameSettings(); };
  }
  if (fullscreenBtn) fullscreenBtn.onclick = toggleFullscreen;
}

  renderer.domElement.requestPointerLock();
}

renderer.domElement.addEventListener("click", () => {
  if (!pointerLocked && player.alive) {
    renderer.domElement.requestPointerLock();
  } else {
    shoot();
  }
});

document.addEventListener("mousemove", e => {
  if (!pointerLocked || !player.alive) return;
  const sens = gameSettings.mouseSensitivity || 1.25;
  player.yaw -= e.movementX * 0.0022 * sens;
  player.pitch -= e.movementY * 0.0022 * sens;
  player.pitch = Math.max(-1.25, Math.min(1.25, player.pitch));
});

const keys = {};
document.addEventListener("keydown", e => {
  const key = e.key.toLowerCase();
  if (pendingMapping && pendingMapping.mode === "movementKeys") {
    const item = pendingMapping.order[pendingMapping.step];
    pendingMapping.keys[item[0]] = key; pendingMapping.step++;
    if (pendingMapping.step >= pendingMapping.order.length) {
      const playerKey = pendingMapping.playerKey;
      controlMappings[playerKey].movement = { type: "keyboard", preset: "custom", keys: pendingMapping.keys };
      pendingMapping = null; saveControlMappings(); renderControlsMappingUI(); setGlobalMappingStatus("Movement keys saved.");
    } else { const next = pendingMapping.order[pendingMapping.step]; setGlobalMappingStatus(`Press key for ${next[1]}...`); }
    e.preventDefault(); return;
  }
  if (pendingMapping && pendingMapping.mode === "keyboardOrMouseButton") {
    const { playerKey, action } = pendingMapping;
    controlMappings[playerKey].buttons[action] = { type: "keyboard", key, label: prettyKey(key) };
    pendingMapping = null; saveControlMappings(); renderControlsMappingUI(); setGlobalMappingStatus(`Mapped ${action} to ${prettyKey(key)}.`);
    e.preventDefault(); return;
  }
  keys[key] = true;
});

document.addEventListener("mousedown", e => {
  mouseButtons[e.button] = true;
  if (pendingMapping && pendingMapping.mode === "keyboardOrMouseButton") {
    const { playerKey, action } = pendingMapping;
    controlMappings[playerKey].buttons[action] = { type: "mouse", button: e.button, label: e.button===0?"Left Mouse":e.button===1?"Middle Mouse":e.button===2?"Right Mouse":`Mouse ${e.button}` };
    pendingMapping = null; saveControlMappings(); renderControlsMappingUI(); setGlobalMappingStatus(`Mapped ${action} to mouse button ${e.button}.`); e.preventDefault();
  }
});
document.addEventListener("mouseup", e => { mouseButtons[e.button] = false; });
document.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

function addObstacleDebugBox(c) {
  if (!DEBUG_OBSTACLE_COLLIDERS) return;
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(c.w, 0.08, c.d),
    new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0.35 })
  );
  mesh.position.set(c.x, 0.05, c.z);
  scene.add(mesh);
}

function isObstacleTooCloseToWindowOrDoor(x, z, padding = 1.2) {
  for (const win of windows || []) {
    if (enemyDistance2D({ x, z }, { x: win.x, z: win.z }) < padding + 1.5) return true;
  }
  for (const door of doorConnections || []) {
    if (enemyDistance2D({ x, z }, { x: door.x, z: door.z }) < padding + 2.2) return true;
  }
  return false;
}

function addObstacleCollider(x, z, w, d, height = 1.2, label = "obstacle") {
  obstacleColliders.push({ x, z, w, d, height, label });
  addObstacleDebugBox(obstacleColliders[obstacleColliders.length - 1]);
}

function cleanupObstacleCollidersNearEntries() {
  for (let i = obstacleColliders.length - 1; i >= 0; i--) {
    const c = obstacleColliders[i];
    if (isObstacleTooCloseToWindowOrDoor(c.x, c.z, 0.5)) obstacleColliders.splice(i, 1);
  }
}


function box(w, h, d, x, y, z, mat, cast = true, receive = true) {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = cast;
  mesh.receiveShadow = receive;
  scene.add(mesh);
  return mesh;
}

function addWallSegment(x, z, w, d, mat = mats.wall) {
  box(w, 3.8, d, x, 1.9, z, mat);
  addCollider(x, z, w, d);
}

function addHorizontalWallWithOpenings(cx, z, totalW, wallD, openingsOnSide) {
  const wallLeftEdge = cx - totalW / 2;
  const wallRightEdge = cx + totalW / 2;

  const sorted = openingsOnSide
    .map(op => ({
      ...op,
      x: op.x,
      width: op.width || 3.0,
      left: op.x - (op.width || 3.0) / 2,
      right: op.x + (op.width || 3.0) / 2
    }))
    .sort((a, b) => a.left - b.left);

  let cursor = wallLeftEdge;

  for (const opening of sorted) {
    const segmentW = opening.left - cursor;

    if (segmentW > 0.05) {
      addWallSegment(cursor + segmentW / 2, z, segmentW, wallD);
    }

    if (opening.type === "window") {
      box(opening.width, 0.85, wallD, opening.x, 0.425, z, mats.wall);
      box(opening.width, 1.05, wallD, opening.x, 3.275, z, mats.wall);
    } else {
      box(opening.width, 0.55, wallD, opening.x, 3.525, z, mats.wall);
    }

    cursor = opening.right;
  }

  const finalW = wallRightEdge - cursor;
  if (finalW > 0.05) {
    addWallSegment(cursor + finalW / 2, z, finalW, wallD);
  }
}

function addVerticalWallWithOpenings(x, cz, totalD, wallW, openingsOnSide) {
  const wallTopEdge = cz - totalD / 2;
  const wallBottomEdge = cz + totalD / 2;

  const sorted = openingsOnSide
    .map(op => ({
      ...op,
      z: op.z,
      width: op.width || 3.0,
      top: op.z - (op.width || 3.0) / 2,
      bottom: op.z + (op.width || 3.0) / 2
    }))
    .sort((a, b) => a.top - b.top);

  let cursor = wallTopEdge;

  for (const opening of sorted) {
    const segmentD = opening.top - cursor;

    if (segmentD > 0.05) {
      addWallSegment(x, cursor + segmentD / 2, wallW, segmentD);
    }

    if (opening.type === "window") {
      box(wallW, 0.85, opening.width, x, 0.425, opening.z, mats.wall);
      box(wallW, 1.05, opening.width, x, 3.275, opening.z, mats.wall);
    } else {
      box(wallW, 0.55, opening.width, x, 3.525, opening.z, mats.wall);
    }

    cursor = opening.bottom;
  }

  const finalD = wallBottomEdge - cursor;
  if (finalD > 0.05) {
    addWallSegment(x, cursor + finalD / 2, wallW, finalD);
  }
}

function addRoom(cx, cz, w, d, name, openings = []) {
  box(w, 0.25, d, cx, -0.1, cz, mats.floor, false, true);

  // ceiling
  box(w, 0.25, d, cx, 4.2, cz, new THREE.MeshStandardMaterial({ color: 0x1c1b18 }), false, true);

  // decorative rug
  box(w * 0.42, 0.03, d * 0.25, cx, 0.02, cz, new THREE.MeshStandardMaterial({ color: 0x442222 }), false, true);

  // corner clutter
  box(1.2, 0.7, 0.8, cx - w/2 + 2, 0.35, cz - d/2 + 2, mats.trim);
  box(1.4, 0.5, 0.7, cx + w/2 - 2.4, 0.25, cz + d/2 - 2.4, mats.trim);

  // outer walls with real window slots
  const northWallZ = cz - d / 2;
  const southWallZ = cz + d / 2;
  const westWallX = cx - w / 2;
  const eastWallX = cx + w / 2;

  const northOpenings = openings.filter(ws => ws.side === "north");
  const southOpenings = openings.filter(ws => ws.side === "south");
  const westOpenings = openings.filter(ws => ws.side === "west");
  const eastOpenings = openings.filter(ws => ws.side === "east");

  if (northOpenings.length === 0) {
    addWallSegment(cx, northWallZ, w, 0.35);
  } else {
    addHorizontalWallWithOpenings(cx, northWallZ, w, 0.35, northOpenings);
  }

  if (southOpenings.length === 0) {
    addWallSegment(cx, southWallZ, w, 0.35);
  } else {
    addHorizontalWallWithOpenings(cx, southWallZ, w, 0.35, southOpenings);
  }

  if (westOpenings.length === 0) {
    addWallSegment(westWallX, cz, 0.35, d);
  } else {
    addVerticalWallWithOpenings(westWallX, cz, d, 0.35, westOpenings);
  }

  if (eastOpenings.length === 0) {
    addWallSegment(eastWallX, cz, 0.35, d);
  } else {
    addVerticalWallWithOpenings(eastWallX, cz, d, 0.35, eastOpenings);
  }
}

function registerCullable(object, distance = 80, type = "generic") { if (!object) return; renderCullables.push({ object, distance, type }); }
function distanceToPlayerObject(obj) { if (!obj) return Infinity; const p = obj.position || obj.mesh?.position || obj.group?.position; if (!p) return Infinity; const dx = p.x - player.pos.x; const dz = p.z - player.pos.z; return Math.sqrt(dx * dx + dz * dz); }
function updateRenderCulling(dt) { cullUpdateTimer -= dt; if (cullUpdateTimer > 0) return; cullUpdateTimer = CULL_SETTINGS.updateInterval; for (const item of renderCullables) { if (!item.object) continue; const dist = distanceToPlayerObject(item.object); item.object.visible = dist <= item.distance; } }

function addDeadTree(x, z, scale = 1) {
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12 * scale, 0.2 * scale, 2.4 * scale, 8),
    new THREE.MeshStandardMaterial({ color: 0x5a4935, roughness: 1 })
  );
  trunk.position.set(x, 1.1 * scale, z);
  trunk.rotation.z = (Math.random() - 0.5) * 0.25;
  scene.add(trunk);
  registerCullable(trunk, CULL_SETTINGS.outsideDetailDistance, "outside");

  for (let i = 0; i < 4; i++) {
    const branch = new THREE.Mesh(
      new THREE.CylinderGeometry(0.035 * scale, 0.06 * scale, 1.2 * scale, 6),
      trunk.material
    );
    branch.position.set(x, 1.7 * scale + Math.random() * 0.5, z);
    branch.rotation.z = Math.random() * Math.PI;
    branch.rotation.x = Math.random() * Math.PI;
    scene.add(branch);
    registerCullable(branch, CULL_SETTINGS.outsideDetailDistance, "outside");
  }
}

function addWindow(x, z, rotation, spawnX, spawnZ, roomName = "spawn", isExterior = true) {

    type: "window",

    x,

    isExterior,
    boards: 8,

    boardMeshes: [],
    openingWidth: 2.8,
    openingHeight: 2.45,
    openingCenterY: 1.55
  };

  const frameMat = mats.trim;
  const shadowMat = new THREE.MeshBasicMaterial({
    color: 0x050403,
    transparent: true,
    opacity: 0.45,
    side: THREE.DoubleSide
  });

  const top = new THREE.Mesh(new THREE.BoxGeometry(2.95, 0.18, 0.22), frameMat);
  top.position.set(0, 1.18, 0.03);

  const bottom = new THREE.Mesh(
    new THREE.BoxGeometry(2.95, 0.18, 0.22),

  );
  bottom.position.set(0, -1.18, 0.03);

  const left = new THREE.Mesh(new THREE.BoxGeometry(0.18, 2.45, 0.22), frameMat);
  left.position.set(-1.45, 0, 0.03);

  const right = new THREE.Mesh(new THREE.BoxGeometry(0.18, 2.45, 0.22), frameMat);
  right.position.set(1.45, 0, 0.03);

  frame.add(top, bottom, left, right);

  const shadowTop = new THREE.Mesh(
    new THREE.BoxGeometry(2.65, 0.08, 0.04),
    shadowMat
  );
  shadowTop.position.set(0, 1.02, -0.02);

  const shadowBottom = new THREE.Mesh(
    new THREE.BoxGeometry(2.65, 0.08, 0.04),
    shadowMat
  );
  shadowBottom.position.set(0, -1.02, -0.02);

  const shadowLeft = new THREE.Mesh(
    new THREE.BoxGeometry(0.08, 2.1, 0.04),

  );

  const shadowRight = new THREE.Mesh(

  );

}

function rebuildWindowBoards(win) {
  for (const b of win.boardMeshes) {
    win.group.remove(b);
    if (b.geometry) b.geometry.dispose();
  }

  win.boardMeshes = [];

  const boardCount = Math.max(0, Math.min(win.boards, win.maxBoards));
  const boardLayouts = [
    { x: 0.0, y: -0.88, w: 2.52, rot: 0.1 },
    { x: 0.08, y: -0.58, w: 2.2, rot: -0.08 },
    { x: -0.06, y: -0.28, w: 2.45, rot: 0.06 },
    { x: 0.04, y: 0.02, w: 2.35, rot: -0.1 },
    { x: -0.1, y: 0.32, w: 2.5, rot: 0.08 },
    { x: 0.1, y: 0.62, w: 2.18, rot: -0.06 },
    { x: -0.02, y: 0.88, w: 2.42, rot: 0.11 },
    { x: 0.0, y: 0.18, w: 1.85, rot: 0.28 }
  ];

  const nailMat = new THREE.MeshBasicMaterial({ color: 0x111111 });

  for (let i = 0; i < boardCount; i++) {
    const layout = boardLayouts[i];

    const board = new THREE.Mesh(
      new THREE.BoxGeometry(layout.w, 0.14, 0.16),
      mats.board
    );

    board.position.set(layout.x, layout.y, 0.12);
    board.rotation.z = layout.rot;
    board.userData.baseY = board.position.y;
    board.userData.baseZ = board.position.z;
    board.userData.baseRotZ = board.rotation.z;
    board.castShadow = true;
    board.receiveShadow = true;

    [-layout.w * 0.38, layout.w * 0.38].forEach(nx => {
      const nail = new THREE.Mesh(
        new THREE.SphereGeometry(0.025, 6, 6),
        nailMat
      );
      nail.position.set(nx, 0.035, 0.09);
      board.add(nail);
    });

    win.group.add(board);
    win.boardMeshes.push(board);
  }
}

function createTextSprite(text) {
  const canvas = document.createElement("canvas");
  canvas.width = 512;
  canvas.height = 256;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "rgba(0,0,0,0.65)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "white";
  ctx.lineWidth = 6;
  ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);
  ctx.fillStyle = "white";
  ctx.font = "bold 42px Arial";
  ctx.textAlign = "center";
  const lines = text.split("\n");
  lines.forEach((line, i) => {
    ctx.fillText(line, canvas.width / 2, 70 + i * 55);
  });

  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(3, 1.5, 1);
  return sprite;
}

function createDamageSprite(text, color = 0xffffff) {
  const canvas = document.createElement("canvas");
  canvas.width = 256;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.font = "bold 54px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.lineWidth = 8;
  ctx.strokeStyle = "black";
  ctx.strokeText(text, 128, 64);
  ctx.fillStyle = "#" + color.toString(16).padStart(6, "0");
  ctx.fillText(text, 128, 64);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.4, 0.7, 1);
  return sprite;
}

function shoot() {
  if (!player.alive) return;
  if (currentGun.reloading) return;
  if (currentGun.cooldown > 0) return;

  if (currentGun.clip <= 0) {
    reload();
    return;
  }

  fireBurst(currentGun.burst || 1);
  currentGun.cooldown = currentGun.fireRate;
}

function fireBurst(count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      if (currentGun.clip <= 0 || currentGun.reloading) return;

      currentGun.clip--;

      const muzzle = gunView.getObjectByName("muzzle");
      const flash = gunView.getObjectByName("muzzleFlash");
      if (muzzle) muzzle.visible = true;
      if (flash) {
        flash.visible = true;
        flash.scale.setScalar(0.8 + Math.random() * 0.7);
        flash.rotation.z = Math.random() * Math.PI;
      }
      gunView.rotation.x -= 0.08;
      gunView.position.z += 0.04;
      setTimeout(() => {
        if (muzzle) muzzle.visible = false;
        if (flash) flash.visible = false;
      }, 45);

      for (let p = 0; p < currentGun.pellets; p++) {
        spawnBullet();
      }
      if (currentGun.magicType === "storm") {
        spawnMuzzleLightning(currentGun.projectileColor || 0x66ccff);
      }
    }, i * 80);
  }
}

function spawnBullet() {
  const dir = new THREE.Vector3(0, 0, -1);
  dir.applyEuler(camera.rotation);
  dir.normalize();
  const spread = currentGun.spread || 0;
  dir.x += (Math.random() - 0.5) * spread;
  dir.y += (Math.random() - 0.5) * spread;
  dir.z += (Math.random() - 0.5) * spread;
  dir.normalize();

  const projectileColor = currentGun.projectileColor || 0xffe08a;
  const projectileSize = currentGun.projectileSize || 0.045;
  let projectileGeometry;
  if (currentGun.magicType === "plague") projectileGeometry = new THREE.ConeGeometry(projectileSize, projectileSize * 4, 8);
  else if (currentGun.magicType === "frost") projectileGeometry = new THREE.OctahedronGeometry(projectileSize * 1.8);
  else projectileGeometry = new THREE.SphereGeometry(projectileSize * (currentGun.magicType === "solar" ? 1.2 : 1), 12, 12);
  const bulletMesh = new THREE.Mesh(projectileGeometry, new THREE.MeshBasicMaterial({ color: projectileColor }));
  bulletMesh.position.copy(camera.position);
  bulletMesh.position.add(dir.clone().multiplyScalar(0.45));
  scene.add(bulletMesh);

  bulletMesh.castShadow = false;
  bulletMesh.receiveShadow = false;
  let glow = null;
  const shouldUseProjectileLight =
    currentGun.magicType === "astral" ||

      if (old.mesh.geometry) old.mesh.geometry.dispose();
      if (old.mesh.material) old.mesh.material.dispose();
    }
  }

  for (let i = 0; i < BLOOD_BURST_COUNT; i++) {
    const life = BLOOD_LIFETIME + Math.random() * 0.25;

      new THREE.SphereGeometry(0.045 + Math.random() * 0.035, 6, 6),
      new THREE.MeshBasicMaterial({ color: Math.random() < 0.5 ? 0x8b0000 : 0x4a0000, transparent: true, opacity: 0.9 })

    let vx = (Math.random() - 0.5) * 2.2;
    let vy = 0.8 + Math.random() * 1.5;
    let vz = (Math.random() - 0.5) * 2.2;
    if (shotDir) { vx += shotDir.x * 1.8; vy += Math.max(0.15, shotDir.y * 0.6); vz += shotDir.z * 1.8; }

}

function updateBloodParticles(dt) {
  for (let i = bloodParticles.length - 1; i >= 0; i--) {
    const p = bloodParticles[i];
    p.life -= dt;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      if (p.mesh.geometry) p.mesh.geometry.dispose();
      if (p.mesh.material) p.mesh.material.dispose();
      bloodParticles.splice(i, 1);
      continue;
    }
    p.vel.y -= 5.5 * dt;
    p.mesh.position.x += p.vel.x * dt;
    p.mesh.position.y += p.vel.y * dt;
    p.mesh.position.z += p.vel.z * dt;
    const fade = Math.max(0, p.life / p.maxLife);
    if (p.mesh.material) p.mesh.material.opacity = fade * 0.9;
    if (p.mesh.position.y < 0.08) {
      p.mesh.position.y = 0.08;
      p.vel.y *= -0.15;
      p.vel.x *= 0.55;
      p.vel.z *= 0.55;
    }
  }
}

  return group;
}

function addGoblinGroundMarker(enemy) {

    })

function spawnEnemy(typeKey = "green") {

  const insideStand = baseInsideStand.clone().add(side.clone().multiplyScalar(standJitter * 0.45));
  const mesh = createGoblinMesh(typeKey);

    pathIndex: 0,
    pathRefreshTimer: 0,

    attackAnim: 0,
    tearAnim: 0,
    climbTimer: 0,
    hitFlashTimer: 0,

    hitboxes: [
      { name: "head", offset: new THREE.Vector3(0, 1.55 * type.scale, -0.10 * type.scale), radius: 0.56 * type.scale, multiplier: 2.45 },
      { name: "upperBody", offset: new THREE.Vector3(0, 1.05 * type.scale, 0), radius: 0.62 * type.scale, multiplier: 1.15 },
      { name: "body", offset: new THREE.Vector3(0, 0.75 * type.scale, 0), radius: 0.66 * type.scale, multiplier: 1.0 },

    ]
  };
  addGoblinGroundMarker(enemyObj);
  enemies.push(enemyObj);
}
function isInsideAnyRoomFootprint(x, z, padding = 0.5) {
  const roomBounds = [
    { cx: 0, cz: 0, w: 22, d: 18 },
    { cx: -22, cz: 0, w: 22, d: 18 },
    { cx: 22, cz: 0, w: 22, d: 18 },
    { cx: -22, cz: 18, w: 22, d: 18 },
    { cx: 0, cz: 18, w: 22, d: 18 },
    { cx: 22, cz: 18, w: 22, d: 18 },
    { cx: 0, cz: 36, w: 22, d: 18 },
    { cx: 44, cz: 18, w: 22, d: 18 },
    { cx: 44, cz: 36, w: 22, d: 18 }
  ];
  return roomBounds.some(r => x > r.cx - r.w / 2 - padding && x < r.cx + r.w / 2 + padding && z > r.cz - r.d / 2 - padding && z < r.cz + r.d / 2 + padding);
}
function isSafeEnemySpawnPoint(pos, win) {
  if (!pos) return false;
  if (isInsideAnyRoomFootprint(pos.x, pos.z, 1.2)) return false;
  if (isEnemyPathBlockedAt(pos.x, pos.z, {
    typeKey: "green",
    targetWindow: win,
    outsideStand: getWindowOutsideStandPosition(win),
    state: "walking_to_window"
  })) return false;
  const stand = getWindowOutsideStandPosition(win);
  const distToStand = enemyDistance2D(pos, stand);
  if (distToStand < 4 || distToStand > 22) return false;
  return true;
}
function getOutsideWindowSpawn(win) {
  const outward = getWindowOutwardVector(win);
  const side = new THREE.Vector3(Math.cos(win.rotation), 0, -Math.sin(win.rotation)).normalize();
  for (let attempt = 0; attempt < 18; attempt++) {
    const spawnDistance = 8 + Math.random() * 9;
    const sideOffset = (Math.random() - 0.5) * 7;
    const pos = new THREE.Vector3(win.x + outward.x * spawnDistance + side.x * sideOffset, 0, win.z + outward.z * spawnDistance + side.z * sideOffset);
    if (isSafeEnemySpawnPoint(pos, win)) return pos;
  }
  return new THREE.Vector3(win.x + outward.x * 11, 0, win.z + outward.z * 11);
}

function getWaveRequiredKills(wave) {
  return 8 + wave * 5;
}

function getWaveMaxAlive(wave) {
  return Math.min(10 + Math.floor(wave * 1.5), 34);
}

function getWaveSpawnInterval(wave) {
  return Math.max(0.38, 1.15 - wave * 0.045);
}

function startWave() {
  waveInProgress = true;
  waveEnding = false;
  waveKills = 0;
  waveRequiredKills = getWaveRequiredKills(player.wave);
  waveSpawnTimer = 0.75;
}

function chooseEnemyType() {
  const w = player.wave;
  const r = Math.random();

  // Very late dangerous enemies
  if (w >= 10 && r < 0.10) return "armored";
  if (w >= 9 && r < 0.20) return "spitter";
  if (w >= 8 && r < 0.32) return "leaper";

  // Mid-late waves
  if (w >= 7 && r < 0.12) return "armored";
  if (w >= 6 && r < 0.22) return "spitter";
  if (w >= 5 && r < 0.34) return "leaper";

  // Existing types
  if (w >= 4 && r < 0.16) return "blue";
  if (w >= 3 && r < 0.36) return "yellow";
  if (w >= 2 && r < 0.58) return "red";

  return "green";
}

function dropPickup(x, z) {

  );
