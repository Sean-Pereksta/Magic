/* Distinct attack visuals */
.atkFx{position:fixed;z-index:90;pointer-events:none;font-weight:950;filter:drop-shadow(0 2px 4px #0002)}
.atkTrail{height:7px;border-radius:999px;transform-origin:left center;animation:atkTrail .42s forwards}
.atkSlash{width:36px;height:8px;border-radius:999px;background:#ef4444;transform:rotate(-25deg);animation:atkPop .34s forwards}
.atkClaw{width:38px;height:26px;border-top:5px solid #ef4444;border-bottom:5px solid #ef4444;transform:rotate(-20deg);animation:atkPop .36s forwards}
.atkFire{width:30px;height:30px;border-radius:60% 40% 60% 40%;background:linear-gradient(135deg,#f97316,#fde047);box-shadow:0 0 0 8px #fed7aa88;animation:atkBurst .56s forwards}
.atkPoison{width:36px;height:26px;border-radius:999px;background:#22c55e;box-shadow:16px 3px 0 #86efac,-12px 5px 0 #bbf7d0;animation:atkCloud .7s forwards}
.atkFrost{width:32px;height:32px;border-radius:8px;background:#bae6fd;box-shadow:0 0 0 9px #e0f2fe99;transform:rotate(45deg);animation:atkIce .58s forwards}
.atkStorm{width:44px;height:10px;background:#fde047;clip-path:polygon(0 42%,42% 42%,28% 0,100% 52%,55% 52%,70% 100%);animation:atkZap .42s forwards}
.atkShadow{width:32px;height:32px;border-radius:999px;background:#6d28d9;box-shadow:0 0 0 10px #c4b5fd88;animation:atkShadow .55s forwards}
.atkHoly{width:34px;height:34px;border-radius:999px;background:#fef08a;box-shadow:0 0 0 12px #fef9c388;animation:atkHoly .55s forwards}
.atkThorn{width:34px;height:34px;background:#65a30d;clip-path:polygon(50% 0,62% 35%,100% 35%,69% 56%,82% 100%,50% 72%,18% 100%,31% 56%,0 35%,38% 35%);animation:atkBurst .55s forwards}
.atkGear{width:32px;height:32px;border:5px dashed #64748b;border-radius:8px;animation:atkGear .62s forwards}
.atkMark{width:34px;height:34px;border:4px solid #ec4899;border-radius:999px;box-shadow:inset 0 0 0 4px #fff;animation:atkPop .45s forwards}
@keyframes atkTrail{to{opacity:0;transform:scaleX(1.12)}}
@keyframes atkPop{to{opacity:0;transform:rotate(-25deg) scale(1.9)}}
@keyframes atkBurst{to{opacity:0;transform:translateY(-12px) scale(2.5)}}

@keyframes atkIce{to{opacity:0;transform:rotate(90deg) scale(2.4)}}

@keyframes atkHoly{to{opacity:0;transform:scale(2.7)}}

/* Fixed-size scrollable enemy wave strip: prevents mobile sideways page push */
html,body{width:100%;max-width:100%;overflow:hidden;overflow-x:hidden}
#app,.main,header,footer{width:100%;max-width:100%;min-width:0;overflow-x:hidden}
.enemyBox{width:100%;max-width:100%;min-width:0;overflow:hidden}
.enemyTitle{min-width:0;gap:8px}.enemyTitle span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.enemyRow{
  width:100%;
  max-width:100%;
  min-width:0;
  height:62px;
  max-height:62px;
  overflow-x:auto;
  overflow-y:hidden;
  flex-wrap:nowrap;
  -webkit-overflow-scrolling:touch;

/* Compatibility helpers used by evolution/start-buff code. Some later support patches had these scoped inside an IIFE, so the global 5★/6★ evolution code could crash on giveShield. Keep these global and tiny. */
function giveShield(u,v){
  if(!u||u.dead)return;
  v=Number(v)||0;
  u.shield=(Number(u.shield)||0)+v;
}
function buffAtk(u,v){
  if(!u||u.dead)return;
  v=Number(v)||0;
  u.atk=(Number(u.atk)||0)+v;
}
function buffSpd(u,v){
  if(!u||u.dead)return;
  v=Number(v)||0;
  u.spd=(Number(u.spd)||0)+v;
}
function cleanse(u,rate=.55){
  if(!u)return;
  if(rate>1)rate=1/rate; // older calls sometimes passed intensity instead of multiplier
  rate=Math.max(0,Math.min(1,Number(rate)||.55));
  u.burn=(Number(u.burn)||0)*rate;
  u.poison=(Number(u.poison)||0)*rate;
  u.slow=(Number(u.slow)||0)*rate;
  u.marked=(Number(u.marked)||0)*rate;
}

function heroTitle(u){return u&&u.evoTitle?`${u.n} · ${u.evoTitle}`:u.n}
function evoPool(u){let pool=evolutions.filter(e=>e.fits(u));if(pool.length<3)pool=[...pool,...evolutions.filter(e=>!pool.includes(e))];return pool.slice(0,3)}
function maybeEvolution(u){return u&&u.team==='ally'&&u.star>=5&&!u.evo}
function openEvolution(u){S.phase='evolve';S.evoTarget=u;let pool=evoPool(u);S.evoChoices=pool;show(`5★ Evolution: ${u.e} ${u.n}`,'Choose its upgraded identity. Every troop can evolve at 5★, with options based on role, traits, and grid position.','<div class="choices">'+pool.map((e,i)=>`<button class="choice" onclick="pickEvolution(${i})"><span class="be">${e.e}</span><span><strong>${e.n}</strong><p>${e.desc}</p></span><span class="price">EVOLVE</span></button>`).join('')+'</div>');render()}
function pickEvolution(i){let u=S.evoTarget,e=(S.evoChoices||[])[i];if(!u||!e)return close();e.apply(u);u.hp=u.maxHp;u.shield=(u.shield||0)+35;floatAlly(ix(u),`${e.e} EVO!`,'#f59e0b');msg(`${u.e} ${u.n} became ${e.e} ${e.n}.`);S.evoTarget=null;S.evoChoices=[];close();render();setTimeout(fight,240)}
function evoBonus(u,b){if(!u||!u.evo)return b;if(u.evo==='guardian'){b.hp+=20;b.shield+=24;b.thorns=(b.thorns||0)+.08}if(u.evo==='commander'){b.atk+=8;b.shield+=10;b.execute=(b.execute||0)+.08}if(u.evo==='lifebinder'){b.heal+=12;b.regen+=2.5;b.shield+=12}if(u.evo==='archon'){b.atk+=12;b.chain=(b.chain||0)+.18;b.burn+=1.5}if(u.evo==='assassin'){b.atk+=12;b.dodge+=.12;b.leech=(b.leech||0)+.12}if(u.evo==='engine'){b.extra=(b.extra||0)+.28;b.chain=(b.chain||0)+.14;b.spd+=.16}if(u.evo==='plague'){b.poison+=5;b.regen+=1.8;b.slow=(b.slow||0)+.08}if(u.evo==='inferno'){b.atk+=10;b.burn+=5}if(u.evo==='sniper'){b.atk+=16;b.execute=(b.execute||0)+.22}return b}
function evoStart(u,i){if(!u||!u.evo)return;let st=u.star||5;if(u.evo==='guardian'){filled(rowIds(rowOf(i))).forEach(a=>giveShield(a,12+st*3));pulseAtUnit(u,'gold')}if(u.evo==='commander'){filled(rowIds(rowOf(i))).forEach(a=>{buffAtk(a,4+st);giveShield(a,8+st)});liveE().slice(0,2).forEach(e=>e.marked=(e.marked||0)+1);pulseAtUnit(u,'gold')}if(u.evo==='lifebinder'){filled(rowIds(rowOf(i))).forEach(a=>{heal(u,a,8+st*2);cleanse(a,1);giveShield(a,8+st)});pulseAtUnit(u)}if(u.evo==='engine'){crossIds(i).map(unitAt).filter(Boolean).forEach(a=>{a.cd=(a.cd||0)-.5;giveShield(a,8+st)});let e=liveE()[0];if(e)dmg(u,e,10+st*2,'storm');pulseAtUnit(u,'blue')}if(u.evo==='plague')liveE().slice(0,3).forEach(e=>{e.poison+=4+st;e.slow=(e.slow||0)+.05});if(u.evo==='inferno')liveE().slice(0,2).forEach(e=>e.burn+=6+st);if(u.evo==='sniper'){let t=pickEnemy({focus:'back'});if(t)t.marked=(t.marked||0)+2}}
function evoAttack(u,t,a){if(!u||!u.evo||!t)return 0;if(u.evo==='archon'){splash(u,t,a*.42);if(chance(.45))chain(u,t,a*.34);return 1}if(u.evo==='assassin'){t.marked=(t.marked||0)+1;if(t.hp/t.maxHp<.45)dmg(u,t,a*.42,'shadow');return 1}if(u.evo==='engine'){if(chance(.55))chain(u,t,a*.35);if(chance(.32)){let e=pickEnemy(u);if(e)dmg(u,e,a*.28,'storm')}return 1}if(u.evo==='plague'){t.poison+=5;liveE().filter(e=>e!==t).slice(0,2).forEach(e=>e.poison+=2);return 1}if(u.evo==='inferno'){t.burn+=7;if(t.boss||liveE().length>=4)splash(u,t,a*.5);return 1}if(u.evo==='sniper'){t.marked=(t.marked||0)+1;if(t.boss)dmg(u,t,a*.5,'mark');return 1}if(u.evo==='lifebinder'&&chance(.5)){let weak=liveA().sort((x,y)=>x.hp/x.maxHp-y.hp/y.maxHp)[0];if(weak)heal(u,weak,a*.22);return 1}if(u.evo==='commander'&&chance(.45)){adj(ix(u)).forEach(a2=>{buffAtk(a2,1.6);a2.cd=(a2.cd||0)-.08});return 1}return 0}
function evoPulse(){if(!S.battle||S.phase!=='battle')return;let tick=S.battle.tick||0;if(tick%5!==0)return;S.squad.forEach((u,i)=>{if(!u||u.dead||!u.evo)return;if(u.evo==='lifebinder')filled(rowIds(rowOf(i))).forEach(a=>heal(u,a,1.8+u.star));if(u.evo==='commander')filled(rowIds(rowOf(i))).forEach(a=>a.cd=(a.cd||0)-.05);if(u.evo==='engine'){let e=liveE()[0];if(e)dmg(u,e,2+u.star,'storm')}if(u.evo==='guardian')filled(rowIds(rowOf(i))).forEach(a=>giveShield(a,3+u.star));})}
function tryEvoSave(t){if(!S.battle)return false;let helpers=liveA().filter(u=>u!==t&&(u.evo==='guardian'||u.evo==='lifebinder')&&!u.usedEvoSave&&Math.abs(rowOf(ix(u))-rowOf(ix(t)))<=1);let h=helpers[0];if(!h)return false;h.usedEvoSave=true;t.dead=false;t.hp=Math.max(1,Math.round(t.maxHp*.28));t.shield+=35;floatAlly(ix(t),`${h.evoEmoji||'✦'} SAVE`,'#f59e0b');pulseAtUnit(h,'gold');return true}
