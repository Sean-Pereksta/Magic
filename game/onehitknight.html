async function loadLeaderboard(){
  if(!online.db || !online.ready) { renderLeaderboard(); return online.scores; }
  online.loading=true; renderLeaderboard();
  try{
    const snap=await scoreCollection().orderBy('score','desc').limit(10).get();
    online.scores=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.score||0)-(a.score||0)||((a.createdMs||0)-(b.createdMs||0)));

function isOnlineTopTen(score){ if(!online.ready) return false; const s=Number(score)||0; if(s<=0) return false; if(online.scores.length<10) return true; return s>(Number(online.scores[online.scores.length-1].score)||0); }
async function saveOnlineScore(name){
  if(!online.ready || !online.db) throw new Error('Online score system is not ready yet.');

  const snap=await scoreCollection().orderBy('score','desc').limit(40).get();
  const rows=snap.docs.map(d=>({id:d.id,ref:d.ref,...d.data()})).sort((a,b)=>(b.score||0)-(a.score||0)||((a.createdMs||0)-(b.createdMs||0)));

function drawEnemies(){ for(const e of enemies){ if(e.dead) continue; if(e.stun>0){ ctx.save(); ctx.globalAlpha=.6; ctx.fillStyle='#9cf3ff'; ctx.beginPath(); ctx.arc(e.x,e.y-e.r-8,4,0,TAU); ctx.fill(); ctx.restore(); } if(e.boss) drawOgre(e); else if(e.type==='goblin') drawGoblin(e); else if(e.type==='slime') drawSlime(e); else if(e.type==='spear') drawSpear(e); else if(e.type==='bat') drawBat(e); else if(e.type==='bomb') drawBomb(e); else drawSpecialEnemy(e); } }
