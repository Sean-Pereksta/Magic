<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Iso M&B-Lite v5 — Kingdom Cultures & Regional Warfare</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1b33;
      --line:rgba(255,255,255,.12);
      --ink:#eaf2ff;
      --muted:rgba(234,242,255,.72);
    }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden;}
    #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
    #frame{
      width:min(1280px, 96vw);
      height:min(760px, 92vh);
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      box-shadow:0 30px 90px rgba(0,0,0,.45);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      position:relative;
      overflow:hidden;
    }
    canvas{position:absolute;inset:0;display:block;}

    #topbar{
      position:absolute;left:14px;top:12px;right:14px;
      display:flex;gap:10px;align-items:center;justify-content:space-between;
      z-index:10;
      pointer-events:none;
    }
    #topStats{
      pointer-events:auto;
      max-width:min(78vw, 1000px);
    }
    #topStats summary{list-style:none;cursor:pointer;}
    #topStats summary::-webkit-details-marker{display:none;}
    #topStats summary .chip{display:inline-flex;}
    #topStats[open] summary{margin-bottom:8px;}
    #topStats .statsGrid{display:none;gap:8px;flex-wrap:wrap;}
    #topStats[open] .statsGrid{display:flex;}
    .chipRow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;pointer-events:auto;}
    .chip{
      background:rgba(15,27,51,.78);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      display:flex;gap:10px;align-items:center;
      backdrop-filter: blur(8px);
      white-space:nowrap;
    }
    .chip b{font-weight:700}
    .dot{width:10px;height:10px;border-radius:50%;}
    .btn{
      background:rgba(255,255,255,.07);
      border:1px solid var(--line);
      color:var(--ink);
      padding:8px 10px;
      border-radius:10px;
      font-size:13px;
      cursor:pointer;
      user-select:none;
    }
    .btn:hover{background:rgba(255,255,255,.11)}
    .btn:active{transform:translateY(1px)}
    .btn[disabled]{opacity:.45;cursor:not-allowed}

    #panels{position:absolute;inset:0;z-index:20;pointer-events:none;}
    .panel{
      position:absolute;
      right:14px; top:62px;
      width:min(560px, calc(100% - 28px));
      max-height:calc(100% - 80px);
      overflow:auto;
      background:rgba(15,27,51,.86);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:0 24px 70px rgba(0,0,0,.45);
      padding:14px;
      display:none;
      pointer-events:auto;
      backdrop-filter: blur(10px);
    }
    .panel.left{left:14px; right:auto;}
    .panel.wide{width:min(920px, calc(100% - 28px));}
    .panel h2{margin:0 0 10px;font-size:15px;letter-spacing:.2px;}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    .hr{height:1px;background:var(--line);margin:12px 0;}
    .small{color:var(--muted);font-size:12px;line-height:1.35}
    .list{display:flex;flex-direction:column;gap:8px;}
    .item{
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      border-radius:12px;
      padding:10px;
      display:flex;justify-content:space-between;gap:10px;align-items:center;
    }
    .item .meta{display:flex;flex-direction:column;gap:2px}
    .tag{font-size:11px;color:var(--muted);}
    select, input{
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:var(--ink);
      padding:8px 10px;
      border-radius:10px;
      outline:none;
    }
    .kbd{
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:12px;border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      padding:2px 7px;border-radius:8px;
    }
    .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;}
    .grid2{display:grid;grid-template-columns: 1fr 1fr;gap:12px;align-items:start;}
    .bar{
      height:10px;border-radius:999px;background:rgba(255,255,255,.08);
      border:1px solid var(--line); overflow:hidden;
    }
    .bar > div{height:100%;background:rgba(255,255,255,.22);width:50%}

    #toast{
      position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
      background:rgba(15,27,51,.88);
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 14px;
      z-index:30;
      display:none;
      pointer-events:none;
      box-shadow:0 18px 55px rgba(0,0,0,.5);
      font-size:13px;
      backdrop-filter: blur(10px);
    }

    #startMenu{
      position:absolute;inset:0;z-index:40;
      display:flex;align-items:center;justify-content:center;
      background:rgba(5,10,20,.82);
      backdrop-filter: blur(6px);
    }
    #startMenu .card{
      width:min(420px, calc(100% - 36px));
      background:rgba(15,27,51,.95);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      box-shadow:0 24px 70px rgba(0,0,0,.45);
    }
    #mobileHud{
      position:absolute;inset:0;z-index:22;pointer-events:none;
      display:none;
    }
    #joyWrap{
      position:absolute;left:14px;bottom:14px;
      width:120px;height:120px;border-radius:50%;
      border:1px solid var(--line);
      background:rgba(15,27,51,.65);
      pointer-events:auto;touch-action:none;
    }
    #joyKnob{
      position:absolute;left:42px;top:42px;width:36px;height:36px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.4);
      background:rgba(255,255,255,.2);
    }
    #mobileBattlePanel{
      position:absolute;left:14px;bottom:146px;
      width:min(320px, 74vw);
      background:rgba(15,27,51,.82);
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px;
      display:none;
      pointer-events:auto;
      transition:transform .2s ease, opacity .2s ease;
      transform:translateX(0);
      opacity:1;
    }
    #mobileBattlePanel .row{margin-bottom:6px;}
    #mobileBattlePanel .row:last-child{margin-bottom:0;}
    #mobileBattlePanel .row.scrollRow{display:flex;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;}
    #mobileBattlePanel .row.scrollRow .btn{flex:0 0 auto;}
    #mobileBattlePanel.collapsed{transform:translateX(calc(-100% + 46px));opacity:.92;}
    #mbToggle{width:34px;min-width:34px;text-align:center;padding:8px 0;}
    #mobileInteractBtn{
      position:absolute;right:14px;bottom:22px;
      min-width:112px;
      pointer-events:auto;
      display:none;
      font-weight:600;
    }
    #mbExpandBtn{
      position:absolute;left:14px;bottom:146px;
      pointer-events:auto;
      display:none;
      min-width:92px;
      text-align:center;
    }
    #desktopBattleHud{position:absolute;left:14px;top:64px;z-index:24;width:min(360px,44vw);display:none;pointer-events:auto;background:rgba(15,27,51,.86);border:1px solid var(--line);border-radius:12px;padding:10px;box-shadow:0 18px 46px rgba(0,0,0,.4);}
    #desktopBattleHud .row{margin-bottom:6px;}
    #desktopBattleHud .row:last-child{margin-bottom:0;}
    #desktopBattleHud .btn.active{background:rgba(96,165,250,.24);border-color:rgba(191,219,254,.55);}
    @media (max-width: 920px), (pointer: coarse){
      #mobileHud{display:block;}
      #desktopBattleHud{display:none !important;}
      #topbar{right:8px;left:8px;top:8px;}
      #topStats{max-width:64%;}
      #topbar .chipRow:last-child{gap:6px;}
      #topbar .chipRow:last-child .btn{padding:7px 8px;font-size:12px;}
    }
  </style>
</head>
<body>
<div id="wrap">
  <div id="frame">
    <canvas id="c"></canvas>

    <div id="topbar">
      <details id="topStats">
        <summary>
          <div class="chip">👥 <b id="army">0</b> • 💰 <b id="gold">0</b> • 🍖 <b id="food">0</b></div>
        </summary>
        <div class="statsGrid">
          <div class="chip"><span class="dot" id="modeDot"></span><b id="modeLabel">MAP</b><span id="modeSub" class="tag">WASD move • E interact</span></div>
          <div class="chip"><span class="dot" id="bannerDot"></span>🏳 <b id="banner">Independent</b></div>
          <div class="chip">⭐ Lv <b id="lvl">1</b> <span class="tag mono" id="xp">0/60</span></div>
          <div class="chip">🗓 Day <b id="day">1</b> <span class="tag mono" id="dayPct">0%</span></div>
          <div class="chip">🤕 <b id="wounded">0</b></div>
          <div class="chip">🙂 <b id="morale">65</b></div>
          <div class="chip">🏅 <b id="renown">0</b></div>
          <div class="chip">🏛 <b id="influence">0</b></div>
          <div class="chip">❤️ <b id="hp">0</b>/<b id="hpMax">0</b></div>
        </div>
      </details>
      <div class="chipRow">
        <button class="btn" id="btnFullscreen">Fullscreen</button>
        <button class="btn" id="btnSave">Save</button>
        <button class="btn" id="btnInv">Inventory</button>
        <button class="btn" id="btnArmy">Army</button>
        <button class="btn" id="btnDip">Diplomacy</button>
        <button class="btn" id="btnHelp">Help</button>
      </div>
    </div>

    <div id="panels">
      <div class="panel" id="panelSettlement"></div>
      <div class="panel" id="panelInventory"></div>
      <div class="panel" id="panelArmy"></div>
      <div class="panel" id="panelDiplomacy"></div>
      <div class="panel" id="panelHelp"></div>

    <div id="toast"></div>

    <div id="mobileHud">
      <div id="joyWrap"><div id="joyKnob"></div></div>
      <div id="mobileBattlePanel"></div>
      <button class="btn" id="mbExpandBtn">⇥ Commands</button>
      <button class="btn" id="mobileInteractBtn">Interact</button>
    </div>
    <div id="desktopBattleHud"></div>

    <div id="startMenu">
      <div class="card">
        <h2 style="margin-top:0">Mountainblade</h2>
        <div class="small">Start a new campaign or load your local save.</div>
        <div class="hr"></div>
        <div class="row">
          <button class="btn" id="btnNewGame">New Game</button>
          <button class="btn" id="btnLoadGame">Load Game</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  // =========================
  // Canvas + helpers
  // =========================
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const frame = document.getElementById('frame');

  const ui = {
    gold: document.getElementById('gold'),
    food: document.getElementById('food'),
    army: document.getElementById('army'),
    hp: document.getElementById('hp'),
    hpMax: document.getElementById('hpMax'),
    modeLabel: document.getElementById('modeLabel'),
    modeSub: document.getElementById('modeSub'),
    modeDot: document.getElementById('modeDot'),
    banner: document.getElementById('banner'),
    bannerDot: document.getElementById('bannerDot'),
    lvl: document.getElementById('lvl'),
    xp: document.getElementById('xp'),
    wounded: document.getElementById('wounded'),
    day: document.getElementById('day'),
    dayPct: document.getElementById('dayPct'),
    morale: document.getElementById('morale'),
    renown: document.getElementById('renown'),
    influence: document.getElementById('influence'),

    panelSettlement: document.getElementById('panelSettlement'),
    panelInventory: document.getElementById('panelInventory'),
    panelArmy: document.getElementById('panelArmy'),
    panelDiplomacy: document.getElementById('panelDiplomacy'),
    panelHelp: document.getElementById('panelHelp'),
    panelLoot: document.getElementById('panelLoot'),
    toast: document.getElementById('toast'),

    btnSave: document.getElementById('btnSave'),
    btnInv: document.getElementById('btnInv'),
    btnArmy: document.getElementById('btnArmy'),
    btnDip: document.getElementById('btnDip'),
    btnHelp: document.getElementById('btnHelp'),
    btnFullscreen: document.getElementById('btnFullscreen'),

    startMenu: document.getElementById('startMenu'),
    btnNewGame: document.getElementById('btnNewGame'),
    btnLoadGame: document.getElementById('btnLoadGame'),
    mobileHud: document.getElementById('mobileHud'),
    joyWrap: document.getElementById('joyWrap'),
    joyKnob: document.getElementById('joyKnob'),
    mobileBattlePanel: document.getElementById('mobileBattlePanel'),
    mobileInteractBtn: document.getElementById('mobileInteractBtn'),
    mbExpandBtn: document.getElementById('mbExpandBtn'),
    desktopBattleHud: document.getElementById('desktopBattleHud'),
  };

  function resize() {
    const r = frame.getBoundingClientRect();
    canvas.width = Math.floor(r.width * devicePixelRatio);
    canvas.height = Math.floor(r.height * devicePixelRatio);
    canvas.style.width = r.width + "px";
    canvas.style.height = r.height + "px";
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function dist2(ax,ay,bx,by){ const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; }
  function dist(ax,ay,bx,by){ return Math.hypot(ax-bx, ay-by); }
  function rand(a,b){ return a + Math.random()*(b-a); }
  function randi(a,b){ return Math.floor(rand(a,b+1)); }

  // roundRect polyfill
  if(!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
      r = Math.min(r, w/2, h/2);
      this.beginPath();
      this.moveTo(x+r, y);
      this.arcTo(x+w, y, x+w, y+h, r);
      this.arcTo(x+w, y+h, x, y+h, r);
      this.arcTo(x, y+h, x, y, r);
      this.arcTo(x, y, x+w, y, r);
      this.closePath();
      return this;
    }
  }

  // Toast
  let toastT = 0;
  function toast(msg, ms=1400){
    ui.toast.textContent = msg;
    ui.toast.style.display = 'block';
    toastT = ms;
  }

  // =========================
  // Gameplay tuning
  // =========================
  const SAVE_KEY = 'iso_mnb_save_v5';
  const SAVE_VERSION = 11;
  const DAY_LEN = 180;
  const DAY_TICK = 1;
  const WOUNDED_CHANCE = 0.78;        // ↑ more likely wounded than dead
  const VILLAGE_REGEN_INTERVAL = 10;  // seconds per regen tick
  const VILLAGE_REGEN_CHANCE = 0.85;  // per tick, attempt regen
  const ARCHER_WALL_DMG = 1.25;       // defenders behind wall
  const ARCHER_WALL_RANGE = 1.15;
  const ARCHER_WALL_RATE = 0.85;      // smaller = faster (windup+cooldown)
  const JOIN_BASE_COST = 360;
  const UNIT_RANK_NAMES = ['Recruit','Veteran','Elite'];
  const UNIT_RANK_THRESHOLDS = [0,60,160];
  const UNIT_RANK_BONUS = [
    { hp:1, dmg:1, cd:1 },
    { hp:1.08, dmg:1.06, cd:0.96 },
    { hp:1.16, dmg:1.12, cd:0.93 },
  ];

  // =========================
  // Factions / items / units
  // =========================
  const FACTIONS = [
    { id:'knights', name:'Lioncrown Chivalry', color:'#fbbf24' },
    { id:'nords', name:'Frostfjord Clans', color:'#93c5fd' },
    { id:'nomads', name:'Skyhoof Steppe', color:'#f59e0b' },
  ];

  const FACTION_TEMPLATES = {
    knights:[
      { name:'Lioncrown Chivalry', color:'#fbbf24', sigil:'lion' },
      { name:'Ironrose Order', color:'#ef4444', sigil:'rose' },
      { name:'Sunforged Banner', color:'#f97316', sigil:'sun' },
    ],
    nords:[
      { name:'Frostfjord Clans', color:'#93c5fd', sigil:'snowflake' },
      { name:'Ravenwatch Jarls', color:'#64748b', sigil:'raven' },
      { name:'Stormpike Hold', color:'#14b8a6', sigil:'lightning' },
    ],
    nomads:[
      { name:'Skyhoof Steppe', color:'#f59e0b', sigil:'horse' },
      { name:'Sandwind Khans', color:'#d6b98a', sigil:'crescent' },
      { name:'Starweave Riders', color:'#a855f7', sigil:'star' },
    ]
  };

  function hslToHex(h,s,l){
    h = (h%360+360)%360;
    s/=100; l/=100;
    const c = (1-Math.abs(2*l-1))*s;
    const x = c*(1-Math.abs((h/60)%2-1));
    const m = l - c/2;
    let r=0,g=0,b=0;
    if(h<60){ r=c; g=x; b=0; }
    else if(h<120){ r=x; g=c; b=0; }
    else if(h<180){ r=0; g=c; b=x; }
    else if(h<240){ r=0; g=x; b=c; }
    else if(h<300){ r=x; g=0; b=c; }
    else { r=c; g=0; b=x; }
    const R = Math.round((r+m)*255);
    const G = Math.round((g+m)*255);
    const B = Math.round((b+m)*255);
    return '#' + [R,G,B].map(v=>v.toString(16).padStart(2,'0')).join('');
  }


  function shade(hex, amt){
    const h = (hex||'').replace('#','');
    if(h.length!==6) return hex;
    const n = parseInt(h,16);
    const r = clamp(((n>>16)&255)+amt,0,255);
    const g = clamp(((n>>8)&255)+amt,0,255);
    const b = clamp((n&255)+amt,0,255);
    return '#'+[r,g,b].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
  }

  function pickUniqueBannerColor(){
    // try to avoid landing too close to the main 3
    const protectedH = [0, 210, 145]; // rough hues of red/blue/green
    for(let i=0;i<80;i++){
      const h = randi(0,359);
      const ok = protectedH.every(ph => {
        let d = Math.abs(h - ph);
        d = Math.min(d, 360-d);
        return d > 22;
      });
      if(ok) return hslToHex(h, 82, 62);
    }
    return hslToHex(randi(0,359), 82, 62);
  }

  const ITEM_DB = {
    // Player weapons
    weapon_sword:    { id:'weapon_sword',    name:'Sword',    type:'weapon', weaponKind:'melee',    dmg:18, range:1.35, speed:1.00, price:60  },
    weapon_axe:      { id:'weapon_axe',      name:'Axe',      type:'weapon', weaponKind:'melee',    dmg:22, range:1.20, speed:0.88, price:70  },
    weapon_spear:    { id:'weapon_spear',    name:'Spear',    type:'weapon', weaponKind:'melee',    dmg:14, range:1.95, speed:0.92, price:80  },
    weapon_pike:     { id:'weapon_pike',     name:'Pike',     type:'weapon', weaponKind:'melee',    dmg:18, range:2.60, speed:0.55, price:140 },
    weapon_dagger:   { id:'weapon_dagger',   name:'Dagger',   type:'weapon', weaponKind:'melee',    dmg:12, range:0.95, speed:1.35, price:40  },

    weapon_bow:      { id:'weapon_bow',      name:'Bow',      type:'weapon', weaponKind:'bow',      dmg:14, range:8.2,  speed:1.00, price:90  },
    weapon_crossbow: { id:'weapon_crossbow', name:'Crossbow', type:'weapon', weaponKind:'crossbow', dmg:28, range:9.2,  speed:0.75, price:160 },

    // Armor
    armor_cloth:     { id:'armor_cloth',     name:'Cloth Armor',  type:'armor', armor:0, maxHp:0,  price:0   },
    armor_leather:   { id:'armor_leather',   name:'Leather Armor',type:'armor', armor:2, maxHp:20, price:80  },
    armor_chain:     { id:'armor_chain',     name:'Chain Armor',  type:'armor', armor:4, maxHp:40, price:160 },
    armor_scale:     { id:'armor_scale',     name:'Scale Armor',  type:'armor', armor:5, maxHp:50, price:220 },
    armor_plate:     { id:'armor_plate',     name:'Plate Armor',  type:'armor', armor:6, maxHp:60, price:260 },
  };

  // Troops
  const UNIT_DB = {
    kn_nobleman:{ key:'kn_nobleman', name:'Nobleman', faction:'knights', role:'inf', tier:0, hp:102, dmg:15, range:1.15, spd:2.35, windup:0.34, cooldown:0.72, shield:true, blockArrow:0.2, blockMelee:0.08, cost:12, volunteersTier:0, upgrades:[{to:'kn_knight',label:'Train → Knight'},{to:'kn_pikeman',label:'Train → Pikeman'}], armorStyle:'heavy', visual:{helm:'nasal',chest:'chain',cape:false,trim:false,shieldShape:'kite',weaponShape:'sword',accent:'cloth'} },
    kn_knight:{ key:'kn_knight', name:'Knight', faction:'knights', role:'inf', tier:1, hp:138, dmg:24, range:1.25, spd:2.1, windup:0.42, cooldown:0.85, shield:true, blockArrow:0.35, blockMelee:0.14, cost:56, volunteersTier:1, upgrades:[{to:'kn_champion',label:'Train → Champion'}], armorStyle:'heavy', visual:{helm:'greathelm',chest:'plate',cape:false,trim:true,shieldShape:'kite',weaponShape:'sword',accent:'gold'} },

  const TILE_W = 64;

  const BIOME = { NORDIC:'nordic', STEPPE:'steppe', PLAINS:'plains', FOREST:'forest' };
  const BIOME_COLOR = {
    nordic:{ fill:'rgba(220,235,255,.14)', stroke:'rgba(255,255,255,.06)' },
    forest:{ fill:'rgba(40,140,86,.14)', stroke:'rgba(255,255,255,.05)' },
    steppe:{ fill:'rgba(180,140,86,.15)', stroke:'rgba(255,255,255,.05)' },
    plains:{ fill:'rgba(74,222,128,.10)', stroke:'rgba(255,255,255,.05)' },
  };
  function biomeAt(x,y){
    const nx = x/MAP_W, ny=y/MAP_H;
    if(ny < 0.26) return BIOME.NORDIC;
    if(nx > 0.64 || (nx>0.56 && ny>0.58)) return BIOME.STEPPE;
    if(nx < 0.34 || (nx<0.46 && ny>0.58)) return BIOME.FOREST;
    return BIOME.PLAINS;
  }
  function biomeForFaction(fid){
    if(fid==='nords') return BIOME.NORDIC;
    if(fid==='nomads') return BIOME.STEPPE;
    return BIOME.PLAINS;
  }
  function partyKindForBiome(b){
    if(b===BIOME.NORDIC) return 'sea_raiders';
    if(b===BIOME.STEPPE) return 'steppe_bandits';
    if(b===BIOME.FOREST) return 'bandits';
    return 'looters';
  }

  function worldToScreen(x, y, camX, camY){
    const dx = x - camX;
    const dy = y - camY;
    const sx = (dx - dy) * (TILE_W/2);
    const sy = (dx + dy) * (TILE_H/2);
    return {
      x: canvas.clientWidth/2 + sx,
      y: canvas.clientHeight/2 + sy
    };
  }

  function factionTemplate(fid, idx=0){
    const arr = FACTION_TEMPLATES[fid] || [{ name:fid, color:'rgba(220,220,255,.8)', sigil:'ring' }];
    const i = ((idx%arr.length)+arr.length)%arr.length;
    return arr[i];
  }

  function ensureFactionState(){
    if(!state.map) return;
    state.map.factionState = state.map.factionState || {};
    for(const f of FACTIONS){
      const cur = state.map.factionState[f.id] || {};
      const tpl = factionTemplate(f.id, cur.variantIndex||0);
      state.map.factionState[f.id] = {
        baseId: f.id,
        variantIndex: cur.variantIndex||0,
        name: cur.name || tpl.name || f.name,
        color: cur.color || tpl.color || f.color,
        sigil: cur.sigil || tpl.sigil || 'ring',
        kingPartyId: cur.kingPartyId || null,
        lordPartyIds: Array.isArray(cur.lordPartyIds) ? cur.lordPartyIds : [],
        nextLordSpawnDay: cur.nextLordSpawnDay || 7,
      };
    }
  }

  function factionStateOf(id){
    if(!state.map) return null;
    ensureFactionState();
    return state.map.factionState?.[id] || null;
  }

  function factionColor(id){
    if(id==='player') return state.player?.bannerColor || 'rgba(220,220,255,.85)';
    const fs = factionStateOf(id);
    if(fs?.color) return fs.color;
    const f = FACTIONS.find(x=>x.id===id);
    return f ? f.color : 'rgba(220,220,255,.8)';
  }
  function factionName(id){
    if(id==='player') return 'Your Domain';
    const fs = factionStateOf(id);
    if(fs?.name) return fs.name;
    const f = FACTIONS.find(x=>x.id===id);
    return f ? f.name : 'Neutral';
  }
  function factionSigil(id){
    if(id==='player') return state.player?.faction ? (factionStateOf(state.player.faction)?.sigil || 'star') : 'star';
    return factionStateOf(id)?.sigil || 'ring';
  }

  function effectiveRelation(fid){
    const d = state.diplomacy?.[fid];
    if(!d) return 0;
    return (d.standing||0) - (d.hostility||0);
  }

  function relationLabel(v){
    if(v>=60) return 'ALLIED';
    if(v>=25) return 'FRIENDLY';
    if(v<=-60) return 'AT WAR';
    if(v<=-20) return 'HOSTILE';
    return 'NEUTRAL';
  }

    return { id:'u_'+Math.random().toString(36).slice(2,10), baseUnit, xp:0, rank:0, squadId:null, name:null };

  function unitRankByXp(xp){
    if((xp||0) >= UNIT_RANK_THRESHOLDS[2]) return 2;
    if((xp||0) >= UNIT_RANK_THRESHOLDS[1]) return 1;
    return 0;

  function normalizeArmyUnits(p){
    p.armyUnits = (p.armyUnits||[]).map(u=>{
      if(u && u.baseUnit) return { id:u.id||('u_'+Math.random().toString(36).slice(2,10)), baseUnit:u.baseUnit, xp:u.xp||0, rank:clamp(u.rank||0,0,2), squadId:u.squadId||null, name:u.name||null };
      const k = u?.unit;
      const mapOld={inf_recruit:'kn_nobleman',inf_swordsman:'kn_knight',inf_knight_gs:'kn_champion',arc_recruit:'no_raider',arc_archer:'no_skirmisher',arc_marksman:'no_wildman',cav_scout:'st_steppe_archer',cav_lancer:'st_veteran_mounted_archer'};
      return makeUnitInstance(mapOld[k]||k||'kn_nobleman');

    p.squads = p.squads||[];

  function ensureSettlementSystems(s){
    s.contracts = s.contracts||[];
    if(s.kind==='castle') s.storage = s.storage || { gold:0, food:0, goods:{} };

  function addXP(amount){
    const p = state.player;
    p.xp += amount;
    while(p.xp >= p.xpToNext){
      p.xp -= p.xpToNext;
      p.level += 1;
      p.baseMaxHp += 10;
      p.dmgMult = 1 + (p.level-1)*0.06;
      p.xpToNext = Math.round(p.xpToNext * 1.22 + 15);
      toast(`LEVEL UP! → Lv ${p.level} (+HP, +DMG)`, 1700);
      p.hp = Math.min(playerMaxHp(p), p.hp + 20);
    }
  }

  function seedGarrison(factionId='knights'){
    const tree = factionId==='nords' ? ['no_raider','no_skirmisher','no_wildman'] : (factionId==='nomads' ? ['st_steppe_archer','st_veteran_mounted_archer','st_companion_guard'] : ['kn_nobleman','kn_pikeman','kn_hoplite']);
    const g = {};
    const add=(k,n)=>g[k]=(g[k]||0)+n;
    add(tree[0], randi(5,9));
    add(tree[1], randi(3,7));
    if(Math.random()<0.35) add(tree[2], randi(1,3));
    if(Math.random()<0.22) add('sup_banner',1);
    return g;
  }

    for(const k in g) n += g[k]||0;
    return n;

  function normalizeGarrison(g){

  function makeVillageVolunteers(factionId='knights'){
    const poolByFaction = {
      knights:['kn_nobleman','kn_pikeman','kn_hoplite'],
      nords:['no_raider','no_skirmisher','no_wildman'],
      nomads:['st_steppe_archer','st_veteran_mounted_archer','st_companion_guard'],
    };
    const pool = poolByFaction[factionId] || poolByFaction.knights;
    const normalPool = ['kn_nobleman','no_raider','st_steppe_archer'].filter(k=>!pool.includes(k));
    const normalKey = normalPool.length ? normalPool[randi(0,normalPool.length-1)] : null;
    const volunteers = {
      [pool[0]]: randi(8, 16),
      [pool[1]]: randi(1, 4),
      [pool[2]]: (Math.random()<0.35 ? 1 : 0),
      sup_banner: (Math.random()<0.12 ? 1 : 0),
    };
    if(normalKey && Math.random()<0.48) volunteers[normalKey] = randi(1,3);
    const caps = { [pool[0]]:18, [pool[1]]:5, [pool[2]]:2, sup_banner:1 };
    if(normalKey) caps[normalKey] = 4;
    return { volunteers, caps, regenClock: rand(0, VILLAGE_REGEN_INTERVAL) };
  }

  function makePartyComp(kind, size, opts={}){
    const comp = [];
    const push=(k,n)=>{ for(let i=0;i<n;i++) comp.push({unit:k}); };
    const pick=(arr)=>arr[randi(0,arr.length-1)];

    if(kind==='looters'){
      for(let i=0;i<size;i++) comp.push({unit: Math.random()<0.72?'e_looter':'e_rockthrower'});
      return comp;
    }
    if(kind==='bandits'){
      for(let i=0;i<size;i++){
        const r=Math.random();
        comp.push({unit: r<0.58?'e_bandit_cutthroat':(r<0.9?'e_bandit_bowman':'e_bandit_brute')});
      }
      return comp;
    }
    if(kind==='sea_raiders'){
      for(let i=0;i<size;i++){
        const r=Math.random();
        comp.push({unit: r<0.56?'e_sea_raider':(r<0.86?'e_sea_spearhurler':'e_sea_reaver')});
      }
      return comp;
    }
    if(kind==='steppe_bandits'){
      for(let i=0;i<size;i++){
        const r=Math.random();
        comp.push({unit: r<0.48?'e_steppe_raider':(r<0.84?'e_steppe_horse_archer':'e_steppe_lancer')});
      }
      return comp;
    }

    const faction = opts.factionId || 'knights';
    const trees = {
      knights:['kn_nobleman','kn_pikeman','kn_hoplite'],
      nords:['no_raider','no_skirmisher','no_wildman'],
      nomads:['st_steppe_archer','st_veteran_mounted_archer','st_companion_guard'],
    };
    const tree = trees[faction] || trees.knights;
    const eliteBias = opts.eliteBias||0;
    for(let i=0;i<size;i++){
      const r=Math.random();
      const t = r<(0.62-eliteBias)?0:(r<(0.90-eliteBias*0.45)?1:2);
      comp.push({unit:tree[t]});
    }
    if((kind==='army'||kind==='vassal') && size>=24 && Math.random()<(0.5 + (opts.eliteBias||0)*0.9)) push('sup_banner',1 + ((opts.eliteBias||0)>0.28 && Math.random()<0.55 ? 1 : 0));
    return comp;
  }

  function makeMap(){
    const settlements = [];
    const pois = [];
    const taken = new Set();
    const region = {
      knights:{x0:10,x1:44,y0:28,y1:82},
      nords:{x0:10,x1:86,y0:5,y1:28},
      nomads:{x0:56,x1:90,y0:34,y1:90},
    };
    function pickSpotFor(fid){
      const r = region[fid] || {x0:8,x1:MAP_W-8,y0:8,y1:MAP_H-8};
      const wantBiome = biomeForFaction(fid);
      for(let tries=0; tries<6000; tries++){
        const x = randi(r.x0,r.x1), y=randi(r.y0,r.y1);
        const k=x+','+y;
        if(taken.has(k)) continue;
        if(biomeAt(x,y)!==wantBiome && Math.random()<0.82) continue;
        let ok=true;
        for(const s of settlements){ if(dist2(x,y,s.x,s.y)<44){ ok=false; break; } }
        if(ok){ taken.add(k); return {x,y}; }
      }
      return {x:randi(r.x0,r.x1),y:randi(r.y0,r.y1)};
    }
    function addSettlement(kind,fid,name,x,y,parentCastleId=null){
      const out={ id:'s_'+Math.random().toString(36).slice(2,9), kind, factionId:fid, name, x,y, contracts:[], parentCastleId };
      if(kind==='castle'){
        out.stock=makeCastleStock(fid);
        out.garrison=seedGarrison(fid);
        out.defense={walls:1,towers:0,traps:0};
        out.storage={gold:0,food:0,goods:{}};
        out.lastSackedT=-999;
      } else if(kind==='village') out.stock=makeVillageStock(), out.village=makeVillageVolunteers(fid);
      else out.stock={foodPrice:6,foodBundle:8};
      settlements.push(out);
      return out;
    }

    const factionState = {};
    for(const f of FACTIONS){
      const variantIndex = randi(0,(FACTION_TEMPLATES[f.id]||[{ }]).length-1);
      const tpl = factionTemplate(f.id, variantIndex);
      factionState[f.id] = {
        baseId: f.id,
        variantIndex,
        name: tpl.name,
        color: tpl.color,
        sigil: tpl.sigil,
        kingPartyId: null,
        lordPartyIds: [],
        nextLordSpawnDay: 7,
      };
      const stem = (tpl.name||f.name).split(' ')[0];
      for(let c=1;c<=2;c++){
        const pos=pickSpotFor(f.id);
        const castle=addSettlement('castle', f.id, `${stem} Castle ${c}`, pos.x, pos.y);
        for(let i=1;i<=3;i++){
          const v=pickSpotFor(f.id);
          addSettlement('village', f.id, `${stem} Village ${((c-1)*3)+i}`, v.x, v.y, castle.id);
        }
      }
    }

    for(let i=1;i<=4;i++){
      const x=randi(16,MAP_W-16), y=randi(16,MAP_H-16);
      addSettlement('town', null, `Free Outpost ${i}`, x, y, null);
    }

    const poiNames=['Old Ruins','Moon Shrine','Watchtower','Hidden Grotto','Broken Keep','Sun Pillar','Stone Circle','Hunter Camp','Ancient Well','Nomad Cairn','Frost Altar','Bandit Hideout'];
    for(let i=0;i<12;i++) pois.push({ id:'poi_'+i, x:randi(5,MAP_W-6), y:randi(5,MAP_H-6), name:poiNames[i], kind:'poi' });

    const parties=[];
    function addParty(kind, factionId, x, y, size, isCamp=false, extra={}){
      const id = 'p_'+Math.random().toString(36).slice(2,9);
      const out = { id, kind,factionId,x,y,roamTx:x,roamTy:y,aggro:(kind==='neutral'?0:5.2),baseSpeed:(kind.includes('steppe')?2.6:2.15),size,comp:(kind==='neutral')?[]:makePartyComp(kind,size,{factionId, eliteBias:extra.eliteBias||0}),alive:true,targetSettlementId:null,isCamp,
        isLord: !!extra.isLord,
        isKing: !!extra.isKing,
        lordName: extra.lordName||null,
        realmFactionId: extra.realmFactionId||factionId,
        crownFx: extra.crownFx||0,
        eliteBias: extra.eliteBias||0,
      };
      parties.push(out);
      return out;
    }

    for(let i=0;i<10;i++){ const x=randi(8,MAP_W-8),y=randi(8,MAP_H-8); addParty('looters',null,x,y,randi(3,10)); }
    for(let i=0;i<12;i++){ const x=randi(8,MAP_W-8),y=randi(8,MAP_H-8); const b=biomeAt(x,y); addParty(partyKindForBiome(b),null,x,y,randi(b===BIOME.PLAINS?3:10,b===BIOME.FOREST?15:20)); }
    for(const f of FACTIONS) for(let i=0;i<6;i++){ const p=pickSpotFor(f.id); addParty('patrol',f.id,p.x,p.y,randi(9,18)); }
    for(let i=0;i<5;i++) addParty('neutral',null,randi(6,MAP_W-7),randi(6,MAP_H-7),1);

    const LORD_NAMES = ['Lord Alric','Lady Ysolda','Lord Edrin','Lady Freya','Lord Kael','Lady Sera'];
    for(const f of FACTIONS){
      const kp = pickSpotFor(f.id);
      const kingSize = clamp(Math.round(randi(36,54) * rand(1.8,2.3)), 62, 98);
      const king = addParty('army', f.id, kp.x, kp.y, kingSize, false, { isLord:true, isKing:true, lordName:`King of ${factionState[f.id].name}`, realmFactionId:f.id, eliteBias:0.34 });
      factionState[f.id].kingPartyId = king.id;
      const lordN = randi(2,4);
      for(let i=0;i<lordN;i++){
        const lp = pickSpotFor(f.id);
        const lsize = clamp(Math.round(randi(12,20)*rand(1.25,1.55)), 16, 34);
        const lord = addParty('army', f.id, lp.x, lp.y, lsize, false, { isLord:true, isKing:false, lordName:LORD_NAMES[randi(0,LORD_NAMES.length-1)], realmFactionId:f.id, eliteBias:0.2 });
        factionState[f.id].lordPartyIds.push(lord.id);
      }
      factionState[f.id].nextLordSpawnDay = 7;
    }

    return { w:MAP_W,h:MAP_H, settlements, parties, pois, factionState, dayFoodRate:0.02, invasion:{}, day:1,totalDays:1,time:0,dayLen:DAY_LEN,dayClock:0,threat:0,strategicClock:0,nextArmySpawn:18+Math.random()*12,caravans:[],contractsClock:0,activeContract:null };
  }

  function treatyActive(fid, key){
    const d = state.diplomacy?.[fid];
    return !!(d && d.treaties && (d.treaties[key]||0) >= (state.map?.day||1));
  }

  function computeThreat(){
    const p = state.player;
    const holdings = state.map.settlements.filter(s=>s.kind==='castle' && (s.factionId==='player' || (p.faction && s.factionId===p.faction))).length;
    const vN = p.vassals?.length||0;
    const t = 0.10*(state.map.day-1) + 0.30*(p.level-1) + 0.05*armySize(p) + 0.65*holdings + 0.04*(p.renown||0) - 0.15*vN;
    state.map.threat = clamp(t,0,12);
  }

  function troopWage(unitKey){
    const d=UNIT_DB[unitKey]; if(!d) return 0.1;
    return 0.10 + d.tier*0.12 + (d.role==='arc'?0.03:0) + (d.role==='cav'?0.06:0) + (d.role==='sup'?0.04:0);
  }

  function reinforceEnemyArmyParty(party){
    if(!party || !party.alive || party.factionId==='player') return;
    const playerCount = Math.max(1, armySize(state.player));
    const enemyCount = Math.max(1, party.size || (party.comp?.length||1));
    const ratio = playerCount / enemyCount;
    let growthMul = 1.0;
    if(ratio > 1.2) growthMul = 1.28 + Math.min(0.42, (ratio-1.2)*0.18);
    else if(ratio < 0.75) growthMul = 0.72 + Math.max(0, (ratio/0.75)*0.16);

    const baseGrowth = 1 + Math.floor(state.map.day*0.025 + state.map.threat*0.22);
    const addCount = Math.max(1, Math.round(baseGrowth * growthMul));
    const hardCap = clamp(88 + Math.floor(state.map.day*1.4) + Math.floor(state.map.threat*5), 88, 220);
    const room = Math.max(0, hardCap - enemyCount);
    const finalAdds = Math.min(addCount, room);
    if(finalAdds<=0) return;

    const reinforcements = makePartyComp(
      party.kind||'army',
      finalAdds,
      { threat:state.map.threat, day:state.map.day, factionId:party.factionId, isElite:!!party.isKing }
    );
    party.comp = [...(party.comp||[]), ...reinforcements];
    party.size = (party.comp||[]).length;
  }

  function onNewDay(){
    const p = state.player;
    state.map.totalDays = state.map.day;
    let wages = 0;
    for(const u of p.armyUnits) wages += troopWage(unitBaseKey(u));
    for(const v of (p.vassals||[])){
      const party = partyById(v.partyId); if(!party || !party.alive) continue;
      let vw = 0; for(const cu of party.comp||[]) vw += troopWage(cu.unit);
      wages += vw * 0.8 * (v.wageMul||1);
      if(p.gold < wages){ v.loyalty = Math.max(0,(v.loyalty||70)-8); }
      else v.loyalty = Math.min(95,(v.loyalty||70)+1);
      if(v.loyalty<20 && Math.random()<0.14){ party.alive=false; toast(`⚠️ ${v.name} disbanded due to poor support.`); }
    }
    if(p.gold >= wages){ p.gold -= wages; p.daysUnpaid=0; p.wageDebt=0; }
    else { const def=wages-p.gold; p.gold=0; p.wageDebt += def; p.daysUnpaid++; p.morale-=6; }
    p.morale += (p.food>0)?2:-6;
    if(p.food<=0) p.daysStarving++; else p.daysStarving=0;
    if(p.daysUnpaid>0) p.morale -= Math.min(16,(4+2*p.daysUnpaid));
    if(p.lastBattleResultDay===state.map.day-1){
      if(p.lastBattleResultType==='field_win') p.morale +=3;
      if(p.lastBattleResultType==='siege_win') p.morale +=6;
      if(p.lastBattleResultType==='defeat') p.morale -=10;
    }
    if(p.faction && treatyActive(p.faction,'napUntil') && treatyActive(p.faction,'tradeUntil')) p.morale += 1;
    if(p.restedToday) p.morale += 1;
    p.restedToday = false;
    const bad = (p.morale<35 || p.daysStarving>=2 || p.daysUnpaid>=2);
    if(bad){
      let desertChance = clamp((35-p.morale)/60 + 0.08*p.daysStarving + 0.06*p.daysUnpaid, 0, 0.65);
      if(Math.random()<desertChance && p.armyUnits.length>0){
        let count = 1 + Math.floor(rand(0, 1 + Math.max(0,(35-p.morale))/12));
        const pri=[0,1,2];
        while(count>0 && p.armyUnits.length){
          let idx=-1;
          for(const t of pri){ idx = p.armyUnits.findIndex(u=>UNIT_DB[unitBaseKey(u)] && UNIT_DB[unitBaseKey(u)].tier===t); if(idx>=0) break; }
          if(idx<0) idx = 0;
          p.armyUnits.splice(idx,1); count--;
        }
        toast('😟 Desertion in your ranks due to low morale'); p.morale -= 5;
      }
    }
    p.morale = clamp(p.morale,0,100);
    p.influence += Math.floor((p.renown||0)/25);
    for(const f of FACTIONS){ const d=state.diplomacy[f.id]; d.hostility = Math.max(0,(d.hostility||0)-6); }

    for(const party of state.map.parties){
      if(!party.alive || party.factionId==='player') continue;
      if(party.kind==='army' || party.kind==='patrol' || party.kind==='vassal') reinforceEnemyArmyParty(party);
    }

    ensureFactionState();
    if(state.map.day % 7 === 0){
      for(const f of FACTIONS){
        const fs = factionStateOf(f.id);
        const targetLords = 3;
        const liveLords = state.map.parties.filter(pp=>pp.alive && pp.factionId===f.id && pp.isLord && !pp.isKing).length;
        if(liveLords < targetLords) spawnFactionLord(f.id,false);
        fs.nextLordSpawnDay = state.map.day + 7;
      }
    }
    for(const f of FACTIONS){
      const leaders = livingFactionLeaders(f.id);
      if(leaders.length===0){
        if(state.player.faction===f.id){
          if(state.player.isKingOf!==f.id){ state.player.isKingOf=f.id; state.player.renown=(state.player.renown||0)+20; state.player.influence=(state.player.influence||0)+10; toast(`👑 You are now sovereign of ${factionName(f.id)}!`,1800); }
        } else {
          spawnFactionLord(f.id,true);
        }
      }
    }
    for(const s of state.map.settlements){
      if(s.kind!=='castle') continue;
      s.garrisonRegenDay = state.map.day;
      s.defense = s.defense || {walls:1,towers:0,traps:0};
      s.garrison = s.garrison || {};
      const add=(k,n)=>s.garrison[k]=(s.garrison[k]||0)+n;
      const tree = s.factionId==='nords' ? ['no_raider','no_skirmisher','no_wildman'] : (s.factionId==='nomads' ? ['st_steppe_archer','st_veteran_mounted_archer','st_companion_guard'] : ['kn_nobleman','kn_pikeman','kn_hoplite']);
      add(tree[0], randi(1,3));
      if(Math.random()<clamp(0.20+state.map.day*0.01+state.map.threat*0.03,0.2,0.75)) add(tree[1],1);
      if(Math.random()<clamp(0.16+state.map.day*0.01+state.map.threat*0.02,0.1,0.65)) add(tree[2],1);
      if((state.map.day>=12 || state.map.threat>=7) && Math.random()<0.18) add('sup_banner',1);
      const upChance = clamp(0.08 + 0.01*state.map.day + 0.015*state.map.threat,0.08,0.35);
      if(Math.random()<upChance){
        const later = state.map.day>12 || state.map.threat>7;
        const pick = later ? ['towers','traps','walls'][randi(0,2)] : ['walls','walls','towers','traps'][randi(0,3)];
        const max={walls:7,towers:6,traps:6}; if((s.defense[pick]||0)<max[pick]) s.defense[pick]++;
      }
    }

    if(state.map.day % 4 === 0){
      const f = FACTIONS[randi(0,FACTIONS.length-1)];
      const size = clamp(40 + Math.floor(state.map.day*0.8 + state.map.threat*2), 40, 84);
      const x=randi(3,MAP_W-4), y=randi(3,MAP_H-4);
      const party={ id:'p_'+Math.random().toString(36).slice(2,9), kind:'army', factionId:f.id, x,y, roamTx:x, roamTy:y, aggro:3.8, baseSpeed:1.68, size, comp:makePartyComp('army', size, {threat:state.map.threat, day:state.map.day, factionId:f.id, isElite:true}), alive:true, targetSettlementId:null };
      const targets = state.map.settlements.filter(ss=>ss.kind==='castle' && ss.factionId!==f.id);
      if(targets.length) party.targetSettlementId = targets[randi(0,targets.length-1)].id;
      state.map.parties.push(party);
    }
    computeThreat();
  }

// =========================
  // Save/load
  // =========================
  function serialize(){
    return { version: SAVE_VERSION, map: state.map, player: state.player, diplomacy: state.diplomacy };
  }

  function save(){
    try{
      localStorage.setItem(SAVE_KEY, JSON.stringify(serialize()));
      toast('Saved ✅');
    }catch(e){
      toast('Save failed (localStorage blocked?)');
      console.error(e);
    }
  }

  function load(){
    try{
      const raw = localStorage.getItem(SAVE_KEY);
      if(!raw){ toast('No save found'); return false; }
      const data = JSON.parse(raw);
      if(!data || !data.version){ toast('Save incompatible'); return false; }
      // basic forward compat
      state.map = data.map;
      state.player = data.player;
      state.diplomacy = data.diplomacy || makeNewDiplomacy();
      // migrations
      if(state.diplomacy.red || state.diplomacy.blue || state.diplomacy.green){
        const old=state.diplomacy;
        state.diplomacy = makeNewDiplomacy();
        state.diplomacy.knights = old.red || state.diplomacy.knights;
        state.diplomacy.nords = old.blue || state.diplomacy.nords;
        state.diplomacy.nomads = old.green || state.diplomacy.nomads;
      }
      if(typeof state.diplomacy.red === 'number'){
        const old = state.diplomacy;
        state.diplomacy = makeNewDiplomacy();
        for(const f of FACTIONS) state.diplomacy[f.id].standing = old[f.id]||0;
      }
      for(const f of FACTIONS){
        state.diplomacy[f.id] = state.diplomacy[f.id] || makeNewDiplomacy()[f.id];
        state.diplomacy[f.id].standing = state.diplomacy[f.id].standing || 0;
        state.diplomacy[f.id].hostility = state.diplomacy[f.id].hostility || 0;
        state.diplomacy[f.id].treaties = state.diplomacy[f.id].treaties || {napUntil:0,tradeUntil:0,accessUntil:0};
      }
      state.player.morale = state.player.morale ?? 65;
      state.player.renown = state.player.renown ?? 0;
      state.player.influence = state.player.influence ?? 0;
      state.player.wageDebt = state.player.wageDebt ?? 0;
      state.player.daysStarving = state.player.daysStarving ?? 0;
      state.player.daysUnpaid = state.player.daysUnpaid ?? 0;
      state.player.vassals = state.player.vassals || [];
      state.player.isKingOf = state.player.isKingOf || null;
      ensureFactionState();
      normalizeArmyUnits(state.player);
      const fmap={red:'knights',blue:'nords',green:'nomads'};
      if(state.player.faction && fmap[state.player.faction]) state.player.faction=fmap[state.player.faction];
      state.player.restedToday = state.player.restedToday || false;
      state.map.day = state.map.day || 1;
      state.map.totalDays = state.map.totalDays || state.map.day;
      state.map.time = state.map.time || 0;
      state.map.dayLen = state.map.dayLen || DAY_LEN;
      state.map.threat = state.map.threat || 0;
      if(!state.player.bannerColor) state.player.bannerColor = pickUniqueBannerColor();
      // ensure villages have volunteer structures (older saves)
      for(const s of state.map.settlements){
        if(s.kind==='village'){
          if(!s.village || !s.village.volunteers){
            s.village = makeVillageVolunteers();
          }
        }
      }
      state.mode='map'; state.battle=null;
      for(const s of state.map.settlements){
        if(s.kind==='castle'){
          s.defense = s.defense || { walls:1, towers:0, traps:0 };
          if(!s.garrison) s.garrison = seedGarrison();
        }
        ensureSettlementSystems(s);
      }
      state.map.caravans = state.map.caravans || [];
      ensureFactionState();
      for(const pp of (state.map.parties||[])){ pp.isLord=!!pp.isLord; pp.isKing=!!pp.isKing; pp.realmFactionId=pp.realmFactionId||pp.factionId||null; pp.eliteBias=pp.eliteBias||0; }
      state.map.pois = state.map.pois || [];
      state.map.activeContract = state.map.activeContract || null;
      for(const s of state.map.settlements){
        if(s.kind==='village' && (!s.factionId || !FACTIONS.find(f=>f.id===s.factionId))) s.factionId='knights';
      }
      closeAllPanels();
      toast('Loaded ✅');
      syncHUD();
      return true;
    }catch(e){
      toast('Load failed');
      console.error(e);
      return false;
    }
  }

  // =========================
  // Army panel (upgrades + wounded)
  // =========================
  function mapSpeedFor(p){
    const n = armySize(p);
    const slow = 1 + n * 0.035;
    const starving = (p.food<=0) ? 1.35 : 1.0;
    return p.mapSpeedBase / slow / starving;
  }

  function countUnitsArray(arr){
    const m = {};
    for(const u of arr){
      const k = unitBaseKey(u);
      m[k] = (m[k]||0)+1;
    }
    return m;
  }

  function renderArmyPanel(){
    const p = state.player;
    const counts = countUnitsArray(p.armyUnits);
    const keys = Object.keys(counts).sort((a,b)=>{
      const A=UNIT_DB[a], B=UNIT_DB[b];
      if(A.role!==B.role) return A.role.localeCompare(B.role);
      if(A.tier!==B.tier) return A.tier-B.tier;
      return A.name.localeCompare(B.name);
    });

    const upgradeRowsByFrom = {};
    for(const fromKey of keys){
      const def = UNIT_DB[fromKey];
      if(!def.upgrades || !def.upgrades.length) continue;
      const have = counts[fromKey]||0;
      upgradeRowsByFrom[fromKey] = [];
      for(const up of def.upgrades){
        const toDef = UNIT_DB[up.to];
        upgradeRowsByFrom[fromKey].push(`
          <div class="item">
            <div class="meta">
              <b>${up.label}</b>
              <div class="tag">${def.name} → ${toDef.name} • Cost: 💰 ${upgradeCost(fromKey, up.to)}</div>
            </div>
            <button class="btn" data-upfrom="${fromKey}" data-upto="${up.to}" data-upcost="${upgradeCost(fromKey, up.to)}" ${have<=0?'disabled':''}>Upgrade 1</button>
          </div>
        `);
      }
    }

    const selectableUpgradeKeys = keys.filter(k => (upgradeRowsByFrom[k]||[]).length>0);
    if(state.armyUpgradeFocus && !selectableUpgradeKeys.includes(state.armyUpgradeFocus)){
      state.armyUpgradeFocus = null;
    }
    const focusedUpgradeKey = state.armyUpgradeFocus || selectableUpgradeKeys[0] || null;
    const focusedRows = focusedUpgradeKey ? (upgradeRowsByFrom[focusedUpgradeKey]||[]) : [];

    const wCounts = {};
    for(const u of p.woundedUnits){ wCounts[u] = (wCounts[u]||0)+1; }
    const wKeys = Object.keys(wCounts);
    let armyW=0, vassalW=0;
    for(const u of p.armyUnits) armyW += troopWage(unitBaseKey(u));
    for(const v of (p.vassals||[])){ const party=partyById(v.partyId); if(!party||!party.alive) continue; let vw=0; for(const cu of (party.comp||[])) vw+=troopWage(cu.unit); vassalW += vw*0.8*(v.wageMul||1); }

    ui.panelArmy.innerHTML = `
      <h2>Army & Upgrades</h2>
      <div class="small">
        Bigger armies move slower. Fallen allied troops have a <b>${Math.round(WOUNDED_CHANCE*100)}%</b> chance to be <b>wounded</b> instead of killed.
      </div>
      <div class="hr"></div>

      <div class="row">
        <div class="chip">👥 Total <b>${armySize(p)}</b></div>
        <div class="chip">🤕 Wounded <b>${p.woundedUnits.length}</b></div>
        <div class="chip">🏃 Map Speed <b>${mapSpeedFor(p).toFixed(2)}</b></div>
        <div class="chip">🛡 Vassals <b>${(p.vassals||[]).length}</b></div>
        <div class="chip">💸 Daily Wages <b>${armyW.toFixed(1)}</b> + vassals <b>${vassalW.toFixed(1)}</b></div>
      </div>

      <div class="hr"></div>
      <h2 style="margin-top:0">Roster</h2>
      <div class="list">
        ${keys.length ? keys.map(k=>{
          const d = UNIT_DB[k];
          const qty = counts[k];
          const shieldTag = d.shield ? ' • 🛡 Shield' : '';
          const weaponFlavor = d.role==='arc' ? (d.projKind==='bolt'?' • Crossbow':' • Bow') : (d.range>=2.3?' • Pike':'');
          return `<div class="item">
            <div class="meta"><b>${d.name}</b><div class="tag">${d.role==='inf'?'Infantry':(d.role==='arc'?'Archers':(d.role==='cav'?'Cavalry':'Support'))} • Tier ${d.tier}${shieldTag}${weaponFlavor}</div></div>
            <div class="mono">x${qty}</div>
          </div>`;
        }).join('') : `<div class="small">No active troops.</div>`}
      </div>

      <div class="hr"></div>
      <h2 style="margin-top:0">Wounded (recover over time on the map)</h2>
      <div class="list">
        ${wKeys.length ? wKeys.map(k=>{
          const d = UNIT_DB[k];
          return `<div class="item">
            <div class="meta"><b>${d.name}</b><div class="tag">Wounded stack</div></div>
            <div class="mono">x${wCounts[k]}</div>
          </div>`;
        }).join('') : `<div class="small">None.</div>`}
      </div>

      <div class="hr"></div>
      <h2 style="margin-top:0">Upgrades</h2>
      <div class="small">Tap or click a troop stack to view its upgrade paths.</div>
      <div class="row" style="margin-top:8px;">
        ${selectableUpgradeKeys.length ? selectableUpgradeKeys.map(k=>{
          const d = UNIT_DB[k];
          const active = focusedUpgradeKey===k;
          return `<button class="btn" data-upfocus="${k}" style="${active?'background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.35);':''}">${d.name} <span class="mono">x${counts[k]||0}</span></button>`;
        }).join('') : `<div class="small">No upgrades available right now.</div>`}
      </div>
      <div class="list" style="margin-top:10px;">
        ${focusedRows.length ? focusedRows.join('') : (selectableUpgradeKeys.length ? `<div class="small">Select a troop type to see available upgrades.</div>` : ``)}
      </div>

      <div class="hr"></div>
      <h2 style="margin-top:0">Squads & Veterancy</h2>
      <div class="row"><input id="sqName" placeholder="New squad name"/><button class="btn" id="mkSq">Create Squad</button><select id="sqPick"><option value="">Assign first 5 to…</option>${(p.squads||[]).map(sq=>`<option value="${sq.id}">${sq.name}</option>`).join('')}</select><button class="btn" id="doAssign">Assign</button><button class="btn" id="promote5">Fast Promote 5</button></div>
      <div class="list" style="margin-top:8px;">${(p.squads||[]).map(sq=>{ const us=p.armyUnits.filter(u=>u.squadId===sq.id); const avg=us.length?(us.reduce((a,b)=>a+(b.rank||0),0)/us.length).toFixed(2):'0'; const tx=us.reduce((a,b)=>a+(b.xp||0),0); return `<div class="item"><div class="meta"><b style="color:${sq.color}">${sq.name}</b><div class="tag">Count ${us.length} • Avg rank ${avg} • XP ${tx}</div></div></div>`;}).join('')||'<div class="small">No squads yet.</div>'}</div>

      <div class="hr"></div>
      <h2 style="margin-top:0">Vassals</h2>
      <div class="small">Unlock at 25 renown + pledge or owning a castle. Cost: 220 gold, 6 influence, 10 renown.</div>
      <div class="row" style="margin-top:8px;"><button class="btn" id="btnCreateVassal">Create Vassal</button></div>
      <div class="list" style="margin-top:8px;">${(p.vassals||[]).map(v=>{ const pp=partyById(v.partyId); return `<div class="item"><div class="meta"><b>${v.name}</b><div class="tag">Loyalty ${Math.round(v.loyalty||0)} • ${v.orders||'auto'} • Size ${pp?.size||0}</div></div><select data-vorder="${v.id}"><option value="auto" ${v.orders==='auto'?'selected':''}>auto</option><option value="defend" ${v.orders==='defend'?'selected':''}>defend</option><option value="raid" ${v.orders==='raid'?'selected':''}>raid</option><option value="patrol" ${v.orders==='patrol'?'selected':''}>patrol</option><option value="follow" ${v.orders==='follow'?'selected':''}>follow</option></select></div>`; }).join('') || '<div class="small">No vassals yet.</div>'}</div>
      <div class="hr"></div>
      <div class="row"><button class="btn" id="btnCloseArmy">Close</button></div>
    `;

    ui.panelArmy.querySelector('#btnCloseArmy').onclick = () => closeAllPanels();

    for(const btn of ui.panelArmy.querySelectorAll('button[data-upfrom]')){
      btn.onclick = () => {
        const p = state.player;
        const fromKey = btn.getAttribute('data-upfrom');
        const toKey = btn.getAttribute('data-upto');
        const cost = Number(btn.getAttribute('data-upcost'));
        if(p.gold < cost){ toast('Not enough gold for upgrade'); return; }
        const idx = p.armyUnits.findIndex(u => unitBaseKey(u)===fromKey);
        if(idx<0){ toast('No unit available to upgrade'); return; }
        p.gold -= cost;
        p.armyUnits[idx].baseUnit = toKey; p.armyUnits[idx].xp = 0; p.armyUnits[idx].rank = 0;
        toast(`Upgraded → ${UNIT_DB[toKey].name}`);
        renderArmyPanel();
        syncHUD();
      };
    }


    const mkSq = ui.panelArmy.querySelector('#mkSq');
    if(mkSq) mkSq.onclick=()=>{ const n=(ui.panelArmy.querySelector('#sqName').value||'').trim(); if(!n){toast('Name required');return;} p.squads.push({id:'sq_'+Math.random().toString(36).slice(2,8),name:n,color:hslToHex(randi(0,359),70,62),createdDay:state.map.day}); renderArmyPanel(); };
    const asg = ui.panelArmy.querySelector('#doAssign');
    if(asg) asg.onclick=()=>{ const sq=ui.panelArmy.querySelector('#sqPick').value; if(!sq){toast('Pick squad');return;} let n=0; for(const u of p.armyUnits){ if(!u.squadId&&n<5){u.squadId=sq;n++;}} toast('Assigned units'); renderArmyPanel(); };
    const pr5=ui.panelArmy.querySelector('#promote5');
    if(pr5) pr5.onclick=()=>{ let n=0; for(const u of p.armyUnits){ if((u.rank||0)>=2) continue; const cost=[80,160,280][u.rank||0]||280; if(p.gold<cost) break; p.gold-=cost; u.rank=(u.rank||0)+1; n++; if(n>=5) break; } toast(n?`Promoted ${n} units`:'No promotions'); renderArmyPanel(); syncHUD(); };
    const bcv = ui.panelArmy.querySelector('#btnCreateVassal');
    if(bcv) bcv.onclick = ()=>{
      const hasCastle = state.map.settlements.some(s=>s.kind==='castle' && s.factionId==='player');
      if((p.renown||0)<25 || (!hasCastle && !p.faction)){ toast('Need 25 renown and a realm tie first'); return; }
      if(p.gold<220 || p.influence<6 || p.renown<10){ toast('Not enough resources for vassal'); return; }
      p.gold-=220; p.influence-=6; p.renown-=10;
      const id='p_'+Math.random().toString(36).slice(2,9);
      const size = clamp(10 + Math.floor((p.renown||0)/10) + Math.floor(state.map.day/4), 10, 28);
      const party={ id, kind:'vassal', factionId:'player', x:p.x+rand(-1.5,1.5), y:p.y+rand(-1.5,1.5), roamTx:p.x, roamTy:p.y, aggro:4.4, baseSpeed:2.0, size, comp:makePartyComp('vassal', size, {threat:state.map.threat, day:state.map.day, factionId:'player'}), alive:true, targetSettlementId:null };
      state.map.parties.push(party);
      p.vassals.push({ id:'v_'+Math.random().toString(36).slice(2,9), name:['Sir Rowan','Lady Mira','Sir Cedric','Dame Elara'][randi(0,3)], partyId:id, loyalty:70, wageMul:rand(0.6,1.2), orders:'auto', homeCastleId:null, lastActionDay:state.map.day });
      renderArmyPanel(); syncHUD();
    };

    for(const sel of ui.panelArmy.querySelectorAll('select[data-vorder]')) sel.onchange=(e)=>{ const id=e.target.getAttribute('data-vorder'); const vv=p.vassals.find(v=>v.id===id); if(vv) vv.orders=e.target.value; };

    for(const btn of ui.panelArmy.querySelectorAll('button[data-upfocus]')){
      btn.onclick = () => {
        state.armyUpgradeFocus = btn.getAttribute('data-upfocus');
        renderArmyPanel();
      };
    }
  }

  function mapActionsPaused(){
    return state.mode==='map' && state.panelsOpen.settlement;
  }

  function spawnCombatBurst(x, y, team){
    if(!state.battle) return;
    const cnt = randi(4, 7);
    for(let i=0;i<cnt;i++){
      const ang = Math.random()*Math.PI*2;
      const spd = rand(1.6, 4.8);
      state.battle.particles.push({
        x, y,
        vx: Math.cos(ang)*spd,
        vy: Math.sin(ang)*spd,
        ttl: rand(0.22, 0.46),
        life: rand(0.22, 0.46),
        size: rand(0.08, 0.16),
        team
      });
    }
  }


  function spawnBloodSpray(x,y,intensity=1){
    if(!state.battle) return;
    const cnt = Math.round(5 + 5*intensity);
    for(let i=0;i<cnt;i++){
      const a = Math.random()*Math.PI*2;
      const sp = rand(1.2,4.4)*intensity;
      state.battle.particles.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, ttl:rand(0.18,0.36), life:rand(0.18,0.36), size:rand(0.05,0.12), team:'blood' });
    }
  }

  function spawnBloodAt(x, y){
    if(!state.battle) return;
    state.battle.blood.push({
      x: x + rand(-0.12,0.12),
      y: y + rand(-0.12,0.12),
      size: rand(0.18,0.34),
      rot: rand(0, Math.PI*2),
      alpha: rand(0.32,0.56)
    });
    if(state.battle.blood.length > 220){
      state.battle.blood.splice(0, state.battle.blood.length - 220);
    }
  }

  // =========================
  // Diplomacy panel (+ pledge allegiance cost by friendliness)
  // =========================
  function renderDiplomacyPanel(){
    const d = state.diplomacy;
    const p = state.player;

    function rowFor(fid){
      const relObj = d[fid];
      const v = effectiveRelation(fid);
      const col = factionColor(fid);
      const label = relationLabel(v);
      const pct = clamp((v+100)/200, 0, 1) * 100;
      const cost = joinCost(v);
      const napLeft = Math.max(0,(relObj.treaties.napUntil||0)-state.map.day+1);
      const tradeLeft = Math.max(0,(relObj.treaties.tradeUntil||0)-state.map.day+1);
      const accessLeft = Math.max(0,(relObj.treaties.accessUntil||0)-state.map.day+1);

      const joined = (p.faction===fid);
      const canJoin = (!p.faction && v>=0);
      const canAfford = (p.gold >= cost);

      return `
        <div class="item">
          <div class="meta">
            <b style="color:${col}">${factionName(fid)}</b>
            <div class="tag">Relation: <span class="mono">${v}</span> • ${label} (S:${relObj.standing} H:${relObj.hostility})</div>
            <div class="bar"><div style="width:${pct}%"></div></div>
            <div class="tag">Pledge Cost: 💰 <span class="mono">${cost}</span> (cheaper when friendlier)</div>
          </div>
          <div class="row">
            <button class="btn" data-gift="${fid}">Gift (💰50)</button>
            <button class="btn" data-war="${fid}">Declare War</button>
            <button class="btn" data-peace="${fid}">Make Peace (💰120)</button>
            <button class="btn" data-nap="${fid}" ${(napLeft>0||v<10||p.influence<5||p.gold<120)?'disabled':''}>NAP ${napLeft>0?`(${napLeft}d)`:''}</button>
            <button class="btn" data-trade="${fid}" ${(tradeLeft>0||v<25||p.influence<4||p.gold<160)?'disabled':''}>Trade ${tradeLeft>0?`(${tradeLeft}d)`:''}</button>
            <button class="btn" data-access="${fid}" ${(accessLeft>0||v<15||p.influence<3||p.gold<100)?'disabled':''}>Access ${accessLeft>0?`(${accessLeft}d)`:''}</button>
            <button class="btn" data-join="${fid}" ${(!canJoin || joined || !canAfford)?'disabled':''}>${joined?'Pledged':'Pledge Allegiance'}</button>
          </div>
        </div>
      `;
    }

    ui.panelDiplomacy.innerHTML = `
      <h2>Diplomacy</h2>
      <div class="small">
        Pledging allegiance changes your banner to that kingdom’s color.
        If you’re independent, you carry your own unique banner color, and any castles you capture become <b>Your Domain</b>.
      </div>
      <div class="hr"></div>

      <div class="row">
        <div class="chip">Your Banner: <b style="color:${playerBannerColor()}">${p.faction?factionName(p.faction):'Independent'}</b></div>
      </div>

      <div class="hr"></div>
      <div class="list">
        ${FACTIONS.map(f => rowFor(f.id)).join('')}
      </div>

      <div class="hr"></div>
      <div class="row"><button class="btn" id="btnCloseDip">Close</button></div>
    `;

    ui.panelDiplomacy.querySelector('#btnCloseDip').onclick = () => closeAllPanels();

    for(const b of ui.panelDiplomacy.querySelectorAll('button[data-gift]')){
      b.onclick = () => {
        const fid = b.getAttribute('data-gift');
        if(p.gold < 50){ toast('Not enough gold'); return; }
        p.gold -= 50;
        d[fid].standing = clamp((d[fid].standing||0) + 10, -100, 100);
        toast(`Relations improved with ${factionName(fid)} (+10)`);
        renderDiplomacyPanel(); syncHUD();
      };
    }
    for(const b of ui.panelDiplomacy.querySelectorAll('button[data-war]')){
      b.onclick = () => {
        const fid = b.getAttribute('data-war');
        d[fid].standing = clamp(Math.min(d[fid].standing||0, -60), -100, 100); d[fid].hostility += 30; d[fid].treaties={napUntil:0,tradeUntil:0,accessUntil:0};
        toast(`You are now at war with ${factionName(fid)}`);
        renderDiplomacyPanel();
      };
    }
    for(const b of ui.panelDiplomacy.querySelectorAll('button[data-peace]')){
      b.onclick = () => {
        const fid = b.getAttribute('data-peace');
        if(p.gold < 120){ toast('Not enough gold'); return; }
        p.gold -= 120;
        d[fid].standing = 0; d[fid].hostility = 0;
        toast(`Peace made with ${factionName(fid)} (relation reset)`);
        renderDiplomacyPanel(); syncHUD();
      };
    }

    for(const b of ui.panelDiplomacy.querySelectorAll('button[data-nap]')){
      b.onclick = ()=>{ const fid=b.getAttribute('data-nap'); const rel=effectiveRelation(fid); if(rel<10||state.player.influence<5||state.player.gold<120) return; state.player.influence-=5; state.player.gold-=120; state.diplomacy[fid].treaties.napUntil=state.map.day+8; renderDiplomacyPanel(); syncHUD(); };
    }
    for(const b of ui.panelDiplomacy.querySelectorAll('button[data-trade]')){
      b.onclick = ()=>{ const fid=b.getAttribute('data-trade'); const rel=effectiveRelation(fid); if(rel<25||state.player.influence<4||state.player.gold<160) return; state.player.influence-=4; state.player.gold-=160; state.diplomacy[fid].treaties.tradeUntil=state.map.day+10; renderDiplomacyPanel(); syncHUD(); };
    }
    for(const b of ui.panelDiplomacy.querySelectorAll('button[data-access]')){
      b.onclick = ()=>{ const fid=b.getAttribute('data-access'); const rel=effectiveRelation(fid); if(rel<15||state.player.influence<3||state.player.gold<100) return; state.player.influence-=3; state.player.gold-=100; state.diplomacy[fid].treaties.accessUntil=state.map.day+10; renderDiplomacyPanel(); syncHUD(); };
    }
    for(const b of ui.panelDiplomacy.querySelectorAll('button[data-join]')){
      b.onclick = () => {
        const fid = b.getAttribute('data-join');
        if(p.faction){ toast('You already pledged to a kingdom'); return; }
        const rel = effectiveRelation(fid);
        if(rel < 0){ toast('They won’t accept your pledge (need Neutral+)'); return; }
        const cost = joinCost(rel);
        if(p.gold < cost){ toast('Not enough gold to pledge'); return; }

        p.gold -= cost;
        p.faction = fid;
        d[fid].standing = Math.max(d[fid].standing||0, 60);
        // convert your holdings to the pledged kingdom color
        convertPlayerHoldingsToFaction(fid);

        toast(`Pledged to ${factionName(fid)}!`, 1600);
        renderDiplomacyPanel(); syncHUD();
      };
    }
  }

  function spawnFactionLord(fid, isKing=false){
    const homes = state.map.settlements.filter(s=>s.factionId===fid && s.kind==='castle');
    const home = homes.length ? homes[randi(0,homes.length-1)] : {x:randi(6,MAP_W-6),y:randi(6,MAP_H-6)};
    const size = isKing ? clamp(Math.round(randi(34,52)*rand(1.85,2.25)),62,98) : clamp(Math.round(randi(12,20)*rand(1.25,1.55)),16,34);
    const id = 'p_'+Math.random().toString(36).slice(2,9);
    const party = { id, kind:'army', factionId:fid, x:home.x+rand(-1,1), y:home.y+rand(-1,1), roamTx:home.x, roamTy:home.y, aggro:4.2, baseSpeed:1.72, size,

    state.map.parties.push(party);
    const fs = factionStateOf(fid);
    if(fs){
      if(isKing) fs.kingPartyId = party.id;
      else if(!fs.lordPartyIds.includes(party.id)) fs.lordPartyIds.push(party.id);
    }
    return party;
  }
  function onKingDefeated(fid){
    const fs = factionStateOf(fid); if(!fs) return;
    const arr = FACTION_TEMPLATES[fid] || [];
    fs.variantIndex = arr.length ? (fs.variantIndex + 1) % arr.length : 0;
    const tpl = factionTemplate(fid, fs.variantIndex);
    fs.name = tpl.name; fs.color = tpl.color; fs.sigil = tpl.sigil;
    spawnFactionLord(fid, true);
    toast(`👑 ${fs.name} rises with a new banner!`, 1800);
  }

    // any "player" settlements become the pledged faction (so castles/villages match kingdom color)
    for(const s of state.map.settlements){

        s.factionId = fid;
        if(s.kind==='castle') s.stock = makeCastleStock(fid);

  }

  // Settlements / garrisons / siege entry
  // =========================
  let currentSettlement = null;

  function nearestSettlement(x,y, radius){
    let best=null, bd=1e9;
    for(const s of state.map.settlements){
      const d = dist2(x,y,s.x,s.y);
      if(d < radius*radius && d < bd){ bd=d; best=s; }
    }
    return best;
  }

  function settlementById(id){
    return state.map.settlements.find(s=>s.id===id) || null;
  }
  function partyById(id){
    return state.map.parties.find(p=>p.id===id) || null;
  }

  function isPartyHostileToPlayer(party){
    if(!party || !party.alive) return false;
    if(['bandit','looters','bandits','sea_raiders','steppe_bandits'].includes(party.kind)) return true;
    if(party.kind==='neutral' || party.kind==='vassal') return false;
    const p = state.player;
    if(party.factionId && p.faction && party.factionId===p.faction) return false;
    if(party.factionId){
      const d = state.diplomacy[party.factionId];
      if(d && treatyActive(party.factionId,'napUntil') && (d.hostility||0)<=40) return false;
      return effectiveRelation(party.factionId) <= -20;
    }
    return false;
  }

  function isPartyHostileToSettlement(party, settlement){
    if(!party.alive) return false;
    if(settlement.kind!=='castle') return false;
    if(party.kind==='neutral') return false;
    if(['bandit','looters','bandits','sea_raiders','steppe_bandits'].includes(party.kind)) return true;
    if(!party.factionId) return false;
    if(party.factionId === settlement.factionId) return false;
    return true;
  }

  function generateContract(settlement){
    const typePool=['clear_camp','escort_caravan','defend_siege','deliver_goods'];
    const type = typePool[randi(0,typePool.length-1)];
    const id='ct_'+Math.random().toString(36).slice(2,9);
    const expiresDay = (state.map?.day||1)+randi(4,7);
    if(type==='clear_camp'){
      return { id,type,title:'Clear Bandit Camp',desc:'Destroy a nearby enemy camp.',reward:{gold:120,relation:6,volunteers:2},expiresDay,state:'available',targetId:null,settlementId:settlement.id,spawnKind:partyKindForBiome(biomeAt(settlement.x, settlement.y)) };
    }
    if(type==='escort_caravan') return { id,type,title:'Escort Caravan',desc:'Stay near the caravan until it arrives.',reward:{gold:90,relation:4,volunteers:1},expiresDay,state:'available',targetId:settlement.parentCastleId||settlement.id,progress:0,settlementId:settlement.id };
    if(type==='defend_siege') return { id,type,title:'Defend Siege',desc:'Help defend a linked castle under threat.',reward:{gold:150,relation:8,volunteers:2},expiresDay,state:'available',targetId:settlement.parentCastleId||settlement.id,settlementId:settlement.id };
    return { id,type,title:'Deliver Goods',desc:'Deliver 20 food to destination.',reward:{gold:110,relation:5,volunteers:2},expiresDay,state:'available',targetId:(state.map.settlements.find(x=>x.id!==settlement.id&&x.kind===settlement.kind)||settlement).id,needFood:20,settlementId:settlement.id };
  }
  function ensureContracts(settlement){
    settlement.contracts = settlement.contracts||[];
    const day=state.map?.day||1;
    settlement.contracts = settlement.contracts.filter(c=>c.state==='active' || c.expiresDay>=day);
    while(settlement.contracts.filter(c=>c.state==='available' || c.state==='active').length<2){
      settlement.contracts.push(generateContract(settlement));
    }
  }
  function applyContractReward(c){
    const p=state.player;
    p.gold += c.reward.gold||0;
    if(c.reward.relation && currentSettlement && currentSettlement.factionId!=='player' && state.diplomacy[currentSettlement.factionId]) state.diplomacy[currentSettlement.factionId].standing += c.reward.relation;
    if(c.reward.volunteers && currentSettlement && currentSettlement.kind==='village') regenVillageVolunteers(currentSettlement.village);
    toast('📜 Contract complete');
  }

  function openSettlementPanel(settlement){
    currentSettlement = settlement;
    ensureSettlementSystems(settlement);
    ensureContracts(settlement);
    if(settlement.factionId==='player' || (state.player.faction && settlement.factionId===state.player.faction)) state.player.restedToday = true;

    renderSettlementPanel();
  }

  function upgradeCost(fromKey,toKey){
    const from = UNIT_DB[fromKey], to = UNIT_DB[toKey];
    if(!from || !to) return 0;
    const c = Math.round((to.cost - from.cost)*0.65 + 8);
    return clamp(c, 8, 220);
  }

  function computeHireCostForVillage(unitDef, village){
    // base cost by tier + mild faction friendliness effect (if village is faction-owned)
    const p = state.player;
    let base = 10 + unitDef.tier*34;
    if(unitDef.role==='cav') base += 4;
    if(unitDef.role==='sup') base += 8;

    // if village belongs to a faction, make it cheaper when friendly, pricier when hostile
    if(village.factionId && village.factionId!=='player'){
      const rel = effectiveRelation(village.factionId);
      let mul = clamp(1.12 - rel*0.004, 0.78, 1.55);
      if(treatyActive(village.factionId,'tradeUntil')) mul *= 0.90;
      base *= mul;
    }
    // if it's your domain, modest discount
    if(village.factionId==='player') base *= 0.88;

    return Math.max(8, Math.round(base));
  }

  // Find any party currently "invading" this settlement
  function findInvaderOnSettlement(settlement){
    for(const pid in state.map.invasion){
      const inv = state.map.invasion[pid];
      if(inv && inv.settlementId===settlement.id){
        const party = partyById(pid);
        if(party && party.alive) return party;
      }
    }
    return null;
  }

  function setupMobileControls(){
    const center = 60, maxR = 44;
    function setKnob(dx,dy){
      mobileInput.dx = dx; mobileInput.dy = dy;
      ui.joyKnob.style.left = (center + dx*maxR - 18) + 'px';
      ui.joyKnob.style.top = (center + dy*maxR - 18) + 'px';
    }
    function updateFromEvent(e){
      const r = ui.joyWrap.getBoundingClientRect();
      const x = e.clientX - r.left - center;
      const y = e.clientY - r.top - center;
      const l = Math.hypot(x,y)||1;
      const nx = Math.max(-1, Math.min(1, x/Math.max(maxR,l)));
      const ny = Math.max(-1, Math.min(1, y/Math.max(maxR,l)));
      setKnob(nx, ny);
    }
    ui.joyWrap.addEventListener('pointerdown', (e)=>{
      mobileInput.active = true;
      mobileInput.ptr = e.pointerId;
      ui.joyWrap.setPointerCapture(e.pointerId);
      updateFromEvent(e);
    });
    ui.joyWrap.addEventListener('pointermove', (e)=>{
      if(!mobileInput.active || e.pointerId!==mobileInput.ptr) return;
      updateFromEvent(e);
    });
    const end = (e)=>{
      if(e.pointerId!==mobileInput.ptr) return;
      mobileInput.active = false; mobileInput.ptr = null; setKnob(0,0);
    };
    ui.joyWrap.addEventListener('pointerup', end);
    ui.joyWrap.addEventListener('pointercancel', end);
  }
