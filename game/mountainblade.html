  // =========================
  // Map tick: heal + wounded recovery + village regen + invasions
  // =========================
  function mapTick(dt){
    const p = state.player;
    const paused = mapActionsPaused();

    state.map.time += dt;
    state.map.dayClock = (state.map.dayClock||0) + dt;
    while(state.map.time >= DAY_LEN){
      state.map.time -= DAY_LEN;
      state.map.day += 1;
      onNewDay();
    }
    if(state.map.dayClock >= DAY_TICK){
      state.map.dayClock = 0;
      computeThreat();
    }

    // player regen
    const maxHp = playerMaxHp(p);
    p.hp = Math.min(maxHp, p.hp + 6.5 * dt);

    // wounded recovery (one returns every ~8s)
    p.woundedHealClock += dt;
    if(p.woundedHealClock >= 8.0 && p.woundedUnits.length>0){
      p.woundedHealClock = 0;
      if(p.armyUnits.length<70){
        const unitKey = p.woundedUnits.shift();
        p.armyUnits.push(makeUnitInstance(unitKey));
        toast(`🤕 Wounded returned: ${UNIT_DB[unitKey].name}`);
      } else {
        p.woundedHealClock = 6.5;
      }
    }

    // village volunteer regen
    for(const s of state.map.settlements){
      if(s.kind!=='village') continue;
      if(!s.village) s.village = makeVillageVolunteers();
      s.village.regenClock += dt;
      if(s.village.regenClock >= VILLAGE_REGEN_INTERVAL){
        s.village.regenClock = 0;
        if(Math.random() < VILLAGE_REGEN_CHANCE){
          regenVillageVolunteers(s.village);
        }
      }
    }

    // caravans
    state.map.caravanClock = (state.map.caravanClock||0)+dt;
    if(state.map.caravanClock>=7){
      state.map.caravanClock=0;
      for(const v of state.map.settlements.filter(x=>x.kind==='village'&&x.parentCastleId)){
        if(Math.random()<0.7){ const c=settlementById(v.parentCastleId); if(!c) continue; state.map.caravans.push({id:'cv_'+Math.random().toString(36).slice(2,9),fromVillageId:v.id,toCastleId:c.id,x:v.x,y:v.y,progress:0,food:randi(8,20),gold:randi(8,22),factionId:v.factionId}); }
      }
    }
    state.map.caravans = (state.map.caravans||[]).filter(cv=>{ const from=settlementById(cv.fromVillageId), to=settlementById(cv.toCastleId); if(!from||!to) return false; cv.progress = clamp(cv.progress + dt*0.05,0,1); cv.x = from.x + (to.x-from.x)*cv.progress; cv.y = from.y + (to.y-from.y)*cv.progress; for(const party of state.map.parties){ if(!party.alive || !isPartyHostileToSettlement(party,to)) continue; if(dist2(party.x,party.y,cv.x,cv.y)<1.2){ if(cv.factionId==='player'||(state.player.faction&&cv.factionId===state.player.faction)) toast('⚠️ Caravan raided'); from.village.regenClock=Math.max(0,(from.village.regenClock||0)-6); return false; } } if(cv.progress>=1){ to.storage=to.storage||{gold:0,food:0,goods:{}}; to.storage.gold += cv.gold; to.storage.food += cv.food; return false; } return true; });

    // active contract progress
    if(state.map.activeContract){ const c=state.map.activeContract; if(c.type==='deliver_goods'){ const dst=settlementById(c.targetId); if(dst && nearestSettlement(p.x,p.y,1.2)?.id===dst.id && p.food>=(c.needFood||20)){ p.food-=(c.needFood||20); applyContractReward(c); state.map.activeContract=null; } } if(c.type==='clear_camp'){ const camp=partyById(c.targetId); if(!camp||!camp.alive){ applyContractReward(c); state.map.activeContract=null; } } if(c.type==='escort_caravan' && c.escort){ const fr=settlementById(c.escort.fromId), to=settlementById(c.escort.toId); if(fr&&to){ c.escort.progress=clamp(c.escort.progress+dt*0.04,0,1); c.escort.x=fr.x+(to.x-fr.x)*c.escort.progress; c.escort.y=fr.y+(to.y-fr.y)*c.escort.progress; if(dist2(p.x,p.y,c.escort.x,c.escort.y)<3.2) c.progress=(c.progress||0)+dt; if(c.escort.progress>=1 && (c.progress||0)>14){ applyContractReward(c); state.map.activeContract=null; } } } if(c.type==='defend_siege'){ const target=settlementById(c.targetId); if(target&&findInvaderOnSettlement(target)){ /* tracked */ } else if((state.map.day||1)>(c.expiresDay-1)){ applyContractReward(c); state.map.activeContract=null; } } }

    // food drain
    const drain = state.map.dayFoodRate * dt * (1 + armySize(p)*0.12);
    p.food = Math.max(0, p.food - drain);

    // movement
    const mv = paused ? {dx:0,dy:0} : wantMove();
    const spd = mapSpeedFor(p);
    p.x = clamp(p.x + mv.dx * spd * dt, 0.5, state.map.w-0.5);
    p.y = clamp(p.y + mv.dy * spd * dt, 0.5, state.map.h-0.5);
    if(mv.dx!==0 || mv.dy!==0){
      p.facing.x = mv.dx; p.facing.y = mv.dy;
    }

    // camera follow
    state.cam.x = p.x; state.cam.y = p.y;

    // spawn large armies sometimes
    if(!paused) state.map.nextArmySpawn -= dt;
    if(!paused && state.map.nextArmySpawn <= 0){
      const baseSpawn = 18 + Math.random()*16;
      const faster = clamp(1 - (state.map.day*0.012 + state.map.threat*0.02), 0.55, 1.0);
      state.map.nextArmySpawn = baseSpawn * faster;
      if(Math.random() < 0.55){
        const f = FACTIONS[randi(0,FACTIONS.length-1)];
        const sizeMin = clamp(26 + Math.floor(state.map.day*0.8) + Math.floor(state.map.threat*1.4), 28, 72);
        const sizeMax = clamp(42 + Math.floor(state.map.day*1.1) + Math.floor(state.map.threat*2.2), 32, 78);
        const size = randi(sizeMin, sizeMax);
        const x = randi(3,MAP_W-4), y = randi(3,MAP_H-4);
        const party = {
          id:'p_'+Math.random().toString(36).slice(2,9),
          kind:'army', factionId:f.id,
          x,y, roamTx:x, roamTy:y,
          aggro: 3.6,
          baseSpeed: 1.75,
          size,
          comp: makePartyComp('army', size, { threat:state.map.threat, day:state.map.day, factionId:f.id }),
          alive:true,
          targetSettlementId: null
        };
        const castles = state.map.settlements.filter(s=>s.kind==='castle' && s.factionId!==f.id);
        if(castles.length){
          const t = castles[randi(0,castles.length-1)];
          party.targetSettlementId = t.id;
        }
        state.map.parties.push(party);
      }
    }

    // parties roam/chase/target castles
    for(const party of state.map.parties){
      if(!party.alive) continue;
      if(paused) continue;

      const partySpeed = party.baseSpeed / (1 + party.size*0.03);

      let targetX = party.roamTx, targetY = party.roamTy;

      if(party.targetSettlementId){
        const targ = settlementById(party.targetSettlementId);
        if(targ){ targetX = targ.x; targetY = targ.y; }
      }

      const dp = dist(p.x,p.y, party.x, party.y);
      if(isPartyHostileToPlayer(party) && dp < party.aggro){
        targetX = p.x; targetY = p.y;
      } else {
        if(!party.targetSettlementId){
          if(dist2(party.x,party.y, party.roamTx,party.roamTy) < 1.2){
            party.roamTx = clamp(party.x + rand(-9,9), 1, state.map.w-2);
            party.roamTy = clamp(party.y + rand(-9,9), 1, state.map.h-2);
          }
        }
      }

      const vx = targetX - party.x;
      const vy = targetY - party.y;
      const l = Math.hypot(vx,vy) || 1;
      party.x = clamp(party.x + (vx/l) * partySpeed * dt, 0.5, state.map.w-0.5);
      party.y = clamp(party.y + (vy/l) * partySpeed * dt, 0.5, state.map.h-0.5);

      // engage player
      if(isPartyHostileToPlayer(party) && dp < 0.9){
        startFieldBattle(party);
        return;
      }
    }

    if(!paused) updateVassals(dt);
    if(!paused) updateInvasions(dt);
  }

  function regenVillageVolunteers(v){
    // add toward caps; recruits common, higher tiers rare
    const add1 = (k, chance)=>{
      if(Math.random()>chance) return;
      const cap = v.caps[k]||0;
      v.volunteers[k] = v.volunteers[k]||0;
      if(v.volunteers[k] < cap) v.volunteers[k] += 1;
    };
    for(const k of Object.keys(v.caps||{})){
      const cap=v.caps[k]||0;
      const chance = cap<=1?0.06:(cap<=3?0.18:0.82);
      add1(k, chance);
    }
  }


  function updateVassals(dt){
    const p=state.player;
    if(!p.vassals) return;
    state.map.strategicClock = (state.map.strategicClock||0) + dt;
    for(const v of p.vassals){
      const party = partyById(v.partyId);
      if(!party || !party.alive) continue;
      if(v.orders==='follow'){ party.roamTx = p.x; party.roamTy = p.y; continue; }
      if((state.map.day + (v.id.length%2))%2===0){
        let invaded=null, bd=1e9;
        for(const pid in state.map.invasion){
          const inv=state.map.invasion[pid]; const c=settlementById(inv.settlementId); if(!c||c.kind!=='castle') continue;
          if(c.factionId!=='player' && (!p.faction || c.factionId!==p.faction)) continue;
          const d=dist2(party.x,party.y,c.x,c.y); if(d<bd){bd=d; invaded=c;}
        }
        if(invaded){ party.targetSettlementId = invaded.id; }
      }
      if(!party.targetSettlementId || v.orders==='raid'){
        const targets = state.map.settlements.filter(s=>s.kind==='castle' && s.factionId!=='player' && (!p.faction || s.factionId!==p.faction));
        if(targets.length){
          const t = targets[randi(0,targets.length-1)];
          const defS = garrisonCount(t.garrison||{})*(1+(t.defense?.walls||1)*0.08+(t.defense?.towers||0)*0.05) + (t.defense?.traps||0)*2;
          if(party.size >= defS*0.85 || state.map.threat<4) party.targetSettlementId=t.id;
        }
      }
    }
  }

  function updateInvasions(dt){
    const inv = state.map.invasion;

    for(const pid of Object.keys(inv)){
      const party = partyById(pid);
      const settlement = settlementById(inv[pid].settlementId);
      if(!party || !party.alive || !settlement){
        delete inv[pid]; continue;
      }
      const d = dist(party.x,party.y, settlement.x,settlement.y);
      if(d > 1.05 || !isPartyHostileToSettlement(party, settlement)){
        delete inv[pid];
      }
    }

    for(const party of state.map.parties){
      if(!party.alive) continue;
      if(party.kind==='neutral') continue;

      const isLarge = (party.size >= 28);
      const canRaid = (['bandit','looters','bandits','sea_raiders','steppe_bandits'].includes(party.kind) && party.size >= 14);
      if(!isLarge && !canRaid) continue;

      let best=null, bd=1e9;
      for(const s of state.map.settlements){
        if(s.kind!=='castle') continue;
        const d = dist2(party.x,party.y, s.x,s.y);
        if(d<bd){ bd=d; best=s; }
      }
      if(!best) continue;

      const d = Math.sqrt(bd);
      if(d <= 1.0 && isPartyHostileToSettlement(party, best)){
        if(!inv[party.id]){
          inv[party.id] = { settlementId: best.id, t: 0 };
          if(best.factionId==='player' || (state.player.faction && best.factionId===state.player.faction)){
            const key = party.id+':'+best.id;
            if(!state.siegeWarnings[key]){
              state.siegeWarnings[key]=1;
              toast(`⚠️ ${best.name} is under siege!`, 2200);
            }
          }
        }
        inv[party.id].t += dt;

        const invDuration = clamp(70 - state.map.day*0.4 - state.map.threat*1.2, 40, 70);
        if(inv[party.id].t >= invDuration){
          resolveAutoInvasion(party, best);
          delete inv[party.id];
        }
      }
    }
  }

  function applyGarrisonLosses(g, frac){
    const total = garrisonCount(g);
    let toLose = Math.floor(total * frac);
    const keys = Object.keys(g);
    while(toLose > 0 && keys.length){
      const k = keys[randi(0, keys.length-1)];
      if(!g[k]){ keys.splice(keys.indexOf(k),1); continue; }
      g[k] -= 1;
      toLose -= 1;
      if(g[k]<=0){
        delete g[k];
        keys.splice(keys.indexOf(k),1);
      }
    }
  }

  function resolveAutoInvasion(party, castle){
    const g = castle.garrison || {};
    const cd = castle.defense || {walls:1,towers:0,traps:0};
    const defBase = garrisonCount(g);
    const d = castle.defense || {walls:1,towers:0,traps:0};
    const def = Math.round(defBase * (1 + d.walls*0.08 + d.towers*0.05) + d.traps*2);
    const atk = party.size;

    const ratio = atk / Math.max(1, def);
    let chance = clamp(0.20 + (ratio-1)*0.22, 0.10, 0.85);
    if(['bandit','looters','bandits'].includes(party.kind)) chance *= 0.88;

    const win = (Math.random() < chance);

    const lossFrac = win ? rand(0.45,0.70) : rand(0.25,0.55);
    const newSize = Math.max(3, Math.floor(atk * (1-lossFrac)));
    party.size = newSize;
    party.comp = makePartyComp(party.kind, newSize, { threat:state.map.threat, day:state.map.day, factionId:party.factionId });

    const defLoss = win ? rand(0.50,0.82) : rand(0.10,0.30);
    applyGarrisonLosses(g, defLoss);

    if(win){
      if(['bandit','looters','bandits','sea_raiders','steppe_bandits'].includes(party.kind)){
        castle.lastSackedT = state.t;
        toast(`⚠️ Raiders sacked ${castle.name}! Garrisons reduced.`, 1800);
      } else {
        castle.factionId = party.factionId;
        castle.stock = makeCastleStock(castle.factionId);
        toast(`🏰 ${castle.name} captured by ${factionName(party.factionId)}!`, 1800);
        // flip linked villages too
        flipLinkedVillages(castle.id, party.factionId);
      }
      party.targetSettlementId = null;
    } else {
      toast(`🛡 ${castle.name} resisted an invasion (heavy losses on attackers).`, 1600);
      party.roamTx = clamp(party.x + rand(-10,10), 2, state.map.w-3);
      party.roamTy = clamp(party.y + rand(-10,10), 2, state.map.h-3);
      party.targetSettlementId = null;
    }
  }

  function flipLinkedVillages(castleId, newFactionId){
    for(const s of state.map.settlements){
      if(s.kind==='village' && s.parentCastleId===castleId){
        s.factionId = newFactionId;
      }
    }
  }

  function tryInteract(){
    if(anyPanelOpen()) return;
    const p = state.player;
    const s = nearestSettlement(p.x,p.y, 1.25);
    if(!s){ toast('No settlement nearby'); return; }

  function makeTroop(team, unitRef, x, y){
    const unitKey = (typeof unitRef==='string') ? unitRef : unitBaseKey(unitRef);
    const unitInst = (typeof unitRef==='string') ? null : unitRef;
    const d = UNIT_DB[unitKey];
    const out = {
      kind:'troop',
      team,
      unitKey,
      role: d.role,
      x, y,
      vx:0, vy:0,
      r: 0.38,
      hp: d.hp,
      maxHp: d.hp,
      dmg: d.dmg,
      range: d.range,
      spd: d.spd,
      windup: d.windup,
      cooldown: d.cooldown,
      shield: !!d.shield,
      blockArrowChance: d.blockArrow||0,
      blockMeleeChance: d.blockMelee||0,
      projKind: d.projKind || 'arrow',
      projSpeed: d.projSpeed || 9.6,
      atk: { state:'idle', t:0, didHit:false },
      aim: null,
      facingX: 1, facingY: 0,
      order: 'charge',
      holdPos: null,
      alive: true,
      diedThisBattle: false,
      _isPlayerArmy: false,
      _isGarrison: false,
      unitId: unitInst?.id || null,
      squadId: unitInst?.squadId || null,
      rank: clamp(unitInst?.rank||0,0,2),
      xp: unitInst?.xp||0,
      kills:0,
    };
    const rb = UNIT_RANK_BONUS[out.rank] || UNIT_RANK_BONUS[0];
    out.maxHp = Math.round(out.maxHp * rb.hp);
    out.hp = out.maxHp;
    out.dmg = Math.round(out.dmg * rb.dmg);
    out.cooldown = out.cooldown * rb.cd;
    out.windup = out.windup * rb.cd;
    return out;
  }

  function swapWeapon(){

    if(p.equip.activeSlot===2 && !p.equip.w2) p.equip.activeSlot = 1;

  // formations
  function formationOffsets(mode, n){
    const out = [];
    if(n<=0) return out;

    if(mode==='loose'){
      for(let i=0;i<n;i++) out.push({ loose:true });
      return out;
    }

    if(mode==='line' || mode==='archerline'){
      const spacing = (mode==='archerline') ? 1.05 : 0.95;
      const start = -Math.floor((n-1)/2);
      for(let i=0;i<n;i++){
        const c = start + i;
        out.push({ ox: c*spacing, oy: 0 });
      }
      return out;
    }

    if(mode==='shieldwall'){
      const cols = Math.min(7, Math.max(3, Math.ceil(n/2)));
      const spacingX = 0.90, spacingY = 0.85;
      let i=0;
      for(let r=0;r<2;r++){
        for(let c=0;c<cols;c++){
          if(i>=n) break;
          const cx = c - (cols-1)/2;
          out.push({ ox: cx*spacingX, oy: r*spacingY });
          i++;
        }
      }
      while(out.length<n){
        out.push({ ox: (out.length%cols - (cols-1)/2)*spacingX, oy: 2*spacingY + Math.floor(out.length/cols)*spacingY });
      }
      return out;
    }

    if(mode==='wedge'){
      const spacingX=0.90, spacingY=0.90;
      let placed=0;
      let row=0;
      while(placed<n){
        const count = row*2+1;
        for(let i=0;i<count && placed<n;i++){
          const cx = i - row;
          out.push({ ox: cx*spacingX, oy: row*spacingY });
          placed++;
        }
        row++;
      }
      return out;
    }

    for(let i=0;i<n;i++) out.push({ ox:0, oy:0 });
    return out;
  }

  function setSelection(sel){
    state.battle.selection = sel;
    const labels={all:'All troops',inf:'Infantry',arc:'Archers',cav:'Cavalry',sup:'Support'};
    toast(`Selected: ${labels[sel]||'All troops'}`);
  }

  function selectedAllies(){
    const b = state.battle;
    if(b.selection==='all') return b.allies.filter(u=>u.alive);
    if(b.selection==='inf') return b.allies.filter(u=>u.alive && u.role==='inf');
    if(b.selection==='arc') return b.allies.filter(u=>u.alive && u.role==='arc');
    if(b.selection==='cav') return b.allies.filter(u=>u.alive && u.role==='cav');
    return b.allies.filter(u=>u.alive && u.role==='sup');
  }

  function cycleFormation(){
    const b = state.battle;
    const sel = b.selection;
    const f = b.formations[sel];

    const pool = (sel==='inf')
      ? ['loose','line','shieldwall','wedge']
      : (sel==='arc')
        ? ['loose','archerline','line']
        : ['loose','line','wedge'];

    const idx = pool.indexOf(f.mode);
    f.mode = pool[(idx+1)%pool.length];
    toast(`Formation (${sel.toUpperCase()}): ${f.mode.toUpperCase()}`);
  }

  function applyCommandToSelected(cmd){
    const b = state.battle;
    const pe = b.playerEnt;
    const units = selectedAllies();

    for(const u of units){
      u.order = cmd;
      u.holdPos = null;
    }

    if(cmd==='hold' || cmd==='rally'){
      let ax=0, ay=0;
      if(cmd==='rally'){
        ax = pe.x; ay = pe.y;
      } else {
        for(const u of units){ ax+=u.x; ay+=u.y; }
        ax /= Math.max(1, units.length);
        ay /= Math.max(1, units.length);
      }

      const dirX = pe.facingX || 1, dirY = pe.facingY || 0;
      const len = Math.hypot(dirX,dirY)||1;
      const fx = dirX/len, fy = dirY/len;
      const rx = -fy, ry = fx;

      const mode = b.formations[b.selection].mode;
      const offs = formationOffsets(mode, units.length);

      const ordered = units.slice().sort((a,c)=> (a.x+a.y)-(c.x+c.y));
      for(let i=0;i<ordered.length;i++){
        const o = offs[i];
        if(o && o.loose){
          if(cmd==='hold') ordered[i].holdPos = { x: ordered[i].x, y: ordered[i].y };
          else ordered[i].holdPos = { x: ax + rand(-1.2,1.2), y: ay + rand(-1.2,1.2) };
        } else {
          const ox = (o?.ox||0), oy=(o?.oy||0);
          ordered[i].holdPos = { x: ax + rx*ox + fx*oy, y: ay + ry*ox + fy*oy };
        }
      }
    }

    b.lastCmdByGroup = b.lastCmdByGroup || { all:'charge', inf:'charge', arc:'charge', cav:'charge', sup:'charge' };
    b.lastCmdByGroup[b.selection] = cmd;
    toast(`Command: ${cmd.toUpperCase()} (${b.selection.toUpperCase()})`);
  }

  function inFrontCone(attX,attY, dirX,dirY, targetX,targetY, maxRange, halfAngleRad){
    const vx = targetX - attX;
    const vy = targetY - attY;
    const d = Math.hypot(vx,vy);
    if(d <= 0.0001 || d > maxRange) return false;
    const nx = vx/d, ny = vy/d;
    const dot = nx*dirX + ny*dirY;
    const ang = Math.acos(clamp(dot, -1, 1));
    return ang <= halfAngleRad;
  }

  function spawnProjectile(kind, team, x,y, dirx,diry, dmg, speed){
    const l = Math.hypot(dirx,diry)||1;
    state.battle.projectiles.push({
      kind, // 'arrow' | 'bolt'
      team,
      x, y,
      vx: (dirx/l)*speed,
      vy: (diry/l)*speed,
      r: (kind==='bolt') ? 0.14 : (kind==='spearArc'?0.16:0.12),
      dmg,
      ttl: 2.3,
      life:2.3,
      arcH:(kind==='spearArc'?0.85:(kind==='rock'?0.55:0))
    });
  }

  function applyDamage(unit, dmg, source=null){
    if(!unit.alive) return;
    const mul = source? (source._buffDmgMul||1) : 1;
    unit.hp -= dmg*mul;
    if(unit.hp <= 0){
      unit.hp = 0;
      unit.alive = false;
      unit.diedThisBattle = true;
    }
  }

  function tryBlock(target, isArrowOrBolt){
    if(!target || target.kind!=='troop' || !target.alive) return false;
    if(!target.shield) return false;
    const chance = isArrowOrBolt ? (target.blockArrowChance||0) : (target.blockMeleeChance||0);
    if(Math.random() < chance){
      state.battle.effects.push({ type:'block', x:target.x, y:target.y, ttl:0.42 });
      return true;
    }
    return false;
  }

  function tryPlayerAttack(){
    const p = state.player;
    const b = state.battle;
    if(b.lootPending) return;
    const pe = b.playerEnt;

    const w = equippedWeapon(p);
    if(!w){ toast('No weapon equipped'); return; }

    if(w.weaponKind==='bow' || w.weaponKind==='crossbow'){
      if(p.rangedCd>0) return;

      // crossbow slower, heavier
      const isX = (w.weaponKind==='crossbow');
      const baseCd = isX ? (1.15 / (w.speed||1)) : (0.65 / (w.speed||1));
      p.rangedCd = baseCd;

      pe.swingFx = { type: isX?'crossbow':'bow', t:0.22, dirX:pe.facingX, dirY:pe.facingY };
      const dmg = Math.round(w.dmg*p.dmgMult);
      const spd = isX ? 12.6 : 11.0;
      spawnProjectile(isX?'bolt':'arrow', 'ally', pe.x,pe.y, pe.facingX,pe.facingY, dmg, spd);
      b.effects.push({ type:'shotFlash', x:pe.x, y:pe.y, ttl:0.18, team:'ally' });
      b.shake = isX ? 0.10 : 0.08;
      return;
    }

    // melee
    if(p.attackCd>0) return;
    p.attackCd = 0.48 / (w.speed||1);
    pe.swingFx = { type:'swing', t:0.18, dirX:pe.facingX, dirY:pe.facingY, range:w.range };
    b.effects.push({ type:'swingArc', x:pe.x, y:pe.y, dirX:pe.facingX, dirY:pe.facingY, ttl:0.18, team:'ally', range:w.range });

    const half = 0.85;
    for(const e of b.enemies){
      if(!e.alive) continue;
      if(inFrontCone(pe.x,pe.y, pe.facingX,pe.facingY, e.x,e.y, w.range+0.35, half)){
        if(tryBlock(e, false)) continue;
        applyDamage(e, Math.round(w.dmg*p.dmgMult));
      }
    }
    b.shake = (w.range>=2.2 ? 0.16 : 0.12);
  }

  function tryPlaceRam(){
    const b=state.battle; if(!b || b.type!=='siege' || !b.siege) return;
    const pe=b.playerEnt; if(b.siege.breachOpen){ toast('Breach already open'); return; }
    if(Math.abs(pe.y-b.siege.wallY)>1.8){ toast('Move closer to wall'); return; }
    if(!b.siege.ram){ b.siege.ram={x:pe.x,y:b.siege.wallY-0.5,t:0}; toast('Ram placed! Hold the line',1800); }
  }

  function nearestAlive(list, x,y){
    let best=null, bd=1e9;
    for(const u of list){
      if(!u.alive) continue;
      const d = dist2(x,y,u.x,u.y);
      if(d<bd){ bd=d; best=u; }
    }
    return best;
  }

  function separateUnits(units){
    for(let i=0;i<units.length;i++){
      const a = units[i];
      if(!a.alive) continue;
      for(let j=i+1;j<units.length;j++){
        const b = units[j];
        if(!b.alive) continue;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const d = Math.hypot(dx,dy);
        const min = (a.r||0.4) + (b.r||0.4) + 0.06;
        if(d>0 && d<min){
          const push = (min - d) * 0.5;
          const nx = dx/d, ny = dy/d;
          a.x -= nx*push; a.y -= ny*push;
          b.x += nx*push; b.y += ny*push;
        }
      }
    }
  }

  function spawnAlliesWithPlayerInFront(playerEnt, armyUnits, baseX, baseY, dirX, dirY){
    // Place player slightly ahead of infantry block so they aren't trapped
    // "front" is in (dirX,dirY) direction
    const frontX = baseX + dirX*2.2;
    const frontY = baseY + dirY*2.2;
    playerEnt.x = frontX;
    playerEnt.y = frontY;

    // Split by role for nicer formation
    const inf = armyUnits.filter(u=>UNIT_DB[unitBaseKey(u)].role==='inf');
    const arc = armyUnits.filter(u=>UNIT_DB[unitBaseKey(u)].role==='arc');
    const cav = armyUnits.filter(u=>UNIT_DB[unitBaseKey(u)].role==='cav');
    const sup = armyUnits.filter(u=>UNIT_DB[unitBaseKey(u)].role==='sup');

    const allies = [];
    // infantry behind player
    allies.push(...spawnBlock(inf, baseX, baseY, 6, 0.90, 0.86, 'ally'));
    // archers further back
    allies.push(...spawnBlock(arc, baseX - dirX*1.4, baseY - dirY*1.4, 6, 0.95, 0.90, 'ally'));
    // cavalry to the flanks/front for charge lanes
    const flankX = -dirY, flankY = dirX;
    allies.push(...spawnBlock(cav, baseX + flankX*2.2 + dirX*0.9, baseY + flankY*2.2 + dirY*0.9, 4, 1.15, 1.0, 'ally'));
    // banner/support units stay with the core line
    allies.push(...spawnBlock(sup, baseX - dirX*0.4, baseY - dirY*0.4, 4, 0.9, 0.9, 'ally'));
    return allies;
  }

  function spawnBlock(unitRefs, cx, cy, cols, sx, sy, team){
    const out = [];
    for(let i=0;i<unitRefs.length;i++){
      const k = unitRefs[i];
      const r = Math.floor(i/cols);
      const c = i%cols;
      const ox = (c - (cols-1)/2) * sx;
      const oy = r * sy;
      out.push(makeTroop(team, k, cx + ox, cy + oy));
    }
    return out;
  }

  // =========================
  // Field battle
  // =========================
  function startFieldBattle(party){
    closeAllPanels(); currentSettlement=null;

    const p = state.player;
    p.hp = clamp(p.hp, 1, playerMaxHp(p));

    // enemies are down-right (near 58,58), so "front" is +x +y
    const dirX = 0.707, dirY = 0.707;

    const playerEnt = {
      kind:'player',
      x: 0, y: 0,
      r: 0.45,
      hp: p.hp,
      maxHp: playerMaxHp(p),
      alive: true,
      facingX: p.facing.x, facingY: p.facing.y,
      swingFx: null,
    };

    const allies = spawnAlliesWithPlayerInFront(playerEnt, p.armyUnits, 12.0, 12.0, dirX, dirY);

    const enemies = [];
    const spawnX = BATTLE_W - 12;
    const spawnY = BATTLE_H - 12;
    const enemyKeys = party.comp.map(u=>u.unit);
    enemies.push(...spawnBlock(enemyKeys, spawnX, spawnY, 7, 0.95, 0.88, 'enemy'));

    state.mode='battle';
    state.battle = makeBattleState({
      biome: biomeAt(Math.floor(party.x), Math.floor(party.y)),
      type:'field',
      partyId: party.id,
      partyRef: party,
      playerEnt,
      allies,
      enemies,
      siege: null,
      attackerSide: null
    });

    state.battle.enemyKind = party.kind;
    applyTacticsPreset(state.battle);

    markOwnershipForBattle(state.battle);
    toast('Battle started!');
    syncHUD();
  }

  // =========================
  // Siege battle (walls + ladders + garrisons + wall archer advantage)
  // =========================
  function startSiegeBattle({ castle, attacker, invaderParty }){
    const p = state.player;
    p.hp = clamp(p.hp, 1, playerMaxHp(p));

    const playerEnt = {
      kind:'player',
      x: 0, y: 0,
      r: 0.45,
      hp: p.hp,
      maxHp: playerMaxHp(p),
      alive: true,
      facingX: p.facing.x, facingY: p.facing.y,
      swingFx: null,
    };

    const WALL_Y = 22;
    const wallLvl = castle.defense?.walls||1;
    const LADDER_XS = wallLvl>=5 ? [35] : (wallLvl>=3 ? [30, 40] : [28,42,50]);
    const WALL_X0 = 12, WALL_X1 = 58;

    const siegeTerrain = {
      wallY: WALL_Y,
      wallX0: WALL_X0,
      wallX1: WALL_X1,
      ladders: LADDER_XS.map(x=>({x, y:WALL_Y})),
      isBlocked(x,y){
        if(x < WALL_X0 || x > WALL_X1) return false;
        if(Math.abs(y - WALL_Y) <= 0.45){
          if(this.breachOpen && Math.abs(x-(this.breachX||-99))<=1.2) return false;
          for(const L of this.ladders){
            if(Math.abs(x - L.x) <= 0.9) return false;
          }
          return true;
        }
        return false;
      },
      speedMul(x,y){
        for(const L of this.ladders){
          if(dist2(x,y, L.x, L.y) < 2.2) return 0.55;
        }
        return 1.0;
      }
    };

    const allies = [];
    const enemies = [];
    const g = castle.garrison || {};
    const cd = castle.defense || {walls:1,towers:0,traps:0};

    if(attacker==='player'){
      // player attacks: spawn attackers outside wall, defenders behind wall
      // "front" toward +y (down)
      const dirX = 0.0, dirY = 1.0;
      allies.push(...spawnAlliesWithPlayerInFront(playerEnt, p.armyUnits, 24, 11.5, dirX, dirY));

      // defenders behind wall block
      const defKeys = [];
      for(const k of Object.keys(g)) for(let i=0;i<g[k];i++) defKeys.push(k);
      enemies.push(...spawnBlock(defKeys, 40, 33.5, 8, 0.95, 0.86, 'enemy'));
    } else {
      // player defends: allies = garrison + player army behind wall; enemies outside
      // put player in front of defenders (closer to wall), not trapped
      playerEnt.x = 36; playerEnt.y = 27.5;

      const gKeys = [];
      for(const k of Object.keys(g)) for(let i=0;i<g[k];i++) gKeys.push(k);
      const gTroops = spawnBlock(gKeys, 40, 34.0, 8, 0.95, 0.86, 'ally');
      allies.push(...gTroops);

      // player army behind garrison (so you’re not boxed in)
      const dirX = 0.0, dirY = -1.0; // "front" toward wall (up)
      const armyAllies = spawnAlliesWithPlayerInFront(
        { ...playerEnt }, // dummy; we keep playerEnt as already placed
        p.armyUnits,
        34.5, 39.5,
        dirX, dirY
      );
      // only take troops (not the dummy's player placement)
      allies.push(...armyAllies);

      const spawnX = 18, spawnY = 12;
      const partyComp = invaderParty ? invaderParty.comp.map(u=>u.unit) : [];
      enemies.push(...spawnBlock(partyComp, spawnX, spawnY, 7, 0.95, 0.88, 'enemy'));
    }

    state.mode = 'battle';
    state.battle = makeBattleState({
      biome: biomeAt(Math.floor(castle.x), Math.floor(castle.y)),
      type:'siege',
      castleRef: castle,
      invaderPartyRef: invaderParty || null,
      playerEnt,
      allies,
      enemies,
      siege: siegeTerrain,
      attackerSide: attacker
    });

    markOwnershipForBattle(state.battle);
    applyTacticsPreset(state.battle);

    toast('Siege started!');
    syncHUD();
  }


  function assignHoldLine(units, centerX, centerY, facingX, facingY, mode='line'){
    const len = Math.hypot(facingX,facingY)||1;
    const fx=facingX/len, fy=facingY/len, rx=-fy, ry=fx;
    const offs = formationOffsets(mode, units.length);
    const ordered = units.slice();
    for(let i=0;i<ordered.length;i++){
      const o=offs[i]||{ox:0,oy:0};
      ordered[i].order='hold';
      ordered[i].holdPos = { x:centerX + rx*(o.ox||0) + fx*(o.oy||0), y:centerY + ry*(o.ox||0) + fy*(o.oy||0) };
    }
  }

  function applyTacticsPreset(b){
    if(!b) return;
    const ex = b.enemies.filter(u=>u.alive);
    if(!ex.length) return;
    for(const u of ex){
      u.order='charge';
      u.holdPos = null;
      delete u._flankTimer;
    }
  }

  function makeBattleState({ type, biome=BIOME.PLAINS, partyId=null, partyRef=null, castleRef=null, invaderPartyRef=null, playerEnt, allies, enemies, siege=null, attackerSide=null }){
    const grassTufts=[];
    const tN = randi(120,220);
    for(let i=0;i<tN;i++) grassTufts.push({ x:rand(1,BATTLE_W-1), y:rand(1,BATTLE_H-1), len:rand(2,5), a:rand(0.08,0.20) });
    const commander = (partyRef && (partyRef.isKing||partyRef.isLord)) ? { side:'enemy', partyId:partyRef.id } : null;
    return {
      type,
      biome,
      partyId,
      partyRef,
      castleRef,
      invaderPartyRef,
      attackerSide,
      playerEnt,
      allies,
      enemies,
      projectiles: [],
      effects: [],
      particles: [],
      blood: [],
      grassTufts,
      commander,
      selection: 'all',
      shake: 0,
      lootPending: null,
      killCountThisBattle: 0,
      formations: {
        all:{ mode:'loose' },
        inf:{ mode:'shieldwall' },
        arc:{ mode:'archerline' },
        cav:{ mode:'line' },
        sup:{ mode:'line' },
      },
      lastCmdByGroup:{ all:'charge', inf:'charge', arc:'charge', cav:'charge', sup:'charge' },
      siege,
      defenderTeam: (type==='siege')
        ? (attackerSide==='player' ? 'enemy' : 'ally')
        : null
    };
  }

  function markOwnershipForBattle(b){
    const p = state.player;

    for(const u of b.allies){
      u._isPlayerArmy = true;
      u._isGarrison = false;
    }

    if(b.type==='siege' && b.attackerSide==='party'){
      // first N allies are garrison
      const gN = garrisonCount(b.castleRef.garrison||{});
      for(let i=0;i<b.allies.length;i++){
        if(i < gN){
          b.allies[i]._isGarrison = true;
          b.allies[i]._isPlayerArmy = false;
        } else {
          b.allies[i]._isGarrison = false;
          b.allies[i]._isPlayerArmy = true;
        }
      }
    }

    b.playerArmySnapshot = p.armyUnits.map(u=>({...u}));
  }

  function moveWithCollision(u, nx, ny){
    const b = state.battle;
    if(!b || !b.siege) { u.x=nx; u.y=ny; return; }
    if(!b.siege.isBlocked(nx, ny)){ u.x = nx; u.y = ny; return; }
    if(!b.siege.isBlocked(nx, u.y)){ u.x = nx; return; }
    if(!b.siege.isBlocked(u.x, ny)){ u.y = ny; return; }
  }

  function archerWallBonus(u){
    const b = state.battle;
    if(!b || b.type!=='siege' || !b.siege) return { dmgMul:1, rangeAdd:0, rateMul:1 };
    if(u.role!=='arc') return { dmgMul:1, rangeAdd:0, rateMul:1 };
    if(u.team !== b.defenderTeam) return { dmgMul:1, rangeAdd:0, rateMul:1 };
    // behind the wall (defender side)
    if(u.y > b.siege.wallY + 1.0){
      return { dmgMul:ARCHER_WALL_DMG, rangeAdd:ARCHER_WALL_RANGE, rateMul:ARCHER_WALL_RATE };
    }
    return { dmgMul:1, rangeAdd:0, rateMul:1 };
  }

  function battleTick(dt){
    const b = state.battle;
    const p = state.player;
    const pe = b.playerEnt;

    if(b.lootPending) return;

    if(b.siege){
      b.siege.towers = b.siege.towers||[];
      b.siege.traps = b.siege.traps||[];
      if(!b.siege._init){
        const tN = Math.min(3, b.castleRef?.defense?.towers||0);
        for(let i=0;i<tN;i++) b.siege.towers.push({ x:26+i*9, y:b.siege.wallY+2.8, cd:1.3+i*0.2, flash:0 });
        const hzN = Math.min(6, b.castleRef?.defense?.traps||0);
        for(let i=0;i<hzN;i++) b.siege.traps.push({ x:23+i*5, y:b.siege.wallY-1.2, ttl:24, charges:120 });
        b.siege._init=1;
      }
      if(b.siege.ram && !b.siege.breachOpen){
        b.siege.ram.t += dt;
        if(b.siege.ram.t>=7){ b.siege.breachOpen=true; b.siege.breachX=b.siege.ram.x; toast('🪵 Breach opened!'); }
      }
      for(const tw of b.siege.towers){
        tw.cd -= dt; tw.flash = Math.max(0, tw.flash-dt);
        if(tw.cd<=0){
          const target = nearestAlive((b.attackerSide==='player')?b.allies:b.enemies, tw.x, tw.y);
          if(target){ tw.flash=0.16; spawnProjectile('arrow', b.defenderTeam, tw.x, tw.y, target.x-tw.x, target.y-tw.y, 8+(b.castleRef?.defense?.towers||0), 12.2); }
          tw.cd = 1.8;
        }
      }
      for(const hz of b.siege.traps){
        hz.ttl -= dt;
        if(hz.ttl<=0 || hz.charges<=0) continue;
        for(const u of [...b.allies,...b.enemies]){
          if(!u.alive) continue;
          if(dist2(u.x,u.y,hz.x,hz.y)<0.85){ applyDamage(u, dt*3.4); hz.charges--; }
        }
      }
    }

    p.attackCd = Math.max(0, p.attackCd - dt);
    p.rangedCd = Math.max(0, p.rangedCd - dt);

    if(pe.swingFx){
      pe.swingFx.t -= dt;
      if(pe.swingFx.t<=0) pe.swingFx=null;
    }

    // player move
    const mv = wantMove();
    const pSpd = 3.08 * (p.food<=0 ? 0.88 : 1.0);
    let nx = clamp(pe.x + mv.dx * pSpd * dt, 1, BATTLE_W-1);
    let ny = clamp(pe.y + mv.dy * pSpd * dt, 1, BATTLE_H-1);
    moveWithCollision(pe, nx, ny);

    if(mv.dx!==0 || mv.dy!==0){
      pe.facingX = mv.dx; pe.facingY = mv.dy;
      p.facing.x = mv.dx; p.facing.y = mv.dy;
    }

    const w = equippedWeapon(p);
    const autoRange = w ? (w.range + (w.weaponKind==='melee' ? 0.35 : 0.25)) : 1.3;
    const autoHalfCone = w && w.weaponKind==='melee' ? 1.05 : 0.55;
    const autoTarget = b.enemies.find(e=> e.alive && inFrontCone(pe.x,pe.y,pe.facingX,pe.facingY,e.x,e.y,autoRange,autoHalfCone));
    if(autoTarget){
      tryPlayerAttack();
    }

    state.cam.x = pe.x; state.cam.y = pe.y;

    for(const fx of b.effects) fx.ttl -= dt;
    b.effects = b.effects.filter(fx => fx.ttl>0);

    for(const pt of b.particles){
      pt.ttl -= dt;
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      pt.vx *= 0.9;
      pt.vy *= 0.9;
    }
    b.particles = b.particles.filter(pt => pt.ttl>0);

    for(const u of [...b.allies,...b.enemies]) u._buffDmgMul = 1;
    const banners = [...b.allies,...b.enemies].filter(u=>u.alive && u.unitKey==='sup_banner');
    for(const bn of banners){
      const rad = (UNIT_DB[bn.unitKey]?.auraRadius)||3.2;
      const teamList = bn.team==='ally' ? [b.playerEnt,...b.allies] : b.enemies;
      for(const u of teamList){
        if(!u.alive) continue;
        if(dist2(u.x,u.y,bn.x,bn.y) <= rad*rad) u._buffDmgMul = Math.max(u._buffDmgMul||1, 1.08);
      }
    }

    for(const u of b.allies) if(u.alive) updateUnit(u, dt);
    for(const e of b.enemies) if(e.alive) updateUnit(e, dt);

    separateUnits([pe, ...b.allies, ...b.enemies]);

    // projectiles
    for(const pr of b.projectiles){
      pr.ttl -= dt;
      const nx2 = pr.x + pr.vx * dt;
      const ny2 = pr.y + pr.vy * dt;
      pr.progress = 1 - (pr.ttl/Math.max(0.001,pr.life||2.3));
      if(b.siege && b.siege.isBlocked(nx2, ny2)){
        pr.ttl = 0;
        continue;
      }
      pr.x = nx2; pr.y = ny2;
    }
    b.projectiles = b.projectiles.filter(pr => pr.ttl>0 && pr.x>=0 && pr.y>=0 && pr.x<=BATTLE_W && pr.y<=BATTLE_H);

    // collisions
    for(const pr of b.projectiles){
      const isArrowOrBolt = (pr.kind==='arrow' || pr.kind==='bolt');
      if(pr.team==='ally'){
        for(const e of b.enemies){
          if(!e.alive) continue;
          if(dist2(pr.x,pr.y, e.x,e.y) < (e.r+pr.r)*(e.r+pr.r)){
            if(isArrowOrBolt && tryBlock(e, true)){ pr.ttl=0; break; }
            const wasAlive = e.alive;
            applyDamage(e, pr.dmg, null);
            spawnCombatBurst(e.x, e.y, pr.team);
            spawnBloodSpray(e.x,e.y, wasAlive&&!e.alive ? 1.2 : 0.7);
            if(wasAlive && !e.alive) spawnBloodAt(e.x, e.y);
            if(wasAlive && !e.alive) b.killCountThisBattle++;
            pr.ttl = 0;
            break;
          }
        }
      } else {
        if(pe.alive && dist2(pr.x,pr.y, pe.x,pe.y) < (pe.r+pr.r)*(pe.r+pr.r)){
          const preHp = pe.hp;
          pe.hp -= pr.dmg;
          spawnCombatBurst(pe.x, pe.y, pr.team);
          if(preHp>0 && pe.hp<=0) spawnBloodAt(pe.x, pe.y);
          if(pe.hp<=0){ pe.hp=0; pe.alive=false; }
          pr.ttl=0;
        } else {
          for(const a of b.allies){
            if(!a.alive) continue;
            if(dist2(pr.x,pr.y, a.x,a.y) < (a.r+pr.r)*(a.r+pr.r)){
              if(isArrowOrBolt && tryBlock(a, true)){ pr.ttl=0; break; }
              const wasAlive = a.alive;
              applyDamage(a, pr.dmg, null);
              spawnCombatBurst(a.x, a.y, pr.team);
              spawnBloodSpray(a.x,a.y, wasAlive&&!a.alive ? 1.2 : 0.7);
              if(wasAlive && !a.alive) spawnBloodAt(a.x, a.y);
              pr.ttl=0;
              break;
            }
          }
        }
      }
    }

    // sync player hp
    p.hp = pe.hp;

    const alliesAlive = b.allies.some(u=>u.alive) || pe.alive;
    const enemiesAlive = b.enemies.some(u=>u.alive);

    if(!enemiesAlive && alliesAlive){
      victoryFlow();
    } else if(!alliesAlive){
      state.player.lastBattleResultDay = state.map.day;
      state.player.lastBattleResultType = 'defeat';
      toast('Defeat... restarting!');
      restartGame();
    }
  }

  function updateUnit(u, dt){
    const b = state.battle;
    const pe = b.playerEnt;

    const targets = (u.team==='ally') ? b.enemies : [pe, ...b.allies];
    if(u._flankTimer!==undefined){ u._flankTimer -= dt; if(u._flankTimer<=0){ u.order='charge'; u.holdPos=null; delete u._flankTimer; } }
    u._chargeTime = Math.max(0,(u._chargeTime||0)-dt*0.4);
    const tgt = nearestAlive(targets, u.x, u.y);

    if(u.atk.state==='cooldown'){
      u.atk.t -= dt;
      if(u.atk.t<=0){ u.atk.state='idle'; u.atk.didHit=false; }
    }
    if(u.atk.state==='windup'){
      u.atk.t -= dt;
      if(u.atk.t<=0){
        u.atk.state='swing';
        u.atk.t = 0.12;
        u.atk.didHit=false;
        b.effects.push({ type:'swingArc', x:u.x, y:u.y, dirX:u.facingX, dirY:u.facingY, ttl:0.16, team:u.team, range:u.range });
      } else {
        if(u.role==='inf'){
          b.effects.push({ type:'telegraphCone', x:u.x, y:u.y, dirX:u.facingX, dirY:u.facingY, ttl:0.05, team:u.team, range:u.range });
        }
      }
    }
    if(u.atk.state==='swing'){
      if(!u.atk.didHit){
        u.atk.didHit=true;

        if(u.role==='inf'){
          const half = 0.85;
          for(const t of targets){
            if(!t.alive) continue;
            if(inFrontCone(u.x,u.y, u.facingX,u.facingY, t.x,t.y, u.range+0.30, half)){
              if(t.kind==='troop' && tryBlock(t, false)) continue;

              if(t.kind==='player'){
                const preHp = t.hp;
                t.hp -= u.dmg;
                spawnCombatBurst(t.x, t.y, u.team);
                spawnBloodSpray(t.x,t.y, preHp>0&&t.hp<=0 ? 1.2 : 0.6);
                if(preHp>0 && t.hp<=0) spawnBloodAt(t.x, t.y);
                if(t.hp<=0){ t.hp=0; t.alive=false; }
              } else {
                const wasAlive = t.alive;
                const cm = (u.role==='cav' && (u._chargeTime||0)>=0.6) ? (UNIT_DB[u.unitKey]?.chargeMul||1.35) : 1;
                applyDamage(t, u.dmg*cm, u);
                if(cm>1){ u._retreatT=0.8; for(let di=0;di<5;di++) state.battle.particles.push({x:t.x,y:t.y,vx:rand(-1.6,1.6),vy:rand(-1.2,1.2),ttl:rand(0.25,0.4),life:rand(0.25,0.4),size:rand(0.06,0.13),team:'dust'}); }
                spawnCombatBurst(t.x, t.y, u.team);
                spawnBloodSpray(t.x,t.y, wasAlive&&!t.alive ? 1.3 : 0.65);
                if(wasAlive && !t.alive) spawnBloodAt(t.x, t.y);
                if(wasAlive && !t.alive && u.team==='ally') b.killCountThisBattle++;
              }
            }
          }
        } else {
          // ranged: wall advantage for defenders
          const wb = archerWallBonus(u);
          const dmg = Math.round(u.dmg * wb.dmgMul);
          const rng = u.range + wb.rangeAdd;

          // if out of range, don't fire
          if(tgt){
            const d = dist(u.x,u.y, tgt.x,tgt.y);
            if(d <= rng){
              spawnProjectile(u.projKind, u.team, u.x,u.y, u.facingX,u.facingY, dmg, u.projSpeed);
              b.effects.push({ type:'shotFlash', x:u.x, y:u.y, ttl:0.14, team:u.team });
            }
          }
        }
      }
      u.atk.t -= dt;
      if(u.atk.t<=0){
        const wb = archerWallBonus(u);
        u.atk.state='cooldown';
        u.atk.t = (u.cooldown * wb.rateMul) + rand(-0.08,0.08);
      }
    }

    if(!tgt) return;

    const d = dist(u.x,u.y, tgt.x,tgt.y);
    const vx = tgt.x - u.x, vy = tgt.y - u.y;
    const l = Math.hypot(vx,vy)||1;
    u.facingX = vx/l; u.facingY = vy/l;

    // archers + horse archers: keep distance
    if(u.role==='arc' || (u.role==='cav' && UNIT_DB[u.unitKey]?.kiteCircle)){
      const wb = archerWallBonus(u);
      const rng = u.range + wb.rangeAdd;

      if(d <= rng && (u.atk.state==='idle' || u.atk.state==='windup')){
        u.aim = { x:tgt.x, y:tgt.y, ttl:0.08 };
      } else {
        u.aim = null;
      }

      if(u.atk.state==='idle' && d <= rng){
        u.atk.state='windup';
        u.atk.t = u.windup * wb.rateMul;
      }

      const canMove = (u.atk.state==='idle' || u.atk.state==='cooldown' || (u.role==='cav' && UNIT_DB[u.unitKey]?.kiteCircle));
      if(canMove){
        if(u.role==='cav' && UNIT_DB[u.unitKey]?.kiteCircle && tgt){
          const desired = 5.1 + ((u._circleBias=u._circleBias||rand(-0.8,0.8))||0);
          if(!u._circleDir) u._circleDir = Math.random()<0.5 ? -1 : 1;
          if(Math.random()<0.006) u._circleDir *= -1;
          const meleePack = targets.filter(t=>t.alive && t.kind==='troop' && (t.role==='inf' || t.role==='sup'));
          let centerX = tgt.x, centerY = tgt.y;
          if(meleePack.length){
            let sx=0, sy=0;
            for(const m of meleePack){ sx+=m.x; sy+=m.y; }
            centerX = sx/meleePack.length;
            centerY = sy/meleePack.length;
          }
          const toCenterX = centerX - u.x;
          const toCenterY = centerY - u.y;
          const centerDist = Math.hypot(toCenterX, toCenterY)||1;
          const radialX = (u.x - tgt.x)/(d||1), radialY=(u.y - tgt.y)/(d||1);
          const tanX = -radialY*u._circleDir, tanY = radialX*u._circleDir;
          const radiusErr = clamp((d-desired)*0.62,-1.35,1.35);
          const closePressure = clamp((7.2-centerDist)/7.2,0,1) * 0.85;
          const mx = tanX - radialX*radiusErr + (toCenterX/centerDist)*closePressure;
          const my = tanY - radialY*radiusErr + (toCenterY/centerDist)*closePressure;
          const ll = Math.hypot(mx,my)||1;
          u.vx = (mx/ll)*u.spd;
          u.vy = (my/ll)*u.spd;
        } else if(u.order==='hold' || u.order==='rally'){
          const hp = u.holdPos;
          if(hp){
            const mx = hp.x - u.x, my = hp.y - u.y;
            const ll = Math.hypot(mx,my);
            if(ll>0.15){
              u.vx = (mx/ll) * u.spd;
              u.vy = (my/ll) * u.spd;
            } else { u.vx*=0.75; u.vy*=0.75; }
          } else { u.vx*=0.75; u.vy*=0.75; }
        } else {
          const desired = rng * 0.72;
          let mx=0,my=0;
          if(d < desired*0.75){ mx = (u.x - tgt.x); my = (u.y - tgt.y); }
          else if(d > desired){ mx = (tgt.x - u.x); my = (tgt.y - u.y); }
          const ll = Math.hypot(mx,my);
          if(ll>0){ u.vx = (mx/ll) * u.spd; u.vy = (my/ll) * u.spd; }
          else { u.vx*=0.80; u.vy*=0.80; }
        }

        const mul = (state.battle.siege) ? state.battle.siege.speedMul(u.x,u.y) : 1.0;
        let nx = clamp(u.x + u.vx*dt*mul, 1, BATTLE_W-1);
        let ny = clamp(u.y + u.vy*dt*mul, 1, BATTLE_H-1);
        moveWithCollision(u, nx, ny);
      } else {
        u.vx*=0.6; u.vy*=0.6;
      }
      return;
    }


    if(u.role==='sup'){
      const allies = u.team==='ally' ? [pe, ...b.allies.filter(x=>x!==u)] : b.enemies.filter(x=>x!==u);
      let ax=0,ay=0,c=0; for(const a of allies){ if(!a.alive) continue; ax+=a.x; ay+=a.y; c++; }
      if(c){ ax/=c; ay/=c; }
      if(d>1.3){ const mx=ax-u.x,my=ay-u.y,ll=Math.hypot(mx,my)||1; u.vx=(mx/ll)*u.spd*0.85; u.vy=(my/ll)*u.spd*0.85; }
    }
    if(u.role==='cav'){
      const spdNow = Math.hypot(u.vx||0,u.vy||0);
      if(d>1.8 && d<6.0 && spdNow>(UNIT_DB[u.unitKey]?.chargeMinSpeed||2.3)) u._chargeTime = Math.min(1.2,(u._chargeTime||0)+dt);
      if(u._retreatT>0){ u._retreatT-=dt; const mx=u.x-tgt.x,my=u.y-tgt.y,ll=Math.hypot(mx,my)||1; u.vx=(mx/ll)*u.spd; u.vy=(my/ll)*u.spd; }
    }

    // infantry
    if(u.atk.state==='idle' && d <= u.range + 0.18){
      u.atk.state='windup';
      u.atk.t = u.windup;
      u.vx=0; u.vy=0;
    }

    const canMove = (u.atk.state==='idle' || u.atk.state==='cooldown');
    if(canMove){
      if(u.order==='hold' || u.order==='rally'){
        const hp = u.holdPos;
        if(hp){
          const mx = hp.x - u.x, my = hp.y - u.y;
          const ll = Math.hypot(mx,my);
          if(ll>0.12){
            u.vx = (mx/ll) * u.spd;
            u.vy = (my/ll) * u.spd;
          } else { u.vx*=0.78; u.vy*=0.78; }
        } else { u.vx*=0.78; u.vy*=0.78; }
      } else {
        const mx = tgt.x - u.x, my = tgt.y - u.y;
        const ll = Math.hypot(mx,my);
        if(ll>0.001){ u.vx = (mx/ll) * u.spd; u.vy = (my/ll) * u.spd; }
        else { u.vx*=0.82; u.vy*=0.82; }
      }

      const mul = (state.battle.siege) ? state.battle.siege.speedMul(u.x,u.y) : 1.0;
      let nx = clamp(u.x + u.vx*dt*mul, 1, BATTLE_W-1);
      let ny = clamp(u.y + u.vy*dt*mul, 1, BATTLE_H-1);
      moveWithCollision(u, nx, ny);
    }
  }

  function finalizePlayerArmyFromBattle(){
    const b = state.battle;
    const p = state.player;

    const survivors = [];
    const woundedAdds = [];

    for(const u of b.allies){
      if(!u._isPlayerArmy) continue;
      if(u.alive) survivors.push({ ...(b.playerArmySnapshot.find(x=>x.id===u.unitId) || makeUnitInstance(u.unitKey)), baseUnit:u.unitKey, xp:(u.xp||0), rank:clamp(u.rank||0,0,2), squadId:u.squadId||null, name:(b.playerArmySnapshot.find(x=>x.id===u.unitId)?.name || null) });
      else if(u.diedThisBattle){
        if(Math.random()<WOUNDED_CHANCE) woundedAdds.push(u.unitKey);
      }
    }

    for(const su of survivors){ const gain = 12 + Math.floor((b.enemies.filter(e=>!e.alive).length)/6); const old=su.rank||0; su.xp=(su.xp||0)+gain; su.rank = Math.max(su.rank||0, unitRankByXp(su.xp)); if(su.rank>old) toast(`🏅 ${UNIT_DB[su.baseUnit].name} promoted to ${unitRankName(su.rank)}`); }
    p.armyUnits = survivors;
    p.woundedUnits.push(...woundedAdds);
  }

  function victoryFlow(){
    const b = state.battle;
    const p = state.player;
    const xpGain = Math.max(10, b.killCountThisBattle * 10);

    if(b.type==='field'){
      const party = state.map.parties.find(pp => pp.id===b.partyId);
      if(party) party.alive=false;
      if(party && party.factionId){
        const fs = factionStateOf(party.factionId);
        if(fs){
          fs.lordPartyIds = (fs.lordPartyIds||[]).filter(id=>id!==party.id);
          if(fs.kingPartyId===party.id) fs.kingPartyId = null;
        }
        if(party.isKing) onKingDefeated(party.factionId);
      }

      finalizePlayerArmyFromBattle();

      // diplomacy shifts
      if(party && (party.kind==='patrol' || party.kind==='army') && party.factionId){
        state.diplomacy[party.factionId].standing = clamp((state.diplomacy[party.factionId].standing||0) - 25, -100, 100); state.diplomacy[party.factionId].hostility = (state.diplomacy[party.factionId].hostility||0) + 18;
      } else {
        for(const f of FACTIONS){
          state.diplomacy[f.id].standing = clamp((state.diplomacy[f.id].standing||0) + 2, -100, 100);
        }
      }

      const size = party ? party.size : 12;
      const allyCount = Math.max(1, state.player.armyUnits.length);
      const ratio = size / allyCount;
      const extra = Math.floor(clamp((ratio-1)*6,0,10));
      p.renown += (2 + Math.floor(size/10) + extra);
      p.lastBattleResultDay = state.map.day;
      p.lastBattleResultType = 'field_win';
      const lootGold = randi(18, 55) + Math.floor(size * 1.25);
      const lootFood = randi(5, 15);

      const items = [];
      const rolls = (size>=16) ? 2 : 1;
      for(let i=0;i<rolls;i++){
        if(Math.random() < (0.30 + size*0.006)){
          const pool = ['weapon_axe','weapon_spear','weapon_bow','weapon_crossbow','weapon_pike','armor_leather','armor_chain','armor_scale','armor_plate'];
          items.push(pool[randi(0,pool.length-1)]);
        }
      }

      b.lootPending = { gold:lootGold, food:lootFood, items, taken:false, xp: xpGain, reason:'Field victory!' };
      openLootPanel(b.lootPending);
      syncHUD();
      return;
    }

    // siege
    const castle = b.castleRef;

    if(b.attackerSide==='player'){
      finalizePlayerArmyFromBattle();

      // wipe defenders
      castle.garrison = seedCapturedMilitia();

      // capture ownership rules:
      // - if pledged: captures for that kingdom
      // - if independent: becomes Your Domain (player)
      const oldFaction = castle.factionId;
      if(p.faction){
        castle.factionId = p.faction;
        castle.stock = makeCastleStock(castle.factionId);
        flipLinkedVillages(castle.id, castle.factionId);
        state.diplomacy[p.faction].standing = clamp((state.diplomacy[p.faction].standing||0) + 6, -100, 100);
        toast(`🏰 Captured for ${factionName(p.faction)}!`, 1600);
      } else {
        castle.factionId = 'player';
        castle.stock = makeCastleStock('player');
        flipLinkedVillages(castle.id, 'player');
        toast(`🏰 You captured the castle! It is now <Your Domain>.`, 1700);
      }

      // relations penalty with previous owner if it was a real faction
      if(oldFaction && oldFaction!=='player'){
        state.diplomacy[oldFaction].standing = clamp((state.diplomacy[oldFaction].standing||0) - 30, -100, 100); state.diplomacy[oldFaction].hostility = (state.diplomacy[oldFaction].hostility||0)+20;
      }

      p.renown += 12; p.influence += (p.faction?5:1); p.lastBattleResultDay = state.map.day; p.lastBattleResultType = 'siege_win';
      const lootGold = randi(95, 190) + 55;
      const lootFood = randi(20, 45);
      const items = [];
      const pool = ['weapon_axe','weapon_spear','weapon_bow','weapon_crossbow','weapon_pike','armor_leather','armor_chain','armor_scale','armor_plate'];
      const rolls = 3 + (Math.random()<0.45 ? 1 : 0);
      for(let i=0;i<rolls;i++){
        if(Math.random()<0.72) items.push(pool[randi(0,pool.length-1)]);
      }
      b.lootPending = { gold:lootGold, food:lootFood, items, taken:false, xp: xpGain+25, reason:'Siege victory!' };
      openLootPanel(b.lootPending);
      syncHUD();
      return;
    }

    // defense victory
    const invader = b.invaderPartyRef;
    if(invader) invader.alive = false;

    // rebuild garrison from surviving garrison allies
    const newG = {};
    for(const u of b.allies){
      if(!u.alive) continue;
      if(u._isGarrison){
        newG[u.unitKey] = (newG[u.unitKey]||0)+1;
      }
    }
    castle.garrison = newG;

    finalizePlayerArmyFromBattle();

    p.renown += 6; if(p.faction && castle.factionId===p.faction) p.influence += 3; p.lastBattleResultDay = state.map.day; p.lastBattleResultType = 'siege_win';
    const lootGold = randi(20, 60);
    const lootFood = randi(8, 18);
    const items = [];
    if(Math.random()<0.40){
      items.push(['weapon_spear','weapon_axe','weapon_bow','armor_leather','weapon_crossbow'][randi(0,4)]);
    }

    b.lootPending = { gold:lootGold, food:lootFood, items, taken:false, xp: xpGain, reason:'Defense victory!' };
    openLootPanel(b.lootPending);
    syncHUD();
  }

    ctx.fillStyle = colorA;
    ctx.beginPath(); ctx.roundRect(spx-7, spy-8 + off1, 5, 10, 2); ctx.fill();

  function drawSigil(ctx2, x, y, sigilId, mainColor='rgba(255,255,255,.92)', size=8){
    ctx2.save();
    ctx2.translate(x,y);
    ctx2.strokeStyle = mainColor;
    ctx2.fillStyle = mainColor;
    ctx2.lineWidth = Math.max(1.4, size*0.18);
    if(sigilId==='lion'){
      ctx2.beginPath(); ctx2.arc(0,0,size*0.35,0,Math.PI*2); ctx2.stroke();
      ctx2.beginPath(); ctx2.moveTo(-size*0.55,size*0.15); ctx2.lineTo(size*0.55,size*0.15); ctx2.stroke();
    }else if(sigilId==='snowflake'){
      for(let i=0;i<3;i++){ const a=i*Math.PI/3; ctx2.beginPath(); ctx2.moveTo(Math.cos(a)*size*0.65,Math.sin(a)*size*0.65); ctx2.lineTo(-Math.cos(a)*size*0.65,-Math.sin(a)*size*0.65); ctx2.stroke(); }
    }else if(sigilId==='horse'){
      ctx2.beginPath(); ctx2.moveTo(-size*0.6,size*0.2); ctx2.lineTo(-size*0.1,-size*0.55); ctx2.lineTo(size*0.5,-size*0.2); ctx2.lineTo(size*0.2,size*0.55); ctx2.closePath(); ctx2.stroke();
    }else if(sigilId==='rose'){
      ctx2.beginPath(); ctx2.arc(0,0,size*0.22,0,Math.PI*2); ctx2.fill();
      for(let i=0;i<6;i++){ const a=i*Math.PI/3; ctx2.beginPath(); ctx2.arc(Math.cos(a)*size*0.34,Math.sin(a)*size*0.34,size*0.18,0,Math.PI*2); ctx2.stroke(); }
    }else if(sigilId==='sun'){
      ctx2.beginPath(); ctx2.arc(0,0,size*0.25,0,Math.PI*2); ctx2.fill();
      for(let i=0;i<8;i++){ const a=i*Math.PI/4; ctx2.beginPath(); ctx2.moveTo(Math.cos(a)*size*0.42,Math.sin(a)*size*0.42); ctx2.lineTo(Math.cos(a)*size*0.72,Math.sin(a)*size*0.72); ctx2.stroke(); }
    }else if(sigilId==='raven'){
      ctx2.beginPath(); ctx2.moveTo(-size*0.65,0); ctx2.lineTo(0,-size*0.48); ctx2.lineTo(size*0.64,0); ctx2.lineTo(0,size*0.2); ctx2.closePath(); ctx2.stroke();
    }else if(sigilId==='lightning'){
      ctx2.beginPath(); ctx2.moveTo(-size*0.25,-size*0.6); ctx2.lineTo(size*0.05,-size*0.1); ctx2.lineTo(-size*0.05,-size*0.1); ctx2.lineTo(size*0.25,size*0.6); ctx2.stroke();
    }else if(sigilId==='crescent'){
      ctx2.beginPath(); ctx2.arc(0,0,size*0.42,-Math.PI/2,Math.PI/2); ctx2.stroke();
      ctx2.beginPath(); ctx2.arc(size*0.14,0,size*0.35,-Math.PI/2,Math.PI/2,true); ctx2.stroke();
    }else if(sigilId==='star'){
      ctx2.beginPath(); for(let i=0;i<5;i++){ const a=-Math.PI/2+i*Math.PI*2/5; const r=(i%2===0)?size*0.62:size*0.24; const px=Math.cos(a)*r, py=Math.sin(a)*r; if(i===0) ctx2.moveTo(px,py); else ctx2.lineTo(px,py);} ctx2.closePath(); ctx2.stroke();
    }else{
      ctx2.beginPath(); ctx2.arc(0,0,size*0.52,0,Math.PI*2); ctx2.stroke();
    }
    ctx2.restore();
  }

  }

  function renderMap(){
    const camX = state.cam.x, camY = state.cam.y;

    const R = 18;
    const minX = Math.floor(camX)-R, maxX = Math.floor(camX)+R;
    const minY = Math.floor(camY)-R, maxY = Math.floor(camY)+R;

    const sMin = (minX+minY);
    const sMax = (maxX+maxY);

    for(let s=sMin; s<=sMax; s++){
      for(let x=minX; x<=maxX; x++){
        const y = s - x;
        if(y<minY || y>maxY) continue;
        if(x<0 || y<0 || x>=state.map.w || y>=state.map.h) continue;
        const p = worldToScreen(x,y, camX,camY);
        const bc = BIOME_COLOR[biomeAt(x,y)] || BIOME_COLOR.plains;
        drawIsoTile(p.x, p.y, bc.fill, bc.stroke);
      }
    }

    const things = [];
    for(const s of state.map.settlements) things.push({ z:s.x+s.y+0.1, kind:'settlement', s });
    for(const party of state.map.parties) if(party.alive) things.push({ z:party.x+party.y+0.2, kind:'party', party });
    for(const cv of (state.map.caravans||[])) things.push({ z:cv.x+cv.y+0.15, kind:'caravan', cv });
    for(const poi of (state.map.pois||[])) things.push({ z:poi.x+poi.y+0.16, kind:'poi', poi });
    things.push({ z:state.player.x+state.player.y+0.3, kind:'player', p:state.player });
    things.sort((a,b)=>a.z-b.z);

    for(const t of things){
      if(t.kind==='settlement'){
        const s = t.s;
        const sp = worldToScreen(s.x,s.y, camX,camY);
        drawEntityShadow(sp.x,sp.y,0.5);

        const col = factionColor(s.factionId);
        ctx.fillStyle = col;
        ctx.strokeStyle = 'rgba(0,0,0,.25)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(sp.x-12, sp.y-26, 24, 20, 6); ctx.fill(); ctx.stroke();

        ctx.fillStyle = 'rgba(255,255,255,.92)';
        ctx.font = '12px ui-monospace, Menlo, Consolas, monospace';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(s.kind==='castle'?'🏰':'🏠', sp.x, sp.y-16);
        if(s.factionId) renderMiniBannerAt(sp.x+10, sp.y-5, s.factionId, 0.58);

        if(state.map.activeContract && state.map.activeContract.targetId===s.id){
          ctx.strokeStyle='rgba(250,204,21,.9)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(sp.x, sp.y-18, 24, 0, Math.PI*2); ctx.stroke();
        }
        if(s.kind==='castle'){
          const gN = garrisonCount(s.garrison||{});
          ctx.fillStyle = 'rgba(234,242,255,.92)';
          ctx.font = '12px system-ui, Arial';
          ctx.textAlign='center'; ctx.textBaseline='bottom';
          ctx.fillText(`G:${gN}`, sp.x, sp.y-30);
        } else {
          // village volunteers
          const vv = s.village?.volunteers || {};
          const n = totalVolunteers(vv);
          ctx.fillStyle = 'rgba(234,242,255,.92)';
          ctx.font = '12px system-ui, Arial';
          ctx.textAlign='center'; ctx.textBaseline='bottom';
          ctx.fillText(`👥${n}`, sp.x, sp.y-30);
        }

        const invader = findInvaderOnSettlement(s);
        if(invader){
          const iv = state.map.invasion[invader.id];
          const frac = clamp((iv?.t||0)/60, 0, 1);
          ctx.strokeStyle = 'rgba(255,220,180,.85)';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(sp.x, sp.y-18, 18, -Math.PI/2, -Math.PI/2 + Math.PI*2*frac);
          ctx.stroke();
        }

        ctx.fillStyle = 'rgba(234,242,255,.92)';
        ctx.font = '12px system-ui, Arial';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText(s.name, sp.x, sp.y-44);
      }

      if(t.kind==='caravan'){
        const cv=t.cv; const sp=worldToScreen(cv.x,cv.y,camX,camY); const fp=settlementById(cv.fromVillageId), tp=settlementById(cv.toCastleId);
        if(fp&&tp){ const a=worldToScreen(fp.x,fp.y,camX,camY); const b2=worldToScreen(tp.x,tp.y,camX,camY); ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(a.x,a.y-20); ctx.lineTo(b2.x,b2.y-20); ctx.stroke();}
        ctx.fillStyle='rgba(255,255,255,.9)'; ctx.font='14px system-ui'; ctx.textAlign='center'; ctx.fillText('🛒',sp.x,sp.y-18);
      }


      if(t.kind==='poi'){
        const e=t.poi; const sp=worldToScreen(e.x,e.y,camX,camY);
        ctx.fillStyle='rgba(196,181,253,.95)';
        ctx.font='14px system-ui'; ctx.textAlign='center'; ctx.fillText('✦',sp.x,sp.y-18);
        ctx.fillStyle='rgba(234,242,255,.78)'; ctx.font='11px system-ui'; ctx.fillText(e.name,sp.x,sp.y-34);
      }

      if(t.kind==='party'){
        const e = t.party;
        const sp = worldToScreen(e.x,e.y, camX,camY);
        drawEntityShadow(sp.x,sp.y,0.48);

        const col = (['looters','bandits','sea_raiders','steppe_bandits','bandit'].includes(e.kind)) ? '#f59e0b' : (e.kind==='neutral' ? 'rgba(220,220,255,.65)' : factionColor(e.factionId));
        ctx.fillStyle = col;
        ctx.beginPath(); ctx.arc(sp.x, sp.y-14, 10, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,.95)';
        ctx.font = '12px ui-monospace, Menlo, Consolas, monospace';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        const iconByKind={looters:'🪓',bandits:'☠',sea_raiders:'⚓',steppe_bandits:'🐎',bandit:'☠',neutral:'🧳',army:'🗡'};
        ctx.fillText(iconByKind[e.kind] || '⚔', sp.x, sp.y-14);

        if(e.kind!=='neutral'){
          ctx.fillStyle = 'rgba(234,242,255,.92)';
          ctx.font = '12px system-ui, Arial';
          ctx.textAlign='center'; ctx.textBaseline='bottom';
          ctx.fillText(String(e.size), sp.x, sp.y-28);
          const bannerFaction = (e.kind==='vassal') ? (state.player.faction||'player') : e.factionId;
          if(bannerFaction) renderMiniBannerAt(sp.x+8, sp.y-5, bannerFaction, (e.isKing||e.isLord)?0.74:0.56);
          if(e.isKing) drawCrownAt(sp.x, sp.y-36, 7.5);
        }
      }

      if(t.kind==='player'){
        const p = t.p;
        const sp = worldToScreen(p.x,p.y, camX,camY);
        drawEntityShadow(sp.x,sp.y,0.55);

        const armor = ITEM_DB[p.equip.armor] || ITEM_DB.armor_cloth;
        const armorTint = armor.id==='armor_plate' ? 'rgba(220,220,235,.92)'
                        : armor.id==='armor_scale' ? 'rgba(190,210,230,.88)'
                        : armor.id==='armor_chain' ? 'rgba(200,210,230,.85)'
                        : armor.id==='armor_leather' ? 'rgba(210,170,120,.85)'
                        : 'rgba(210,240,255,.70)';

        ctx.fillStyle = armorTint;
        ctx.strokeStyle = 'rgba(0,0,0,.25)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(sp.x-9, sp.y-36, 18, 34, 6); ctx.fill(); ctx.stroke();

        const moving = keys.has('w')||keys.has('a')||keys.has('s')||keys.has('d');
        drawLegs(sp.x, sp.y-2, moving, state.t*12);

        // banner
        renderBannerAt(sp.x, sp.y, playerBannerColor(), playerBannerSigil());
        if(state.player.isKingOf) drawCrownAt(sp.x, sp.y-38, 8.2);

        const fx = p.facing.x, fy = p.facing.y;
        const side = (fx - fy);
        const wx = sp.x + (side>=0 ? 14 : -12);
        const wy = sp.y - 26;
        const w = equippedWeapon(p);
        const shape = w ? (w.id.replace('weapon_','')) : 'sword';
        drawWeaponGlyph(shape, wx, wy, fx, fy, 18);

        const near = nearestSettlement(p.x,p.y, 1.25);
        if(near && !anyPanelOpen()){
          ctx.fillStyle = 'rgba(234,242,255,.92)';
          ctx.font = '12px system-ui, Arial';
          ctx.textAlign='center'; ctx.textBaseline='top';
          ctx.fillText('Press E to interact', sp.x, sp.y+8);
        }
      }
    }

    const ac=state.map.activeContract;
    if(ac && ac.type==='escort_caravan' && ac.escort){
      const sp=worldToScreen(ac.escort.x,ac.escort.y,camX,camY);
      ctx.fillStyle='rgba(250,204,21,.95)'; ctx.font='14px system-ui'; ctx.textAlign='center'; ctx.fillText('📦',sp.x,sp.y-20);
    }
  }

  function renderBattle(){
    const b = state.battle;
    const camX = state.cam.x, camY = state.cam.y;

    let shakeX=0, shakeY=0;
    if(b.shake>0){
      b.shake = Math.max(0, b.shake - 0.9*lastDt);
      shakeX = rand(-6,6) * b.shake;
      shakeY = rand(-6,6) * b.shake;
    }

    const R = 20;
    const minX = Math.floor(camX)-R, maxX = Math.floor(camX)+R;
    const minY = Math.floor(camY)-R, maxY = Math.floor(camY)+R;

    const sMin = (minX+minY);
    const sMax = (maxX+maxY);

    ctx.save();
    ctx.translate(shakeX, shakeY);

    for(let s=sMin; s<=sMax; s++){
      for(let x=minX; x<=maxX; x++){
        const y = s - x;
        if(y<minY || y>maxY) continue;
        if(x<0 || y<0 || x>=BATTLE_W || y>=BATTLE_H) continue;
        const p = worldToScreen(x,y, camX,camY);
        const bc = BIOME_COLOR[b.biome||BIOME.PLAINS] || BIOME_COLOR.plains;
        drawIsoTile(p.x, p.y, bc.fill, bc.stroke);
      }
    }

    for(const tuft of (b.grassTufts||[])){
      const gp = worldToScreen(tuft.x, tuft.y, camX, camY);
      ctx.strokeStyle = `rgba(74,140,78,${tuft.a})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(gp.x-1, gp.y-8);
      ctx.lineTo(gp.x, gp.y-8-tuft.len);
      ctx.lineTo(gp.x+1, gp.y-8);
      ctx.stroke();
    }

    if(b.siege){
      for(let x=b.siege.wallX0; x<=b.siege.wallX1; x++){
        const blocked = b.siege.isBlocked(x, b.siege.wallY);
        if(!blocked) continue;
        const sp = worldToScreen(x, b.siege.wallY, camX, camY);
        ctx.fillStyle = 'rgba(255,255,255,.16)';
        ctx.strokeStyle = 'rgba(255,255,255,.22)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(sp.x-16, sp.y-28, 32, 22, 6);
        ctx.fill();
        ctx.stroke();
      }
      for(const L of b.siege.ladders){
        const sp = worldToScreen(L.x, L.y, camX, camY);
        ctx.fillStyle = 'rgba(255,255,255,.26)';
        ctx.strokeStyle = 'rgba(255,255,255,.35)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(sp.x-6, sp.y-34, 12, 30, 4);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = 'rgba(234,242,255,.95)';
        ctx.font = '12px system-ui, Arial';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText('🪜', sp.x, sp.y-36);
      }
      for(const tw of (b.siege.towers||[])){
        const sp = worldToScreen(tw.x, tw.y, camX, camY);
        ctx.fillStyle = tw.flash>0 ? 'rgba(251,191,36,.95)' : 'rgba(180,190,220,.9)';
        ctx.fillRect(sp.x-8, sp.y-36, 16, 16);
      }
      for(const hz of (b.siege.traps||[])){
        if(hz.ttl<=0 || hz.charges<=0) continue;
        const sp = worldToScreen(hz.x, hz.y, camX, camY);
        ctx.fillStyle = 'rgba(251,113,133,.22)';
        ctx.beginPath(); ctx.ellipse(sp.x, sp.y-16, 14, 8, 0, 0, Math.PI*2); ctx.fill();
      }
    }

    for(const stain of b.blood){
      const sp = worldToScreen(stain.x, stain.y, camX, camY);
      ctx.save();
      ctx.translate(sp.x, sp.y-6);
      ctx.rotate(stain.rot);
      ctx.fillStyle = `rgba(120, 18, 24, ${stain.alpha})`;
      ctx.beginPath();
      ctx.ellipse(0, 0, stain.size*18, stain.size*11, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    for(const fx of b.effects){
      if(fx.type==='telegraphCone') drawTelegraphCone(fx, camX, camY);
      else if(fx.type==='swingArc') drawSwingArc(fx, camX, camY);
      else if(fx.type==='shotFlash') drawShotFlash(fx, camX, camY);
    }

    if(state.battle.commander) state.battle.commander._drawn=false;
    const ents = [];
    const pe = b.playerEnt;
    ents.push({ z: pe.x+pe.y+0.3, e:pe });
    for(const a of b.allies) if(a.alive) ents.push({ z:a.x+a.y+0.2, e:a });
    for(const e of b.enemies) if(e.alive) ents.push({ z:e.x+e.y+0.2, e:e });
    ents.sort((a,b)=>a.z-b.z);

    for(const o of ents){
      const e = o.e;
      const sp = worldToScreen(e.x,e.y, camX,camY);
      drawEntityShadow(sp.x, sp.y, e.r||0.4);

      if(e.kind==='player'){
        const p = state.player;
        const armor = ITEM_DB[p.equip.armor] || ITEM_DB.armor_cloth;
        const armorTint = armor.id==='armor_plate' ? 'rgba(220,220,235,.92)'
                        : armor.id==='armor_scale' ? 'rgba(190,210,230,.88)'
                        : armor.id==='armor_chain' ? 'rgba(200,210,230,.9)'
                        : armor.id==='armor_leather' ? 'rgba(210,170,120,.9)'
                        : 'rgba(210,240,255,.75)';
        ctx.fillStyle = armorTint;
        ctx.strokeStyle = 'rgba(0,0,0,.25)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(sp.x-10, sp.y-38, 20, 36, 6); ctx.fill(); ctx.stroke();

        const mv = wantMove();
        const moving = (Math.abs(mv.dx)+Math.abs(mv.dy))>0.01;
        drawLegs(sp.x, sp.y-4, moving, state.t*14);

        renderBannerAt(sp.x, sp.y, playerBannerColor(), playerBannerSigil());
        if(state.player.isKingOf) drawCrownAt(sp.x, sp.y-40, 8.2);

        const w = equippedWeapon(p);
        if(pe.swingFx && pe.swingFx.type==='swing'){
          const dx = pe.swingFx.dirX, dy = pe.swingFx.dirY;
          const side = (dx - dy);
          const baseX = sp.x + (side>=0 ? 10 : -10);
          const baseY = sp.y - 26;
          const shape = w ? w.id.replace('weapon_','') : 'sword';
          drawWeaponGlyph(shape, baseX, baseY, dx, dy, (w&&w.id==='weapon_pike')?26:20);
        } else {
          const side = (pe.facingX - pe.facingY);
          const wx = sp.x + (side>=0 ? 14 : -10);
          const wy = sp.y - 30;
          const shape = w ? w.id.replace('weapon_','') : 'sword';
          drawWeaponGlyph(shape, wx, wy, pe.facingX, pe.facingY, (w&&w.id==='weapon_pike')?24:18);
        }

        if(pe.swingFx && (pe.swingFx.type==='bow' || pe.swingFx.type==='crossbow')){
          ctx.strokeStyle = 'rgba(255,255,255,.75)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(sp.x-10, sp.y-24);
          ctx.lineTo(sp.x+10, sp.y-18);
          ctx.stroke();
        }

        drawHpBar(sp.x, sp.y-52, pe.hp/pe.maxHp, '#a7f3d0');
      } else {
        const def = UNIT_DB[e.unitKey];
        const isHeavy = !!def.armorStyle;
        const tier = def.tier||0;
        const factionCol = def.faction ? factionColor(def.faction) : (e.team==='ally'?'#93c5fd':'#fca5a5');
        const col = (tier>=2) ? shade(factionCol, 18) : (tier===1 ? shade(factionCol, -2) : shade(factionCol, -18));
        ctx.fillStyle = col;
        ctx.strokeStyle = 'rgba(0,0,0,.25)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(sp.x-8, sp.y-28, 16, 26, 6); ctx.fill(); ctx.stroke();
        const vis = def.visual || {};
        ctx.fillStyle = vis.chest==='plate' ? 'rgba(230,230,240,.32)' : (vis.chest==='lamellar' ? 'rgba(220,185,120,.28)' : (vis.chest==='chain'?'rgba(200,220,230,.22)':'rgba(210,180,130,.2)'));
        ctx.fillRect(sp.x-6, sp.y-24, 12, 12);
        if(vis.helm){ ctx.fillStyle = vis.helm==='scarf' ? 'rgba(240,200,160,.4)' : 'rgba(230,230,240,.45)'; ctx.beginPath(); ctx.arc(sp.x, sp.y-30, 5.5, 0, Math.PI*2); ctx.fill(); }

        const speed = Math.hypot(e.vx||0, e.vy||0);
        const moving = speed > 0.12 && (e.atk.state!=='windup');
        drawLegs(sp.x, sp.y-2, moving, state.t*12 + (e.x+e.y));

        if(isHeavy){ ctx.fillStyle='rgba(255,230,140,.9)'; ctx.fillRect(sp.x-2, sp.y-34, 4, 7); }
        if(def.shield){
          ctx.fillStyle = 'rgba(255,255,255,.18)';
          ctx.strokeStyle = 'rgba(255,255,255,.42)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          if(vis.shieldShape==='round' || e.unitKey==='kn_hoplite') ctx.arc(sp.x-14, sp.y-16, e.unitKey==='kn_hoplite'?8:6, 0, Math.PI*2);
          else ctx.roundRect(sp.x-18, sp.y-23, 10, 16, 3);
          ctx.fill(); ctx.stroke();
        }
        const wk = vis.weaponShape || (e.role==='arc' ? (def.projKind==='bolt'?'crossbow':(def.projKind==='spearArc'?'spear':'bow')) : (e.role==='cav'?'spear':'sword'));
        drawWeaponGlyph(wk, sp.x+8, sp.y-18, e.facingX, e.facingY, wk==='pike'?19:15, 'rgba(255,255,255,.86)');

        if(e.aim){
          const tp = worldToScreen(e.aim.x, e.aim.y, camX, camY);
          ctx.strokeStyle = e.team==='ally' ? 'rgba(191,219,254,.65)' : 'rgba(254,205,211,.65)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(sp.x, sp.y-18);
          ctx.lineTo(tp.x, tp.y-18);
          ctx.stroke();
        }

        // wall archer advantage indicator
        if(state.battle.type==='siege' && e.role==='arc'){
          const wb = archerWallBonus(e);
          if(wb.dmgMul>1){
            ctx.fillStyle = 'rgba(255,255,255,.85)';
            ctx.font = '11px system-ui, Arial';
            ctx.textAlign='center'; ctx.textBaseline='top';
            ctx.fillText('⬆ wall', sp.x, sp.y-60);
          }
        }

        drawHpBar(sp.x, sp.y-38, e.hp/e.maxHp, e.team==='ally'?'#bfdbfe':'#fecdd3');

        ctx.fillStyle = 'rgba(234,242,255,.85)';
        ctx.font = '11px system-ui, Arial';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText(def.name+' • '+unitRankName(e.rank||0), sp.x, sp.y-40);
        if(e.squadId){ const sq=state.player.squads?.find(x=>x.id===e.squadId); if(sq){ ctx.fillStyle=sq.color||'rgba(255,255,255,.7)'; ctx.fillRect(sp.x-10, sp.y-33, 20, 3); } }
        if(state.battle.commander && state.battle.commander.side==='enemy' && e.team==='enemy' && (e.role==='inf'||e.role==='sup') && !state.battle.commander._drawn){ drawCrownAt(sp.x, sp.y-54, 7.2); state.battle.commander._drawn=true; }
      }
    }

    // projectiles
    for(const pr of b.projectiles){
      const sp = worldToScreen(pr.x,pr.y, camX,camY);
      const ang = Math.atan2(pr.vy, pr.vx);
      const arcLift = (pr.arcH||0)>0 ? Math.sin((pr.progress||0)*Math.PI)*(pr.arcH||0)*42 : 0;
      const size = pr.kind==='bolt' ? 8.0 : (pr.kind==='spearArc'?8.6:6.4);
      ctx.save();
      ctx.translate(sp.x, sp.y-18-arcLift);
      ctx.rotate(ang);
      ctx.fillStyle = pr.team==='ally'
        ? (pr.kind==='bolt'?'rgba(240,248,255,.95)':'rgba(234,242,255,.92)')
        : (pr.kind==='bolt'?'rgba(255,235,235,.95)':'rgba(255,220,220,.92)');
      ctx.beginPath();
      ctx.moveTo(size, 0);
      ctx.lineTo(-size*0.65, -size*0.42);
      ctx.lineTo(-size*0.65,  size*0.42);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath(); ctx.moveTo(-size*0.65,0); ctx.lineTo(-size*1.1,-size*0.12); ctx.lineTo(-size*1.1,size*0.12); ctx.closePath(); ctx.fill();
      if(pr.kind==='bolt'){ ctx.strokeStyle='rgba(230,230,255,.35)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(-size*1.4,0); ctx.lineTo(-size*2.7,0); ctx.stroke(); }
      if(pr.kind==='spearArc'){
        ctx.strokeStyle='rgba(255,255,255,.35)';
        ctx.lineWidth=1.2;
        ctx.beginPath();
        ctx.moveTo(-size*0.8,0);
        ctx.lineTo(-size*2.2,0);
        ctx.stroke();
      }
      ctx.restore();
    }

    for(const pt of b.particles){
      const sp = worldToScreen(pt.x,pt.y, camX,camY);
      const life = Math.max(0, pt.ttl / (pt.life||0.3));
      const col = pt.team==='ally' ? `rgba(191,219,254,${0.18 + life*0.65})` : (pt.team==='blood' ? `rgba(150,24,28,${0.18 + life*0.75})` : (pt.team==='dust' ? `rgba(180,140,86,${0.12 + life*0.5})` : `rgba(255,179,179,${0.18 + life*0.65})`));
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y-22, pt.size*22*life, 0, Math.PI*2);
      ctx.fill();
    }

    // blocks
    for(const fx of b.effects){
      if(fx.type==='block'){
        const sp = worldToScreen(fx.x, fx.y, camX, camY);
        ctx.fillStyle = 'rgba(255,255,255,.95)';
        ctx.font = 'bold 12px system-ui, Arial';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText('🛡 BLOCK', sp.x, sp.y-56);
      }
    }

    ctx.restore();
  }

  // =========================
  // Game loop + init
  // =========================
  function restartGame(){
    state.mode = 'map';
    state.t = 0;
    state.map = makeMap();
    state.player = makeNewPlayer();
    normalizeArmyUnits(state.player);
    state.diplomacy = makeNewDiplomacy();
    state.battle = null;
    closeAllPanels();
    state.cam.x = state.player.x;
    state.cam.y = state.player.y;
    syncHUD();
    toast('New run started');
  }

  function tick(dt){
    state.t += dt;
    if(!state.started){ render(); return; }
    if(state.mode==='map') mapTick(dt);
    else battleTick(dt);
    syncHUD();
    renderMobileBattlePanel();
    renderDesktopBattleHud();
    updateMobileInteractPrompt();
    render();
  }

  let lastTs = performance.now();
  function loop(ts){
    const dt = clamp((ts - lastTs)/1000, 0, 0.05);
    lastTs = ts;
    lastDt = dt;
    lastDtMs = dt*1000;
    tick(dt);
    requestAnimationFrame(loop);
  }

  // start
  setupMobileControls();
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
