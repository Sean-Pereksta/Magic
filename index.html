<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>🎮 Cat’N Mice Game Hub</title>
  <style>
    :root{
      --bg:#f7f7f8;
      --surface:#ffffff;
      --surface-2:#f9fafb;
      --ink:#101828;
      --muted:#667085;
      --line:#e4e7ec;
      --brand:#b4232f;
      --brand-dark:#7f1420;
      --brand-deep:#5f0f18;
      --brand-soft:#fff1f3;
      --good:#067647;
      --bad:#b42318;
      --shadow:0 20px 50px rgba(16,24,40,.13);
      --shadow-soft:0 8px 24px rgba(16,24,40,.08);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      color:var(--ink);
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 420px at 0% -110px,rgba(244,63,94,.18),transparent 62%),
        radial-gradient(760px 360px at 100% -120px,rgba(180,35,47,.15),transparent 64%),
        var(--bg);
    }

    button,input{font:inherit}
    button{touch-action:manipulation}

    /* Slim Game Hub shell matching the lobby */
    .appbar{
      position:sticky;
      top:0;
      z-index:1000;
      color:#fff;
      background:
        radial-gradient(600px 180px at 78% 0%,rgba(255,255,255,.12),transparent 70%),
        linear-gradient(115deg,var(--brand-deep),var(--brand-dark) 46%,var(--brand));
      border-bottom:1px solid rgba(255,255,255,.13);
      box-shadow:0 12px 30px rgba(91,15,24,.24);
      padding-top:env(safe-area-inset-top);
    }

    .appbar-inner{
      width:min(1480px,100%);
      min-height:72px;
      margin:0 auto;
      padding:12px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .brand{
      min-width:0;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand-logo{
      width:45px;
      height:45px;
      flex:0 0 auto;
      display:grid;
      place-items:center;
      border-radius:15px;
      font-size:23px;
      background:rgba(255,255,255,.13);
      border:1px solid rgba(255,255,255,.25);
      box-shadow:0 10px 24px rgba(49,7,13,.28);
      backdrop-filter:blur(12px);
    }

    .brand-copy{min-width:0}
    .brand-title{
      font-size:1.04rem;
      line-height:1.15;
      font-weight:950;
      letter-spacing:-.015em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brand-subtitle{
      margin-top:3px;
      color:#ffe4e8;
      font-size:.77rem;
      font-weight:650;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .header-actions{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:9px;
      flex-wrap:wrap;
    }

    .status-pill{
      min-height:36px;
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:7px 11px;
      border-radius:999px;
      color:#fff;
      font-size:.76rem;
      font-weight:850;
      background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.2);
      backdrop-filter:blur(10px);
    }

    .status-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#6ce9a6;
      box-shadow:0 0 0 4px rgba(108,233,166,.14);
    }

    .header-btn{
      min-height:38px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      padding:8px 12px;
      border-radius:11px;
      border:1px solid rgba(255,255,255,.34);
      background:rgba(255,255,255,.11);
      color:#fff;
      font-weight:850;
      font-size:.78rem;
      cursor:pointer;
      transition:.16s ease;
    }
    .header-btn:hover{background:rgba(255,255,255,.2);transform:translateY(-1px)}
    .header-btn:active{transform:none}

    /* Lobby frame */
    .viewport{
      flex:1;
      min-height:0;
      display:flex;
      padding:16px;
    }

    .frame-wrap{
      position:relative;
      flex:1;
      min-width:0;
      width:min(1480px,100%);
      min-height:calc(100vh - 104px);
      margin:0 auto;
      overflow:hidden;
      border:1px solid rgba(208,213,221,.95);
      border-radius:var(--radius);
      background:var(--surface);
      box-shadow:var(--shadow);
    }

    iframe{
      width:100%;
      height:100%;
      min-height:calc(100vh - 106px);
      display:block;
      border:0;
      background:#fff;
    }

    .loader{
      position:absolute;
      inset:0;
      z-index:4;
      display:grid;
      place-items:center;
      background:
        radial-gradient(500px 240px at 50% 25%,rgba(244,63,94,.1),transparent 70%),
        rgba(247,247,248,.97);
      opacity:1;
      visibility:visible;
      transition:opacity .22s ease,visibility .22s ease;
      pointer-events:none;
    }
    .loader.hide{opacity:0;visibility:hidden}

    .loader-card{
      display:grid;
      justify-items:center;
      gap:12px;
      padding:24px 28px;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.92);
      box-shadow:var(--shadow-soft);
    }

    .spinner{
      width:40px;
      height:40px;
      border-radius:50%;
      border:4px solid #ffe4e8;
      border-top-color:var(--brand);
      animation:spin .8s linear infinite;
    }
    .loader-text{font-size:.84rem;font-weight:850;color:#475467}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Chat button */
    .fab{
      position:fixed;
      right:22px;
      bottom:calc(22px + env(safe-area-inset-bottom));
      z-index:1110;
      width:58px;
      height:58px;
      border:1px solid rgba(255,255,255,.35);
      border-radius:19px;
      display:grid;
      place-items:center;
      color:#fff;
      background:linear-gradient(145deg,var(--brand),var(--brand-dark));
      box-shadow:0 16px 34px rgba(127,20,32,.34);
      cursor:pointer;
      font-size:23px;
      transition:.16s ease;
    }
    .fab:hover{transform:translateY(-3px);box-shadow:0 20px 40px rgba(127,20,32,.42)}
    .fab:active{transform:none}
    .fab.open{background:#111827}

    /* Chat panel */
    .chat-sheet{
      position:fixed;
      right:22px;
      bottom:calc(92px + env(safe-area-inset-bottom));
      z-index:1105;
      width:min(410px,calc(100vw - 28px));
      height:min(600px,72vh);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:22px;
      background:var(--surface);
      box-shadow:0 24px 60px rgba(16,24,40,.22);
      opacity:0;
      visibility:hidden;
      transform:translateY(16px) scale(.97);
      transform-origin:bottom right;
      transition:.2s ease;
    }
    .chat-sheet.open{
      opacity:1;
      visibility:visible;
      transform:translateY(0) scale(1);
    }

    .chat-head{
      padding:14px 15px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      color:#fff;
      background:
        radial-gradient(260px 100px at 100% 0%,rgba(255,255,255,.12),transparent 70%),
        linear-gradient(120deg,var(--brand-dark),var(--brand));
    }

    .chat-title{display:flex;align-items:center;gap:10px}
    .chat-title-icon{
      width:34px;
      height:34px;
      display:grid;
      place-items:center;
      border-radius:11px;
      background:rgba(255,255,255,.13);
      border:1px solid rgba(255,255,255,.2);
    }
    .chat-title strong{display:block;font-size:.88rem}
    .chat-user{margin-top:2px;color:#ffe4e8;font-size:.7rem;font-weight:650}

    .close-chat{
      width:34px;
      height:34px;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.22);
      border-radius:10px;
      color:#fff;
      background:rgba(255,255,255,.09);
      cursor:pointer;
      font-size:17px;
    }
    .close-chat:hover{background:rgba(255,255,255,.18)}

    .chat-messages{
      flex:1;
      min-height:0;
      overflow-y:auto;
      padding:14px;
      background:
        radial-gradient(300px 180px at 0% 0%,rgba(255,228,232,.4),transparent 70%),
        var(--surface-2);
      scrollbar-width:thin;
      scrollbar-color:#d0d5dd transparent;
    }

    .chat-empty{
      padding:46px 20px;
      text-align:center;
      color:var(--muted);
      font-size:.82rem;
      line-height:1.5;
    }
    .chat-empty .big{font-size:1.8rem;margin-bottom:8px}

    .msg{
      width:fit-content;
      max-width:88%;
      margin-bottom:10px;
      padding:9px 11px;
      border:1px solid var(--line);
      border-radius:5px 14px 14px 14px;
      background:#fff;
      box-shadow:0 4px 12px rgba(16,24,40,.05);
    }
    .msg.mine{
      margin-left:auto;
      border-color:#fecdd3;
      border-radius:14px 5px 14px 14px;
      background:var(--brand-soft);
    }
    .meta{
      margin-bottom:3px;
      color:var(--muted);
      font-size:.67rem;
      font-weight:750;
    }
    .text{font-size:.84rem;line-height:1.4;overflow-wrap:anywhere}

    .chat-login-note{
      display:none;
      padding:9px 12px;
      border-top:1px solid #fecdd3;
      background:#fff1f3;
      color:#9f1239;
      font-size:.73rem;
      font-weight:750;
      line-height:1.35;
    }
    .chat-login-note.show{display:block}

    .chat-input{
      display:flex;
      align-items:flex-end;
      gap:8px;
      padding:11px;
      border-top:1px solid var(--line);
      background:#fff;
    }
    .chat-input input{
      flex:1;
      min-width:0;
      min-height:42px;
      padding:10px 11px;
      border:1px solid #d0d5dd;
      border-radius:12px;
      color:var(--ink);
      background:#fff;
      outline:none;
      transition:.16s ease;
    }
    .chat-input input:focus{border-color:#fda4af;box-shadow:0 0 0 4px rgba(244,63,94,.12)}
    .chat-input input:disabled{background:#f2f4f7;color:#98a2b3;cursor:not-allowed}

    .send{
      min-width:70px;
      min-height:42px;
      padding:9px 13px;
      border:1px solid var(--brand);
      border-radius:12px;
      color:#fff;
      background:var(--brand);
      font-weight:900;
      cursor:pointer;
      box-shadow:0 7px 16px rgba(180,35,47,.2);
      transition:.15s ease;
    }
    .send:hover{background:var(--brand-dark);transform:translateY(-1px)}
    .send:disabled{opacity:.48;cursor:not-allowed;transform:none;box-shadow:none}

    .toast{
      position:fixed;
      left:50%;
      bottom:calc(22px + env(safe-area-inset-bottom));
      z-index:1300;
      max-width:min(520px,calc(100vw - 32px));
      padding:11px 14px;
      border-radius:13px;
      color:#fff;
      background:#101828;
      box-shadow:0 14px 32px rgba(16,24,40,.24);
      font-size:.8rem;
      font-weight:800;
      opacity:0;
      visibility:hidden;
      transform:translate(-50%,10px);
      transition:.18s ease;
    }
    .toast.show{opacity:1;visibility:visible;transform:translate(-50%,0)}
    .toast.error{background:var(--bad)}

    @media (max-width:760px){
      .appbar-inner{min-height:64px;padding:9px 12px}
      .brand-logo{width:41px;height:41px;border-radius:13px}
      .brand-subtitle{display:none}
      .status-pill{display:none}
      .header-btn .label{display:none}
      .header-btn{width:40px;padding:0}
      .viewport{padding:8px}
      .frame-wrap{min-height:calc(100vh - 80px);border-radius:16px}
      iframe{min-height:calc(100vh - 82px)}
      .fab{right:14px;bottom:calc(14px + env(safe-area-inset-bottom));width:54px;height:54px;border-radius:17px}
      .chat-sheet{
        right:7px;
        bottom:calc(76px + env(safe-area-inset-bottom));
        width:calc(100vw - 14px);
        height:min(620px,78vh);
        border-radius:20px;
      }
    }

    @media (max-width:460px){
      .brand-title{font-size:.95rem}
      .header-actions{gap:6px}
      .chat-input{padding:9px}
      .send{min-width:62px;padding:8px 10px}
    }

    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{scroll-behavior:auto!important;animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
    }
  </style>
</head>
<body>
  <header class="appbar">
    <div class="appbar-inner">
      <div class="brand">
        <div class="brand-logo" aria-hidden="true">🎮</div>
        <div class="brand-copy">
          <div class="brand-title">Cat’N Mice Game Hub</div>
          <div class="brand-subtitle">Browse games, join lobbies, and play with friends.</div>
        </div>
      </div>

      <div class="header-actions">
        <div class="status-pill" title="The Game Hub lobby is loaded below">
          <span class="status-dot"></span>
          Lobby &amp; Game Library
        </div>
        <button id="reloadLobby" class="header-btn" type="button" title="Reload the lobby">
          <span aria-hidden="true">↻</span>
          <span class="label">Reload</span>
        </button>
      </div>
    </div>
  </header>

  <main class="viewport">
    <div class="frame-wrap">
      <iframe
        id="contentFrame"
        src="https://catnmice.com/lobby/lobby.html"
        title="Cat’N Mice Game Hub Lobby"
        allow="fullscreen"
      ></iframe>

      <div class="loader" id="frameLoader" aria-live="polite">
        <div class="loader-card">
          <div class="spinner" aria-hidden="true"></div>
          <div class="loader-text">Loading the Game Hub…</div>
        </div>
      </div>
    </div>
  </main>

  <section id="chatContainer" class="chat-sheet" aria-hidden="true" aria-label="Lobby chat">
    <div class="chat-head">
      <div class="chat-title">
        <div class="chat-title-icon" aria-hidden="true">💬</div>
        <div>
          <strong>Game Hub Chat</strong>
          <div id="chatUser" class="chat-user">Log in through the lobby to chat</div>
        </div>
      </div>
      <button class="close-chat" id="closeChat" type="button" aria-label="Close chat">✕</button>
    </div>

    <div id="chatMessages" class="chat-messages">
      <div class="chat-empty">
        <div class="big">💬</div>
        Lobby messages will appear here.
      </div>
    </div>

    <div id="chatLoginNote" class="chat-login-note">
      Log in or create a user inside the lobby first. Chat will automatically use that username.
    </div>

    <div class="chat-input">
      <input id="chatMessage" type="text" maxlength="500" placeholder="Type a message…" autocomplete="off" disabled />
      <button id="sendBtn" class="send" type="button" disabled>Send</button>
    </div>
  </section>

  <button id="toggleChat" class="fab" type="button" aria-label="Open Game Hub chat" aria-pressed="false">💬</button>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      query,
      orderBy,
      limit,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB7twY7z31ucB6pGA8JC_HrVMZhA8lNaJA",
      authDomain: "bible-game-246c0.firebaseapp.com",
      projectId: "bible-game-246c0",
      storageBucket: "bible-game-246c0.appspot.com",
      messagingSenderId: "959619818996",
      appId: "1:959619818996:web:5a9fbf492e23c765e445a1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const frame = document.getElementById("contentFrame");
    const loader = document.getElementById("frameLoader");
    const reloadLobby = document.getElementById("reloadLobby");
    const chatContainer = document.getElementById("chatContainer");
    const toggleChat = document.getElementById("toggleChat");
    const closeChat = document.getElementById("closeChat");
    const chatMessages = document.getElementById("chatMessages");
    const chatUser = document.getElementById("chatUser");
    const chatLoginNote = document.getElementById("chatLoginNote");
    const msgInput = document.getElementById("chatMessage");
    const sendBtn = document.getElementById("sendBtn");
    const toast = document.getElementById("toast");

    let currentUsername = "";
    let toastTimer = null;

    function getLobbyUsername(){
      return (localStorage.getItem("gh.username") || "").trim();
    }

    function syncLobbyUsername(){
      const nextUsername = getLobbyUsername();
      currentUsername = nextUsername;

      if(currentUsername){
        chatUser.textContent = `Chatting as ${currentUsername}`;
        chatLoginNote.classList.remove("show");
        msgInput.disabled = false;
        sendBtn.disabled = false;
        msgInput.placeholder = "Type a message…";
      }else{
        chatUser.textContent = "Log in through the lobby to chat";
        chatLoginNote.classList.add("show");
        msgInput.disabled = true;
        sendBtn.disabled = true;
        msgInput.placeholder = "Log in inside the lobby to chat";
      }
    }

    function showToast(message,type=""){
      toast.textContent = message;
      toast.classList.toggle("error",type === "error");
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=>toast.classList.remove("show"),2800);
    }

    function showLoader(){
      loader.classList.remove("hide");
    }

    frame.addEventListener("load",()=>{
      loader.classList.add("hide");
      syncLobbyUsername();
    });

    reloadLobby.addEventListener("click",()=>{
      showLoader();
      try{
        frame.contentWindow.location.reload();
      }catch{
        frame.src = "https://catnmice.com/lobby/lobby.html";
      }
    });

    function toggleChatPanel(force){
      const nextOpen = typeof force === "boolean" ? force : !chatContainer.classList.contains("open");
      chatContainer.classList.toggle("open",nextOpen);
      chatContainer.setAttribute("aria-hidden",nextOpen ? "false" : "true");
      toggleChat.setAttribute("aria-pressed",nextOpen ? "true" : "false");
      toggleChat.classList.toggle("open",nextOpen);
      toggleChat.textContent = nextOpen ? "✕" : "💬";
      syncLobbyUsername();
      if(nextOpen && currentUsername){
        setTimeout(()=>msgInput.focus(),120);
      }
    }

    function hashColor(str){
      let hash = 0;
      for(let i=0;i<str.length;i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
      }
      return `hsl(${Math.abs(hash) % 360}deg 62% 36%)`;
    }

    function formatTime(timestamp){
      try{
        const date = timestamp?.toDate ? timestamp.toDate() : (timestamp ? new Date(timestamp) : new Date());
        return date.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
      }catch{
        return "";
      }
    }

    function renderMessage({username="",text="",timestamp}){
      const wrapper = document.createElement("article");
      wrapper.className = `msg${username === currentUsername ? " mine" : ""}`;

      const meta = document.createElement("div");
      meta.className = "meta";

      const who = document.createElement("span");
      who.textContent = username || "Someone";
      who.style.color = hashColor(username || "Someone");

      const separator = document.createElement("span");
      separator.textContent = " · ";
      separator.style.opacity = ".6";

      const when = document.createElement("span");
      when.textContent = formatTime(timestamp);

      const body = document.createElement("div");
      body.className = "text";
      body.textContent = text;

      meta.append(who,separator,when);
      wrapper.append(meta,body);
      return wrapper;
    }

    async function sendMessage(){
      syncLobbyUsername();
      const text = msgInput.value.trim();

      if(!currentUsername){
        showToast("Log in inside the lobby before using chat.","error");
        return;
      }
      if(!text) return;

      sendBtn.disabled = true;
      try{
        await addDoc(collection(db,"chat"),{
          username:currentUsername,
          text:text.slice(0,500),
          timestamp:serverTimestamp()
        });
        msgInput.value = "";
      }catch(error){
        console.warn("Chat send failed",error);
        showToast("Chat could not send. Check the Firestore chat rule.","error");
      }finally{
        sendBtn.disabled = false;
        msgInput.focus();
      }
    }

    function loadMessages(){
      const messagesQuery = query(
        collection(db,"chat"),
        orderBy("timestamp","desc"),
        limit(50)
      );

      onSnapshot(messagesQuery,(snapshot)=>{
        const shouldStickToBottom =
          chatMessages.scrollTop + chatMessages.clientHeight >= chatMessages.scrollHeight - 70;

        chatMessages.innerHTML = "";
        const docs = [...snapshot.docs].reverse();

        if(!docs.length){
          chatMessages.innerHTML = `
            <div class="chat-empty">
              <div class="big">💬</div>
              No messages yet. Start the conversation.
            </div>`;
          return;
        }

        docs.forEach(messageDoc=>chatMessages.appendChild(renderMessage(messageDoc.data())));
        if(shouldStickToBottom || docs.length <= 3){
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }
      },(error)=>{
        console.warn("Chat subscription failed",error);
        chatMessages.innerHTML = `
          <div class="chat-empty">
            <div class="big">⚠️</div>
            Chat is unavailable until its Firestore rule is enabled.
          </div>`;
      });
    }

    toggleChat.addEventListener("click",()=>toggleChatPanel());
    closeChat.addEventListener("click",()=>toggleChatPanel(false));
    sendBtn.addEventListener("click",sendMessage);
    msgInput.addEventListener("keydown",event=>{
      if(event.key === "Enter"){
        event.preventDefault();
        sendMessage();
      }
    });

    window.addEventListener("storage",event=>{
      if(event.key === "gh.username") syncLobbyUsername();
    });
    window.addEventListener("focus",syncLobbyUsername);
    document.addEventListener("visibilitychange",()=>{
      if(!document.hidden) syncLobbyUsername();
    });

    syncLobbyUsername();

    signInAnonymously(auth)
      .catch(error=>console.warn("Anonymous Firebase sign-in failed",error))
      .finally(loadMessages);
  </script>
</body>
</html>
